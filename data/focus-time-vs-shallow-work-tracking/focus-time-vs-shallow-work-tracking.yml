markdown: >-
  ## Overview


  Tracking and optimizing the ratio of deep focus work (cognitively demanding,
  high-value) versus shallow work (administrative, low-cognitive-load) helps
  individuals and teams maximize productivity and creative output.


  ## Definitions


  ### Deep/Focus Work

  - Writing, coding, design, analysis

  - Requires sustained concentration

  - Creates significant value

  - Difficult to multitask

  - Energy-intensive

  - Limited daily capacity (4-6 hours max)


  ### Shallow Work

  - Email, meetings, admin tasks

  - Can be interrupted

  - Necessary but low-value

  - Easy to multitask

  - Less mentally taxing

  - Can do more hours daily


  ## Why Track the Distinction


  ### Optimize Schedules

  - Schedule deep work during peak energy hours

  - Batch shallow work in low-energy periods

  - Protect focus time from meetings


  ### Measure Productivity

  - High deep work % = high leverage

  - Too much shallow work = low impact

  - Target: 60-70% deep work for knowledge workers


  ### Identify Time Leaks

  - Meetings crowding out focus time

  - Email consuming prime morning hours

  - Admin tasks interrupting deep work


  ## Implementation


  ### Tag System

  Label time entries:

  - `#deep` or `#focus`

  - `#shallow` or `#admin`

  - Analyze weekly ratios


  ### Block Scheduling

  - **9-12 AM**: Deep work block (no meetings)

  - **1-3 PM**: Shallow work batch (email, admin)

  - **3-5 PM**: Meetings, collaboration


  ### Daily Review

  Ask: "Did I spend enough time on deep work today?"


  ## Common Patterns


  ### Problem: All Shallow

  Calendar filled with meetings, email, admin.

  **Solution**: Block 2-hour focus time daily, defend fiercely.


  ### Problem: Fragmented Focus

  Deep work interrupted by meetings.

  **Solution**: Cluster meetings, create 3+ hour focus blocks.


  ### Problem: Wrong Time

  Deep work scheduled during low-energy afternoon.

  **Solution**: Protect morning (peak energy) for focus work.


  ## Tools


  - **Reclaim.ai**: Auto-schedules focus time

  - **RescueTime**: Categories deep vs. shallow automatically

  - **Clockwise**: Optimizes calendar for focus time

  - **Toggl Track**: Tag-based categorization


  ## Expected Ratios


  ### Knowledge Workers

  - Target: 60-70% deep work

  - Reality (average): 30-40% deep work

  - Gap represents opportunity


  ### Managers

  - Target: 40-50% deep work (more meetings necessary)

  - Includes: Strategy, planning, 1:1s prep


  ### Individual Contributors

  - Target: 70-80% deep work

  - Protect from meeting creep


  ## Benefits


  - 500% productivity increase in deep work vs. distracted state

  - Higher quality output

  - Faster skill development

  - Greater job satisfaction

  - Reduced burnout (shallow work more draining than deep)
