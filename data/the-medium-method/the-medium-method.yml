name: The Medium Method
description: A hybrid productivity technique that combines the best of digital
  and analog tools. It uses a main notebook for capturing ideas and tasks, a
  travel notebook, daily Post-it notes for appointments and top 3 tasks, plus a
  task management app, online calendar, and note-taking app.
source_url: https://www.themediummethod.com
category: Time Management Technique
