markdown: >-
  ## Overview


  nettime solutions' stratustime is a cloud-based time and attendance platform
  designed to help companies increase efficiency and make informed workplace
  decisions. It simplifies time tracking for both employees and administrators
  while integrating with hundreds of payroll systems, HR platforms, and devices.


  ## Features


  - Employee clock-in/out functionality

  - Time-off request management

  - Labor cost dashboards and wage requirement information

  - Compensatory time tracking

  - Geofencing capabilities

  - Integration with hundreds of payroll systems and HR platforms

  - Manager dashboards for workforce insights

  - Scalable for small businesses


  ## Pricing


  Pricing is not listed publicly on the website. Customers need to contact the
  sales team for a custom price quote.


  ## Ideal Users


  Companies of all sizes, particularly small businesses, seeking time and
  attendance software with compensatory time tracking and geofencing
  capabilities.
