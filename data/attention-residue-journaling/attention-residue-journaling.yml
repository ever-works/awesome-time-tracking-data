name: Attention Residue Journaling
description: Practice of writing down open loops and incomplete thoughts when
  transitioning between tasks to clear attention residue. Brief documentation
  externalizes mental load, allowing full attention shift to new task.
  Particularly effective for capturing unfinished work before meetings or end of
  day.
source_url: https://www.sophieleroy.com/attention-residue
category: Time Management Practice
tags:
  - attention
  - transitions
  - journaling
  - cognitive-load
markdown: >-
  ## Overview


  Attention Residue Journaling clears mental carry-over between tasks through
  brief written capture.


  ## The Problem


  When switching tasks, part of attention remains on previous work (attention
  residue), reducing performance on new task.


  ## The Solution


  ### Before Task Switch

  1. Pause current work

  2. Write down current status

  3. Note open loops

  4. Capture next steps

  5. Close notebook/file

  6. Begin new task


  ## What to Capture


  - Where you left off

  - Next action when returning

  - Open questions

  - Ideas that emerged

  - Decisions needed


  ## Benefits


  - Clears mental space

  - Enables full attention shift

  - Provides return-to-work roadmap

  - Reduces anxiety about forgetting

  - Improves task performance


  ## Pricing


  Free practice, just needs notebook.
