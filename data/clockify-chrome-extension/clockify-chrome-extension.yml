markdown: >-
  ## Overview


  Clockify's Chrome time tracker extension, recently updated on March 6, 2026,
  allows users to track time spent on projects with just one click and
  integrates with 50+ web applications.


  ## Features


  ### Time Tracking

  - **One-Click Tracking**: Start tracking with a single click from the browser
  toolbar

  - **50+ Integrations**: Track time directly from Asana, Trello, Jira, Todoist,
  and more

  - **Manual Entry**: Add time entries manually when needed

  - **Edit Entries**: Modify time entries directly in the extension

  - **Continue Timer**: Quickly restart your last timer


  ### Productivity Tools

  - **Pomodoro Timer**: Built-in Pomodoro technique support for focus sessions

  - **Idle Detection**: Automatically detects when you're away and prompts
  action

  - **Reminders**: Set reminders to track time during work hours

  - **Auto Start/Stop**: Automatically start and stop timer based on rules


  ### Organization

  - **Project Selection**: Choose from your Clockify projects

  - **Task Assignment**: Assign time to specific tasks

  - **Tags**: Categorize time with custom tags

  - **Billable Toggle**: Mark time as billable or non-billable

  - **Description**: Add notes to time entries


  ### Synchronization

  - **Real-Time Sync**: All entries sync instantly across devices

  - **Cross-Platform**: Works with Clockify web, desktop, and mobile apps

  - **Offline Mode**: Continue tracking without internet connection


  ## Supported Integrations (50+)


  - Asana

  - Trello

  - Jira

  - GitHub

  - GitLab

  - Todoist

  - Google Calendar

  - Gmail

  - Notion

  - Monday.com

  - ClickUp

  - And 40+ more


  ## Recent Updates (March 2026)


  - Performance improvements

  - Enhanced integration stability

  - Updated user interface

  - New integration support


  ## Benefits


  - **Completely Free**: No cost for unlimited users

  - **No Training Required**: Intuitive interface

  - **Always Accessible**: Track from any web page

  - **Lightweight**: Minimal browser performance impact


  ## Use Cases


  - Freelancers tracking billable hours

  - Remote workers logging project time

  - Teams needing time accountability

  - Anyone wanting frictionless time tracking


  ## Compatibility


  - Google Chrome

  - Chromium-based browsers (Edge, Brave, Opera)

  - Firefox (separate extension)


  ## Pricing


  Completely free forever for unlimited users and projects. Premium features
  available in Clockify paid plans but extension remains free.
