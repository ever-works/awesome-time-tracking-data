markdown: >-
  ## Overview


  Timeneye is a straightforward time tracking solution designed for teams who
  want visibility into time allocation without complex features. Emphasizes
  calendar-based tracking and collaborative transparency.


  ## Features


  - Calendar view of time entries

  - Smart suggestions for untracked time

  - Team time tracking and visibility

  - Project time budgets

  - Billable hours management

  - Chrome extension for quick tracking

  - Integrations with Jira, Asana, Trello, GitHub


  ## Calendar Approach


  Unique calendar-centric interface makes it easy to visualize how time was
  spent across days and weeks.


  ## Pricing


  Free plan for up to 3 users. Paid plans start at €6/user/month with advanced
  features.
