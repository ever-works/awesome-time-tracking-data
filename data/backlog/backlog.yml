markdown: >-
  ## Overview


  Backlog is a comprehensive project management platform developed by Nulab that
  brings together issue tracking, Git/SVN version control, wikis, and time
  tracking in one unified tool designed for software development teams.


  ## Features


  - **Issue Tracking**: Create and manage tasks, bugs, and feature requests with
  custom fields and workflows

  - **Version Control**: Built-in Git and SVN repositories with code review and
  pull requests

  - **Time Tracking**: Log actual hours on issues and tasks to track project
  progress and team capacity

  - **Gantt Charts**: Visualize project timelines and dependencies with
  interactive Gantt charts

  - **Burndown Charts**: Track sprint and release progress with burndown and
  burnup charts

  - **Wikis**: Create project documentation with built-in wiki functionality

  - **File Sharing**: Share and version files directly within projects

  - **Notifications**: Customizable notifications for updates, comments, and
  changes

  - **Mobile Apps**: iOS and Android apps for tracking time and updating issues
  on the go


  ## Pricing


  Free plan available for 10 users with 100MB storage. Paid plans start at $35
  per month for 30 users with increased storage and advanced features like
  subtasking and custom fields.
