markdown: >-
  ## Overview


  Getting Things Done (GTD) is a productivity methodology created by David Allen
  that uses a five-step process to capture, clarify, organize, reflect, and
  engage with tasks. The system emphasizes using external systems to free mental
  capacity and reduce stress.


  ## The Five Steps


  1. **Capture**: Collect everything that has your attention in an inbox

  2. **Clarify**: Process what each item means and what to do about it

  3. **Organize**: Put items in appropriate categories and lists

  4. **Reflect**: Review your system regularly to stay current

  5. **Engage**: Use your system to make informed decisions about what to do


  ## Core Principles


  - **Mind Like Water**: Achieve a clear, calm state by getting thoughts out of
  your head

  - **Two-Minute Rule**: If something takes less than 2 minutes, do it
  immediately

  - **Next Actions**: Define concrete next steps for every project

  - **Contexts**: Organize tasks by location or tool required (@computer,
  @phone, @errands)

  - **Weekly Review**: Regular review to keep system current and trustworthy


  ## Key Lists


  - **Inbox**: Capture bucket for everything new

  - **Next Actions**: Specific, concrete next steps

  - **Projects**: Anything requiring more than one action

  - **Waiting For**: Items delegated or awaiting response

  - **Someday/Maybe**: Ideas for future consideration

  - **Calendar**: Time-specific and day-specific items only


  ## Processing Workflow


  When clarifying items from inbox:

  - Is it actionable? If no → Trash, Someday/Maybe, or Reference

  - If yes → What's the next action?

  - Will it take < 2 minutes? If yes → Do it now

  - If no → Delegate it or Defer it to Next Actions list

  - Is it part of a project? Add to Projects list


  ## Benefits


  - **Reduced Mental Stress**: External system removes burden of remembering

  - **Increased Productivity**: Clear next actions eliminate decision paralysis

  - **Better Focus**: Work from trusted system rather than reactive mode

  - **Improved Reliability**: Nothing falls through cracks with complete capture

  - **Enhanced Perspective**: Regular reviews maintain high-level awareness


  ## Weekly Review


  The cornerstone of GTD - a regular review to:

  - Collect and process loose papers and materials

  - Review previous week's calendar

  - Review upcoming calendar

  - Review Next Actions lists

  - Review Projects list

  - Review Waiting For list

  - Review Someday/Maybe list


  ## Digital Tools for GTD


  - Dedicated GTD apps: OmniFocus, Nirvana, FacileThings

  - General tools adapted for GTD: Todoist, Things, Notion, Asana

  - Traditional tools: Paper notebook, filing system


  ## Time Blocking Integration


  While GTD focuses on capturing and organizing, it can be combined with time
  blocking:

  - Use GTD to decide WHAT to do

  - Use time blocking to decide WHEN to do it

  - Schedule time for Weekly Reviews

  - Block time for deep work on key projects


  ## Best For


  - Knowledge workers with diverse responsibilities

  - People feeling overwhelmed by commitments

  - Those who want comprehensive life management system

  - Anyone juggling multiple projects and roles


  ## Not Ideal For


  - Single-focus work (e.g., production line work)

  - Those preferring simpler systems

  - People who resist regular reviews


  ## Common Pitfalls


  - Skipping weekly reviews (system becomes stale)

  - Making lists too complex

  - Not defining true next actions

  - Trying to implement everything at once

  - Using calendar for task lists


  ## Getting Started


  1. Read "Getting Things Done" book by David Allen

  2. Do a complete brain dump of everything on your mind

  3. Process your inbox completely

  4. Set up your lists and filing system

  5. Schedule your first Weekly Review

  6. Start small and build the habit
