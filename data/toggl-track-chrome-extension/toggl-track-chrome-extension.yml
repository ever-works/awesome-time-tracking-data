markdown: >-
  ## Overview


  Toggl Track's Chrome extension is recognized as the easiest browser extension
  to install, use, and integrate with existing tools, bringing time tracking
  directly into over 100 popular web applications.


  ## Features


  ### Seamless Integration

  - **100+ App Integrations**: Track time directly from Asana, Basecamp, Google
  Docs, Trello, Jira, GitHub, and more

  - **One-Click Timers**: Start tracking with a single click from any integrated
  app

  - **Automatic Detection**: Extension detects project management tools and adds
  timer buttons

  - **No Tab Switching**: Track time without leaving your current workspace


  ### Time Tracking Features

  - **Pomodoro Timer**: Built-in Pomodoro functionality for focus sessions

  - **Break Notifications**: Configurable reminders for when to take breaks

  - **Idle Detection**: Detects when you're away and prompts to discard idle
  time

  - **Manual Entry**: Add time entries manually when needed

  - **Continue Recent**: Quickly restart recently used timers


  ### Productivity Tools

  - **Work Hour Reminders**: Notifications during configured work hours to track
  time

  - **Weekly Reports**: View time summaries directly in the extension

  - **Project Organization**: Organize time by projects, clients, and tags

  - **Billable Toggle**: Mark time entries as billable or non-billable


  ### Synchronization

  - **Real-Time Sync**: All entries sync instantly across devices

  - **Cross-Platform**: Works with Toggl Track web, desktop, and mobile apps

  - **Offline Support**: Continue tracking even when disconnected


  ## Supported Platforms


  - Chrome

  - Firefox

  - Edge (Chromium-based)

  - Opera


  ## Popular Integrations


  - Asana

  - Trello

  - Jira

  - GitHub

  - Google Docs

  - Notion

  - ClickUp

  - Monday.com

  - Basecamp

  - And 90+ more


  ## Pricing


  Free with Toggl Track account (free plan available, paid plans for teams and
  advanced features).
