markdown: >-
  ## The Hyper-Scheduler Concept


  Sorted³ coined the term "Hyper-Scheduler" to describe its unified approach to
  time management. Rather than keeping tasks, calendar events, and notes
  separate, Sorted³ combines everything into a single timeline view where you
  can hyper-schedule your entire day.


  ## Key Features


  ### Unified Timeline

  - Tasks and calendar events in one view

  - Notes integrated directly with scheduled items

  - Seamless movement between different types of content

  - Visual representation of your entire day


  ### Auto-Scheduling

  - Sorted3 automatically schedules tasks around calendar events

  - Avoids conflicts with existing commitments

  - Suggests optimal times based on availability

  - Adapts to changes in your calendar


  ### Cross-Platform Sync

  - iOS app

  - macOS app

  - iCloud sync keeps everything in sync

  - Designed specifically for Apple ecosystem


  ## Recent Change: Free Forever


  Sorted³ recently transitioned to a free-forever model:

  - Core features available at no cost

  - Optional PRO upgrade for advanced features

  - PRO pricing: $14.99 (iOS) / $24.99 (macOS)


  ## PRO Features


  - Auto-schedule functionality

  - iCloud sync across devices

  - File attachments

  - Automatic backup

  - Additional customization options


  ## Target Users


  Best suited for:

  - Apple ecosystem users (iOS/macOS only)

  - People who want tasks and calendar unified

  - Users seeking visual time management

  - Those who prefer integrated note-taking


  ## Unique Positioning


  The "Hyper-Scheduler" branding differentiates Sorted³ from:

  - Traditional calendars (event-focused)

  - Task managers (no calendar integration)

  - Time blockers (separate from calendar)


  Sorted³ positions itself as going beyond all three categories by deeply
  integrating tasks, events, notes, and scheduling into one interface.
