markdown: >-
  ## Overview


  The 3-Task Rule is a daily planning and prioritization technique that involves
  identifying and committing to completing only three critical tasks each day.
  By limiting the number of daily priorities, the method creates focus and
  prevents the paralysis that can come from overly long to-do lists.


  ## How It Works


  - At the start of each day (or the night before), identify the three most
  important tasks that will have the greatest impact

  - These tasks should be specific and actionable, not vague goals

  - Focus on completing these three tasks before taking on anything else

  - If completed, additional tasks can be tackled, but the three remain the core
  priority


  ## Benefits


  - Forces prioritization and strategic thinking about daily work

  - Reduces cognitive load and decision fatigue

  - Creates a sense of accomplishment when all three tasks are completed

  - Prevents spreading effort too thinly across too many activities


  ## Relation to Other Methods


  The 3-Task Rule is a simplification of the 1-3-5 Rule (one big task, three
  medium tasks, five small tasks). It is complementary to concepts like The One
  Thing and the 90/90/1 Rule, all of which emphasize narrowing focus to a small
  number of high-impact activities.
