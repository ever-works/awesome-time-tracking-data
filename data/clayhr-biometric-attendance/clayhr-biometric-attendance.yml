markdown: >-
  ## Overview


  ClayHR is a comprehensive cloud-based HR management system that includes a
  biometric time and attendance module. The platform allows employees to clock
  in and out using mobile facial recognition or fingerprint scanning, with all
  attendance data automatically flowing into payroll and HR records.


  ## Features


  - **Mobile Biometric Clock-In**: Employees use facial recognition or
  fingerprint on their smartphones

  - **GPS Location Tracking**: Capture employee location with each clock event

  - **Geofencing**: Restrict clock-ins to specific geographic areas

  - **Photo Capture**: Take photos with each punch for verification

  - **QR Code Clock-In**: Scan QR codes at work locations as alternative to
  biometrics

  - **Web-Based Attendance**: Clock in/out from desktop browsers

  - **Real-Time Attendance Dashboard**: Managers see who's in, out, or late in
  real-time

  - **Automatic Timesheet Generation**: Clock events automatically create
  timesheets

  - **Shift Management**: Create and assign shifts with clock-in restrictions

  - **Overtime Calculation**: Automatic overtime tracking based on company
  policies

  - **Leave Integration**: PTO and leave requests integrated with attendance

  - **Notifications and Alerts**: Alerts for late arrivals, early departures,
  and missing punches

  - **Payroll Integration**: Seamless export to payroll systems

  - **Reporting**: Attendance reports, tardiness analysis, and labor cost
  tracking

  - **HR Module Integration**: Part of complete HRIS with onboarding,
  performance, and benefits


  ## Mobile App Features


  - Offline clock-in capability with sync when connected

  - Face recognition with liveness detection

  - Fingerprint authentication using device biometrics

  - GPS and WiFi-based location verification

  - Self-service access to schedules, timesheets, and pay stubs


  ## Industries Served


  ClayHR serves retail, hospitality, manufacturing, healthcare, field services,
  and any industry needing mobile workforce attendance tracking.


  ## Pricing


  ClayHR offers tiered pricing based on modules and user count. Biometric
  attendance is included in standard HR plans. Contact ClayHR for custom pricing
  based on organization size and feature requirements.
