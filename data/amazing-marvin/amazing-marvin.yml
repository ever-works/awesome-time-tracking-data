markdown: >-
  ## Overview


  Amazing Marvin is a personal productivity tool designed to reduce
  procrastination, minimize stress, and increase productivity by helping you
  build the perfect task management system tailored to your individual needs.


  ## ADHD-Specific Design


  Built specifically for ADHD minds with features that work with your brain, not
  against it. The ADHD community is enthusiastic about the app, with users
  calling it "hands down the best to-do app for ADHD."


  ## Customization


  - **300+ Customization Options**: Extensive configuration possibilities to
  create your perfect system

  - **Strategies Library**: Suite of optional features that can be turned on or
  off to combine multiple methodologies

  - **Flexible Approach**: Mix and match strategies to find what works best for
  your brain


  ## Features


  - **Built-in Pomodoro Timers**: Customizable work and break intervals

  - **Procrastination Wizard**: Tool designed to break through resistance and
  get started on tasks

  - **Color Coding**: Visual organization to quickly identify task types and
  priorities

  - **Gamification**: Game-like elements to maintain motivation

  - **Time Estimates**: Ability to estimate and track time for tasks

  - **Recurring Tasks**: Automated task repetition for routines

  - **Work Sessions**: Structured time blocks for focused work

  - **Time Tracking**: Built-in time tracking capabilities


  ## Platform Availability


  Available on desktop (Mac, Windows, Linux) and mobile (iOS, Android).


  ## Who It's For


  Excels as an individual productivity tool, particularly for ADHD users,
  offering a personalized and powerful solution for task management.
