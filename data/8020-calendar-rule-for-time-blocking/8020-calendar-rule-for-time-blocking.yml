name: 80/20 Calendar Rule for Time Blocking
description: Time blocking guideline suggesting only 80% of calendar should be
  scheduled, leaving 20% buffer for unexpected tasks, emergencies, and recovery.
  Prevents over-optimization and maintains scheduling flexibility.
