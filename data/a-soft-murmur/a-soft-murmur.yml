markdown: >-
  ## Overview


  A Soft Murmur mixes ambient sounds together to wash away distraction and help
  you focus or relax. It's an online background noise generator designed with a
  minimalist interface to help you tune out unpleasant sounds from your
  environment.


  ## Features


  ### Sound Library

  - **10 Core Sounds**: Rainfall, thunder, waves, wind, fire, birds, crickets,
  coffee shop, white noise, and pink noise

  - **Premium Sounds**: Six additional sounds available via in-app purchase

  - **Individual Volume Control**: Adjust each sound independently for perfect
  balance

  - **Sound Mixing**: Combine multiple sounds to create custom atmospheres


  ### Timer Functions

  - **Stop Playing Timer**: Automatically stops audio after a set time—perfect
  for drifting to sleep

  - **Start Playing Timer**: Begins audio after a delay, ideal for waking up to
  ambient sounds

  - **Fade Effect**: Gradually reduces volume over your chosen duration for
  gentle transitions


  ### Intelligent Features

  - **Random Mixes**: Intelligently selects 3-5 sounds with varied volumes to
  create balanced, listenable combinations

  - **Shareable Links**: Each shared link contains your exact sound selection
  and volume levels

  - **Cross-Platform**: Works on all modern browsers (Chrome, Firefox, Safari,
  Edge)


  ## Platform Availability


  - **Web**: Free browser-based usage at asoftmurmur.com

  - **iOS**: Available on the App Store

  - **Android**: Available on Google Play

  - **Chrome Extension**: Available for browser integration


  ## Use Cases


  - **Focus**: Block out office noise and maintain concentration

  - **Relaxation**: Create calming environments for stress reduction

  - **Sleep Aid**: Drift off to customized ambient soundscapes

  - **Reading**: Enhance reading experience with subtle background sounds

  - **Study**: Maintain focus during study sessions


  ## Design Philosophy


  A Soft Murmur emphasizes simplicity and usability with a clean, minimalist
  interface that doesn't distract from its core purpose: helping users create
  the perfect ambient environment for their needs.


  ## Pricing


  Free web-based usage with optional in-app purchases for additional premium
  sounds on mobile applications.
