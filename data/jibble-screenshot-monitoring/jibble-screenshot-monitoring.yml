markdown: >-
  ## Overview


  Jibble Screenshot Monitoring is a free employee screenshot monitoring feature
  that integrates with Jibble's time tracking platform. The solution emphasizes
  employee privacy with features like screenshot blurring and employee deletion
  rights while still providing productivity insights.


  ## Features


  - **100% Free**: Screenshot monitoring included at no cost

  - **Automatic Capture**: Screenshots taken at configurable intervals

  - **Blur Options**: Ability to blur screenshots to protect sensitive
  information

  - **Employee Deletion Rights**: Employees can delete screenshots they're
  uncomfortable with

  - **Privacy Controls**: Flexible settings for teams or individuals

  - **Activity Tracking**: Monitor active vs. idle time

  - **Time Integration**: Screenshots linked to time tracking data

  - **Team or Individual Settings**: Turn screenshots on or off per team or
  person


  ## Use Cases


  - Small businesses wanting free monitoring solutions

  - Teams managing remote workers on a budget

  - Organizations prioritizing employee privacy

  - Companies wanting optional monitoring features


  ## Privacy-First Approach


  Jibble's screenshot monitoring is designed with privacy in mind:

  - Employees control what screenshots are kept

  - Blur options protect sensitive information

  - Transparent about monitoring practices

  - Configurable to respect employee privacy


  ## Pricing


  Completely free as part of Jibble's time tracking platform.
