name: Action Method
description: Productivity system created by Behance founder Scott Belsky that
  organizes projects into Action Steps, Backburner Items, and References.
  Emphasizes bias toward action by breaking everything into concrete next steps,
  ensuring projects move forward rather than remaining aspirational.
