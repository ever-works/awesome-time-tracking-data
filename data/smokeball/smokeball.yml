markdown: >-
  ## Overview


  Smokeball is a comprehensive legal practice management platform that includes
  automatic time tracking capabilities designed to capture more billable hours
  without manual timers. The software is built specifically for small to
  mid-size law firms and automatically tracks work across documents, emails, and
  phone calls.


  ## Features


  - **Automatic Time Tracking**: Tracks time automatically as you work on
  documents, emails, and calls

  - **Matter Management**: Centralized case management with document
  organization

  - **Document Automation**: Create legal documents with built-in templates and
  automation

  - **Billing & Invoicing**: Generate invoices based on automatically tracked
  time

  - **Email Integration**: Track time spent on emails within Outlook

  - **Calendar Management**: Manage appointments and court dates

  - **Task Management**: Create and assign tasks with deadline tracking

  - **Client Portal**: Secure portal for client communication and document
  sharing

  - **Reporting**: Track billable vs. non-billable time and firm productivity

  - **Mobile App**: Access matters and track time on mobile devices


  ## Key Benefits


  - Captures billable hours that would otherwise be lost

  - Eliminates manual time entry and timer management

  - Provides accurate records for billing and compliance

  - Improves overall firm profitability


  ## Pricing


  Smokeball offers tiered pricing based on firm size and features, with plans
  designed for solo practitioners through mid-size firms. Pricing details
  available upon request.
