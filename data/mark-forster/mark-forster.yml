markdown: >-
  ## Overview


  Mark Forster is a British author and time management expert known for
  developing innovative productivity systems that challenge conventional time
  management wisdom. His work emphasizes working with natural human tendencies
  rather than against them.


  ## Major Systems


  **Autofocus**: Task management through intuitive selection rather than rigid
  prioritization


  **Do It Tomorrow**: Closed list system where today's work is yesterday's
  planning


  **The Final Version**: His latest system emphasizing sustainable long-term
  productivity


  **DIT (Do It Tomorrow)**: A system based on working from closed lists and
  current initiative


  ## Philosophy


  Forster's approach differs from traditional time management by:

  - Trusting intuition over rigid prioritization systems

  - Working with procrastination rather than fighting it

  - Creating sustainable systems that don't require superhuman willpower

  - Focusing on what you can realistically accomplish

  - Emphasizing closed lists over never-ending backlogs


  ## Published Works


  - "Get Everything Done and Still Have Time to Play" (2000)

  - "Do It Tomorrow and Other Secrets of Time Management" (2006)

  - "Secrets of Productive People" (2015)


  ## Online Presence


  Forster maintains an active blog where he continuously refines his systems and
  responds to community feedback, creating an iterative approach to productivity
  methodology.


  ## Impact


  His systems have influenced thousands of knowledge workers seeking
  alternatives to traditional time management approaches that feel rigid or
  unsustainable.
