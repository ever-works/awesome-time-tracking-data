markdown: >-
  ## Formula Overview


  The Flowtime technique uses a simple proportional break formula: divide your
  focused work duration by 5 to determine the appropriate break length.


  ## Break Guidelines


  - **25 minutes of work** → 5-minute break

  - **50 minutes of work** → 8-10 minute break

  - **75 minutes of work** → 15-minute break

  - **90+ minutes of work** → 10-20 minute break


  ## Rationale


  The proportional approach:


  - **Rewards sustained focus** with longer breaks

  - **Adapts to task complexity** - harder tasks naturally get shorter focus
  sessions and proportionally shorter breaks

  - **Prevents burnout** by ensuring adequate recovery time

  - **Respects individual variation** in attention spans

  - **Supports flow states** by not interrupting arbitrarily


  ## Comparison to Pomodoro


  Unlike Pomodoro's fixed 25/5 ratio:


  - Flowtime allows variable work durations

  - Break length scales with effort invested

  - No forced interruptions during peak focus

  - More flexible for different task types


  ## Implementation Tips


  - Track your focus duration honestly

  - Take the full calculated break - don't skip it

  - Use break time for genuine recovery (movement, hydration, rest)

  - Adjust the formula (e.g., divide by 4 instead of 5) if breaks feel too short


  ## Emerging Popularity


  The formula gained traction in 2026 as alternatives to rigid time management
  gained acceptance, particularly among knowledge workers seeking more
  sustainable productivity approaches.
