markdown: >-
  ## Overview


  Time tracking widgets keep timer controls accessible at all times, reducing
  friction in time entry and increasing tracking accuracy by making it trivial
  to start/stop timers.


  ## Common Widget Types


  ### System Tray Icon (Windows)

  - Lives in taskbar notification area

  - Right-click for quick actions

  - Shows running timer duration

  - Green/red indicator for active/inactive


  ### Menu Bar Widget (Mac)

  - Appears in macOS menu bar

  - Click to see recent timers

  - Start timer from dropdown

  - Always visible


  ### Desktop Widget

  - Floating on desktop

  - Draggable to preferred position

  - Larger, more detailed than tray icons

  - Can show multiple timers


  ### Browser Extension Badge

  - Icon in browser toolbar

  - Badge shows running timer

  - Click to manage timers

  - Works across browser tabs


  ## Key Features


  - One-click timer start

  - Quick project/task selection

  - Recent entries dropdown

  - Keyboard shortcuts

  - Visual timer duration

  - Pause/resume controls

  - Mini reports

  - Idle time detection


  ## Benefits


  - **Always Accessible**: No app switching needed

  - **Visual Reminder**: See running timer, less likely to forget

  - **Faster Entry**: Start timer in 2 seconds vs. 30 seconds

  - **Better Data**: Lower friction = more consistent tracking

  - **Multi-tasking**: Visible across all applications


  ## Examples


  - **Toggl Track**: macOS menu bar + Windows tray

  - **Clockify**: Browser extension badge

  - **RescueTime**: Desktop widget with productivity scores

  - **Timely**: Minimalist menu bar timer

  - **Hours**: macOS menu bar with recent entries


  ## Design Best Practices


  - Minimal visual footprint

  - Clear active/inactive states

  - One-click common actions

  - Recent entries for quick restart

  - Keyboard shortcut support

  - Unobtrusive notifications
