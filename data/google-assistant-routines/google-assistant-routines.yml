name: Google Assistant Routines
description: Automation feature allowing users to create personal routines
  triggered by voice commands like 'Hey Google, good morning.' Can turn on smart
  lights, report weather, list calendar events, play news, and more—automate
  entire morning or evening sequences hands-free.
