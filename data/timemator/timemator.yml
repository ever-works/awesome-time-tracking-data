markdown: >-
  ## Overview


  Timemator is an automatic time tracking application specifically designed for
  freelancers working on Mac and iPhone. The app automatically captures all
  activities on your Mac, making it easy to review work and assign time to
  projects retroactively.


  ## Key Features


  - **Automatic Activity Capture**: Timemator automatically captures everything
  you do on your Mac without manual timer management

  - **Retroactive Time Assignment**: Review captured activities and assign time
  to projects with just a few clicks

  - **Native Mac & iPhone Apps**: Built specifically for Apple platforms with
  seamless synchronization

  - **Privacy-Focused**: Data stays on your devices with optional iCloud sync

  - **Invoicing Support**: Generate invoices based on tracked time


  ## How It Works


  Timemator runs in the background and automatically records all applications,
  websites, and documents you work with. When you're ready to create timesheets,
  you can review the captured data and quickly assign activities to the
  appropriate client projects.


  ## Platform


  Available for macOS and iOS with data synchronization via iCloud.


  ## Pricing


  Subscription-based pricing model for full access to automatic tracking
  features.
