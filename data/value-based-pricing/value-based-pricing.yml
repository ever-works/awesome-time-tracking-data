name: Value-Based Pricing
description: A pricing strategy that charges based on the perceived value
  delivered to clients rather than time spent or costs incurred. This approach
  focuses on outcomes and business impact, allowing service providers to capture
  more value while aligning incentives with client success. Increasingly adopted
  by consultancies, agencies, and professional services firms.
