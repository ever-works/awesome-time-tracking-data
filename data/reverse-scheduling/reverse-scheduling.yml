name: Reverse Scheduling
description: Planning method that works backward from deadlines or goals,
  determining required milestones and start dates to ensure timely completion of
  complex projects.
source_url: https://www.atlassian.com/blog/productivity/time-management-strategies
category: Practices
tags:
