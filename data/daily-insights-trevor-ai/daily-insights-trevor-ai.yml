markdown: >-
  ## What Are Daily Insights?


  Trevor AI's Daily Insights feature provides users with a personalized morning
  briefing that combines progress tracking, pattern recognition, and actionable
  coaching.


  ## Components of Daily Insights


  ### Progress Review

  - Tasks completed yesterday

  - Goals achieved vs. planned

  - Time spent on different activities

  - Overdue items requiring attention


  ### Personalized Insights

  - Productivity patterns identified

  - Optimal scheduling recommendations

  - Time estimation accuracy feedback

  - Energy level trends


  ### AI-Powered Coaching

  - Specific suggestions for improvement

  - Encouragement and motivation

  - Adjustments to planning strategies

  - Tips based on individual patterns


  ## How It Helps Users Improve


  ### Self-Awareness

  - See actual time usage vs. perceptions

  - Identify recurring obstacles

  - Recognize productivity peaks and valleys


  ### Behavioral Change

  - Gentle accountability

  - Positive reinforcement for progress

  - Specific, actionable recommendations

  - Track improvement over time


  ### Better Planning

  - Learn from past scheduling mistakes

  - Adjust task duration estimates

  - Optimize daily structure

  - Set more realistic goals


  ## Example Insights


  - "You tend to underestimate design tasks by 30%. Consider adding buffer
  time."

  - "Your productivity peaks between 9-11am. Schedule important work then."

  - "You've completed 85% of planned tasks this week—great progress!"

  - "Tasks without specific time blocks are 60% less likely to get done."
