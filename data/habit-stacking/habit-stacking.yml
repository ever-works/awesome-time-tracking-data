markdown: >-
  ## Overview


  Habit stacking is a special form of implementation intention coined by James
  Clear in his bestselling book "Atomic Habits: An Easy and Proven Way to Build
  Good Habits and Break Bad Ones."


  ## The Formula


  **After/Before [CURRENT HABIT], I will [NEW HABIT]**


  ## Examples


  - After I pour my cup of coffee each morning, I will meditate for one minute

  - After I take off my work shoes, I will immediately change into my workout
  clothes

  - After I sit down to dinner, I will say one thing I'm grateful for that
  happened today


  ## Why It Works


  - **Leverages Existing Habits**: Current habits are already built into your
  brain

  - **Stronger Cues**: Tightly bound new habits to specific cues

  - **Automatic Triggers**: Notice when the time comes to act

  - **No Extra Time**: Doesn't require finding additional time in schedule

  - **Compound Effect**: Small habits stack into significant changes


  ## Time Management Connection


  Building new habits doesn't have to take more time, it requires thinking about
  existing time differently. The technique allows you to leverage existing
  routines rather than finding additional time.


  ## Implementation Tips


  - Choose very specific current habits as anchors

  - Make new habits small and achievable

  - Stack multiple habits in sequence

  - Be consistent with the timing

  - Track your habit stacks
