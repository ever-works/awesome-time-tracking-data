markdown: >-
  ## Overview


  Digital Wellbeing is Google's built-in Android feature offering free, powerful
  screen time tracking and blocking features to help users develop healthier
  relationships with technology.


  ## Features


  - **Screen Time Dashboard**: See how much time you spend on your phone and in
  apps

  - **App Timers**: Set daily limits for specific apps

  - **Focus Mode**: Pause distracting apps when you need to concentrate

  - **Bedtime Mode**: Automatically enable grayscale and Do Not Disturb at
  bedtime

  - **Notification Management**: Track and reduce notification interruptions

  - **Wind Down**: Gradual transition to bedtime mode

  - **Family Link Integration**: Monitor children's device usage

  - **Usage Insights**: Weekly reports on digital habits


  ## Time Management Benefits


  By understanding and controlling screen time, users can reclaim hours
  previously lost to mindless scrolling and make more intentional choices about
  digital time allocation.


  ## Availability


  Built into Android 9 and higher, available on all compatible devices.


  ## Pricing


  Completely free, included with Android.


  ## Similar Tools


  Apple's Screen Time offers similar functionality for iOS devices.
