markdown: >-
  ## Overview


  Ellen Faye is a certified productivity leadership coach who supports her
  clients in developing and integrating processes to lead effectively and
  efficiently.


  ## Areas of Expertise


  - **Productive Strategic Planning** - Helping leaders develop systematic
  approaches to strategic planning that maximize efficiency

  - **Board and Leadership Training** - Teaching leaders and boards how to
  increase productivity

  - **Time Management** - Specialized coaching for time management improvement

  - **Leadership Coaching** - Executive coaching for organizational and
  individual productivity


  ## Approach


  Faye integrates process development with leadership coaching, helping client
  organizations build sustainable productivity systems that can be maintained
  long-term by their team members.
