name: Jira Native Time Tracking
description: Built-in time tracking capabilities within Jira Software and Jira
  Work Management, enabling teams to log work, track original estimates, and
  monitor remaining time on issues.
source_url: https://www.atlassian.com/software/jira
category: Project Management
tags:
  - jira
  - agile
