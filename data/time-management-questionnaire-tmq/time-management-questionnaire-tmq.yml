markdown: >-
  ## Overview


  The Time Management Questionnaire (TMQ) is a survey instrument developed by
  Britton and Tesser (1991). It was the second most frequently used measurement
  tool in the systematic review, appearing in 25 empirical studies.


  ## Sub-scales


  The questionnaire consists of three dimensions:


  - **Short-range planning** (7 items) - e.g., "Do you set and honor
  priorities?"

  - **Long-range planning** (5 items) - e.g., "Do you have a set of goals for
  the entire quarter?"

  - **Time attitude** (6 items) - e.g., "Do you continue unprofitable routines
  or activities?"


  ## Psychometric Properties


  The TMQ has demonstrated strong internal consistency, with Cronbach's alpha
  values ranging from 0.75 to 0.88 across studies. The scale was used
  predominantly in higher education research settings.


  ## Research Usage


  The instrument was employed in 25 studies between 2006 and 2021, complementing
  the Time Management Behavior Scale (TMBS) as one of the two primary
  standardized measures in quantitative time management research.
