markdown: >-
  ## Overview


  Qbserve is a Mac-only automatic time tracking and productivity analysis
  application that monitors your computer activity without requiring manual
  input. All tracked data is stored locally on your Mac and never sent anywhere.


  ## Features


  - Automatic productivity analysis for over 8,100 sites, apps and games

  - Project tracking based on opened web pages, documents, and window titles

  - Individual logging of Slack teams and YouTube videos

  - Automatically determines billable time based on opened documents and web
  pages

  - Invoice items created automatically from recorded time

  - 18 invoice languages to choose from

  - Flexible billing settings to fit various needs

  - All data stored locally on your Mac for privacy


  ## Pricing


  No subscription required - one-time purchase model.
