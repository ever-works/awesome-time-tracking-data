markdown: >-
  ## Overview


  ExakTime provides time tracking and workforce management solutions designed
  specifically for construction and field service industries. Known for its
  rugged hardware time clocks and FaceVerify biometric technology.


  ## Hardware Time Clocks


  ### JobClock Hornet

  - Rugged, weather-resistant time clock for outdoor job sites

  - Solar-powered with rechargeable battery backup

  - Handles extreme temperatures and conditions

  - Supports up to 500 employees

  - FaceVerify facial recognition prevents buddy punching


  ### JobClock Toughbook

  - Tablet-based time clock with touchscreen

  - GPS-enabled for location verification

  - Camera for photo verification

  - Stores data offline, syncs when connected


  ## FaceVerify Technology


  - Biometric facial recognition for clock-in/out

  - Prevents buddy punching and time theft

  - Works in various lighting conditions

  - Fast recognition (under 2 seconds)

  - No physical contact required

  - Anti-spoofing protection


  ## Mobile App Features


  - GPS-tracked time entries

  - Geofencing capabilities

  - Photo capture at clock-in/out

  - Works offline

  - Push notifications for employees

  - iOS and Android support


  ## Time Tracking Capabilities


  ### Multi-Project Tracking

  - Track time across multiple job sites

  - Assign employees to specific cost codes

  - Phase and task-level tracking

  - Equipment time tracking


  ### Automated Timesheets

  - Real-time timesheet data

  - Automatic overtime calculations

  - Exception reporting for missing punches

  - Manager approval workflows


  ## GPS & Location Services


  - Verify employees are at assigned job sites

  - Track employee movement throughout the day

  - Geofencing alerts when employees enter/exit sites

  - Breadcrumb trails showing route history


  ## Certified Payroll Compliance


  - Davis-Bacon compliant reports

  - Prevailing wage calculations

  - Multi-classification wage rates

  - Digital signatures for compliance

  - Weekly certified payroll reports


  ## Integrations


  ### Accounting Software

  - QuickBooks (Desktop and Online)

  - Sage 100, 300, and Intacct

  - Foundation

  - Viewpoint

  - Jonas

  - ComputerEase


  ### Payroll Systems

  - ADP

  - Paychex

  - Gusto

  - And 80+ other payroll providers


  ## Job Costing


  - Real-time labor cost tracking by project

  - Compare budgeted vs actual labor costs

  - Identify cost overruns early

  - Profit and loss by project

  - Custom cost code structures


  ## Reporting


  - Over 25 pre-built report templates

  - Custom report builder

  - Scheduled automatic reports

  - Export to Excel, PDF, CSV

  - Real-time dashboard analytics


  ## Benefits


  - Reduce time theft by 75% with FaceVerify

  - Eliminate manual timesheets

  - Cut payroll processing time by 80%

  - Improve job costing accuracy

  - Ensure certified payroll compliance

  - Weather-proof hardware for harsh conditions


  ## Pricing


  Contact ExakTime for custom pricing based on company size and hardware needs.
  Typically includes hardware purchase plus monthly subscription per user.


  ## Industries


  - General contractors

  - Specialty contractors

  - Landscaping

  - Electrical

  - Plumbing

  - HVAC

  - Roofing

  - Concrete

  - Any outdoor/field service business
