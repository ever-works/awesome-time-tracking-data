markdown: >-
  ## Overview


  BeforeSunset AI uses artificial intelligence to create optimized daily
  schedules, analyzing your tasks, estimated durations, energy patterns, and
  existing calendar to suggest realistic time-blocked plans.


  ## AI Features


  - AI-powered task scheduling

  - Automatic time blocking

  - Smart task prioritization

  - Energy-aware scheduling

  - Realistic workload assessment

  - Calendar conflict detection


  ## Daily Planning


  - Morning planning ritual

  - Task import from various sources

  - Time estimation assistance

  - Priority-based scheduling

  - Buffer time inclusion

  - End-of-day review


  ## Time Blocking


  - Automatic calendar block creation

  - Visual timeline view

  - Drag-and-drop adjustments

  - Color-coded categories

  - Integration with Google Calendar


  ## Features


  - Task management

  - Time tracking

  - Analytics and insights

  - Pomodoro timer

  - Focus mode

  - Daily/weekly reviews


  ## Platform


  Web, mobile apps


  ## Pricing


  Free plan available

  Pro plan for advanced AI features


  ## Target Users


  Knowledge workers, professionals, anyone seeking AI-assisted daily planning
