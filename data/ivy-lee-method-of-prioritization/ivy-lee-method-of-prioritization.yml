name: Ivy Lee Method of Prioritization
description: A simple yet powerful productivity technique from 1918 where users
  write down six most important tasks each evening, prioritize them, and work
  through them sequentially the next day. Charles M. Schwab paid consultant Ivy
  Lee $25,000 (equivalent to $400,000 in 2015) after seeing dramatic
  productivity improvements from this deceptively simple method.
