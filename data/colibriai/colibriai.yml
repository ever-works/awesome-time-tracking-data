markdown: >-
  ## Overview


  Colibri.ai is a live transcription and AI note-taking app that records online
  calls across phone and web-conferencing platforms, transcribes them in real
  time, and generates AI meeting summaries and action items that can be easily
  reviewed and shared with teammates.


  ## Key Features


  ### Real-Time Transcription


  - Converts speech to text in real time

  - Provides closed captions of the meeting as you speak

  - Never miss a word during conversations

  - Over 95% transcription accuracy


  ### Voice-Activated Notes


  - Highlight important information during calls with one click

  - Simply say "Hey Colibri, take a note!" to capture key moments

  - Hands-free note-taking during conversations

  - Context-aware note capture


  ### AI-Generated Summaries


  - Instantly get AI-generated summary after each meeting

  - Automatic action item extraction

  - Quickly review what is important and actionable

  - Key takeaways and next steps automatically identified


  ## Platform Compatibility


  - Zoom

  - Google Meet

  - Cisco Webex

  - Phone systems

  - Web conferencing platforms

  - Chrome extension available


  ## Sales & Customer Service Features


  Unlike traditional conversation intelligence tools, Colibri transcribes calls
  in real time and can provide:

  - Just-in-time assistance during meetings

  - Real-time coaching for sales representatives

  - Live guidance for customer service teams

  - In-meeting performance support


  ## Target Users


  - Sales teams

  - Executives

  - Law firms

  - Remote teams

  - Frequent meeting attendees

  - Customer service representatives


  ## Meeting Intelligence


  ### Recording & Transcription

  - Records all calls automatically

  - Transcribes with over 95% accuracy

  - Real-time closed captioning

  - Searchable transcripts


  ### Summaries & Action Items

  - AI-generated meeting summaries

  - Action items automatically extracted

  - Key takeaways highlighted

  - Next steps clearly identified


  ## Collaboration Features


  - Easy sharing with teammates

  - Searchable meeting notes

  - Concise, actionable summaries

  - Team collaboration on notes and action items


  ## Use Cases


  ### Sales Teams

  - Real-time coaching during sales calls

  - Performance improvement support

  - Deal documentation

  - Best practice sharing


  ### Legal Professionals

  - Accurate meeting transcription

  - Client conversation documentation

  - Compliance and record-keeping

  - Billable time tracking


  ### Remote Teams

  - Asynchronous communication support

  - Meeting documentation for distributed teams

  - Timezone-friendly collaboration

  - Knowledge sharing


  ### Customer Service

  - Live assistance during customer interactions

  - Quality assurance

  - Training and coaching

  - Issue resolution documentation


  ## Benefits


  - Save time on note-taking

  - Improve meeting retention

  - Enable just-in-time coaching

  - Enhance team collaboration

  - Better meeting outcomes

  - Improved sales and service performance
