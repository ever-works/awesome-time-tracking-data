markdown: >-
  ## Overview


  Allied Time USA specializes in biometric time and attendance systems, offering
  a comprehensive range of time clocks from basic punch card systems to advanced
  facial recognition terminals. Their solutions help businesses of all sizes
  automate attendance tracking and payroll processing.


  ## Features


  - Multiple biometric options (fingerprint, facial recognition, iris scan)

  - Badge and proximity card readers

  - Cloud-based time and attendance software

  - Real-time attendance monitoring

  - Automated overtime calculation

  - Department transfer tracking

  - Job costing capabilities

  - Integration with major payroll providers

  - Mobile punch options

  - GPS location verification

  - Scheduled and ad-hoc reporting

  - Employee self-service portal


  ## Pricing


  Allied Time offers time clock hardware ranging from budget-friendly basic
  models to premium biometric terminals. Software is available as a one-time
  purchase or monthly subscription. Contact Allied Time for product
  recommendations and pricing based on your business size and requirements.
