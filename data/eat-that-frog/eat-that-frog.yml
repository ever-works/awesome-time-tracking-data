markdown: >-
  ## Overview


  Eat That Frog! by Brian Tracy is one of the most popular time management and
  productivity books, with over 3 million copies sold worldwide. The title comes
  from a Mark Twain quote: "If it's your job to eat a frog, it's best to do it
  first thing in the morning."


  ## Core Philosophy


  The book's central principle is that your "frog" is your biggest, most
  important task—the one you're most likely to procrastinate on. By completing
  this task first, you:


  - Start the day with a sense of accomplishment

  - Remove the mental burden of procrastination

  - Build momentum for the rest of the day

  - Ensure your most important work gets done


  ## Key Techniques


  ### The ABCDE Method


  - **A Tasks**: Must do - serious consequences if not done

  - **B Tasks**: Should do - mild consequences

  - **C Tasks**: Nice to do - no consequences

  - **D Tasks**: Delegate

  - **E Tasks**: Eliminate


  ### Additional Principles


  - Apply the 80/20 Rule to identify high-value tasks

  - Use the ABCDE method to prioritize

  - Focus on key result areas

  - Practice creative procrastination (deliberately decide not to do low-value
  tasks)

  - Use the "salami slice" and "Swiss cheese" methods to break down large tasks


  ## Impact on Time Management


  The book provides 21 practical methods for overcoming procrastination and
  getting more done in less time. It emphasizes that successful people develop
  the habit of doing things failures don't like to do.


  ## Pricing


  The book is widely available in paperback, hardcover, audio, and ebook formats
  at various price points.
