markdown: >-
  ## Overview


  monday.com is a Work OS (Operating System) that integrates time tracking
  natively with visual dashboards showing task progress. Its Pro plan offers
  built-in time tracking that lets you log work directly on tasks and projects.


  ## Features


  - **Native Time Tracking**: Built-in time tracking available on Pro plan and
  above

  - **Visual Dashboards**: Colorful, customizable boards with multiple view
  options

  - **Time Columns**: Add time tracking columns to any board to log hours per
  task

  - **Automation**: Create custom automations to streamline workflows

  - **Workload View**: Visualize team capacity and balance workloads

  - **Gantt Charts**: Plan projects with timeline and dependency visualization

  - **Integrations**: Connect with popular tools like Slack, Zoom, Google Drive

  - **Mobile Apps**: Manage work and track time from iOS and Android devices


  ## Pricing


  monday.com offers a free plan for up to 2 users. Paid plans start at $9 per
  user per month (Basic), with time tracking available starting at $12 per user
  per month (Standard) and full features on Pro plan at $19 per user per month.
