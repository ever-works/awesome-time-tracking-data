markdown: >-
  ## Overview


  Kimai is a professional-grade, open-source time tracking application that can
  be self-hosted or used as a SaaS solution. It's designed to handle diverse use
  cases from individual freelancers to companies with dozens or hundreds of
  users, offering enterprise features without enterprise costs.


  ## Key Features


  - **Open source** - Free and open-source software with full access to source
  code

  - **Self-hosting option** - Deploy on your own infrastructure for complete
  data control

  - **Multi-user support** - Handles from single users to hundreds of team
  members

  - **JSON API** - RESTful API for integrations and custom applications

  - **Invoicing** - Generate professional invoices based on tracked time

  - **Data exports** - Export time data in multiple formats for reporting and
  analysis

  - **Multi-language** - Available in over 30 languages with complete
  translations

  - **Project management** - Organize time tracking by projects, customers, and
  activities

  - **Reporting** - Comprehensive reports for time analysis and billing

  - **User permissions** - Granular role-based access control

  - **Customization** - Highly customizable to fit specific workflow
  requirements


  ## Deployment Options


  - **Self-hosted** - Install on your own servers for complete control and
  privacy

  - **SaaS** - Cloud-hosted option for teams that prefer managed infrastructure


  ## Use Cases


  - Freelancers tracking client work independently

  - Small businesses needing affordable time tracking

  - Enterprises requiring self-hosted solutions for data sovereignty

  - Organizations with specific compliance or privacy requirements

  - Development teams wanting to customize their time tracking tool


  ## Technical Details


  - Built with modern web technologies

  - Active open-source community and regular updates

  - Extensive documentation for installation and customization

  - Plugin system for extending functionality


  ## Pricing


  - **Open Source**: Free to download and self-host

  - **SaaS**: Paid plans available for cloud-hosted instances


  Kimai is described as the #1 open-source time tracking application, making it
  ideal for organizations that value data ownership, customization, and the
  transparency of open-source software.
