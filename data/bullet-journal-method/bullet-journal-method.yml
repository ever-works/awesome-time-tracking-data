markdown: >-
  ## Overview


  The Bullet Journal method is a system combining mindfulness, productivity, and
  self-discovery, centered on the key idea of intentionality. Created by Ryder
  Carroll to help manage his ADHD, it provides a flexible framework for
  capturing and organizing information, prioritizing tasks effectively, and
  cultivating a deeper connection with personal aspirations and values.


  ## Core Concepts


  - **Rapid Logging**: The heart of the method, using short bulleted entries
  with symbols to indicate content type and task status

  - **Intentionality**: Focused reflection on why tasks are being done and what
  makes goals meaningful

  - **Flexibility without losing structure**: Unlike fixed planners, the system
  adapts to changing daily needs and energy levels

  - **Migration ritual**: Moving uncompleted tasks forward using a right arrow
  (→), encouraging deliberate review of priorities


  ## Bullet Symbols


  - Dot (•) — represents a task

  - X — marks a completed task

  - Right arrow (→ or >) — indicates a task migrated to a future date

  - Symbols can be customized for events, notes, and other categories


  ## Log Types


  ### Daily Log

  - Record tasks, events, and notes on a day-to-day basis with the current date
  as header

  - Add new tasks as they arise; mark complete with X or migrate with a right
  arrow

  - Maintains a concise, up-to-date record of daily activities


  ### Weekly Log

  - Double-page spread providing an overview of the week

  - Left page: dates of the week with time-specific events and appointments

  - Right page: bulleted list of tasks and notes

  - Unfinished tasks can be migrated to the next week as needed


  ### Monthly Log

  - Double-page spread for a broader monthly perspective

  - Left page: dates (1-30/31) listed down the side for marking events,
  deadlines, and appointments

  - Right page: monthly task list for goals, tasks, or projects

  - Serves as a reference point to see the big picture and plan ahead


  ## Key Benefits


  - **Organization**: Consolidates tasks, events, and notes in one place for
  comprehensive view of commitments

  - **Productivity**: Optimizes focus through rapid logging, prioritization, and
  task migration

  - **Goal tracking**: Breaks goals into actionable steps with dedicated pages
  or collections

  - **Time management**: Clear view of schedule across monthly, weekly, and
  daily logs enables better time allocation

  - **Mindfulness**: Analog format minimizes digital distractions and encourages
  reflection

  - **Customizability**: Highly adaptable system that can be modified to suit
  individual needs

  - **Creative outlet**: Supports artistic expression and personalization

  - **Stress reduction**: Structured system for managing commitments reduces
  overwhelm; ritual-like quality provides meditative experience


  ## Comparison with Other Methods


  ### vs. Planner

  - Planners are pre-designed, structured tools with fixed dates and limited
  flexibility for reusing pages

  - Bullet Journal seamlessly accommodates any time period and incorporates
  mindfulness and personal growth beyond scheduling


  ### vs. Journal

  - Journals are blank notebooks for free-form reflection, creative expression,
  and self-exploration with no organizational structure

  - Bullet Journal provides specific organizational structures and templates
  while still allowing for creative expression


  ## Related Methods


  - **Alastair Method**: An adjacent method building on the original Bullet
  Journal framework

  - **Calendex**: Another complementary method developed within the Bullet
  Journal ecosystem


  ## Pricing


  Free to practice — requires only a blank notebook and pen. Official Bullet
  Journal notebooks and accessories are available for purchase from the official
  store.
