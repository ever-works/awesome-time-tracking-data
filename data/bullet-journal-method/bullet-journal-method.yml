name: Bullet Journal Method
description: Analog productivity system created by Ryder Carroll that combines
  rapid logging, mindfulness, and intentional task management in a customizable
  notebook format. Originally developed to manage ADHD, it uses short bulleted
  entries, migration rituals, and time-based logs (daily, weekly, monthly) to
  track the past, organize the present, and plan the future.
