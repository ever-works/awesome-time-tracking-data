markdown: >-
  ## Overview


  SingularityApp is a time management and productivity application designed
  around goal-oriented planning rather than time-based scheduling. The app
  encourages users to complete tasks efficiently and rewards them with free time
  rather than piling on additional work.


  ## Features


  - **Strict time limits** — Set a maximum time budget for any task to prevent
  work from expanding to fill available time

  - **Task start time and deadline recording** — Log when tasks begin and set
  firm deadlines

  - **Milestone scheduling** — Break large projects into smaller milestones with
  individual deadlines to ensure even effort distribution

  - **Reminders** — Automated notifications for upcoming deadlines and
  milestones

  - **Animated praise bars** — Gamified encouragement when tasks are completed
  ahead of schedule

  - **Result-based goal setting** — Plan tasks based on desired outcomes (e.g.,
  "write 500 words") rather than time spent (e.g., "work for 2 hours")

  - **Rest planning** — Schedule rest periods as habitual tasks to avoid
  overworking

  - **Time budget enforcement** — Set a strict cut-off time after which all work
  stops


  ## Pricing


  The app offers a free tier with core functionality available at no cost.
