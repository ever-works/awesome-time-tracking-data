markdown: >-
  ## Overview


  Molly Fletcher is a sports agent turned entrepreneur, author, and motivational
  speaker who helps leaders, teams, and organizations unleash their potential.


  ## Notable Works


  - **The Energy Clock** - Explores energy management as the foundation of
  sustainable productivity and performance


  ## Background


  Fletcher spent 20+ years as a sports agent representing coaches, athletes, and
  media personalities before transitioning into executive coaching and speaking.
  Her unique background in high-stakes sports negotiation informs her approach
  to productivity and leadership.


  ## Key Themes


  - Energy management as a driver of performance

  - Overcoming the fear of failure

  - Leadership development

  - Team dynamics and motivation
