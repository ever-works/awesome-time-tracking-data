markdown: >-
  ## Overview


  Due is a laser-focused reminders app for iPhone, iPad, and Mac designed for
  productivity and time management.


  ## Key Features


  **Auto Snooze (Signature Feature)**


  Its signature feature is Auto Snooze, which keeps pinging users at intervals
  until they actually mark a reminder done or delay it. Auto Snooze repeatedly
  notifies users of missed reminders until marked done or rescheduled, with
  intervals of every 1, 5, 10, 15, 30 and 60 minutes.


  **Speed & Efficiency**


  A time picker with 12 preset and fully customizable times lets users set due
  dates and postpone reminders in record time. Due can also parse dates and
  times that users typed or dictate and offer to set the due dates and times.


  **Countdown Timers**


  Precise to the second, perfect for making the perfect soft-boiled eggs,
  brewing coffee and more. Set them up once and reuse them forever.


  **Recurring Reminders**


  From the simple daily and weekly reminders to the complex
  every-3rd-Wednesday-of-the-month kind of reminders.


  **Cross-Platform Sync**


  Use iCloud or Dropbox to keep reminders and timers in sync across iPhone, iPad
  and Mac.


  ## Use Case


  Due is built for people who can't afford to miss an alert, making it ideal for
  medication reminders, critical deadlines, and important tasks that require
  persistent notifications.


  ## Availability


  Available on the App Store for iOS devices and the Mac App Store for macOS.
