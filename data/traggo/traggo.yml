markdown: >-
  ## Overview


  Traggo is a self-hosted time tracking tool with a unique approach: instead of
  organizing time around traditional projects and tasks, everything revolves
  around tags. This provides unprecedented flexibility in how you categorize and
  analyze your time.


  ## Features


  - Tag-based time tracking system

  - Self-hosted for complete privacy

  - Written in Go for fast performance

  - Web-based interface

  - Multiple tag combinations per time entry

  - Flexible reporting based on tag queries

  - Docker support for easy deployment

  - API for custom integrations

  - Lightweight and minimal resource usage


  ## Pricing


  Free and open-source. Self-hosting required.
