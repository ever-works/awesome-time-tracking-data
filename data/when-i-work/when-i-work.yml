markdown: >-
  ## Overview


  When I Work is an employee scheduling and time clock solution designed
  specifically for hourly workers and businesses with shift-based schedules.


  ## Scheduling Features


  - Drag-and-drop shift scheduling

  - Shift templates and rotation

  - Shift trading and swapping

  - Open shift posting

  - Schedule publishing and notifications

  - Availability management


  ## Time & Attendance


  - Mobile time clock app

  - GPS verification

  - Photo verification

  - Timesheet approval

  - Overtime tracking

  - Late and absence alerts


  ## Team Communication


  - Group and individual messaging

  - Shift reminders

  - Announcement broadcasting

  - In-app chat


  ## Integrations


  - Payroll export to major providers

  - QuickBooks

  - ADP

  - Paychex

  - Square


  ## Target Industries


  - Retail

  - Restaurants

  - Hospitality

  - Healthcare

  - Any shift-based business


  ## Pricing


  Affordable per-employee monthly pricing with free trial.
