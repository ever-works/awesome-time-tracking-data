name: 15 Secrets Successful People Know About Time Management
description: A New York Times bestseller by Kevin Kruse based on research with
  billionaires, Olympic athletes, straight-A students, and entrepreneurs that
  reveals productivity habits including why millionaires don't use to-do lists
  and how to maximize energy through sleep, diet, exercise, and breaks.
