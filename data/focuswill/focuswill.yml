markdown: >-
  ## Overview


  Focus@Will uses curated human-composed music across multiple channels with a
  productivity tracker, based on research showing specific music types work for
  specific people.


  ## Scientific Foundation


  - **2-4x Focus Time Increase**: Studies reveal productivity boost with most
  active users

  - **Personalized Channels**: Specific music types matched to individual
  productivity profiles

  - **Neuroscience-Based**: Music selection based on attention research


  ## Features


  - **Multiple Music Channels**: Various genres optimized for focus

  - **Productivity Tracker**: Monitor focus time and patterns

  - **Session Timer**: Set work session durations

  - **Energy Level Selector**: Choose music based on current energy

  - **Offline Listening**: Download music for offline use

  - **Cross-Platform**: Available on web, mobile, and desktop


  ## How It Works


  Focus@Will's science states there is a specific type of music that works for
  specific people to amplify productivity. The service helps identify which
  channel works best for each individual.


  ## Pricing


  - $7.49/month

  - Annual plans available

  - Free trial offered
