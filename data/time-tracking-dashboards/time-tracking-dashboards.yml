markdown: >-
  ## Overview


  Time tracking dashboards provide visual, real-time summaries of time data
  through charts, graphs, and key metrics. These interfaces give managers,
  project leads, and executives instant visibility into team productivity,
  project status, and resource utilization without navigating detailed reports.


  ## Common Dashboard Widgets


  ### Time Metrics

  - Total hours logged today/week/month

  - Hours by project or client

  - Billable vs. non-billable breakdown

  - Overtime hours trending


  ### Project Status

  - Budget consumption vs. completion

  - Time remaining on projects

  - Projects at risk of overrun

  - Burn rate indicators


  ### Team Utilization

  - Individual team member hours

  - Utilization rates by person

  - Who's over/under allocated

  - Capacity availability


  ### Financial Metrics

  - Revenue from tracked time

  - Profitability by project

  - Realization rates

  - Billing status


  ## Benefits


  - **Real-Time Visibility**: Current status always available

  - **Quick Decisions**: Data-driven insights at a glance

  - **Exception Identification**: Spot problems immediately

  - **Executive Communication**: High-level summaries for leadership

  - **Team Awareness**: Transparency on workload


  ## Dashboard Types


  ### Individual Dashboard

  Personal time summary, current timer, recent projects


  ### Team Dashboard

  Team utilization, project allocations, capacity planning


  ### Project Dashboard

  Single project deep-dive with budget, team, timeline


  ### Executive Dashboard

  High-level business metrics across all projects and teams
