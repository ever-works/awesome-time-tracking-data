name: ABCDE Method (Brian Tracy)
description: Task prioritization technique from Brian Tracy's Eat That Frog
  system that categorizes tasks into five levels—A (must do), B (should do), C
  (nice to do), D (delegate), and E (eliminate)—to focus energy on
  highest-impact activities.
