markdown: >-
  ## Overview


  Warren Buffett's 5/25 Rule is a prioritization strategy that helps you focus
  on what truly matters by actively avoiding good but not great opportunities.
  It was taught by Buffett to his personal pilot.


  ## The Exercise


  **Step 1:** Write down your top 25 career goals or tasks.


  **Step 2:** Review the list and circle your top 5 goals—the ones that matter
  most to you.


  **Step 3:** You now have two lists:

  - List A: Your top 5 goals

  - List B: The remaining 20 goals


  **Step 4:** Here's the key insight—List B isn't your secondary priority list.
  It's your "Avoid-At-All-Cost" list. Do not work on these until you've achieved
  your top 5.


  ## Why It Works


  The items on List B aren't bad goals—they're often good goals. But they're the
  most dangerous because they divide your attention from what matters most.
  These are good distractions disguised as priorities.


  ## Key Insight


  Success comes not just from doing the right things, but from NOT doing the
  wrong things—and the wrong things often look like good opportunities.


  ## Buffett's Advice


  "The difference between successful people and really successful people is that
  really successful people say no to almost everything."


  ## Benefits


  - Extreme focus on highest priorities

  - Elimination of good distractions

  - Faster progress on what truly matters

  - Reduced decision fatigue

  - Clear boundaries on commitments

  - Protection against opportunity overload


  ## Application


  Use annually for career planning, quarterly for business goals, or monthly for
  project prioritization.
