markdown: >-
  ## Overview


  Welltory is a health app that enables users to track their heart rate
  variability (HRV), stress, and energy levels, along with aggregated health and
  fitness analytics from different wearable devices and apps. By monitoring
  physiological markers throughout the day, Welltory helps users understand
  their personal energy patterns and optimize their schedules around peak
  performance times.


  ## Key Features


  - Heart rate variability (HRV) tracking via smartphone camera or wearables

  - Real-time stress level monitoring

  - Energy level predictions throughout the day

  - Integration with 1000+ health and fitness apps

  - Aggregated data from Apple Health, Google Fit, and major wearables

  - Productivity insights based on physiological data

  - Sleep quality analysis and recommendations

  - Recovery tracking for athletes and knowledge workers

  - Science-backed metrics and interpretations

  - Personalized daily recommendations


  ## Connection to Time Management


  Energy tracking provides a physiological dimension to time management. Rather
  than scheduling based solely on calendar availability, users can align
  cognitively demanding work with predicted energy peaks and schedule lighter
  tasks during natural energy troughs. This approach recognizes that not all
  hours are equally productive.


  ## Integration with Productivity Concepts


  - **Biological Prime Time** - Helps identify when your energy naturally peaks

  - **Ultradian Rhythms** - Tracks 90-120 minute energy cycles throughout the
  day

  - **Deep Work Scheduling** - Shows optimal times for focused cognitive work

  - **Recovery Periods** - Identifies when breaks or shallow work are most
  needed

  - **Chronotype Alignment** - Confirms whether you're following your natural
  rhythm


  ## Wearable Integrations


  - Apple Watch

  - Fitbit devices

  - Garmin watches

  - Oura Ring

  - Whoop strap

  - Polar devices

  - Samsung Galaxy Watch

  - Google Pixel Watch

  - Smartphone camera (manual HRV checks)


  ## Use Cases


  - Knowledge workers optimizing focus time placement

  - Athletes tracking recovery for training schedules

  - Shift workers understanding circadian impacts

  - Remote workers establishing healthy routines

  - Executives making high-stakes decisions during peak clarity

  - Anyone experiencing burnout or chronic fatigue


  ## Energy Management Benefits


  Energy-related metrics have cascading effects on everything including health,
  career, and relationships. By tracking energy patterns over weeks and months,
  users can identify lifestyle factors that enhance or deplete energy, make
  informed scheduling decisions, and prevent burnout through data-driven rest
  and recovery planning.


  ## Scientific Basis


  HRV is considered one of the most reliable biomarkers for autonomic nervous
  system function and stress resilience. Lower HRV correlates with higher stress
  and fatigue, while higher HRV indicates better recovery and readiness for
  cognitive or physical demands.


  ## Pricing


  Free basic features with limited measurements. Premium subscription unlocks
  unlimited HRV measurements, advanced analytics, all integrations, and
  personalized recommendations.
