markdown: >-
  ## Feature Overview


  Morgen's AI Planner (currently in beta) offers thoughtful options including
  the ability to choose between "balance mode" and "hustle mode" when
  automatically scheduling tasks, recognizing different work style preferences
  and capacity levels.


  ## Two Philosophies


  **Balance Mode:**

  - Prioritizes sustainable scheduling

  - Includes buffer time between tasks

  - Respects work-life boundaries

  - Schedules recovery and break periods

  - Avoids overcommitment

  - Maintains energy management focus

  - Prevents calendar overload


  **Hustle Mode:**

  - Maximizes task density

  - Fills available time slots

  - Tighter scheduling intervals

  - Fewer buffers and breaks

  - Higher daily task volume

  - Optimizes for output quantity

  - Sprint-oriented approach


  ## Why This Choice Matters


  **Acknowledges Reality:**

  - Different people have different capacities

  - Work demands vary by period

  - Sustainable pace differs individually

  - No single "right" approach for all situations

  - Context matters (sprint vs. marathon)


  **Prevents AI Overoptimization:**

  - Pure algorithmic optimization tends toward maximum density

  - Balance mode counters tendency to overschedule

  - User choice maintains human judgment

  - Recognizes limits of productivity maximization


  ## When to Use Each Mode


  **Balance Mode Appropriate:**

  - Sustainable long-term scheduling

  - Preventing burnout

  - Recovery from high-intensity periods

  - Managing chronic health conditions

  - Maintaining work-life integration

  - Standard operating approach


  **Hustle Mode Appropriate:**

  - Project deadline sprints

  - Temporary high-demand periods

  - Catch-up after time off

  - Short-term intensive efforts

  - When consciously choosing intensity

  - With planned recovery afterward


  ## Additional Smart Features


  Morgen's AI also offers:


  - **20% Buffer Toggle**: Option to increase time estimates by 20% when
  scheduling

  - **Task Breaking**: Splits long tasks into manageable chunks

  - **Smart Rescheduling**: Adapts schedule when priorities change

  - **Calendar Integration**: Works across multiple calendar systems


  ## 2026 Context


  The balance/hustle mode choice reflects growing recognition that:


  - Sustainable productivity requires flexibility

  - AI should augment human judgment, not override it

  - Different work styles are valid

  - One-size-fits-all optimization can be counterproductive

  - Energy management matters as much as time management


  ## User Experience


  Toggle allows users to:


  - Switch modes based on current needs

  - Experiment with different approaches

  - Learn their sustainable pace

  - Make conscious choices about intensity

  - Maintain control over AI scheduling


  ## Design Philosophy


  This feature exemplifies thoughtful AI design:


  - Provides automation with human override

  - Acknowledges complexity of work-life balance

  - Offers choice rather than imposing optimization

  - Supports both ambition and sustainability
