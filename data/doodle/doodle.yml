markdown: >-
  ## Overview


  Doodle is a meeting scheduling and group polling tool that simplifies finding
  a time that works for everyone. The platform allows you to create meeting
  polls with multiple date and time options, send them to participants, and let
  them vote for the times that work best.


  ## Key Features


  ### Group Poll Functionality

  - Schedule meetings with 3 to 3000 people

  - Create a meeting poll with multiple date and time options

  - Participants vote for their preferred times

  - Automated scheduling once consensus is reached


  ### Real-Time Synchronization

  - Instant synchronization ensures all participants see the latest poll version

  - Participants can update their responses in real-time

  - Live tracking of participant responses


  ### Customization Options

  - Add company logo and colors to polls and invites

  - Customize the look and feel of surveys

  - Professional branding for business use

  - Personalized invitation messages


  ### Ease of Use

  - No account registration required to participate in polls

  - Simple poll creation process

  - Straightforward participant interface

  - Quick meeting coordination


  ## Use Cases


  - Team meetings across different time zones

  - Client meetings with multiple stakeholders

  - Group events and gatherings

  - Committee meetings and board sessions

  - Conference calls with external participants

  - Social events and gatherings


  ## Pricing


  - Free Tier: One poll at a time with ads

  - Paid Plans: Multiple polls, no ads, advanced features


  ## Benefits


  - Eliminates back-and-forth email exchanges

  - Finds optimal meeting times quickly

  - Accommodates large groups effortlessly

  - Provides clear visibility into participant availability

  - Simplifies complex scheduling scenarios
