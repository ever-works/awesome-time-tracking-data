name: Time Management Matrix (Covey)
description: Four-quadrant framework by Stephen Covey categorizing activities by
  urgency and importance. Also known as the Eisenhower Matrix, it helps
  distinguish between urgent/important tasks to focus on Quadrant II activities
  for long-term effectiveness.
