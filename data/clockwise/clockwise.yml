markdown: >-
  ## Overview


  Clockwise is an AI-powered time management tool that works with your existing
  calendar to optimize schedules for entire teams. By intelligently moving
  flexible meetings and creating Focus Time blocks, Clockwise helps individuals
  and organizations reclaim time for deep work while still accommodating
  necessary collaboration.


  ## Features


  - **AI Meeting Optimization**: Automatically reschedules flexible meetings to
  create longer focus blocks

  - **Focus Time**: Schedules uninterrupted blocks for deep work, marking them
  as busy on your calendar

  - **Team Scheduling**: Finds optimal meeting times considering everyone's
  calendar and focus time preferences

  - **Smart Breaks**: Automatically adds buffer time between back-to-back
  meetings

  - **Flexible Meetings**: Mark meetings as flexible and let Clockwise move them
  to better times

  - **Calendar Stats**: Analytics on meeting time, focus time, and calendar
  health

  - **Meeting Autopilot**: Automatically decline, accept, or propose alternative
  times for meetings

  - **Slack Integration**: Sync Slack status with calendar events and focus time

  - **Time Protection**: Defend personal time boundaries like lunch breaks and
  end-of-day

  - **Team Insights**: Visibility into team meeting load and focus time
  availability

  - **Personal Meeting Links**: Smart scheduling links that respect focus time
  and preferences

  - **Calendar Sync**: Works with Google Calendar and Microsoft Outlook

  - **No-Meeting Days**: Help teams establish meeting-free days for deep work


  ## How Clockwise Works


  1. Connect your work calendar (Google or Outlook)

  2. Set preferences for focus time, work hours, and meeting flexibility

  3. Mark meetings as flexible when scheduling

  4. Clockwise's AI continuously optimizes your schedule throughout the day

  5. Focus Time blocks automatically appear when optimal windows emerge

  6. Analytics help you understand and improve your time allocation


  ## Team Benefits


  For teams, Clockwise provides:

  - Coordinated focus time across the team

  - Reduced meeting conflicts and fragmentation

  - Data on team meeting culture and time usage

  - Automatic scheduling that respects everyone's preferences


  ## Pricing


  Clockwise offers a free individual plan with core features. Teams plan starts
  at $6.75 per user per month (annual billing), and Business plan at $11.50 per
  user per month with advanced team features.
