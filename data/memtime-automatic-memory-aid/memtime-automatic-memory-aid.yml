markdown: >-
  ## Overview


  Memtime is an automatic time tracker that captures all computer activity in
  the background, creating a detailed timeline of your workday. Unlike
  traditional time trackers, Memtime functions as a memory aid, helping users
  recall and categorize their work retroactively.


  ## How It Works


  ### Automatic Capture

  Memtime silently tracks:

  - Applications and programs used

  - Documents and files opened

  - Websites visited

  - Meeting participation (via calendar)

  - Time stamps for all activities


  ### Memory Reconstruction

  At the end of the day or week, review your activity timeline to:

  - See exactly what you worked on

  - Remember details of each task

  - Allocate time to projects retroactively

  - Create accurate timesheets


  ## Privacy & Offline Operation


  ### Completely Offline

  - All data stored locally on device

  - No cloud synchronization

  - No data sent to servers

  - Full user control over information


  ### Privacy Protection

  - User decides what gets tracked

  - Can exclude specific apps or sites

  - Private mode available

  - GDPR compliant


  ## Key Features


  - Automatic activity timeline

  - Retroactive time allocation

  - Calendar integration

  - Project-based categorization

  - Export to timesheets

  - Multi-platform support (Windows, Mac)


  ## Use Cases


  ### Consultants & Freelancers

  Recreate billable hours accurately without interrupting workflow with timers.


  ### Knowledge Workers

  Track time across multiple projects without manual categorization during work.


  ### Remote Workers

  Provide accurate time records without invasive monitoring.


  ## Advantages


  - No workflow interruption (no manual timers)

  - Perfect memory of daily activities

  - Accurate retrospective timesheet creation

  - Complete privacy with offline storage

  - Works for multitaskers


  ## Limitations


  - Requires disciplined retroactive review

  - Only tracks computer-based work

  - Offline-only means no team features


  ## Pricing


  Subscription-based with free trial available.
