name: Revenge Bedtime Procrastination
description: The phenomenon of delaying sleep for leisure activities missed
  during the day, stemming from a lack of free time and an attempt to reclaim
  personal time. This Chinese-origin concept describes staying up late despite
  knowing you need sleep, representing an assertion of control over one's time
  in response to demanding schedules.
source_url: https://www.sleepfoundation.org/sleep-hygiene/revenge-bedtime-procrastination
category: Time Management Concept
