name: Personal Kanban for Time Management
description: Adaptation of kanban workflow visualization for individual time
  management. Uses three columns (To Do, Doing, Done) with WIP limits to prevent
  overcommitment, visualize work progress, and maintain sustainable flow.
  Emphasizes pulling new work only when capacity exists.
source_url: https://www.personalkanban.com/
category: Time Management Tool
tags:
  - kanban
