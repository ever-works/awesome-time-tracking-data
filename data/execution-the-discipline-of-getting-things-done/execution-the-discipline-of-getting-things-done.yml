name: "Execution: The Discipline of Getting Things Done"
description: A book by Larry Bossidy and Ram Charan that argues execution is the
  most critical factor in business success. Drawing on decades of executive
  experience at GE and AlliedSignal/Honeywell, it provides a framework for
  building an execution culture in organizations.
