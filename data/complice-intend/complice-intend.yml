markdown: >-
  ## Overview


  Complice (now also known as 'Intend') is an app that helps you make progress
  each day towards what's most important to you. Instead of focusing on
  productivity metrics, the system emphasizes intentionality - knowing why
  you're doing what you're doing and seeing dreams come to life.


  ## Key Philosophy


  Complice avoids staleness by keeping your list focused just on today. You
  can't put in a bunch of stuff days or weeks in advance, and if you didn't do
  something yesterday, Complice doesn't assume that it should hang over you
  today.


  ## Goals-First Approach


  With Complice, **goals come first** - you literally can't access the rest of
  the app before first setting at least two goals that you're working towards.
  This ensures every action is connected to a meaningful objective.


  ## Outcomes Over Tasks


  The outcomes submission process is the most important feature. It allows you
  to see clearly which goals you're moving towards and which need more
  attention. Rather than checking off tasks, you record what you accomplished
  and how it relates to your goals.


  ## Integration


  Complice integrates with Beeminder for accountability, helping users stay on
  track with their commitments through data-driven goal tracking.


  ## Who It's For


  - People who want to be more intentional about their time

  - Users who find traditional to-do lists create overwhelm

  - Those seeking to connect daily actions with long-term goals

  - Anyone wanting to focus on meaningful progress rather than busy work


  ## Pricing


  Pricing and subscription details are available on the Complice website.
