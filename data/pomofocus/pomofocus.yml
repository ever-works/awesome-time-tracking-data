markdown: >-
  ## Overview


  Pomofocus is a customizable pomodoro timer that works on desktop and mobile
  browsers, helping users improve their focus and productivity through the
  Pomodoro Technique.


  ## Features


  - Customizable pomodoro, short break, and long break durations

  - Visual reports showing focus time per day, week, and month

  - Project tracking to organize pomodoro sessions

  - Task list integration

  - Sound notifications and alarms

  - Dark mode support

  - No account required


  ## Pricing


  Completely free to use with no account registration required.
