markdown: >-
  ## Overview


  Harri is an HCM (Human Capital Management) and workforce management technology
  platform designed specifically for service industries including hospitality,
  restaurants, retail, and entertainment. The platform simplifies scheduling,
  automates compliance, and provides comprehensive time and attendance tracking.


  ## Time & Attendance Features


  - **Mobile Time Clock**: Employees clock in/out from smartphones

  - **Biometric Options**: Facial recognition and fingerprint support

  - **Geofencing**: Location-based clock-in restrictions

  - **Shift Tracking**: Automatic tracking of scheduled vs actual hours

  - **Break Management**: Meal and rest break compliance tracking

  - **Overtime Calculation**: Automatic overtime alerts and calculations

  - **Time-Off Requests**: Mobile submission and approval of PTO requests

  - **Real-Time Reporting**: Live visibility into who's working and labor costs


  ## Scheduling Features


  - **Smart Scheduling**: AI-powered schedule optimization based on demand

  - **Shift Management**: Create, publish, and manage shifts

  - **Shift Swapping**: Employees can trade shifts with manager approval

  - **Labor Forecasting**: Predict staffing needs based on historical data

  - **Schedule Templates**: Reusable scheduling patterns

  - **Mobile Schedules**: Employees access schedules from mobile app

  - **Shift Reminders**: Automatic notifications for upcoming shifts

  - **Coverage Management**: Fill open shifts quickly


  ## Compliance Management


  - **Labor Law Compliance**: Automatic compliance with federal, state, and
  local laws

  - **Predictive Scheduling**: Meet fair workweek and predictive scheduling laws

  - **Break Rules**: Enforce meal and rest break requirements

  - **Overtime Rules**: Configurable overtime calculations by jurisdiction

  - **Minor Labor Laws**: Special rules for underage workers

  - **Audit Trails**: Complete records for compliance reporting


  ## Human Capital Management


  - **Applicant Tracking**: Recruit and hire from one platform

  - **Onboarding**: Digital new hire paperwork and training

  - **Employee Database**: Centralized employee information

  - **Performance Management**: Goals, reviews, and feedback

  - **Learning & Development**: Training programs and certification tracking

  - **Employee Engagement**: Surveys and communication tools


  ## Payroll Integration


  - Seamless connection to major payroll providers

  - Automated time data export

  - Tip tracking and reporting

  - PTO accrual calculations

  - Multi-location payroll support


  ## Industry-Specific Solutions


  - **Hotels**: Guest-facing staff scheduling with occupancy-based forecasting

  - **Restaurants**: FOH/BOH scheduling with tip management

  - **Retail**: Sales-driven labor forecasting and scheduling

  - **Entertainment**: Event-based scheduling and staffing

  - **Casinos**: Gaming floor compliance and shift management


  ## Mobile Capabilities


  - Full-featured mobile app for managers and employees

  - Clock in/out from mobile devices

  - View schedules and request time off

  - Shift swapping and pickup

  - Manager approval workflows

  - Real-time labor cost visibility


  ## Benefits


  - Reduces labor costs by 2-5% through optimized scheduling

  - Eliminates scheduling conflicts and no-shows

  - Ensures compliance with complex labor laws

  - Improves employee engagement and retention

  - Provides real-time visibility into labor costs

  - Streamlines hiring to scheduling to payroll workflow


  ## Integrations


  - Major payroll providers (ADP, Paychex, etc.)

  - POS systems (Toast, Square, Clover, etc.)

  - HRIS systems

  - Property management systems for hotels

  - Background check providers


  ## Pricing


  Harri offers customized pricing based on number of employees, locations, and
  features required. Contact for quote. Pricing typically includes setup,
  training, and ongoing support.
