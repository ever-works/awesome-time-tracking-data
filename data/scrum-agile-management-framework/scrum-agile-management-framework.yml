markdown: >-
  ## Overview


  SCRUM is the most popular agile productivity framework, especially in software
  development. While not strictly a time management strategy, it helps address
  productivity issues and maintain focus. The cornerstone of the framework is
  flexibility and regular adaptation to changing circumstances, with an emphasis
  on learning through execution rather than planning.


  ## Roles in a SCRUM Team


  - **Product Owner** - Manages priorities, communicates with stakeholders,
  oversees the product vision

  - **SCRUM Master** - Facilitates the SCRUM framework, removes obstacles for
  the team

  - **The Team** - Cross-functional, fully committed team members


  ## Workflow


  - **Sprint Planning** - Defining the scope of work for the next 2–4 weeks

  - **Daily Scrum** - Short 15-minute daily meetings to maintain commitment

  - **Sprint Review** - Review of work completed after the sprint

  - **Sprint Retrospective** - Discussion of what went well and what could be
  improved


  ## Artifacts


  - **Product Backlog** - A list of everything that will be delivered

  - **Sprint Backlog** - A list of tasks that will be delivered in the next
  sprint

  - **User Stories** - Small, independent, valuable, estimable, testable
  delivery features

  - **Burn-down Chart** - Progress plan based on the actual velocity of the team


  ## Software Support


  Project management software supporting SCRUM or similar agile principles
  includes Jira, Zoho Projects, Backlog, and VivifyScrum.
