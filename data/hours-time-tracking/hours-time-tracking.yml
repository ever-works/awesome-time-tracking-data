markdown: >-
  ## Overview


  Hours is a time tracking application designed with simplicity and beautiful
  design at its core, making time tracking feel effortless rather than
  burdensome.


  ## Key Features


  ### Simple Time Tracking

  - **Visual timeline**: See your day at a glance

  - **One-tap tracking**: Start tracking with single tap

  - **Smart suggestions**: Learns your patterns

  - **Offline capable**: Track without internet

  - **Background tracking**: Continues when app closed


  ### Elegant Design

  - **Beautiful interface**: Award-winning design

  - **Intuitive gestures**: Natural interaction

  - **Visual reports**: Information presented clearly

  - **Minimal clutter**: Focus on what matters

  - **Delightful experience**: Makes tracking enjoyable


  ### Reporting & Insights

  - **Detailed timesheets**: Comprehensive time breakdowns

  - **Visual reports**: Charts and graphs

  - **Export options**: CSV, PDF for clients

  - **Earnings calculations**: Track revenue

  - **Project summaries**: Quick overviews


  ### Team Features

  - **Team tracking**: See what team is working on

  - **Shared projects**: Collaborate on client work

  - **Team reports**: Consolidated view

  - **Permission controls**: Manage access


  ## Platform Availability


  - iOS (iPhone and iPad)

  - macOS

  - Apple Watch

  - Web app


  ## Best For


  - Freelance designers and creatives

  - Small agencies

  - Consultants

  - Anyone valuing beautiful, simple tools

  - Apple ecosystem users


  ## Pricing


  Paid app with one-time purchase or subscription options. Premium for advanced
  features and team capabilities.
