name: 25/50-Minute Meeting Standard
description: A calendar scheduling practice that defaults meetings to 25 or 50
  minutes instead of 30 or 60 minutes, automatically building in 5-10 minute
  buffers between meetings to reduce stress, allow transitions, and prevent
  back-to-back exhaustion.
source_url: https://reclaim.ai/blog/time-blocking-guide
category: Time Management Practice
tags:
  - meetings
