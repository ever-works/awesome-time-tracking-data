markdown: >-
  ## Overview


  Motion is a project management software with a calendar at its core that was
  built to be your team's project management software and AI calendar. Motion is
  the only daily planner that actually leverages AI to plan your day for you,
  rather than requiring manual time blocking.


  ## Features


  - **AI Auto-Scheduling**: Automatically schedules tasks to your calendar based
  on priority, deadlines, and available time

  - **Project Management**: Full-featured project management with task
  dependencies and team collaboration

  - **Meeting Scheduler**: Intelligent meeting booking that finds optimal times

  - **Calendar Integration**: Connects with Google Calendar and Outlook

  - **Task Prioritization**: AI-driven prioritization based on deadlines and
  importance

  - **Time Blocking**: Automatic time blocking without manual effort

  - **Team Coordination**: Helps teams coordinate schedules and workloads


  ## Pricing


  Motion costs $19/month on an annual plan or $34/month when billed monthly.
  There is a 7-day free trial available.
