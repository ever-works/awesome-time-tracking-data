name: Track It Forward
description: A volunteer time tracking software designed specifically for
  nonprofits to streamline volunteer hour logging, reporting, and management.
  Features automatic hour logging via mobile app, digital sign-in/out, and
  comprehensive volunteer management tools to help organizations transition from
  paper-based systems.
