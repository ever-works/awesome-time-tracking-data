name: Notification Fatigue
description: The state of mental exhaustion and decreased responsiveness caused
  by constant notifications overwhelming attention and fragmenting focus. In
  2026, this phenomenon costs U.S. businesses an estimated $588 billion annually
  in lost productivity, with 68% of Americans reporting that notification
  frequency interferes with their work.
