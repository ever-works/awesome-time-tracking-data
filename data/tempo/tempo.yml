markdown: >-
  ## Overview


  Tempo is a comprehensive time-tracking and resource management platform
  designed specifically for engineering teams and software development
  organizations using Atlassian products. It provides deep integration with
  Jira, allowing developers to log time directly against issues, tasks, epics,
  and sprints without leaving their workflow.


  ## Features


  - **Jira Integration**: Native integration with Jira for seamless time
  tracking on issues and tasks

  - **Timesheet Management**: Flexible timesheets with approval workflows

  - **Resource Planning**: Visual capacity planning and resource allocation

  - **Project Budget Tracking**: Monitor project budgets and track actuals vs
  estimates

  - **Sprint Time Tracking**: Track time spent on sprint tasks for Agile teams

  - **Billing & Invoicing**: Generate invoices based on tracked time

  - **Custom Fields**: Capture additional context with custom timesheet fields

  - **Reports & Analytics**: Comprehensive reporting on time, costs, and team
  performance

  - **Team Planning**: Resource planning across multiple projects and teams

  - **Forecast & Capacity**: Forecast future capacity needs based on historical
  data

  - **Mobile Apps**: iOS and Android apps for time tracking on the go

  - **API Access**: REST API for custom integrations

  - **Multiple Atlassian Products**: Works with Jira Software, Jira Service
  Management, and Confluence


  ## Use Cases


  - Software development teams tracking time on user stories and bugs

  - Agile teams monitoring sprint velocity and burndown

  - Professional services firms billing clients based on development time

  - IT departments tracking time on support tickets and incidents

  - Engineering managers analyzing team capacity and productivity


  ## Target Market


  Engineering teams, software development organizations, and IT departments that
  use Atlassian tools, particularly Jira.


  ## Integration Ecosystem


  Deep integration with Jira, Confluence, and other Atlassian products. Also
  integrates with accounting systems like QuickBooks and Xero.


  ## Pricing


  Tempo offers tiered pricing starting at approximately $10 per user per month
  for basic time tracking, with higher tiers including resource planning and
  advanced features. Free trial available.
