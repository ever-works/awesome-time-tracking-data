  - meetings
markdown: >-
  ## Overview


  Daily standup (or daily scrum) is a short team meeting, typically 15 minutes,
  where team members share progress, plans, and obstacles to maintain alignment
  and identify blockers.


  ## Format


  Each team member answers:

  1. **What did I accomplish yesterday?**

  2. **What will I do today?**

  3. **What blockers am I facing?**


  ## Time Management Benefits


  - Quick synchronization (15 min max)

  - Reduces need for longer meetings

  - Identifies blockers early

  - Maintains team alignment

  - Minimal schedule disruption


  ## Best Practices


  ### Timing

  - Same time daily

  - 15-minute timebox

  - Standing (keeps it brief)

  - Early in workday


  ### Focus

  - Update team, not manager

  - Surface blockers

  - Defer detailed discussions

  - Action-oriented


  ### Efficiency

  - Start on time

  - One person speaks

  - Parking lot for deep dives

  - End on time


  ## Async Alternative


  For distributed teams across time zones:

  - Written updates in Slack/tool

  - Video recordings

  - Threaded discussions

  - 24-hour response window


  ## Common Problems


  - Running too long (> 15 min)

  - Becoming status reports

  - Solving problems in standup

  - Missing team members

  - Lack of preparation


  ## Solutions


  - Strict timeboxing

  - Parking lot for issues

  - Pre-written updates

  - Consistent attendance

  - Focus on commitments
