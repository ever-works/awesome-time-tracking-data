name: "Deep Work: Rules for Focused Success in a Distracted World"
description: A book by Cal Newport that argues cultivating the ability to focus
  without distraction on cognitively demanding tasks is one of the most valuable
  skills in the modern knowledge economy. Newport provides a rigorous training
  regimen for developing deep work habits.
