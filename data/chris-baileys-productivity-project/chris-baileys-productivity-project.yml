markdown: >-
  ## Overview


  Chris Bailey is a productivity expert and author who conducted a year-long
  series of productivity experiments, publishing his findings in "The
  Productivity Project." His work popularized practical methods for calculating
  Biological Prime Time.


  ## The Productivity Project


  Bailey dedicated an entire year after graduating from university to
  experimenting with different productivity techniques, documenting what worked
  and what didn't.


  ## Calculating Biological Prime Time


  Bailey developed a systematic approach to identifying personal peak productive
  hours:


  ### The Tracking Method


  1. **Duration**: Track for 2-3 weeks minimum

  2. **Hourly Ratings**: Each hour, rate your energy and focus on a 1-10 scale

  3. **Pattern Recognition**: Look for consistent peaks and valleys

  4. **Application**: Schedule important work during identified peak hours


  ### What to Track


  - Energy levels (physical vitality)

  - Mental focus (ability to concentrate)

  - Motivation levels

  - Creativity and problem-solving ability


  ## Key Insights


  Bailey's research revealed:


  - Peak productivity times vary significantly between individuals

  - Most people have 2-3 distinct energy peaks per day

  - Matching tasks to energy levels dramatically improves output

  - The first 90 minutes after waking are often highly productive


  ## Practical Application


  ### During Peak Hours

  - High-cognitive tasks

  - Creative work

  - Strategic planning

  - Important decision-making

  - Deep work sessions


  ### During Low-Energy Periods

  - Email processing

  - Routine administrative tasks

  - Meetings (when possible)

  - Light research or reading


  ## The Book


  "The Productivity Project: Accomplishing More by Managing Your Time,
  Attention, and Energy" synthesizes Bailey's year of experiments into
  actionable advice.


  ## Impact


  Bailey's accessible, experiment-based approach helped bring concepts like
  Biological Prime Time from academic research into mainstream productivity
  practice.
