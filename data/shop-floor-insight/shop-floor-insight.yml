markdown: >-
  ## Overview


  Shop Floor Insight is a comprehensive Manufacturing Execution System (MES)
  solution that seamlessly integrates with Microsoft Dynamics 365 Business
  Central, replacing manual guesswork with accurate, real-time labor and
  production tracking.


  ## Features


  - **Barcode-Based Time Capture**: Employees can use barcode scanners or touch
  screens to clock in/out instantly using badges

  - **Production Order Tracking**: Leverage barcode scanning for Production
  Orders, Jobs, Service Orders, and Fixed Assets

  - **Operational Data Collection**: Capture intricate operational data
  including consumption, output, scrap, and quality metrics

  - **Time Card Management**: Streamlined approval process that flags issues
  like missing setup time or excessive runtime

  - **Real-Time Labor Tracking**: Accurate time records without the risk of
  forgotten entries

  - **Integration with Business Central**: Native integration with Microsoft
  Dynamics 365 Business Central ERP

  - **Touch Screen & Scanner Support**: Flexible data entry options for shop
  floor environments

  - **Automated Validation**: Reduces data entry errors through barcode
  automation


  ## Benefits


  - **Increased Efficiency**: Eliminates manual time entry and streamlines time
  validation, reducing overall time and costs

  - **Enhanced Accuracy**: Barcode data collection reduces data entry errors by
  up to 50%

  - **Improved Visibility**: Real-time insights into labor costs, job progress,
  and production status

  - **Better Compliance**: Accurate records for labor law compliance and audit
  trails


  ## Use Cases


  - Discrete manufacturing operations

  - Job shop environments

  - Make-to-order production

  - Service order management

  - Fixed asset maintenance tracking


  ## Pricing


  Starting at $8 USD per employee for 10 employees. Contact vendor for custom
  pricing based on specific requirements and number of users.
