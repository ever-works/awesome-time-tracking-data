markdown: >-
  ## Overview


  Dwight is a todo and priority matrix application named after President Dwight
  D. Eisenhower, implementing his famous decision-making framework for
  organizing tasks by urgency and importance. The app offers cross-platform
  support with different pricing models for Android and iOS users.


  ## Features


  ### Priority Matrix Implementation

  - **Four-Quadrant System**: Organize tasks into Do, Decide, Delegate, and
  Delete categories

  - **Visual Task Management**: Clear representation of task priorities

  - **Quick Categorization**: Easy task sorting by urgency and importance

  - **Task Movement**: Flexibility to reclassify tasks as priorities change


  ### Task Management

  - Create tasks with titles and descriptions

  - Assign tasks to appropriate priority quadrants

  - Set due dates and reminders

  - Mark tasks as complete

  - Archive or delete finished tasks

  - Track task history


  ### Platform Features

  - **Android**: Free version with full functionality

  - **iOS**: Premium version ($3.99) with Apple ecosystem integration

  - **Cross-Device Sync**: Keep tasks synchronized across devices

  - **Offline Access**: Work without internet connection


  ### Productivity Benefits

  - Focus on important, non-urgent tasks (strategic work)

  - Minimize time spent on urgent but unimportant tasks

  - Identify tasks suitable for delegation

  - Eliminate low-priority activities

  - Improve time allocation decisions


  ## Eisenhower Matrix Quadrants


  **Quadrant 1 - Do (Urgent & Important)**: Crisis management, pressing
  deadlines

  **Quadrant 2 - Decide (Important, Not Urgent)**: Strategic planning, personal
  development

  **Quadrant 3 - Delegate (Urgent, Not Important)**: Interruptions, some
  meetings

  **Quadrant 4 - Delete (Not Urgent, Not Important)**: Time wasters, busy work


  ## Use Cases


  - Personal task management

  - Professional project organization

  - Time management training

  - Decision-making framework

  - Productivity improvement

  - Work-life balance management


  ## Target Users


  - Professionals seeking better task prioritization

  - Students managing academic responsibilities

  - Freelancers juggling multiple projects

  - Anyone looking to improve time management

  - Teams learning prioritization frameworks


  ## Design Philosophy


  Dwight emphasizes the distinction between urgency and importance, helping
  users avoid the "urgency addiction" trap where reactive tasks crowd out
  strategic work.


  ## Pricing


  - **Android**: Free

  - **iOS**: $3.99 one-time purchase


  ## Availability


  - Google Play Store (Android)

  - Apple App Store (iOS)
