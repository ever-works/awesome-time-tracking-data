name: Constraint-Driven Productivity
description: Productivity approach using artificial constraints to force
  efficiency and focus. Examples include shorter workdays, limited tools, or
  tight deadlines. Parkinson's Law shows work expands to fill time; constraints
  compress work to essentials, eliminating busy-work and perfectionism.
source_url: https://www.calnewport.com/blog/2009/05/15/drastically-reduce-your-workday-part-1-fixing-the-schedule-is-the-first-step-toward-fixed-point-productivity/
category: Time Management Philosophy
tags:
  - constraints
  - efficiency
  - parkinsons-law
  - focus
markdown: >-
  ## Overview


  Constraint-Driven Productivity uses artificial limitations to force efficiency
  and eliminate waste.


  ## Types of Constraints


  ### Time Constraints

  - Shorter workdays (6 hours)

  - Strict meeting limits

  - Fixed leaving time


  ### Resource Constraints

  - Limited tool access

  - Budget caps

  - Team size restrictions


  ### Process Constraints

  - Maximum email checks

  - Meeting-free days

  - No-notification periods


  ## How Constraints Help


  - Force prioritization

  - Eliminate low-value work

  - Prevent perfectionism

  - Increase focus intensity

  - Remove busy-work


  ## Examples


  - Basecamp's 4-day summer weeks

  - Cal Newport's fixed-schedule productivity

  - Artificial deadlines for projects


  ## Pricing


  Free philosophy.
