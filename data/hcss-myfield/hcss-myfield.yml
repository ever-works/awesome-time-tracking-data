markdown: >-
  ## Overview


  HCSS myField is comprehensive construction time tracking software designed for
  the field. It captures labor hours, equipment usage, materials, and detailed
  work information to support accurate job costing and payroll.


  ## Features


  - Mobile time tracking for field crews

  - Detailed work information capture (breaks, supervisor, equipment, cost
  codes)

  - Equipment time tracking

  - Material usage logging

  - Daily field reports

  - Photo documentation

  - GPS location verification

  - Offline mode for remote job sites

  - Integration with HCSS Heavy Job for job costing

  - Real-time data sync

  - Crew productivity tracking

  - Safety documentation


  ## Pricing


  Custom pricing based on company size and integration needs. Contact HCSS for
  quote.
