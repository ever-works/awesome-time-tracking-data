markdown: >-
  ## Overview


  Forest combines the Pomodoro technique with a unique gamified experience,
  where you plant virtual trees that grow as you stay focused. This visual
  metaphor creates a powerful incentive to avoid phone distractions and maintain
  concentration.


  ## Features


  - **Virtual Tree Growing**: Plant a seed when starting a focus session; it
  grows into a tree if you stay focused

  - **Gamification**: Build a forest of trees representing your focused work
  sessions

  - **Real-World Impact**: Partner with Trees for the Future to plant real trees
  based on virtual coins earned

  - **Phone Blocking**: Prevents you from leaving the app and using distracting
  apps during focus sessions

  - **Customizable Timers**: Set focus duration from 10 minutes to 2 hours

  - **Tree Species Variety**: Unlock different tree types as you complete more
  focus sessions

  - **Statistics & Insights**: Track your focus patterns and productivity trends
  over time

  - **Forest Together**: Synchronize focus sessions with friends or teammates

  - **Whitelist**: Allow specific apps (like music players) during focus
  sessions


  ## Environmental Impact


  Forest has partnered with real tree-planting organizations. Users have
  collectively helped plant over 1.5 million real trees worldwide.


  ## Pricing


  iOS: $3.99 one-time purchase

  Android: Free with in-app purchases
