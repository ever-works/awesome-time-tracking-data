markdown: >-
  ## Overview


  Deputy is a comprehensive workforce management platform designed for
  shift-based businesses, providing scheduling, time tracking, task management,
  and labor compliance tools in one integrated system.


  ## Features


  - **Smart Scheduling**: AI-powered auto-scheduling based on demand
  forecasting, employee availability, and skills

  - **Time Clock**: Multiple clock-in methods including mobile, kiosk,
  biometric, and geofencing

  - **Timesheet Management**: Automatic digital timesheets with hours, breaks,
  and overtime tracking

  - **Labor Compliance**: Automatic enforcement of break rules, overtime limits,
  and Fair Workweek requirements

  - **Task Management**: Assign and track daily tasks and operational checklists

  - **Communication**: Team messaging and shift notifications

  - **Leave Management**: PTO requests and approval workflows

  - **Payroll Integration**: Export verified timesheets to major payroll
  providers

  - **Reporting**: Real-time labor cost analytics and forecasting

  - **Mobile Apps**: Full-featured iOS and Android apps for managers and
  employees

  - **Kiosk Mode**: Turn tablets into time clock stations


  ## Industries Served


  Optimized for hospitality (hotels, restaurants), retail, healthcare, and other
  shift-based industries with specific features for each sector.


  ## Pricing


  Subscription-based with tiered pricing starting from basic scheduling to
  advanced workforce management. Per-employee monthly pricing with volume
  discounts.
