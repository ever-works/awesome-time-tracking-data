markdown: >-
  ## Overview


  Chronos Time Tracker is a privacy-focused time tracking application that
  emphasizes simplicity and local data storage, ensuring complete control over
  your time tracking data.


  ## Key Features


  **Privacy-First Design:**

  - All data stored locally

  - No cloud requirements

  - No account creation needed

  - Complete data ownership

  - Offline functionality

  - Optional data export


  **Time Tracking:**

  - Start/stop timers

  - Manual time entry

  - Project and task organization

  - Tags for categorization

  - Notes and descriptions

  - Calendar view


  **Reporting:**

  - Time summaries

  - Project reports

  - Tag-based analysis

  - Date range filtering

  - Export to CSV

  - Visual charts


  ## Interface


  - Clean, minimalist design

  - Keyboard shortcuts

  - Quick timer access

  - Intuitive navigation

  - Customizable views


  ## Benefits


  - No privacy concerns

  - Works without internet

  - Fast and lightweight

  - No subscription required

  - Complete data control

  - No vendor lock-in


  ## Ideal For


  - Privacy-conscious users

  - Offline work environments

  - Simple time tracking needs

  - Users avoiding cloud services

  - Personal productivity tracking


  ## Pricing


  One-time purchase or free open-source versions available depending on
  platform.
