markdown: >-
  ## Overview


  Fantastical is a premium calendar application for macOS, iOS, iPadOS, and
  watchOS that combines powerful calendar functionality with task management and
  time-blocking features.


  ## Features


  - Natural language event creation

  - Multiple calendar account support (iCloud, Google, Exchange, Office 365)

  - Integrated task management

  - Time zone support and detection

  - Weather forecasts integrated with events

  - Calendar sets for different contexts

  - Meeting proposal features

  - Video call integration (Zoom, Google Meet, Microsoft Teams)

  - Beautiful themes and customization

  - Widgets for iOS and macOS

  - Handoff support across Apple devices

  - Notifications and alerts

  - Travel time calculations


  ## Time-Blocking Capabilities


  Fantastical offers basic task management integrated with calendar and the
  ability to combine tasks with time-blocking features. However, time-blocking
  must be done manually - users need to drag tasks onto their calendar to create
  time blocks.


  ## Natural Language Processing


  One of Fantastical's standout features is the ability to add events using
  natural language. Simply type "Lunch with Sarah tomorrow at 1pm" and
  Fantastical will create the event with the correct details.


  ## Ideal For


  - Apple ecosystem users

  - Professionals managing complex schedules

  - Users who prefer natural language input

  - Teams needing calendar coordination

  - Anyone wanting calendar and tasks in one place


  ## Pricing


  Starts at $4.75/month or $56.99/year with a free trial available. Premium
  subscription includes all features across all Apple devices.
