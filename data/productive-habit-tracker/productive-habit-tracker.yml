markdown: >-
  ## Overview


  Productive is a habit tracker app designed to help users build positive
  life-changing habits through structured time blocking and smart tracking
  features.


  ## Time Blocking Features


  - Schedule habits across 3 customizable time blocks: morning, afternoon, and
  evening

  - Set custom time ranges for each block to match your schedule

  - Habits aren't counted as missed until end of day, even if you miss the
  scheduled time


  ## Key Features


  - **Smart Tracking**: Flexible completion windows reduce pressure while
  maintaining streak motivation

  - **Programs**: Daily habit tips and challenges to compete with other users
  globally

  - **Statistics**: Track habits and analyze progress through motivating streak
  chains and detailed analytics

  - **Reminders**: Location-based and time-specific notifications to prompt
  habit completion

  - **Notes**: Add notes to highlight main points during the day

  - **Customizable**: Organize and customize habits according to your daily
  routine


  ## Availability


  Available on the iOS App Store for iPhone and iPad.


  ## Pricing


  Free version available with limited habits. Premium subscription required for
  unlimited habits and additional features.
