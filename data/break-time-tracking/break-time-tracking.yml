name: Break Time Tracking
description: Separate tracking of meal breaks, rest periods, and unpaid time
  within work shifts. Required by labor laws in many jurisdictions and essential
  for accurate wage calculation and compliance with break period regulations.
source_url: https://www.paychex.com/articles/compliance/meal-and-rest-break-laws
category: Time Tracking Practice
tags:
  - compliance
