markdown: >-
  ## Overview


  Hybrid billing uses different pricing models for different project components,
  optimizing for both provider profitability and client value perception.


  ## Common Hybrid Structures


  ### Retainer + Hourly Overages

  - Monthly retainer covers X hours

  - Additional hours billed at standard/premium rate

  - Time tracking monitors retainer consumption

  - **Example**: $5K/month for 30 hours, then $200/hour


  ### Fixed-Fee + Change Orders

  - Core scope at fixed price

  - Changes/additions billed hourly

  - Time tracking proves scope creep

  - **Example**: Website $20K fixed, revisions $150/hour


  ### Value-Based + T&M Cap

  - Price based on value delivered

  - Time tracking ensures profitability

  - Hour cap protects from losses

  - **Example**: $50K for ERP implementation, max 300 hours internal budget


  ### Milestone + Hourly

  - Milestones paid on delivery

  - Hourly billing between milestones

  - Balances risk

  - **Example**: $10K on design completion + $150/hour development


  ### Performance + Base

  - Base hourly rate guaranteed

  - Bonus for outcomes achieved

  - Time tracking shows efficiency

  - **Example**: $100/hour + $20K bonus if launch by deadline


  ## Time Tracking Role


  ### For Provider


  **Profitability Monitoring**

  - Track actual hours vs. revenue

  - Identify unprofitable components

  - Adjust pricing for future engagements


  **Scope Documentation**

  - Prove change orders justified

  - Show hours consumed by revisions

  - Support billing disputes


  **Capacity Planning**

  - Understand true resource needs

  - Improve future estimates

  - Balance team workload


  ### For Client


  **Transparency**

  - See where hourly charges apply

  - Understand overages

  - Validate change order costs


  **Budget Control**

  - Monitor retainer consumption

  - Plan for overage costs

  - Make informed trade-off decisions


  ## Examples


  ### Software Development

  **Structure**:

  - Phase 1 (Discovery): $15K fixed-fee

  - Phase 2 (Development): $150/hour, $80K cap

  - Phase 3 (Testing): $10K fixed-fee

  - Maintenance: $5K/month retainer (20 hours)


  **Time Tracking Use**:

  - Ensure discovery stays within budget

  - Monitor development cap

  - Track retainer hours monthly


  ### Marketing Agency

  **Structure**:

  - Strategy: Fixed $20K

  - Execution: $10K/month retainer (40 hours)

  - Production work: $200/hour as needed

  - Performance bonus: $5K if KPIs met


  **Time Tracking Use**:

  - Profitability of fixed strategy work

  - Retainer utilization tracking

  - Production work billing

  - ROI analysis for bonus structure


  ### Consulting

  **Structure**:

  - Assessment: $25K fixed (estimated 100 hours)

  - Implementation support: $250/hour

  - Training: $5K per session (fixed)

  - Post-launch support: $3K/month retainer


  **Time Tracking Use**:

  - Ensure assessment profitability

  - Bill implementation hours accurately

  - Track support retainer


  ## Benefits


  ### Revenue Optimization

  - Capture value where possible (fixed/value-based)

  - Protect against scope creep (hourly)

  - Guaranteed baseline revenue (retainer)


  ### Risk Management

  - Fixed pricing for well-defined scope

  - Hourly for uncertain work

  - Retainer for ongoing predictability


  ### Client Satisfaction

  - Flexibility in pricing

  - Pay for what they value

  - Predictable base costs


  ## Challenges


  ### Complexity

  - Multiple billing rates to track

  - Complex invoicing

  - Client confusion


  **Solution**: Clear contract language, detailed invoices, transparent time
  tracking


  ### Transition Points

  - When does fixed-fee end, hourly begin?

  - How to categorize boundary work?


  **Solution**: Explicit definitions in contract, detailed timesheets


  ## Tools Supporting Hybrid Billing


  - **Harvest**: Multiple rate structures

  - **FreshBooks**: Flexible billing options

  - **Productive.io**: Complex pricing models

  - **BigTime**: Enterprise billing flexibility

  - **Bonsai**: Freelancer hybrid contracts
