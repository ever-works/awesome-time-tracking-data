markdown: >-
  ## Overview


  ManicTime is automatic time tracking software developed by Finkit d.o.o.
  (Slovenia) that tracks application and web page usage to help users keep track
  of time spent on various projects and tasks. The software runs quietly in the
  background, recording comprehensive activity data.


  ## What ManicTime Tracks


  ### Three Main Types of Information


  1. **Computer Usage**: Active time and idle time detection

  2. **Application Tracking**: Which applications you use and their window
  titles

  3. **URL and Document Tracking**: Specific websites visited (e.g., example.com
  in Chrome) and documents worked on (e.g., ProjectProposal.docx in Microsoft
  Word)


  ## Automatic Operation


  ManicTime requires no manual timer starting or stopping:

  - Runs quietly in background

  - Automatically records all activity

  - Captures window changes and application switches

  - Detects idle time automatically

  - No user intervention needed


  ## Data Visualization


  ### Timeline View

  Activities are visualized through:

  - Color-coded timelines showing app usage

  - Pie charts breaking down time distribution

  - Detailed breakdowns of productive vs. non-productive time


  ### Tagging and Categorization

  Users can apply tags to activities for:

  - Project-based categorization

  - Client billing

  - Timesheet creation

  - Productivity analysis


  ## Optional Screenshot Capture


  ManicTime can save screenshots every X seconds (user-configurable), providing
  visual reminders when billing or reviewing work to remember what each task
  entailed.


  ## Privacy and Data Control


  With ManicTime, you are in full control of your data:

  - Tracked data stored locally on your device by default

  - No cloud upload unless opted into ManicTime Server

  - Team version can be kept on-premise

  - Data never leaves your network if using on-premise deployment


  ### Privacy Concerns

  Note: ManicTime monitors all apps, documents, and websites, which raises
  privacy considerations. It isn't available on the App Store due to Apple's
  strict privacy policies regarding such comprehensive monitoring.


  ## Cross-Platform Support


  All three platforms get the same core experience:

  - **Windows**: Full featured

  - **macOS**: Complete functionality

  - **Linux**: Full support


  Features include:

  - Background tracking of applications, websites, and documents

  - Idle time detection

  - Ability to assign time to projects


  ## Team Version


  ManicTime Server provides:

  - Centralized time tracking for teams

  - Aggregate reporting across team members

  - On-premise or cloud deployment options

  - Admin visibility without compromising individual privacy


  ## Use Cases


  ### Freelancers

  Track billable hours with detailed documentation of work performed.


  ### Teams

  Understand how team members allocate time across projects.


  ### Personal Productivity

  Analyze work patterns and identify time wasters.


  ### Compliance

  Maintain detailed records of work performed for audits or client requests.


  ## Key Differentiator


  ManicTime provides exceptionally detailed tracking - down to specific
  documents and web pages - while maintaining user privacy through local storage
  and offering comprehensive cross-platform support.
