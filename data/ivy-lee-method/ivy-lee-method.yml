markdown: >-
  ## Overview


  The Ivy Lee Method is a simple daily routine for achieving peak productivity
  that began in 1918 when consultant Ivy Lee advised Bethlehem Steel executives.
  Charles Schwab was so impressed he paid Lee $25,000 (equivalent to $400,000 in
  2015).


  ## The Six Steps


  1. At the end of each work day, write down the **six most important** things
  you need to accomplish tomorrow

  2. **Do not write more than six tasks**

  3. **Prioritize** those six items in order of their true importance

  4. When you arrive tomorrow, **concentrate only on the first task**

  5. **Work until the first task is finished** before moving on to the second
  task

  6. Approach the **rest of your list in the same fashion**

  7. Move any **unfinished items to a new list** of six tasks for the following
  day

  8. **Repeat this process every working day**


  ## Why It Works


  - **Forces Prioritization**: Only six tasks prevents spreading yourself too
  thin

  - **Reduces Decision Fatigue**: Clear plan before the day begins

  - **Encourages Deep Focus**: One task at a time instead of juggling multiple
  things

  - **Creates Momentum**: Checking off high-priority tasks keeps you motivated

  - **Simplicity**: Easy to understand and implement


  ## Key Principles


  - Limit tasks to maintain focus

  - Prioritize ruthlessly

  - Single-task your way through the list

  - Don't break the chain of daily planning
