name: Micro-Breaks Technique
description: Productivity method incorporating brief, frequent breaks (30-60
  seconds every 30-60 minutes) to maintain focus, prevent fatigue, and sustain
  performance throughout the workday.
source_url: https://www.atlassian.com/blog/productivity/time-management-strategies
category: Practices
tags:
  - breaks
  - wellness
  - productivity
markdown: >-
  ## Overview


  Micro-breaks are very short rest periods (30-60 seconds) taken every 30-60
  minutes during work to prevent mental and physical fatigue while maintaining
  sustained productivity.


  ## How It Works


  - Work for 30-60 minutes

  - Take 30-60 second break

  - Stand, stretch, or look away

  - Return refreshed

  - Repeat throughout day


  ## Benefits


  - Prevents eye strain

  - Reduces physical tension

  - Maintains mental freshness

  - Prevents decision fatigue

  - Sustains focus longer

  - Improves overall productivity


  ## Micro-Break Activities


  - Stand and stretch

  - Look out window (20-20-20 rule: every 20 min, look 20 feet away for 20 sec)

  - Deep breathing

  - Quick walk

  - Drink water

  - Simple stretches


  ## vs. Traditional Breaks


  - More frequent

  - Much shorter

  - Less disruptive

  - Easier to implement

  - Better sustained focus


  ## Implementation


  - Set timer or use app reminders

  - Build into pomodoro cycles

  - Make it automatic habit

  - Track adherence and impact
