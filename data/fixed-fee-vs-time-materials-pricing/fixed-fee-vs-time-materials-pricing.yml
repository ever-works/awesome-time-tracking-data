name: Fixed-Fee vs. Time & Materials Pricing
description: Two fundamental project pricing approaches where fixed-fee projects
  charge a predetermined amount regardless of hours worked (requiring time
  tracking for profitability analysis only), while time & materials projects
  bill based on actual hours tracked plus expenses (requiring time tracking for
  client billing), each with different risk profiles and time tracking needs.
source_url: https://www.getharvest.com/
category: Time Tracking Practice
tags:
  - pricing
  - billing
  - project-management
markdown: >-
  ## Overview


  Fixed-Fee and Time & Materials represent two fundamental approaches to project
  pricing, each requiring different time tracking strategies and serving
  different project types.


  ## Fixed-Fee Projects


  **Definition**: Client pays predetermined amount for defined scope.


  **Time Tracking Purpose**:

  - Internal profitability analysis

  - Resource planning

  - Future estimation improvement

  - Identify scope creep

  - NOT for client billing


  **Advantages**:

  - Predictable client costs

  - Incentive for efficiency

  - Simpler invoicing


  **Risks**:

  - Scope creep erodes profit

  - Underestimation causes losses

  - Requires accurate scoping


  ## Time & Materials (T&M)


  **Definition**: Client pays for actual hours worked plus expenses.


  **Time Tracking Purpose**:

  - Direct client billing

  - Invoice generation

  - Budget monitoring

  - Scope tracking


  **Advantages**:

  - Flexibility for changing scope

  - Lower risk for vendor

  - Transparent costs


  **Risks**:

  - Unpredictable client costs

  - Requires client trust

  - No efficiency incentive


  ## Hybrid Models


  **Not-to-Exceed T&M**:

  - Bill hourly up to maximum

  - Combines flexibility with budget certainty


  **Retainer**:

  - Fixed monthly fee

  - Covers specified hours

  - Overage billed separately


  ## Time Tracking Implications


  **Fixed-Fee**:

  - Can track to project without task detail

  - Internal visibility focus

  - Estimate vs. actual comparison


  **T&M**:

  - Detailed task descriptions required

  - Client-facing time entries

  - Real-time budget tracking

  - Invoice-ready documentation


  ## Pricing


  N/A - These are pricing models, not paid services.
