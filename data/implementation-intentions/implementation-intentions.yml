name: Implementation Intentions
description: Evidence-based goal achievement strategy developed by psychologist
  Peter Gollwitzer that uses if-then planning to dramatically increase the
  likelihood of completing intended actions. This methodology specifies when,
  where, and how a person will act on their goals, creating strong cognitive
  links between situational cues and goal-directed behaviors.
