markdown: >-
  ## Overview


  FreeAgent is a UK-focused accounting tool with smart invoicing and tax
  features built specifically for freelancers, contractors, and small
  businesses. It combines comprehensive time tracking with full accounting
  functionality.


  ## Features


  - Time tracking and project management

  - Invoicing with customizable templates

  - Expense tracking with receipt capture

  - Bank feeds for automatic transaction import

  - Self Assessment and MTD-compliant tax preparation

  - Payroll management

  - Project profitability tracking

  - Mileage tracking

  - CIS (Construction Industry Scheme) support

  - Multi-currency support

  - Integration with major UK banks


  ## Time Tracking Capabilities


  Projects, time tracking, and expense claims are fully integrated within
  FreeAgent. You can create timesheets for yourself and employees, track
  billable and non-billable hours, and automatically convert tracked time into
  invoices.


  ## Pricing


  Pricing starts at approximately £24/month with different tiers based on
  business needs. Free trials are available to test the platform.
