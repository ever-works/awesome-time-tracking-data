markdown: >-
  ## Overview


  The Warren Buffett 5/25 rule is a focus strategy where you list 25 goals,
  circle the top 5, and avoid the other 20 to concentrate on what truly matters.


  ## How It Works


  ### Three Simple Steps


  1. **Write Down 25 Goals**
     - List 25 goals you want to achieve
     - Cover various life areas: career, education, personal growth
     - Be comprehensive and honest

  2. **Circle Your Top 5**
     - Review and choose most important and urgent goals
     - Align with long-term vision
     - Select goals with biggest impact on success

  3. **Avoid the Other 20**
     - Remaining 20 become "Avoid-At-All-Cost" list
     - Set these aside to reduce distractions
     - Conserve energy for top five priorities

  ## Why It Works


  - **Focused Energy**: Can't focus on lots of things at once

  - **Reduced Distractions**: Eliminate competing priorities

  - **Clear Direction**: Know exactly what matters most

  - **Resource Conservation**: Energy directed to high-impact goals


  ## Origin Note


  While widely attributed to Buffett through a story about his pilot, the origin
  story was fabricated. However, the strategy aligns with Buffett's philosophy:
  "The difference between successful people and really successful people is that
  really successful people say no to almost everything."


  ## Implementation Tips


  - Be ruthless in selection process

  - Regularly review top 5 priorities

  - Resist temptation to work on the 20

  - Revisit list quarterly or annually

  - Don't add new goals until top 5 are achieved


  ## Benefits


  - Clearer priorities

  - Better resource allocation

  - Reduced overwhelm

  - Higher achievement rate

  - Greater focus and momentum
