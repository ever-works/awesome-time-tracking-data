markdown: >-
  ## Overview


  Toast Scheduling is an employee scheduling solution designed specifically for
  restaurants and integrated seamlessly with the Toast point-of-sale system. It
  uses POS data to help restaurants optimize labor scheduling based on actual
  sales patterns.


  ## Features


  - **POS Integration** - Access sales data directly for informed scheduling
  decisions

  - **Drag-and-Drop Scheduling** - Intuitive schedule builder with shift
  templates

  - **Labor Cost Forecasting** - Predict labor costs based on scheduled shifts
  and sales forecasts

  - **Sales-Based Scheduling** - Schedule staff based on historical sales
  patterns

  - **Shift Templates** - Save and reuse common shift patterns

  - **Mobile Access** - Employees view schedules and request time off via mobile
  app

  - **Shift Swapping** - Employee-initiated shift trades with manager approval

  - **Time-Off Requests** - Digital PTO request and approval system

  - **Communication** - Send schedule updates and announcements to staff

  - **Compliance Tracking** - Monitor compliance with labor laws and break
  requirements

  - **Payroll Integration** - Export hours to payroll systems

  - **Real-Time Updates** - Schedule changes sync instantly across all devices


  ## Benefits for Restaurants


  By integrating scheduling with POS data, restaurants can match staffing levels
  to customer demand, reducing labor costs while maintaining service quality.


  ## Pricing


  Pricing bundled with Toast POS system; contact Toast for custom quotes.
