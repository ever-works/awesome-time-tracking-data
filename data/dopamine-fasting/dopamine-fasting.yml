name: Dopamine Fasting
description: A productivity protocol focused on reducing digital
  hyper-stimulation to recalibrate the brain's focus and creativity systems. The
  2026 evolution, known as Dopamine Fast 2.0, targets social media, AI
  notifications, and infinite scrolling to activate the brain's Default Mode
  Network and restore capacity for deep work.
