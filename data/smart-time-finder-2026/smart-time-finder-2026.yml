markdown: >-
  ## Overview


  Smart Time Finder is MyCase's intelligent time tracking feature that works in
  the background to prevent lost billable time from falling through the cracks.
  It passively tracks all activities performed in MyCase and provides itemized
  lists of common billable actions for easy time entry creation.


  ## How It Works


  ### Background Tracking

  Smart Time Finder works passively in the background, tracking activities as
  lawyers:

  - Write emails to clients

  - Attend meetings and court appearances

  - Make phone calls

  - Review and edit documents

  - Perform case-related tasks


  ### Itemized Activity Lists

  At the end of each day, Smart Time Finder provides:

  - A comprehensive list of all billable activities performed

  - Pre-populated time entry suggestions

  - Easy one-click time entry creation

  - Organized by case and activity type


  ### Double-Billing Prevention

  If time entries already exist for the same day and case, the system:

  - Prompts users to review existing entries

  - Prevents accidental double billing

  - Ensures ethical billing practices


  ## Proven Results


  ### 2021 Performance Data

  Lawyers who used MyCase Smart Time Finder in 2021:

  - Captured an extra 25 billable hours on average

  - Generated an additional $8,600 in invoiced revenue per lawyer

  - Significantly reduced unbilled time leakage


  ### 2026 Continued Impact

  Smart Time Finder remains a critical tool for law firms seeking to:

  - Maximize billable hour capture

  - Meet billing targets efficiently

  - Improve case profitability

  - Reduce administrative time on timesheet completion


  ## Key Features


  - Passive background activity tracking

  - No manual timers required

  - Pre-populated time entry suggestions

  - Prevents double billing

  - Integration with case management

  - Daily activity summaries

  - One-click time entry creation


  ## Availability


  Smart Time Finder is available in MyCase Pro and Advanced plans, with basic
  time tracking included in all plans starting at $39 per user/month (billed
  annually).


  ## Best Practices


  - Review Smart Time Finder daily to ensure complete billing

  - Use it as an end-of-day checklist for time entry

  - Customize activity categories for your practice area

  - Train staff to review suggestions before approval

  - Monitor captured hours to identify billing pattern improvements
