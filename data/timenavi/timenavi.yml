markdown: >-
  ## Overview


  TimeNavi is a time management tool that seamlessly syncs with Google and
  Microsoft Calendars to streamline time tracking. Your calendar's time is
  summarized in one dashboard for productivity and billing, positioning itself
  as the #1 Google Workspace Time Tracker for Freelancers and Teams.


  ## Features


  - **AI Calendar Assistant**: TimeNavi-GPT plugin allows users to converse with
  their calendar through ChatGPT integration, enabling retrieval of scheduled
  events, analysis of time spent on activities, and creation of new calendar
  events

  - **Automatic Time Tracking**: Eliminates manual timesheets by automatically
  categorizing time directly from calendar events, capturing events and
  categorizing them by keywords or colors for easy project management

  - **Team Dashboard**: Calculate the time different teams have spent on certain
  projects, giving companies deeper understanding of team activities, client
  billing, employee payment, and resource allocation

  - **Project Management**: Automatic time categorization by keywords or
  calendar event colors

  - **Calendar Integration**: Seamless sync with Google Calendar and Microsoft
  365/Outlook calendars

  - **ChatGPT Plugin**: Direct calendar integration with ChatGPT for
  conversational calendar management


  ## Target Users


  Designed for freelancers, small businesses, and enterprises needing project
  time tracking, billing, and productivity analysis.


  ## Pricing


  Available as a Google Workspace add-on with tiered pricing plans for
  individuals and teams.
