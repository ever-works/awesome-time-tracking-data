markdown: >-
  ## Overview


  The My Hours time tracker Chrome extension allows users to track time
  effortlessly without leaving their browser, offering manual entry and timer
  functionality directly from the Chrome toolbar.


  ## Features


  ### Convenient Time Tracking

  - **Browser-Based Timer**: Start and stop timers without opening new tabs

  - **Manual Entry**: Add time entries directly from the extension

  - **Quick Access**: Extension icon in Chrome toolbar for instant access

  - **No Tab Switching**: Track time while working in any web application


  ### Organization

  - **Task Tracking**: Log time against specific tasks

  - **Project Organization**: Categorize time by projects

  - **Client Separation**: Track time for different clients

  - **Description Notes**: Add details to time entries


  ### Integration

  - **Sync Across Devices**: Time entries sync with My Hours web and mobile apps

  - **Real-Time Updates**: Changes reflect immediately across platforms

  - **Offline Support**: Continue tracking even without connection


  ## Benefits


  - **Free to Use**: No cost for the Chrome extension

  - **Simple Interface**: Intuitive design requiring no training

  - **Always Accessible**: Track time from any web page

  - **Lightweight**: Minimal impact on browser performance


  ## Use Cases


  - Freelancers tracking client work

  - Consultants managing multiple projects

  - Remote workers logging hours

  - Anyone needing quick time entry without disrupting workflow


  ## Compatibility


  - Google Chrome

  - Chromium-based browsers (Edge, Brave, Opera)


  ## Pricing


  Free with My Hours account (free plan available, premium plans for teams and
  advanced features).
