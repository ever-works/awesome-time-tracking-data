markdown: >-
  ## Overview


  The AMG FR-1000 (iFace FR-1000) is an advanced biometric time clock system
  that uses facial recognition technology alongside multiple authentication
  methods to provide fast, accurate, and hygienic employee time tracking.


  ## Features


  ### Facial Recognition Technology

  - **Sub-Second Verification**: Identity verified in less than 1 second

  - **High Accuracy**: Advanced algorithms for reliable face matching

  - **Photo ID Display**: Shows employee photo upon successful authentication

  - **Voice Confirmation**: Audible feedback for clock-in/out events

  - **Touchless Operation**: Hygienic, no-contact time tracking


  ### Multiple Authentication Modes

  - **Facial Recognition**: Primary contactless identification method

  - **Fingerprint Reader**: Biometric backup option

  - **Proximity Card/FOB**: RFID-based authentication

  - **PIN/Password**: Numeric code entry option

  - **Dual-Mode Operation**: Combine methods for enhanced security


  ### Hardware Specifications

  - Wi-Fi connectivity for networked operation

  - Built-in camera for facial capture

  - Fingerprint sensor integration

  - RFID card reader

  - Numeric keypad

  - Color display screen

  - Audio speaker for voice feedback


  ### Time Tracking Capabilities

  - Clock in/out recording

  - Break time tracking

  - Job code selection

  - Department transfers

  - Overtime tracking

  - Real-time data transmission


  ## Benefits


  ### Hygiene & Safety

  - Contactless facial recognition eliminates shared touch surfaces

  - Reduces disease transmission in workplace

  - Ideal for healthcare, food service, and clean environments


  ### Buddy Punching Prevention

  - Biometric verification ensures only authorized employee can clock in

  - Eliminates time theft through proxy punching

  - Photo confirmation provides audit trail


  ### Speed & Efficiency

  - Sub-second verification minimizes queuing at time clocks

  - Multiple authentication options prevent bottlenecks

  - Quick employee throughput during shift changes


  ### Flexibility

  - Multiple authentication methods accommodate various needs

  - Backup options if one method fails

  - Suitable for diverse workforce preferences


  ## Use Cases


  - **Healthcare Facilities**: Hygienic time tracking for medical staff

  - **Manufacturing**: Fast clocking for large shift changes

  - **Food Service**: Contactless operation for sanitary compliance

  - **Retail**: Multi-location employee time management

  - **Construction**: Rugged time tracking at job sites

  - **Warehousing**: Quick authentication for high-volume workforce


  ## Integration


  - Compatible with major time and attendance software platforms

  - API available for custom integrations

  - Data export to payroll systems

  - Cloud-based or on-premise deployment options


  ## Installation


  - Wall-mountable design

  - Power over Ethernet (PoE) or standard AC power

  - Wi-Fi or wired network connectivity

  - Indoor installation recommended


  ## Compliance


  - Supports labor law compliance with accurate time records

  - Audit trail for all clock events

  - Data security for biometric information

  - Privacy protections for employee data


  ## Pricing


  Contact AMGtime for pricing based on quantity and deployment requirements.
