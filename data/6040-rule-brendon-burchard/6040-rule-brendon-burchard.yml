markdown: >-
  ## Overview


  The 60/40 Rule is a time management principle developed by high-performance
  coach Brendon Burchard that helps successful people maintain happiness, good
  relationships, and sustainable productivity without burnout.


  ## The Rule


  The most successful people who maintain happiness and good relationships
  spend:

  - **60% of their time** on "needle-moving activities"

  - **40% of their time** on regular tasks like managing emails, answering
  messages, and handling daily responsibilities


  ## Needle-Moving Activities


  Needle-moving activities are the big things that:

  - Move your career forward the most

  - Lead to meaningful progress

  - Generate rewards

  - Provide personal fulfillment

  - Create significant impact in your field


  ## Why 60/40 Works


  **Prevents Burnout**: High performers run at 60/40 instead of 100/100. Because
  there's some slack in the system, there's no burnout.


  **Focus Over Hours**: It's not about the number of hours worked, but whether
  you're doing the needle-movers enough.


  **Practical Timeline**: This translates to about three and a half days per
  week where you're really focused on moving things forward. In an eight-hour
  workday, you need to be incredibly effective and focused, typically until
  around 1:00 PM each day.


  ## Implementation Strategy


  ### Step 1: Identify Your Needle-Movers

  Determine what activities genuinely move the needle in your career or
  business. These are typically:

  - Strategic planning

  - Creative work

  - High-value client work

  - Innovation and development

  - Relationship building with key stakeholders


  ### Step 2: Time Blocking

  Once you know your needle-movers, block time to do them. Block out in your
  calendar the major needle-moving activities for the week.


  ### Step 3: Honor the Blocks

  It's not "if I get to it." Teach yourself to honor that blocked time as
  sacred. This is non-negotiable time for your most important work.


  ### Step 4: Accept the 40%

  Recognize that 40% of your time on administrative tasks, emails, and
  maintenance activities is necessary and acceptable. Don't feel guilty about
  this supporting work.


  ## Benefits


  - Sustainable high performance without burnout

  - Clear prioritization of important vs. urgent

  - Better work-life balance

  - Consistent progress on meaningful goals

  - Reduced guilt about not working 24/7


  ## Connection to Other Methods


  The 60/40 Rule complements other productivity frameworks like:

  - Deep Work (Cal Newport)

  - The 80/20 Principle (Pareto)

  - Time Blocking techniques

  - Priority management systems
