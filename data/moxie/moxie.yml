markdown: >-
  ## Overview


  Moxie is a comprehensive freelance business management platform that includes
  intelligent time tracking. Unlike standalone time trackers, Moxie connects
  your hours to your entire business workflow including invoices, projects, and
  client communications.


  ## Features


  - Automatic time tracking with smart categorization

  - Project and task management

  - Client relationship management (CRM)

  - Invoice generation from tracked time

  - Proposal and contract creation

  - Payment processing

  - Expense tracking

  - Financial reporting

  - Client portal

  - Automated workflows

  - Email integration

  - Calendar sync

  - Mobile access


  ## Pricing


  Subscription-based pricing with different tiers. Free trial available. Pricing
  designed for solo freelancers and small agencies.
