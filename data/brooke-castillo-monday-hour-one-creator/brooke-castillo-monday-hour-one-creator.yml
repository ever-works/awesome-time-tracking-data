markdown: >-
  ## About Brooke Castillo


  Brooke Castillo is the founder of The Life Coach School and creator of the
  Monday Hour One time management system. Her approach integrates life coaching
  principles with practical productivity methods.


  ## Monday Hour One Philosophy


  This isn't just time blocking—it's a complete time management system that
  accounts for thoughts, feelings, actions, and results, not just actions. It
  gets to the root cause of productivity struggles rather than just solving
  symptoms.


  ## The Method


  Spend the first hour of your work week (Monday morning) before any other work:

  1. Get clear on the results you want

  2. Brain dump all necessary tasks

  3. Put tasks onto your calendar

  4. Plan in free time and rest

  5. Create the calendar of your dreams


  ## Key Innovation


  Castillo's approach goes beyond traditional time management by addressing the
  psychological and emotional aspects of productivity, making it particularly
  effective for those who struggle with willpower, motivation, and
  self-discipline.


  ## Companion Practice


  Friday Hour Done complements Monday Hour One, creating a weekly rhythm of
  intentional planning and reflective closure.
