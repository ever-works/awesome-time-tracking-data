markdown: >-
  ## Overview


  The Ivy Lee Method is a technique for daily prioritization that involves
  listing and ranking six key tasks each day. This technique is over 100 years
  old and originated from a 1910s productivity consultant named Ivy Lee.


  ## Historical Background


  ### The Famous Story

  Lee's method gained traction after Charles M. Schwab, the president of
  American conglomerate Bethlehem Steel, used it to improve the productivity of
  his executive team. Lee famously taught the method to Charles Schwab's
  managers in about fifteen minutes.


  ### The Impact

  The method had such a profound impact on productivity that Schwab later
  handsomely rewarded Lee for his consultation.


  ## The Four-Step Process


  ### 1. Write Down Six Tasks

  At the end of each work day, write down the six most important things you need
  to accomplish tomorrow.

  - No more, no less

  - Must be specific and actionable

  - Choose what truly matters


  ### 2. Prioritize in Order of Importance

  Rank the six tasks in order of importance.

  - Forces you to think critically

  - Sharpens focus on most important things

  - Prepares you mentally for tomorrow


  ### 3. Focus on First Task

  The next day, focus on the first task until it's complete.

  - No multitasking

  - Full concentration on one task

  - Don't move on until complete

  - Work through list sequentially


  ### 4. Roll Over Unfinished Tasks

  Move any unfinished tasks to tomorrow's list.

  - Repeat the process daily

  - Continuous prioritization

  - Adaptation to changing circumstances


  ## Key Benefits


  ### Forces Single-Tasking

  - Having fewer priorities leads to better work

  - Eliminates attention fragmentation

  - Deeper focus on each task

  - Higher quality output


  ### Reduces Decision Fatigue

  - Tasks chosen and prioritized the day before

  - No morning decision-making

  - Start working immediately

  - Preserves mental energy


  ### Forces Tough Decisions

  - Limited to six tasks

  - Must choose what's truly important

  - Can't hide behind long to-do lists

  - Confronts priorities directly


  ### Creates Momentum

  - Completing tasks in order builds confidence

  - Early wins energize the rest of day

  - Clear progress tracking

  - Satisfaction from completion


  ## Why Six Tasks?


  The number six is strategic:

  - Enough to be productive

  - Few enough to actually complete

  - Prevents overwhelm

  - Forces prioritization

  - Manageable daily goal


  ## Core Philosophy


  ### Simplicity

  - Dead simple to understand

  - Easy to implement

  - No complex systems

  - No special tools needed


  ### Consistency

  - Daily ritual

  - Builds habit over time

  - Compounds results

  - Creates routine


  ### Discipline

  - Stick to six tasks

  - Complete in order

  - Don't skip around

  - Finish before moving on


  ## Modern Applications


  ### Personal Productivity

  - Daily planning

  - Goal achievement

  - Project completion

  - Time management


  ### Team Management

  - Team priorities

  - Project coordination

  - Clear communication

  - Aligned focus


  ## Integration with Other Methods


  ### Eat That Frog

  - Task #1 is your "frog"

  - Do it first thing

  - Hardest task when energy is highest


  ### Time Blocking

  - Block time for each of six tasks

  - Sequential time blocks

  - Structured day


  ### ABCDE Method

  - Six tasks are your A tasks

  - Already prioritized

  - Focus only on what matters


  ## Common Mistakes


  ### Too Many Tasks

  - Sticking to more than six

  - Defeats the purpose

  - Creates overwhelm


  ### Vague Tasks

  - "Work on project" too vague

  - Need specific, actionable items

  - Clear completion criteria


  ### Skipping Prioritization

  - Not numbering 1-6

  - Picking randomly

  - Missing the point


  ### Not Rolling Over

  - Starting fresh each day

  - Losing incomplete tasks

  - Breaking continuity


  ## Who It's For


  - Anyone overwhelmed by long to-do lists

  - Professionals juggling many priorities

  - Perfectionists prone to overthinking

  - People struggling with what to work on first

  - Teams needing clear daily focus

  - Anyone seeking simple productivity system


  ## Key Insight


  The Ivy Lee Method recognizes that most productivity problems stem from having
  too many priorities and not knowing where to start. By limiting yourself to
  six prioritized tasks, you force clarity, focus, and action.


  ## Pricing


  The methodology itself is free. It requires only paper and pen (or digital
  note-taking tool of choice). No apps, subscriptions, or special tools needed.
