markdown: >-
  ## Overview


  EARLY (formerly known as Timeular until March 2025) is a time tracking
  solution that combines a physical 8-sided tracking device called ZEI° with
  mobile and desktop apps. The platform makes time tracking interactive and
  intuitive through its innovative cube-based approach.


  ## Physical Tracker Device


  The ZEI° tracker is an 8-sided cube where each side can be assigned to a
  different task or project. Simply flip the cube to the desired side to
  automatically start tracking time for that task. To pause tracking, place the
  tracker back in its resting dock.


  ## Key Features


  - **8-Sided Physical Tracker**: Interactive cube for hands-on time tracking

  - **Bluetooth Connectivity**: Connects to iPhone, iPad, Mac, and Windows
  computers

  - **Flexible Task Management**: Track up to 1,000 different activities using 8
  sides

  - **Automatic Tracking**: Time starts automatically when you flip the cube

  - **Multi-Platform Apps**: Available on mobile and desktop

  - **Quicktrack Feature**: Leave sides empty to open quick selection for ad-hoc
  tasks


  ## Pricing


  Physical tracker device costs $69.00, with subscription required for full app
  features (new users get 2 months free when connecting a new tracker).


  ## Rebranding


  Timeular changed its name to EARLY on March 18, 2025, maintaining all existing
  features while refreshing the brand identity.
