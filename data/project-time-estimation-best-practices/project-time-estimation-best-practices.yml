markdown: >-
  ## Overview


  Accurate time estimation is critical for project success, resource planning,
  and realistic commitments. However, humans consistently underestimate task
  duration due to cognitive biases. Effective estimation combines historical
  data, systematic methods, and bias awareness.


  ## Common Estimation Errors


  ### The Planning Fallacy

  Tendency to underestimate time needed despite knowing past projects took
  longer than expected.


  ### Optimism Bias

  Assuming best-case scenarios without accounting for realistic obstacles.


  ### Scope Neglect

  Forgetting supporting tasks (meetings, emails, context switching) that consume
  time.


  ## Estimation Techniques


  ### 1. Historical Data

  Track actual time on similar past projects and use as baseline.


  ### 2. Three-Point Estimation

  - Best case: Optimistic estimate

  - Most likely: Realistic estimate

  - Worst case: Pessimistic estimate


  **Formula**: (Best + 4×Most Likely + Worst) ÷ 6


  ### 3. Bottom-Up Estimation

  Break project into smallest tasks, estimate each, sum total.


  ### 4. Comparison Method

  Reference similar completed projects as benchmarks.


  ### 5. Add Buffer Time

  Multiply initial estimate by 1.5-2x for realistic schedule.
