markdown: >-
  ## Overview


  ShiftWizard is a nurse scheduling platform designed specifically for
  healthcare facilities. Built by HealthStream, it focuses on employee
  engagement and mobile accessibility, catering to the complex scheduling needs
  of nursing staff with varying shift lengths, specialty requirements, and
  certification tracking.


  ## Features


  - Mobile-first design for on-the-go access

  - Self-scheduling capabilities for nurses

  - Shift trading and swapping

  - Open shift management

  - Certification and credential tracking

  - Staff availability management

  - Automated scheduling based on rules

  - Time-off request management

  - Shift reminder notifications

  - Integration with payroll systems

  - Compliance tracking for labor laws

  - Multi-location and multi-department support


  ## Pricing


  ShiftWizard pricing is customized based on facility size and requirements.
  Contact HealthStream for a tailored quote.
