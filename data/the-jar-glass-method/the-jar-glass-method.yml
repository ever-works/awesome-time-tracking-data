name: The Jar Glass Method
description: A prioritization method that categorizes tasks by importance using
  the metaphor of filling a jar with rocks, pebbles, sand, and water. The core
  principle is to tackle the 'rocks' (big, important strategic items) first—if
  you fill the jar with sand and water first, there will be no room for the
  rocks.
source_url: https://www.eisenhower.me/eisenhower-matrix
category: Time Management Technique
tags:
  - prioritization
