markdown: >-
  ## Overview


  Autofocus is a time management and task management system created by
  productivity expert Mark Forster. Unlike traditional prioritization methods,
  it uses intuition to guide which task to work on at any given moment.


  ## How Autofocus Works


  1. **Create a List**: Write all tasks in a single long list in a notebook

  2. **Scan the List**: Read through the entire list without taking action

  3. **Choose Intuitively**: Select the task that "stands out" or feels most
  right to work on now

  4. **Work Until Finished or Stuck**: Work on the task until it's complete or
  you lose momentum

  5. **Cross Off or Re-enter**: Mark completed tasks as done; if incomplete,
  re-enter at the end of the list

  6. **Repeat**: Scan from where you left off and choose the next task


  ## Key Principles


  - Trust your intuition about what needs attention

  - Don't force yourself to work on tasks you're resisting

  - Resistance often signals the wrong time or approach

  - Your subconscious knows what's important better than rigid systems


  ## Benefits for Time Tracking


  - Reduces decision fatigue by relying on intuition

  - Creates natural task batching as you work on what feels right

  - Encourages working on tasks when motivation is highest

  - Results in more accurate time estimates as tasks are done when you're ready


  ## Variations


  Forster has created several variations including Autofocus 2, Autofocus 3, and
  other related systems, each refining the core concept.
