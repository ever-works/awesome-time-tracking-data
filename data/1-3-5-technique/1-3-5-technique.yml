markdown: >-
  ## Overview


  The 1-3-5 Technique is a constructive and simple time management method for
  organizing daily tasks. It works by categorizing all daily tasks into three
  groups based on size and importance: big, medium, and small.


  ## How It Works


  The technique follows a structured daily completion order:


  - **1 Big Task** — Start with your most important large task and work on it
  until it's done. If you have more than one big task, rank them based on
  importance and tackle the highest-ranked one first.

  - **3 Medium Tasks** — After completing the big task, move on to three
  medium-sized tasks.

  - **5 Small Tasks** — Finally, complete five small tasks for the day.


  ## Flexibility


  The technique requires flexibility in practice. You won't always have exactly
  3 medium or 5 small tasks — some days you may be bogged down with big tasks
  only. In those cases, rank the big tasks by importance and complete them in
  that order.


  ## Key Principles


  - Categorize tasks by effort size (big, medium, small)

  - Always start with the highest-priority big task

  - Work sequentially: big → medium → small

  - Maintain flexibility when daily task distribution doesn't match the 1-3-5
  ratio

  - Rank tasks of the same size by importance when you have multiple
