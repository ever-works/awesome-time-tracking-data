markdown: >-
  ## Overview


  The To-Done List is an unconventional productivity technique that focuses on
  tracking completed work rather than pending work.


  ## How It Works


  Keep a running list of all the tasks you have already completed. This can be
  maintained alongside a traditional to-do list or used independently.


  ## Benefits


  - Provides visual evidence of progress and accomplishments

  - Motivates continued productivity through positive reinforcement

  - Helps combat the feeling of never getting anything done

  - Offers a retrospective view of how time was actually spent
