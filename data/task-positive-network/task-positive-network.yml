name: Task Positive Network
description: A brain network system encompassing regions including the
  dorsolateral prefrontal cortex, inferior parietal lobule, and insula that
  activates during attention-demanding tasks and goal-directed behavior.
  Understanding TPN activation helps optimize deep work sessions and focus
  strategies for peak productivity.
