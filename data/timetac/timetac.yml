markdown: >-
  ## Cloud-Based NFC Time Tracking Solutions


  ### TimeTac


  All you need is TimeTac's Project Time Tracking, an NFC-enabled smartphone,
  and an NFC transponder, and you can immediately start tracking your time via
  the TimeTac App. They offer a comprehensive cloud-based time and attendance
  solution for employee time tracking, project time tracking, and leave
  management. The app works offline when no internet connection is available.


  ## Key Features


  - **NFC Time Tracking**: One tap of an NFC card to start tracking time within
  a second

  - **Offline Functionality**: The app works even without an internet connection

  - **Project Time Tracking**: Track time spent on different projects and tasks

  - **Leave Management**: Manage employee absences and time off

  - **Real-time Synchronization**: Cloud-based storage ensures data is synced
  across all devices


  ## How It Works


  Employees can clock in and out by tapping their NFC-enabled smartphone or card
  to a designated transponder. The system automatically records the time and
  syncs it to the cloud platform for managers to review.


  ## Platform Availability


  TimeTac is available as a mobile app for iOS and Android, as well as a
  web-based platform for desktop management.


  ## Pricing


  Contact TimeTac for pricing information based on your organization's size and
  needs.
