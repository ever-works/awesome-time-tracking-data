markdown: >-
  ## Overview


  ClearSpace is a unique approach to screen time management that focuses on
  creating mindful moments rather than absolute blocking. When you attempt to
  open a distracting app, ClearSpace intercepts the action and presents a brief
  intentional pause, asking you to confirm your intent before proceeding.


  ## How It Works


  Unlike traditional app blockers that completely prevent access, ClearSpace
  adds a layer of friction designed to disrupt automatic, unconscious app
  opening. This "moment of pause" typically lasts 5-10 seconds and can include:


  - A breathing exercise

  - A confirmation prompt asking why you want to open the app

  - A reminder of your daily goals or intentions

  - Statistics on how many times you've opened the app today


  ## Key Features


  - **Intentional Friction**: Creates pause moments before opening selected apps

  - **App Open Tracking**: Detailed analytics on how many times you open each
  app

  - **Customizable Delays**: Set different delay types and durations for
  different apps

  - **Focus Modes**: Schedule times when certain apps have extra friction

  - **No Hard Blocking**: Apps remain accessible after the pause moment

  - **Habit Insights**: Weekly reports on unconscious vs intentional app use

  - **Goal Setting**: Set daily limits for app opens (not just screen time)


  ## Philosophy


  ClearSpace's approach is rooted in behavioral psychology. Rather than relying
  on willpower to avoid opening an app, it interrupts the automatic habit loop
  before it completes. By creating awareness in the moment, users make more
  intentional choices about their phone use.


  ## Comparison to Traditional Blockers


  **Traditional Blockers (Freedom, Opal)**: Block access entirely during focus
  sessions


  **ClearSpace**: Allows access but requires intentional confirmation


  ClearSpace is ideal for users who:

  - Want to reduce mindless scrolling without complete blocks

  - Need flexibility to access apps when genuinely needed

  - Respond better to mindfulness than restriction

  - Want to track app *opens* rather than just screen time


  ## Ideal Users


  - Knowledge workers managing smartphone distraction

  - ADHD individuals working on impulse control

  - Anyone trying to break unconscious phone-checking habits

  - People who find hard app blockers too restrictive


  ## Pricing


  ClearSpace offers a free tier with basic features. Premium plans start at
  approximately $3-5/month with advanced features like custom delay messages,
  detailed analytics, and unlimited tracked apps.


  ## Platform


  iOS and Android. Integrates with system accessibility features to intercept
  app launches.
