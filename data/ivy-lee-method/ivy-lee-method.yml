markdown: >-
  ## Overview


  The Ivy Lee Method is a technique for daily prioritization that involves
  listing and ranking six key tasks each day. Despite being over one hundred
  years old, it remains highly relevant and efficient thanks to its focus on
  prioritization and eliminating the irrelevant from daily schedules.


  ## Historical Origin


  In 1918, Bethlehem Steel president Charles M. Schwab consulted productivity
  expert Ivy Lee. Lee suggested a simple system: At the end of each workday,
  write down the six most important tasks for tomorrow, rank them by priority,
  and tackle them in order. After three months, Schwab was so delighted with his
  company's progress that he gave Lee a check for $25,000—equivalent to $400,000
  in 2015.


  ## How It Works


  1. **End of Day**: Write down the six most important things you need to
  accomplish tomorrow. Do not write down more than six tasks.


  2. **Prioritize**: Prioritize those six items in order of their true
  importance.


  3. **Focus**: When you arrive the next day, concentrate only on the first
  task. Work until the first task is finished before moving on to the second
  task.


  4. **Continue**: Approach the rest of your list in the same fashion. At the
  end of the day, move any unfinished items to a new list of six tasks for the
  following day.


  5. **Repeat**: Repeat this process every working day.


  ## Why It's Effective


  ### Simplicity

  It's simple enough to actually work. Complexity is often a weakness because it
  makes it harder to get back on track after disruptions.


  ### Forces Tough Decisions

  You're forced to make decisions and prioritize. The magic of imposing limits
  helps clarify what truly matters.


  ### Removes Friction

  The method forces you to decide on your first task the night before,
  eliminating morning decision fatigue and removing the friction of starting.


  ### Single-Tasking

  Focuses on one thing at a time, preventing the productivity losses from
  context switching.


  ## Benefits


  - Minimalist approach that's sustainable long-term

  - Eliminates decision fatigue

  - Prevents overwhelm from long task lists

  - Ensures focus on truly important work

  - Easy to implement with just paper and pen
