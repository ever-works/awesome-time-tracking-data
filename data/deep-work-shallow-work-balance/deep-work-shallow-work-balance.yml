name: Deep Work & Shallow Work Balance
description: Time management framework from Cal Newport distinguishing between
  cognitively demanding, focused work (deep work) and logistically necessary but
  less intellectually challenging tasks (shallow work). This methodology
  emphasizes protecting time for deep work while systematically minimizing and
  batching shallow work to maximize professional value creation.
