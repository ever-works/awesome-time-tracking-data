name: BeeLine Reader
description: Reading enhancement tool that uses eye-guiding color gradients to
  increase reading speed by over 20% and improve focus. Originally created for
  speed reading, it's also helpful for students with dyslexia, ADHD, or vision
  impairments. Available as browser extensions, PDF viewer, and iOS app.
