markdown: >-
  ## Overview


  The Weekly is Brooke Castillo's 2026 program that provides structure and
  support to make the year transformative through weekly coaching, planning, and
  accountability. It replaces her traditional podcast format with a more
  intimate, focused approach.


  ## Key Features


  - Private podcast feed with weekly episodes

  - Structured weekly planning guidance

  - Integration with Monday Hour One methodology

  - Community accountability

  - Weekly themes and focus areas

  - Practical implementation strategies


  ## Philosophy


  The Weekly emphasizes:

  - Consistent weekly engagement over sporadic effort

  - Small, compound improvements

  - Mindful time management

  - Intentional goal pursuit

  - Accountability through community


  ## How It Works


  Participants receive:

  1. Weekly coaching via private podcast

  2. Planning prompts and frameworks

  3. Access to community discussions

  4. Accountability check-ins

  5. Progress tracking tools


  ## Relationship to Monday Hour One


  The Weekly builds upon the Monday Hour One time blocking system by providing:

  - Weekly context for daily planning

  - Broader strategic guidance

  - Motivation to maintain the practice

  - Troubleshooting common challenges

  - Advanced techniques for experienced practitioners


  ## 2026 Launch Context


  Brooke Castillo announced that she will not continue her traditional podcast
  in 2026, instead focusing energy on The Weekly as a more targeted, impactful
  offering for committed students of her work.


  ## Who It's For


  - Existing Monday Hour One practitioners

  - People seeking weekly accountability

  - Those wanting structured coaching

  - Individuals committed to transformative change in 2026

  - Life coach school community members


  ## Pricing


  Pricing details are available through The Life Coach School website. The
  program is designed as a year-long commitment for 2026.
