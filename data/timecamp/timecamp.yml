markdown: >-
  ## Overview


  TimeCamp provides automatic time tracking with detailed productivity
  monitoring. It tracks computer activities, categorizes them, and generates
  insights into how time is spent.


  ## Features


  - Automatic desktop tracking

  - Manual time entry

  - App and website monitoring

  - Productivity categorization

  - Timesheets and approvals

  - Invoicing

  - Budgeting

  - Integrations (50+ tools)

  - Mobile apps


  ## Automatic Tracking


  - Monitors apps and websites

  - Auto-categorizes activities

  - Idle time detection

  - Offline time tracking


  ## Productivity Insights


  - Productive vs. unproductive time

  - Distraction analysis

  - Focus time metrics

  - Daily/weekly reports


  ## Integrations


  - Asana, Trello, Jira

  - Slack, Todoist

  - QuickBooks, Xero

  - Google Calendar


  ## Pricing


  Free basic plan

  Pro: $7/user/month
