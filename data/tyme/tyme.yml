markdown: >-
  ## Overview


  Tyme is a comprehensive time tracking and billing app available on all Apple
  platforms (Mac, iPhone, iPad, Apple Watch) with deep system integration.


  ## Features


  - Available on all Apple platforms with sync

  - Over 20 actions for Shortcuts app

  - Project and task time tracking

  - Automatic time tracking options

  - Invoicing and billing

  - Detailed reports and exports

  - Budget tracking

  - Calendar integration

  - Team collaboration features

  - Apple Watch support


  ## Pricing


  One-time purchase or subscription options available. Free version with limited
  features.
