markdown: >-
  ## Overview


  The Instant Gratification Monkey is a concept created by Tim Urban,
  writer/illustrator and co-founder of Wait But Why, to explain the psychology
  of procrastination. The framework became widely known through one of the most
  popular TED talks ever given.


  ## The Three Characters


  The framework features three mental characters that explain procrastination:


  ### The Rational Decision-Maker


  The part of your brain that wants to do productive, meaningful work and make
  good long-term decisions.


  ### The Instant Gratification Monkey


  The minds of procrastinators have an Instant Gratification Monkey that takes
  control whenever the Rational Decision-Maker tries to do something productive.
  Being a creature that lives entirely in the present moment with no memory of
  the past or knowledge of the future, all he wants is to do things that are
  easy and fun.


  ### The Panic Monster


  The Panic Monster is the only thing that the Monkey is afraid of. While it is
  dormant most of the time, it comes to life whenever a deadline starts
  approaching—pushing the Instant Gratification Monkey to the back of our minds
  and letting the Rational Decision-Maker take control.


  ## How It Works


  Whenever the Rational Decision-Maker tries to do something productive, the
  Instant Gratification Monkey comes along and takes the wheel, seeking easy and
  fun activities rather than important work. This continues until the Panic
  Monster appears, typically when a deadline looms.


  ## Famous TED Talk


  Tim Urban's TED talk "Inside the Mind of a Master Procrastinator" became one
  of the most popular TED talks ever, resonating with millions of people who
  struggle with procrastination. The talk has helped countless people understand
  and articulate their own procrastination patterns.


  ## Impact


  The concept has become one of the most popular frameworks for understanding
  procrastination, providing a memorable and relatable way to think about the
  internal struggle between immediate gratification and long-term goals.


  ## Application


  Understanding these three characters helps habitual procrastinators recognize
  when the Instant Gratification Monkey is taking over and develop strategies to
  either work with it or invoke the Panic Monster strategically through
  artificial deadlines.


  ## Origin


  Created and popularized through the Wait But Why blog and Tim Urban's viral
  TED talk, which has been viewed millions of times and translated into dozens
  of languages.
