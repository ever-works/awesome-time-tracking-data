name: SCRUM - Agile Management Framework
description: The most popular agile productivity framework, particularly used in
  software development. SCRUM emphasizes flexibility, regular adaptation to
  changing circumstances, team collaboration, and continuous improvement through
  iterative sprints. While team-based, it can also be adapted for individual
  use.
