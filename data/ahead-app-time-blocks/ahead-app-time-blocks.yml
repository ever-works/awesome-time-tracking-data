markdown: >-
  ## Overview


  Ahead App is a productivity application built on neuroscience research about
  optimal focus session length. The app implements 90-minute time blocking as
  its core methodology, based on scientific evidence about human attention
  spans, cognitive performance cycles, and mental energy management.


  ## Scientific Foundation


  ### The 90-Minute Science


  Research backing Ahead's approach shows:

  - **Ultradian Rhythms**: Natural 90-120 minute cycles discovered by Nathaniel
  Kleitman

  - **Peak Performance Window**: Brain operates at peak efficiency for roughly
  90 minutes

  - **Glucose Depletion**: Mental glucose reserves deplete after sustained focus

  - **Attention Capacity**: Maximum sustained attention lasts approximately 90
  minutes

  - **Recovery Needs**: 15-20 minute breaks restore cognitive resources


  ### Neuroscience of Focus


  **First 30 Minutes**: Brain activation and warm-up phase

  - Prefrontal cortex engagement increases

  - Attention networks fully activate

  - Working memory reaches capacity

  - Initial resistance to focus decreases


  **Minutes 30-90**: Peak performance zone

  - Maximum cognitive efficiency

  - Optimal problem-solving capacity

  - Best creative thinking

  - Flow state most accessible

  - Highest quality work output


  **After 90 Minutes**: Diminishing returns

  - Attention quality degrades

  - Error rates increase

  - Mental fatigue accumulates

  - Motivation decreases

  - Work quality suffers


