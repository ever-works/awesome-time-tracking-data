markdown: >-
  ## Overview


  Focusmate is a virtual coworking platform for getting anything done, built
  around the concept of body doubling—working on any task with another person
  present, without them participating in your task.


  ## What is Body Doubling?


  Body doubling is working on any task with another person present, without them
  participating in your task. If you struggle with getting started with tasks or
  staying focused, body doubling can be an absolute game-changer.


  ### The Science:


  Focusmate is designed with ADHD-friendly features, using science-backed body
  doubling techniques shown to help those with attention challenges stay focused
  and productive.


  ## How It Works


  ### 1. Book a Session


  Users book a time slot from flexible session lengths:

  - 25 minutes

  - 50 minutes  

  - 75 minutes


  **Availability:** 24/7 with on-demand access to focus sessions


  ### 2. Get Matched


  You are matched with another user for a live, webcam-enabled session.


  ### 3. Set Goals


  Both participants briefly state their goals at the beginning of the session.


  ### 4. Work in Parallel


  Work silently while your cameras remain on:

  - No interaction during work time

  - Just parallel presence

  - Both focused on own tasks

  - Camera provides accountability


  ### 5. Check-In


  At the end of the session:

  - Check in with your partner

  - Share what you accomplished

  - Celebrate progress


  ## Key Features


  ### Session Management


  - Book sessions in advance or on-demand

  - Sync with your calendar

  - Join video calls directly from browser

  - Available on desktop or mobile

  - Automatic matching with partners


  ### User Profiles


  - Timezone-based scheduling

  - Session history tracking

  - Productivity stats

  - Personal productivity metrics


  ### Flexibility


  - Choose session length based on task

  - Work on any type of task

  - No judgment about what you're working on

  - Skip sessions if needed


  ## Productivity Results


  In their most recent internal survey, users reported an average productivity
  increase of **161%**.


  ## Why It Works


  ### 1. Accountability


  Knowing someone else can see you working creates motivation to stay on task.


  ### 2. Social Presence


  Humans are social creatures. Having someone else present (even virtually)
  reduces feelings of isolation and increases focus.


  ### 3. Commitment Device


  Booking a session creates a commitment you're less likely to break.


  ### 4. Reduces Procrastination


  The immediate start time and partner waiting for you overcome procrastination.


  ### 5. Structure


  Defined start and end times create clear work boundaries.


  ## Ideal For


  ### ADHD and Attention Challenges


  Particularly effective for people with:

  - ADHD

  - Difficulty initiating tasks

  - Challenges staying focused

  - Executive function issues


  ### Remote Workers


  - Combat isolation

  - Recreate office accountability

  - Maintain productivity at home

  - Structure workday


  ### Freelancers & Entrepreneurs


  - Create accountability when working alone

  - Overcome procrastination on important tasks

  - Maintain consistent work schedule


  ### Students


  - Study sessions

  - Writing papers

  - Research work

  - Test preparation


  ### Writers & Creatives


  - Overcome writer's block

  - Maintain writing routine

  - Deep work on creative projects


  ## Best Use Cases


  - Tasks you've been procrastinating

  - Deep work requiring focus

  - Administrative tasks you find boring

  - Writing and content creation

  - Studying and learning

  - Research and analysis

  - Any solo work requiring concentration


  ## Pricing


  **Free Plan:**

  - 3 sessions per week

  - All session lengths available

  - Core features included


  **Paid Plans:**

  - Unlimited sessions

  - Additional features

  - Priority matching

  - Business and team options available


  ## Tips for Success


  ### 1. Come Prepared


  Know what you'll work on before the session starts.


  ### 2. Minimize Distractions


  - Close unnecessary tabs

  - Silence phone

  - Clear workspace

  - Have materials ready


  ### 3. Be Respectful


  - Show up on time

  - Keep your stated goal

  - Stay for the full session

  - Be present and focused


  ### 4. Use Appropriate Session Length


  - 25 min: Quick tasks or Pomodoro-style work

  - 50 min: Standard deep work session

  - 75 min: Extended focus periods


  ### 5. Make It a Habit


  Schedule regular sessions to build consistency.


  ## Benefits


  - **161% average productivity increase** (user-reported)

  - Overcome procrastination

  - Increased focus and concentration

  - Reduced feelings of isolation

  - Built-in accountability

  - Structured work time

  - Community support

  - Flexible scheduling

  - Works for any task

  - ADHD-friendly design


  ## Common Challenges


  ### Challenge 1: Camera Anxiety


  **Solution:** Remember partners are focused on their own work. Most users
  report anxiety fades after 1-2 sessions.


  ### Challenge 2: Distracting to Have Someone Watching


  **Solution:** Give it a few sessions. Most find the presence helps rather than
  hinders.


  ### Challenge 3: Task Takes Longer Than Session


  **Solution:** Book consecutive sessions or use it to get started and continue
  independently.


  ## Integration with Other Methods


  Focusmate works well with:


  - **Pomodoro Technique**: 25-minute sessions align with Pomodoro

  - **Time Blocking**: Schedule Focusmate sessions as blocked time

  - **Deep Work**: Use for deep work sessions

  - **GTD**: Work on next actions during sessions

  - **The ONE Thing**: Focus on your ONE thing with accountability


  ## Comparison to Alternatives


  ### vs. Coffee Shop Working

  - More structured

  - Guaranteed company

  - No commute

  - No distractions from surroundings


  ### vs. Coworking Spaces

  - More affordable

  - Available 24/7

  - Work from anywhere

  - More focused (less socializing)


  ### vs. Study Groups

  - Work on different tasks

  - No coordination needed

  - Matched automatically

  - Silent working


  ## Who Should Try It


  - Anyone struggling to start tasks

  - People who work better with others around

  - Remote workers missing office environment

  - ADHD individuals needing accountability

  - Procrastinators

  - Night owls (24/7 availability)

  - Anyone wanting to increase productivity


  ## Measuring Success with Focusmate


  - Tasks completed during sessions

  - Reduction in procrastination

  - Increased daily productive hours

  - Improved focus ability

  - Better work consistency

  - Progress on important projects
