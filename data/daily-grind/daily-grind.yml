markdown: >-
  ## Overview


  Daily Grind sets itself apart with its deliberate simplicity - no project
  management features, no team collaboration tools, no elaborate reporting
  dashboards. It sits quietly in your menu bar and provides exactly what many
  solo freelancers need: task creation, time tracking, client-specific
  organization, and CSV export capabilities.


  ## Philosophy


  Daily Grind is built on the principle of intentional minimalism. Instead of
  offering dozens of features that most users never need, it focuses exclusively
  on the core functionality required by individual freelancers and consultants
  who bill clients by the hour.


  ## Core Features


  ### Task & Time Management


  - **Task Creation**: Simple, fast task entry

  - **Time Tracking**: Start/stop timers from menu bar

  - **Client Organization**: Group tasks by client

  - **Manual Entry**: Option to add time manually


  ### Privacy & Data Control


  - **No Accounts Required**: Use immediately without sign-up

  - **No Cloud Dependency**: Everything stays local

  - **Offline Functionality**: Works without internet

  - **Complete Data Privacy**: Your time data never leaves your Mac


  ### Export & Reporting


  - **CSV Export**: Export time data for use in other applications

  - **Client-Specific Reports**: Filter by client for billing

  - **Simple Format**: Easy to import into spreadsheets or invoicing tools


  ## What It Deliberately Lacks


  - No project management features

  - No team collaboration

  - No elaborate dashboards

  - No automatic invoicing

  - No cloud sync

  - No mobile apps

  - No integrations with other tools


  ## Benefits of Simplicity


  ### For Users:


  - **Fast Setup**: Start tracking immediately

  - **No Learning Curve**: Intuitive interface

  - **No Ongoing Costs**: One-time purchase

  - **Full Privacy**: No data sharing

  - **Reliability**: Fewer features mean fewer bugs


  ### Technical Advantages:


  - Lightweight application

  - Fast performance

  - Minimal system resources

  - No network dependencies

  - Complete offline functionality


  ## Target Audience


  ### Ideal For:


  - Solo freelancers

  - Independent consultants

  - Privacy-conscious professionals

  - Mac users wanting simplicity

  - Those billing clients by the hour

  - Users who prefer local-only software


  ### Not Suitable For:


  - Teams requiring collaboration

  - Users needing advanced reporting

  - Those wanting automatic invoicing

  - Businesses requiring cloud access

  - Multi-platform users


  ## Use Cases


  - Freelance consulting work

  - Client billable hour tracking

  - Personal productivity monitoring

  - Simple time logging for tax purposes

  - Basic work hour documentation


  ## Platform


  - **macOS only**

  - Menu bar application

  - Native Mac app

  - Requires no internet connection


  ## Pricing


  Visit the website for current pricing information.
