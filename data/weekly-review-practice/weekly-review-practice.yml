markdown: >-
  ## Overview


  The Weekly Review is a structured reflection and planning practice, considered
  by David Allen to be a "critical factor for success" in his Getting Things
  Done (GTD) methodology. It involves systematically reviewing the past week,
  clearing mental clutter, and preparing for the week ahead.


  ## Purpose and Benefits


  ### Maintain System Trust

  Regular reviews ensure your productivity system is current and complete,
  allowing you to trust it fully.


  ### Gain Perspective

  Stepping back weekly provides the big picture often lost in daily execution.


  ### Course Correction

  Identify what's working and what isn't while there's still time to adjust.


  ### Reduce Stress

  Clearing loose ends and organizing commitments reduces mental burden.


  ### Improve Planning

  Learn from past week to plan more effectively going forward.


  ## The Weekly Review Process


  ### Step 1: Get Clear (15-20 minutes)

  **Collect Loose Materials**

  - Gather papers, receipts, business cards

  - Empty physical inboxes

  - Clear phone notifications and downloads

  - Review notes and voice memos


  **Process Digital Inboxes**

  - Email inbox to zero (or reasonable state)

  - Messages and communication channels

  - Downloads folder

  - Desktop clutter


  **Empty Your Head**

  - Brain dump anything on your mind

  - Capture ideas, worries, thoughts

  - Add to appropriate lists


  ### Step 2: Get Current (20-30 minutes)

  **Review Action Lists**

  - Next Actions: Update, complete, or remove

  - Projects List: Check status of all active projects

  - Waiting For: Follow up on delegated items

  - Someday/Maybe: Review for items to activate


  **Review Calendar**

  - Past week: Capture actions from completed events

  - Next 2-3 weeks: Prepare for upcoming commitments

  - Identify preparation needs


  **Review Project Plans**

  - Check project progress

  - Identify next actions for each project

  - Update project statuses


  ### Step 3: Get Creative (10-15 minutes)

  **Review Goals**

  - Check alignment with longer-term objectives

  - Adjust priorities if needed

  - Add new projects supporting goals


  **Generate New Ideas**

  - What new projects might be valuable?

  - What could be improved or optimized?

  - Any opportunities to pursue?


  **Review Checklists**

  - Areas of responsibility

  - Routine tasks and maintenance

  - Trigger lists for forgotten commitments


  ## Weekly Review Checklist


  ### Clear

  - [ ] Collect loose papers and materials

  - [ ] Empty physical inboxes

  - [ ] Process digital inboxes

  - [ ] Empty head/brain dump

  - [ ] Clear desk and workspace


  ### Current

  - [ ] Review and update calendar (past and future)

  - [ ] Review Next Actions lists

  - [ ] Review Projects list

  - [ ] Review Waiting For list

  - [ ] Review Someday/Maybe list

  - [ ] Check reference files


  ### Creative

  - [ ] Review goals and objectives

  - [ ] Review areas of responsibility

  - [ ] Generate new ideas and possibilities

  - [ ] Identify new projects to start

  - [ ] Clear head one final time


  ## Scheduling Your Weekly Review


  ### Best Times

  - **Friday afternoon**: Close out week with fresh start feeling

  - **Sunday evening**: Plan week during naturally reflective time

  - **Monday morning**: Start week with clarity and organization


  ### Duration

  45-90 minutes depending on complexity and volume.


  ### Consistency

  Same day and time each week builds strong habit.


  ### Protection

  Treat as sacred appointment—don't skip or reschedule.


  ## Common Challenges


  ### "I don't have time"

  Weekly Review saves more time than it takes through improved planning and
  reduced firefighting.


  ### "My system is too messy"

  Weekly Review is exactly when you fix the mess. Start where you are.


  ### "I keep skipping it"

  Schedule at optimal time, set reminders, make it enjoyable (coffee shop,
  music, etc.).


  ### "It takes too long"

  Start with abbreviated version. Even 20 minutes provides value.


  ### "I forget what I did this week"

  Keep simple log throughout week for review reference.


  ## Beyond GTD: Other Weekly Review Approaches


  ### Reflection-Focused

  - What went well this week?

  - What could have gone better?

  - What did I learn?

  - What will I change next week?


  ### Outcome-Based

  - What did I accomplish?

  - Did I make progress on key goals?

  - What value did I create?

  - What results did I achieve?


  ### Energy-Focused

  - When was I most energized?

  - What drained my energy?

  - How can I structure next week better?

  - What do I need to recharge?


  ### Team Review

  - Team accomplishments

  - Blockers identified

  - Help needed

  - Celebrations and wins


  ## Enhanced Weekly Review


  ### Metrics to Track

  - Deep work hours achieved

  - Key results progress

  - Project milestones reached

  - Habits maintained

  - Energy levels


  ### Questions to Ask

  - Am I working on the right things?

  - What's the highest leverage activity for next week?

  - What can I eliminate or delegate?

  - Where am I overcommitted?

  - What opportunities am I missing?


  ### Future Planning

  - Identify potential issues 2-3 weeks out

  - Schedule important but not urgent tasks

  - Plan for known busy periods

  - Block time for strategic work


  ## Tools for Weekly Review


  ### Digital Tools

  - Task management apps with review features

  - Calendar apps for past/future review

  - Note-taking apps for reflection

  - Time tracking data for analysis


  ### Physical Tools

  - Dedicated notebook or journal

  - Printed checklist

  - Weekly planner

  - Clear workspace


  ### Templates

  - Customizable review checklist

  - Reflection prompts

  - Planning worksheets

  - Goal tracking forms


  ## Making It Sustainable


  ### Start Small

  Begin with 20-minute simplified review and expand over time.


  ### Make It Enjoyable

  - Favorite location (coffee shop, park)

  - Good coffee or tea

  - Enjoyable music

  - Reward after completion


  ### Build Habit

  - Same time and place each week

  - Stack with existing routine

  - Set multiple reminders

  - Track completion streak


  ### Adjust as Needed

  - Modify for your life/work

  - Change timing if current doesn't work

  - Simplify if too complex

  - Add elements that provide value


  ## Measuring Effectiveness


  Indicators of effective Weekly Review:

  - Entering week with clarity on priorities

  - Reduced stress and overwhelm

  - Fewer surprises and emergencies

  - Better follow-through on commitments

  - Increased sense of control

  - More proactive, less reactive


  ## Integration with Time Tracking


  Weekly Review is ideal time to:

  - Review tracked time data

  - Identify time allocation patterns

  - Adjust time budgets

  - Celebrate time well spent

  - Plan corrections for next week

  - Update project time estimates
