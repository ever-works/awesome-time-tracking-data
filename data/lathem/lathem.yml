markdown: >-
  ## Overview


  Lathem is a leading manufacturer of time clocks and workforce management
  solutions, specializing in biometric and facial recognition technology. The
  company's FaceIN time clock system provides contactless, secure employee time
  tracking.


  ## Features


  - Facial recognition technology (FaceIN)

  - Touchless time clock operation

  - Fingerprint biometric options

  - Badge and PIN authentication

  - PayClock Online cloud-based software

  - Real-time attendance tracking

  - Automated payroll integration

  - Photo capture at clock-in

  - Works in various lighting conditions

  - Prevents buddy punching

  - Mobile clock-in options

  - GPS tracking for field employees


  ## Pricing


  Lathem offers hardware and software bundles. Time clock hardware ranges from
  affordable basic models to advanced biometric terminals. PayClock Online
  software pricing varies based on user count and features needed.
