markdown: >-
  ## Overview


  John Lee Dumas is the founder and host of Entrepreneurs On Fire, an
  award-winning daily podcast that has featured interviews with over 2,000
  inspiring entrepreneurs.


  ## Entrepreneurs On Fire


  - Award-winning daily podcast format

  - Over 2,000 guest interviews with successful entrepreneurs

  - Focus on extracting patterns and habits of highly productive individuals

  - Known for his signature seven-question interview format


  ## Productivity Philosophy


  Dumas is known for his disciplined approach to entrepreneurship and
  productivity, emphasizing consistency, daily habits, and the importance of
  creating systems for sustainable business growth.
