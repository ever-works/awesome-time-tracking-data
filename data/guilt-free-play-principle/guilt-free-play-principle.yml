name: Guilt-Free Play Principle
description: Core concept from Neil Fiore's Unschedule method emphasizing
  paradox that scheduling abundant leisure time increases work productivity.
  Based on principle that removing guilt from rest eliminates procrastination's
  root cause and transforms relationship with work from obligation to choice.
