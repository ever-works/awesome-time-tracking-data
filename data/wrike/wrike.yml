markdown: >-
  # Wrike


  ## Overview


  Wrike is a robust project management suite that includes advanced time
  tracking. Teams can record hours using a live timer or by manual entry on
  tasks. Wrike then ties those hours to project schedules and lets managers
  review and approve timesheets as needed.


  ## Features


  - Live and manual tracking: Log time with built-in timers or add hours
  manually to any task.

  - Workload analytics: View team availability and workload distribution;
  reassign tasks to avoid bottlenecks.

  - Timesheet approvals: Create, review, lock, or restrict timesheets
  (weekly/monthly) for accurate accounting.

  - Advanced reports: Drill into billable vs. non-billable tasks, and automate
  custom reports/invoices for clients.

  - Project-level insights: Use built-in dashboards to track hours per project,
  ensuring projects stay on schedule and within budget.


  ## Pricing


  Wrike has a free plan for small teams (basic task management). Its paid tiers
  start at $9.80/user/month for the Team plan and $24.80/user/month for the
  Business plan, both billed annually. Higher tiers (Enterprise, Pinnacle) add
  unlimited automation, BI reporting, and advanced security; pricing for those
  is custom.
