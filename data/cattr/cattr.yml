markdown: >-
  ## Overview


  Cattr is an open-source time tracking tool that can be self-hosted, giving
  organizations full control over their data. It includes employee monitoring
  features like screenshots and activity detection.


  ## Features


  - Automatic time tracking

  - Screenshot capture (configurable intervals)

  - Activity level monitoring

  - Project and task tracking

  - Reports and dashboards

  - Team management

  - Self-hosted deployment

  - API access


  ## Deployment Options


  - Self-hosted on your servers

  - Docker containers

  - Cloud hosting

  - Full data ownership


  ## Privacy Considerations


  - Configurable monitoring levels

  - Screenshot frequency settings

  - Activity tracking can be disabled

  - Transparent to employees


  ## Best For


  - Organizations wanting data ownership

  - Privacy-conscious teams

  - Custom integration needs

  - Cost-conscious deployments


  ## License


  Open source (check specific license on GitHub)
