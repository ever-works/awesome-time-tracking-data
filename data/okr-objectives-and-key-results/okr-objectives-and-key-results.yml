name: OKR - Objectives and Key Results
description: A goal-setting framework where Objectives define what you want to
  achieve and Key Results are measurable metrics indicating progress toward
  those objectives. Widely used in business by companies like Google, LinkedIn,
  Uber, and Intel. OKRs are typically set on a quarterly basis and shared across
  teams for alignment.
