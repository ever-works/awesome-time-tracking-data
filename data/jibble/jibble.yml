markdown: >-
  ## Overview


  Jibble is a completely free time and attendance tracking solution that allows
  unlimited users without subscription fees. It provides enterprise-grade
  features including facial recognition, GPS tracking, and scheduling tools,
  making it accessible for businesses of all sizes.


  ## Features


  - **Facial Recognition Clock-In**: Use biometric facial recognition for secure
  and accurate employee clock-ins

  - **GPS and Geofencing**: Track employee locations and set geofences to ensure
  clock-ins happen at designated sites

  - **Unlimited Users**: Add unlimited team members without additional costs

  - **Timesheet Management**: Automatically generate accurate timesheets from
  clock-in data

  - **Shift Scheduling**: Create and manage employee schedules with availability
  tracking

  - **Activity Tracking**: Monitor time spent on specific tasks, projects, and
  clients

  - **Leave Management**: Track vacation requests, sick days, and other leave
  types

  - **Payroll Exports**: Export timesheet data to popular payroll systems

  - **Mobile Apps**: iOS and Android apps for on-the-go time tracking

  - **Integrations**: Connect with tools like Notion, Slack, and payroll
  software

  - **Multi-Platform**: Available on web, mobile, tablet, and kiosk modes


  ## Pricing


  Jibble offers a generous free-forever plan that includes unlimited users,
  projects, and clients without subscription fees. Premium features are
  available for businesses requiring advanced reporting, integrations, or custom
  branding, with paid plans starting around $2.49 per user per month.
