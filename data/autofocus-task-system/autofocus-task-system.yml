markdown: >-
  ## Overview


  Autofocus is a task management system created by productivity expert Mark
  Forster that uses intuitive task selection rather than rigid prioritization,
  letting tasks that "stand out" guide your focus.


  ## How It Works


  1. Write all tasks in a single list

  2. Read through list without taking action

  3. Work on first task that "stands out" to you

  4. Work as long as you want on that task

  5. Cross off if finished, or re-enter at end of list

  6. Resume scanning from where you left off

  7. When you reach end, start over from beginning


  ## Key Principles


  - Trust your intuition on what to work on

  - No rigid prioritization needed

  - Single master list

  - Tasks naturally get urgency over time

  - Reduces decision fatigue

  - Flow-based rather than structure-based


  ## Benefits


  - Less mental overhead

  - Natural prioritization through urgency

  - Reduced resistance to starting tasks

  - Works with human psychology

  - Flexible and adaptive


  ## Variations


  - Autofocus 4

  - Final Version (FV)

  - SuperFocus

  - Various community adaptations


  ## Target Users


  People overwhelmed by rigid systems, creative professionals, those who
  struggle with traditional prioritization, intuitive thinkers
