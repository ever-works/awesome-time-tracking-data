name: PARA Method
description: "Universal organizational system by Tiago Forte dividing all
  information into four categories: Projects (short-term efforts), Areas
  (ongoing responsibilities), Resources (future reference), and Archives
  (inactive items). Organizes by actionability rather than topic."
source_url: https://fortelabs.com/blog/para/
category: Productivity Practice
