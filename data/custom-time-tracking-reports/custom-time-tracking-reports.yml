markdown: >-
  ## Overview


  Custom report builders empower users to create tailored time tracking reports
  that match their specific business needs. These tools provide flexibility to
  slice time data by any dimension, apply custom calculations, and format output
  for different stakeholders.


  ## Key Capabilities


  ### Data Selection

  - Choose specific time periods

  - Filter by users, projects, clients, tags

  - Include/exclude billable time

  - Select specific data fields


  ### Grouping and Aggregation

  - Group by any dimension (client, project, user, date)

  - Nested grouping for hierarchical views

  - Subtotals at each level

  - Grand totals


  ### Calculations

  - Sum, average, min, max

  - Percentages and ratios

  - Custom formulas

  - Year-over-year comparisons


  ### Visualization

  - Tables and grids

  - Charts and graphs

  - Pivot tables

  - Heatmaps


  ## Benefits


  - Answer specific business questions

  - Support unique workflows

  - Match existing processes

  - Provide stakeholder-specific views

  - Enable deep analysis


  ## Common Custom Reports


  - Time by skill or technology

  - Profitability by service line

  - Utilization by seniority level

  - Client time trends

  - Department cost allocation
