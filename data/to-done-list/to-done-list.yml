name: To-Done List
description: A reverse to-do list practice that tracks all tasks you have
  already completed. By keeping a visible record of accomplishments, this
  technique provides motivation and a sense of progress, encouraging continued
  productivity.
source_url: https://todoist.com/inspiration/todo-list-vs-done-list
