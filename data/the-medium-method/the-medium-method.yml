markdown: >-
  ## Overview


  The Medium Method combines the best aspects of paper-based and digital
  productivity tools, leveraging the strengths of each medium.


  ## Core Components


  - **Main notebook** - Capture ideas, tasks, quotes, notes, and meeting minutes

  - **Travel notebook** - Same purpose as the main notebook, designed for use
  while traveling

  - **Daily Post-it note** - Lists all appointments and the 3 most important
  tasks for that day

  - **Pen or pencil** - For analog capture and quick notation

  - **Task management app** - For digital task organization and reminders

  - **Online calendar app** - For scheduling and time blocking

  - **Note-taking app** - For searchable digital notes and references
