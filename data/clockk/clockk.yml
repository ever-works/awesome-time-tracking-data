markdown: >-
  ## Overview


  Clockk is an AI-powered automatic time tracker designed for professionals who
  bill by the hour. The software runs in the background and automatically tracks
  time spent on projects without requiring manual start/stop timers.


  ## Features


  - **Automatic Activity Tracking**: Monitors computer activity and
  automatically assigns time to projects

  - **AI Project Assignment**: Machine learning algorithms automatically
  categorize work by project and client

  - **Offline Tracking**: Continues tracking even without internet connection

  - **Privacy Controls**: Full control over what data is tracked and shared

  - **One-Click Timesheets**: Review and approve automatically generated
  timesheets

  - **Project-Based Organization**: Organize time entries by client, project,
  and task

  - **Billable Hour Reporting**: Generate accurate reports for client billing

  - **Time Insights**: Visualize how time is spent across projects and
  activities

  - **Calendar Integration**: Syncs with calendars to capture meeting time

  - **Manual Adjustments**: Edit and refine automatically tracked time as needed


  ## Benefits


  - Never lose billable time to forgotten timers

  - Eliminates manual time tracking overhead

  - Increases billing accuracy with complete activity records

  - Recovers 15-25% more billable hours on average

  - Provides insights into productivity patterns

  - Reduces time tracking stress and interruptions


  ## Pricing


  Clockk offers a subscription model starting at $21 per month per user. Free
  trial available to test the automatic tracking features.
