markdown: >-
  ## Overview


  The Peak-Trough-Recovery Model structures daily work based on natural energy
  fluctuations. Popularized by Daniel Pink in "When: The Scientific Secrets of
  Perfect Timing," it optimizes task scheduling for maximum productivity and
  well-being.


  ## The Three Phases


  ### Peak (Morning)

  - **Timing**: First 2-4 hours after waking

  - **Energy**: Highest cognitive capacity

  - **Best for**: Analytical work, strategic thinking, important decisions

  - **Examples**: Complex problem-solving, writing, coding, financial analysis


  ### Trough (Early-Mid Afternoon)

  - **Timing**: ~7 hours after waking (typically 2-4pm)

  - **Energy**: Lowest point of day

  - **Best for**: Administrative tasks, routine work

  - **Examples**: Email, filing, data entry, meetings (if necessary)


  ### Recovery (Late Afternoon-Evening)

  - **Timing**: After trough, before sleep

  - **Energy**: Moderate, different quality than peak

  - **Best for**: Creative thinking, brainstorming, iterative work

  - **Examples**: Ideation, collaboration, less structured tasks


  ## Application Strategies


  ### Schedule Matching

  1. List all daily tasks

  2. Categorize by type (analytical, administrative, creative)

  3. Map to appropriate phase

  4. Protect peak time vigilantly


  ### Common Patterns

  - **9am-12pm**: Deep work, important projects

  - **12pm-2pm**: Lunch, lighter tasks, meetings

  - **2pm-4pm**: Administrative work, email

  - **4pm-6pm**: Collaborative work, planning


  ## Individual Variations


  ### Chronotypes

  - **Larks (Morning People)**: Earlier peak, earlier trough

  - **Owls (Night People)**: Later peak, later trough

  - **Third Birds (Majority)**: Standard pattern


  ### Adjustments

  - Track personal energy patterns

  - Experiment with timing

  - Adjust for age (peaks shift earlier with age)

  - Account for sleep quality


  ## Benefits


  - Higher quality work output

  - Better decision-making

  - Reduced mental fatigue

  - Improved work-life balance

  - More sustainable productivity


  ## Time Tracking Integration


  - Log energy levels with time entries

  - Track output quality by time of day

  - Identify personal peak/trough/recovery times

  - Optimize schedule based on data

  - Correlate task type with performance
