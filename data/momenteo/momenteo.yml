markdown: >-
  ## Overview


  Founded in 2015, Momenteo is a user-friendly solution designed especially for
  self-employed people and small businesses. Available in English and French,
  the platform operates in Canada, France, and the United States.


  ## Key Features


  - **Simple Time Tracking**: Press a button when you start working, press it
  again when you stop, convert it into work done in the calendar, invoice it to
  a client, and get paid

  - **Calendar System**: The calendar is the heart of Momenteo and
  differentiates it from the competition, providing a visual way to manage work

  - **Client Management**: Keep track of professional relationships and manage
  client information

  - **Invoicing**: Track invoice status and send invoices directly online

  - **Expense Tracking**: Track expenses and cumulate kilometers to bill to
  clients or track as expenses

  - **Multilingual**: Available in English and French


  ## Target Users


  Momenteo is meant for freelancers and small business owners who need a simple,
  free way to manage their business operations without complexity.


  ## Pricing


  Momenteo is free to use for up to two clients. Once you have more than two
  clients, the price follows the number of clients you send invoices to, making
  it scalable for growing businesses.
