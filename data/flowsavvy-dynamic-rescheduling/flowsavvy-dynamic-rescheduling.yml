markdown: >-
  ## Feature Overview


  Dynamic Rescheduling is FlowSavvy's standout feature that automatically adapts
  your schedule to reality. Unlike static calendars that require manual updates
  when plans change, FlowSavvy intelligently redistributes tasks with a single
  click.


  ## How It Works


  ### When You Get Behind

  1. Tasks you didn't complete remain in your task list

  2. Click the "recalculate" button

  3. FlowSavvy instantly reschedules missed tasks into future time slots

  4. The system considers your deadlines, priorities, and available time


  ### When Meetings Move

  - FlowSavvy detects calendar changes automatically

  - Affected tasks are instantly rescheduled

  - Your week stays organized without manual intervention

  - No drag-and-drop required


  ## Key Benefits


  **Reduced Friction**: Planning changes are one click instead of multiple
  manual adjustments


  **Realistic Schedules**: Acknowledges that plans change and adapts accordingly


  **Time Savings**: Eliminates hours spent reorganizing when things don't go as
  planned


  **Stress Reduction**: Confidence that missed tasks won't fall through the
  cracks


  ## Integration


  FlowSavvy auto-schedules around events from:

  - Google Calendar

  - iCloud Calendar

  - Outlook Calendar


  ## Target Users


  Ideal for people who:

  - Have variable daily schedules

  - Experience frequent meeting changes

  - Struggle with static planning systems

  - Need flexibility without losing structure


  ## Comparison to Manual Rescheduling


  Traditional calendar apps require users to:

  1. Identify which tasks are affected by a change

  2. Find new time slots for each task

  3. Manually move each task

  4. Verify deadlines are still met


  FlowSavvy handles all of this automatically in seconds.
