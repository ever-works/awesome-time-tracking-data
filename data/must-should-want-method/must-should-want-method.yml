markdown: >-
  ## Overview


  The Must, Should, Want Method is a prioritization framework designed to help
  individuals and teams effectively sort tasks and responsibilities based on
  their level of urgency and importance. Created by blogger Jay Shirley in 2014,
  this method comes with a simple goal—make days more productive and enjoyable.


  ## How It Works


  The method involves categorizing tasks into three categories:


  ### Must

  "Must" focuses on essential tasks that create the most impact. These are the
  non-negotiable activities that need to be completed for the day to be
  considered successful.


  ### Should

  "Should" revolves around tasks that help you build towards achieving long-term
  goals. These are important but not immediately urgent, supporting your future
  success and development.


  ### Want

  Tasks with the "want" label are all about enjoying the day and taking time off
  from work goals. These activities contribute to work-life balance and personal
  well-being.


  ## Benefits


  - **Improved Efficiency**: By providing a clear framework for prioritization,
  this method helps individuals focus on what truly matters, thereby improving
  efficiency and productivity

  - **Reduced Burnout**: With clearly set priorities for each day, you will feel
  less overwhelmed, which reduces the risk of much-dreaded burnout

  - **Better Balance**: The inclusion of "Want" tasks ensures that personal
  enjoyment and self-care are integrated into daily planning


  ## Relationship to MoSCoW


  The Must/Should/Want workflow is a modification of the MoSCoW productivity
  method (Must have, Should have, Could have, Won't have), suggesting the two
  are related approaches to task prioritization.


  ## Pricing


  This is a free methodology that can be implemented using any task management
  tool or even paper-based systems.
