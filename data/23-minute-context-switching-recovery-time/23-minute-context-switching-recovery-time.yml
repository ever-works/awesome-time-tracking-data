name: 23-Minute Context Switching Recovery Time
description: Research finding from the University of California Irvine showing
  that it takes an average of 23 minutes and 15 seconds to fully return to a
  task after an interruption, highlighting the massive productivity cost of
  frequent context switching.
source_url: https://conclude.io/blog/context-switching-is-killing-your-productivity/
category: Time Management Research
