markdown: >-
  ## Overview


  Opal is a beautifully designed focus and screen time management app for iOS
  and Mac that helps users reduce phone addiction and increase productivity. It
  features intelligent app blocking, screen time tracking, and a Deep Focus mode
  designed to be more effective than built-in device restrictions.


  ## Features


  - Beautiful, intuitive interface

  - App blocking for iOS and Mac

  - Deep Focus mode with enhanced blocking

  - Screen time tracking and analytics

  - Customizable focus sessions

  - Scheduled blocking routines

  - App usage insights

  - Focus score and streaks

  - Widget support

  - Shortcut automation


  ## Deep Focus Mode


  - Enhanced blocking harder to bypass

  - Removes app icons from home screen

  - Blocks notifications completely

  - Prevents quick uninstalls or bypasses

  - Requires genuine effort to override

  - More effective than iOS Screen Time limits

  - Configurable difficulty levels


  ## App Blocking


  - Block individual apps or app categories

  - Create custom block lists

  - Different blocks for different times of day

  - Social media blocking presets

  - News and entertainment filters

  - Gaming app restrictions

  - Whitelist important apps

  - Emergency override options


  ## Screen Time Tracking


  - Detailed app usage analytics

  - Daily and weekly reports

  - Time spent per app category

  - Pickup frequency tracking

  - Most used apps identification

  - Screen time trends over time

  - Goal setting and progress tracking

  - Comparison to previous periods


  ## Focus Sessions


  - Start instant focus sessions

  - Preset session durations (25 min, 1 hr, 2 hr, etc.)

  - Custom session lengths

  - Pomodoro timer support

  - Break time management

  - Session history tracking

  - Focus streaks and achievements


  ## Scheduling and Automation


  - Schedule recurring focus times

  - Different schedules for different days

  - Morning routines (block apps until specific time)

  - Evening wind-down schedules

  - Work hours automation

  - Weekend vs. weekday modes

  - iOS Shortcuts integration for automation


  ## Analytics and Insights


  - Daily focus score

  - Weekly productivity trends

  - App usage patterns

  - Most distracting apps identified

  - Time saved through blocking

  - Goal achievement tracking

  - Streak maintenance

  - Personal insights and recommendations


  ## Widgets and Home Screen


  - Focus timer widget

  - Screen time widget

  - Quick start focus session

  - Today's progress at a glance

  - Customizable widget styles


  ## iOS Integration


  - Works with iOS Screen Time API

  - Notification management

  - Focus modes integration

  - Shortcuts automation

  - Lock Screen widgets (iOS 16+)

  - StandBy mode support


  ## Mac Companion App


  - Sync focus sessions across devices

  - Block Mac applications

  - Coordinated focus time

  - Screen time tracking on Mac

  - Menu bar integration


  ## Use Cases


  - Breaking phone addiction patterns

  - Students minimizing study distractions

  - Professionals during deep work

  - Parents limiting children's screen time

  - Anyone seeking better digital wellness

  - People implementing digital minimalism

  - Remote workers managing focus


  ## Design Philosophy


  - Clean, minimal interface

  - Non-judgmental approach

  - Positive reinforcement

  - Aesthetically pleasing design

  - Easy to use, hard to bypass

  - Privacy-focused (data stays on device)


  ## Benefits


  - Reduces phone addiction and compulsive checking

  - Increases focus and productivity

  - Improves digital wellbeing

  - Creates healthier phone habits

  - Supports deep work practices

  - Better work-life balance

  - Increased awareness of screen time


  ## Unique Advantages


  - Beautiful design encourages usage

  - Deep Focus harder to bypass than alternatives

  - Focus score gamification

  - iOS and Mac synchronization

  - More effective than built-in Screen Time

  - Continuous updates and improvements


  ## Pricing


  - Free tier with basic features

  - Premium subscription with full features

  - Monthly and annual options available

  - Family sharing support

  - Free trial of premium features


  Visit Opal website for current pricing details.
