markdown: >-
  ## Overview


  MoSCoW (Must, Should, Could, Won't) is a stakeholder-driven approach for
  prioritizing requirements and features. It's common in project work and agile
  environments and helps prevent scope creep by explicitly categorizing what
  will and won't be delivered.


  ## The Four Categories


  ### Must Have


  Essential requirements that are critical for the project's success. Without
  these, the project would be considered a failure. These are non-negotiable
  items that must be delivered.


  **Characteristics:**

  - Project fails without them

  - Legal or regulatory requirements

  - Core functionality

  - Safety-critical features


  ### Should Have


  Important items that add significant value but aren't vital for launch. These
  should be included if time and resources allow.


  **Characteristics:**

  - Important but not critical

  - Can be delivered in a future release if necessary

  - Workarounds exist if not delivered

  - High value but not essential


  ### Could Have


  Nice-to-have items that would improve the user experience but have minimal
  impact if left out. These are typically included only if time permits.


  **Characteristics:**

  - Desirable but not necessary

  - Small impact if not delivered

  - Can easily be dropped

  - Often cosmetic or minor improvements


  ### Won't Have (This Time)


  Items that are explicitly labeled as out of scope for this release. This is
  crucial for managing expectations and preventing scope creep.


  **Characteristics:**

  - Least critical

  - Not appropriate for this release

  - May be considered in future

  - Helps set clear boundaries


  ## When to Use MoSCoW


  The MoSCoW method is particularly useful when:

  - There's a set deadline that must be met

  - You need to deliver on a fixed timeline

  - Stakeholder alignment is critical

  - Resources are constrained

  - Scope creep is a risk


  ## Implementation Tips


  ### Limit Your Must-Haves


  If everything is a must-have, nothing is. Typically, no more than 60% of
  requirements should be must-haves.


  ### Involve Stakeholders


  Get buy-in from all stakeholders on the categorization. This creates shared
  understanding and commitment.


  ### Document Why


  Document the reasoning behind each priority assignment. This helps with future
  decision-making and communication.


  ### Review Regularly


  Priorities can change. Review your MoSCoW categorization regularly, especially
  in longer projects.


  ## Benefits


  - Clear prioritization framework

  - Prevents scope creep

  - Manages stakeholder expectations

  - Facilitates difficult conversations

  - Provides flexibility within constraints

  - Easy to understand and communicate

  - Forces realistic planning


  ## Comparison with Other Methods


  **MoSCoW vs. RICE**: The MoSCoW method is used when there's a set deadline and
  you need to meet that deadline, while RICE is better for ongoing product
  roadmap planning.


  **MoSCoW vs. Eisenhower Matrix**: MoSCoW is project-focused with stakeholder
  input, while Eisenhower is more personal productivity-oriented.


  ## Best Use Cases


  - Agile software development

  - Project management with fixed deadlines

  - Feature prioritization

  - Product releases

  - Requirements gathering

  - Stakeholder negotiation
