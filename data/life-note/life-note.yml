markdown: >-
  ## Overview


  Life Note is an AI journaling app that lets you journal with history's
  greatest minds, getting personalized wisdom from Steve Jobs, Aristotle, Marcus
  Aurelius, and more. Available free on iOS, Android, and Web, it combines
  evidence-based journaling practices with AI mentorship.


  ## Core Philosophy


  Life Note's philosophy combines **wisdom + reflection + agency**. It's
  described as a wisdom engine designed to help you live an aligned, meaningful
  life by connecting ancient wisdom with modern self-improvement practices.


  ## Key Features


  **Mentor Intelligence**

  Personas inspired by 1,000 great minds across 20+ disciplines provide
  personalized guidance based on your journal entries and goals.


  **Goal Awareness**

  The AI reads your goals, recognizes patterns, and helps you stay aligned with
  what matters most.


  **Weekly Reflection Engine**

  Every Sunday, receive a mentor letter summarizing your progress, insights, and
  areas for growth.


  **End-to-End Encryption**

  Utilizes AES-GCM encryption — the same standard used by governments — meaning
  even Life Note's own team cannot read your entries.


  **Personalized Accountability**

  AI journaling enhances goal achievement through:

  - Asking clarifying questions

  - Identifying patterns blocking progress

  - Providing encouragement without judgment

  - Adapting to your unique journey


  ## Evidence-Based Benefits (2026)


  Research in 2026 shows AI-augmented journaling significantly improves:

  - Emotional regulation

  - Self-awareness

  - Cognitive flexibility

  - Goal achievement rates


  These benefits exceed those of unguided writing alone.


  ## Use Cases


  - Seeking clarity through self-reflection

  - Working through anxiety

  - Pursuing meaningful personal development

  - Setting and achieving life goals

  - Processing complex emotions

  - Making difficult decisions


  ## Platform Availability


  iOS, Android, and Web platforms.


  ## Pricing


  Life Note is the most affordable premium AI journaling option at
  **$9.99/month**, with a free tier available to get started.
