markdown: >-
  ## Overview


  Complice is an intention-driven productivity tool that helps users set daily
  intentions, track progress through pomodoros, and reflect on alignment between
  actions and broader goals.


  ## Core Philosophy


  - Focus on intentions rather than just tasks

  - Connect daily actions to long-term goals

  - Regular reflection on what matters

  - Mindful productivity over mere busyness

  - Iterative goal refinement


  ## Features


  - Daily intention setting

  - Pomodoro timer integration

  - Goal hierarchy (outcomes, goals, intentions, tasks)

  - Daily and weekly review rituals

  - Progress visualization

  - Accountability partnerships

  - Habit tracking

  - Journal integration


  ## Intention System


  - Set daily intentions aligned with goals

  - Break intentions into concrete actions

  - Track time spent on each intention

  - Review and reflect on outcomes

  - Adjust based on learnings


  ## Target Users


  Mindful productivity practitioners, goal-oriented individuals, people seeking
  meaningful work alignment, reflective professionals
