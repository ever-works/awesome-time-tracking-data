markdown: >-
  ## Overview


  Getting Things Done (GTD) by David Allen introduces a comprehensive system for
  managing tasks and projects, enabling stress-free productivity through clarity
  and efficient organization.


  ## The Five Steps of GTD


  1. **Capture**: Collect everything that has your attention

  2. **Clarify**: Process what each item means and what to do about it

  3. **Organize**: Put it where it belongs

  4. **Reflect**: Review frequently

  5. **Engage**: Simply do


  ## Core Principles


  - **Mind Like Water**: Achieve a calm, ready state

  - **Next Actions**: Define concrete next steps for everything

  - **Contexts**: Organize by where/how tasks can be done

  - **Projects**: Track multi-step outcomes

  - **Weekly Review**: Regular system maintenance

  - **Someday/Maybe**: Capture ideas without commitment


  ## Impact


  GTD has become one of the most influential productivity methodologies,
  spawning countless apps, books, and dedicated practitioners worldwide.


  ## Target Audience


  Knowledge workers overwhelmed by tasks, projects, and commitments seeking a
  comprehensive organizational system.


  ## Recognition


  Considered essential reading for productivity and consistently recommended in
  2026.


  ## Format


  Available in multiple formats, with updated editions.
