markdown: >-
  ## Overview


  Motion Meeting Assistant is an AI-driven feature within the Motion
  productivity platform that streamlines meeting coordination by automatically
  handling scheduling based on predefined user preferences and intelligent
  calendar optimization.


  ## Key Features


  ### Automatic Meeting Coordination


  - Handles meeting scheduling without manual calendar negotiation

  - Creates booking links for external meetings

  - Finds optimal time slots within designated work hours

  - Adjusts dynamically as calendar changes


  ### Smart Scheduling Preferences


  **User-Configurable Settings**:

  - Preferred meeting times (e.g., afternoons only)

  - Meeting batching preferences (group meetings together)

  - Daily meeting limits (maximum meetings per day)

  - Buffer periods between meetings

  - Minimum advance notice for bookings


  ### Focus Time Protection


  Motion's AI ensures that:

  - Meetings are clustered to preserve large blocks of uninterrupted time

  - Deep work sessions aren't fragmented by scattered meetings

  - High-priority tasks get protected time slots

  - Back-to-back meeting marathons are avoided when specified


  ## How It Works


  1. **Set Preferences**: Define your ideal meeting parameters

  2. **Share Booking Link**: Provide link to meeting requesters

  3. **AI Finds Best Time**: Motion analyzes both calendars and constraints

  4. **Auto-Confirms**: Meeting is scheduled without manual intervention

  5. **Dynamic Adjustment**: If priorities change, Motion can reschedule


  ## Integration with Motion Ecosystem


  The Meeting Assistant works alongside Motion's other AI features:

  - **Task Scheduling**: Meetings scheduled around prioritized work

  - **Project Deadlines**: Meeting times consider project commitments

  - **Team Coordination**: Group meetings respect all attendees' preferences

  - **Calendar Sync**: Works with Google Calendar, Outlook, etc.


  ## Benefits for Knowledge Workers


  - **Reduced Coordination Overhead**: No more email tennis for scheduling

  - **Protected Deep Work**: Meetings don't fragment productive time

  - **Consistent Boundaries**: Automatic enforcement of meeting policies

  - **Better Energy Management**: Schedule meetings during lower-energy periods

  - **Context Switching Reduction**: Meeting batching minimizes task
  interruptions


  ## Use Cases


  **For Individual Contributors**:

  - Protect morning hours for deep work

  - Limit meetings to 3-4 per day

  - Batch all meetings in afternoon


  **For Managers**:

  - Designate "office hours" for 1-on-1s

  - Prevent meeting overload

  - Ensure time for individual contribution work


  **For Client-Facing Roles**:

  - Set availability windows for client calls

  - Maintain internal team time

  - Respect time zone differences


  ## 2026 Context


  As part of Motion's $60M Series C funding in 2025, the Meeting Assistant
  represents the evolution toward fully AI-managed calendars where human
  intervention is minimized and scheduling decisions align with productivity
  optimization rather than just calendar availability.


  ## Limitations


  - Requires all participants to respect the automated suggestions

  - May need manual override for urgent or sensitive meetings

  - Effectiveness depends on accurate preference configuration

  - Works best when organization culture supports automated scheduling


  ## Pricing


  Included as part of Motion's standard subscription, which starts around
  $19-34/month depending on plan and billing cycle.
