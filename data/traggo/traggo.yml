markdown: >-
  ## Overview


  Traggo is an open-source time tracking tool that uses a tag-based system to
  help users log and manage their time efficiently. In Traggo there are no
  tasks, only tagged time spans, providing a flexible approach to time tracking.


  ## Features


  ### Tag-Based System

  - Assign multiple tags to a single task

  - Easy categorization and filtering of time entries

  - Flexible organization without rigid task structures


  ### Data Privacy & Control

  - Self-hosted deployment

  - Full control over your data

  - Host on your own server

  - No third-party data access


  ### Visualization & Reporting

  - Customizable dashboards with diagrams

  - List view of tracked time

  - Calendar view of tracked time

  - Export data in CSV and JSON formats

  - Easy report generation and sharing


  ### Mobile Responsive

  - Works on smartphones, tablets, and desktop

  - Responsive design for time tracking on the go

  - Cross-device accessibility


  ## Technical Details


  - Written in Go

  - Open source (available on GitHub)

  - Self-hosted deployment required


  ## Use Cases


  Ideal for users who:

  - Value data privacy and want self-hosted solutions

  - Prefer flexible tagging over rigid task hierarchies

  - Need multi-dimensional categorization of time

  - Want customizable reporting and dashboards


  ## Pricing


  Free and open-source. Self-hosting required.
