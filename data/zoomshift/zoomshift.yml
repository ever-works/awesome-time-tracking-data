markdown: >-
  ## Overview


  ZoomShift is an employee scheduling tool designed specifically for
  restaurants, whether indie establishments or national franchises, to help save
  time and money. It's a top choice for small to medium-sized restaurants
  needing agile scheduling tools.


  ## Features


  ### Scheduling Capabilities

  - Easily copy shifts from day-to-day or week-to-week

  - Unlimited templates for every shift, location, and season

  - Drag-and-drop scheduling tool creates conflict-free schedules based on
  restaurant needs

  - Create, adjust, and share employee schedules in minutes reducing scheduling
  conflicts and improving coverage


  ### Labor Cost Management

  - Real-time views of costs to instantly make changes for heavy nights

  - Compare labor costs with average revenue for each day

  - Helps restaurant managers save considerable man-hours, stay on top of labor
  budgets, and reduce human error in payroll calculations


  ### Mobile Accessibility

  - Available for both Android and iOS

  - Downloadable from Google Play Store and Apple App Store


  ## Pricing


  ZoomShift offers user-based pricing:

  - Essentials plan: $0 for small teams of up to 20 users

  - Paid pricing: Starts at $2 per user monthly


  ## Use Cases


  - Independent restaurants and national franchises

  - Small to medium-sized businesses

  - Teams requiring agile scheduling with real-time cost visibility
