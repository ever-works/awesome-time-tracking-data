markdown: >-
  ## Overview


  Calendly automates meeting scheduling by providing booking links where
  invitees can see your availability and select times that work for both
  parties. This eliminates email ping-pong and saves 5-10 minutes per meeting
  scheduled.


  ## Key Features


  - Personal booking links

  - Calendar integration (Google, Outlook, iCloud)

  - Customizable availability rules

  - Team scheduling (round robin, collective)

  - Buffer time between meetings

  - Meeting types with different durations

  - Payment collection

  - Custom confirmation pages

  - Automated reminders

  - Zoom/Teams integration


  ## Use Cases


  - Sales demos and consultations

  - Client meetings

  - Recruitment interviews

  - Office hours

  - Service provider appointments


  ## Pricing


  Free: Basic features

  Essentials: $10/month

  Professional: $15/month

  Teams: $20/user/month
