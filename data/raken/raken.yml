markdown: >-
  ## Overview


  Raken is a construction timesheet app and software platform designed
  specifically for construction teams working on jobsites. The platform enables
  field teams to track time, manage daily reports, and integrate with broader
  project management workflows.


  ## Key Features


  - **Construction-Specific Workflows**: Built specifically for construction
  industry needs and processes

  - **Mobile-First Design**: Optimized for field workers to clock in and out
  from jobsites

  - **Daily Reporting Integration**: Timesheets integrate with daily
  construction reports

  - **Project Tracking**: Link time entries to specific construction projects
  and tasks

  - **Field-Optimized Interface**: Designed for ease of use on construction
  sites


  ## Target Users


  Construction companies, general contractors, subcontractors, and construction
  field teams who need specialized time tracking that understands construction
  workflows and terminology.


  ## Benefits


  - Streamlines timesheet collection from field teams

  - Reduces administrative burden of tracking construction labor hours

  - Improves accuracy of job costing and labor allocation

  - Integrates time data with daily construction reports for comprehensive
  project tracking

  - Mobile accessibility ensures workers can track time from any jobsite
