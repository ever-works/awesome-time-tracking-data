markdown: >-
  ## Overview


  The Energy Audit Method is a systematic approach to understanding and
  optimizing personal energy patterns across four dimensions: physical,
  emotional, mental, and spiritual. Similar to a financial audit, it helps
  identify energy leaks and optimize allocation for peak performance.


  ## The Four Energy Dimensions


  ### 1. Physical Energy

  - Sleep quality and quantity

  - Nutrition and hydration

  - Exercise and movement

  - Rest and recovery periods


  ### 2. Emotional Energy

  - Positive vs. negative emotional states

  - Emotional resilience

  - Stress management

  - Relationship quality


  ### 3. Mental Energy

  - Concentration ability

  - Decision-making quality

  - Creative thinking

  - Mental endurance


  ### 4. Spiritual Energy

  - Values alignment

  - Purpose clarity

  - Motivation and drive

  - Contribution feeling


  ## How to Conduct an Energy Audit


  ### Step 1: Track (1-2 Weeks)

  Record hourly energy levels, activities, meals, emotions, focus quality
  throughout each day.


  ### Step 2: Identify Patterns

  Discover energy peaks, drains, optimal times for different work types.


  ### Step 3: Map Schedule

  Align demanding work with high-energy periods, admin tasks with low-energy
  times.


  ### Step 4: Implement

  Redesign schedule based on findings.


  ### Step 5: Monitor

  Weekly check-ins, monthly reviews, quarterly re-audits.


  ## Biological Prime Time


  Energy audits often reveal 3-4 hour window of peak alertness. Research shows
  optimizing around this Biological Prime Time provides **20-40% productivity
  boost**.


  ## Benefits


  - Increased productivity during peak hours

  - Reduced burnout through sustainable pacing

  - Better decision quality

  - Enhanced wellbeing


  ## 2026 Relevance


  Aligns with energy management movement, CEO Energy Index, and shift from
  time-based to energy-based performance metrics.
