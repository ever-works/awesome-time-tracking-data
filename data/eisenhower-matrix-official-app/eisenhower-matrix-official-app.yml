markdown: >-
  ## Overview


  The official Eisenhower Matrix app (updated January 12, 2026) brings proven
  time management methodology directly to Android, transforming overwhelming
  to-do lists into clear, actionable priorities.


  ## Features


  - **Four Quadrants**: Organize tasks by urgent/important, important/not
  urgent, urgent/not important, not urgent/not important

  - **Task Management**: Add, edit, and organize tasks within quadrants

  - **Priority Visualization**: See at a glance what needs immediate attention

  - **Quick Sorting**: Easily move tasks between quadrants

  - **Multiple Projects**: Manage up to 5 projects on free plan

  - **Task Limits**: 100 tasks on free tier

  - **Clean Interface**: Minimalist design focused on clarity

  - **Cross-Device Sync**: Keep tasks synced across devices


  ## Methodology


  Based on President Eisenhower's decision-making framework: "What is important
  is seldom urgent and what is urgent is seldom important."


  ## Pricing


  Free for 5 projects and 100 tasks, no credit card required.


  ## Platform


  Android with web version available.
