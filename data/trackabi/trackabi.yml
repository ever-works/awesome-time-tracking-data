markdown: >-
  ## Overview


  Trackabi is an affordable time tracking and employee monitoring tool designed
  for small businesses managing remote teams. It offers essential time tracking
  features combined with productivity monitoring.


  ## Features


  - **Time Tracking**: Manual and automatic time tracking options

  - **Screenshots**: Periodic screenshot capture for remote workers

  - **Activity Monitoring**: Track keyboard and mouse activity levels

  - **Project Management**: Organize work by projects and tasks

  - **Timesheet Management**: Digital timesheets with approval workflows

  - **Reporting**: Comprehensive time and productivity reports

  - **Attendance Tracking**: Monitor employee work hours and schedules

  - **Invoicing**: Generate invoices based on tracked time

  - **Team Dashboard**: Real-time overview of team activity

  - **Offline Tracking**: Continue tracking when offline

  - **Privacy Controls**: Configurable monitoring settings

  - **Mobile Apps**: iOS and Android time tracking


  ## Pricing


  - **Free**: Up to 3 users with basic features

  - **Pro**: $5/user/month - All features including screenshots

  - **Enterprise**: Custom pricing - Advanced features and support

  - All paid plans include unlimited projects and clients
