name: LeechBlock NG
description: Free browser extension for blocking time-wasting websites with
  highly customizable blocking rules, schedules, and password protection.
  Supports complex configurations including time-of-day restrictions, keyword
  filtering, and up to 30 different website block sets across Chrome, Edge,
  Firefox, and other Chromium-based browsers.
