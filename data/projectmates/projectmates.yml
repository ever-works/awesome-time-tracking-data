markdown: >-
  ## Overview


  Projectmates is an award-winning construction project management software
  designed specifically for project owners, with particular expertise in
  managing large-scale healthcare and institutional construction programs.


  ## Healthcare Capital Planning


  Projectmates' healthcare capital planning process streamlines the entire
  cycle, automatically ranking project requests based on customizable factors.
  The software provides essential tools for navigating healthcare regulations
  with audit trails, user permissions, and robust document control.


  ## Project Lifecycle Management


  Projectmates manages the complete construction project lifecycle:


  **Planning Phase**:

  - Capital planning and project request management

  - Automated project prioritization

  - Budget allocation and forecasting

  - Feasibility studies documentation


  **Pre-Construction**:

  - 100% digital bid management from one location

  - Request for Proposals (RFP) management

  - Vendor qualification and selection

  - Contract management


  **Construction Phase**:

  - RFIs (Requests for Information)

  - Submittals tracking and approval

  - Punch lists management

  - ILSM (Interim Life Safety Measures) logs

  - Infection control procedures


  **Financial Management**:

  - Real-time financial reports

  - Integration with accounting software

  - Budget vs. actual tracking

  - Change order management

  - Cost forecasting


  **Closeout**:

  - Final documentation collection

  - As-built drawings management

  - Warranty tracking

  - Project archives


  ## Time Tracking Features


  While primarily focused on project management, Projectmates includes:

  - Time allocation tracking by project phase

  - Resource time logging

  - Consultant and contractor time approval

  - Integration with project costs


  ## Healthcare-Specific Features


  - ILSM compliance tracking

  - Infection control procedure documentation

  - Joint Commission readiness

  - HIPAA-compliant data management

  - Multi-facility program coordination


  ## Notable Healthcare Clients


  - Reading Hospital (Tower Health)

  - UNC Health Care

  - Stony Brook Medicine

  - UT Southwestern (managing over $1 billion in projects)

  - Midland Memorial Hospital

  - Trilogy Health Services


  ## Key Benefits for Owners


  - Centralized data for all projects

  - Real-time push notifications for pending approvals

  - Quick, secure, and efficient access to documentation

  - Reduced project delays through streamlined workflows

  - Better budget control and cost management

  - Improved regulatory compliance


  ## Collaboration Features


  - Owner, architect, contractor, and vendor portals

  - Real-time document sharing

  - Automated notifications and reminders

  - Digital approval workflows

  - Communication tracking and audit trails


  ## Integration Capabilities


  - Accounting software integration

  - Email systems

  - Document management systems

  - Building Information Modeling (BIM) platforms


  ## Ideal For


  - Healthcare systems with major construction programs

  - Universities and educational institutions

  - Government agencies

  - Corporate owner organizations

  - Construction program managers

  - Facilities departments managing multiple projects


  ## Pricing


  Projectmates offers custom pricing based on organization size, number of
  projects, and required modules.
