name: Parkinson's Law
description: The adage that work expands to fill the time available for its
  completion, used in time management to set tighter deadlines and prevent
  unnecessary expansion of tasks.
source_url: https://www.atlassian.com/blog/productivity/what-is-parkinsons-law
category: Time Management Principle
