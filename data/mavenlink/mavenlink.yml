markdown: >-
  ## Overview


  Mavenlink (now part of Kantata following its merger with Kimble PSA) is
  project and resource management software focused on professional services
  organizations.


  ## Features


  - Real-time time tracking (automatic and manual)

  - Project accounting and financial management

  - Resource planning and allocation

  - Team collaboration tools

  - Expense tracking and reporting

  - Customized invoice generation

  - QuickBooks integration

  - Universal time entry interface

  - Project profitability tracking


  ## Target Market


  Professional services companies in marketing, advertising, creative agencies,
  software, IT services, and management consulting.


  ## Pricing


  Mavenlink Professional plan costs $39 per user per month, including advanced
  accounting features like expense and time tracking, invoicing templates, and
  integrations.
