  - understanding
markdown: >-
  ## Core Concept


  ADHD operates on **interest, not importance**. The ADHD nervous system
  requires novelty, urgency, challenge, or passion to engage.


  ## The Four Motivators


  **Novelty**

  New and interesting triggers engagement.


  **Urgency**

  Deadlines and pressure activate focus.


  **Challenge**

  Difficult but achievable tasks engage.


  **Passion**

  Personal interest drives action.


  ## Implications


  **Why Important Tasks Are Hard**

  Boring but important tasks don't trigger engagement.


  **Why Hyperfocus Occurs**

  Interesting activities capture complete attention.


  **Why Deadlines Help**

  Urgency makes tasks interesting/engaging.


  ## Working With It


  **Add Novelty**

  Change environment, method, or approach.


  **Create Urgency**

  Use external deadlines and accountability.


  **Gamify Tasks**

  Add challenge elements.


  **Connect to Passion**

  Link boring tasks to interests.


  ## Connection to Other Concepts


  - Hunter vs. Farmer theory

  - Dopamine Menu

  - Urgency Creation (11:59 Protocol)

  - Hyperfocus triggering


  ## Pricing


  Not applicable - this is psychological understanding of ADHD.
