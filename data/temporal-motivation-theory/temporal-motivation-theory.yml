name: Temporal Motivation Theory
description: An integrative motivational theory developed by Piers Steel that
  mathematically models procrastination and time management through the formula
  Motivation = (Expectancy × Value) / (1 + Impulsiveness × Delay), explaining
  how deadlines, task value, self-efficacy, and impulsivity interact to
  influence motivation over time.
