markdown: >-
  ## Overview


  The Eat the Frog method is a time management technique that helps you stop
  procrastinating by tackling your most challenging task first thing in the
  morning. The name comes from a Mark Twain quote: "If it's your job to eat a
  frog, it's best to do it first thing in the morning."


  ## How It Works


  **Daily Process:**

  1. Identify your "frog" - the most important, challenging, or dreaded task

  2. Complete it first thing in the morning before anything else

  3. Give it your full focus and energy

  4. Only move to other tasks after the frog is eaten


  **Ideal Frog Characteristics:**

  - Takes between one and four hours

  - Requires deep focus

  - Has significant impact on your goals

  - Is something you're likely to procrastinate on


  ## Connection to Deep Work


  Eating the frog supports deep work by requiring extreme focus. According to
  productivity expert Cal Newport, the modern workplace isn't set up to support
  distraction-free "deep work," making the morning frog strategy even more
  valuable.


  ## Benefits


  - Eliminates procrastination on important tasks

  - Provides momentum for the rest of the day

  - Leverages peak morning energy and focus

  - Ensures critical work gets done

  - Reduces stress and anxiety

  - Creates sense of accomplishment early


  ## Implementation Tips


  - Identify your frog the night before

  - Protect your morning time fiercely

  - Eliminate all distractions during frog time

  - Start with the hardest subtask first

  - Celebrate completion before moving on

  - Make it a daily habit
