markdown: >-
  ## Overview


  MonkeyGTD is a complete Getting Things Done implementation built on
  TiddlyWiki, a self-contained wiki in a single HTML file. It provides all GTD
  workflows (capture, clarify, organize, reflect, engage) in a portable,
  offline-first format that works in any web browser.


  ## Features


  - **Complete GTD System**: Full implementation of David Allen's methodology

  - **Single File**: Entire system in one portable HTML file

  - **No Server Required**: Runs locally in web browser

  - **Open Source**: Free and customizable

  - **Cross-Platform**: Works on any OS with a browser

  - **Portable**: Carry on USB drive, sync via cloud

  - **Projects & Actions**: Hierarchical organization

  - **Contexts**: Tag actions by location/tool needed

  - **Areas of Focus**: Organize by life area

  - **Waiting For**: Track delegated items

  - **Someday/Maybe**: Capture future possibilities

  - **Weekly Review**: Structured review workflow


  ## GTD Workflow Support


  1. **Capture**: Quick inbox entry

  2. **Clarify**: Process inbox items

  3. **Organize**: File into projects, contexts, areas

  4. **Reflect**: Weekly review system

  5. **Engage**: Context-based action lists


  ## Benefits


  - Completely free and open source

  - Works offline

  - Own your data

  - Highly customizable

  - No subscription or account needed

  - Privacy-focused (data never leaves your device)


  ## Limitations


  - Steeper learning curve than modern apps

  - Basic interface compared to commercial tools

  - No mobile apps (web-based only)

  - Manual sync between devices


  ## Pricing


  Completely free and open source.
