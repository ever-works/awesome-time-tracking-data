markdown: >-
  ## Overview


  Clockspot is a web-based timesheet tracking solution designed for simplicity
  and ease of use. The platform allows managers to review, edit, and approve
  timesheets online from one simple hub with no software to install and
  instantaneous updates across the cloud.


  ## Features


  - Multiple clock-in options: telephone, web browser, or mobile app

  - Real-time timesheet updates accessible from any device

  - Job codes and project tracking

  - Overtime calculation and leave management

  - Pay run processing and accrual calculations

  - Export to Excel and PDF for payroll integration

  - GPS tracking to see where employees clocked in from

  - Beautiful and simple user interface with minimal learning curve


  ## Use Cases


  Ideal for businesses that need a straightforward time tracking system without
  complexity, Clockspot works well for field teams, remote workers, and
  businesses of all sizes.


  ## Pricing


  Pricing information available on the Clockspot website with various plans
  based on number of employees.
