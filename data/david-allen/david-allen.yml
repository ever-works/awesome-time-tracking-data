markdown: >-
  ## Overview


  David Allen is a productivity consultant who founded the David Allen Co. and
  created the Getting Things Done (GTD) methodology, a 5-step system for
  managing tasks, commitments, and information.


  ## Notable Works


  - **Getting Things Done: The Art of Stress-Free Productivity** - International
  best-seller introducing the GTD methodology

  - **Ready for Anything: 52 Productivity Principles for Getting Things Done**

  - **Making It All Work: Winning at the Game of Work and the Business of Life**


  ## GTD Method


  The Getting Things Done framework consists of five steps:

  1. **Capture** - Collect tasks, ideas, and commitments into an external system

  2. **Clarify** - Process each item to determine if it is actionable

  3. **Organize** - Sort actionable items into appropriate lists and categories

  4. **Reflect** - Regularly review your system to stay current and focused

  5. **Engage** - Execute tasks based on context, time, energy, and priority


  ## Philosophy


  Allen's approach centers on the idea that the mind is for having ideas, not
  holding them. By externalizing all commitments into a trusted system,
  individuals can reduce stress and focus on execution rather than remembering
  what needs to be done.
