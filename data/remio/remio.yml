markdown: >-
  ## Overview


  remio is an AI-powered personal knowledge hub designed to help users collect,
  organize, and utilize information efficiently. It acts as an AI Second Brain
  by automatically capturing web pages browsed, syncing local files,
  transcribing meetings, and saving emails — all organized into a single
  searchable knowledge base without manual effort.


  ## Key Features


  - **Auto-save Web Pages**: Automatically saves web pages visited during normal
  browsing for later search, recall, and Q&A.

  - **Unlimited Local File Sync**: Silently captures and organizes local files
  in the background without manual uploads.

  - **Free Audio Transcription**: Records and transcribes meetings locally with
  no bots or extra devices required.

  - **Browser Copilot**: Browser extension for summarizing long articles or
  videos, available both in-app and as an extension.

  - **Agentic RAG + Vision**: AI-powered retrieval-augmented generation with
  vision capabilities for querying across the knowledge base.

  - **Smart Todo**: Automatically surfaces action items from meetings, emails,
  and web content based on user preferences.

  - **AI Search (Ask remio)**: Conversational search across the entire knowledge
  base with precise source citations.

  - **AI Summary**: Generates concise summaries for long articles and videos.

  - **Smart Organization**: AI automatically suggests Collections to
  systematically organize information and discover connections between knowledge
  pieces.

  - **Periodic Recaps**: Summarizes accumulated knowledge over time to help
  users connect dots and track personal growth.

  - **App Market**: Explores agentic apps that grow with the user's knowledge
  and automate daily tasks.

  - **Mobile Support**: Capture ideas, jot notes, record, and save pages on
  mobile devices.


  ## How It Works


  1. **Connect Sources**: Set up data sources (files, meetings, emails, web
  content) — remio handles the rest.

  2. **Automatic Capture**: remio runs silently in the background, capturing
  information automatically.

  3. **Ask AI**: Pose questions conversationally and receive distilled answers
  from the knowledge base.


  ## Platform Support


  - Windows 10+ (x64)

  - M-Chip Macs

  - Mobile (iOS/Android for note capture and idea saving)


  ## Privacy and Architecture


  - **Local-First Design**: All data processing and storage happens locally on
  the user's device for maximum privacy and security.

  - No cloud bots or third-party devices required for recording and
  transcription.


  ## Pricing


  Free to get started.
