markdown: >-
  ## Overview


  The Law of Three (also called Rule of Three) is a productivity principle
  popularized by Brian Tracy that states only three tasks and activities account
  for 90% of the value of the contribution you make to your business, no matter
  how many different things you do.


  ## How It Works


  The rule is simple:

  - Write down three things you want to accomplish **today**

  - Write down three things you want to accomplish this **week**

  - Write down three things you want to achieve this **year**


  ## Core Philosophy


  The Law of Three forces you to identify what truly moves the needle in your
  work and life. It removes the guesswork - you already know your priorities.
  Most importantly, it acts as a forcing function, compelling you to be ruthless
  about what you focus on since you can only choose three main priorities for
  each timeframe.


  ## Key Benefits


  - **Clarity**: Eliminates confusion about what matters most

  - **Focus**: Concentrates effort on high-value activities

  - **Simplicity**: Easy to remember and implement

  - **Scalability**: Works across different time horizons

  - **Productivity**: 90% of value from just three activities

  - **Decision-making**: Clear framework for saying no


  ## Implementation Steps


  1. **Daily Three**: Every morning, identify the three most important tasks
  that will create the most value today

  2. **Weekly Three**: At the start of each week, determine the three key
  outcomes that will make the week successful

  3. **Yearly Three**: At the beginning of the year, set three major goals that
  align with your long-term vision


  ## Comparison with Similar Methods


  **vs. 1-3-5 Rule**: The 1-3-5 rule (one big task, three medium, five small)
  focuses on daily task volume, while the Law of Three emphasizes impact across
  multiple timeframes.


  **vs. MIT Method**: Most Important Tasks (MIT) typically identifies 2-3 daily
  priorities, similar to the daily aspect of the Law of Three, but without the
  weekly/yearly framework.


  **vs. Warren Buffett's 5/25**: Buffett's method uses 25 goals narrowed to 5,
  while the Law of Three is more restrictive with just 3 priorities.


  ## Common Challenges


  - **Too many priorities**: Resisting the urge to add "just one more" task

  - **Changing priorities**: Staying committed to the three even when new
  opportunities arise

  - **Urgent vs. important**: Not letting urgent tasks replace important ones


  ## Best Practices


  - Review and reaffirm your three priorities regularly

  - Align daily priorities with weekly and yearly goals

  - Block calendar time for your three priorities first

  - Say no to activities outside your three focuses

  - Evaluate activities against contribution to your three goals


  ## Real-World Application


  In business, your three daily tasks might be: close a major sale, hire a key
  team member, and finalize product strategy. Your three weekly goals could be:
  increase revenue by 10%, complete team restructuring, and ship product update.
  Your three yearly objectives might be: double company revenue, expand to new
  market, and build world-class team.
