name: Must-Should-Want Method
description: A prioritization framework created by Jay Shirley in 2014 that
  categorizes daily tasks into three levels—Must (essential impact), Should
  (long-term goals), and Want (enjoyment)—to boost productivity while preventing
  burnout.
