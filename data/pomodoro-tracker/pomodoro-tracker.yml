markdown: >-
  ## Overview


  Pomodoro Tracker is a productivity app designed for work and study that helps
  you stay focused and finish tasks effectively. It combines the proven Pomodoro
  Technique with comprehensive task management features to support daily
  planning and work-life balance.


  ## Core Features


  ### Pomodoro Timer

  Structured time management based on the Pomodoro Technique:

  - 25-minute focus sessions

  - Short breaks between Pomodoros

  - Long breaks after completing cycles

  - Customizable intervals


  ### Task Management

  **Daily Planning**: At the beginning of each day, select tasks you need to
  complete and organize them on your TODO list


  **Task Sizing Guidelines**:

  - If a task takes more than 5-7 Pomodoros, break it down into smaller tasks

  - If a task takes less than one Pomodoro, combine it with another task

  - Proper task sizing improves estimation and completion rates


  ## Work-Life Balance Focus


  Pomodoro Tracker helps you:

  - Take more time for your life

  - Avoid overwork and burnout

  - Balance productivity with rest

  - Maintain sustainable work habits

  - Track time spent on different activities


  ## Key Benefits


  ### Improved Focus

  - Dedicated focus periods

  - Distraction elimination

  - Regular breaks prevent fatigue


  ### Better Planning

  - Daily task organization

  - Realistic time estimation

  - Progress tracking

  - Priority management


  ### Enhanced Productivity

  - Structured approach to work

  - Clear start and end times

  - Measurable progress

  - Completion satisfaction


  ## How to Use


  1. **Morning Planning**: Create your daily TODO list

  2. **Task Sizing**: Break down or combine tasks as needed

  3. **Start Pomodoro**: Begin a 25-minute focus session

  4. **Work Focused**: Concentrate on one task

  5. **Take Breaks**: Rest when the timer ends

  6. **Track Progress**: Monitor completed Pomodoros

  7. **Review Day**: Assess accomplishments and adjust


  ## Use Cases


  - Daily work planning

  - Study session management

  - Project task breakdown

  - Time estimation practice

  - Work-life balance tracking

  - Productivity improvement


  ## Target Users


  - Students

  - Knowledge workers

  - Project managers

  - Freelancers

  - Remote workers

  - Anyone seeking better time management

  - People working on long-term projects


  ## Task Management Best Practices


  ### Estimating Tasks

  - Use Pomodoros as estimation units

  - Track actual vs. estimated time

  - Improve estimates over time


  ### Breaking Down Work

  - Large tasks: 5-7+ Pomodoros

  - Medium tasks: 2-4 Pomodoros

  - Small tasks: 1 Pomodoro or combine


  ## Integration Features


  - TODO list management

  - Daily planning workflow

  - Progress tracking

  - Time-based task organization

  - Work session history


