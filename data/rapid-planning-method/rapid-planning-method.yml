markdown: >-
  ## Overview


  The Rapid Planning Method (RPM) was developed by Tony Robbins. It combines
  goal visualization, emotional motivation, and action planning into a
  structured approach.


  ## Three Key Questions


  1. **What do I really want?** - Define the specific, measurable outcome you're
  after

  2. **What's my purpose?** - What are your reasons? Why is this not just a
  'should' but a 'must' for you?

  3. **What do I need to do?** - What is your massive action plan?


  ## Core Philosophy


  RPM considers the big vision, emotional motivation, and taking massive action
  for each of your goals, ensuring that tasks are connected to deeper purpose
  rather than just checklists.
