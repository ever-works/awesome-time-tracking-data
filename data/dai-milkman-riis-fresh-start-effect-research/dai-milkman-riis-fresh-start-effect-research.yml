markdown: >-
  ## Overview


  In 2014, behavioral scientists Hengchen Dai, Katherine Milkman, and Jason Riis
  published groundbreaking research on the "fresh start effect" - the
  psychological phenomenon where temporal landmarks boost our motivation to
  pursue goals.


  ## Key Research Findings


  ### Gym Visit Data

  - Gym visits spike by 82% at the start of a new year

  - Google searches for "diet" increase dramatically at temporal landmarks

  - People are 33% more likely to exercise at the start of a week

  - People are 47% more likely to exercise at the start of a new semester


  ### Temporal Landmarks


  The research identified that specific types of dates create fresh start
  effects:

  - New Year's Day

  - Birthdays

  - First day of a new month

  - Start of a new week (Mondays)

  - First day of a new semester or school year

  - National holidays that mark new beginnings


  ## Psychological Mechanism


  Temporal landmarks create a sense of psychological separation from our "old
  self," which can boost self-efficacy and motivation. People feel they're
  opening a new chapter, leaving past failures behind.


  ## Duration of Effect


  Motivation typically declines steadily week by week after a temporal landmark.
  By mid-February, brain patterns often settle back to default patterns.


  ## Making It Last


  Research shows motivation is sustained when goals support three psychological
  needs:

  1. **Autonomy**: Feeling the goal is genuinely ours

  2. **Competence**: Feeling capable of progress

  3. **Relatedness**: Feeling supported


  ## Practical Applications


  - Create personal micro-landmarks throughout the year

  - Use fresh start moments to initiate important changes

  - Combine fresh starts with sustainable systems

  - Build support structures before motivation fades


  ## Academic Citation


  The research was published in Management Science and has been widely cited in
  behavioral economics and productivity literature.
