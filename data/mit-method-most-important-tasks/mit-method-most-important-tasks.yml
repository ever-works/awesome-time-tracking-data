markdown: >-
  ## Overview


  The MIT (Most Important Tasks) method is a productivity technique where you
  prioritize your most important tasks each day, typically limiting yourself to
  three MITs that you commit to completing.


  ## How It Works


  1. **Identify Your MITs**: Each morning (or evening before), select 2-3 tasks
  that would make the biggest impact

  2. **Do Them First**: Complete MITs first thing in the morning or when you
  first get to work

  3. **Goal Connection**: At least one MIT should relate to your longer-term
  goals

  4. **Focus Question**: Ask yourself "What are the things that—if I got them
  done today—would make a huge difference?"


  ## Key Principles


  - **Limited Daily Focus**: Restrict to 2-3 MITs maximum to maintain realistic
  expectations

  - **Morning Priority**: Tackle MITs when energy and willpower are highest

  - **Goal Alignment**: Connect daily MITs to broader objectives

  - **Completion Over Perfection**: Focus on getting MITs done, not perfect

  - **Everything Else is Bonus**: Completing MITs means the day is already
  successful


  ## Benefits


  - Prevents reactive work from consuming your day

  - Ensures high-value work gets attention

  - Reduces overwhelm by limiting daily commitments

  - Creates sense of accomplishment early in the day

  - Builds momentum for remaining tasks


  ## Origin


  Popularized by Zen Habits and productivity thought leaders, the MIT method
  provides a simple framework for daily prioritization without complex systems
  or tools.
