markdown: >-
  ## Overview


  SocialSchedules by OpenSimSim is a modern employee scheduling platform that
  combines shift scheduling, time tracking, time off management, shift
  replacements, and in-app messaging into a single solution. Originally branded
  as OpenSimSim, the product has been rebranded to SocialSchedules.


  ## Features


  - **Drag & Drop Scheduling**: Visual interface for creating and adjusting
  employee schedules easily

  - **Time Tracking**: Built-in time clock for tracking employee hours

  - **Time Off Management**: Employees can request leave with notes; managers
  can approve/deny

  - **Shift Replacements**: Ability to find and assign replacement workers for
  open shifts

  - **In-App Messaging**: Native private and group chat for managers and team
  members with unlimited chat history

  - **Availability Management**: Track and manage worker availability

  - **Workload Visibility**: Color-coded bird's-eye view of team daily/weekly
  schedules with individual availability

  - **Shift Confirmations**: Employees can confirm their assigned shifts

  - **Overtime Tracking**: Daily and weekly overtime alerts and reporting

  - **Department Filtering**: Filter views by departments, positions, workers,
  and shift status (status filter locked for free users)

  - **Time Cards**: Monthly view with time card filtering

  - **Mobile Time Clock**: Clock in/out via mobile devices (Premium and above)

  - **Auto Break Allocation**: Automated break scheduling (Premium and above)

  - **POS Integrations**: Integrates with Heartland, ADP Workforce Now, and
  Square POS (paid plans only)

  - **Certification Management**: Track employee certifications and compliance
  (Premium and above)

  - **Cloud Storage**: 7-year cloud storage for records (Premium and above)

  - **Recruitment Module**: Built-in hiring and recruitment features

  - **Sales Management Module**: Sales tracking and management capabilities


  ## Pricing


  SocialSchedules offers a free plan and three paid tiers (annual billing):


  | Plan | Price | Key Details |

  |---|---|---|

  | **Free** | $0 | Up to 10 workers, 1 location, 1 department, all core
  scheduling features, 28-day data storage |

  | **Starter** | $12.99/location/month | Unlimited workers, 2 departments,
  shift confirmations, block time off, overtime tracking/reporting, manager
  logbooks |

  | **Premium** | $33.99/location/month | 5 departments, 7-year cloud storage,
  mobile time clock, POS integrations, certification management, auto break
  allocation, advanced reporting |

  | **Enterprise** | Custom | Unlimited locations and departments, dedicated
  support, custom API, custom reports, custom features, negotiated pricing |


  All paid plans include a 14-day free trial of premium features.


  ## Target Users


  - **Ideal for**: Small teams (10 or fewer employees) on the free plan;
  hospitality, restaurant, retail, and service businesses on paid plans

  - **Less suitable for**: Organizations requiring auto-scheduling, labor cost
  forecasting, or extensive custom API access at lower pricing tiers


  ## Mobile Apps


  Available on iOS and Android, though the iOS app has not been updated since
  October 2022 and the Android app has received negative reviews for lacking
  certain web version features.
