markdown: >-
  ## Overview


  When by Daniel H. Pink examines the science of timing, drawing on research
  from psychology, biology, and economics to show how the timing of activities
  affects performance, decision-making, and well-being.


  ## Core Concepts


  - The day is divided into stages that affect cognitive performance
  differently: a peak period, a trough, and a recovery period

  - Most people follow a pattern where analytical tasks are best done in the
  morning, routine work during the afternoon trough, and creative work in the
  late afternoon recovery

  - Chronotypes (larks, third birds, and owls) determine individual timing
  patterns


  ## Key Findings


  - **Break Research**: Taking certain types of breaks can dramatically improve
  performance — including student test scores

  - **The After-Trough Recovery**: The period after the midday trough is ideal
  for creative and insight-based work

  - **Midpoint Effect**: The midpoint of any project or goal period can serve as
  a motivational trigger

  - **Beginning and Ending Effects**: The starts and endings of events
  disproportionately shape how they are remembered


  ## Practical Applications


  The book provides actionable guidance on when to schedule specific types of
  work, when to make decisions, when to take breaks, and how to use timing
  principles in education, healthcare, and business settings.
