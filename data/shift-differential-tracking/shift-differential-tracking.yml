name: Shift Differential Tracking
description: Automated calculation of additional pay for employees working
  evening, night, weekend, or holiday shifts. Tracks shift times, applies
  appropriate premium rates, and ensures accurate payroll for operations
  requiring 24/7 coverage.
source_url: https://www.adp.com/resources/articles-and-insights/articles/s/shift-differential.aspx
category: Time Tracking Practice
tags:
  - payroll
