markdown: |-
  ## Standard Reports

  ### Utilization Report
  - Billable hours / total hours by person
  - Team averages
  - Trends over time
  - Benchmark against targets (70-80%)

  ### Project Profitability
  - Revenue vs. labor cost per project
  - Margin percentages
  - Ranking by profitability
  - Identifies winners and losers

  ### Client Summary
  - Total hours per client
  - Revenue generated
  - Profitability by client
  - Client ranking

  ### Timesheet Status
  - Submitted vs. pending
  - Approval bottlenecks
  - Late submissions
  - Missing entries

  ### Budget Variance
  - Estimated vs. actual hours
  - Over/under budget projects
  - Forecasted completion
  - Trend analysis

  ### Employee Productivity
  - Hours logged per person
  - Billable vs. non-billable ratio
  - Project allocation
  - Overtime patterns

  ### Revenue Forecast
  - Unbilled hours × rates
  - Projected monthly revenue
  - Pipeline analysis
  - Cash flow planning

  ## Custom Reports

  ### Filter Dimensions
  - Date range
  - Client/project
  - Team/department
  - Billable status
  - Tags/categories
  - Employee/role

  ### Metrics Available
  - Hours (total, billable, non-billable)
  - Revenue (billed, projected)
  - Costs (labor, overhead)
  - Profit/margin
  - Utilization rate
  - Budget variance

  ### Visualizations
  - Bar/column charts
  - Line charts (trends)
  - Pie charts (breakdowns)
  - Tables (detailed data)
  - Gauges (KPIs)
  - Heat maps (capacity)

  ## Report Scheduling

  ### Automated Delivery
  - Daily: Timesheet compliance
  - Weekly: Team utilization
  - Bi-weekly: Client summaries
  - Monthly: Financial close reports

  ### Distribution
  - Email PDF attachments
  - Slack/Teams notifications
  - Dashboard links
  - API data feeds

  ## Use Cases

  ### Monday Morning Review
  Manager receives weekly team utilization report:
  - Identifies underutilized team members
  - Reallocates to busy projects
  - Balances workload

  ### Month-End Billing
  Finance receives unbilled hours report:
  - Generates invoices
  - Ensures nothing missed
  - Forecasts revenue

  ### Quarterly Business Review
  Executives review profitability trends:
  - Identify most profitable services
  - Adjust pricing strategy
  - Make hiring decisions

  ## Export Formats

  - PDF: Professional presentation
  - Excel: Further analysis
  - CSV: Data import
  - JSON: API integration
  - Google Sheets: Collaboration

  ## Tools with Strong Reporting

  - Scoro: Advanced analytics
  - Productive.io: Real-time dashboards
  - BigTime: Enterprise reporting
  - Harvest: Simple, clean reports
  - Timely: AI-powered insights

  ## Best Practices

  1. **Start Simple**: Core reports first
  2. **Schedule Automation**: Don't manually run weekly
  3. **Act on Insights**: Reports without action waste time
  4. **Customize for Audience**: Executives vs. managers need different views
  5. **Review Regularly**: Monthly trend analysis
