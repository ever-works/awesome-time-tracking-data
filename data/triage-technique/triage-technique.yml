name: Triage Technique
description: "A task sorting method that divides tasks into three categories:
  things that need immediate action, things that are important but not urgent,
  and things that are a waste of time. Borrowed from medical emergency triage,
  it helps quickly determine which tasks deserve attention and which should be
  discarded."
source_url: https://todoist.com/inspiration/triage-method
category: Time Management Technique
tags:
  - prioritization
  - task-sorting
  - emergency
markdown: >-
  ## Overview


  The Triage Technique applies the medical emergency triage concept to task
  management. It helps you quickly sort through your to-do list and determine
  what deserves your attention.


  ## Three Categories


  1. **Immediate Action** - Things that need immediate attention and response

  2. **Important but Not Urgent** - Tasks that matter and should be scheduled
  for later

  3. **Waste of Time** - Activities that should be eliminated from your list
  entirely


  ## How to Use


  Regularly review your task list and sort each item into one of the three
  categories. Focus your energy on the immediate action items while scheduling
  the important but non-urgent tasks. Discard anything that falls into the
  waste-of-time category.
