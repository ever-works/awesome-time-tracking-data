markdown: >-
  ## Overview


  Habitify is a cross-platform app designed to help users build and maintain
  consistent routines through insightful analytics. The app is praised for its
  elegant and beautiful design, with reviewers calling it "the most beautiful
  habit tracker available."


  ## Key Features


  - **Time-of-Day Scheduling**: Group and schedule habits by time of day
  (morning, afternoon, night) or by category/goal, extremely helpful for users
  with complex routines

  - **Flexible Tracking**: Builds streaks and progress views based on Repeat
  settings, so a "daily" habit and a "three times per week" habit are tracked
  differently

  - **Automated Integration**: Syncs data with Apple Health and Google Fit so
  habits are automatically marked off

  - **API Connectivity**: Has an API that can connect to thousands of other apps
  using Zapier for powerful automation

  - **Multi-Platform Support**: Keeps your habits available across devices with
  seamless syncing

  - **Customizable Reminders**: Set personalized reminders to stay on track with
  your habits

  - **Mood Tracking**: Track your emotional state alongside your habits

  - **Progress Analytics**: Detailed insights including current streak,
  completion rate, and completions over specific time periods

  - **Note Taking**: Add notes to each habit entry for context and reflection


  ## Platform Availability


  - iOS (iPhone and iPad)

  - Android

  - Web app

  - Desktop applications


  ## Pricing


  - **Free Plan**: Basic habit tracking features

  - **Premium Plans**: Start at $3.33/month (billed annually)


  Premium unlocks unlimited habits, advanced analytics, custom categories, and
  priority support.
