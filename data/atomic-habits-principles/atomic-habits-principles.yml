markdown: >-
  ## Overview


  Atomic Habits is a 2018 self-help book by James Clear on habit formation that
  has sold over 25 million copies and topped the New York Times best-seller list
  for 164 weeks as of February 2024. The book's ethos is that readers should
  focus on "getting 1% better each day" through building "atomic
  habits"—positive habits which require little exertion.


  ## Core Philosophy


  "You do not rise to the level of your goals. You fall to the level of your
  systems."


  Clear emphasizes that lasting change comes from the compound effect of
  hundreds of small decisions and tiny improvements, not massive overnight
  transformations.


  ## Key Time Management Techniques


  ### Implementation Intention

  Powerful technique that helps people easily add new habits to their routines
  by specifying when and where they'll perform the behavior: "I will [BEHAVIOR]
  at [TIME] in [LOCATION]."


  ### Habit Stacking

  Tie new habits to existing ones: "After I [CURRENT HABIT], I will [NEW
  HABIT]." This leverages established routines to build new behaviors.


  ### The Two-Minute Rule

  Make new habits seem doable by starting with a version that takes less than
  two minutes. The goal is to make habits as easy as possible to start.


  ### Environment Design

  Reshape your environment to make good habits inevitable and bad habits
  impossible. Clear experimented with having his assistant reset social media
  passwords during the week to work without distraction.


  ## The Four Laws of Behavior Change


  1. **Make it Obvious**: Use visual cues and implementation intentions

  2. **Make it Attractive**: Bundle habits you need to do with habits you want
  to do

  3. **Make it Easy**: Reduce friction for good habits, increase friction for
  bad habits

  4. **Make it Satisfying**: Use immediate rewards to reinforce desired
  behaviors


  ## Recognition


  Listed in Entrepreneur as one of the 17 best books ever written on management
  and productivity. Praised as one of the best time management books for its
  strategies on forming good habits and managing time effectively.
