markdown: >-
  ## Overview


  The Ultradian Rhythm Method is based on the body's natural 90-120 minute
  cycles of alertness and energy throughout the day. By aligning work sessions
  with these biological rhythms, you can optimize performance and avoid burnout.


  ## The Science


  Ultradian rhythms are recurrent periods of biological activity that occur in
  cycles of less than 24 hours. Research shows the brain naturally moves through
  cycles of high alertness (about 90 minutes) followed by periods where focus
  declines.


  ## How It Works


  1. Work with intense focus for 90 minutes

  2. Take a 20-minute break

  3. Repeat throughout the day

  4. Limit to 3-4 cycles daily for sustainable performance


  ## Why 90 Minutes?


  - Aligns with natural alertness cycles

  - Long enough for deep, focused work

  - Short enough to maintain concentration

  - Matches sleep cycle length

  - Supported by neuroscience research


  ## Optimal Break Activities


  - Physical movement or walking

  - Meditation or breathing exercises

  - Nature exposure

  - Social interaction

  - Light snack and hydration

  - **Avoid:** Email, social media, work-related activities


  ## Benefits


  - Sustainable high performance

  - Reduced mental fatigue

  - Better focus and concentration

  - Prevents burnout

  - Improved creativity and problem-solving

  - Natural work-rest balance


  ## Implementation Tips


  - Track your personal rhythm patterns

  - Schedule most important work during peak cycles

  - Protect break time as rigorously as work time

  - Use first cycle of day for highest-value work

  - Adjust timing based on individual patterns
