markdown: >-
  ## Overview


  Restier is an intelligent break reminder application that goes beyond simple
  timers by integrating with your calendar and providing analytics on your
  health habits. Released as a modern alternative to tools like Stretchly,
  Restier offers a polished experience with smart scheduling.


  ## Key Features


  **Meeting-Aware Scheduling:**

  - Automatically detects calendar events

  - Pauses break reminders during meetings

  - Resumes breaks intelligently after commitments

  - Prevents awkward interruptions during calls


  **Pomodoro-Style Focus Cycles:**

  - Structured work/break intervals

  - Customizable focus session lengths

  - Automatic break scheduling

  - Productivity timer integration


  **Health Reminders:**

  - Posture correction prompts

  - Eye health break notifications

  - Movement and stretch reminders

  - Hydration reminders (optional)


  **Habit Analytics:**

  - Track break completion rates

  - Monitor adherence to health habits

  - Visualize productivity patterns

  - Identify optimal work rhythms


  **Polished Interface:**

  - Modern, intuitive design

  - Smooth animations and transitions

  - Non-intrusive notifications

  - Customizable appearance


  ## Competitive Advantages


  **vs. Stretchly (2026 Comparison):**

  - Stretchly: Free, open-source, strict mode, strong customization

  - Restier: Polished UI, meeting-aware, Pomodoro integration, analytics


  **Smart Calendar Integration:**

  Unlike basic timers, Restier understands your schedule and adapts break timing
  to fit around your commitments, making it ideal for professionals with
  variable meeting schedules.


  **Comprehensive Health Focus:**

  Covers multiple aspects of desk worker health - eyes, posture, and movement -
  rather than focusing on just one area.


  ## Use Cases


  - Knowledge workers with frequent meetings

  - Remote employees managing their own break schedules

  - Professionals experiencing RSI or eye strain

  - Users seeking data on their health habits

  - Teams implementing structured break policies


  ## Platform


  Restier works across desktop platforms with calendar integration capabilities
  for popular services like Google Calendar, Outlook, and Apple Calendar.


  ## Target Audience


  Restier is designed for professionals who want a sophisticated, intelligent
  break reminder system that respects their schedule while promoting long-term
  health through consistent habit building and analytics-driven insights.
