name: Attention Residue Management
description: Productivity practice based on minimizing the cognitive cost of
  task switching. Attention residue refers to the portion of your attention that
  remains focused on a previous task when switching to a new one, reducing
  performance on the current task.
source_url: https://www.sophieleroy.com/
category: Practices
