markdown: >-
  ## Overview


  Workflowy is a powerful online outliner app that lets you organize your
  thoughts, notes, and projects in infinitely nested lists. It's a clean and
  distraction-free app that helps you quickly capture notes, plan your to-do's,
  and get organized.


  ## Key Features


  - Capture notes and ideas in an instant

  - Organize complex thinking with infinite nesting

  - Ask AI to summarize or brainstorm with your notes

  - Plan and manage tasks with kanban boards

  - Tag and assign items

  - Link items across lists

  - Share and collaborate in real-time

  - Upload photos and files

  - Search your entire Workflowy in seconds


  ## Notable Users


  Used by Mike Cannon-Brookes (CEO of Atlassian), Farhad Manjoo from the New
  York Times, Slack's founders, and thousands of entrepreneurs, writers,
  engineers, scientists, creatives and students across the globe.


  ## Pricing


  Free plan available. Premium version costs $4.99/month or $49.99/year.
