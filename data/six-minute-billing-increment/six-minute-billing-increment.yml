markdown: >-
  ## Overview


  The six-minute billing increment (0.1 hours) is the standard billing unit in
  legal and professional services. Rather than billing by the exact minute, work
  is rounded to the nearest tenth of an hour.


  ## How It Works


  **Each 0.1 hour = 6 minutes**


  - 0.1 hours = 6 minutes

  - 0.2 hours = 12 minutes

  - 0.3 hours = 18 minutes

  - 0.5 hours = 30 minutes

  - 1.0 hour = 60 minutes


  ## Why 6 Minutes?


  ### Mathematical Simplicity

  Dividing hours by 10 is easier than other increments


  ### Reasonable Granularity

  Small enough to capture brief tasks, large enough to avoid excessive detail


  ### Industry Standard

  Universally recognized in legal billing


  ### Time Tracking Efficiency

  Easier to estimate and log in 6-minute blocks


  ## Rounding Rules


  **Common Practices**:

  - Round up: 1-6 minutes = 0.1 hours

  - Round to nearest: 1-3 min = 0, 4-9 min = 0.1

  - Depends on firm policy


  ## Billing Examples


  At $300/hour rate:

  - 6 minutes (0.1) = $30

  - 12 minutes (0.2) = $60

  - 18 minutes (0.3) = $90

  - 30 minutes (0.5) = $150


  ## Time Tracking Implications


  - Log time in 6-minute increments

  - Brief tasks (phone calls, emails) often billed as 0.1

  - Longer work naturally falls into increments

  - Most legal software uses 0.1 as default

  - Easier mental math for attorneys


  ## Ethical Considerations


  - Avoid excessive rounding up

  - Be honest about actual time spent

  - Some clients require actual minutes

  - Consider minimum charges carefully

  - Document brief tasks appropriately


  ## Alternative Increments


  Some industries use:

  - 15-minute (0.25 hour) increments

  - Exact minute billing

  - Task-based flat fees


  But 6-minute remains legal industry standard.


  ## Pricing


  Free practice — no cost to use this billing standard.
