name: Micro-Commitment Technique
description: Overcoming procrastination by committing to work for just 2-5
  minutes. Based on Zeigarnik effect showing started tasks create psychological
  tension driving completion. Reduces activation energy for beginning work, with
  momentum often carrying beyond initial micro-commitment.
source_url: https://jamesclear.com/how-to-stop-procrastinating
category: Time Management Technique
tags:
  - procrastination
  - starting
