markdown: >-
  ## Overview


  Runna is a running coaching app that provides personalized training plans and
  incorporates time tracking for events like parkrun, helping runners
  systematically improve performance.


  ## Features


  - Personalized training plans

  - Integration with parkrun time tracking

  - Performance analytics and progress tracking

  - GPS tracking for runs

  - Pace and distance monitoring

  - Training schedule management

  - Audio coaching during runs

  - Goal setting and achievement tracking


  ## Parkrun Integration


  Helps runners incorporate parkrun into training schedules, track times, and
  work toward personal bests through structured training approaches.


  ## Pricing


  Subscription-based with free trial available.
