markdown: >-
  ## Overview


  Rize's AI summaries automatically analyze tracked activities to create
  intelligent work session summaries. This zero-effort feature provides instant
  insights into what was accomplished without manual note-taking or reporting.


  ## How It Works


  1. Rize tracks applications, documents, and websites used

  2. AI analyzes patterns and context of activity

  3. System generates natural language summary of session

  4. Summary describes what was worked on and accomplished

  5. Available immediately after session ends


  ## Example Summaries


  - "Worked on Q4 budget spreadsheet and reviewed team proposals"

  - "Coded new authentication feature and debugged test failures"

  - "Designed marketing materials and coordinated with vendors"


  ## Benefits


  **Zero Manual Effort**: Summaries created automatically


  **Accurate Records**: Based on actual activity, not memory


  **Better Reporting**: Quickly reconstruct what you did


  **Client Updates**: Provide detailed status without effort


  **Time Entry**: Categorize and bill time accurately


  ## Use Cases


  **Consultants**: Document client work for billing discussions


  **Freelancers**: Create detailed invoices with work descriptions


  **Employees**: Provide status updates to managers


  **Agencies**: Report to clients on project progress


  ## Technical Implementation


  Rize's AI:

  - Recognizes document titles and file names

  - Understands website and app categories

  - Groups related activities intelligently

  - Generates human-readable descriptions

  - Learns from your work patterns


  ## Privacy


  - All processing happens locally on device

  - No work data sent to cloud

  - Summaries stored only on your computer

  - You control what summaries are kept


  AI session summaries represent the next evolution in time tracking: not just
  capturing time, but automatically understanding and describing the work
  performed.
