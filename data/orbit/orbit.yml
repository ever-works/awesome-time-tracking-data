markdown: >-
  ## Overview


  Orbit is an automatic time tracking application for macOS that passively
  monitors which applications and websites you use, providing detailed insights
  into how you spend your time without requiring manual time entry.


  ## Features


  - **Automatic Tracking**: Monitors app and website usage automatically in the
  background

  - **Application Categorization**: Automatically categorizes applications as
  productive or distracting

  - **Website Tracking**: Tracks time spent on websites with URL-level detail

  - **Productivity Score**: Daily productivity score based on your activity

  - **Timeline View**: Visual timeline showing your entire day's activity

  - **Focus Sessions**: Track focused work periods and minimize distractions

  - **Goals**: Set daily productivity goals and track progress

  - **Privacy**: All data stored locally on your Mac, no cloud upload

  - **Reports**: Weekly and monthly reports on productivity patterns

  - **Idle Detection**: Automatically detects when you're away from computer


  ## Pricing


  Free version with basic tracking and 7-day history. Premium version
  ($7.99/month or $49.99/year) offers unlimited history, advanced reports, and
  goal setting.
