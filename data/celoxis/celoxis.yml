markdown: >-
  # Celoxis


  ## Overview


  Celoxis is an enterprise-grade project management platform with built-in time
  tracking. It unites scheduling, resource planning, timesheets, billing, and
  reporting in one system.


  ## Features


  - All-in-one platform: Time tracking is fully integrated with project planning
  and resource management.

  - Flexible time entry: Users can start/stop timers or manually log hours for
  any task.

  - Approval workflows: Configure timesheet submission and sign-off processes to
  ensure accuracy.

  - Billable hours & invoicing: Flag hours as billable and generate client
  invoices directly from Celoxis.

  - Advanced reporting: Custom dashboards and drill-down reports (by project,
  role, client, etc.) show utilization, margins, and budget variance.


  ## Pricing


  Celoxis plans start at $25/user/month (Essentials tier, includes timesheets
  and resource planning). A basic Core plan is $10/user (no timesheets), while
  advanced plans go up to $45/user (Business tier, adds billing, client portal,
  etc.). All prices are per user/month, billed annually.
