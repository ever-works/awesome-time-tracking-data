markdown: >-
  ## Overview


  Otto is a free Pomodoro timer and website blocker Chrome extension designed to
  help users get started on tasks, overcome procrastination, and become more
  mindful while working. Updated in February 2026, Otto brings a unique gamified
  approach to the Pomodoro technique.


  ## Features


  ### Core Functionality

  - **Pomodoro Focus Timer**: Break time into focused intervals with
  customizable work and break durations

  - **Website Blocker**: Automatically blocks distracting websites during focus
  sessions

  - **Task Timer**: Name your Pomodoro sessions to be more intentional about
  what you're working on

  - **Productivity Tracking**: Monitor your focus sessions over time


  ### Gamification System

  - Build a bond with Otto as you focus, progressing from Stranger to Friend to
  Guardian

  - Earn Essence Particles that mark your connection with Otto

  - No punishments for missed sessions—only a gradual shift in your relationship
  with your digital friend

  - Point-based reward system to make work more engaging


  ### Customization

  - Adjustable Pomodoro session lengths

  - Customizable break intervals

  - Website blocking rules tailored to individual needs


  ## Availability


  Available as a free download from the Chrome Web Store with optional in-app
  purchases for premium features like Autoblock functionality.


  ## Reception


  Otto has achieved an aggregate rating of 4.48 out of 5 among Chrome users,
  recognized for its unique approach to combining productivity with gentle
  gamification.


  ## Pricing


  Free with optional premium features available through in-app purchases.
