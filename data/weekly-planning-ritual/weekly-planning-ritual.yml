markdown: >-
  ## Purpose


  Create alignment between daily actions and long-term goals through regular
  weekly planning.


  ## Components


  ### Review Last Week


  - What worked well?

  - What didn't work?

  - Key accomplishments

  - Lessons learned

  - Incomplete items


  ### Review Goals


  - Long-term objectives

  - Quarterly goals

  - Monthly milestones

  - Progress check


  ### Identify Big Rocks


  - Most important outcomes for this week

  - 3-5 major priorities

  - Non-negotiable commitments


  ### Schedule the Week


  - Block time for big rocks first

  - Add fixed commitments

  - Build in buffer time

  - Plan breaks and recovery


  ### Prepare


  - Gather needed materials

  - Schedule meetings

  - Delegate where possible

  - Identify potential obstacles


  ## Timing


  30-60 minutes weekly, typically Sunday evening or Monday morning.


  ## Benefits


  - Proactive vs. reactive

  - Aligned with goals

  - Reduced stress

  - Better prioritization

  - Fewer surprises


  ## Tools


  - Calendar

  - Task manager

  - Goal tracking system

  - Journal or planner


  ## Success Factors


  - Consistent timing

  - Distraction-free environment

  - Comprehensive review

  - Realistic planning

  - Written output
