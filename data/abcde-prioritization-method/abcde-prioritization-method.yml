name: ABCDE Prioritization Method
description: Brian Tracy's task prioritization technique where tasks are labeled
  A (must do with serious consequences), B (should do with mild consequences), C
  (nice to do with no consequences), D (delegate), or E (eliminate).
source_url: https://www.briantracy.com/blog/time-management/abcde-method
category: Time Management Technique
