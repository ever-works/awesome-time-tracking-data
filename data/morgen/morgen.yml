markdown: >-
  ## Overview


  Morgen is a comprehensive calendar and task management application designed
  for time blocking workflows. It allows you to consolidate multiple calendars
  and task lists into one unified interface with flexible time blocking methods
  including keyboard, drag-and-drop, voice, and AI assistance.


  ## Features


  - **Multi-Calendar Support** - Connect Google Calendar, Outlook, iCloud, and
  more in one view

  - **Manual Time Blocking** - Create time blocks via keyboard shortcuts,
  drag-and-drop, or voice

  - **AI Planner** - Let AI automatically schedule your tasks into optimal time
  blocks

  - **Task Integration** - Pull tasks from Todoist, Asana, ClickUp, Notion, and
  other platforms

  - **Scheduling Links** - Share availability and let others book time
  automatically

  - **Team Scheduling** - Find optimal meeting times across team members'
  calendars

  - **Time Zone Support** - Manage meetings across multiple time zones

  - **Customizable Views** - Daily, weekly, and monthly calendar views

  - **Keyboard Shortcuts** - Power-user keyboard navigation for rapid scheduling

  - **Cross-Platform** - Available on Mac, Windows, Linux, iOS, and Android


  ## Time Blocking Methods


  - Drag tasks directly into calendar view to create blocks

  - Use keyboard shortcuts for rapid time block creation

  - Voice input for hands-free scheduling

  - AI-powered automatic scheduling


  ## Pricing


  Free plan available. Premium plans start at approximately $9-14 per month.
