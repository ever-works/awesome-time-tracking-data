markdown: >-
  ## Overview


  The ABC Task System is a triage framework for classifying tasks by priority
  level. Each task is assigned one of three letter categories to guide how it
  should be handled within the workday.


  ## Priority Levels


  - **A (Must-Do Today)**: Critical tasks with significant consequences if not
  completed. These demand immediate attention and should be tackled first.

  - **B (Should-Do Today)**: Important tasks with moderate consequences. These
  should be addressed after all A tasks are complete.

  - **C (Nice to Have)**: Optional tasks with minimal consequences if deferred.
  These provide value but can be postponed or dropped if time runs out.


  ## How It Works


  - Review your full list of tasks at the start of the day

  - Assign each task an A, B, or C designation based on its urgency and impact

  - Complete tasks in order: all A tasks first, then B, then C

  - Optionally, further differentiate within categories using sub-numbers (A1,
  A2, B1, etc.)


  ## Benefits


  - Provides a simple, intuitive framework for triaging tasks

  - Reduces the anxiety of facing an undifferentiated to-do list

  - Helps identify tasks that can safely be deferred without negative
  consequences

  - Easy to learn and apply without tools or software


  ## Origin


  The ABC method has been a staple of time management training for decades and
  is widely taught in productivity literature and courses.
