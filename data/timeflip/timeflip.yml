markdown: >-
  ## Overview


  TimeFlip2 is a 12-sided connected dice used to track time with a flip. It
  provides a tactile, physical approach to time tracking that makes the process
  more engaging and less dependent on screen interactions.


  ## Features


  - 12-sided physical dice for tracking up to 12 different tasks or projects

  - Bluetooth connectivity to smartphone and computer

  - Automatic time tracking starts when you flip the device

  - No manual timer starting/stopping required

  - Companion mobile and desktop apps

  - Visual and tactile feedback for time tracking


  ## How It Works


  Assign a task or project to each of the 12 sides of the TimeFlip device. When
  you're ready to work on a task, simply flip the dice so that the corresponding
  side faces up. The device automatically detects which side is up and starts
  tracking time for that task via its connected app.


  ## Comparison


  TimeFlip offers more task capacity (12 sides) compared to the EARLY tracker
  (formerly Timeular) which has 8 sides, making it suitable for users who need
  to track more distinct activities throughout their day.
