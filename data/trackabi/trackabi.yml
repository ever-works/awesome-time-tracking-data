markdown: >-
  ## Overview


  Trackabi is a free time tracking, employee monitoring, and leave management
  software that suits small teams relying on daily time tracking. The platform
  is most valuable for businesses managing hourly payroll or client billing,
  especially when ease of use and flexible reporting matter most.


  ## Key Features


  **Time Tracking:**

  - Automated reminders for time entry

  - Detailed, customizable reports

  - Track billable vs non-billable hours

  - Easy-to-understand insights


  **Employee Monitoring:**

  - Activity tracking capabilities

  - Detailed performance insights

  - Comprehensive team oversight


  **GPS Tracking:**

  - Field workforce location verification

  - Recent updates include GPS tracking features

  - Geolocation for mobile employees


  **Kiosk Mode:**

  - Shared-device workflows

  - Clock in/out from central location

  - Suitable for field teams and shared workspaces


  **Leave Management:**

  - Manage employee time off requests

  - Leave balance tracking

  - Approval workflows


  **Reporting:**

  - Detailed and flexible reporting

  - Customizable report formats

  - Insights into team productivity

  - Billing and payroll report generation


  ## Target Users


  Most commonly used by:

  - IT teams

  - Marketing teams

  - Firms under 50 employees

  - Small businesses with hourly workers


  ## Platform Availability


  - Web application

  - Mobile apps (iOS and Android)

  - Desktop applications


  ## Pricing


  Free time tracking with comprehensive features for small teams and businesses.
