markdown: >-
  ## Overview


  Parkinson's Law states: "Work expands so as to fill the time available for its
  completion." Formulated by British naval historian Cyril Northcote Parkinson
  in a satirical essay published in The Economist on November 19, 1955.


  ## How It Works


  No matter how much time you've allocated for your work, that's how long your
  work will take. For example, if you schedule a one-hour meeting, the
  discussion will often run the full hour, even when the agenda could be covered
  in 30 minutes.


  ## Why It Happens


  - **Procrastination**: Knowing we have set time inspires leaving work to the
  last minute

  - **Scope Creep**: Tasks increase in complexity when too much time is
  available

  - **Perfectionism**: Extra time leads to unnecessary refinements

  - **Lack of Urgency**: Distant deadlines reduce motivation


  ## How to Overcome Parkinson's Law


  1. **Set Self-Imposed Deadlines**: Ask "how much time do I actually need?" and
  set deadlines accordingly

  2. **Use Timeboxing**: Assign specific blocks of time for focused work

  3. **Break Tasks Down**: Split big projects into smaller, manageable tasks

  4. **Apply Pomodoro Technique**: Short 25-minute bursts of work

  5. **Shorten Meeting Times**: Schedule 25 minutes instead of 30, or 45 instead
  of 60

  6. **Create Artificial Constraints**: Impose tighter deadlines than necessary


  ## Applications


  - Personal productivity

  - Project management

  - Meeting efficiency

  - Resource allocation

  - Time budgeting
