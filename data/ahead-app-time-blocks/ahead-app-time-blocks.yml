  ### Guidance & Education

  - **Science Explanations**: Learn why 90 minutes works

  - **Best Practices**: Tips for maximizing block effectiveness

  - **Habit Formation**: Tools to build consistent routine

  - **Procrastination Help**: Strategies to start and maintain focus


  ## Why 90-Minute Focus Sessions Work


  ### Biological Alignment

  Matching work blocks to ultradian rhythms:

  - Works with body's natural energy cycles

  - Respects cognitive capacity limits

  - Prevents burnout and overwork

  - Enables sustainable high performance

  - Protects long-term brain health


  ### Optimal Challenge

  90 minutes provides:

  - **Long enough**: To achieve flow and make real progress

  - **Short enough**: To maintain quality attention throughout

  - **Achievable**: Feels doable, not overwhelming

  - **Focused**: Creates urgency and reduces procrastination


  ### Break Prevention

  Enforced breaks prevent:

  - Cumulative fatigue

  - Decision fatigue

  - Attention residue buildup

  - Physical tension and strain

  - Burnout over time


  ## Implementation Guide


  ### Daily Structure


  **Morning Block** (First 90 minutes):

  - Start 30-60 minutes after waking

  - Tackle most challenging work

  - Leverage fresh mental resources

  - Highest quality output of day


  **Break 1** (15-20 minutes):

  - Physical movement

  - No screens

  - Light snack if needed

  - Mental reset


  **Mid-Morning Block** (Second 90 minutes):

  - Still high quality

  - Complex work continues

  - Strategic thinking

  - Creative problem-solving


  **Break 2** (15-20 minutes):

  - Longer if lunch time

  - Complete mental break

  - Social interaction optional


  **Afternoon Block** (Third 90 minutes):

  - Slightly reduced capacity

  - Good for routine work

  - Implementation tasks

  - Collaborative work


  **Break 3** (15-20 minutes):

  - Energy restoration

  - Prepare for final push


  **Late Afternoon Block** (Optional fourth):

  - Lowest energy of day

  - Best for routine tasks

  - Email and admin

  - Planning for tomorrow


  ### Maximizing Each Block


  **Before Block**:

  - Clear intention for session

  - Remove potential distractions

  - Gather needed materials

  - Close unnecessary apps/tabs

  - Set timer or reminder


  **During Block**:

  - Single task focus

  - No email or messages

  - No context switching

  - Push through resistance

  - Trust the process


  **After Block**:

  - Stand and move immediately

  - No "just one more thing"

  - Complete break before next session

  - Note accomplishments


