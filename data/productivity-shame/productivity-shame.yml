name: Productivity Shame
description: The feeling of anxiety, guilt, or self-judgment when not being
  productive, often stemming from unrealistic expectations, perfectionism, and
  toxic work culture. This phenomenon leads to burnout, decreased mental health,
  and paradoxically, reduced actual productivity, requiring mindset shifts
  toward gentle productivity and self-compassion.
