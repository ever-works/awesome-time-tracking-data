markdown: >-
  ## Overview


  Caveday hosts virtual coworking sessions called The Cave to help their global
  community focus. A Caveday session is a one-hour or three-hour guided focus
  session that's popular with freelancers, entrepreneurs, and creative
  professionals seeking structure and accountability.


  ## How the Sprints Work


  The Cave alternates between deep work "sprints" and energizing breaks to help
  keep your energy and focus at its peak. Each sprint is 45-52 minutes long to
  optimize brain's focus capacity, based on research.


  ## Session Structure


  During a Caveday session:


  - **Welcome**: Your Cave Guide will welcome you, remind you to turn off your
  phone and remove distractions

  - **Goal Setting**: The larger group will gather to share goals and state what
  they're working on

  - **Work Sprints**: Deep work sessions with cameras on but everyone muted

  - **Flexibility**: Participants can work on things that make noise, whether
  it's a phone call or a DJ session


  ## Session Availability


  Sessions are available in multiple formats:


  - 30 minute sessions

  - 1 hour sessions

  - 3 hour sessions

  - Available daily, with Caves 7 days/week


  ## Global Community


  Caveday has been used by thousands of people in over 40 countries.


  ## Features


  - Expert Cave Guides facilitating sessions

  - Camera-on accountability

  - Muted work environment

  - Structured sprint timing based on neuroscience

  - Goal sharing and community support


  ## Pricing


  Caveday offers membership options with a free trial available. Visit their
  website for current pricing details.
