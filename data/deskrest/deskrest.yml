markdown: >-
  ## Overview


  DeskRest is an intelligent break reminder application for macOS that goes
  beyond simple timers by automatically recognizing when you're watching videos
  or in full-screen mode, intelligently pausing reminders to avoid interruptions
  during inappropriate times.


  ## Features


  ### Intelligent Pause Detection

  - Automatically detects YouTube playback

  - Recognizes educational video content

  - Pauses during any full-screen content

  - Detects presentations and screensharing

  - Resumes intelligently when you return to work


  ### Native macOS Design

  - Beautiful, native Mac interface

  - Follows macOS design guidelines

  - Light and dark mode support

  - Smooth animations and transitions


  ### Context-Aware Features

  - Context-aware countdown in menu bar

  - Shows time until next break

  - Visual indicators for break status

  - Unobtrusive notifications


  ### Additional Features

  - Clock out feature to end tracking for the day

  - Posture flash reminders

  - Customizable break schedules

  - Multiple break types

  - Statistics and tracking


  ## Platform


  - macOS only

  - Native Mac application

  - Requires modern macOS version


  ## Benefits


  - **Smart Interruptions**: Won't interrupt during videos or presentations

  - **Mac Native**: Beautiful interface that feels at home on macOS

  - **Posture Awareness**: Quick posture reminders to improve ergonomics

  - **Flexible Scheduling**: Customizable to fit your work patterns

  - **Privacy Focused**: All processing done locally on your Mac


  ## How It Works


  DeskRest monitors your Mac's activity to understand what you're doing. When it
  detects you're watching a video, in a meeting, or presenting, it automatically
  pauses break reminders. Once you return to regular work, it intelligently
  resumes the break schedule.


  ## Ideal For


  - Mac users who watch educational content or tutorials

  - Professionals who frequently present or screenshare

  - Anyone who wants intelligent break reminders that adapt to context

  - Users who value native Mac design and experience

  - People concerned about posture and ergonomics


  ## Unique Features


  - **Context Awareness**: Unlike simple timers, understands what you're doing

  - **No Awkward Interruptions**: Won't interrupt during important moments

  - **Posture Reminders**: Quick visual reminders to check posture

  - **Clock Out**: Explicitly end your workday


  ## Pricing


  Visit deskrest.com for current pricing information.
