name: Hawthorne Effect
description: The Hawthorne Effect is a phenomenon in time tracking and
  productivity research where individuals modify their behavior simply because
  they are being observed. When tracking time, people tend to become more
  focused and intentional about how they spend their hours, leading to improved
  productivity even before making structural changes. This effect is
  particularly relevant to time audits, where awareness of tracking alone can
  reduce time-wasting behaviors.
source_url: https://en.wikipedia.org/wiki/Hawthorne_effect
category: Time Tracking Concept
