markdown: >-
  ## Overview


  Deep Work by Cal Newport presents the thesis that the ability to perform deep
  work — professional activities performed in a state of distraction-free
  concentration that push cognitive capabilities to their limit — is
  increasingly rare and increasingly valuable in today's economy.


  ## Core Concepts


  - Deep work vs. shallow work distinction, where shallow work is
  non-cognitively demanding tasks performed while distracted

  - The deep work hypothesis: cultivating this skill will produce massive
  benefits for knowledge workers

  - A four-rule framework for developing the deep work habit: work deeply,
  embrace boredom, quit social media, and drain the shallow


  ## Key Practices


  - **Rhythmic Philosophy**: Schedule deep work blocks at the same time each day

  - **Bimodal Philosophy**: Divide time into clearly defined deep work periods
  and everything else

  - **Monastic Philosophy**: Eliminate or radically minimize shallow obligations

  - **Journalistic Philosophy**: Fit deep work into any available time slot


  ## Training Regimen


  The book provides specific techniques for building deep work capacity,
  including scheduling every minute of the day, quantifying the depth and
  shallowness of activities, and establishing shutdown rituals at the end of the
  workday.


  ## Rating


  4.6/5
