markdown: >-
  ## Overview


  The Ivy Lee Method is a simple productivity technique created in 1918 by
  productivity consultant Ivy Lee for Charles M. Schwab, president of Bethlehem
  Steel Corporation. Despite being over 100 years old, it remains remarkably
  effective.


  ## The Method


  **End of Each Day:**

  1. Write down six most important tasks to accomplish tomorrow

  2. Prioritize those six items in order of true importance

  3. Go to sleep


  **Next Day:**

  1. Start working on task #1 immediately

  2. Work only on task #1 until it's finished

  3. Move to task #2, then #3, and so on

  4. At end of day, move unfinished tasks to new list of six


  ## Core Principles


  ### Principle 1: Single-Tasking

  Work on one task at a time until completion. No multitasking.


  ### Principle 2: Priority Execution

  Always work in priority order. The most important task comes first.


  ### Principle 3: Limited List

  Exactly six tasks - enough to make progress, not so many to overwhelm.


  ### Principle 4: Evening Planning

  Plan the night before so you wake up knowing exactly what to do.


  ### Principle 5: Incomplete is OK

  Unfinished tasks roll to tomorrow. The constraint forces better
  prioritization.


  ## Why It Works


  **Removes Decision Fatigue**

  No morning decisions about what to work on.


  **Forces Prioritization**

  Limit of six tasks requires choosing what truly matters.


  **Prevents Procrastination**

  Clear first task with no alternatives makes starting easy.


  **Ensures Important Work**

  By prioritizing and working in order, high-value work gets done even if you
  don't finish all six.


  **Simplicity**

  No complex system to maintain - just six tasks.


  ## Historical Context


  Ivy Lee charged Schwab $25,000 for this advice in 1918 (equivalent to
  $500,000+ today). Schwab called it the most profitable advice he'd ever
  received. Within three years, Bethlehem Steel became the largest independent
  steel producer in the world.


  ## Use Cases


  Ideal for entrepreneurs, knowledge workers, managers, and anyone who struggles
  with prioritization or gets overwhelmed by long to-do lists.
