markdown: >-
  ## Overview


  Blink Eye is a minimalist eye care and break reminder application designed to
  prevent eye strain, repetitive strain injury (RSI), and Computer Vision
  Syndrome. Available for Windows, macOS, and Linux as an open-source solution.


  ## Features


  - **20-20-20 Rule Support**: Built-in support for the 20-20-20 rule (every 20
  minutes, look at something 20 feet away for 20 seconds)

  - **Customizable Timers**: Set custom break intervals and durations to match
  your workflow

  - **Full-Screen Break Notifications**: Ensures you actually take breaks with
  unavoidable full-screen reminders

  - **Daily Usage Analytics**: Track your computer usage patterns and break
  adherence

  - **Built-in TODO Functionality**: Manage tasks directly within the app

  - **Cross-Platform**: Works seamlessly across Windows, macOS, and Linux

  - **Minimalist Design**: Clean, unobtrusive interface that stays out of your
  way

  - **Open Source**: Free and open-source software available on GitHub


  ## Use Cases


  - Preventing digital eye strain during long work sessions

  - Reducing risk of repetitive strain injuries

  - Maintaining healthier work habits for remote workers

  - Managing Computer Vision Syndrome symptoms


  ## Pricing


  Free and open-source.
