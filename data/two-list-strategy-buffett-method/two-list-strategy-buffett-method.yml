name: Two-List Strategy (Buffett Method)
description: Focus technique attributed to Warren Buffett involving listing 25
  goals, circling top 5, then actively avoiding the remaining 20 until the
  priority 5 are complete. Emphasizes that good opportunities are the enemy of
  great ones, requiring ruthless prioritization and saying no.
source_url: https://jamesclear.com/buffett-focus
category: Time Management Methodology
tags:
  - prioritization
  - focus
  - goal-setting
  - warren-buffett
markdown: >-
  ## Overview


  Two-List Strategy forces identification of true priorities by creating an
  "avoid at all cost" list alongside a focus list.


  ## Process


  1. Write down 25 goals

  2. Circle your top 5

  3. Put remaining 20 on "avoid" list

  4. Focus exclusively on top 5

  5. Don't touch the 20 until top 5 are done


  ## Key Insight


  The bottom 20 aren't bad goals—they're good goals that will distract you from
  great goals. They're dangerous precisely because they're appealing.


  ## Pricing


  Free methodology.
