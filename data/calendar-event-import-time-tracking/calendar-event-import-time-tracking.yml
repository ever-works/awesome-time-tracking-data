name: Calendar Event Import (Time Tracking)
description: Feature in modern time tracking apps like Timeneye that
  automatically imports calendar events from Google Calendar or Outlook as
  suggested time entries, streamlining the process of converting meetings into
  tracked billable time.
source_url: https://www.timeneye.com/
category: Time Tracking Feature
tags:
  - calendar-integration
