markdown: >-
  ## Overview


  ClockShark is a mobile-first time tracking solution built specifically for
  construction and field service businesses, featuring GPS tracking, geofencing,
  scheduling, and seamless QuickBooks integration.


  ## Features


  - GPS time clock with location tracking

  - Geofencing for automatic clock-in/out

  - Team scheduling and dispatch

  - Job and task tracking

  - PTO management

  - Timesheet approvals

  - QuickBooks integration

  - Offline mode


  ## Field Service Capabilities


  - Real-time crew location visibility

  - Mileage tracking

  - Photo attachments

  - Job costing

  - Certified payroll reports


  ## Pricing


  Starts at $8/user/month

  14-day free trial


  ## Target Users


  Construction crews, field service teams, contractors, trades
