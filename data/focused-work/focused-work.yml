markdown: >-
  ## Overview


  Focused Work provides flexible timing options including Pomodoro, Flowmodoro,
  and custom structures, with automatic website and app blocking to maintain
  focus during work sessions.


  ## Timing Options


  - **Pomodoro**: Classic 25/5 timing

  - **Flowmodoro**: Flexible work/break ratios

  - **Custom**: Create your own timing structure

  - **Flexible Breaks**: Adjust break length based on work duration


  ## Distraction Blocking


  - Automatic website blocking during focus time

  - App blocking on desktop

  - Customizable blocklists

  - Smart blocking (only during work intervals)

  - Whitelist support


  ## Features


  - Multiple timer formats

  - Session goals and tracking

  - Productivity statistics

  - Custom focus/break ratios

  - Keyboard shortcuts

  - Minimalist interface


  ## Platform


  macOS, Windows, Web


  ## Target Users


  Knowledge workers, students, anyone needing flexible focus tools with
  distraction prevention
