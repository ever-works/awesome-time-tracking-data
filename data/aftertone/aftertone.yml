markdown: >-
  ## Overview


  Aftertone is a Mac-native calendar and task management application built on
  behavioral science principles. It makes time blocking the primary workflow and
  closes the feedback loop to help users build sustainable productivity habits.


  ## Features


  ### Time Blocking Foundation

  - **Time Blocking First** - Time blocking is the core workflow, not an add-on

  - **Calendar Integration** - Native integration with macOS Calendar

  - **Task Duration** - Assign time estimates to every task

  - **Visual Planning** - See your day as a visual timeline

  - **Drag-and-Drop** - Easily move time blocks around your schedule


  ### Behavioral Science Approach

  - **Feedback Loops** - Track what you actually accomplished vs. planned

  - **Habit Formation** - Build sustainable planning habits through design

  - **Cognitive Load Reduction** - Simplify decision-making with smart defaults

  - **Reflection Prompts** - Regular reflection on productivity patterns

  - **Progress Tracking** - See trends in planning accuracy over time


  ### Mac-Native Experience

  - **Native Performance** - Built specifically for macOS for optimal speed

  - **macOS Integration** - Deep integration with Calendar, Shortcuts, and more

  - **Keyboard Shortcuts** - Extensive keyboard navigation

  - **Widgets** - macOS widgets for quick access

  - **Privacy-Focused** - Data stays on your Mac


  ## Philosophy


  Aftertone believes that sustainable productivity comes from understanding
  behavioral patterns and creating systems that work with human psychology
  rather than against it.


  ## Platform


  macOS exclusive


  ## Pricing


  Subscription-based with free trial.
