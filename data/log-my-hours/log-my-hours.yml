markdown: >-
  ## Overview


  Log My Hours is a comprehensive time tracking solution that combines a free
  time card calculator with professional time tracking capabilities. It's
  designed for freelancers, contractors, and legal professionals who need
  accurate billable hours tracking for client invoicing.


  ## Features


  - **Time Card Calculator**: Calculate billable hours in decimal format

  - **Flexible Time Formats**: Support for 12-hour and military time formats

  - **Break Tracking**: Automatic calculation of breaks and actual work hours

  - **Overtime Calculation**: Tracks and calculates overtime hours

  - **Pay Calculation**: Computes total pay based on hourly rates

  - **Billable Hours Tracking**: Specifically designed for tracking client
  billable time

  - **Decimal Time Format**: Simplifies billing and invoicing with decimal hour
  calculations

  - **Export Options**: Generate reports for payroll or client billing

  - **Free to Use**: Core calculator functionality available at no cost


  ## Legal Professional Features


  For legal professionals, Log My Hours simplifies tracking billable hours for
  accurate invoicing and client trust by providing:

  - 6-minute increment billing (common in legal billing)

  - Detailed time entry descriptions

  - Client and matter code tracking

  - Professional timesheet reports


  ## Use Cases


  - Freelancers tracking billable client hours

  - Contractors managing multiple project timesheets

  - Legal professionals billing in 6-minute increments

  - Small businesses calculating employee payroll

  - Consultants needing accurate time-to-invoice conversion


  ## Benefits


  - Eliminates manual time calculation errors

  - Simplifies billable hours tracking

  - Provides professional reports for client invoicing

  - Free tool accessible to everyone

  - Supports multiple time formats and billing increments


  ## Pricing


  Free time card calculator available online. Additional premium features may be
  available for subscription.
