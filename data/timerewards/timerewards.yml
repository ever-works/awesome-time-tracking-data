markdown: >-
  ## Overview


  TimeRewards is time tracking and management software built specifically with
  nonprofit organizations in mind. It addresses the unique needs of nonprofits
  including volunteer hour tracking, grant compliance, and in-kind contribution
  reporting.


  ## Features


  - **Volunteer Hour Tracking**: Comprehensive tracking of volunteer time for
  grant applications and reporting

  - **Grant Budget Management**: Tools to manage and track grant budgets
  effectively

  - **Compliance Reporting**: Generate reports required by funders and
  government agencies

  - **In-Kind Contribution Tracking**: Track and value volunteer hours as
  in-kind donations

  - **Matching Fund Documentation**: Document volunteer time for grant matching
  requirements

  - **Professional Services Time Tracking**: Includes billable hours tracking
  for nonprofit consulting services


  ## Use Cases


  - Tracking volunteer hours for grant applications

  - Documenting in-kind contributions for matching funds

  - Managing multiple grant budgets and compliance requirements

  - Generating funder reports

  - Professional services billing for nonprofit consulting


  ## Pricing


  Pricing information available on the TimeRewards website with specialized
  plans for nonprofits.
