markdown: >-
  ## Overview


  Completion bias is the cognitive tendency for people to feel compelled to
  complete a task once they have started it, driven by the pleasure experienced
  when finishing a job. This phenomenon has significant implications for
  productivity and task management.


  ## The Psychology Behind It


  The bias is rooted in neurobiological mechanisms where task completion
  triggers the release of dopamine, a pleasurable chemical that improves
  attention, memory, and motivation. Even achieving small goals produces this
  biochemical boost, reinforcing the desire to complete tasks.


  ## Impact on Productivity


  ### Negative Effects


  - Tendency to focus on easy-to-complete tasks at the expense of more important
  ones

  - Prioritizing quick wins (emails, social media) over difficult, high-impact
  work

  - Aids short-term performance but can harm long-term productivity

  - Creates the illusion of being productive without tackling critical
  priorities

  - Can lead to constant task-switching rather than deep focus


  ### Positive Effects


  - Research shows completing short, easy tasks at the start of the day can
  boost motivation

  - Provides momentum and satisfaction that carries through the workday

  - Small wins create a positive feedback loop for continued productivity

  - Can be strategically used to build momentum before tackling priority tasks


  ## Research Insights


  Harvard Business School professor Francesca Gino and colleagues have
  extensively studied this phenomenon, including research on emergency
  department physicians' task selection patterns. Studies show that employees
  who completed a couple of short, easy tasks at the start of the day before
  tackling priorities were most satisfied, motivated, and accomplished the most
  throughout the week.


  ## Strategic Application


  ### Best Practices


  - Start the day with 1-2 quick wins to activate dopamine systems

  - Then immediately shift to high-priority, difficult tasks

  - Be aware of the bias when choosing which tasks to work on

  - Use task management systems that highlight importance, not just ease

  - Balance the psychological need for completion with strategic priorities


  ### Avoiding the Trap


  - Don't let easy tasks crowd out important work

  - Structure your day intentionally rather than following completion urges

  - Use time blocking to protect time for difficult, important tasks

  - Recognize when you're avoiding hard work by completing easy tasks


  ## Related Concepts


  - Urgency Bias: The tendency to prioritize urgent over important tasks

  - Unit Bias: The desire to complete a unit of work regardless of necessity

  - Progress Principle: Small wins create momentum and motivation
