markdown: >-
  ## Overview


  Momentum is a browser extension that replaces your new tab page with a
  beautiful, personalized dashboard designed to inspire focus and productivity.
  Each time you open a new tab, you're greeted with a stunning photo, your name,
  your main focus for the day, and helpful productivity tools—all in a clean,
  aesthetically pleasing interface.


  ## Key Features


  ### Free Features


  **Daily Inspiration:**

  - **Gorgeous Photos**: New breathtaking background image every day

  - **Inspirational Quotes**: Daily quotes to motivate and inspire

  - **Personal Greeting**: Addresses you by name with time-appropriate greetings


  **Productivity Tools:**

  - **Main Focus**: Set one primary focus for the day to maintain clarity

  - **To-Do Lists**: Simple, easy-to-use task lists

  - **Quick Links**: Shortcuts to your favorite websites

  - **Local Weather**: Current weather and forecast for your location


  **Customization:**

  - **Show/Hide Features**: Customize what appears on your dashboard

  - **Focus Mode**: Minimize distractions when you need deep work


  ### Plus/Premium Features (Momentum Plus)


  **Advanced Productivity:**

  - **Unlimited Focus Mode**: Extended focus sessions

  - **Tab Stash**: Manage and organize multiple tabs

  - **Notes & AI**: Notes feature with AI assistance

  - **Ask AI**: AI-powered productivity assistant


  **Enrichment:**

  - **Soundscapes**: Ambient sounds for better focus (rain, coffee shop, nature,
  etc.)

  - **Vision Board**: Visual goal-setting and inspiration board

  - **Custom Photos**: Upload your own background images


  **Integrations:**

  - **ClickUp**: Sync tasks with ClickUp

  - **Todoist**: Integrate with Todoist task management

  - **Asana**: Connect to Asana projects

  - **Google Calendar**: Display calendar events

  - **Outlook Calendar**: Microsoft calendar integration


  ## Browser Support


  - **Google Chrome**: Full feature support

  - **Mozilla Firefox**: Full feature support  

  - **Microsoft Edge**: Via Chromium compatibility

  - **Brave**: Via Chromium compatibility


  ## User Base & Recognition


  - **3+ million users** worldwide

  - Featured in **Tim Ferriss' Tools of Titans**

  - Highlighted in **The Wall Street Journal**

  - Showcased at **Apple Worldwide Developer Conference**

  - **Product Hunt** featured


  ## Pricing


  ### Free Plan

  - Daily photo, quote, and mantra

  - Main focus setting

  - Basic to-do lists

  - Weather and quick links

  - Customizable visibility settings


  ### Momentum Plus

  - **Monthly**: $3.33/month

  - **Annual**: $19.99/year (save 50%)

  - All free features plus:
    - Unlimited Focus Mode
    - Tab Stash
    - Notes AI & Ask AI
    - Soundscapes
    - Vision board
    - Task manager integrations
    - Custom photos
    - Priority support

  ## Use Cases


  ### Morning Routine Enhancement

  - Start your day with inspiration and clarity

  - Review your main focus before diving into work

  - Check weather while planning your day

  - See your top tasks at a glance


  ### Work Focus

  - Maintain awareness of daily priorities with every new tab

  - Quick access to frequently-used work tools

  - Ambient soundscapes for better concentration

  - Focus mode to minimize distractions


  ### Goal Tracking

  - Vision board for long-term aspirations

  - Daily focus to break down big goals

  - To-do lists for actionable steps

  - Inspirational quotes for motivation


  ### Student Productivity

  - Stay organized with assignment due dates

  - Quick links to learning platforms

  - Focus mode during study sessions

  - Daily motivation during challenging periods


  ## Privacy & Data


  Momentum emphasizes user privacy:

  - Does not share or sell user data

  - Minimal data collection

  - Optional account creation for sync features

  - Local storage for personal information


  ## Comparison with Alternatives


  ### vs. Infinity New Tab

  - **Momentum**: More minimalist and focused on daily inspiration

  - **Infinity**: More customizable with widgets and layouts

  - **Use Case**: Momentum for simplicity; Infinity for power users


  ### vs. Tabliss

  - **Momentum**: Feature-rich with productivity tools

  - **Tabliss**: Ultra-minimalist, customizable backgrounds

  - **Cost**: Momentum has premium tier; Tabliss is free


  ### vs. Manganum

  - **Momentum**: Established with large user base

  - **Manganum**: Newer with modern features

  - **Focus**: Momentum on daily inspiration; Manganum on productivity workflows


  ## Benefits


  ### Psychological

  - **Positive Start**: Beautiful visuals create positive associations with
  productivity

  - **Clarity**: Single main focus reduces decision paralysis

  - **Motivation**: Daily quotes inspire action

  - **Mindfulness**: Intentional pause with each new tab


  ### Practical

  - **Quick Access**: Links and tools immediately available

  - **Habit Building**: Daily focus ritual reinforces productivity habits

  - **Organization**: Consolidated productivity dashboard

  - **Customization**: Tailor to personal workflow


  ## How to Get Started


  1. Install from Chrome Web Store or Firefox Add-ons

  2. Enter your name when prompted

  3. Set your main focus for the day

  4. Customize which features to display

  5. Add your favorite links

  6. Optional: Upgrade to Plus for advanced features


  ## Best Practices


  1. **Set Main Focus Each Morning**: Make it a daily ritual

  2. **Keep To-Do List Short**: 3-5 items maximum for focus

  3. **Use Focus Mode**: Enable during deep work sessions

  4. **Customize Thoughtfully**: Show only what serves you

  5. **Connect Task Manager**: Integrate with your existing workflow

  6. **Explore Soundscapes**: Find what helps your concentration


  ## Ideal For


  - People who open many new tabs throughout the day

  - Visual learners who respond to aesthetic inspiration

  - Those seeking gentle productivity reminders

  - Users who want minimal-effort organization

  - Anyone building better morning routines

  - Remote workers needing environmental variety (via photos)


  ## Not Ideal For


  - Users wanting extensive customization (use Infinity New Tab)

  - Those who prefer completely minimal new tabs (use Tabliss)

  - People who find visual elements distracting

  - Users not willing to pay for advanced features

  - Those wanting deep analytics (use RescueTime)
