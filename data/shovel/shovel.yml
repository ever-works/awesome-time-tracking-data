markdown: >-
  ## Overview


  Shovel is an intelligent study planner that takes the guesswork out of
  academic scheduling. The app's standout feature is its ability to upload
  course syllabi and automatically generate customized study schedules, ensuring
  students stay on top of their coursework without manual planning overhead.


  ## Features


  - **Syllabus Upload**: Upload course syllabi for automatic schedule generation

  - **Automated Study Schedules**: AI creates customized study plans based on
  syllabus content

  - **Assignment Tracking**: Monitor upcoming assignments and deadlines

  - **Exam Preparation**: Automated study plans leading up to exams

  - **Time Allocation**: Intelligent distribution of study time across courses

  - **Progress Tracking**: Monitor completion of study tasks and goals

  - **Deadline Management**: Visual representation of upcoming academic
  deadlines

  - **Course Organization**: Manage multiple courses and their requirements

  - **Study Reminders**: Notifications to keep students on track

  - **Adaptive Planning**: Adjusts schedules based on progress and changing
  priorities


  ## Stress-Free Productivity


  Shovel reduces academic stress by:

  - Eliminating the need to manually plan study schedules

  - Ensuring even distribution of study time across courses

  - Providing early warnings about upcoming deadlines

  - Breaking large projects into manageable daily tasks

  - Adapting to unexpected changes in schedules


  ## How It Works


  1. **Upload Syllabi**: Take photos or upload PDF syllabi from courses

  2. **Automatic Analysis**: Shovel extracts assignments, exams, and deadlines

  3. **Schedule Generation**: Creates optimized study schedule across all
  courses

  4. **Daily Tasks**: Provides daily study tasks to stay on track

  5. **Progress Monitoring**: Tracks completion and adjusts future schedules


  ## Benefits


  - **Time Savings**: No more manual schedule planning

  - **Better Balance**: Ensures attention to all courses, not just urgent ones

  - **Reduced Procrastination**: Clear daily tasks make it easy to start
  studying

  - **Improved Grades**: Consistent study habits lead to better academic
  performance

  - **Lower Stress**: Confidence that nothing will be forgotten or left to last
  minute


  ## Use Cases


  - College students juggling multiple courses

  - Students who struggle with time management

  - Anyone who wants to avoid last-minute cramming

  - Students returning to education after a break

  - High-achievers optimizing study efficiency


  ## Platform


  Available as a mobile app for iOS and Android.


  ## Pricing


  Check the Shovel website or app store for current pricing plans. Many student
  apps offer free trials or discounted student pricing.
