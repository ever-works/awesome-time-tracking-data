markdown: >-
  ## Overview


  Freelance time and billing encompasses the complete workflow of tracking work
  hours, setting appropriate rates, creating professional invoices, and managing
  client billing relationships to ensure sustainable, profitable freelance
  business operations.


  ## Rate Setting Strategies


  ### Hourly Rate Calculation

  **Formula**: (Desired Annual Income + Expenses + Taxes + Profit) / Billable
  Hours


  Example:

  - Desired income: $80,000

  - Business expenses: $15,000

  - Taxes (30%): $24,000

  - Profit margin: $10,000

  - Total needed: $129,000

  - Billable hours: 1,200/year (30 weeks × 40 hrs × 70% utilization)

  - **Hourly rate**: $129,000 / 1,200 = $107.50/hour


  ### Project-Based Pricing

  - Estimate total hours needed

  - Apply hourly rate

  - Add buffer (20-30%)

  - Consider value to client

  - Fixed price quote


  ### Value-Based Pricing

  - Price on outcome, not time

  - What's it worth to client?

  - Premium for expertise

  - Faster = more valuable

  - Decouple time from money


  ### Retainer Agreements

  - Monthly recurring revenue

  - Set hours per month

  - Predictable income

  - Consistent availability

  - Roll-over or use-it terms


  ## Time Tracking Best Practices


  ### Track Everything

  - Client calls

  - Email correspondence

  - Research time

  - Revisions

  - Administrative (if billable)

  - Travel time


  ### Real-Time Logging

  - Start timer when beginning task

  - Don't track from memory

  - Reduces forgotten time

  - More accurate

  - Less dispute


  ### Detailed Descriptions

  - What you worked on

  - For which deliverable

  - Context for value

  - Justifies billing

  - Refreshes memory


  ### Round Appropriately

  - 6-minute increments (legal standard)

  - 15-minute blocks (common)

  - Round in your favor (within reason)

  - Be consistent

  - Disclose method


  ## Billable vs Non-Billable


  ### Always Billable

  - Direct client work

  - Meetings about project

  - Research for project

  - Revisions (within scope)

  - Email/comms about work


  ### Sometimes Billable

  - Travel time (negotiate)

  - Setup/tear-down

  - Learning new tools (if client benefits)

  - Team coordination


  ### Never Billable

  - Your own marketing

  - Invoicing/admin

  - Skill development (general)

  - Proposals (unless won)

  - Networking


  ## Client Communication


  ### Before Project

  - Clarify billing method

  - Explain rate structure

  - Set expectations

  - Discuss payment terms

  - Get written agreement


  ### During Project

  - Regular time updates

  - Flag if approaching estimate

  - Transparent hour logs

  - Quick responses to questions

  - Proactive communication


  ### Invoicing

  - Detailed breakdown

  - Clear descriptions

  - Attached timesheets

  - Professional format

  - Consistent schedule


  ## Invoice Components


  ### Essential Elements

  - Your business info

  - Client info

  - Invoice number

  - Date

  - Due date

  - Payment terms

  - Itemized hours/tasks

  - Rates applied

  - Subtotal

  - Taxes (if applicable)

  - Total due

  - Payment methods


  ### Best Practices

  - Professional template

  - Consistent numbering

  - Clear line items

  - Accurate math

  - Timely sending

  - Follow-up reminders


  ## Tools for Freelancers


  ### Time Tracking

  - **Toggl Track**: Simple, fast

  - **Harvest**: Time + invoicing

  - **Clockify**: Free, unlimited

  - **FreshBooks**: All-in-one

  - **Timely**: AI memory


  ### Invoicing

  - **Harvest**: Converts time to invoices

  - **FreshBooks**: Professional templates

  - **Wave**: Free, good for starters

  - **Invoice Ninja**: Open-source

  - **QuickBooks**: Full accounting


  ### Combined Solutions

  - **Harvest**: Best integration

  - **Paymo**: Project + time + billing

  - **Bonsai**: Contracts + time + invoices

  - **HoneyBook**: Full client management


  ## Payment Terms


  ### Net Terms

  - Net 15: Payment due in 15 days

  - Net 30: Industry standard

  - Net 45: Risky, longer wait

  - Due on receipt: Immediate


  ### Deposits

  - 25-50% upfront

  - Reduces risk

  - Shows commitment

  - Covers initial costs


  ### Milestone Billing

  - Break project into phases

  - Bill at completion of each

  - Better cash flow

  - Reduced exposure


  ### Late Fees

  - 1.5% per month common

  - State in contract

  - Enforce consistently

  - Motivates timely payment


  ## Common Challenges


  ### Scope Creep

  - **Problem**: Extra work not billed

  - **Solution**: Change orders, clear boundaries

  - **Prevention**: Detailed SOW, approve changes


  ### Underestimating

  - **Problem**: Projects take longer

  - **Solution**: Add 30% buffer, track actuals

  - **Learning**: Improve estimates over time


  ### Unpaid Invoices

  - **Problem**: Clients delay/don't pay

  - **Solution**: Deposits, milestones, contracts

  - **Last resort**: Collections, legal


  ### Tracking Diligence

  - **Problem**: Forgetting to track

  - **Solution**: Timers, mobile apps, end-of-day review

  - **Habit**: Make it automatic


  ## Profitability Analysis


  ### Calculate True Hourly Rate

  **Formula**: Total Revenue / Total Hours Worked (including unbilled)


  Example:

  - Billed revenue: $10,000

  - Billable hours logged: 100

  - Apparent rate: $100/hour

  - Actual hours worked (including admin): 150

  - **True rate**: $10,000 / 150 = $66.67/hour


  ### Track Utilization

  **Formula**: Billable Hours / Total Available Hours

  - Target: 60-80%

  - <50%: Not enough client work

  - >90%: Burnout risk, no business development


  ### Client Profitability

  - Time invested vs revenue

  - High-maintenance identification

  - Rate negotiations needed

  - Fire clients if necessary


  ## Proposal & Estimation


  ### Time-Based Estimates

  1. Break down deliverables

  2. Estimate hours per task

  3. Add subtasks often missed

  4. Sum total hours

  5. Add 20-30% buffer

  6. Apply hourly rate


  ### Fixed-Price Quotes

  - Time estimate × hourly rate

  - Add risk premium (20-50%)

  - Consider value delivered

  - Build in scope definition

  - Clear change order process


  ## Tax Considerations


  ### Self-Employment Tax

  - 15.3% (Social Security + Medicare)

  - Quarterly estimated payments

  - Track deductible expenses

  - Separate business bank account


  ### Deductible Expenses

  - Home office (if qualified)

  - Equipment and software

  - Professional development

  - Business travel

  - Health insurance (self-employed)


  ## Automation Opportunities


  ### Recurring Invoices

  - Retainer clients

  - Monthly services

  - Subscription-based work

  - Set and forget


  ### Payment Reminders

  - Automatic before due date

  - Escalating after due

  - Professional tone

  - Reduce manual follow-up


  ### Time Entry Shortcuts

  - Project templates

  - Task favorites

  - Quick-add features

  - Voice logging


  ## Client Onboarding


  ### Initial Discussion

  - Explain billing approach

  - Share rate sheet

  - Discuss payment terms

  - Set communication expectations

  - Provide sample invoice


  ### Contract Elements

  - Hourly rate or project fee

  - Payment schedule

  - Late payment terms

  - Scope definition

  - Change order process

  - Kill fee

  - IP ownership


  ## Growing Beyond Hourly


  ### Productized Services

  - Standard deliverable

  - Fixed price

  - Repeatable process

  - Scale revenue


  ### Passive Income

  - Digital products

  - Online courses

  - Templates/tools

  - Affiliate income


  ### Team Building

  - Hire subcontractors

  - Mark up their time

  - Leverage expertise

  - Scale without personal hours


  ## Success Metrics


  - Monthly recurring revenue

  - Average hourly rate (true)

  - Utilization percentage

  - Days to payment

  - Client retention rate

  - Profit margin


  ## Red Flags


  - Working 60+ hours consistently

  - True rate below target

  - Unpaid invoices >30 days

  - Scope creep on every project

  - No time for business development

  - Burnout symptoms


  ## Resources


  - Freelancers Union

  - Double Your Freelancing (podcast)

  - "The Freelancer's Bible"

  - Industry-specific forums

  - Local freelancer meetups


  ## Quote


  "Your time is your inventory. Track it carefully, price it appropriately, and
  protect it fiercely."
