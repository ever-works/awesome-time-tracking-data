markdown: >-
  ## Overview


  Sorted 3 is an innovative time blocking app that takes an auto-scheduling
  approach to daily planning. Instead of manually dragging tasks into time
  slots, Sorted automatically fills tasks into available slots based on duration
  estimates and priorities.


  ## Features


  ### Auto-Scheduling

  - **Intelligent Scheduling** - App automatically fills tasks into timeline
  based on duration

  - **Duration Estimates** - Add time estimates to tasks for automatic
  scheduling

  - **Timeline View** - Visual timeline showing your entire day

  - **Flexible Planning** - Easily adjust auto-scheduled tasks as needed

  - **Priority-Based** - Schedule higher priority tasks first


  ### Task Management

  - **Task Inbox** - Capture tasks quickly and schedule them later

  - **Recurring Tasks** - Set up repeating tasks and routines

  - **Sub-tasks** - Break down larger tasks into smaller steps

  - **Task Notes** - Add details and context to tasks

  - **Quick Entry** - Rapid task capture with keyboard shortcuts


  ### Integration & Sync

  - **Calendar Integration** - Sync with iOS Calendar to see meetings alongside
  tasks

  - **Hyper-Scheduling** - Combine calendar events and tasks in one timeline

  - **iCloud Sync** - Sync across all Apple devices

  - **Widgets** - iOS widgets for at-a-glance planning


  ## Unique Approach


  Unlike manual time blocking apps, Sorted 3 does the scheduling work for you,
  making it easier to maintain a structured day without constant manual
  adjustments.


  ## Platform


  iOS, iPadOS, macOS


  ## Pricing


  Free with optional premium subscription.
