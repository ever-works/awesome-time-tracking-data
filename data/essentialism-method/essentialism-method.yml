markdown: >-
  ## Overview


  Essentialism is a disciplined, systematic approach for determining where our
  highest point of contribution lies, then making execution of those things
  almost effortless, based on Greg McKeown's book "Essentialism: The Disciplined
  Pursuit of Less."


  ## Core Philosophy


  "Less but better" - The way of the Essentialist isn't about getting more done
  in less time, but about getting only the right things done.


  ## Three Core Truths


  **1. Individual Choice:**

  We can choose how to spend our energy and time. Without choice, there is no
  point in talking about trade-offs.


  **2. Prevalence of Noise:**

  Almost everything is noise, and a very few things are exceptionally valuable.
  The majority of efforts produce marginal results.


  **3. Reality of Trade-offs:**

  We can't have it all or do it all. If we could, there would be no reason to
  evaluate or eliminate options.


  ## The Essentialist Process


  **Explore:**

  - Distinguish the vital few from the trivial many

  - Ask "What is essential?"

  - Create space to think

  - Look beyond the obvious

  - Play and rest to see clearly


  **Eliminate:**

  - Cut out the trivial many

  - Say "no" gracefully

  - Uncommit from non-essentials

  - Set boundaries

  - Edit ruthlessly


  **Execute:**

  - Remove obstacles and make execution effortless

  - Create buffers

  - Subtract to make progress

  - Build routines

  - Focus on essentials


  ## Key Principles


  **Do Less, But Better:**

  Invest time and energy only in activities that make the highest contribution.


  **The Power of No:**

  Learn to say no to good opportunities to say yes to great ones.


  **90 Percent Rule:**

  Rate opportunities 0-100. Anything less than 90 is a 0. This forces selective
  criteria.


  **Trade-offs:**

  Stop asking "How can I do it all?" and start asking "Which problem do I want?"


  ## Benefits


  - Greater clarity of purpose

  - More meaningful achievements

  - Less stress and overwhelm

  - Higher quality work

  - Better work-life integration

  - More fulfillment


  ## Implementation


  - Schedule thinking time

  - Evaluate opportunities against strict criteria

  - Practice saying no

  - Eliminate non-essentials

  - Build routines around essentials

  - Create buffers in schedule

  - Celebrate subtraction
