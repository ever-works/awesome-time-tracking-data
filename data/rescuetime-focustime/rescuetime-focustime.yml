markdown: >-
  ## Overview


  RescueTime's FocusTime (also called Focus Sessions) is a powerful website
  blocker designed to help stay focused, be more productive, and build better
  habits.


  ## How It Works


  ### Intelligent Blocking

  - **Automatic Sensing**: Unlike other blockers, FocusTime automatically senses
  when you're distracted

  - **Goal-Based**: Blocks websites based on daily goals, time spent on
  unproductive activities

  - **Calendar Integration**: Responds to scheduled calendar events

  - **Default Blocking**: Blocks websites visited in last three months scored as
  "Personal" or "Distracting"


  ### Productivity Scoring

  - **Activity Levels**: Apps and websites have productivity levels (Personal,
  Distracting, Productive)

  - **Customizable**: Adjust productivity scores on Activities page

  - **Smart Defaults**: Default categorization with option to customize


  ## Features


  ### Blocking Options

  - **No Blocking**: Allow all sites

  - **Block Distractions**: Block distracting sites only

  - **Block Distractions & Communications**: Strictest mode

  - **Timed Unblocking**: Allow site unblocking after 15-second reflection pause

  - **Hard Blocking**: No unblocking until session ends


  ### Focus Session Enhancements

  - **Notification Silencing**: Mute notifications during sessions

  - **Music Integration**: Include focus music from Spotify or YouTube

  - **Session Scheduling**: Pre-schedule focus sessions


  ## Browser Support


  Works on majority of modern browsers: Chrome, Firefox, and Brave.


  ## Key Advantage


  Automatic distraction detection and blocking removes reliance on willpower to
  manually activate blocking.
