markdown: >-
  ## Overview


  Time confetti is a concept coined by Brigid Schulte, author of "Overwhelmed:
  How to Work, Love & Play When No One Has the Time," describing the breaking up
  and interruption of time into small, fragmented moments - like confetti.


  ## What It Describes


  The human behavior of using free time to do little bits of seemingly
  inconsequential tasks, with little bits of seconds and minutes lost to
  unproductive multitasking.


  ## Impact on Productivity


  ### Research Findings

  - **23-Minute Recovery**: University of California study shows it takes up to
  23 minutes to return to original task after interruption

  - **6-Minute Switching**: Average desk worker changes desktop applications
  every six minutes

  - **Reduced Productivity**: Collectively, all that confetti adds up to
  significant productivity loss


  ### Cognitive Effects

  - Makes us less productive at work

  - Increases vulnerability to burnout and fatigue

  - Reduces enjoyment of free time

  - Creates feeling of time poverty


  ## Perception vs Reality


  When asked to reflect on their time, people:

  - Enjoy free time less

  - Estimate they had less free time than they actually did

  - Feel even more time impoverished than they are


  ## Solutions


  ### Time Blocking

  The primary way to combat time confetti:

  - Block out time for uninterrupted work

  - Be intentional about limited time at work

  - Protect deep focus periods

  - Consolidate similar tasks


  ### Other Strategies

  - Minimize task switching

  - Turn off notifications during focus time

  - Schedule specific times for email and messages

  - Practice single-tasking

  - Create buffer time between commitments
