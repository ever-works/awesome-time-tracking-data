markdown: >-
  ## Overview


  ClockIt is a comprehensive time tracking solution that converts any iPad or
  mobile device into a sophisticated time clock kiosk. The platform provides
  multiple clock-in methods and advanced security features to ensure accurate
  attendance tracking for businesses of all sizes.


  ## Features


  ### Clock-In Methods

  - **PIN Entry**: Employees can clock in using a unique PIN code

  - **QR Code Scanning**: Quick clock-in via QR code scanning

  - **Photo Capture**: Live photo verification to prevent buddy punching

  - **Facial Recognition**: Biometric facial recognition for secure
  authentication

  - **Device PIN**: Additional security layer for kiosk devices


  ### Geofencing & Location Tracking

  - Advanced geofencing capabilities to designate specific clock-in locations

  - GPS location capture when employees clock in and out

  - Precise and reliable attendance records with location data

  - Real-time location tracking for mobile workforce


  ### Notifications & Alerts

  - Customizable notifications for clock-in and clock-out events

  - Overtime alerts to prevent labor law violations

  - Absence notifications to keep managers informed

  - Real-time sync for immediate updates


  ### Device Compatibility

  - Compatible with iPhones, iPads, and iPod Touch devices

  - Android tablet support

  - Requires internet connection for real-time data sync

  - Cannot work offline (requires connectivity for location and time data)


  ### Kiosk Features

  - Transform tablets into dedicated time clock stations

  - Shared device mode for multiple employees

  - Customizable kiosk interface

  - Easy setup and deployment


  ## Pricing


  - **Free Plan**: Available for basic time tracking

  - **Paid Plans**: Starting at $2.99/user per month

  - **No Additional App Cost**: Kiosk app included with ClockIt subscription


  ## Recognition


  ClockIt was featured as one of "The 5 Best Time Clock Kiosk Apps in 2026"
  according to industry reviews, recognized for its comprehensive feature set
  and ease of use.
