markdown: >-
  ## Overview


  Payoneer's Freelance Hourly Rate Calculator is specifically designed for
  international freelancers who work with clients across borders. It helps
  calculate rates that account for international payment fees, currency
  conversion, and other cross-border considerations.


  ## Key Features


  - International payment fee considerations

  - Currency conversion impact

  - Income goal-based calculations

  - Expense tracking

  - Billable hours estimation

  - Real-world earnings projection


  ## How It Works


  The calculator helps you move away from guesswork by grounding your rate in
  real numbers:

  1. Enter annual income goals

  2. Add business expenses

  3. Consider payment processing fees

  4. Factor in currency conversion (0.5% fee)

  5. Calculate billable hours

  6. Receive rate recommendation


  ## International Considerations


  - **Currency Exchange**: Competitive rates based on real-time exchange with
  0.5% fee

  - **Payment Reception**: Free for local payments in AUD, CAD, EUR, GBP, HUF,
  NZD, RON, SGD, TRY, USD

  - **Credit Card Payments**: Up to 3.99% fee plus $0.49 fixed fee in certain
  countries

  - **Multi-currency Support**: Receive payments in multiple currencies


  ## Rate Calculation Formula


  Annual income goal (including taxes + business expenses) ÷ billable hours per
  year = minimum hourly rate


  ## Business Expenses to Consider


  - Software and tools subscriptions

  - Equipment and hardware

  - Insurance (health, liability)

  - Marketing and advertising

  - Professional development

  - Payment processing fees

  - Currency conversion costs


  ## Benefits for International Freelancers


  - Accounts for cross-border payment costs

  - Helps maintain profitability across currencies

  - Ensures rates reflect real net earnings

  - Supports global payment network

  - Free to use


  ## Use Cases


  - Setting rates for international clients

  - Evaluating project proposals from abroad

  - Planning income with multiple currencies

  - Accounting for payment platform fees

  - Cross-border freelance budgeting


  ## About Payoneer


  Payoneer is a global payment platform for freelancers and service providers,
  offering international money transfers and payment solutions in over 200
  countries.


  ## Pricing


  Free calculator tool, no Payoneer account required to use.
