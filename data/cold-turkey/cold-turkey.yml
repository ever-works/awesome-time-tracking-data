markdown: >-
  ## Overview


  Cold Turkey Blocker is a customizable desktop-focused blocker for Windows and
  macOS that has strong, hard-to-bypass enforcement. It gives users granular
  control to block distracting websites and desktop applications with advanced
  scheduling and enforcement options.


  ## Features


  - **Website Blocking**: Block distracting websites across all browsers

  - **Application Blocking**: Block desktop apps (games, social media apps,
  etc.)

  - **Custom Block Lists**: Create multiple lists for different types of blocks

  - **Advanced Scheduling**: Set up complex blocking schedules

  - **Frozen Turkey Mode**: Ultimate lockdown that can't be disabled

  - **Break Scheduling**: Schedule regular breaks between focus sessions

  - **Password Protection**: Require password to modify or disable blocks

  - **Statistics**: Track blocked time and blocked access attempts

  - **Exceptions**: Set up conditional blocks (e.g., block only during work
  hours)

  - **Timed Lockout**: Temporary bans that can't be undone until timer expires

  - **Import/Export**: Share block lists with others or across devices

  - **Granular Rules**: Create sophisticated blocking logic


  ## Frozen Turkey Mode


  Cold Turkey's most powerful feature is "Frozen Turkey":

  - Once activated, blocks are virtually impossible to bypass

  - Can't be disabled by uninstalling the app

  - Persists through system restarts

  - Requires waiting for the full timer duration

  - Designed for users who absolutely need unbreakable commitment


  ## Advanced Scheduling


  Cold Turkey excels at complex scheduling scenarios:

  - Block sites only during specific hours

  - Different blocks for different days of the week

  - Recurring schedules that run automatically

  - Time budgets (e.g., allow 30 minutes per day)

  - Break scheduling to prevent burnout


  ## Platform Support


  - **Windows**: Full native support

  - **macOS**: Complete Mac application

  - **Linux**: Not officially supported


  ## Pricing


  - **Free Version**: Basic blocking features

  - **Pro Version**: Approximately $39 one-time payment for lifetime access
    - Includes Frozen Turkey mode
    - Advanced scheduling
    - Application blocking
    - All future updates

  ## Best For


  - PC and Mac users who need strong enforcement

  - People who want granular control over blocking rules

  - Users who need to block both websites and desktop applications

  - Those who value one-time payment over subscriptions

  - Anyone needing complex scheduling scenarios

  - Gamers trying to limit gaming time


  ## Comparison to Competitors


  **vs. SelfControl**: Cold Turkey works on Windows and Mac (not just Mac), has
  more features, but requires payment for Pro features


  **vs. Freedom**: Freedom offers better cross-platform support (including
  mobile), but Cold Turkey has stronger enforcement on desktop


  **vs. FocusMe**: Both offer similar feature sets; Cold Turkey is slightly
  simpler while FocusMe has even more advanced options


  ## User Reviews (2026)


  Cold Turkey maintains high ratings for:

  - Effectiveness of blocking

  - Granular control options

  - One-time payment model

  - Strong enforcement mechanisms


  Some users note the interface could be more modern, but functionality is
  excellent.


  ## Security & Enforcement


  Cold Turkey uses system-level hooks to ensure blocks are difficult to bypass:

  - Hosts file modifications

  - Process monitoring

  - System service integration

  - Protected mode features


  ## Updates


  Regularly updated to maintain compatibility with latest Windows and macOS
  versions. Active development with responsive support team.


  ## Tagline


  "The Toughest Website & App Blocker on the Internet" - and it lives up to that
  claim.
