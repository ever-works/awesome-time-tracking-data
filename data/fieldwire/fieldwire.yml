markdown: >-
  ## Overview


  Fieldwire is a construction management platform acquired by Hilti that focuses
  on real-time jobsite coordination. While not primarily a time tracking tool,
  it excels at task management and workforce coordination for construction
  teams, making it ideal for on-site project management and supervision.


  ## Core Strengths


  ### Task Management

  - Create and assign tasks directly on blueprints

  - Track task status and completion

  - Set priorities and due dates

  - Attach photos and documents to tasks

  - Real-time updates for all team members

  - Task templates for recurring work


  ### Document Management

  - Centralize plans and blueprints

  - Version control for drawings

  - Markup and annotation tools

  - Share documents with subcontractors

  - Organize by discipline or location

  - Access latest drawings in the field


  ### Checklists & Inspections

  - Create custom inspection checklists

  - QA/QC documentation

  - Punch list management

  - Safety inspections

  - Progress tracking

  - Sign-off workflows


  ### Offline Functionality

  - Access all features without internet connection

  - Perfect for remote construction sites

  - Sync automatically when connection restored

  - Download plans and documents for offline use

  - Continue working regardless of cell coverage


  ## Target Market


  ### Project Types

  - Commercial construction

  - Residential construction

  - Infrastructure projects

  - Renovation and remodeling

  - Multi-family developments


  ### User Roles

  - General contractors

  - Superintendents

  - Foremen

  - Subcontractors

  - Project managers

  - Quality control teams


  ## Platform Features


  ### Mobile Apps

  - iOS (iPhone and iPad)

  - Android (phones and tablets)

  - Full-featured mobile experience

  - Camera integration for photos

  - GPS location tagging


  ### Web Dashboard

  - Desktop planning and management

  - Comprehensive reporting

  - Team administration

  - Project setup and configuration

  - Analytics and insights


  ## Integration Capabilities


  Fieldwire integrates with:

  - Procore

  - Autodesk BIM 360

  - PlanGrid

  - Various accounting systems

  - Cloud storage services


  ## Typical Workflows


  ### Daily Field Management

  1. Review tasks assigned for the day

  2. Access current blueprints offline

  3. Complete assigned work

  4. Document progress with photos

  5. Mark tasks complete

  6. Submit daily reports


  ### Punch List Process

  1. Walk jobsite conducting inspection

  2. Create punch items directly on plans

  3. Assign to responsible parties

  4. Attach photos showing issues

  5. Track resolution

  6. Verify completion


  ### RFI Management

  1. Identify issue in the field

  2. Create RFI with location and photos

  3. Route to appropriate party

  4. Track response time

  5. Document resolution

  6. Update drawings as needed


  ## Unique Advantages


  1. **Visual Task Management**: Pin tasks directly to blueprint locations

  2. **Robust Offline Mode**: Full functionality without internet

  3. **Document Control**: Always access latest drawings

  4. **Collaboration**: Real-time updates across entire team

  5. **Mobile-First**: Designed for field use, not office adaptation


  ## Comparison to Time Tracking Tools


  Fieldwire complements dedicated time tracking systems:

  - **Fieldwire**: Task and document management, what work was done

  - **Time Tracking**: Hours worked, job costing, payroll data

  - **Together**: Complete picture of project progress and labor costs


  Many contractors use Fieldwire alongside ClockShark, busybusy, or mJob for
  comprehensive field management.


  ## Benefits


  ### For Superintendents

  - Coordinate subcontractors efficiently

  - Track project progress visually

  - Identify bottlenecks quickly

  - Maintain quality standards

  - Reduce rework through clear communication


  ### For Foremen

  - Know exactly what needs to be done

  - Access current drawings

  - Document completed work

  - Report issues immediately

  - Coordinate with other trades


  ### For Project Managers

  - Real-time jobsite visibility from office

  - Track task completion rates

  - Identify schedule delays early

  - Monitor quality compliance

  - Generate progress reports


  ### For Subcontractors

  - Receive clear work assignments

  - Access relevant drawings

  - Submit deliverables digitally

  - Track own progress

  - Improve coordination with GC


  ## Pricing


  Fieldwire offers tiered pricing:

  - **Free**: Basic features for small projects

  - **Pro**: Advanced features for active projects

  - **Business Plus**: Enterprise features and support

  - **Premier**: Unlimited projects and custom solutions


  Pricing typically per user per month. Contact Fieldwire for quotes.


  ## Training & Support


  - Comprehensive video tutorials

  - Live onboarding sessions

  - Knowledge base articles

  - Email and phone support

  - Regional training events

  - Customer success managers (higher tiers)


  ## Why Construction Teams Choose Fieldwire


  1. Solves critical coordination problems

  2. Works reliably offline (crucial for construction sites)

  3. Intuitive interface requires minimal training

  4. Visual task management resonates with field teams

  5. Backed by Hilti's reputation and resources

  6. Excellent mobile experience

  7. Strong document management capabilities


  ## Best For


  - Construction teams needing better coordination

  - Projects with multiple subcontractors

  - Sites with poor internet connectivity

  - Companies wanting to go paperless

  - Teams struggling with outdated drawing sets

  - Organizations focused on quality and punch list management


  ## Not Ideal For


  - Companies primarily needing time tracking (use dedicated time tracking
  software)

  - Very small residential projects (may be overkill)

  - Office-based planning (better used in field)

  - Detailed financial/accounting needs (integrate with other tools)


  ## Getting Started


  1. Sign up for free or trial account

  2. Upload project drawings

  3. Set up team members

  4. Create task templates

  5. Install mobile apps on field devices

  6. Train foremen and superintendents

  7. Start with pilot project

  8. Scale to additional projects
