markdown: >-
  ## Overview


  GoodNotes is a digital handwriting and note-taking app designed primarily for
  iPad with Apple Pencil support. It allows users to create and write in digital
  notebooks, making it a popular platform for digital bullet journaling.


  ## Features


  - Handwriting input using Apple Pencil with realistic pen feel

  - Digital bullet journal templates for daily logs, monthly logs, habit
  trackers, and more

  - Searchable handwritten notes across all notebooks

  - Cloud-synced notes that cannot be lost

  - Unlimited pages without the physical constraints of a paper notebook

  - Easy reorganization of notebook content

  - Supports various pen styles, highlighters, and shape tools

  - PDF annotation and import capabilities

  - Multiple notebook organization with folder structures


  ## Use Cases


  - Digital bullet journaling for users who prefer the analog feel of
  handwriting

  - Paperless planning and task management

  - Meeting notes with the convenience of searchability

  - Creative journaling and mood tracking

  - Habit tracking and goal planning


  ## Pricing


  GoodNotes offers a free tier with limited notebooks and a premium subscription
  for full access to all features, unlimited notebooks, and cross-device sync.
