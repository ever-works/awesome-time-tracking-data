name: Fresh or Fried
description: A time management approach based on matching task complexity to
  your current brain energy level. When your brain is fresh (high energy),
  tackle complex, demanding tasks. When fried (low energy), switch to easy,
  routine tasks that require less cognitive effort.
source_url: https://www.atlassian.com/blog/productivity/time-management-strategies
category: Time Management Technique
tags:
  - energy-management
  - task-matching
  - cognitive-load
markdown: >-
  ## Overview


  Fresh or Fried is a productivity technique that bases task selection on your
  current cognitive energy state.


  ## Core Principles


  - **Fresh** - When your brainpower is at its peak, do the complex, demanding
  tasks that require deep thinking

  - **Fried** - When your mental energy is depleted, do easy, routine tasks that
  require minimal cognitive effort


  The technique encourages awareness of your own energy patterns and matching
  task difficulty to your current capacity rather than forcing through difficult
  work when exhausted.
