markdown: >-
  ## Overview


  ScreenZen is a digital wellbeing tool available on iPhone, Android, Mac, and
  Windows. It delivers a robust set of screen time management features entirely
  for free, with no paywalls or hidden advertisements.


  ## Features


  - **Pause Screens**: Forces a pause screen before an app opens, similar to One
  Sec, adding intentional friction to impulsive app openings

  - **Daily Open Limits**: Configurable limits on how many times an app can be
  opened per day (e.g., five visits per day)

  - **Per-Visit Time Limits**: Maximum duration per app visit (e.g., 15 minutes
  per session)

  - **Time-of-Day Rules**: Different blocking rules can be configured for
  different times of the day

  - **Cross-Platform Support**: Available on iPhone, Android, Mac, and Windows

  - **Highly Customizable**: Tailored rules per app, time of day, and usage
  pattern


  ## Pricing


  100% free with no premium tier, paywalls, or advertisements.


  ## Use Cases


  - Users who want to introduce digital friction without committing to a paid
  subscription

  - Budget-conscious individuals seeking customizable screen time controls

  - Anyone looking to redesign how they interact with distracting apps through
  controlled, limited access rather than total blocking
