markdown: >-
  ## Overview


  The ONE Thing is a focusing philosophy developed by Gary Keller that helps you
  identify the single most important action that will have the greatest impact.
  It's based on asking one powerful question.


  ## The Focusing Question


  "What's the ONE thing I can do such that by doing it everything else will be
  easier or unnecessary?"


  Apply this question to different timeframes:

  - Right now

  - Today

  - This week

  - This month

  - This year

  - In my life


  ## Key Principles


  **Success is Sequential:**

  Extraordinary results come from doing one thing at a time, not multitasking.


  **The Domino Effect:**

  The right action creates a chain reaction, knocking down bigger and bigger
  challenges.


  **Live with Purpose:**

  Know your ONE Thing and use it as compass for decisions.


  **Priority vs Priorities:**

  The word "priority" was singular for centuries. Multiple priorities dilute
  focus.


  **Saying No:**

  Protecting your ONE Thing requires saying no to almost everything else.


  ## Time Blocking for ONE Thing


  1. **Time Block Your Time Off** - Protect personal time first

  2. **Time Block Your ONE Thing** - Schedule uninterrupted blocks for it

  3. **Time Block Your Planning Time** - Weekly and daily planning sessions


  ## Benefits


  - Extraordinary results in less time

  - Reduced overwhelm and stress

  - Clear direction and purpose

  - Better decisions about commitments

  - Faster progress on what matters most

  - Work-life balance through focus


  ## Application


  Use the focusing question at the start of each day, week, and strategic
  planning session to identify your highest-leverage action.
