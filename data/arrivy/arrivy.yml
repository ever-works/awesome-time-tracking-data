markdown: >-
  ## Overview


  Arrivy is a field service management platform that combines time tracking with
  job scheduling, crew coordination, and customer communication tools. It's
  specifically designed for construction companies and service businesses that
  need to track time and manage mobile teams in the field.


  ## Features


  - **Time Clock & Timesheets**: Track crew time with GPS-verified clock in/out

  - **Job Scheduling**: Assign and schedule jobs for field crews

  - **GPS Tracking**: Real-time location tracking of field workers

  - **Customer Notifications**: Automated updates to customers about arrival
  times

  - **Crew Coordination**: Manage multiple crews and their assignments

  - **Photo Documentation**: Capture job site photos and documentation

  - **Digital Forms**: Collect signatures, checklists, and other field data

  - **Reporting**: Generate reports on time, job completion, and crew
  productivity

  - **Integration**: Connect with QuickBooks, Stripe, and other business tools


  ## Use Cases


  - Construction companies

  - HVAC services

  - Plumbing and electrical contractors

  - Landscaping businesses

  - Home repair services


  ## Pricing


  Arrivy offers flexible pricing based on team size and features needed. Contact
  Arrivy for specific pricing details.
