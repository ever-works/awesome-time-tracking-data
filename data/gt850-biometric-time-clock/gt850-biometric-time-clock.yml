markdown: >-
  ## Overview


  The GT850 is a premium biometric time clock that combines advanced facial
  recognition technology with a large, user-friendly touchscreen interface,
  designed for demanding work environments.


  ## Key Features


  **Display**:

  - 8-inch high-resolution touchscreen

  - Full-color display

  - Intuitive touch interface

  - Easy-to-read in various lighting conditions


  **Biometric Technology**:

  - Integrated color camera

  - Optimized facial recognition algorithms

  - Liveness detection to prevent spoofing

  - Fast recognition speed (typically <1 second)

  - Works with safety equipment and PPE


  **Clock-In Options**:

  - Facial recognition (primary method)

  - RFID badge backup

  - PIN code entry

  - Manual administrator override


  ## Applications


  - Construction sites

  - Manufacturing facilities

  - Warehouses

  - Field service operations

  - Any environment needing reliable time capture


  ## Benefits


  - Eliminates buddy punching

  - Weatherproof construction

  - Large display visible from distance

  - Reduces time theft

  - Accurate attendance records

  - Easy employee onboarding


  ## Technical Specifications


  - Screen: 8" color touchscreen

  - Camera: Color camera for facial recognition

  - Connectivity: WiFi and Ethernet

  - Power: Standard AC power

  - Storage: Local storage for users and transactions

  - Backup: Battery backup for power outages


  ## Pricing


  The GT850 is positioned as a premium solution with pricing reflecting its
  advanced features and robust construction.
