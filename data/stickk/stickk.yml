markdown: >-
  ## Overview


  stickK is an online behavior change support system that uses commitment
  devices to help individuals stick to their goals. Users commit to a goal and
  set stakes or consequences in case they fail.


  ## How It Works


  ### Commitment Contracts


  stickK allows you to:


  - **Set a Goal**: Define what you want to achieve

  - **Choose Stakes**: Decide what happens if you fail

  - **Add Accountability**: Include supporters and referee

  - **Track Progress**: Report regularly on your commitment

  - **Face Consequences**: Stakes are enforced if you don't meet goals


  ### Types of Stakes


  - **Financial**: Lose money if you fail

  - **Social**: Embarrassment or loss of reputation

  - **Charitable**: Money goes to causes you support (or oppose)

  - **No Stakes**: Pure commitment with community support


  ## Key Features


  ### Community Aspect


  - **Supporters**: Friends who encourage you

  - **Referee**: Someone who verifies your progress

  - **Social Accountability**: Public commitment increases success

  - **Group Goals**: Join others working on similar objectives


  ### Flexibility


  - Specify your own negative consequences

  - Skip consequences entirely if preferred

  - Adjust commitment levels

  - Choose goal duration

  - Set custom milestones


  ## Behavioral Economics Foundation


  ### Loss Aversion


  stickK leverages the psychological principle that people are more motivated to
  avoid losses than to achieve equivalent gains. The potential loss of money or
  reputation creates stronger motivation than potential rewards.


  ### Commitment Device Theory


  A commitment device is a means to commit yourself to a particular course of
  action. By creating stakes, you make future deviation from your goal costly,
  increasing likelihood of success.


  ## Comparison with Beeminder


  ### stickK Strengths:


  - Simpler, more straightforward interface

  - Stronger community features

  - More flexibility in stake types

  - No required financial commitment

  - Referee verification system


  ### Beeminder Strengths:


  - More integrations for automatic tracking

  - Visual progress graphs

  - Automated data collection

  - More sophisticated tracking capabilities


  ## Use Cases


  ### Common Goals


  - Weight loss and fitness

  - Quitting smoking or other habits

  - Studying and learning

  - Creative projects

  - Financial goals

  - Productivity improvements

  - Time management


  ### Professional Applications


  - Meeting work deadlines

  - Completing certifications

  - Business development

  - Client deliverables

  - Skill acquisition


  ## Benefits


  ### Increased Success Rates


  - Financial stakes create real consequences

  - Social accountability leverages reputation

  - Referee verification prevents self-deception

  - Community support provides encouragement


  ### Flexibility


  - Choose your own stakes level

  - Define custom goals

  - Set your own timeline

  - Modify as needed


  ### Simplicity


  - Easy to understand

  - Quick setup

  - Clear structure

  - Straightforward reporting


  ## Pricing


  stickK is free to use. Users only pay if they fail their commitments and have
  chosen financial stakes.


  ## Best For


  - People who respond well to financial pressure

  - Those needing external accountability

  - Users wanting community support

  - Individuals struggling with self-discipline

  - Anyone willing to put money on the line


  ## Not Ideal For


  - Those uncomfortable with financial stakes

  - People preferring automated tracking

  - Users wanting detailed analytics

  - Those needing complex goal structures


  ## Philosophy


  stickK believes that putting something on the line—whether money, reputation,
  or pride—creates the motivation needed to achieve goals that might otherwise
  be abandoned.
