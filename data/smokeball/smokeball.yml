markdown: >-
  ## Overview


  Smokeball is an all-in-one legal practice management software that combines
  time tracking with case management, document automation, and billing. It's
  designed for small to medium-sized law firms looking to centralize all
  business activities in a single platform.


  ## Features


  - **Automatic Time Tracking** - AutoTime automatically captures time spent in
  emails, documents, and case work

  - **Case Management** - Organize all case files, documents, and communications

  - **Document Automation** - Generate legal documents from templates with smart
  fields

  - **Billing & Invoicing** - Convert tracked time to invoices with built-in
  trust accounting

  - **Email Integration** - Sync emails directly to case files

  - **Calendar & Deadlines** - Court deadlines and appointment scheduling

  - **Client Portal** - Secure portal for document sharing and communication

  - **Law-Specific Forms** - Pre-built forms for multiple practice areas

  - **Microsoft Office Integration** - Works seamlessly with Word and Outlook

  - **Mobile Apps** - Access case information and track time on the go


  ## Practice Areas


  - Family law

  - Personal injury

  - Estate planning

  - Real estate

  - Criminal defense

  - Immigration


  ## Pricing


  Pricing starts at approximately $39-79 per user per month depending on
  features, with a free trial available.
