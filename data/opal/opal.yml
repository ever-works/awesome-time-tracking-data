markdown: >-
  ## Overview


  Opal is a comprehensive focus and screen time management app for iPhone, iPad,
  and Mac. It helps you block distracting apps, track usage patterns, and build
  healthier relationships with your devices through intelligent blocking and
  insights.


  ## Features


  - **App Blocking**: Block distracting apps on schedule or demand

  - **Deep Focus Sessions**: Intensive blocking for focus time

  - **Smart Schedules**: Automatic blocking based on time or location

  - **Screen Time Insights**: Detailed usage analytics

  - **App Limits**: Daily time limits for specific apps

  - **Focus Playlists**: Curated app blocking combinations

  - **Sync Across Devices**: iPhone, iPad, and Mac

  - **Accountability**: Share progress with friends

  - **Break Allowances**: Scheduled app access during blocks

  - **Geofencing**: Location-based blocking rules


  ## Use Cases


  - Morning focus routines

  - Work deep focus sessions

  - Evening digital detox

  - Exam preparation

  - Mindful phone use

  - Social media reduction


  ## Pricing


  - **Free**: Basic blocking features

  - **Premium**: $99/year - Advanced features and insights

  - iOS and macOS
