markdown: >-
  ## Overview


  The Daily Plan Bar is one of the most popular time tracking methods used in
  bullet journaling, serving as both a planning and tracking tool.


  ## How It Works


  The Daily Plan Bar is essentially a visual timeline of your day:

  1. Draw a horizontal or vertical bar representing your waking hours

  2. Mark time increments (typically hourly or 30-minute blocks)

  3. Plot meetings, appointments, and planned activities

  4. Fill in actual activities as the day progresses

  5. Use different colors or symbols to categorize activity types


  ## Benefits


  - **Visual Clarity**: See your entire day at a glance

  - **Time Boxing**: Allocate specific time blocks for focused work

  - **Activity Tracking**: Record how time was actually spent

  - **Pattern Recognition**: Identify productivity patterns over time

  - **Flexibility**: Easy to adjust and customize for individual needs


  ## Variations


  Some users create:

  - Vertical time ladders with two parallel lines

  - Horizontal timeline spreads across weekly pages

  - Color-coded bars for different project types

  - Combined planning and actual time tracking bars for comparison
