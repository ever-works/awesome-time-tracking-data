markdown: >-
  ## Overview


  Sectograph is a unique visual time management tool that displays your day as a
  circular planner — like a 12- or 24-hour clock face — with calendar events
  mapped onto it. This innovative approach makes time blocking, time management,
  and developing a clearer sense of time much more intuitive.


  ## Visual Design Philosophy


  ### Circular Timeline

  Sectograph transforms your daily schedule into a circular, clock-based view
  where:

  - Each sector width matches the event duration (creating a true pie-chart
  schedule)

  - You can see gaps and free time between events at a glance

  - The time from "now" to the next event is immediately visible

  - Events are color-coded for easy categorization


  ### Time Blocking Made Visual

  Unlike traditional linear calendars, Sectograph's circular approach helps
  users:

  - Understand time proportions visually

  - Identify scheduling conflicts quickly

  - Balance their day more effectively

  - Combat "time blindness" (particularly helpful for ADHD)


  ## Key Features


  ### Calendar Integration

  - Works with existing calendars on the device

  - Lightweight and privacy-friendly

  - Syncs with local calendars, Google Calendar, and other calendar apps

  - No account required - uses your existing calendar data


  ### Automatic Calculations

  Sectograph automatically calculates:

  - Upcoming events

  - Time blocks and durations

  - Gaps between events

  - Remaining time until next activity


  ### Multiple Use Cases

  - **Day planning**: Daily schedule visualization

  - **Time blocking**: Deep work, meetings, breaks

  - **Shift scheduling**: Work schedules

  - **Student schedules**: Class timetables

  - **Travel planning**: Itineraries

  - **Pomodoro planning**: Visual timer integration


  ## Platform Availability


  ### Mobile Apps

  - **Android**: Available on Google Play

  - **iPhone**: Available on App Store ($2.99)

  - **Smartwatch support**: Available for compatible devices


  ### Widgets

  - Home screen widgets for both Android and iOS

  - Lock screen widgets

  - Smartwatch complications


  ## Popularity & User Base


  - Downloaded **6.9 million times**

  - Highly rated by users with time management challenges

  - Particularly popular among people with ADHD


  ## User Reviews & Testimonials


  ### ADHD & Time Blindness

  "Perfect for people with ADHD time blindness" - Many users report that the
  visual, circular format helps them better understand time passage and
  duration.


  ### Long-Awaited Solution

  Users frequently mention: "After looking literally years for an app to
  visualize time this way, I'd basically given up" - indicating Sectograph fills
  a unique need in the market.


  ## Pricing


  - **Android**: Free with premium features available

  - **iOS**: $2.99 one-time purchase

  - No subscription fees

  - Premium features may include additional customization options


  ## Why It Works


  The circular visualization aligns with how humans naturally perceive time
  (clock faces), making it:

  - More intuitive than linear lists

  - Easier to gauge proportions and balance

  - Better for visual learners

  - More effective at preventing over-scheduling


  ## Ideal For


  - People with ADHD or time blindness

  - Visual learners

  - Anyone who struggles with traditional calendar apps

  - Professionals practicing time blocking

  - Students managing class schedules

  - Shift workers

  - People seeking better work-life balance visualization
