name: Two-Minute Rule (David Allen)
description: Getting Things Done principle stating that if an action takes less
  than two minutes, do it immediately rather than defer it. Based on the
  efficiency cutoff where organizing a task takes longer than completing it.
source_url: https://gettingthingsdone.com/2020/05/the-two-minute-rule-2
category: Time Management Technique
