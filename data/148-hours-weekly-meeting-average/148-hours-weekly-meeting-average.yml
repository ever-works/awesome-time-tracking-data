name: 14.8 Hours Weekly Meeting Average
description: Research showing average professionals spend 14.8 hours per week in
  meetings, representing 37% of a 40-hour work week. Critical context for
  understanding why focus time is scarce and why morning time blocks must be
  protected before meetings consume the day.
