markdown: >-
  ## What is the Replan Feature?


  The Replan feature in Akiflow provides a frictionless way to defer tasks
  without losing track of them or cluttering your daily view.


  ## How It Works


  When you realize a task won't happen today:


  1. Select the task

  2. Click "Replan"

  3. Choose when to revisit it:
     - Tomorrow
     - This week
     - Next week
     - This month
     - Next month
     - This year
     - Someday/Maybe

  The task disappears from your current view and will resurface at the specified
  time.


  ## Key Benefits


  ### Reduces Decision Fatigue

  - No need to pick exact dates for everything

  - Quick action keeps planning flowing

  - Prevents task list overwhelm


  ### Maintains Clean Daily View

  - Only see what's relevant today

  - Reduced cognitive load

  - Easier to focus on priorities


  ### Prevents Task Loss

  - Deferred items don't disappear

  - Automatically resurface at right time

  - Nothing falls through cracks


  ### Realistic Planning

  - Acknowledges that plans change

  - Makes it easy to adapt

  - Reduces guilt about incomplete tasks


  ## Best Practices


  - Use "This week" for tasks that need to happen soon but not today

  - Use "Someday/Maybe" for ideas you want to capture but aren't committed to

  - Review weekly/monthly deferred items to ensure they're still relevant

  - Don't over-defer—if something keeps getting replanned, question its priority
