markdown: >-
  ## Overview


  TimeScribe is a modern and private time tracking app for macOS and Windows
  with no cloud, no registration, and no paywall. Users can simply download and
  track their work hours 100% offline.


  ## Key Features


  ### Simple Controls


  Start, stop, and pause time tracking effortlessly with an intuitive interface
  designed for minimal friction.


  ### Custom Scheduling


  Tailor your weekly work schedule to fit your specific needs and working
  patterns.


  ### Holiday Awareness


  Automatically accounts for regional public holidays, ensuring accurate time
  tracking across different locations.


  ### Automation Features


  Includes auto start/stop functionality and notifications for breaks and work
  sessions to maintain productivity rhythms.


  ### Export Capabilities


  Easily export your time tracking data as PDF, Excel, and CSV for further
  analysis, reporting, or client billing.


  ## Installation


  ### macOS


  For macOS users, open the .dmg file, then drag TimeScribe to your Applications
  folder. If you have Homebrew installed, you can also install TimeScribe via
  Homebrew.


  ### Windows


  TimeScribe is also available for Windows users with the same offline,
  privacy-focused features.


  ## Open Source


  TimeScribe is distributed under the GPL-3.0 License. The project is available
  on GitHub at github.com/WINBIGFOX/TimeScribe, allowing users to inspect the
  code, contribute improvements, or fork the project for custom needs.


  ## Privacy Focus


  All time tracking data stays on your local device with no cloud
  synchronization, ensuring complete privacy and control over your work hour
  records.


  ## Pricing


  Completely free with no paywall, subscriptions, or hidden fees.
