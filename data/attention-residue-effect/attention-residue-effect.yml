name: Attention Residue Effect
description: Cognitive phenomenon researched by Sophie Leroy showing that when
  switching between tasks, attention remains partially focused on the previous
  task, reducing performance on the new task until the residue clears.
source_url: https://www.sciencedirect.com/science/article/abs/pii/S0749597809000399
category: Time Management Research
