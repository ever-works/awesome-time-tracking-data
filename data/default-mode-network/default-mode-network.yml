name: Default Mode Network
description: A large-scale brain network primarily composed of the medial
  prefrontal cortex, posterior cingulate cortex, precuneus, and angular gyrus.
  Active during wakeful rest, mind-wandering, daydreaming, and self-referential
  thinking. Understanding DMN activity helps optimize focus time and strategic
  rest periods for productivity.
source_url: https://en.wikipedia.org/wiki/Default_mode_network
category: Time Management Practice
