markdown: >-
  ## Overview


  WaspTime RFID is a contactless time and attendance tracking system that uses
  RFID proximity badges to automatically record employee clock-ins and
  clock-outs, ideal for manufacturing, warehouse, and industrial environments.


  ## Features


  - **RFID Time Clocks**: Touchless proximity badge readers for quick clock
  in/out

  - **Proximity Badges**: RFID badges or key fobs for each employee

  - **Automatic Tracking**: Eliminates manual time entry and buddy punching

  - **Multiple Locations**: Support for multiple time clock terminals across
  facilities

  - **Real-Time Data**: Instant sync of time data to central system

  - **Overtime Alerts**: Automatic notifications when employees approach
  overtime

  - **Payroll Integration**: Direct export to ADP, Paychex, QuickBooks, and
  other payroll systems

  - **Job Costing**: Track time by job or department for accurate cost
  allocation

  - **Reporting**: Comprehensive reports on attendance, hours worked, and labor
  costs

  - **Compliance**: Helps ensure compliance with labor laws and union
  regulations


  ## Pricing


  Standard Edition starts at approximately $695 for software plus hardware costs
  for RFID readers ($300-500 each). Enterprise Edition with advanced features
  available for larger organizations.
