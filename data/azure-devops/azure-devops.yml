markdown: >-
  ## Overview


  Azure DevOps is Microsoft's cloud-based DevOps solution that provides a
  complete set of tools for software development including version control,
  CI/CD pipelines, agile planning, and time tracking integrated into a single
  platform.


  ## Features


  - **Azure Boards**: Agile planning tools with work item tracking, kanban
  boards, and sprint planning

  - **Time Tracking**: Track original estimates, remaining work, and completed
  work on tasks and user stories

  - **Capacity Planning**: Plan sprint capacity by team member and track
  utilization

  - **Burndown Charts**: Monitor sprint and release progress with burndown and
  burnup charts

  - **Azure Repos**: Git repositories with pull requests and code review

  - **Azure Pipelines**: CI/CD automation for build, test, and deployment

  - **Azure Test Plans**: Manual and exploratory testing tools

  - **Azure Artifacts**: Package management for Maven, npm, NuGet, and Python
  packages

  - **Dashboards**: Customizable dashboards with widgets for velocity, burndown,
  and time tracking

  - **Integration**: Integrates with GitHub, Jenkins, Slack, and hundreds of
  other tools


  ## Pricing


  Free tier for up to 5 users with unlimited private Git repos. Paid plans start
  at $6 per user per month for additional users. Azure Pipelines and Artifacts
  have separate pricing based on usage.
