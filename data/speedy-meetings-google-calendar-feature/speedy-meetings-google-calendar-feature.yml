name: Speedy Meetings (Google Calendar Feature)
description: Google Calendar setting that automatically shortens meetings by
  5-10 minutes (25/50 min instead of 30/60 min), building in buffer time between
  meetings to reduce back-to-back stress.
source_url: https://support.google.com/calendar/answer/6084644
category: Productivity Feature
tags:
  - google-calendar
  - meetings
  - buffer-time
  - calendar-management
markdown: >-
  ## Overview


  "Speedy meetings" is a Google Calendar setting that automatically reduces
  default meeting lengths, creating buffer time between meetings. When enabled,
  30-minute meetings become 25 minutes and 60-minute meetings become 50 minutes.


  ## How to Enable


  1. Open Google Calendar settings

  2. Go to "Event settings"

  3. Check "Speedy meetings"

  4. Save


  **Result**: All new meetings default to shortened times


  ## Impact


  ### For Individuals

  - 5-10 minute breaks between meetings

  - Time for bio breaks

  - Moment to process and take notes

  - Preparation time for next meeting

  - Reduced stress


  ### For Organizations

  - Cultural shift toward respecting time

  - More meetings starting on time

  - Less cascading lateness

  - Better meeting effectiveness


  ## The Research Behind It


  Microsoft's 2021 research showed that even 10-minute breaks between meetings
  allow stress levels to reset, while back-to-back meetings cause cumulative
  stress buildup.


  ## Adoption


  - Enable organization-wide as admin

  - Recommend to all team members

  - Explain rationale (health, productivity)

  - Lead by example


  ## Related Features


  Microsoft Outlook has similar "Shorten appointments and meetings" option


  Zoom allows default meeting duration settings
