name: Worst First Principle (Eat That Frog)
description: Brian Tracy's time management principle of tackling most difficult,
  unpleasant, or important task first thing each day. Based on Mark Twain quote
  about eating a frog. Ensures priority work gets done regardless of day's
  chaos, builds momentum, and provides psychological relief.
source_url: https://www.briantracy.com/blog/time-management/the-truth-about-frogs/
category: Time Management Principle
tags:
  - prioritization
  - morning
  - discipline
  - brian-tracy
markdown: >-
  ## Overview


  Worst First (Eat That Frog) tackles most dreaded task first thing each
  morning.


  ## The Principle


  "If the first thing you do each morning is eat a live frog, you can go through
  the day with the satisfaction of knowing it's probably the worst thing that's
  going to happen to you all day."


  ## Implementation


  1. Identify your "frog" (worst task) night before

  2. Do it first thing upon starting work

  3. No email, meetings, or other work first

  4. Complete or make significant progress

  5. Rest of day feels easier


  ## Benefits


  - Most important work gets done

  - Builds discipline and momentum

  - Reduces procrastination

  - Provides psychological relief

  - Other tasks feel easier by comparison


  ## Pricing


  Free principle from Brian Tracy.
