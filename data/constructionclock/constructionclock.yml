markdown: >-
  ## Overview


  ConstructionClock is a mobile-first time tracking solution built for the
  construction industry. It automatically tracks worker hours using GPS
  geofencing, so crew members don't need to remember to clock in or out.


  ## Features


  - Automatic clock-in/clock-out via geofencing

  - GPS location tracking for all time entries

  - Job costing by project and task

  - Crew management and scheduling

  - Photo documentation from job sites

  - Daily field reports

  - Break tracking

  - Equipment time tracking

  - Mileage tracking

  - Real-time supervisor notifications

  - Overtime calculations

  - Certified payroll reports

  - Mobile apps for iOS and Android

  - Offline mode for areas without cell service

  - Integration with QuickBooks and other accounting software


  ## Automatic Time Tracking


  When workers enter a geofenced job site area (typically 100-500 feet radius),
  the app automatically clocks them in. When they leave the area, it clocks them
  out. This eliminates time theft, buddy punching, and manual timesheet errors.


  ## Job Costing


  Every hour tracked is automatically assigned to the correct job, phase, and
  cost code. This provides real-time visibility into labor costs and helps
  contractors identify profitable vs. unprofitable projects.


  ## Pricing


  Subscription-based pricing starting around $8-12 per user per month, with
  volume discounts for larger crews. Free trial available.
