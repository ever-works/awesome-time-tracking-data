markdown: >-
  ## Overview


  Notion AI is an AI-powered assistant built directly into Notion's workspace,
  working within pages, docs, tasks, and databases to help teams turn ideas into
  finished work without switching tools. It leverages context from the workspace
  and connected apps to automate tasks, improve writing, create databases, and
  generate detailed reports.


  ## Features


  - **Notion Agent**: Chat-based AI that takes on entire tasks using context
  from the workspace and connected apps to create and edit pages and databases

  - **Custom Agents**: Automate recurring work for teams with triggers or
  scheduled execution, running 24/7 (e.g., answering questions on Slack, routing
  tasks, sharing project updates)

  - **AI Meeting Notes**: Transcribes conversations, summarizes key points, and
  surfaces insights automatically

  - **Enterprise Search**: Search across the workspace and connected apps like
  Slack and Google Drive to find answers without switching tools

  - **Research Mode**: Generate detailed reports and summaries on specific
  topics

  - **AI Blocks**: Improve writing or generate drafts directly in pages

  - **Autofill**: Auto-populate database properties and write formulas for
  smarter workflows

  - **Usage & Analytics Dashboards**: Track Notion credit usage, view detailed
  analytics and ROI insights

  - **Custom Permissions**: Control what Notion AI can see and do across the
  workspace

  - **Model Agnostic**: Switch any workflow to a different model or provider
  without losing context

  - **Governance Tools**: Bird's-eye view of AI actions with controls for who
  can do what

  - Notion Calendar and Notion Mail (syncs with Gmail) included

  - Databases with subtasks, dependencies, custom properties, and more


  ## Security & Compliance


  - **No training on customer data**: Contractual agreements with AI
  subprocessors prohibit use of customer data to train models

  - **SOC 2 Type 2 & ISO 27001** certified

  - **GDPR & CCPA** compliant with mapped privacy programs

  - **Secure encryption**: Data encrypted in-transit using TLS 1.2 or greater

  - **Zero data retention for Enterprise**: No data stored with LLM providers
  (30-day retention for non-Enterprise)

  - **HIPAA compliant for Enterprise**: Enables processing of protected health
  information (PHI) via LLM provider zero-retention APIs

  - **Granular database permissions**, private teamspaces, domain verification,
  SAML SSO, premium integrations


  ## Pricing


  Notion AI is included with Notion's **Business** and **Enterprise** plans,
  including core features like Notion Agent, AI Meeting Notes, and Enterprise
  Search.


  - Workspaces on other plans (Plus and below) receive a limited amount of trial
  usage

  - **Custom Agents** use **Notion credits**, available as an add-on for
  Business and Enterprise plans. Each agent run consumes credits based on the
  work performed.

  - **Promotional period (through May 3, 2026)**: Custom Agents are free to use
  on Business and Enterprise plans; admins can track usage patterns in the
  Notion credits dashboard

  - **Starting May 4, 2026**: Custom Agents will consume Notion credits; agents
  auto-pause when credits are depleted until more are purchased

  - Enterprise-specific features (SAML SSO, granular permissions, zero data
  retention, HIPAA compliance) require contacting sales
