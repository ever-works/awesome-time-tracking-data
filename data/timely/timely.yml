markdown: >-
  ## Overview


  Timely is an automatic time tracking application that uses AI to capture all
  work activities in the background, then intelligently suggests how to
  categorize time into projects and tasks, creating accurate timesheets with
  minimal manual effort.


  ## Features


  - **Automatic Tracking**: Captures all applications, websites, documents, and
  meetings automatically

  - **Memory**: Creates a comprehensive timeline of your entire workday

  - **AI Suggestions**: Machine learning suggests how to categorize tracked time

  - **Privacy by Default**: All data stored privately, nothing visible to
  managers by default

  - **Manual Override**: Easy drag-and-drop interface to adjust or refine time
  entries

  - **Project Budgets**: Track time against project budgets and get alerts

  - **Team Scheduling**: Plan team capacity and workload distribution

  - **Reporting**: Detailed reports on billable hours, productivity, and project
  profitability

  - **Integrations**: Connects with Asana, Jira, GitHub, Google Calendar, and
  more

  - **Mobile Apps**: iOS and Android apps for tracking time on the go


  ## Pricing


  Starter plan at $9 per user per month with basic automatic tracking. Premium
  at $16 per user per month adds team scheduling and advanced reporting.
  Unlimited plan at $22 per user per month with all features.
