markdown: >-
  ## Overview


  The Fair Labor Standards Act (FLSA) is a U.S. federal law that establishes
  minimum wage, overtime pay, recordkeeping, and child labor standards. Proper
  time tracking is essential for FLSA compliance, with violations resulting in
  significant penalties, back pay obligations, and legal exposure.


  ## FLSA Time Tracking Requirements


  ### Required Records

  Employers must maintain accurate records for each non-exempt employee
  including:

  - Full name and social security number

  - Address and zip code

  - Birth date (if under 19)

  - Gender and occupation

  - Time and day when workweek begins

  - **Regular hourly rate of pay**

  - **Hours worked each day**

  - **Total hours worked each workweek**

  - **Basis of wage payment** (hourly, weekly, etc.)

  - **Regular earnings**

  - **Overtime earnings**

  - Additions to or deductions from wages

  - Total wages paid each pay period

  - Date of payment and pay period covered


  ### Record Retention

  **3 Years**: Payroll records, collective bargaining agreements, sales and
  purchase records

  **2 Years**: Basic time and earning records, wage rate tables, work schedules,
  records of additions/deductions


  ## Overtime Calculation


  ### Standard Rule

  Non-exempt employees must receive overtime pay at 1.5x their regular rate for
  hours worked over 40 in a workweek.


  ### Common Errors

  **Rounding Practices**: While minor rounding is permitted (to nearest 5 or 15
  minutes), systematic rounding that favors employer is illegal.


  **Break Time**: Short breaks (5-20 minutes) must be paid. Meal periods (30+
  minutes) where employee is completely relieved of duty may be unpaid.


  **Travel Time**: Regular commute is not work time, but travel during work
  hours or to temporary work sites generally is.


  **On-Call Time**: Whether on-call time counts depends on how much freedom
  employee has during that time.


  ## Common Violations


  ### Misclassification

  Classifying employees as "exempt" when they don't meet FLSA exemption criteria
  (administrative, executive, professional, computer, outside sales exemptions).


  ### Off-the-Clock Work

  Requiring or allowing work before clocking in, after clocking out, or during
  unpaid breaks.


  ### Automatic Deductions

  Automatically deducting time for breaks whether or not taken.


  ### Comp Time

  Providing compensatory time off instead of overtime pay (only allowed for
  government employers).


  ### Inaccurate Records

  Failing to track all hours worked or maintaining incomplete records.


  ## Technology Solutions for Compliance


  ### Time Clock Features

  **Biometric Authentication**: Prevents buddy punching

  **Automatic Overtime Calculation**: Ensures correct overtime rates

  **Break Tracking**: Records when breaks are taken

  **Audit Trails**: Documents all time edits and approvals

  **Geofencing**: Verifies employee location for remote/field workers


  ### Reporting Capabilities

  - FLSA-compliant timesheet formats

  - Overtime reports by employee and department

  - Exception reports for missing punches or unusual patterns

  - Export capabilities for audits


  ### Integration

  - Payroll system integration for accurate wage calculation

  - Scheduling software to compare scheduled vs. actual hours

  - HR systems for employee classification tracking


  ## State-Specific Considerations


  Many states have laws more stringent than FLSA:


  ### California

  - Daily overtime (over 8 hours/day)

  - Double time for hours over 12/day

  - Meal and rest break requirements

  - Split shift premiums


  ### New York

  - Spread of hours pay (more than 10 hours between start and finish)

  - Call-in pay requirements

  - Specific meal period rules


  ### Other States

  Each state may have unique:

  - Overtime thresholds

  - Break requirements

  - Record-keeping specifics

  - Minimum wage rates


  ## Penalties for Non-Compliance


  ### Financial Penalties

  - **Back Pay**: Owed wages for up to 3 years

  - **Liquidated Damages**: Equal to back pay owed (double damages)

  - **Civil Penalties**: Up to $1,000+ per violation

  - **Willful Violations**: Up to $10,000 and criminal prosecution


  ### Additional Consequences

  - Class action lawsuits

  - Legal fees and litigation costs

  - Damage to company reputation

  - Increased DOL scrutiny and audits


  ## Best Practices for Compliance


  ### 1. Clear Policies

  - Written timekeeping policies

  - Definition of work time

  - Break and meal period rules

  - Overtime approval procedures

  - Time correction processes


  ### 2. Employee Training

  - How to use time tracking systems

  - When time must be recorded

  - Break requirements and tracking

  - Prohibition on off-the-clock work

  - How to report discrepancies


  ### 3. Manager Training

  - FLSA basics and compliance requirements

  - Proper exempt vs. non-exempt classification

  - Approval procedures

  - Handling time discrepancies

  - Red flags for violations


  ### 4. Regular Audits

  - Review time records for compliance

  - Check for patterns suggesting violations

  - Verify proper employee classification

  - Test system accuracy

  - Document audit findings


  ### 5. Technology Leverage

  - Automated time tracking

  - Built-in compliance rules

  - Exception reporting

  - Audit trail capabilities

  - Integration with payroll


  ## 2026 Compliance Trends


  - Increased DOL enforcement activity

  - Higher penalties for violations

  - More sophisticated tracking technology

  - Greater focus on remote/hybrid worker tracking

  - AI-powered compliance monitoring

  - Stricter independent contractor vs. employee tests
