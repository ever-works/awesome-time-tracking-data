markdown: >-
  ## Overview


  The 5/25 rule is a productivity strategy focused on ruthless prioritization of
  goals. It involves creating a list of 25 career goals, circling the top 5 most
  important, and marking the remaining 20 as an "Avoid-At-All-Cost-List."


  ## Origin Story


  The rule originated from a conversation Warren Buffett had with his pilot,
  Mike Flint. Buffett asked Flint to write down 25 professional priorities and
  then circle the top five to focus on. When Flint said he would commit
  secondary time to the remaining twenty, Buffett shut down that idea, stating
  the twenty should be avoided at all cost.


  ## How to Apply the 5/25 Rule


  The rule is based on three simple steps:


  1. **List**: Write down your top 25 career goals

  2. **Circle**: Circle the 5 most important goals that truly speak to you

  3. **Avoid**: Spend all your time and energy on the top five and actively
  avoid giving any attention to the remaining 20


  ## Important Note on Attribution


  Many sources attribute the 5/25 Rule to Warren Buffett, but recent insights
  show that Buffett himself never shared this specific strategy and has
  expressed skepticism about it. However, the essence of the rule aligns with
  his philosophy on prioritization and focus.


  ## Key Insight


  The critical lesson is that it's not what you do but what you don't do that
  drives your productivity and performance. The items 6-25 on your list can be
  just as distracting as obviously bad habits—they're things you care about and
  want to do, but they prevent you from dedicating full attention to what
  matters most.


  ## Benefits


  - Prevents spreading attention too thin

  - Eliminates "good but not great" goals that dilute focus

  - Creates clarity on what truly matters

  - Reduces decision fatigue

  - Maximizes impact on highest-priority goals
