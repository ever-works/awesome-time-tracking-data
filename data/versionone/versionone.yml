markdown: >-
  ## Overview


  VersionOne (now part of Planview AgilePlace) is an enterprise-grade agile
  planning and portfolio management platform designed to help large
  organizations scale agile methodologies across multiple teams with integrated
  time tracking and capacity planning.


  ## Features


  - **Portfolio Management**: Manage multiple projects and programs with
  strategic portfolio planning

  - **Sprint Planning**: Comprehensive sprint and release planning with capacity
  management

  - **Time Tracking**: Track actual time spent on stories and tasks against
  estimates

  - **Burndown & Velocity**: Monitor team velocity and sprint progress with
  burndown charts

  - **Backlog Management**: Prioritize and groom product backlogs across teams

  - **Dependency Management**: Visualize and manage dependencies across teams
  and projects

  - **Custom Workflows**: Configure workflows to match organizational processes

  - **Reporting & Analytics**: Executive dashboards, velocity reports, and
  predictive analytics

  - **Integration**: Connects with development tools including Jira, GitHub,
  Jenkins, and more

  - **Scaled Agile**: Supports SAFe, LeSS, and other scaling frameworks


  ## Pricing


  Enterprise pricing based on number of users and features. Contact vendor for
  custom quote. Designed for organizations with 100+ users implementing agile at
  scale.
