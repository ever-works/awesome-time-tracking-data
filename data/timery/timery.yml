markdown: >-
  ## Overview


  Timery is a comprehensive time tracking application designed specifically for
  the Apple ecosystem, featuring deep integration with iOS, iPadOS, watchOS, and
  macOS.


  ## Features


  - **Interactive Widgets**: Start and stop time entries, page through timers,
  show time-tracked details, and switch report time periods without opening the
  app

  - **Apple Watch Support**: Comprehensive watchOS 10 support with widgets in
  the Smart Stack, updated design, and new complication and widget options

  - **Seamless Integration**: Works across all Apple devices with deep system
  integration

  - **Quick Actions**: Widgets and complications provide instant access to time
  tracking functionality

  - **Report Views**: View and navigate through time tracking reports directly
  from widgets


  ## Platform


  Available on iOS, iPadOS, watchOS, and macOS, providing a unified time
  tracking experience across all Apple devices.


  ## Apple Watch Features


  On watchOS 10, Timery features:

  - Widgets in the Smart Stack for quick access

  - Updated complication designs

  - New widget options for customization

  - Quick timer start/stop from your wrist


  ## Use Cases


  Ideal for professionals, freelancers, and teams who work primarily within the
  Apple ecosystem and want seamless time tracking across all their devices.


