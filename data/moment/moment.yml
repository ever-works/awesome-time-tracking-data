name: Moment
description: Early phone usage tracking app that was one of the first tools to
  help users understand and manage their smartphone screen time. Required
  workarounds such as battery stat deduction before native screen time trackers
  existed on iOS and Android. Paved the way for built-in screen time features.
source_url: https://inthemoment.io
category: Digital Wellness
tags:
