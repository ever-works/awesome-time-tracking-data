name: "Habit Stacking: 127 Small Changes to Improve Your Health, Wealth, and
  Happiness"
description: A book by SJ Scott that teaches the habit stacking methodology —
  building new habits by anchoring them to existing ones. It provides 127
  specific habit examples organized by life area to help readers create
  personalized daily routines.
source_url: https://www.sjscottbooks.com/habit-stacking/
