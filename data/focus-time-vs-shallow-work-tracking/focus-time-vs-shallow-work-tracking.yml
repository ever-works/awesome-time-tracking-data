name: Focus Time vs Shallow Work Tracking
description: Categorizing time entries into deep focus work requiring
  concentration versus shallow administrative tasks. This distinction helps
  optimize schedules by protecting focus time blocks and batching shallow work,
  improving overall productivity and quality.
