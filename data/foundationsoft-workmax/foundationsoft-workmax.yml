markdown: >-
  ## Overview


  FoundationSoft's WorkMax TIME combines facial recognition, GPS tracking, and
  mobile time clocks to provide construction companies with accurate,
  fraud-resistant time tracking and job costing.


  ## Features


  - Facial recognition time clock

  - GPS location verification

  - Mobile time tracking app

  - Real-time job costing

  - Equipment tracking

  - Offline capability

  - Integration with accounting systems


  ## Target Users


  Construction companies, contractors, field service businesses
