markdown: >-
  ## Overview


  The Flowtime Technique (also called Flowmodoro) is a productivity method that
  helps you maximize output by staying in a creative flow state. Unlike the
  Pomodoro Technique's rigid 25-minute intervals, Flowtime allows you to work in
  natural, uninterrupted blocks until focus naturally fades, then take
  proportional recovery breaks.


  ## How It Works


  ### Core Principle

  Work while focus lasts, then take proportional breaks:

  - After 25 min of work → 5 min break

  - After 50 min of work → 8 min break

  - After 90+ min of work → 10 min break


  ### Implementation Steps


  1. **Start Timer**: Begin when you start working on a task

  2. **Work Uninterrupted**: Continue as long as you maintain genuine focus

  3. **Note Focus Fade**: Stop when concentration begins to wane (not at
  arbitrary time)

  4. **Record Duration**: Note how long you worked

  5. **Take Proportional Break**: Follow the break guidelines above

  6. **Leave Restart Cue**: Write a one-line note about where to resume

  7. **Return Refreshed**: Come back after your break and continue


  ## Why It Works Better Than Fixed Intervals


  ### Respects Flow State

  Interrupting at 25 minutes when you're deeply engaged breaks flow
  unnecessarily. Flowtime lets you ride the wave of productivity.


  ### Personalized to Energy

  Some tasks naturally engage you longer; others drain faster. Flowtime adapts
  to the reality of different work types.


  ### Prevents Forced Productivity

  When you're struggling to focus, Flowtime allows you to stop at 15 minutes
  rather than forcing yourself to reach 25.


  ## 2026 Research Context


  ### Focus Time Crisis

  A February 2026 survey by Resume Now found:

  - Only 31% of workers feel fully focused every day

  - 69% rarely or never reach true flow state

  - 41% cite fatigue and burnout as top productivity disruptor


  Flowtime addresses this by working with natural energy patterns rather than
  against them.


  ## Ideal Use Cases


  ### Creative Work

  Writing, design, coding, strategic thinking—tasks that benefit from extended
  uninterrupted focus periods.


  ### Deep Work Sessions

  Complex problems that require sustained concentration and getting into "the
  zone."


  ### Variable Task Difficulty

  When you don't know in advance how long something will take or how engaging it
  will be.


  ## When to Use Pomodoro Instead


  - **Procrastination-prone tasks**: When you need external structure to get
  started

  - **Boring administrative work**: When forced breaks prevent burnout from
  tedious tasks

  - **Building focus stamina**: When you're training yourself to sustain
  attention

  - **Distractible environments**: When you need the discipline of a timer


  ## Combining Flowtime with Timeboxing


  ### Hybrid Approach

  Use timeboxing for the outer frame ("I'll work on this project for 2 hours
  maximum") and Flowtime inside:

  - Work while focus lasts

  - Take short recovery at natural breaks

  - Return until the 2-hour timebox is complete


  ### Benefits

  - Timeboxing prevents infinite expansion

  - Flowtime optimizes within the constraint

  - Best of both methods


  ## Tracking and Optimization


  ### Data to Collect

  - Task type

  - Duration of focus before break

  - Time of day

  - Energy level (1-10)

  - Quality of work produced


  ### Patterns to Discover

  - Which tasks engage you longest?

  - When is your focus strongest?

  - How does sleep/nutrition affect duration?

  - What's your realistic maximum before forced break?


  ## Tools Supporting Flowtime


  - **Flowmo.io**: Dedicated Flowtime tracking app

  - **Toggl Track**: Start/stop tracking adapts naturally to Flowtime

  - **Manual tracking**: Simple timer and notebook work well

  - **Timeular Tracker**: Physical device to flip when starting/stopping


  ## Common Challenges


  ### "I Could Work Forever"

  Some people can focus for 3+ hours without a break, but:

  - Quality often degrades after 90-120 minutes

  - Physical health suffers from not moving

  - Take breaks even if you don't feel you need them


  ### "I Can't Focus for 25 Minutes"

  Flowtime is perfect for this:

  - Work for 10-15 minutes if that's your limit today

  - Take a break

  - Gradually your capacity will increase


  ### "How Do I Know When to Stop?"

  Signs focus is fading:

  - Checking phone/email urges increase

  - Re-reading the same paragraph multiple times

  - Mind wandering to other topics

  - Physical restlessness

  - Decreasing work quality


  ## Tips for Success


  1. **Remove all distractions** before starting

  2. **Have a clear starting point** for the task

  3. **Use break time wisely**: Move, hydrate, but don't start another task

  4. **Track your sessions** to identify patterns

  5. **Be honest** about when focus actually fades

  6. **Prepare restart cues** to make resuming easy
