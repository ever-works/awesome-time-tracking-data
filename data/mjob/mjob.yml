markdown: >-
  ## Overview


  mJob is a comprehensive time tracking and field management platform built
  specifically for the construction industry. Understanding the unique
  challenges of managing workers across multiple job sites, often in remote
  locations with limited connectivity, mJob provides robust tools for time
  tracking, equipment management, and job costing that work reliably in the
  field.


  ## Features


  ### Mobile Time Clock

  - **GPS-Verified Clock-In**: Employees clock in/out from smartphones with
  location capture

  - **Job Site Selection**: Choose specific job site or phase at clock-in

  - **Offline Functionality**: Works without cellular or WiFi; syncs when
  connection available

  - **Photo Verification**: Optional photo capture at punch time

  - **Break Tracking**: Separate tracking for meal and rest breaks

  - **Daily Logs**: Add notes about work performed each day


  ### GPS and Geofencing

  - **Location Tracking**: Real-time GPS coordinates at every punch

  - **Geofence Alerts**: Notifications if employees clock in outside designated
  radius

  - **Job Site Mapping**: Visual map of all job sites and employee locations

  - **Location History**: Complete record of where crew worked

  - **Distance Tracking**: Measure travel between job sites

  - **Arrival/Departure Times**: Precise on-site and off-site timing


  ### Job Costing

  - **Cost Code Tracking**: Assign time to specific cost codes and phases

  - **Real-Time Labor Costs**: See labor expenses accumulate as workers clock
  time

  - **Budget Tracking**: Monitor labor hours against job budgets

  - **Equipment Costs**: Allocate equipment usage to jobs

  - **Material Tracking**: Log materials used at each job site

  - **Subcontractor Time**: Track subcontractor hours separately

  - **Job Profitability**: Analyze profit margins by project


  ### Equipment Management

  - **Equipment Check-Out**: Log which equipment is at which job site

  - **Equipment Hours**: Track usage hours for maintenance scheduling

  - **Equipment Costs**: Allocate equipment expenses to specific jobs

  - **Maintenance Tracking**: Schedule and record equipment maintenance

  - **Equipment History**: Complete usage and maintenance records


  ### Certified Payroll

  - **Prevailing Wage**: Support for Davis-Bacon and prevailing wage
  requirements

  - **WH-347 Forms**: Generate certified payroll reports automatically

  - **Fringe Benefit Tracking**: Record and report fringe benefits

  - **Trade Classification**: Assign employees to appropriate wage
  classifications

  - **Compliance**: Maintain required records for government contracts

  - **Signature Collection**: Digital signatures for certified payroll
  attestation


  ### Timesheet Management

  - **Automated Timesheets**: Time punches automatically populate timesheets

  - **Supervisor Approval**: Multi-level approval workflow

  - **Exception Handling**: Flag and resolve missing punches, overtime, etc.

  - **Bulk Editing**: Correct multiple entries at once

  - **Overtime Rules**: Configurable daily and weekly overtime calculations

  - **PTO Tracking**: Manage vacation, sick leave, and other paid time off


  ### Reporting

  - **Time and Attendance**: Employee hours by day, week, or pay period

  - **Job Cost Reports**: Labor costs detailed by project and cost code

  - **Equipment Reports**: Usage and costs by equipment and job

  - **Certified Payroll**: WH-347 and other compliance reports

  - **Exception Reports**: Late arrivals, missing punches, overtime

  - **Payroll Export**: Ready-to-process data for payroll systems

  - **Custom Reports**: Build reports specific to business needs


  ### Payroll Integration

  - **QuickBooks**: Direct integration with QuickBooks Desktop and Online

  - **ADP**: Sync with ADP payroll services

  - **Paychex**: Integration with Paychex systems

  - **Generic Export**: CSV and Excel formats for any payroll system

  - **Union Reporting**: Specialized reports for union payroll requirements


  ## Construction-Specific Features


  ### Multi-Trade Support

  - Track time by trade (carpentry, electrical, plumbing, etc.)

  - Different wage rates by trade classification

  - Prevailing wage compliance by trade

  - Apprentice vs journeyman tracking


  ### Project Phase Tracking

  - Assign time to specific construction phases

  - Track progress through project stages

  - Compare estimated vs actual hours by phase

  - Identify phase overruns early


  ### Foreman Tools

  - Field-level timesheet approval

  - Crew management and assignment

  - Daily production reporting

  - Safety incident logging

  - Job site notes and photos


  ## Mobile Apps


  **Employee App**:

  - Simple clock-in/out interface

  - Job and phase selection

  - View schedule and timesheets

  - Submit time-off requests

  - Daily work logs


  **Foreman/Supervisor App**:

  - All employee app features

  - Crew time approval

  - Job site reporting

  - Equipment tracking

  - Material logging


  **Owner/Manager App**:

  - Real-time dashboard

  - All employee locations on map

  - Job cost monitoring

  - Timesheet approval

  - Full reporting access


  ## Benefits for Construction Companies


  - **Eliminate Time Theft**: GPS proves on-site presence

  - **Accurate Job Costing**: Real labor costs by project and phase

  - **Prevent Buddy Punching**: Phone-based verification

  - **Certified Payroll Compliance**: Automated government reporting

  - **Works in the Field**: Offline mode for remote job sites

  - **Faster Payroll**: Automated, accurate timesheets

  - **Better Project Bidding**: Historical data improves estimates

  - **Equipment Accountability**: Know where equipment is at all times

  - **Reduce Paperwork**: Digital time cards and reports

  - **Union Compliance**: Track classifications and rates properly


  ## Implementation


  1. Account setup with company and project structure

  2. Import or add employees with classifications and rates

  3. Define job sites with GPS coordinates and geofences

  4. Set up cost codes and phases

  5. Configure certified payroll requirements if applicable

  6. Deploy mobile apps to employee phones

  7. Train foremen and employees (typically 15-30 minutes)

  8. Begin tracking time immediately


  ## Security and Compliance


  - Bank-level encryption for all data

  - Role-based access controls

  - Audit trails for all changes

  - Certified payroll record retention

  - FLSA compliant timekeeping

  - SOC 2 certified infrastructure


  ## Pricing


  mJob offers construction-focused pricing tiers:


  **Time & Attendance**: ~$8-10/user/month

  - Mobile time clock

  - GPS verification

  - Basic job costing

  - Timesheet management

  - Payroll export


  **Job Costing Plus**: ~$12-15/user/month

  - All Time & Attendance features

  - Advanced job costing

  - Equipment tracking

  - Material logging

  - Advanced reporting


  **Enterprise**: Custom pricing

  - All Job Costing Plus features

  - Certified payroll

  - Multi-company support

  - API access

  - Dedicated support

  - Custom integrations


  Volume discounts available for larger crews. Free trial period offered.
  Implementation support included.
