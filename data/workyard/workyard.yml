markdown: >-
  ## Overview


  Workyard is a GPS time tracking and job management platform built specifically
  for construction, landscaping, and field service businesses. Unlike tools that
  only record location at clock-in or clock-out, Workyard tracks where crews go
  throughout the entire day, including travel between sites.


  ## Features


  - **Continuous GPS Tracking**: Captures every minute worked with full
  visibility into locations, mileage, and travel time throughout the workday

  - **Geofencing**: Employees can only clock in or out within designated job
  areas, with automatic prompts when entering/exiting sites

  - **Job Costing**: Real-time labor cost tracking by job, project, and client

  - **Crew Management**: Organize teams, assign jobs, and track productivity
  across multiple locations

  - **Mobile Time Clock**: Easy clock in/out from smartphones with photo
  verification

  - **Offline Mode**: Stores clock-ins without internet and syncs later

  - **Mileage Tracking**: Automatic mileage calculation for reimbursement and
  job costing

  - **Certified Payroll**: Compliant reporting for government and prevailing
  wage projects

  - **Scheduling**: Create and distribute crew schedules with job assignments

  - **Reporting Dashboard**: Real-time insights into labor costs, hours worked,
  and job profitability


  ## Benefits


  - Eliminates buddy punching with GPS verification

  - Reduces payroll processing time by 75%

  - Improves job costing accuracy with real-time labor tracking

  - Prevents time theft through location monitoring

  - Simplifies certified payroll reporting for government contracts


  ## Pricing


  Workyard offers tiered pricing starting at $6 per user per month, with volume
  discounts for larger teams. Free 14-day trial available.
