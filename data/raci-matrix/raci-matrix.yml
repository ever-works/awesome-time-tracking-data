name: RACI Matrix
description: A responsibility assignment framework that clarifies roles in
  projects and tasks by determining who is Responsible (does the work),
  Accountable (owns the outcome), Consulted (provides input), and Informed (kept
  updated). This matrix increases the odds of success by preventing role
  confusion and ensuring clear ownership at every step.
source_url: https://www.atlassian.com/team-playbook/plays/raci-matrix
category: Time Management Technique
tags:
  - responsibility-assignment
  - project-management
  - clarity
markdown: >-
  ## Overview


  The RACI Matrix is a system used to assign and clarify roles within projects
  or processes, helping teams avoid confusion about who is doing what.


  ## The Four Roles


  - **Responsible** - The person(s) who performs the work to complete the task

  - **Accountable** - The one person who is ultimately answerable for the
  outcome; the decision-maker

  - **Consulted** - People whose opinions are sought; two-way communication is
  required

  - **Informed** - People who are kept up-to-date on progress; one-way
  communication


  ## Benefits for Time Management


  By clearly determining roles upfront, teams reduce time wasted on duplicated
  efforts, gaps in responsibility, and unnecessary meetings or communications.
