markdown: >-
  ## Overview


  Be Focused Pro is a comprehensive Pomodoro timer app designed specifically for
  the Apple ecosystem. It combines task management, customizable work intervals,
  website blocking, and detailed analytics in a clean, simple interface that
  syncs perfectly across Mac, iPhone, and iPad.


  ## Features


  ### Task Management

  - Create and manage tasks with notes, tags, and due dates

  - Organize tasks with tags and filters

  - Paste task lists from other apps

  - Plan intervals needed for task completion


  ### Timer Control

  - Start, pause, or skip intervals

  - Auto-start next interval (optional)

  - Track accuracy of planned vs. actual time

  - Manage completed intervals


  ### Customization

  - Set durations for work sessions, short breaks, and long breaks

  - Define number of intervals before a long break

  - Set daily goals for completed intervals

  - Assign different timer settings to individual tasks


  ### Focus Features

  - Block distracting apps and websites during work sessions

  - Supported browsers: Safari, Chrome, Edge, Opera, and Brave

  - Whitelist specific apps and websites while blocking others


  ### Reports

  - Detailed progress monitoring

  - Export data in CSV format


  ## User Experience


  Be Focused Pro is praised for its simple and clean user interface that
  provides easy access to timers with enough additional features to fit almost
  any workflow without creating clutter.


  ## Platform Availability


  - Mac (macOS)

  - iPhone (iOS)

  - iPad (iPadOS)

  - Perfect sync across all Apple devices


  ## Pricing


  - **Free Version**: Basic features available

  - **Pro Version**: $4.99 (one-time purchase)

  - Available on Mac App Store
