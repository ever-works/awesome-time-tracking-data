markdown: >-
  ## Overview


  The Time-Block Planner is a physical daily planner created by Cal Newport
  specifically designed to support deep work practices through structured time
  blocking, metric tracking, and shutdown rituals.


  ## Features


  ### Daily Pages


  - **Time-Block Grid**: Pre-formatted grid for planning every minute of your
  workday

  - **Work Day Columns**: Space to plan work activities in hourly blocks

  - **Deep Work Tracking**: Dedicated section to record hours of deep work
  completed

  - **Shutdown Ritual**: Checkbox and space for end-of-day shutdown completion

  - **Notes Section**: Area for capturing ideas and reflections


  ### Planning Methodology


  - **Minute-by-Minute Planning**: Assign every minute of workday to specific
  activity

  - **Flexibility**: Built-in space for replanning when schedule changes

  - **Metric Tracking**: Track deep work hours to monitor productivity trends

  - **Reflection**: Weekly review pages to analyze what worked and what didn't


  ### Design Features


  - Quarterly format (13 weeks per planner)

  - High-quality paper suitable for pen and pencil

  - Lay-flat binding for easy writing

  - Compact size for portability


  ## Pricing


  Approximately $25-30 per quarterly planner (13 weeks). Annual subscription
  available for $90-100 with automatic quarterly shipments.
