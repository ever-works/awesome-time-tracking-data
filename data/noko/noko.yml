markdown: >-
  ## Overview


  Noko (formerly Freckle Time Tracking) is friendly online time tracking
  software that helps teams and freelancers track billable hours, manage
  projects, and generate reports. The platform rebranded from Freckle to Noko in
  March 2019.


  ## History


  Freckle Time Tracking rebranded to Noko with the new name becoming final on
  March 31st, 2019. The company chose "Noko" because it's shorter, lighter,
  easier to Google, and easier to say. The rebrand coincided with their 10th
  birthday.


  ## Key Features


  - Simple, fast time entry with natural language support

  - Project and client management

  - Team collaboration and permissions

  - Powerful reporting and filtering

  - Expense tracking

  - Integration with popular tools

  - Mobile apps for iOS and Android


  ## User Experience


  Noko is known for its friendly, approachable interface that makes time
  tracking less of a chore. The name was the only thing about the app that
  changed during the rebrand — all features and functionality remained intact.


  ## Pricing


  Offers various pricing tiers based on team size and feature requirements.
