markdown: >-
  ## Overview


  Tyme is a versatile time tracking app for individuals and teams, syncing
  across Mac, iPhone, iPad, and Apple Watch. It has been actively developed for
  over 10 years and is trusted by more than 50,000 happy users.


  ## Features


  - **Apple Ecosystem Integration**: Seamless sync across all Apple devices
  including Apple Watch

  - **Siri Shortcuts**: Using Siri Shortcuts, users can start and stop timers,
  add notes to running timers, or ask how much they have worked today

  - **Expense Tracking**: Besides tracking hours, Tyme can automatically record
  business trips or mileage costs

  - **Automation**: Offers over 20 actions for the Shortcuts app on macOS and
  iOS, enabling extensive automation

  - **Geofencing**: Can record times automatically by specifying workplace
  location

  - **Friendly Interface**: Intuitive interface with a vast selection of
  shortcuts, minimizing the need for mouse interactions


  ## Use Cases


  - Freelancers tracking billable hours across Apple devices

  - Teams needing coordinated time tracking on Apple platforms

  - Professionals tracking business expenses and mileage

  - Anyone in the Apple ecosystem wanting streamlined time tracking


  ## Platform


  Apple devices: Mac, iPhone, iPad, Apple Watch


  ## Pricing


  - 14-day free trial

  - $4.99 per user per month, billed monthly
