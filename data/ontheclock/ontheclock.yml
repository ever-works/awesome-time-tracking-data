markdown: >-
  ## Overview


  OnTheClock is a straightforward, affordable time tracking and employee
  scheduling solution built specifically for small businesses. With multiple
  clock-in options, geofencing capabilities, and integrated scheduling, it
  provides everything small employers need to track employee hours accurately
  without overwhelming complexity or enterprise pricing.


  ## Features


  ### Flexible Clock-In Options


  **Mobile App Clock-In**:

  - Employees clock in/out from personal smartphones

  - iOS and Android native apps

  - GPS location capture at each punch

  - Photo verification option

  - Offline mode with sync when connected

  - Push notifications for shift reminders


  **Desktop/Laptop Clock-In**:

  - Web-based time clock from any computer

  - No software installation required

  - Browser-based access from anywhere

  - Ideal for office workers


  **Kiosk Station**:

  - Shared tablet or computer as central time clock

  - PIN-based employee identification

  - Face recognition option (premium)

  - Ideal for retail, restaurants, warehouses

  - Prevent unauthorized access


  **Phone Clock-In**:

  - Call-in time clock via toll-free number

  - Voice-based punch system

  - Option for locations without smartphones

  - Automatic caller ID verification


  ### Geofencing and Location Tracking

  - **Job Site Geofencing**: Create virtual perimeters around work locations

  - **Geofence Alerts**: Notification if employee clocks in outside designated
  area

  - **Multiple Locations**: Different geofences for different sites

  - **Radius Configuration**: Adjustable geofence size

  - **Location History**: GPS breadcrumb trail of employee locations

  - **Map View**: Visualize all employee locations in real-time


  ### Device Restrictions

  - **IP Locking**: Restrict clock-in to specific IP addresses

  - **Device Whitelisting**: Approve only certain devices

  - **Location Requirements**: Mandate geofence presence for clock-in

  - **PIN Protection**: Require PIN even on approved devices

  - **Prevent Buddy Punching**: Multiple verification layers


  ### Employee Scheduling

  - **Drag-and-Drop Scheduler**: Easy visual schedule building

  - **Shift Templates**: Reuse common shift patterns

  - **Multi-Location Scheduling**: Manage schedules across sites

  - **Employee Availability**: Workers set when they can work

  - **Schedule Publishing**: Push schedules to employee apps

  - **Shift Swap Requests**: Employees request to trade shifts

  - **Open Shift Posting**: Offer available shifts to team

  - **Schedule Notifications**: Auto-alerts when schedule published or changed


  ### Time Tracking and Timesheets

  - **Automatic Timesheets**: Punches populate timesheets automatically

  - **Daily/Weekly Views**: Choose preferred timesheet layout

  - **Break Tracking**: Separate meal and rest breaks

  - **Overtime Calculation**: Automatic daily and weekly OT

  - **PTO Tracking**: Vacation, sick leave, and other time off

  - **Timesheet Editing**: Managers can adjust entries with notes

  - **Approval Workflow**: Manager review and approval

  - **Export Options**: CSV, Excel, PDF formats


  ### Payroll Integration

  - **QuickBooks**: Direct integration with QuickBooks Online and Desktop

  - **Gusto**: Seamless sync with Gusto payroll

  - **ADP**: Integration with ADP Workforce Now

  - **Paychex**: Connection to Paychex Flex

  - **Generic Export**: Compatible with any payroll system via export

  - **Custom Formatting**: Configure export to match payroll requirements


  ### Reporting

  - **Time Card Reports**: Individual employee time cards

  - **Payroll Summary**: Ready-to-process payroll data

  - **Who's Working**: Real-time view of clocked-in employees

  - **Location Reports**: Time and attendance by job site

  - **Overtime Reports**: OT hours by employee and pay period

  - **Exception Reports**: Late arrivals, early departures, missing punches

  - **Custom Reports**: Build reports specific to your needs

  - **Scheduled Reports**: Automatic report generation and email delivery


  ## Small Business Focus


  ### Affordable Pricing

  - Designed for tight small business budgets

  - No per-employee fees on some plans

  - Predictable monthly costs

  - No long-term contracts required


  ### Easy Setup

  - Quick onboarding process

  - No IT expertise required

  - Intuitive interface

  - Minimal training needed

  - Start tracking time same day


  ### Simple Administration

  - Clean, uncluttered dashboards

  - Straightforward navigation

  - Common tasks are obvious

  - Mobile admin for managers

  - Minimal ongoing maintenance


  ### Scalable Solution

  - Works for 1 employee or 500+

  - Add employees as you grow

  - Features scale with your needs

  - Upgrade plans as business expands


  ## Use Cases


  ### Retail Stores

  - Kiosk clock-in at store entrance

  - Schedule shifts around peak hours

  - Track time by location for multi-store chains

  - Prevent early clock-ins and late clock-outs


  ### Restaurants and Food Service

  - Shared tablet time clock for staff

  - Track server, kitchen, and management hours separately

  - Schedule around meal rushes

  - Mobile scheduling for managers


  ### Construction and Field Services

  - Mobile clock-in from job sites

  - GPS verification of on-site presence

  - Track time by project and location

  - Geofence job sites to ensure accuracy


  ### Healthcare and Home Care

  - Mobile app for caregivers visiting clients

  - Geofence client homes

  - Schedule complex shift rotations

  - Track certifications and compliance


  ### Professional Services

  - Desktop clock-in for office workers

  - Project-based time tracking

  - Integration with invoicing systems

  - Remote worker time tracking


  ### Warehouses and Manufacturing

  - Kiosk stations at facility entrances

  - Department-level time tracking

  - Shift scheduling for production lines

  - Overtime monitoring


  ## Mobile Apps


  **Employee App Features**:

  - Quick clock in/out

  - View current and upcoming schedules

  - Request time off

  - Request shift swaps

  - View timesheet and hours worked

  - Receive shift reminder notifications


  **Manager App Features**:

  - All employee app features

  - Approve time-off requests

  - Approve shift swaps

  - Edit employee timesheets

  - View who's working now

  - Create and edit schedules

  - Run reports


  ## Benefits


  - **Save Time**: Eliminate manual timesheet collection and calculation

  - **Prevent Time Theft**: GPS and geofencing ensure on-site presence

  - **Reduce Payroll Errors**: Automatic calculation eliminates math mistakes

  - **Faster Payroll Processing**: Export directly to payroll systems

  - **Better Scheduling**: Easy tools create optimal schedules

  - **Improved Compliance**: Automatic break and overtime tracking

  - **Employee Empowerment**: Self-service for schedules and time-off

  - **Real-Time Visibility**: Know who's working right now


  ## Security


  - **Data Encryption**: All data encrypted in transit and at rest

  - **Secure Access**: Role-based permissions and password requirements

  - **Regular Backups**: Automatic data backup

  - **Reliable Uptime**: 99.9% availability

  - **Audit Trails**: Track all timesheet modifications

  - **Compliance**: FLSA and labor law compliant


  ## Customer Support


  - **Phone Support**: Live phone support during business hours

  - **Email Support**: Respond within 24 hours

  - **Knowledge Base**: Comprehensive help articles and videos

  - **Setup Assistance**: Help with initial configuration

  - **Training Resources**: Video tutorials and webinars


  ## Pricing


  OnTheClock offers simple, affordable pricing:


  **Free Plan**:

  - Up to 2 employees

  - All core features

  - Mobile and web clock-in

  - Basic scheduling

  - Basic reporting

  - Good for testing


  **Basic** ($2.50/user/month):

  - 3+ employees

  - All Free features

  - Advanced scheduling

  - Geofencing

  - All reports

  - Payroll integrations


  **Pro** ($4/user/month):

  - All Basic features

  - Face recognition clock-in

  - Advanced geofencing

  - Shift swap approvals

  - Priority support

  - Advanced reporting


  **Enterprise** (Custom):

  - 100+ employees

  - Custom features

  - Dedicated support

  - API access

  - Custom integrations


  All paid plans include:

  - No setup fees

  - No contracts (monthly billing)

  - 30-day free trial

  - Unlimited locations

  - Mobile apps included

  - Email and phone support


  Pricing is per active employee (clocked hours that month). Inactive employees
  free.
