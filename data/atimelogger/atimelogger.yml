markdown: >-
  ## Overview


  aTimeLogger is a versatile personal time tracking application designed to help
  users track any aspect of their life - from work tasks and studies to
  exercise, sleep, and daily activities. The app emphasizes flexibility through
  customizable categories and detailed analytics.


  ## Core Philosophy


  aTimeLogger can track tasks and projects at work, studies and homework, sport
  exercises, sleeping, baby or child daily activities, or any activities people
  want to track. The app is designed to adapt to your life, not force you into
  predefined categories.


  ## Key Features


  ### Category Organization


  **Activities and Groups**:

  - Create custom activities for everything you want to track

  - Group activities into logical categories (e.g., "Math" as an activity under
  "School" group)

  - Organize tasks into main groups like:
    - Income generation activities
    - Health focused
    - Spirituality
    - Personal development
    - Family time

  ### Tracking Methods


  **Dual Tracking Modes**:

  - **Timer mode**: Start/stop tracking for real-time activity recording

  - **Manual entry**: Add activities retroactively with specific times


  ### Customization Options


  **Visual Customization**:

  - Choose from a set of unique icons for each activity

  - Upload your own custom icons

  - Color-code categories for quick visual recognition

  - Create personalized activity hierarchies


  ### Goal Setting & Statistics


  **Goals**:

  - Set time-based goals for activities

  - Track progress toward daily, weekly, or monthly targets

  - Receive notifications about goal completion


  **Analytics**:

  - View detailed statistics and reports

  - Analyze time distribution across categories

  - Track trends over time

  - Export data for further analysis


  ## Platform Availability


  ### Mobile Applications

  - **Android**: Available on Google Play (Free and Pro versions)

  - **iPhone/iPad**: Available on App Store


  ### Desktop Support

  - Available as desktop app for Mac and Windows via WebCatalog


  ### Versions

  - **aTimeLogger** (Free): Basic time tracking features

  - **aTimeLogger Pro**: Advanced features and unlimited tracking

  - **aTimeLogger 2**: Updated mobile version with enhanced features


  ## User Experience


  ### Learning Curve

  Users report that "it takes a little while to figure out the most useful
  categories to create and how to group them," but the investment pays off:

  - The app is very adaptable

  - Stays useful through several major life changes

  - Categories can evolve with your needs


  ### Flexibility

  The intuitive interface allows:

  - Quick category creation on-the-go

  - Easy reorganization of groups

  - Rapid timer start/stop

  - Retrospective time entry


  ## Use Cases


  ### Professional

  - Track billable hours by project

  - Monitor productivity patterns

  - Analyze time spent on different work categories

  - Generate client reports


  ### Personal Development

  - Log exercise and fitness activities

  - Track study time and learning

  - Monitor sleep patterns

  - Record meditation or mindfulness practice


  ### Parenting & Family

  - Track baby feeding and sleeping schedules

  - Monitor child development activities

  - Log family time vs. work time

  - Balance household responsibilities


  ### Health & Wellness

  - Track medications or treatments

  - Monitor screen time

  - Log meals and nutrition-related activities

  - Record physical therapy or rehabilitation exercises


  ## Reporting Features


  ### Comprehensive Reports

  - Daily, weekly, monthly, and custom date ranges

  - Pie charts showing time distribution

  - Bar graphs for trend analysis

  - Detailed time logs with timestamps


  ### Export Options

  - Export data to CSV or other formats

  - Share reports via email

  - Integration capabilities for further analysis


  ## Benefits


  ### Self-Awareness

  - Understand how you actually spend your time

  - Identify time-wasting activities

  - Discover patterns in your daily routine


  ### Accountability

  - Objective data about your habits

  - Visual proof of progress toward goals

  - Motivation through statistics


  ### Optimization

  - Make data-driven decisions about time allocation

  - Identify areas for improvement

  - Balance competing priorities effectively


  ## Pricing


  - **Free Version**: Basic time tracking with limited features

  - **Pro Version**: One-time purchase with full features

  - No subscription required for Pro version

  - Exact pricing varies by platform and region


  ## Ideal For


  - Freelancers tracking billable hours

  - Students managing study time

  - Parents monitoring children's activities

  - Health-conscious individuals tracking wellness activities

  - Anyone seeking better self-awareness about time usage

  - People with multiple competing priorities

  - Quantified self enthusiasts
