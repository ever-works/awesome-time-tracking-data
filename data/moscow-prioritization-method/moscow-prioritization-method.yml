name: MoSCoW Prioritization Method
description: Prioritization technique developed in 1994 for use in rapid
  application development and Agile methodologies. Categorizes requirements into
  Must have, Should have, Could have, and Won't have to reach common
  understanding with stakeholders on delivery priorities. Widely used with
  timeboxing in Scrum and DSDM.
source_url: https://www.productplan.com/glossary/moscow-prioritization/
category: Practices
