name: Time Confetti Awareness
description: Recognition of how schedules fragment into unusable small chunks
  between meetings and obligations. Coined by Brigid Schulte, refers to 10-15
  minute gaps too short for meaningful work but collectively significant.
  Awareness enables strategic consolidation or deliberate use of micro-moments.
source_url: https://www.brigidschulte.com/overwhelmed-book/
category: Time Management Concept
tags:
  - fragmentation
  - awareness
  - calendar
  - micro-moments
markdown: >-
  ## Overview


  Time Confetti describes calendar fragmentation into small, unusable time
  chunks.


  ## The Problem


  - 10-15 minute gaps between commitments

  - Too short for deep work

  - Too long to ignore

  - Collectively significant (2-3 hours/day)

  - Creates feeling of busyness without productivity


  ## Solutions


  ### Consolidation

  - Batch meetings together

  - Create larger uninterrupted blocks

  - Use meeting-free days


  ### Strategic Use

  - Pre-plan micro-tasks

  - Use for email/admin

  - Take genuine breaks

  - Mindfulness practice


  ## Pricing


  Free concept from Brigid Schulte's research.
