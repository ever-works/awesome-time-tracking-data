markdown: >-
  ## Overview


  Feedly is a content aggregation and RSS reader platform that collects updates
  from websites, blogs, YouTube channels, and news sources into a unified feed.
  It provides a streamlined way to stay informed across multiple content sources
  without visiting individual sites.


  ## Features


  - Clean, intuitive user interface

  - RSS feed aggregation from multiple sources

  - Category-based organization of feeds

  - AI-powered content filtering and prioritization (paid plans)

  - Topic tracking and alerts

  - Integration with various productivity and research tools

  - Search across saved articles


  ## Pricing


  Free plan with basic features. Pro plan starts at $6/month with AI-powered
  features and additional integrations.
