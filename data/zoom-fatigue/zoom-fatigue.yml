name: Zoom Fatigue
description: Mental, emotional, and physical exhaustion resulting from extended
  or frequent use of video conferencing platforms. First identified during the
  2020 shift to remote work, this phenomenon affects workplace productivity,
  employee wellbeing, and organizational communication, manifesting as eye
  strain, mental exhaustion, difficulty concentrating, and reduced job
  satisfaction.
