markdown: >-
  ## Overview


  Timing for Mac can import your mobile app usage data from iOS Screen Time,
  creating a complete picture of work across all devices. This unique
  integration ensures time spent on iPhone or iPad for work purposes gets
  captured and billed appropriately.


  ## How It Works


  1. Enable Screen Time on iOS devices

  2. Connect Screen Time to Timing via iCloud

  3. Timing imports mobile app usage automatically

  4. Categorize mobile activities to projects

  5. Time appears in unified timeline with Mac activity


  ## Why It's Important


  Modern work happens across devices:

  - Email on phone during commute

  - Slack messages on iPad

  - Document review on mobile

  - Client calls on iPhone

  - Research on tablet


  ## Benefits


  **Complete Picture**: No work time missing from tracking


  **Mobile Billing**: Capture and bill for mobile work

  **Cross-Device Timeline**: See entire day across all devices


  **Automatic Import**: No manual mobile time entry


  **Accurate Totals**: True picture of time invested


  ## Unique Differentiator


  Most time trackers:

  - Mac/PC only, ignoring mobile

  - Require separate mobile app with manual tracking

  - Don't integrate mobile and desktop data

  - Miss significant work time on phones/tablets


  Timing's Screen Time import:

  - Automatic, not manual

  - True cross-device tracking

  - Unified timeline and reporting

  - No separate mobile app needed


  ## Use Cases


  **Mobile-Heavy Roles**:

  - Sales responding to clients via phone

  - Support handling tickets on mobile

  - Executives doing email on iPad

  - Consultants reviewing documents mobile


  **Hybrid Workers**:

  - Work from multiple locations

  - Switch between devices frequently

  - Need complete time picture


  ## Privacy


  - Uses Apple's Screen Time API

  - Data syncs via your iCloud

  - Timing never sees sensitive content

  - You control which apps count as "work"


  ## Implementation


  Setup involves:

  1. Ensure Screen Time enabled on iOS

  2. Same iCloud account on all devices

  3. Grant Timing access to Screen Time data

  4. Configure work vs. personal app categories

  5. Review imported time regularly


  ## Limitations


  - iOS/macOS only (Apple ecosystem)

  - Requires Screen Time to be enabled

  - Granularity limited by Screen Time API

  - No Android support


  This feature acknowledges the reality of modern work: it doesn't happen only
  at a desk, and effective time tracking must span the devices we actually use.
