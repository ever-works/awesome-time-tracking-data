markdown: >-
  ## Overview


  Sunsama helps knowledge workers plan their day with intention through guided
  rituals for planning, time-blocking, and reflection, promoting sustainable
  productivity and work-life balance.


  ## Guided Rituals


  ### Daily Planning

  - Review yesterday

  - Import tasks from tools

  - Prioritize work

  - Time-block on calendar

  - Set realistic goals


  ### Evening Shutdown

  - Review completions

  - Celebrate progress

  - Move unfinished items

  - Disconnect mentally


  ## Integrations


  Trello, Asana, ClickUp, Jira, GitHub, Gmail, Slack, Google Calendar, Outlook


  ## Pricing


  $20/month or $16/month annually
