markdown: >-
  ## Overview


  OnTheClock is a straightforward time tracking solution designed for small to
  medium-sized businesses, with particular strength in construction and field
  service industries. It prioritizes simplicity while offering robust GPS and
  geofencing capabilities.


  ## Key Features


  - GPS-enabled time tracking

  - Geofencing with location restrictions

  - Mobile app and web-based clock

  - Photo verification on clock-in/out

  - Job and task tracking

  - Overtime calculations

  - PTO and absence management

  - Timesheet editing and approvals

  - Scheduling


  ## GPS & Geofencing


  - Track employee location on clock-in/out

  - Set geofence boundaries around job sites

  - Prevent clock-ins outside designated areas

  - View GPS location history

  - Breadcrumb trail during shifts

  - Multiple location support


  ## Time Tracking Methods


  - Mobile app (iOS and Android)

  - Web browser

  - Kiosk mode for shared devices

  - SMS/text message clock-in

  - Phone call time clock

  - Physical time clock integration


  ## Timesheet Management


  - Automatic timesheet generation

  - Manager review and approval

  - Edit capability with audit trail

  - Break time deductions

  - Rounding rules configuration

  - Department and job code allocation


  ## Reporting


  - Daily attendance reports

  - Timesheet summaries

  - GPS location reports

  - Labor cost by job/department

  - Hours worked analysis

  - Export to Excel, CSV, PDF


  ## Integrations


  - Payroll: QuickBooks, Paychex, ADP, Gusto

  - Accounting software

  - Project management tools

  - API for custom integrations


  ## Use Cases


  - Construction companies

  - Landscaping services

  - HVAC and plumbing

  - Cleaning services

  - Property management

  - Small business with hourly employees


  ## Benefits


  - Easy to set up and use

  - Affordable pricing

  - Eliminates paper timesheets

  - Reduces payroll processing time

  - Prevents time theft

  - Accurate job costing


  ## Pricing


  Starts at $3.50 per user per month (billed annually) with no setup fees. Free
  30-day trial available. All features included in base price.
