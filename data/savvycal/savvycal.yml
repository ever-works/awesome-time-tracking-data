markdown: >-
  ## Overview


  SavvyCal is scheduling software that offers flexible controls to keep your
  calendar sane, with an ultra-convenient booking experience for recipients.
  Unlike traditional scheduling tools, SavvyCal prioritizes the experience of
  both the scheduler and the recipient.


  ## Key Features


  ### Calendar Overlay

  - Invitees can overlay their own calendar on top of yours to find mutual
  availability

  - Reduces friction and guesswork in finding meeting times

  - Visual representation of availability conflicts

  - More respectful of recipients' time


  ### User Interface

  - Gorgeous, high-fidelity week view interface

  - Replaced inefficient "click-a-day then click-a-time" pattern

  - Modern design that recipients will love

  - Intuitive navigation and selection


  ### Team Scheduling

  - Round-robin scheduling distributes incoming bookings across team members
  automatically

  - Rotates assignments based on availability

  - Balances meeting loads fairly

  - Team pooling and routing options


  ### Customization

  - Adjust colors, banner image, and avatar on scheduling links

  - Host scheduling links on your own custom domain

  - White-labeled experience for professional branding

  - Custom confirmation messages and workflows


  ### Payment Integration

  - Stripe integration for payment collection

  - Require payment at the time of booking

  - Seamless transaction processing

  - Reduce payment friction for paid services


  ## Integrations


  - iCloud Calendar

  - Google Calendar

  - Outlook

  - Microsoft Teams

  - Zoom

  - Stripe

  - Custom domain hosting


  ## Pricing (2026)


  - **Free Plan**: One active scheduling link and one calendar connection for
  basic use

  - **Basic Plan**: $12/month for unlimited links, custom branding, Stripe
  payments, and team features

  - **Pro Plan**: $40/month ($32 annually) for teams and power users with all
  features unlimited


  ## Use Cases


  - Consultants and coaches scheduling client calls

  - Sales teams booking demos

  - Freelancers managing client meetings

  - Teams requiring payment upfront

  - Organizations wanting white-labeled scheduling

  - Professionals needing flexible availability management


  ## Benefits


  - More respectful of recipients' time with calendar overlay

  - Professional appearance with custom branding

  - Fair distribution of meetings across team members

  - Streamlined payment collection

  - Superior user experience for both scheduler and invitee
