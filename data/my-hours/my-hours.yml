markdown: >-
  ## Overview


  My Hours is a time tracking tool that excels at simple employee time tracking
  with advanced but clear reporting. It's highlighted as one of the top time
  tracking apps for 2026, particularly noted for its generous free plan.


  ## Key Features


  ### Time Tracking

  - **Start/stop timer** for real-time tracking

  - **Manual time entry** for retrospective logging

  - **Task-level tracking** for detailed project insights

  - **Mobile apps** for iOS and Android

  - **Browser extensions** for quick access


  ### Project Management

  - **Unlimited projects** even on free plan

  - **Unlimited clients** on free plan

  - **Task organization** within projects

  - **Project budgets** and time estimates

  - **Team collaboration** features


  ### Reporting & Analytics

  - **Advanced reporting** with clear visualizations

  - **Customizable reports** by project, client, or team member

  - **Export capabilities** to various formats

  - **Dashboard overview** of time allocation

  - **Billable vs. non-billable** time separation


  ### Billing & Invoicing

  - **Invoicing integration** to convert tracked time to invoices

  - **Multiple billing rates** support

  - **Client-specific rates** configuration

  - **Invoice generation** from timesheets


  ## Free Plan Benefits


  Unlike many competitors, My Hours offers:

  - Unlimited time tracking

  - Unlimited users

  - Unlimited projects

  - Unlimited reports

  - Core features available at no cost


  ## Best For


  - Freelancers tracking billable hours

  - Small teams needing robust reporting

  - Agencies managing multiple client projects

  - Businesses wanting to try full-featured time tracking without commitment

  - Teams prioritizing simplicity with powerful reporting


  ## Platform Availability


  - Web application

  - iOS mobile app

  - Android mobile app

  - Browser extensions for Chrome and Firefox
