markdown: >-
  ## Overview


  Timely is an AI-driven automatic time tracking tool that represents the
  cutting edge of effortless time capture. Its "Memory" feature runs in the
  background and automatically records all computer activity, while AI
  algorithms intelligently suggest how to categorize that time into billable
  projects.


  ## How It Works


  Timely's automatic tracker (called Memory) runs as a private desktop app that
  captures every document, email, meeting, website, and app used throughout the
  day. This data is stored privately and never shared. At the end of the day or
  week, users review their Memory timeline where AI has already suggested which
  activities belong to which projects. Users simply confirm or adjust these
  suggestions to build accurate timesheets.


  ## Key Features


  - **100% Automatic Capture**: No timers to start or stop; everything tracked
  automatically

  - **AI-Powered Categorization**: Machine learning suggests project assignments
  for activities

  - **Private by Design**: All activity data encrypted and visible only to the
  individual user

  - **Memory Timeline**: Visual timeline shows exactly what was worked on and
  when

  - **Team Dashboard**: Managers see project time without seeing individual
  activity details

  - **Project Budgets**: Track time against project estimates and budgets

  - **Scheduled vs Actual**: Compare planned calendar time with actual tracked
  time

  - **Integrations**: Connects with calendars, Slack, and other tools to enrich
  timeline data


  ## Privacy Features


  Timely takes an unusually strong privacy stance. The Memory data (detailed
  activity tracking) is end-to-end encrypted and visible only to the individual
  user. Team leaders and project managers only see aggregated time entries by
  project—never the underlying activity details.


  ## Reporting


  - Real-time project dashboards

  - Billable hours and revenue tracking

  - Team capacity and utilization reports

  - Budget vs actual comparisons

  - Export timesheets to invoicing tools


  ## Pricing


  Timely starts at approximately $11/user/month (billed annually). Free trial
  available. All plans include automatic tracking and AI suggestions.


  ## Platform


  Available as web app, desktop apps (Windows, macOS), and mobile apps (iOS,
  Android).
