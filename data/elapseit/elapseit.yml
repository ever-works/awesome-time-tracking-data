markdown: >-
  ## Overview


  elapseit is an online project management software with resource planning, time
  tracking, ticketing, granular user access, availability and invoicing. It's a
  complete SaaS web platform that helps with resource planning, task management,
  time tracking and project management, from project kick-start to invoice.


  ## Key Features


  ### Resource Planning

  - Easily visualize and balance team workload to avoid burnout or
  under-utilization

  - Re-prioritize projects and redistribute hours flexibly and in real time

  - Plan resources efficiently across multiple projects


  ### Time Tracking & Timesheets

  - Time tracking for billable and non-billable hours

  - Timesheet approval workflows

  - Accurate time logging for project costing


  ### Expense Management

  - Enterprise features like multi-currency support

  - Receipt attachments

  - Approval workflows

  - Expenses to invoice conversion

  - Overtime management available to everybody


  ### Mobile Application

  - Submit timesheets, expenses or vacation requests

  - View allocations through the mobile application

  - Available on iOS (App Store) and Android (Google Play)


  ## Target Users


  It's the perfect choice for startups, agencies, small & medium companies,
  especially in the following fields:

  - Digital marketing

  - Creative agencies

  - Web development

  - IT & Software companies

  - Legal firms


  ## Platform Availability


  - Web application

  - iOS (App Store)

  - Android (Google Play)

  - Desktop apps for Mac and Windows


  ## Pricing


  Free trial available with no credit card required.
