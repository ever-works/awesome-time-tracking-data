name: Weekly Priorities System (3-5 Rule)
description: Planning practice of identifying 3-5 maximum priorities for the
  week rather than daily micro-planning. Provides flexible framework allowing
  daily adaptation while maintaining weekly focus. Prevents over-commitment and
  creates realistic achievement expectations.
source_url: https://www.forbes.com/sites/bryancollinseurope/2020/01/13/weekly-planning/
category: Time Management Practice
tags:
  - planning
  - priorities
  - weekly
  - flexibility
markdown: |-
  ## Overview

  Weekly Priorities System limits focus to 3-5 key outcomes per week.

  ## Process

  1. Sunday/Monday: identify 3-5 weekly priorities
  2. Each day: choose which to work on based on energy/context
  3. Don't add more until complete
  4. Weekly review: assess completion

  ## Benefits

  - Flexible daily execution
  - Realistic commitments
  - Prevents overwhelm
  - Maintains focus
  - Allows for unexpected events

  ## Rules

  - Maximum 5 priorities
  - Must be achievable in week
  - Mix of different types okay
  - Complete before adding new
  - Can be projects or tasks

  ## Comparison to Daily Planning

  - More flexible
  - Less time spent planning
  - Adapts to reality better
  - Reduces planning anxiety

  ## Pricing

  Free planning system.
