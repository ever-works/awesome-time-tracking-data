markdown: >-
  ## Overview


  Nozbe was founded in 2007 by Michael Sliwinski and is designed for the Getting
  Things Done methodology. Over 500,000 professionals rely on Nozbe Classic to
  get things done.


  ## GTD Integration


  Nozbe uses the GTD methodology to manage your todos. Nozbe is the best task
  manager based on David Allen's GTD (Getting Things Done) model of
  productivity. The app supports key GTD principles including:


  - **Inbox capture**: In Nozbe it's literally called the inbox for capturing
  new ideas

  - **Projects and tasks**: Projects are anything that requires more than two
  tasks to complete

  - **Single source of truth**: To conform to the rules of getting things done
  users keep a single source of things to do – that is Nozbe


  ## Key Features


  Tasks can be arranged with deadlines, reminders and time tracking. Dedicated
  apps are available for Mac, Windows, Android, iPad and iPhone, and Nozbe apps
  work offline.


  ## Platform Availability


  You can use this to do list app on desktop - Windows, Mac, Linux, mobile -
  Android, iOS, iPad and web. Nozbe has a free plan as well as a premium one.


  ## Pricing


  Nozbe offers both free and premium plans to accommodate different user needs.
