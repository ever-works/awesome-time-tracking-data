markdown: >-
  ## Overview


  Bubbles is a free screen recorder and AI meeting notetaker designed to help
  turn conversations into actions. The platform enables asynchronous video
  messaging where users can record short videos of their screens with voiceover
  narration.


  ## Features


  - AI-powered meeting recording and transcription

  - Automatic meeting summarization into action items

  - Async screen recording with voiceover

  - Timestamp-based commenting

  - Team task assignments with response timers

  - Integration with Slack, Zoom, Google Hangouts, Microsoft Teams

  - Embed recordings in Notion and 200+ other integrations

  - Time-tracked async collaboration


  ## Key Capabilities


  **AI Meeting Notes:** Use AI to record, transcribe, and summarize meetings
  into actionable items.


  **Async Collaboration:** Eliminate live meetings by sharing feedback through
  screen recordings, bringing back speed and accountability to flexible async
  work.


  **Accountability Timers:** Set timers on async conversations to maintain
  project momentum and clear response expectations.


  ## Use Cases


  - Design feedback and reviews

  - Product demonstrations

  - Bug reporting and troubleshooting

  - App and website feedback

  - Marketing campaign reviews

  - Team training and onboarding


  ## Pricing


  Free plan available with limitations on recording duration. Premium plans
  offer extended features.


  ## Platform Availability


  Available as browser extension (Chrome, Edge) and web application.
