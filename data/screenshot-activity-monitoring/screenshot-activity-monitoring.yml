name: Screenshot Activity Monitoring
description: An automatic time tracking feature that captures periodic
  screenshots of employee screens (typically 3-10 per hour) along with activity
  levels, primarily used for remote workforce monitoring, providing visual proof
  of work performed and deterring time theft, though controversial for privacy
  implications.
source_url: https://www.hubstaff.com/features/screenshots
category: Time Tracking Feature
tags:
  - monitoring
  - remote-work
  - privacy
markdown: >-
  ## Overview


  Screenshot Activity Monitoring captures visual records of employee work to
  verify productivity and provide accountability, particularly for remote
  workers, though it raises significant privacy and trust concerns.


  ## How It Works


  ### Screenshot Capture

  - Random intervals (3-10 per hour)

  - Or fixed schedule (every 10 min)

  - Only when timer running

  - Optional blur sensitive data

  - Employee notification


  ### Activity Metrics

  - Mouse movement

  - Keyboard activity

  - Application usage

  - Website visits

  - Activity percentage


  ### Storage & Access

  - Cloud storage

  - Manager dashboard access

  - Client portal access (optional)

  - Configurable retention

  - Privacy controls


  ## Use Cases


  **Remote Contractors**: Client-requested verification

  **Offshore Teams**: Cross-timezone accountability

  **Billable Services**: Visual proof of work

  **Regulated Industries**: Compliance documentation


  ## Privacy Concerns


  **Issues**:

  - Invasive monitoring

  - Personal data capture

  - Trust degradation

  - Legal implications

  - Employee morale


  **Mitigations**:

  - Transparent policies

  - Employee consent

  - Blur sensitive content

  - Screenshots only, no keylogging

  - Delete after period

  - Work-hours only


  ## Alternatives


  Less invasive options:

  - Application/website tracking

  - Activity levels only

  - Self-reporting

  - Results-based management

  - Trust and autonomy


  ## Legal Considerations


  - Employee consent required

  - GDPR compliance (EU)

  - State-specific laws

  - Works council consultation

  - Data protection regulations


  ## Pricing


  N/A - This is a feature in employee monitoring software.
