markdown: >-
  ## The Origin Story


  In the late 1980s, Francesco Cirillo was a university student struggling with
  focus and productivity. Overwhelmed by his studies, he challenged himself to
  commit to just 10 minutes of focused study time. He found a tomato-shaped
  kitchen timer (pomodoro is Italian for tomato) and the Pomodoro Technique was
  born.


  ## From Student Struggle to Global Method


  What started as a personal solution to procrastination became one of the
  world's most widely-used productivity techniques.


  ### The Kitchen Timer

  The name "Pomodoro" comes from the kitchen timer Cirillo used—literally shaped
  like a tomato. This humble origin story resonates with people because it shows
  how powerful productivity systems can emerge from simple, everyday objects.


  ## Original Implementation


  Cirillo's initial approach:

  - 25-minute focused work intervals (one "pomodoro")

  - 5-minute breaks between pomodoros

  - Longer break (15-30 minutes) after four pomodoros

  - Physical timer provides commitment and urgency


  ## Evolution Over Decades


  ### The 2006 Book

  In 2006, Cirillo wrote a 130-page book on the technique, offering it as a free
  download. It was downloaded over 2 million times before he took the PDF down
  in 2013.


  ### Traditional Publication

  Penguin Books reached out after the PDF's success. The book has now been
  translated into Chinese, Thai, Portuguese, Turkish, Spanish, French, Italian,
  and many other languages.


  ### The Complete System

  Cirillo emphasizes that the 25-minute work sessions are just one part of a
  complete system that includes:

  - Daily planning

  - Interruption management

  - Effort estimation

  - Review and improvement cycles


  ## Why the Tomato Timer Matters


  ### Physical vs. Digital

  Cirillo advocates for physical timers because:

  - Tangible commitment to the pomodoro

  - Visible passage of time

  - Tactile winding ritual begins focus

  - Ticking sound creates urgency

  - Ringing bell signals completion


  ### The Ritual Element

  Winding the timer becomes a ritual that signals to your brain: "It's time to
  focus now."


  ## Impact on Productivity Culture


  The Pomodoro Technique influenced:

  - Countless digital timer apps

  - Focus music and playlists designed for 25-minute intervals

  - Workplace policies around focus time

  - Remote work practices

  - Educational approaches to study time


  ## From Italy to the World


  What began with an Italian student and a tomato timer spread globally through:

  - Word of mouth

  - Free PDF distribution

  - Digital age adoption

  - App ecosystem

  - Academic and corporate endorsement


  ## The Broader Philosophy


  For Cirillo, Pomodoro isn't just about time management—it's about:

  - Awareness of how time is spent

  - Protection against interruptions

  - Management of energy, not just time

  - Sustainable productivity

  - Respecting human attention limits


  ## Personal Mentoring Program


  Cirillo's personal website (francescocirillo.com) offers a mentoring program
  focused on time management where people can join and learn the Pomodoro
  Technique directly from its creator.


  ## Legacy


  Over 40 years after using that tomato-shaped timer, Francesco Cirillo's
  technique has helped millions of people worldwide manage their time more
  effectively. The humble tomato timer became an icon of productivity culture.
