markdown: >-
  ## Overview


  Gusto is a comprehensive payroll, benefits, and HR platform that includes
  integrated time tracking. It's designed for small to mid-sized businesses that
  want an all-in-one solution for managing their workforce.


  ## Features


  - **Time Tracking**: Track employee hours with web and mobile apps

  - **Payroll**: Full-service payroll with automatic tax filing

  - **Benefits Administration**: Health insurance, 401(k), and other benefits

  - **HR Tools**: Onboarding, document management, and compliance

  - **PTO Management**: Track and manage paid time off

  - **Contractor Payments**: Pay contractors and file 1099s

  - **Reporting**: Payroll reports, time reports, and HR analytics

  - **Mobile App**: Employees can track time and access pay stubs

  - **Workers' Comp**: Integrated workers' compensation insurance

  - **Compliance**: Stay compliant with federal, state, and local regulations


  ## Time Tracking Features


  - Clock in/out from mobile or web

  - GPS location verification

  - Integrates directly with payroll

  - Overtime and break tracking

  - Manager approvals


  ## Pricing


  Simple plan at $40/month + $6/person. Plus plan at $80/month + $12/person with
  time tracking and hiring tools. Premium plan with dedicated support.
