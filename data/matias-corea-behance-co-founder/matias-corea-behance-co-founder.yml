markdown: >-
  ## Role at Behance


  Matias Corea co-founded Behance with Scott Belsky in November 2005. Together
  they created both the Behance creative portfolio platform and the Action
  Method productivity system.


  ## Design of Action Method


  Corea, alongside Belsky, designed the Action Method system to:

  - Help creative professionals move from ideas to execution

  - Organize work into actionable components

  - Provide physical and digital tools for project management

  - Bridge the gap between creativity and productivity


  ## Research Foundation


  The Action Method emerged from research asking productive people and teams in
  the creative world how they managed projects and stayed organized. These
  findings inspired the design and system.


  ## The Creative + Organizational Balance


  Corea and Belsky's partnership brought together:

  - Design thinking and user experience

  - Practical project management

  - Understanding of creative workflows

  - Systems thinking for productivity


  ## Product Development


  Corea helped develop:

  - Action Method paper products (notebooks, planners)

  - Action Method Online application

  - Visual design language

  - User experience for creative professionals


  ## Legacy


  The collaboration between Corea and Belsky resulted in:

  - Behance becoming the leading portfolio platform (acquired by Adobe in 2012)

  - Action Method influencing productivity thinking for creatives

  - Design-forward approach to productivity tools

  - Recognition that creativity requires organization to achieve impact
