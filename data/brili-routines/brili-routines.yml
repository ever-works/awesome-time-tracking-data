markdown: >-
  ## Overview


  Brili is a science-based neurodiverse friendly app for time and task
  management that helps you plan routines for mornings, work, chores and nights,
  and helps you complete them on time. Originally designed for children, Brili
  now offers versions for both families and adults with ADHD.


  ## Addressing ADHD and Time Blindness


  The app specifically addresses distractions, time blindness, memory or
  emotional regulation challenges for people with ADHD. Brili helps combat time
  blindness by:


  - Showing what you have scheduled

  - Helping you begin your routines on time

  - Visualizing routines and breaking them down into timed, manageable steps

  - Providing reminders throughout tasks to prevent distraction


  Both Brili apps address difficulties with executive functions and time
  blindness, allowing users to create and maintain structure in their days in a
  simple, straightforward and flexible way.


  ## Key Features


  **Dynamic Timekeeper**

  The app keeps you in the know - showing where you are, what you have next,
  when to start, and ensures you'll end on time.


  **Visual Clock & Focused Task Cards**

  Provides visual representation of time remaining and current tasks to combat
  time blindness.


  **Notifications & Reminders**

  Timely notifications keep you on track throughout each routine.


  **Achievements & Customizable Rewards**

  Gamification elements provide motivation and positive reinforcement.


  **Routine History**

  Track your progress and patterns over time.


  ## Scientific Foundation


  Based on the latest ADHD research and incorporates best practices from
  Cognitive Behavioral Therapy (CBT), Brili provides evidence-based support for
  executive function challenges.


  ## User Experience


  Users with ADHD report that Brili is incredibly helpful with automating
  mornings so they don't have to think about what needs to be done next and
  don't get distracted. The reminders throughout tasks are particularly valuable
  for maintaining focus.


  ## Routine Types Supported


  - Morning routines

  - Work routines

  - Chores and household tasks

  - Evening/bedtime routines

  - Custom routines for specific needs


  ## Platform Availability


  Available on iOS and Android platforms.


  ## Pricing


  Offers a 10-day free trial.


  Subscription plans:

  - 1 month: $7.99

  - 6 months: $34.99 ($5.83/month)

  - 1 year: $49.99 ($4.17/month)
