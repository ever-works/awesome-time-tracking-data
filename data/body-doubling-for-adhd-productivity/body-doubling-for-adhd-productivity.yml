name: Body Doubling for ADHD Productivity
description: Productivity technique where working in presence of another person
  (virtual or in-person) helps ADHD individuals initiate and sustain focus on
  tasks. The presence creates accountability and external structure, making it
  easier to start and maintain work. Increasingly popular through virtual
  co-working platforms.
source_url: https://www.additudemag.com/body-doubling-adhd-work-productivity/
category: Time Management Technique
tags:
  - adhd
  - productivity
  - co-working
  - accountability
  - focus
markdown: >-
  ## What is Body Doubling


  Working in the presence of another person (virtual or in-person) to help
  initiate and sustain focus on tasks.


  ## Why It Works for ADHD


  **External Accountability**

  Another person's presence creates implicit accountability.


  **Social Pressure**

  Mild social pressure to stay on task.


  **Mirror Neurons**

  Seeing others work triggers work behavior.


  **Reduced Overwhelm**

  Shared space reduces isolation anxiety.


  ## Implementation Methods


  **In-Person**

  - Coffee shops

  - Libraries

  - Shared offices

  - Friend working nearby


  **Virtual**

  - Focusmate (scheduled sessions)

  - Virtual co-working rooms

  - Video calls while working

  - Discord study servers


  ## Benefits


  - Easier task initiation

  - Sustained focus

  - Reduced procrastination

  - Social connection

  - Accountability


  ## Platforms


  - Focusmate (scheduled 1:1 sessions)

  - Flow Club (group sessions)

  - Study Together (YouTube live streams)

  - Discord study servers


  ## Best Practices


  - Match work styles

  - Minimize conversation

  - Use video when virtual

  - Schedule regular sessions

  - Choose compatible partners


  ## Pricing


  Focusmate: Free tier + $5/month premium

  Other platforms vary, many free options available
