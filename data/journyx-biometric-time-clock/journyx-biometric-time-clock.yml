markdown: >-
  ## Overview


  Journyx provides enterprise-grade time tracking solutions including biometric
  time clock systems for accurate employee attendance. Their platform combines
  biometric authentication with comprehensive project time tracking and
  workforce management.


  ## Biometric Time Clock Options


  ### Authentication Methods

  - **Fingerprint Recognition** - Scan fingerprints for identity verification

  - **Facial Recognition** - Touchless face-based authentication

  - **RFID Badge** - Card swipe for non-biometric option

  - **PIN Entry** - Numeric code backup method

  - **Mobile GPS** - Location-verified mobile clock-in


  ### Hardware Features

  - **Multi-Modal Terminals** - Support multiple authentication types

  - **Rugged Design** - Durable for industrial environments

  - **Large Display** - Color touchscreen interface

  - **Network Connectivity** - Ethernet and WiFi options

  - **Offline Capability** - Store punches when network is down


  ## Time Tracking Capabilities


  ### Employee Time & Attendance

  - **Clock In/Out** - Simple punch clock functionality

  - **Break Tracking** - Monitor meal and rest breaks

  - **Overtime Calculation** - Automatic overtime tracking

  - **Attendance Exceptions** - Flag tardiness and absences

  - **Shift Differentials** - Track multiple pay rates


  ### Project Time Tracking

  - **Job Costing** - Track time by project and task

  - **Client Billing** - Bill clients for tracked time

  - **Resource Allocation** - Monitor team capacity

  - **Budget Tracking** - Compare actual vs. budgeted hours

  - **Multi-Level Projects** - Hierarchical project structures


  ## Enterprise Features


  - **Scalability** - Supports organizations of any size

  - **Multi-Location** - Manage global workforce

  - **Advanced Reporting** - Customizable analytics and dashboards

  - **API Integration** - Connect with ERP, HR, and payroll systems

  - **Compliance** - FLSA, DCAA, and other regulatory compliance

  - **Audit Trails** - Complete history of time entries and changes


  ## Industries


  - Government contractors

  - Manufacturing

  - Engineering and architecture

  - Professional services

  - Healthcare


  ## Pricing


  Enterprise pricing based on number of employees and features required.
