markdown: >-
  ## About Alex Cavoulacos


  Alex Cavoulacos is the founder and president of The Muse, described as "the
  most productive person we know" by her team. She created the 1-3-5 Rule as a
  practical framework for daily task management.


  ## The 1-3-5 Rule


  You can reasonably get one big thing, three medium things, and five small
  things done each day. Keep your daily to-do list to just these nine items.


  ## Philosophy


  Cavoulacos recognized that people have limited time and can only accomplish a
  finite number of tasks daily. The 1-3-5 system forces realistic prioritization
  by accepting capacity limits rather than creating endless to-do lists.


  ## Impact


  The rule gained widespread adoption through The Muse platform, with
  downloadable templates and guides helping millions of professionals implement
  more realistic daily planning.


  ## Key Insight


  By limiting daily tasks to nine carefully prioritized items, you ensure your
  most important work gets completed while avoiding the stress and overwhelm of
  impossible to-do lists.
