markdown: >-
  ## Overview


  Commitment contracts are agreements where individuals pledge to achieve
  specific goals, often with penalties for failure and rewards for success.
  Research shows dramatic improvement in success rates when financial stakes are
  involved.


  ## Scientific Backing


  Harvard Business Review study on StickK platform found:

  - 42.7% success rate for contracts without stakes

  - 82.8% success rate for contracts with financial stakes

  - 87.1% success rate when failed stakes go to a disliked charity


  ## How It Works


  1. Define a specific, measurable goal

  2. Set a financial stake (money you'll lose if you fail)

  3. Choose a referee to verify completion

  4. Optionally designate where failed stakes go (charity, anti-charity, or
  friend)

  5. Report progress regularly


  ## Psychological Basis


  Leverages loss aversion - humans are more motivated to avoid losses than gain
  rewards. Losing money hurts more than gaining the same amount helps.


  ## Popular Platforms


  StickK and Beeminder are leading platforms for creating commitment contracts
  with financial stakes.


  ## Pricing


  Free to create contracts, you only risk the stakes you voluntarily set.
