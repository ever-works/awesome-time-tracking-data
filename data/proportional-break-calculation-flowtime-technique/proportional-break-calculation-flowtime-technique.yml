name: Proportional Break Calculation (Flowtime Technique)
description: "The Flowtime technique's break calculation method where you divide
  focus time by 5 to determine break length: 25 min focus = 5 min break, 50 min
  = 10 min break, 90+ min = 18+ min break, allowing natural work rhythms."
