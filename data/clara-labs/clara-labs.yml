markdown: >-
  ## Overview


  Clara Labs (now part of Upwork) is an AI-powered scheduling assistant that
  acts like a human assistant, managing your meeting scheduling through email.
  Clara handles the back-and-forth of finding meeting times, eliminating
  scheduling friction while maintaining a personal touch.


  ## Features


  - **Natural Language Processing**: Understands email requests and responds
  naturally

  - **Calendar Management**: Accesses your calendar to find available times

  - **Automatic Coordination**: Handles scheduling back-and-forth with meeting
  participants

  - **Smart Suggestions**: Proposes optimal meeting times based on preferences

  - **Multi-Calendar Support**: Works across Google Calendar, Office 365, and
  Exchange

  - **Time Zone Intelligence**: Automatically handles different time zones

  - **Rescheduling**: Manages changes and cancellations seamlessly

  - **Custom Preferences**: Set meeting preferences, buffer times, and
  availability

  - **Professional Communication**: Maintains business-appropriate tone and
  etiquette

  - **Meeting Preparation**: Can send agendas and relevant materials

  - **Follow-Up**: Handles confirmations and reminders

  - **Integration**: Works within your existing email workflow


  ## How It Works


  1. **CC Clara**: Simply CC clara@claralabs.com on scheduling emails

  2. **Clara Takes Over**: The AI assistant responds and coordinates with
  participants

  3. **Finds Time**: Clara checks calendars and proposes meeting times

  4. **Schedules Meeting**: Once confirmed, adds to all calendars

  5. **Sends Confirmations**: Updates everyone with meeting details


  ## Use Cases


  - Executive assistants handling complex schedules

  - Sales professionals scheduling client meetings

  - Recruiters coordinating interviews

  - Anyone with frequent external meetings

  - Teams reducing administrative overhead


  ## Benefits


  - Saves 3-5 hours per week on scheduling

  - Eliminates email ping-pong

  - Professional representation

  - 24/7 availability for scheduling

  - Reduces scheduling conflicts


  ## Pricing


  Enterprise and custom pricing. Typically part of executive productivity
  packages.
