markdown: >-
  ## Overview


  Chronos Timesheet is a lightweight time tracking solution designed for small
  businesses, consultants, and freelancers who need simple, effective timesheet
  management without enterprise-level complexity.


  ## Features


  - Time tracking with start/stop timers

  - Manual time entry

  - Project and task organization

  - Expense tracking

  - Timesheet approvals

  - Invoicing and billing

  - Customizable reports

  - Client management

  - Multiple billing rates

  - Overtime calculation

  - Export to Excel and PDF

  - Multi-user support


  ## Pricing


  Chronos offers affordable pricing for small teams:

  - Single-user license available

  - Multi-user packs with volume discounts

  - One-time purchase or subscription options


  Contact Chronos for current pricing details.
