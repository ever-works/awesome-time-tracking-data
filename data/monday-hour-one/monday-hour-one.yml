markdown: |-
  ## The Monday Hour One Concept

  Every Monday morning, spend one hour planning your entire week by:
  1. Reviewing goals and priorities
  2. Listing all tasks for the week
  3. Time-blocking every task into your calendar
  4. Creating a realistic, intentional week

  ## The Process

  **Step 1: Brain Dump (10 min)**
  - List everything you need to do this week
  - Include work, personal, everything

  **Step 2: Prioritize (10 min)**
  - Identify top 3-5 priorities
  - Eliminate or delegate low-priority items

  **Step 3: Time Block (35 min)**
  - Schedule priority items first
  - Add remaining tasks
  - Include breaks, buffer time
  - Be realistic about capacity

  **Step 4: Review (5 min)**
  - Check for overcommitment
  - Ensure alignment with goals
  - Make final adjustments

  ## Benefits

  - Intentional week design
  - All priorities have time assigned
  - Reduces stress of "what to do next"
  - Proactive vs. reactive
  - Work-life balance by design

  ## Key Principles

  - Plan the week, not just the day
  - Schedule everything (work and personal)
  - Be realistic about time
  - Protect focus time
  - Review and adjust daily

  ## Tools

  - Paper planner
  - Google Calendar
  - Time blocking apps
  - Simple notebook
