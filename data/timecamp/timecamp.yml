markdown: >-
  ## Overview


  TimeCamp is a comprehensive automatic time tracking platform that uses AI and
  keyword-based algorithms to categorize work activities automatically. Updated
  in 2026, it features an AI Agent that seamlessly fills timesheets in the
  background without requiring manual timers.


  ## Features


  ### Automatic Time Tracking

  - **Background Recording** - Silently tracks all online and offline activities

  - **Keyword-Based Categorization** - Assign keywords to tasks; TimeCamp
  recognizes them in document titles, apps, and web pages

  - **AI Agent (2026)** - Automatically fills timesheets in the background with
  no clicks or timers

  - **App & Website Monitoring** - Records time spent in all applications and
  websites

  - **Offline Tracking** - Continues tracking even without internet connection


  ### Project Management

  - **Task Hierarchy** - Organize projects, tasks, and subtasks

  - **Budgeting** - Set time and cost budgets for projects

  - **Invoicing** - Generate invoices from tracked time

  - **Attendance Tracking** - Monitor employee work hours and attendance

  - **Timesheets** - Automated timesheet generation

  - **Reporting** - Detailed productivity and project reports


  ### Integrations

  - **PM Tools** - Asana, Trello, Jira, Basecamp, and 50+ integrations

  - **Calendar Sync** - Google Calendar, Outlook

  - **Billing Systems** - QuickBooks, Xero, FreshBooks


  ## Platforms


  Desktop apps for Windows, Mac, and Linux. Mobile apps for iOS and Android. Web
  app available.


  ## Pricing


  Free plan available. Paid plans start at approximately $7-10 per user/month.
