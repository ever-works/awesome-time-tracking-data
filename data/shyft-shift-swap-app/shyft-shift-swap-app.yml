markdown: >-
  ## Overview


  Shyft is a mobile scheduling app designed to give employees control over their
  work schedules through an easy-to-use shift swapping and marketplace system.


  ## Key Features


  - **Shift Marketplace**: Post and pick up shifts through a centralized
  marketplace

  - **Shift Swapping**: Request to swap shifts with coworkers directly from the
  mobile app

  - **Team Messaging**: Communicate with team members about schedule changes and
  shift coverage

  - **Schedule Management**: View upcoming shifts and manage availability

  - **Push Notifications**: Receive alerts about shift opportunities, swap
  requests, and schedule changes

  - **Time Off Requests**: Submit and track PTO and time off requests


  ## How Shift Swapping Works


  1. Employee posts a shift they need to give away

  2. Qualified coworkers receive notifications about available shifts

  3. Coworkers can claim the shift or make a swap proposal

  4. Manager approves or denies the swap request

  5. Schedules automatically update for all parties


  ## Benefits


  **For Employees:**

  - Flexible scheduling and work-life balance

  - Easy shift coverage when conflicts arise

  - Direct communication with coworkers

  - Opportunity to pick up extra shifts for additional income


  **For Managers:**

  - Reduced time spent manually managing shift changes

  - Better shift coverage and fewer no-shows

  - Employee empowerment leads to higher satisfaction

  - Automated approval workflows


  ## Platform Availability


  - iOS (iPhone and iPad)

  - Android


  ## Best For


  - Retail businesses

  - Restaurants and hospitality

  - Healthcare facilities

  - Any shift-based organization


  ## Pricing


  Check the app stores or Shyft website for current pricing plans.
