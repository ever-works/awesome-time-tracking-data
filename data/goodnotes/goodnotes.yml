name: GoodNotes
description: Digital handwriting and note-taking app for iPad that enables users
  to write with the Apple Pencil in digital notebooks using bullet journal
  templates and other planners. Combines the cognitive benefits of handwriting
  with searchable, cloud-synced notes.
source_url: https://www.goodnotes.com/
category: Productivity App
tags:
