markdown: >-
  ## Overview


  Notion offers time tracking templates through their marketplace that use
  database buttons and formulas to track time without native time properties.


  ## Popular Templates


  - **Basic Time Tracker**: Customizable template for managing projects and
  tracking time efficiently

  - **Time-Tracker using Database Buttons**: Start/stop database buttons that
  calculate total time for each task and project

  - **Built-in Timer Template**: Simple Start/Stop Timer with no third-party
  apps needed


  ## Key Features


  - Clock In and Clock Out buttons with automatic timestamps

  - Automatic calculation of payment and percentage of goals

  - Designed for freelancers with hourly rates

  - Helpful for measuring productivity or calendar blocking


  ## Setup Requirements


  To track time in Notion, you need two databases:

  1. Core database containing what you want to track time for (projects, tasks,
  or clients)

  2. Helper database containing the actual time trackers


  ## Limitation


  Notion doesn't currently include a native Time property in databases, though
  you can add start and end times to the Date property.


  ## Pricing


  Templates available for free through Notion Marketplace. Requires Notion
  account (free tier available).
