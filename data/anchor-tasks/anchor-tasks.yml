markdown: >-
  ## Overview


  Anchor Tasks are recurring activities scheduled at fixed times that create
  structure in your day or week. They serve as reliable touchpoints around which
  other work can flow.


  ## What Makes a Good Anchor Task


  **Characteristics:**

  - Important recurring activity

  - Same time and day

  - Non-negotiable commitment

  - Creates rhythm and structure

  - Supports goals or values


  **Examples:**

  - Morning deep work (8-10 AM daily)

  - Weekly review (Friday 4 PM)

  - Exercise (6 AM every weekday)

  - Family dinner (6 PM daily)

  - Planning session (Sunday evening)


  ## Benefits


  **Creates Structure**

  - Predictable routine

  - Reduces decision fatigue

  - Builds consistency

  - Framework for other tasks


  **Ensures Important Work**

  - Priorities get scheduled

  - Regular occurrence guaranteed

  - Not dependent on motivation

  - Becomes automatic


  **Energy Management**

  - Match tasks to energy patterns

  - Optimize timing

  - Create sustainable rhythms

  - Build positive habits


  ## Implementation


  **Start Small:**

  - Begin with 1-3 anchor tasks

  - Choose most important activities

  - Set realistic times

  - Build from there


  **Make Them Visible:**

  - Block in calendar

  - Set reminders

  - Treat as appointments

  - Communicate to others


  **Protect Them:**

  - Decline conflicting requests

  - Reschedule exceptions carefully

  - Maintain consistency

  - Honor commitments


  ## Common Anchor Tasks


  **Morning:**

  - Deep work block

  - Exercise routine

  - Planning session

  - Creative work


  **Midday:**

  - Lunch break

  - Email processing

  - Team meeting

  - Quick review


  **Evening:**

  - Family time

  - Shutdown routine

  - Next-day planning

  - Personal development


  **Weekly:**

  - Weekly review

  - Meal planning

  - House cleaning

  - Reflection time
