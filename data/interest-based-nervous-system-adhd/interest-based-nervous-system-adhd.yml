name: Interest-Based Nervous System (ADHD)
description: Understanding that ADHD brains operate on interest rather than
  importance. Tasks are initiated based on novelty, urgency, challenge, or
  passion—not on logical priority or consequences. Explains why ADHD individuals
  can hyperfocus on interesting activities but struggle with important boring
  tasks.
source_url: https://www.additudemag.com/adhd-motivation-problems-getting-started/
category: Time Management Philosophy
tags:
  - adhd
