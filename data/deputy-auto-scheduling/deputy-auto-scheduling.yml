markdown: >-
  ## Overview


  Deputy's Auto-Scheduling feature uses artificial intelligence to automatically
  generate optimized shift schedules, saving managers hours of manual scheduling
  work while ensuring proper coverage and compliance with labor regulations.


  ## How It Works


  The AI scheduling engine analyzes multiple data points:

  - Employee availability and time-off requests

  - Skills, qualifications, and certifications

  - Historical demand patterns and sales data

  - Labor cost budgets and targets

  - Fair Work and labor law compliance requirements

  - Employee preferences and work-life balance


  ## Key Benefits


  - **Time Savings**: Reduces scheduling time from hours to minutes

  - **Cost Optimization**: Matches labor to demand to minimize costs

  - **Compliance**: Automatically ensures adherence to labor laws and break
  requirements

  - **Fairness**: Distributes shifts equitably among qualified staff

  - **Flexibility**: Allows managers to review and adjust AI-generated schedules


  ## Industries Using Auto-Scheduling


  - Retail stores

  - Restaurants and hospitality

  - Healthcare facilities

  - Call centers

  - Warehouses and logistics


  ## 2026 Advancements


  In 2026, Deputy's auto-scheduling has evolved to include:

  - Machine learning from past scheduling patterns

  - Integration with POS systems for real-time demand forecasting

  - Employee preference learning

  - Predictive scheduling compliance for multiple jurisdictions


  ## Implementation


  The feature is available as part of Deputy's premium and enterprise plans.
  Setup involves configuring business rules, importing employee data, and
  training the system on historical patterns for 2-4 weeks before full
  automation.
