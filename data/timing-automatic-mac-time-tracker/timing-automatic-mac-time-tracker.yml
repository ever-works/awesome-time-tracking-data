markdown: >-
  ## Overview


  Timing is automatic time tracking software for Mac that runs quietly in the
  background, recording application and web usage automatically without manual
  timers. The app prioritizes privacy while providing comprehensive activity
  tracking.


  ## Automatic Tracking


  Timing automatically tracks:

  - Applications used

  - Window titles

  - Documents worked on

  - Websites visited

  - Time spent on each activity


  All tracking happens in the background with no manual timer starting/stopping
  required.


  ## Privacy Features


  ### Local Storage

  All tracked data stored locally on your Mac and never leaves unless you opt
  into sync. This local-first approach is a core privacy feature.


  ### Privacy Controls

  - Private or incognito browser tabs automatically have information discarded

  - Add any activities to exclusion list to prevent tracking

  - Full control over what gets monitored


  ### Team Privacy

  For team usage, admins only see aggregate times associated with team projects
  - no personal times or private details shared.


  ## Platform


  ### Mac-Only

  Timing supports automatic time tracking on macOS exclusively:

  - Background tracking of apps, websites, and documents

  - Idle time detection

  - Ability to assign time to projects


  ### Not Available on App Store

  Timing isn't available on the Mac App Store since Apple doesn't allow apps
  with such comprehensive monitoring due to strict privacy policies.


  ## Key Features


  - Automatic activity timeline

  - Project-based categorization

  - Detailed reports and analytics

  - Invoice generation

  - Team time tracking (optional)

  - Calendar integration


  ## Use Cases


  - Freelancers tracking billable hours

  - Remote workers documenting time

  - Teams analyzing productivity

  - Professionals creating accurate timesheets


  ## Key Advantage


  Combines completely automatic tracking with strong privacy protection through
  local storage, appealing to Mac users who want productivity insights without
  compromising data privacy.
