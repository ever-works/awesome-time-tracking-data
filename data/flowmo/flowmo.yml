markdown: >-
  ## Overview


  Flowmo is a productivity timer app that supports both the traditional Pomodoro
  Technique and the flexible Flowtime (Flowmodoro) approach. The app helps users
  maintain focus while allowing natural work rhythms to dictate break timing.


  ## Features


  - **Dual Timer Modes**: Switch between Pomodoro and Flowtime techniques

  - **Flowtime Algorithm**: Automatically calculates break time (focus time ÷ 5)

  - **Customizable Intervals**: Set custom work and break durations

  - **Statistics & Analytics**: Track focus sessions and productivity patterns

  - **Distraction Blocking**: Optional website and app blocking during focus

  - **Task Integration**: Link focus sessions to specific tasks or projects

  - **Break Reminders**: Gentle notifications when it's time to rest

  - **Focus Music**: Built-in ambient sounds and music for concentration

  - **Cross-Platform**: Available on web, desktop, and mobile

  - **Session History**: Review past focus sessions and time spent


  ## Pricing


  - **Free**: Basic timer functionality

  - **Pro**: $4.99/month - Advanced features, statistics, integrations
