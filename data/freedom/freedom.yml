markdown: >-
  ## Overview


  Freedom is a comprehensive distraction blocking application that works across
  Mac, Windows, iOS, Android, and Chrome browsers. It helps users maintain focus
  and productivity by blocking distracting websites and applications, with the
  ability to sync blocks across all devices simultaneously.


  ## Features


  - Cross-platform blocking (Mac, Windows, iOS, Android, Chrome)

  - Simultaneous device synchronization

  - Website and app blocking

  - Full internet blocking option

  - Scheduled focus sessions

  - Recurring block schedules

  - Locked Mode to prevent bypassing

  - Block lists and templates

  - Session history and statistics

  - Ambient sound features for focus


  ## Blocking Capabilities


  - Block specific websites across all browsers

  - Block entire categories of sites (social media, news, etc.)

  - Block individual applications on desktop

  - Block the entire internet for complete focus

  - Custom block lists for different work modes

  - Whitelist exceptions for necessary sites

  - Sync blocks across all connected devices


  ## Scheduling Features


  - Schedule focus sessions in advance

  - Set recurring daily or weekly blocks

  - Create different schedules for different days

  - Time-based automation (e.g., block social media during work hours)

  - Calendar integration for automatic blocking

  - Flexible start and end times


  ## Locked Mode


  - Prevent disabling Freedom during active sessions

  - Cannot bypass blocks by quitting the application

  - Enforces commitment to focus periods

  - Optional setting for each session

  - Helps overcome impulsive distraction seeking

  - Removes temptation to "just check quickly"


  ## Session Management


  - Start sessions instantly or schedule ahead

  - Set session durations from minutes to hours

  - Pause and resume sessions

  - End sessions early when needed (if not locked)

  - View active and upcoming sessions

  - Session templates for common scenarios


  ## Analytics and Insights


  - Track total focus time

  - View session history

  - Monitor blocked sites attempted

  - Productivity trends over time

  - Daily and weekly statistics

  - Goal tracking and achievement


  ## Use Cases


  - Writers and content creators needing uninterrupted focus

  - Students studying for exams

  - Developers during coding sessions

  - Professionals in deep work periods

  - Anyone struggling with social media addiction

  - Remote workers managing home distractions

  - Teams implementing focus time policies


  ## Integration and Sync


  - Cloud-based sync across all devices

  - Works with multiple browsers simultaneously

  - Calendar integration for automatic scheduling

  - Mobile and desktop coordination

  - Single account manages all devices


  ## Ambient Sounds


  - Built-in focus sounds and white noise

  - Nature sounds for concentration

  - Coffee shop ambiance

  - Productivity music options

  - Customizable sound mixing


  ## Team and Group Features


  - Team licenses available

  - Shared block lists

  - Group accountability

  - Organization-wide productivity initiatives

  - Bulk user management


  ## Benefits


  - Eliminates digital distractions during focus time

  - Increases productivity and concentration

  - Helps break social media and browsing habits

  - Supports deep work practices

  - Reduces context switching

  - Improves time management

  - Increases awareness of distraction patterns


  ## Technical Details


  - Works at system level for robust blocking

  - Low resource usage

  - Minimal impact on device performance

  - Secure cloud synchronization

  - Privacy-focused design


  ## Pricing


  - Monthly: $8.99/month

  - Annual: $39.99/year (equivalent to $3.33/month)

  - Lifetime: One-time payment option available

  - Free trial available

  - Team and enterprise pricing available
