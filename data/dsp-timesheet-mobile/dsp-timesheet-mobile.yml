markdown: >-
  ## Overview


  DSP Timesheet Mobile is a GPS-enabled time tracking app designed for mobile
  workforces. It uses geofencing technology to automatically verify employee
  locations and streamline time tracking for field teams.


  ## Features


  - GPS location tracking

  - Geofencing with automatic clock in/out

  - Real-time employee location visibility

  - Mobile time clock app

  - Photo verification at punch

  - Offline time tracking capability

  - Job and task assignment

  - Mileage tracking

  - Breadcrumb GPS trails

  - Alerts for late arrivals or early departures

  - Timesheet approval workflows

  - Payroll integration

  - Detailed location and time reports

  - Multi-site management


  ## Pricing


  Subscription-based pricing per user. Different tiers based on features and
  company size. Free trial available.
