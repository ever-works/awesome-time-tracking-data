markdown: >-
  ## Overview


  UDA ConstructionOnline is comprehensive construction project management
  software that includes robust time tracking capabilities designed specifically
  for construction workflows. It allows contractors to track labor hours across
  multiple projects, job sites, and crew members.


  ## Time Tracking Features


  ### Mobile Time Cards


  - Field workers clock in/out via mobile app

  - GPS location stamping for site verification

  - Offline capability for remote job sites

  - Photo capture for visual verification


  ### Project-Based Tracking


  - Track time against specific construction projects

  - Assign hours to phases, cost codes, or tasks

  - Multi-project time allocation for workers moving between sites

  - Real-time job costing updates


  ### Crew Management


  - Track entire crews or individual workers

  - Assign workers to specific trades or roles

  - Monitor labor allocation across projects

  - Identify overallocated or underutilized resources


  ### Approval Workflows


  - Foreman or superintendent timesheet approval

  - Multi-level approval chains

  - Exception flagging for overtime or attendance issues

  - Audit trails for compliance


  ## Integration Capabilities


  - **Payroll Systems**: QuickBooks, ADP, Paychex, Gusto

  - **Accounting**: Direct export to construction accounting software

  - **Project Management**: Integrated with other ConstructionOnline features

  - **Job Costing**: Automatic updates to project cost tracking


  ## Construction-Specific Features


  ### Certified Payroll


  - Generate certified payroll reports for prevailing wage projects

  - Track wage rates by classification

  - Ensure Davis-Bacon Act compliance

  - Fringe benefit tracking


  ### Union Compliance


  - Track union classifications and rates

  - Monitor break requirements

  - Enforce union work rules

  - Generate union-required reports


  ### Equipment Time Tracking


  - Track equipment hours alongside labor

  - Monitor equipment utilization

  - Support equipment rental billing

  - Maintenance scheduling based on hours


  ## Benefits for Construction Companies


  - **Accuracy**: Eliminate paper timesheets and manual data entry

  - **Job Costing**: Real-time labor cost visibility

  - **Compliance**: Meet prevailing wage and union requirements

  - **Productivity**: Identify inefficiencies and overruns

  - **Billing**: Accurate time-and-materials invoicing

  - **Payroll**: Streamlined payroll processing


  ## Mobile Capabilities


  Workers can use iOS or Android devices to:


  - Clock in/out from any job site

  - Switch between projects or cost codes

  - View their timesheet history

  - Request time off

  - Receive schedule notifications


  ## Reporting


  - Daily timesheet reports

  - Project labor summaries

  - Overtime analysis

  - Labor productivity metrics

  - Cost code time allocation

  - Comparison of actual vs estimated labor


  ## Pricing


  ConstructionOnline offers various pricing tiers based on company size and
  feature requirements. Time tracking is included in project management
  packages.
