markdown: >-
  ## Overview


  The Time-Block Planner is a physical planner created by Cal Newport, author of
  Deep Work, designed specifically for his time-blocking productivity method.
  The planner helps you schedule every minute of your workday in advance.


  ## Time-Blocking Method


  Newport's approach involves:

  - Planning every minute of your workday the night before

  - Creating 30-minute blocks for different activities

  - Using "overflow conditional" blocks for uncertain durations

  - Updating the plan when knocked off schedule

  - Including blocks for breaks, lunch, and non-work activities


  ## Key Benefits


  Newport often claims time blocking is the secret to his productivity, and in
  his experience, time blockers accomplish roughly twice as much work per week
  compared to those who use reactive methods.


  ## Planner Features


  - Pre-formatted daily pages with time blocks

  - Space for intentional planning

  - Reflection prompts

  - Monthly and weekly overview pages

  - Designed for Cal Newport's specific method

  - Physical format encourages deliberate planning


  ## Philosophy


  Moves beyond simple task lists to intentional time allocation, asking not just
  "what" needs to be done but "when" and "for how long."


  ## Pricing


  Physical planner available for purchase, typically $20-30 per planner.
