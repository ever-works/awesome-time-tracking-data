markdown: >-
  ## Overview


  Stephen M. R. Covey is a keynote speaker and advisor on trust, leadership,
  ethics, and high performance. He co-founded CoveyLink and the FranklinCovey
  Global Speed of Trust Practice.


  ## Notable Works


  - **The Speed of Trust: The One Thing That Changes Everything** -
  International best-seller about how trust impacts organizational speed and
  performance


  ## Speed of Trust Framework


  Covey developed the concept that trust has a direct economic impact on
  organizations. When trust goes down, speed goes down, and cost goes up.
  Conversely, when trust increases, speed and cost efficiency improve in tandem.


  ## Four Cores of Credibility


  1. **Integrity** - Living in alignment with values

  2. **Intent** - Operating with mutual benefit

  3. **Capabilities** - Staying relevant and delivering results

  4. **Results** - A track record of performance
