markdown: >-
  ## Overview


  Marc Zao-Sanders is the CEO and co-founder of Filtered, a workplace learning
  platform, and a prominent productivity researcher. He is best known for his
  research and advocacy of timeboxing as a time management technique.


  ## Research Contributions


  Zao-Sanders conducted research that ranked timeboxing as the #1 most useful
  productivity technique among 100 different time management methods. His
  findings have been published in:

  - Harvard Business Review (multiple articles)

  - Academic journals on productivity

  - Business and management publications


  ## Key Arguments for Timeboxing


  He argues that timeboxing works because:

  - The prefrontal cortex filters distractions more aggressively when a clear
  time limit is present

  - Pre-deciding time limits avoids countless micro-decisions, preserving mental
  bandwidth

  - Fixed deadlines create urgency that combats procrastination

  - Time constraints force prioritization of essential work


  ## Published Works


  **Harvard Business Review Articles**:

  - "How Timeboxing Works and Why It Will Make You More Productive" (2018)

  - "Timeboxing: The Productivity Technique That Could Save Your Day" (2022)


  **Book**: "Timeboxing: The Power of Doing One Thing at a Time" (2024)


  ## Professional Background


  - CEO and co-founder of Filtered

  - Background in workplace learning and development

  - Regular speaker on productivity and time management

  - Consultant to organizations on improving team productivity


  ## Impact


  His research has:

  - Brought scientific credibility to timeboxing

  - Influenced how organizations approach time management

  - Popularized timeboxing among knowledge workers

  - Connected neuroscience to practical productivity advice
