markdown: >-
  ## Overview


  Timebox.so is a drag and drop timeboxing scheduler that helps you plan your
  day using the time-block planning method popularized by productivity expert
  Cal Newport. The platform combines multiple productivity tools into a single
  interface to help you structure your workday effectively.


  ## Features


  - **Drag-and-Drop Timeboxing**: Visual scheduler that lets you allocate
  specific time blocks for each task on your calendar

  - **Task Management**: Integrated to-do lists that sync with your timeboxed
  schedule

  - **Progress Tracking**: Monitor your productivity and completion rates over
  time

  - **Notion-Style Notes**: Rich text editing capabilities for capturing
  thoughts and planning

  - **Calendar Integration**: Sync with external calendars to see all your
  commitments in one place

  - **Deep Work Focus**: Designed specifically to support Cal Newport's
  time-blocking methodology from his physical Time-Block Planner


  ## Philosophy


  Timebox.so is built on the principle that timeboxing—assigning specific time
  periods to tasks rather than working from an open-ended to-do
  list—dramatically improves focus and productivity. As Cal Newport states:
  "Time blocking generates a massive amount of productivity. A 40-hour
  time-blocked work week produces the same amount of output as a 60+ hour work
  week without structure."


  ## Use Cases


  - Deep work sessions requiring extended focus

  - Daily planning and task organization

  - Academic work and research

  - Creative projects requiring structured time

  - Professional knowledge work


  ## Pricing


  Visit timebox.so for current pricing information.
