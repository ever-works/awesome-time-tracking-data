markdown: >-
  ## Overview


  "Building a Second Brain" by Tiago Forte is a comprehensive system for
  managing information and knowledge in the digital age. It teaches how to
  create a personal knowledge management system that enhances creativity,
  reduces mental load, and improves productivity.


  ## The CODE Method


  - **Capture** - Save ideas, insights, and information from various sources

  - **Organize** - Structure information using the PARA method (Projects, Areas,
  Resources, Archives)

  - **Distill** - Extract and highlight the most valuable insights

  - **Express** - Use your knowledge to create and share work


  ## Key Principles


  - **Progressive Summarization** - Layer highlights and notes to surface key
  insights

  - **Just-in-Time Project Management** - Retrieve information when needed for
  projects

  - **Slow Burns vs. Heavy Lifts** - Work on ideas incrementally over time

  - **Intermediate Packets** - Break creative work into reusable components

  - **Digital Gardening** - Cultivate knowledge over time


  ## Tools & Implementation


  While tool-agnostic, the system works with Notion, Evernote, Obsidian, Roam
  Research, and other note-taking applications.


  ## Impact on Time Management


  By externalizing knowledge to a second brain, you free up mental bandwidth and
  reduce time spent searching for information, making your work more efficient.


  ## Format


  Available as book, online course, and certification program.
