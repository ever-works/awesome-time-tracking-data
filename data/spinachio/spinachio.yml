markdown: >-
  ## Overview


  Spinach.io is an AI-powered tool that serves as a virtual Scrum master for
  software development teams, powered by GPT-4 with integrations for Zoom,
  Atlassian, and Slack.


  ## Meeting Summaries for Agile Teams


  Unlike basic transcription tools, Spinach meeting summaries are tailored to
  specific agile meeting types:

  - Daily standup / daily scrum

  - Sprint planning

  - Backlog refinement

  - Retrospectives

  - Sprint reviews


  ## Core Functionality


  ### Automatic Meeting Documentation

  - Spinach joins meetings and captures key decisions and action items in
  concise, easy-to-consume format

  - No recordings, transcripts, or play-by-plays

  - Documents all key decisions and action items

  - Sends summaries to Slack, Confluence, Notion, email, or wherever you already
  work


  ### Jira Integration

  - Automatically links to Jira tickets mentioned in meetings

  - Suggests new tickets for undocumented discussions

  - Seamless workflow integration with Atlassian tools

  - Maintains ticket context throughout meetings


  ## AI Agents (2026 Update)


  Spinach's AI Agents are personalized productivity powerhouses:

  - Library of pre-built agents (Product Researcher, Sales Assistant, Project
  Manager)

  - Automates workflows

  - Generates reports

  - Frees users from tedious tasks

  - Customizable to team needs


  ## Platform Integrations


  - Zoom for video meetings

  - Atlassian (Jira, Confluence)

  - Slack for communication

  - Notion for documentation

  - Email for summaries


  ## Pricing (2026)


  - Free tier available

  - Paid plans from $24/month


  ## Key Benefits


  - Saves time on meeting documentation

  - Improves meeting efficiency for agile teams

  - Maintains context between sprints

  - Reduces administrative overhead for Scrum Masters

  - Ensures action items are captured and tracked

  - Provides consistent documentation format


  ## Features


  ### Meeting Types Support

  - Agile ceremonies (standups, planning, retrospectives)

  - General team meetings

  - Product discussions

  - Technical reviews


  ### Output Formats

  - Concise summaries

  - Action item lists

  - Decision documentation

  - Jira ticket references

  - Customizable templates


  ## Use Cases


  - Software development teams using Scrum

  - Agile project management

  - Sprint planning and retrospectives

  - Daily standup documentation

  - Backlog refinement sessions

  - Cross-functional team collaboration

  - Remote and distributed agile teams

  - Scrum Master assistance and support
