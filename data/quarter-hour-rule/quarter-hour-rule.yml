name: Quarter-Hour Rule
description: Commitment to work on avoided task for minimum 15 minutes before
  allowing yourself to quit. Psychological threshold that usually leads to
  continued work due to momentum, while feeling manageable enough to start.
  Reduces procrastination by lowering perceived commitment required.
source_url: https://www.scotthyoung.com/blog/2007/11/05/the-15-minute-rule/
category: Time Management Technique
tags:
  - procrastination
  - starting
  - commitment
  - momentum
markdown: >-
  ## Overview


  Quarter-Hour Rule requires 15-minute minimum effort before allowing yourself
  to stop.


  ## How It Works


  1. Commit to just 15 minutes

  2. Set timer

  3. Work fully for those 15 minutes

  4. After 15 min, can stop guilt-free

  5. Usually continue due to momentum


  ## Why 15 Minutes


  - Long enough to build momentum

  - Short enough to feel manageable

  - Typical time to overcome initial resistance

  - Gets past activation energy hump


  ## Pricing


  Free technique.
