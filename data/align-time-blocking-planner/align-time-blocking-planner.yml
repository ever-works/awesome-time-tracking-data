markdown: >-
  ## Overview


  Align is the ultimate time blocking planner and visual schedule maker designed
  to help professionals and students transform their scattered tasks into a
  clear, actionable timeline. The app combines task management, time blocking,
  and calendar integration into a single, intuitive interface.


  ## Features


  - **Visual Timeline**: See your entire day laid out visually with color-coded
  time blocks

  - **Drag-and-Drop Interface**: Easily move tasks and adjust time blocks with
  intuitive gestures

  - **Task Import**: Pull in tasks from various sources and assign them to
  specific time blocks

  - **Calendar Sync**: Integration with native calendar apps to see all
  commitments

  - **Focus Mode**: Minimize distractions while working on time-blocked tasks

  - **Progress Tracking**: Monitor how well you follow your planned schedule

  - **Template Creation**: Save recurring schedules for repeated use


  ## Philosophy


  Align is built on the time blocking methodology that emphasizes proactive
  scheduling over reactive task management. By assigning specific time periods
  to tasks before the day begins, users can work with greater intention and
  focus.


  ## Benefits


  - Creates structure and clarity in your daily schedule

  - Reduces the anxiety of open-ended to-do lists

  - Helps prioritize important work by allocating time intentionally

  - Improves estimation skills through regular time allocation

  - Enables better work-life boundaries through visible time commitments


  ## Target Audience


  - Knowledge workers seeking structure

  - Students managing multiple responsibilities

  - Professionals practicing deep work

  - Anyone overwhelmed by traditional to-do lists

  - People who benefit from visual planning tools


  ## Platform


  Available on iOS via the App Store.


  ## Pricing


  Free to download. Check the App Store for in-app purchase options.
