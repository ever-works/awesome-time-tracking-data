markdown: >-
  ## Overview


  Boss as a Service works by having "pleasant but hard nosed, living, breathing
  humans who check your proof to make sure your work is really done, chase you
  down and keep you on track."


  ## How It Works


  Users send their todos for the day or with specific deadlines, making sure
  they're quantifiable because they'll have to prove they did them by sending a
  screenshot or some other proof. If you default, the service will follow up
  with you and not stop bugging you till it's resolved.


  Users send their Boss their todo's in the morning over WhatsApp, then text
  pictures and videos throughout the day as proof for completing the tasks, and
  the Boss cheers them on and reminds them about remaining tasks.


  ## Key Features


  - **Human Verification**: Real living, breathing human beings check in on you
  and hold you accountable to achieving your goals.
    
  - **Multiple Platforms**: The service supports email, WhatsApp, and Telegram.


  - **Integration with Beeminder**: If you can't prove to Boss as a Service that
  your task has been successfully done, Beeminder will charge you a financial
  penalty.


  ## Pricing


  Boss As a Service offers two packages: $25/month and $60/3 months.


  ## Target Audience


  The service is particularly useful for self-employed individuals, founders,
  students, and anyone working independently who needs external accountability
  to stay productive.
