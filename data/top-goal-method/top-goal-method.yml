name: Top Goal Method
description: A focused productivity technique that requires preparing a list of
  goals, identifying the single most important goal, and then allocating
  dedicated time every single day to work specifically on that top priority
  goal.
source_url: https://hbr.org/2016/06/how-to-make-achieving-one-goal-a-priority-every-day
category: Time Management Technique
tags:
  - focus
