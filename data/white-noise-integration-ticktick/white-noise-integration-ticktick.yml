markdown: >-
  ## Integration Advantage


  Unlike standalone white noise apps, TickTick integrates ambient sounds
  directly into the productivity workflow:

  - Auto-starts with Pomodoro sessions

  - No app switching needed

  - Consistent focus environment

  - Seamless user experience


  ## Available Sound Options


  TickTick typically offers various ambient sounds:

  - White noise

  - Rain/thunderstorm

  - Ocean waves

  - Forest ambience

  - Coffee shop chatter

  - Fire crackling

  - Flowing water

  - Custom volume controls


  ## Why White Noise Helps Focus


  ### Masking Distractions

  - Covers inconsistent background noises

  - Creates predictable audio environment

  - Reduces startle response to sudden sounds

  - Minimizes attention pulls


  ### Psychological Anchoring

  - Associates sound with focus mode

  - Creates mental trigger for concentration

  - Establishes work ritual

  - Signals brain to enter flow state


  ### Optimal Stimulation

  - Provides enough sensory input to prevent boredom

  - Not so much as to be distracting

  - Maintains consistent arousal level

  - Supports sustained attention


  ## Use Cases


  ### Open Offices

  - Block coworker conversations

  - Mask keyboard clicking

  - Create private focus bubble


  ### Home Workers

  - Cover household sounds

  - Isolate from family noise

  - Establish work mode


  ### Students

  - Library background noise

  - Dorm/roommate sounds

  - Test-taking simulation


  ## Customization


  - Choose preferred sound type

  - Adjust volume levels

  - Set to auto-start with focus sessions

  - Different sounds for different task types
