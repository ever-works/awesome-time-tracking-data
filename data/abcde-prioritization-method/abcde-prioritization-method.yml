markdown: >-
  ## The ABCDE Method


  Developed by Brian Tracy, this method helps you review your work list and
  assign a letter to each task based on its true priority and consequences.


  ## The Five Categories


  **A Tasks**: Must do - serious consequences

  **B Tasks**: Should do - mild consequences  

  **C Tasks**: Nice to do - no consequences

  **D Tasks**: Delegate to someone else

  **E Tasks**: Eliminate altogether


  ## Golden Rule


  Never do a B task when an A task is left undone. The key is discipline to
  start on A-1 and stay with it until complete.


  ## Application


  1. List all tasks

  2. Assign letters A, B, C, D, or E

  3. Number A tasks as A-1, A-2, etc.

  4. Start with A-1 and complete before moving on

  5. Work systematically through priorities


  ## Benefits


  Provides clarity on what truly matters, reduces time wasted on low-priority
  tasks, and ensures high-impact work gets completed first.
