name: Protection Time Blocking
description: Defensive scheduling strategy of blocking calendar time before
  others can claim it. Prevents reactive schedule fragmentation by proactively
  reserving time for priorities. Particularly effective for defending focus
  time, learning, strategic work, and personal commitments from meeting
  requests.
source_url: https://hbr.org/2018/12/how-timeboxing-works-and-why-it-will-make-you-more-productive
category: Time Management Practice
tags:
  - calendar
  - boundaries
  - defensive
  - proactive
markdown: >-
  ## Overview


  Protection Time Blocking reserves calendar space for priorities before
  reactive demands fill it.


  ## Implementation


  1. Block recurring focus time weekly

  2. Schedule before others can

  3. Mark as busy/private if needed

  4. Protect blocks from meeting requests

  5. Move blocks rather than delete them


  ## What to Protect


  - Deep work sessions

  - Learning time

  - Strategic planning

  - Personal commitments

  - Exercise and self-care


  ## Pricing


  Free practice using calendar tools.
