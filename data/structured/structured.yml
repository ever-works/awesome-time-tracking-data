markdown: >-
  ## Overview


  Structured is a beautifully designed daily planner and time blocking app built
  specifically for the Apple ecosystem. It emphasizes aesthetic day-by-day
  planning with a focus on visual appeal and user experience.


  ## Features


  - **Visual Time Blocking** - Drag tasks onto a visual timeline to plan your
  day

  - **Daily Planning** - Focus on planning one day at a time

  - **Beautiful Design** - Elegant, minimalist interface optimized for iOS

  - **Task Scheduling** - Schedule tasks with specific start times and durations

  - **Recurring Tasks** - Set up daily, weekly, or custom recurring tasks

  - **Notifications** - Get reminded when it's time to start tasks

  - **Widgets** - iOS home screen widgets to see your day at a glance

  - **iCloud Sync** - Sync across iPhone, iPad, Apple Watch, and Mac

  - **Dark Mode** - Support for system-wide dark mode

  - **Quick Add** - Rapidly add tasks with natural language input

  - **Time Estimates** - Set duration estimates for each task

  - **Completion Tracking** - Mark tasks complete throughout the day


  ## Design Philosophy


  Structured prioritizes aesthetics and simplicity, making daily planning feel
  pleasant rather than overwhelming. The visual approach helps users see their
  day holistically.


  ## Platform


  iOS, iPadOS, macOS, watchOS - exclusive to Apple ecosystem


  ## Target Users


  - Apple users who value design

  - Visual thinkers and planners

  - People who prefer day-by-day planning

  - Anyone seeking aesthetic productivity tools


  ## Pricing


  Free with in-app purchase for premium features.
