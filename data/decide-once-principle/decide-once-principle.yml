markdown: >-
  ## Overview


  The "Decide Once" principle is one of the core Lazy Genius principles created
  by Kendra Adachi. It helps sidestep decision fatigue by clearly choosing what
  you'll do in a given situation—just one time.


  ## Core Concept


  Identify areas where we're constantly using up brain power reinventing the
  wheel, deciding over and over again—then choose to simply decide once and
  stick with it.


  ## Connection to Time Management


  By pre-deciding routine matters, you preserve mental energy and time for
  decisions that truly matter. The trickle-down effect of deciding once is
  significant—making these small decisions (once) will save you so much time and
  headache in the future.


  ## Practical Examples


  - Wearing the same outfit style on specific days

  - Having a standard gift for teacher appreciation

  - Pre-planning weekly meals on rotation

  - Establishing consistent morning routines

  - Setting default times for specific types of activities


  ## Philosophy


  The Lazy Genius approach is: "be a genius about the things that matter and
  lazy about the things that don't…to you." This principle works together with
  other concepts to create sustainable routines that reduce mental load and
  focus energy on what truly matters.


  ## Pricing


  Free principle available through books, podcasts, and blog content by Kendra
  Adachi.
