markdown: >-
  ## Overview


  MyCase is a legal practice management solution that includes robust time
  tracking and billing capabilities. The platform is notable for its Smart Time
  Finder feature that helps attorneys recover lost billable hours.


  ## Smart Time Finder


  MyCase's proprietary tool that analyzes activities and suggests time entries
  attorneys may have forgotten to record. In 2023:

  - Customers captured additional 579,665 hours

  - Average value per lawyer: approximately $22,425

  - Automated recovery of billable work


  ## Key Features


  ### Time Tracking

  - One-click timers from case screens

  - Mobile time capture

  - Batch time entry

  - Smart suggestions for missed time

  - Calendar integration


  ### Billing Integration

  - Time entries sync directly to invoices

  - Customizable rate tables

  - Multiple billing methods (hourly, flat fee, contingency)

  - Online payment processing

  - Client payment portals


  ### Practice Management Integration

  - Calendaring

  - Document management

  - Client communication

  - Task management

  - Case tracking

  - Lead management


  ## Target Audience


  Law firms of all sizes seeking comprehensive practice management with strong
  time tracking capabilities.


  ## Unique Advantage


  Smart Time Finder helps recover billable hours that would otherwise be lost,
  directly impacting firm revenue.


  ## Pricing


  Per-user monthly subscription. Contact MyCase for current pricing tiers and
  features.
