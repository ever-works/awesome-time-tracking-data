markdown: >-
  ## Overview


  Focus@Will is a music service based on human neuroscience that helps you
  focus, reduce distractions, maintain your productivity and retain information
  when working, studying, writing and reading.


  ## How It Works


  Many of the channels in Focus@Will use Brainwave Entrainment, which means they
  are specially designed to adapt your brainwaves to the activity you are doing.
  The system manages the ratio between your endogenous attention (the task you
  are focusing on) and your exogenous attention (your reptile brain looking for
  potentially dangerous fight or flight external stimuli).


  Focus@will claims it boosts productivity by playing music that's been
  rigorously engineered to soothe a part of your brain known as the limbic
  system, which is believed to be responsible for emotion and motivation.


  ## Key Features


  - Individualized music-for-work solution based on connection to the biggest
  brain database in the world

  - Every audio mix is different for every user

  - Music exclusive to the platform

  - Combines the science behind how music interacts with the brain with a
  Pomodoro-style timer


  ## Effectiveness


  According to Focus@will's research, the most active users have a 200-400
  percent increase in focus time.


  ## Pricing


  - Monthly: $7.49/month

  - Annual: $52.49/year
