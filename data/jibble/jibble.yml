markdown: >-
  ## Overview


  Jibble is a comprehensive time tracking and attendance software that is FREE
  forever for unlimited users, making it an attractive option for businesses of
  all sizes. Recognized by Forbes as the Best Time Clock Software of 2025.


  ## Key Features


  ### Time Tracking & Attendance

  - Track employee attendance in real time with GPS tracking, face recognition,
  kiosk mode & timesheets

  - Works whether your team works at a desk, on the road, or across multiple
  locations

  - Multiple clock-in methods: mobile app, web browser, desktop app, and kiosk
  mode


  ### Multiple Access Methods

  - **Mobile App**: iOS and Android apps for on-the-go tracking

  - **Web Browser**: Access from any device with internet

  - **Desktop App**: Native desktop applications

  - **Kiosk Mode**: Turns a tablet into a high-speed attendance terminal


  ### Advanced Security Features

  - **Biometric Attendance**: AI-powered facial recognition ensures the right
  person is clocking in

  - **GPS Tracking**: Enforces location-based attendance

  - **Geofencing**: Create virtual boundaries for clock-in/out locations

  - **Offline Functionality**: Tracks attendance without internet connection,
  syncing data once back online


  ## Reporting & Payroll


  - Generate comprehensive reports for payroll, attendance and compliance

  - Automated timesheets transform raw attendance data into audit-ready payroll
  reports

  - Calculates regular hours and overtime automatically

  - One-click export to payroll systems


  ## Recognition


  - Forbes Best Time Clock Software of 2025

  - Highest-rated employee time tracker on Capterra and G2

  - Trusted by businesses worldwide


  ## Integrations


  Integrates with Slack and other popular workplace tools.


  ## Pricing


  FREE forever for unlimited users with core time tracking features. Premium
  features available in paid plans for advanced reporting, GPS tracking, and
  integrations.
