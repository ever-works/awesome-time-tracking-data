markdown: >-
  ## Overview


  Calendar sync automatically creates time entries from calendar events,
  capturing meetings, appointments, and scheduled work without manual input.
  This automation is identified as one of three critical habits for accurate
  time tracking alongside same-day logging and MECE structure.


  ## How It Works


  ### Integration

  - Connects to Google Calendar, Outlook, or other calendar systems

  - Monitors scheduled events in real-time

  - Identifies work-related vs personal events

  - Creates corresponding time entries automatically


  ### Smart Categorization

  - Uses event details to suggest categories

  - Associates meetings with projects based on attendees

  - Distinguishes billable vs non-billable based on rules

  - Learns from user corrections


  ### Review and Approval

  - Synced entries require user confirmation

  - Bulk approve accurate entries

  - Edit or reject incorrect ones

  - Add missing details (task, notes)


  ## Benefits


  ### Accuracy Improvements

  - Captures all scheduled time automatically

  - Eliminates forgotten meetings

  - Accurate start/end times from calendar

  - Reduces retrospective memory errors


  ### Time Savings

  - Reduces manual entry burden by 30-50%

  - Bulk approval faster than individual entries

  - No need to remember and log every meeting

  - Contributes to sub-2-minute daily time entry


  ### Completeness

  - Ensures all calendar time is accounted for

  - Reveals how much time spent in meetings

  - Identifies scheduling patterns

  - Prevents billable time leakage


  ## Implementation Best Practices


  ### Configuration

  - Define which calendars to sync (work vs personal)

  - Set rules for automatic categorization

  - Specify billable vs non-billable defaults

  - Configure review workflow


  ### User Training

  - Explain how sync works

  - Demonstrate review and approval process

  - Show how to correct miscategorized entries

  - Establish expectations for daily review


  ### Ongoing Management

  - Monitor sync accuracy

  - Refine categorization rules based on patterns

  - Address common miscategorizations

  - Celebrate time savings achieved


  ## Common Use Cases


  ### Client Meetings

  - All client calls automatically logged

  - Associated with correct client/project

  - Marked as billable by default

  - Reduces unbilled meeting time


  ### Internal Meetings

  - Project meetings captured and categorized

  - Distinguish project vs administrative meetings

  - Track meeting overhead

  - Identify meeting-heavy days


  ### Scheduled Work Blocks

  - Focus time blocks logged automatically

  - Project work sessions captured

  - Deep work time tracked

  - Work patterns visible


  ## Limitations


  - Only captures scheduled events (not ad-hoc work)

  - Requires well-maintained calendar

  - May need manual editing for accuracy

  - Works best combined with manual entry for non-scheduled work


  ## Integration with Other Tools


  Most modern time tracking platforms offer calendar sync:

  - Harvest, Toggl Track, Clockify

  - Timely, Everhour, TrackingTime

  - Scoro, Teamwork, Monday.com


  ## Success Factors


  - Consistent calendar usage (schedule blocks for focused work)

  - Clear event naming conventions

  - Regular review of synced entries (daily)

  - Refinement of auto-categorization rules

  - Balance between automation and manual control
