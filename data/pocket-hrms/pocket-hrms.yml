markdown: >-
  ## Overview


  Pocket HRMS is a comprehensive cloud HR software solution designed with
  simplicity and accessibility in mind. Despite the name suggesting
  mobile-first, it's a full-featured HRMS accessible via web and mobile, serving
  primarily Indian SMBs.


  ## Time & Attendance


  ### Attendance Tracking

  - Biometric integration (30+ device models)

  - Mobile app attendance with location

  - Web punch in/out

  - Geo-fencing for attendance validation

  - Real-time attendance dashboard

  - Attendance muster reports


  ### Shift Management

  - Multiple shift definitions

  - Flexible roster creation

  - Shift allowance automation

  - Night shift differentials

  - Week-off configuration


  ### Regularization

  - Attendance correction requests

  - Manager approval workflows

  - Bulk regularization options

  - Audit trail maintenance


  ## Leave Management


  - Custom leave types

  - Automated accrual

  - Sandwich leave handling

  - Half-day leave support

  - Leave without pay tracking

  - Comp-off management

  - Leave reports and analytics


  ## Payroll Processing


  ### Salary Calculation

  - Flexible salary components

  - Automated calculations

  - Arrears and recovery

  - Loan/advance deductions

  - Bonus processing

  - Variable pay handling


  ### Compliance

  - PF (Provident Fund) automation

  - ESI calculations

  - Professional Tax (all states)

  - TDS computation

  - Form 16 generation

  - Statutory reports


  ### Disbursement

  - Bank file generation (NEFT/RTGS)

  - Cash payment support

  - Payslip generation and distribution

  - Salary register


  ## Recruitment


  - Job posting management

  - Candidate tracking

  - Interview scheduling

  - Offer letter generation

  - Document collection

  - Onboarding checklists


  ## Performance Management


  - Appraisal workflow configuration

  - Self-appraisal forms

  - Manager ratings

  - Normalization process

  - Increment recommendations

  - Performance reports


  ## Training Management


  - Training calendar

  - Nomination process

  - Budget tracking

  - Feedback collection

  - Certificate management


  ## Employee Self-Service


  - Mobile app (ESS)

  - Leave applications

  - Attendance regularization

  - Payslip access

  - Investment declarations

  - Reimbursement claims

  - Profile management


  ## Manager Self-Service


  - Team attendance view

  - Approval workflows

  - Team reports

  - Leave calendar

  - Performance reviews


  ## Asset Management


  - Asset allocation tracking

  - Return management

  - Asset history

  - Maintenance scheduling


  ## Key Features


  ### User-Friendly Design

  - Intuitive interface for non-technical users

  - Minimal training required

  - Helpful tooltips and guides

  - Clean, modern UI


  ### Compliance Focus

  - Updated for latest Indian laws

  - Statutory reports ready

  - Audit-ready documentation

  - Secure data handling


  ### Customization

  - Configurable workflows

  - Custom fields

  - Flexible approval hierarchies

  - Branded employee portal


  ## Integration Options


  - Biometric devices

  - Bank systems

  - Email systems

  - SMS gateways

  - Third-party apps (limited)


  ## Target Market


  - Indian SMBs (20-500 employees)

  - Manufacturing

  - IT services

  - Retail

  - Healthcare

  - Education sector


  ## Implementation


  - Quick setup (1-2 weeks)

  - Data migration assistance

  - User training included

  - Ongoing support


  ## Pricing


  Affordable tiered pricing:

  - Starter: ₹1,500-2,500/month (up to 50 employees)

  - Growth: ₹3,000-5,000/month (up to 100 employees)

  - Enterprise: Custom pricing

  - Annual discounts available


  ## Platform


  Cloud-based (SaaS)

  Web browser access

  Mobile apps (iOS and Android)
