markdown: >
  # Teamwork.com


  ## Overview

  Teamwork.com is an all-in-one platform for time tracking, project management,
  and team collaboration, suitable for businesses managing client work and
  internal projects.


  ## Features

  - **Resource and workload management**: View team availability, assign tasks
  without overloading, and adjust workloads as needed.

  - **Time tracker**: Start/stop timers or manually add time entries; generate
  time tracking reports showing billable and non-billable hours.

  - **Multiple project views**: Switch between list views, Kanban boards, Gantt
  charts, and more to suit different working styles.

  - **Client collaboration**: Share project updates, files, and comments with
  clients; use Proofs for feedback on images and PDFs.

  - **Customizable templates**: Create task templates for repeatable projects to
  save time and maintain consistency.

  - **Integrations**: Connect with Slack, Google Drive, Microsoft Teams,
  Outlook, QuickBooks, Xero, HubSpot, Salesforce, and other popular tools.


  ## Pricing

  - **Basics**: $9.99 per user per month

  - **Accelerate**: $24.99 per user per month

  - **Optimize**: Custom pricing (contact for demo)

  - **Enterprise**: Custom pricing (contact for demo)


  *Free trial available.*
