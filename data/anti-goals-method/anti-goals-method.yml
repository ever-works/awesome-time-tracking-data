markdown: >-
  ## Overview


  Anti-goals flip traditional goal-setting on its head by focusing on what you
  want to avoid rather than what you aim to achieve. Instead of asking "What do
  I want to accomplish?" you ask "What situations do I want to prevent?" This
  approach, rooted in the mental model of inversion, helps you maintain focus
  and protect your wellbeing.


  ## Origin


  The anti-goals methodology was popularized by Andrew Wilkinson, Co-Founder of
  Tiny, who was unhappy with work interfering with the life he wanted. Rather
  than set traditional positive goals, Wilkinson imagined his worst possible day
  and worked backwards to set anti-goals—rules for avoiding this worst-case
  scenario.


  ## Core Philosophy


  Anti-goals operate on the principle that avoiding specific negative outcomes
  can be more effective than pursuing positive ones. They leverage inversion
  thinking: instead of considering what you want, consider what you don't want,
  then take steps to avoid it.


  ## Key Benefits


  ### Burnout Prevention

  By establishing firm boundaries around work hours, types of engagements, and
  energy expenditure, anti-goals help maintain mental and emotional reserves,
  ensuring that your work enriches rather than exhausts you.


  ### Increased Focus

  Anti-goals serve as a lighthouse, guiding you away from distractions and
  towards true priorities. They help you dedicate time and resources to what
  genuinely matters by clearly defining what doesn't matter.


  ### Reduced Decision Fatigue

  From a neuroscience perspective, anti-goals reduce cognitive load by
  minimizing decision fatigue. Your brain doesn't have to constantly evaluate
  whether an activity aligns with your values—the anti-goal provides a clear
  filtering mechanism.


  ### Proactive Boundary Setting

  Anti-goals establish protective boundaries before problems arise, rather than
  reacting to issues after they've already impacted your life or work.


  ## How to Create Anti-Goals


  ### Step 1: Visualize Your Worst Day

  Imagine the most draining, frustrating, or unfulfilling day possible. Be
  specific:

  - What activities fill your calendar?

  - Who are you interacting with?

  - How do you feel physically and emotionally?

  - What aspects make the day particularly awful?


  ### Step 2: Identify Patterns

  Look for common themes in your worst-day scenario:

  - Too many meetings?

  - Constant interruptions?

  - Working with difficult people?

  - Tasks that drain your energy?

  - Misaligned with your values?


  ### Step 3: Convert to Anti-Goals

  Transform each negative element into a clear anti-goal statement. Use
  actionable language:


  **Example Anti-Goals:**

  - "Never schedule an in-person meeting when it can be accomplished via email
  or phone"

  - "Never accept projects that require more than X hours per week"

  - "Never work with clients who..."

  - "Never respond to non-urgent emails outside of designated times"

  - "Never commit to events that conflict with family time"


  ### Step 4: Implement Systems

  Create systems and policies that enforce your anti-goals:

  - Calendar blocking for protected time

  - Email auto-responders setting expectations

  - Project intake forms with pre-qualifying questions

  - Templates for politely declining requests


  ### Step 5: Review and Refine

  Regularly assess whether your anti-goals are serving you:

  - Are you avoiding the situations you defined?

  - Do your anti-goals need adjustment?

  - Have new anti-goals emerged from experience?


  ## Practical Examples


  ### Professional Anti-Goals

  - Never take meetings before 10am (protect morning deep work time)

  - Never work on weekends (maintain work-life boundaries)

  - Never accept projects with unclear scope (prevent scope creep)

  - Never respond to messages instantly (reduce reactive behavior)

  - Never collaborate with people who disrespect boundaries


  ### Personal Anti-Goals

  - Never check social media before breakfast (protect mental clarity)

  - Never commit to social events that feel obligatory (preserve energy)

  - Never sacrifice sleep for productivity (maintain health)

  - Never skip exercise for work (prioritize wellbeing)


  ## Anti-Goals vs. Not-To-Do Lists


  **Anti-Goals:**

  - High-level, strategic objectives

  - Define what you want to avoid in life or business

  - Long-term boundaries and principles

  - Focus on maintaining wellbeing and focus


  **Not-To-Do Lists:**

  - Detailed, tactical inventory

  - Specific tasks and behaviors to eliminate

  - Day-to-day action items

  - Focus on productivity and efficiency


  Anti-goals are the "why" behind not-to-do lists—they provide strategic
  direction, while not-to-do lists handle tactical implementation.


  ## Relationship to Other Concepts


  ### Inversion (Charlie Munger)

  Anti-goals apply the mental model of inversion: instead of asking "How can I
  succeed?" ask "What would guarantee failure?" then avoid those paths.


  ### Essentialism (Greg McKeown)

  Anti-goals support essentialist thinking by helping you say "no" to
  non-essential commitments, protecting space for what truly matters.


  ### Via Negativa (Nassim Taleb)

  The philosophy of achieving improvement through subtraction rather than
  addition. Anti-goals embody via negativa by defining success through what to
  avoid.


  ## Common Mistakes


  ### Too Vague

  "Don't waste time" is not an anti-goal—it lacks specificity. Better: "Never
  spend more than 30 minutes on email in the morning before deep work."


  ### Too Restrictive

  Anti-goals should protect your priorities, not create rigid rules that prevent
  flexibility when it makes sense.


  ### Not Enforcement

  Anti-goals without systems to support them become meaningless. You need
  calendar blocks, scripts for declining requests, and accountability.


  ### Forgetting to Review

  Anti-goals that worked six months ago may no longer serve you. Regular review
  ensures they evolve with your circumstances.


  ## Implementation Tips


  **Start Small:**

  Begin with 2-3 anti-goals that address your most pressing pain points. You can
  always add more later.


  **Make Them Visible:**

  Write anti-goals where you'll see them regularly—on your desk, in your digital
  workspace, or as calendar reminders.


  **Communicate Them:**

  Share relevant anti-goals with colleagues, clients, and collaborators so they
  understand your boundaries.


  **Track Violations:**

  When you violate an anti-goal, note why it happened. This data helps refine
  your anti-goals and supporting systems.


  **Celebrate Adherence:**

  Recognize when you successfully honor an anti-goal. This positive
  reinforcement strengthens the behavior.


  ## Why Anti-Goals Work


  Research in behavioral economics and psychology suggests that loss
  aversion—the tendency to prefer avoiding losses over acquiring equivalent
  gains—makes anti-goals psychologically powerful. We're more motivated to avoid
  negative outcomes than to pursue positive ones, making anti-goals particularly
  effective for maintaining boundaries and focus.


  By clearly defining what you don't want, you create cognitive shortcuts that
  simplify decision-making and protect your energy for what truly matters.
