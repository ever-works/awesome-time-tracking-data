markdown: >-
  ## Overview


  The POSEC Method is a time management technique created and defined by Steven
  Lam. POSEC stands for: Prioritize, Organize, Streamline, Economize, and
  Contribute. The method is based on Maslow's Hierarchy of Needs theory, first
  proposed by American psychologist Abraham Maslow.


  ## The Five Steps


  ### 1. Prioritize

  Figure out and prioritize what is truly important to you, from work-related
  tasks to life goals and long-term plans. Determine what matters most
  specifically.


  ### 2. Organize

  Organize your tasks into categories and make a plan on how to tackle them
  head-on. Create structure around your priorities.


  ### 3. Streamline

  Streamline work or life-related tasks, daily chores, and everything you do not
  enjoy doing but must do anyway. Find ways to handle obligations efficiently
  with minimal friction.


  ### 4. Economize

  Economize on what you enjoy doing, like hobbies or hanging out with friends.
  Allocate deliberate time for personal enjoyment without letting it consume all
  your available time.


  ### 5. Contribute

  Contribute to your society, socialize, and try to make a positive difference.
  This represents the highest level of engagement beyond personal needs.


  ## Underlying Philosophy


  This method maps to Maslow's Hierarchy of Needs, ensuring that foundational
  needs (priorities and organization) are addressed before higher-level needs
  (economizing enjoyment and contributing to society). The goal is to improve
  work management skills by following these five structured steps.


  ## Use Cases


  - Comprehensive life planning that goes beyond work-only productivity

  - Balancing professional obligations with personal fulfillment

  - Creating holistic daily and weekly schedules

  - Aligning time management with personal values and long-term fulfillment
