markdown: >-
  ## Overview


  Session is a pomodoro focus timer that blocks distracting apps and websites
  you choose while on focus, helping you stay focused and mindful by blocking
  distractions and tracking your progress.


  ## How It Works


  Session helps you be more productive by:


  - **Guided Work Sessions**: Working in 25-minute focused sessions (inspired by
  the Pomodoro technique)

  - **Distraction Blocking**: Blocking apps and websites that distract you

  - **Time Tracking**: Recording how much time you spend on focused work

  - **Rest Reminders**: Reminding you to take breaks and rest


  ## Key Features


  ### Website & App Blocking


  - Choose which websites and apps to block during focus sessions

  - Works across Safari, Chrome, Brave, and Microsoft Edge

  - Active blocking prevents access to time-wasting sites

  - Customizable block lists for different work types


  ### Focus Sessions


  - Default 25-minute Pomodoro sessions

  - Start momentum with structured work blocks

  - Visual timer to track remaining session time

  - Audio notifications when sessions end


  ### Progress Tracking


  - Track total focused time

  - Monitor session completion rates

  - Visualize productivity patterns

  - Analytics on focus habits


  ## Global User Base


  Session is trusted daily by tens of thousands of users including:


  - Engineers in Silicon Valley

  - Independent studios in Madrid

  - Writers in Netherlands

  - Creative workers and freelancers worldwide


  ## Platform Availability


  - **Desktop**: Mac, Windows, Linux

  - **Mobile**: iOS and Android apps

  - **Browser Extensions**: Chrome, Safari, Brave, Microsoft Edge


  ## Benefits


  - Overcome procrastination

  - Manage distractions effectively

  - Build focus habits

  - Increase deep work time

  - Improve work-life balance


  ## Use Cases


  - Software development

  - Creative work

  - Writing and content creation

  - Studying and research

  - Any task requiring deep focus


  ## Pricing


  Visit stayinsession.com for current pricing information.
