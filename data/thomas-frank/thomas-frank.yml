  ## Overview


  Thomas Frank is a YouTuber, author, and the creator and main writer at College
  Info Geek, a platform dedicated to helping students build a remarkable college
  career and life beyond.


  ## College Info Geek


  College Info Geek (collegeinfogeek.com) is a comprehensive resource focused
  on:

  - Study techniques and strategies

  - Time management for students

  - Productivity systems and tools

  - Career development

  - Personal development and habit building


  ## Content


  - YouTube channel with educational content on productivity and student success

  - Articles and guides on time management, studying, and personal growth

  - Book on building better study habits and productivity systems

  - Tools and software recommendations for students


  ## Focus Areas


  - Note-taking strategies

  - Study optimization techniques

  - Productivity apps and tools

  - Habit formation for academic success

  - Time blocking and scheduling for students
