markdown: |-
  ## The 2026 Shift

  Energy management rather than time management:
  - Recognize circadian rhythms
  - Schedule deep work when alert
  - Respect energy valleys

  ## Why Energy Matters
  Same hours, different capacity based on energy levels.

  ## Energy Patterns
  - Morning peak (9-11am)
  - Post-lunch dip (1-3pm)
  - Secondary peak (3-5pm)

  ## Application
  - Deep work → High energy
  - Meetings → Medium energy
  - Admin → Low energy

  ## Research
  Circadian rhythms and ultradian cycles regulate alertness.

  ## Pricing
  Not applicable - philosophical approach.
