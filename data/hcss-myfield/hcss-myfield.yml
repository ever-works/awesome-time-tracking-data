markdown: >-
  ## Overview


  HCSS myField is construction time tracking software designed for heavy civil
  construction projects, enabling workers to submit hours along with detailed
  work information.


  ## Features


  - **Detailed Time Capture** - Submit hours with breaks taken, supervisor,
  equipment used, cost codes, and detailed notes

  - **Equipment Tracking** - Track equipment usage alongside worker time

  - **Cost Code Management** - Assign time to specific cost codes for accurate
  job costing

  - **Supervisor Workflows** - Track supervisor assignments and approvals

  - **Mobile Data Collection** - Collect field data on mobile devices without
  internet connectivity

  - **Heavy Civil Focus** - Designed specifically for heavy civil construction
  projects


  ## Use Cases


  Built for heavy civil construction companies, infrastructure contractors, and
  large-scale construction projects requiring detailed time and equipment
  tracking.


  ## Pricing


  Contact HCSS for enterprise pricing based on project size and user count.
