markdown: >-
  ## Overview


  Clockwise is an AI-powered calendar assistant designed to optimize time for
  teams and organizations. It continuously analyzes and rearranges calendars to
  reduce meeting conflicts, create more focus time, and improve overall schedule
  efficiency.


  ## Core Features


  - Automatic calendar optimization testing millions of arrangements daily

  - Focus time creation and protection across teams

  - Intelligent meeting scheduling that respects focus blocks

  - Team calendar synchronization and coordination

  - Meeting analytics and insights

  - Flexible meeting rescheduling

  - Personal calendar integration

  - Smart break scheduling

  - Meeting cost calculator

  - Slack integration for status updates


  ## AI Optimization


  - Tests millions of calendar configurations daily

  - Continuously adapts schedules as priorities change

  - Identifies and creates focus time blocks automatically

  - Moves flexible meetings to optimize for deep work

  - Balances individual and team scheduling needs

  - Learns team preferences and working patterns


  ## Focus Time Features


  - Automatic focus time block creation

  - Protection of deep work sessions from meeting conflicts

  - Team-wide focus time coordination

  - Analytics on focus time utilization

  - Integration with do-not-disturb settings


  ## Team Capabilities


  - Organization-wide calendar optimization

  - Team working hours synchronization

  - Meeting policy enforcement

  - Scheduling links with intelligent availability

  - Team focus time reports

  - Meeting efficiency metrics


  ## Integration


  - Google Calendar (primary)

  - Microsoft Outlook/Office 365

  - Slack for status and notifications

  - Zoom, Google Meet for video conferencing

  - Asana, Linear for task management


  ## Analytics and Insights


  - Focus time trends and reports

  - Meeting load analysis

  - Calendar efficiency metrics

  - Team productivity insights

  - Meeting cost calculations


  ## Pricing


  - Free plan with basic features

  - Teams plan for organizations

  - Enterprise plan with advanced features


  Visit Clockwise website for current pricing details.
