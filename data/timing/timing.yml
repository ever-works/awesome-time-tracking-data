markdown: >-
  ## Overview


  Timing is an automatic time tracking app designed exclusively for Mac that
  tracks everything you do on your computer without requiring manual timers or
  start/stop buttons.


  ## Features


  - **Automatic Tracking** - Automatically records which apps and documents you
  use

  - **No Manual Timers** - Never forget to start or stop a timer again

  - **Productivity Insights** - Analyze your productivity patterns and time
  allocation

  - **Timeline View** - Visual timeline showing your entire day's activities

  - **Project Categorization** - Automatically or manually categorize activities
  into projects

  - **Offline Support** - Works completely offline with no cloud dependency

  - **Privacy-Focused** - All data stored locally on your Mac

  - **Reporting** - Export detailed reports for billing and analysis

  - **Mac Native** - Built specifically for macOS with native performance


  ## Use Cases


  Perfect for Mac-using freelancers, consultants, developers, and professionals
  who bill by the hour and want automatic time tracking.


  ## Pricing


  - **14-day free trial**

  - **Subscription** - $10/month or $79/year

  - **One-time purchase** - Available for long-term users
