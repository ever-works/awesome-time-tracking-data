markdown: >-
  ## Overview


  Jibble is a completely free time tracking and attendance solution with
  unlimited users. It combines AI-powered facial recognition with geofencing and
  GPS tracking to prevent buddy punching and verify employee locations, making
  it particularly valuable for teams with field workers or distributed
  workforces.


  ## Key Features


  - **100% free** - Unlimited users, unlimited time tracking, forever

  - **AI facial recognition** - Confirms both who is clocking in and their
  identity

  - **Geofencing** - Verifies employee locations at clock-in/out

  - **GPS tracking** - Location verification for field workers

  - **Mobile time clock** - Track time from smartphones

  - **Kiosk mode** - Shared device for team clock-in/out

  - **Timesheet management** - Automatic timesheet generation

  - **Activity tracking** - Monitor worked hours and attendance

  - **Project time tracking** - Assign time to projects and clients

  - **Overtime tracking** - Automatic overtime calculation


  ## Anti-Time Theft Features


  Jibble prevents common time theft issues:

  - **Buddy punching prevention** - AI facial recognition ensures the right
  person is clocking in

  - **Location verification** - Geofencing confirms employees are at designated
  work sites

  - **Photo capture** - Visual record of clock-in events

  - **GPS validation** - Real-time location data with timestamps


  ## AI-Powered Technology


  - Facial recognition technology verifies employee identity

  - Machine learning improves accuracy over time

  - Biometric authentication without expensive hardware

  - Works through standard smartphone cameras


  ## Attendance Management


  - Real-time attendance dashboard

  - Late/early clock-in tracking

  - Absence management

  - Leave request and approval

  - Attendance reports and analytics

  - PTO tracking


  ## Reporting


  - Timesheet exports for payroll

  - Attendance summaries

  - Project time reports

  - Location-based reports

  - Custom report filtering


  ## Integrations


  Jibble integrates with:

  - Payroll systems

  - Project management tools

  - Accounting software

  - Calendar applications


  ## Use Cases


  - Remote teams needing attendance verification

  - Field service businesses with mobile workers

  - Retail and hospitality with shift workers

  - Construction companies with multiple job sites

  - Any business wanting to prevent time theft

  - Organizations needing free unlimited time tracking


  ## Platform Support


  - Web browser access

  - iOS mobile app

  - Android mobile app

  - Kiosk mode for shared devices

  - API for custom integrations


  ## Why Free?


  Jibble offers its core platform completely free with the goal of making time
  tracking accessible to all businesses, monetizing through premium add-ons and
  services rather than per-user fees.


  ## Pricing


  **Free Forever**: Unlimited users, unlimited time tracking, AI facial
  recognition, geofencing, GPS tracking, timesheets, attendance tracking, and
  mobile apps.


  Optional premium features may be available for advanced needs.


  ## Best For


  - Businesses wanting to eliminate per-user costs

  - Teams with distributed or field-based workers

  - Organizations concerned about time theft and buddy punching

  - Companies needing biometric verification without hardware investment

  - Growing teams that don't want to worry about user limits


  Jibble stands out by offering enterprise-grade features like AI facial
  recognition and geofencing completely free with unlimited users, making
  sophisticated time tracking accessible to businesses of all sizes.
