markdown: >-
  ## Overview


  Thruday is a visual daily planner app founded by Andy Cresswell, built from
  lived experience of ADHD, Autism and Epilepsy and backed by science-based
  research. The app is designed to reduce friction and make planning actually
  stick for neurodivergent individuals.


  ## Features


  - Visual daily planning interface

  - ADHD-specific design considerations

  - Autism-friendly features

  - Science-based research foundation

  - Reduced cognitive load for executive functioning challenges

  - Planning tools that accommodate neurodivergent thinking patterns


  ## Design Philosophy


  Built by and for neurodivergent people from the start, Thruday incorporates
  tools rooted in executive functioning research. The app recognizes that
  traditional planning tools often create barriers for neurodivergent
  individuals and aims to remove those obstacles through thoughtful, accessible
  design.


  ## Target Users


  Ideal for individuals with ADHD, Autism, Epilepsy, and other neurodivergent
  conditions who struggle with traditional planning tools and need a more
  accessible, friction-free approach to daily organization and time management.
