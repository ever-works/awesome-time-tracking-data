markdown: >-
  ## Overview


  Geofencing creates virtual boundaries around work locations, automatically
  triggering time clock events when employees enter or exit these zones with
  their mobile devices, eliminating manual clock in/out while verifying on-site
  presence.


  ## How Geofencing Works


  ### Setup

  1. Define geographic boundaries around job sites

  2. Set radius (typically 100-500 feet)

  3. Configure auto-clock rules

  4. Enable location permissions on mobile devices


  ### Automatic Actions

  - **Enter geofence**: Auto clock-in

  - **Exit geofence**: Auto clock-out

  - **Inside boundary**: Continuous verification

  - **Outside boundary**: Alert if working remotely


  ## Benefits


  ### For Employees

  - No forgotten clock ins/outs

  - Automatic accurate time capture

  - No manual app interaction needed

  - Hands-free operation


  ### For Employers

  - Verified on-site presence

  - Prevented buddy punching

  - Accurate job site time allocation

  - Reduced time theft

  - Automated compliance


  ## Use Cases


  ### Construction

  - Multiple job sites daily

  - Worker location verification

  - Site-specific time allocation

  - Equipment location tracking


  ### Field Service

  - Technician site visits

  - Service call duration tracking

  - Travel time vs on-site time

  - Customer location verification


  ### Healthcare

  - Home health visits

  - Multiple facility workers

  - Patient location verification

  - Mileage tracking


  ## Privacy Considerations


  - Location tracked only during work hours

  - Employees must consent

  - Clear policy communication

  - Ability to manually clock if preferred

  - No continuous tracking outside work


  ## Leading Geofencing Tools (2026)


  - Timeero (specialized in geofencing)

  - ClockShark, Workyard

  - Connecteam, Hubstaff

  - QuickBooks Time


  ## Accuracy Improvements


  5 MPH motion detection threshold prevents false triggers from nearby movement,
  ensuring clock events occur only when workers actually arrive at or leave
  sites.


  ## ROI


  Geofencing time tracking prevents 16-20% of potential buddy punching incidents
  and recovers average 4.5 hours/week per employee in accurate time capture.
