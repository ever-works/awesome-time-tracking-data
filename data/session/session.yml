markdown: >-
  ## Overview


  Session is a beautifully designed Pomodoro app for Mac and iOS with powerful
  distraction blocking features, specifically beneficial for users with ADHD.


  ## Features


  - Beautiful, Apple-centric design

  - Pomodoro timer with customizable intervals

  - Distraction blocking (websites and apps)

  - iOS companion app

  - Focus statistics and insights

  - Task integration

  - Calendar blocking

  - Ambient sounds

  - Goal tracking


  ## Pricing


  Subscription-based pricing with free trial available. Offers both monthly and
  annual plans.
