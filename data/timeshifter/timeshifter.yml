markdown: >-
  ## Overview


  Timeshifter offers apps and services to reduce jet lag, manage shift work
  disruption, and prepare for peak performance by controlling human circadian
  rhythms through scientifically-backed interventions.


  ## How It Works


  Combines the only elements shown to reset the circadian clock:

  - Light exposure (timing is critical)

  - Dark exposure

  - Melatonin supplements (when appropriate)

  - Caffeine (to alleviate symptoms)

  - Strategic napping


  ## Features


  ### Jet Lag App

  - Import travel schedule

  - Enter sleep pattern and chronotype

  - Receive personalized day-by-day advice

  - Light exposure recommendations

  - Optimal timing for sleep, melatonin, caffeine


  ### Shift Work App

  - Import work schedule

  - Get advice to tackle circadian and sleep disruption

  - Personalized recommendations based on your patterns


  ## Scientific Foundation


  Developed using circadian neuroscience research. The right timing of light
  exposure is critical for quickly adjusting your circadian clock to new time
  zones and staying alert.


  ## Recognition


  Most-downloaded and highest-rated jet lag app in the world.


  ## Pricing


  Subscription-based with different plans for jet lag and shift work management.
