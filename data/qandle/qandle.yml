markdown: >-
  ## Overview


  Qandle is a modern HR management platform built for rapidly growing companies
  in India and Southeast Asia. It differentiates itself with beautiful UX
  design, strong employee engagement features, and scalable architecture suited
  for companies in their growth phase.


  ## Time & Attendance


  ### Smart Attendance

  - Mobile-based face recognition attendance

  - Geo-location verification

  - Wi-Fi based auto clock-in

  - Biometric device integration

  - Web-based punch

  - Offline attendance sync


  ### Shift & Schedule Management

  - Flexible shift patterns

  - Rotating roster automation

  - Employee shift preferences

  - Shift swap marketplace

  - Real-time shift adherence tracking


  ### Leave & Time-Off

  - Custom leave policies by department/grade

  - Automated accrual rules

  - Compensatory off tracking

  - Work-from-home requests

  - Half-day and permission management

  - Team calendar visualization


  ## Payroll & Compliance


  ### Payroll Engine

  - Automated salary calculations

  - Flexible salary structures

  - Custom components and formulas

  - Arrears and deductions

  - Hold salary functionality

  - Final settlement automation


  ### Indian Compliance

  - PF, ESI, PT automation

  - Income tax calculations

  - Form 16 and 12BA generation

  - Investment declarations

  - Statutory reports

  - Multi-state compliance


  ### International Payroll

  - Singapore CPF compliance

  - Malaysia EPF/SOCSO

  - Multi-currency support

  - Country-specific tax rules


  ## Employee Engagement


  Qandle emphasizes engagement:


  - Recognition and rewards platform

  - Peer-to-peer appreciation

  - Social feed for announcements

  - Birthday and anniversary celebrations

  - Employee surveys and pulse checks

  - Feedback collection


  ## Performance Management


  - OKR tracking

  - Continuous feedback

  - 360-degree reviews

  - Check-ins and one-on-ones

  - Performance improvement plans

  - Succession planning


  ## Core HR


  - Employee database

  - Digital document management

  - Onboarding workflows

  - Offboarding automation

  - Org chart and hierarchy

  - Custom fields and forms


  ## Mobile Experience


  Qandle prioritizes mobile:

  - Full-featured mobile apps

  - Intuitive touch interface

  - Push notifications

  - Offline capabilities

  - Quick actions


  ## Analytics & Reports


  - Real-time HR dashboards

  - Attendance analytics

  - Payroll cost reports

  - Headcount trends

  - Custom report builder

  - Scheduled reports


  ## Integration Ecosystem


  - Slack, Microsoft Teams

  - G Suite, Office 365

  - Biometric devices

  - Accounting software

  - Applicant tracking systems

  - Single sign-on (SSO)


  ## Regional Strengths


  ### India

  - Complete statutory compliance

  - Integration with Indian banks

  - Local support team

  - Rupee-based pricing


  ### Southeast Asia

  - Singapore, Malaysia presence

  - Local compliance features

  - Multi-country management

  - Regional customer success


  ## Target Market


  - Growth-stage startups (50-500 employees)

  - IT and tech companies

  - E-commerce businesses

  - Professional services

  - Companies expanding regionally


  ## Key Differentiators


  - Beautiful, modern design

  - Strong employee engagement focus

  - Excellent mobile experience

  - Fast implementation (2-3 weeks)

  - Responsive support

  - Regular feature releases


  ## Implementation


  - Guided setup wizard

  - Data import templates

  - User training sessions

  - Dedicated customer success manager

  - Go-live support


  ## Pricing


  Transparent, scalable pricing:

  - Starter: ₹99/employee/month

  - Growth: ₹149/employee/month

  - Enterprise: Custom pricing

  - Annual discounts available

  - Free trial offered


  ## Platform


  Cloud-based SaaS

  Web application

  Native mobile apps (iOS, Android)

  API for custom integrations
