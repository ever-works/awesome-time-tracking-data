name: Meeting Cost Calculator
description: Tool or practice of calculating the financial cost of meetings by
  multiplying attendee hourly rates by duration, making meeting expenses visible
  and encouraging more judicious use of collective time.
source_url: https://hbr.org/2022/04/how-much-are-your-meetings-costing-you
category: Productivity Tool
tags:
  - meetings
  - cost-analysis
  - productivity
  - awareness
markdown: >-
  ## Concept


  Meeting cost calculators reveal the true financial expense of meetings by
  calculating: Number of attendees × Average hourly rate × Meeting duration


  ## Example Calculation


  **Scenario**: 1-hour meeting with 8 people

  - Average rate: $75/hour

  - Cost: 8 × $75 × 1 = $600

  - Weekly (if recurring): $2,400/month

  - Annual: $28,800


  ## Impact of Awareness


  When people see the cost:

  - Question meeting necessity

  - Reduce attendee count

  - Shorten duration

  - Improve preparation

  - Stay on agenda


  ## Tools


  - Browser extensions showing meeting cost

  - Dedicated calculator websites

  - Calendar plugins

  - Custom spreadsheets


  ## Best Practices


  - Display cost in meeting invites

  - Review high-cost meetings quarterly

  - Set cost thresholds requiring approval

  - Track total meeting spend
