name: Keyboard Shortcuts for Time Tracking
description: Hotkeys and keyboard commands that enable power users to log time
  without touching the mouse, dramatically reducing entry time and supporting
  the two-minute rule. Keyboard shortcuts transform time tracking from a slow,
  click-heavy process into a rapid, flow-state-friendly activity.
