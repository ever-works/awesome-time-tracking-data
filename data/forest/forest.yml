markdown: >-
  ## Overview


  Forest is a unique productivity app that gamifies focus by allowing users to
  grow virtual trees during work sessions. Leaving the app causes the tree to
  die, creating a strong incentive to stay focused and avoid phone distractions.


  ## How It Works


  1. Set a focus timer (typically 25-120 minutes)

  2. Plant a virtual tree seed

  3. Stay focused and off your phone while the tree grows

  4. If you leave the app, your tree dies

  5. Successful sessions add trees to your forest

  6. Earn coins to unlock new tree species


  ## Key Features


  - Pomodoro-style focus timer

  - Gamified tree-growing mechanic

  - Over 30 different tree species to unlock

  - Forest visualization showing productivity history

  - Statistics and insights on focus patterns

  - Tag system for categorizing focus sessions

  - Whitelist for essential apps

  - Cross-platform syncing (iOS, Android, Chrome extension)

  - Social features and challenges with friends


  ## Real-World Impact


  Forest partners with Trees for the Future to plant real trees. Users can spend
  virtual coins earned through focused work to plant actual trees, creating
  tangible environmental impact.


  ## Unique Advantages


  - Visual and emotional connection to focus time

  - Gamification creates strong motivation

  - Environmental impact adds purpose

  - Simple, beautiful interface

  - Effective phone distraction blocker


  ## Use Cases


  - Reducing smartphone addiction

  - Improving study sessions

  - Deep work and concentration

  - Building consistent focus habits

  - Team productivity challenges


  ## Pricing


  One-time purchase for mobile apps (iOS and Android). Chrome extension
  available with free and premium options.
