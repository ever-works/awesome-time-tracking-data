markdown: >-
  ## Overview


  CloudApper hrPad is an AI-powered time tracking solution that transforms any
  tablet into a smart, location-aware employee self-service device. The platform
  integrates with major HCM systems including Workday, UKG, and Dayforce to
  provide accurate time capture and compliance management.


  ## Key Features


  ### Device Compatibility

  - Works on any iOS, Android, or Windows tablet

  - No hardwiring needed—works wherever there is Wi-Fi

  - Self-service time clock kiosk functionality

  - Can be deployed on existing tablets


  ### Authentication Methods

  - Facial recognition for secure clock-in/out

  - PIN code authentication

  - QR code scanning

  - Biometric verification to prevent buddy punching


  ### Location Validation & GPS

  - Automatically extracts scheduled location from WFM system

  - Validates employee location against kiosk's assigned location

  - Prevents unauthorized clock-ins from wrong locations

  - GPS tracking for mobile and field workers

  - Displays error message if location doesn't match


  ### Attendance Point System

  - Assign customizable point values to specific behaviors

  - Track late arrivals, no-shows, and early departures

  - Automated tracking of attendance violations

  - Support for progressive discipline policies


  ### Integration Capabilities

  - Seamless integration with UKG, Workday, and Dayforce

  - Pushes attendance and punch data back to core HCM platforms

  - Real-time synchronization for payroll accuracy

  - Built to enhance, not replace, existing HCM systems


  ### Cost Savings

  - Save up to 75% compared to traditional HR kiosks

  - Save up to 75% on HR service delivery costs

  - Use existing tablets instead of buying dedicated hardware

  - Automate manual HR processes


  ## Industry Applications


  ### Target Industries

  - Manufacturing

  - Retail

  - Hospitality

  - Healthcare

  - Any organization with frontline/deskless workers


  ### Use Cases

  - Time and attendance tracking for compliance-critical workspaces

  - Kiosk-based time capture in infrastructure-constrained environments

  - Managing tardiness and no-show tracking

  - Reducing manual HR administrative work


  ## Additional Features


  - Employee self-service capabilities

  - Automatic error detection and prevention

  - Support for both scheduled and unscheduled employees

  - Real-time data validation

  - Audit-ready punch records with location verification


  ## Benefits


  - Ensures accurate, timely time tracking for frontline workers

  - Reduces time theft and buddy punching

  - Improves payroll accuracy

  - Maintains compliance with labor regulations

  - Reduces HR administrative burden

  - Provides real-time workforce visibility


  ## Pricing


  Contact CloudApper for pricing information based on organization size and
  integration requirements.
