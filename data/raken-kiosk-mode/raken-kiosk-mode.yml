markdown: >-
  ## Overview


  Raken Kiosk Mode transforms any tablet or shared device into a centralized
  time clock for construction crews. Employees can clock in and out from a
  single device at the job site, eliminating the need for individual employee
  devices or expensive dedicated time clock hardware.


  ## Features


  - AI-powered photo ID verification at each clock-in/out

  - Automated geolocation capture

  - Buddy punching prevention through facial recognition

  - Multi-worker support on single device

  - Offline functionality for areas without connectivity

  - Real-time sync when connection restored

  - Integration with daily reports and project documentation

  - Supervisor approval workflows

  - Export to payroll systems


  ## AI Photo Verification


  When workers clock in, Raken's AI captures and verifies their photo against
  their profile. This automated verification prevents time theft by ensuring the
  person clocking in is actually the employee they claim to be, without
  requiring manual verification by supervisors.


  ## Geolocation & Site Tracking


  Each time entry automatically captures GPS coordinates, confirming workers are
  actually at the job site when clocking in. This provides documentation for
  client billing, compliance audits, and project tracking.


  ## Use Cases


  Ideal for construction companies, general contractors, and subcontractors who
  need to track time for crews working at multiple job sites. Particularly
  valuable for companies with workers who don't have company-provided devices or
  access to smartphones.


  ## Integration


  Raken Kiosk Mode integrates with the broader Raken platform, which includes
  daily reports, safety toolbox talks, photo documentation, and project
  management features, creating a comprehensive solution for construction field
  management.
