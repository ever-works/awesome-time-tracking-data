name: Minimum Viable Effort
description: Productivity concept derived from Stanford researcher BJ Fogg and
  popularized in Atomic Habits emphasizing starting with small, easy actions to
  build consistency. Finding the sweet spot of maximum benefit for minimum
  effort to maintain sustainable habits without burnout, based on the Pareto
  Principle that 20% of efforts contribute to 80% of results.
