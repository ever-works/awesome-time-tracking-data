markdown: >-
  ## Overview


  Drag is a collaboration tool built for teams that work primarily inside Gmail.
  It transforms individual email inboxes into a shared workspace where teams can
  manage conversations, tasks, and files collaboratively. Named a Momentum
  Leader by G2, Drag serves 200,000+ users across 50+ countries.


  ## Shared Inbox


  - **Gmail Shared Inbox**: Manage shared conversations across teams from inside
  Google Workspace, including support, operations, and sales pipelines

  - **WhatsApp Integration**: Manage shared WhatsApp conversations alongside
  email from a single workspace

  - **Email Tracking**: Know who is viewing, clicking, and replying to emails

  - **Email Sequences**: Send personalized, scheduled sequences of automated
  follow-up emails

  - **Email Templates**: Quickly select and send pre-built templates instead of
  writing from scratch


  ## Automation


  - **Automation Rules**: Create custom automation rules tailored to workflows
  in seconds

  - **Automatic Responder**: Reply to emails automatically to improve response
  times and set expectations

  - **Auto-Tagging**: Automatically organize and prioritize emails and tasks

  - **Board-to-Board Automation**: Automatically move emails between boards
  based on triggers


  ## Task Management


  - **Tasks**: Add tasks directly to your inbox for items that are not
  email-based

  - **Checklists**: Break out actionable items from emails and add them as
  separate tasks

  - **Task Notes**: Add contextual notes to any task for easy reference


  ## AI Features


  - **AI Drafts**: AI replies drafted and ready for review in your inbox

  - **AI Tagging**: AI-powered sorting to filter noise, prioritize what matters,
  and automatically organize the inbox

  - **AI Co-Pilot**: Ask AI questions about your boards and get clear,
  actionable answers

  - **Sentiment Detection**: AI analyzes incoming messages for positivity,
  urgency, or frustration to help teams prioritize responses

  - **Compose Assistant** (Coming Soon): AI suggests complete draft replies
  based on context, previous conversations, and brand voice

  - **Summarize** (Coming Soon): AI creates concise summaries of long email
  threads, highlighting key points and next steps


  ## Security and Compliance


  - Google CASA certified

  - Does not store user emails

  - 99.99% uptime monitored 24/7/365

  - Setup in under 5 minutes with no IT team required


  ## Use Cases


  - Customer support teams managing shared email inboxes

  - Sales teams managing pipelines and follow-ups

  - Operations teams coordinating cross-functional communication

  - Any team that uses Gmail and needs collaborative email management


  ## Pricing


  Free plan available with no credit card required. Paid plans offer additional
  features and capabilities.
