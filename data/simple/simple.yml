markdown: >-
  ## Overview


  Simple is a streamlined time tracking and task management app that lets you
  start timers with one click and organize your to-dos in a clean, structured
  list. It provides basic reporting so you can see exactly how much time you've
  spent on specific tasks, projects, or clients on a daily, weekly, and monthly
  basis.


  ## Features


  - One-click start timers

  - Structured task list for to-do organization

  - Manual time entry for forgotten timer starts

  - Group tasks by projects or clients

  - View and edit completed tasks

  - Basic reporting (daily, weekly, monthly)

  - Real-time sync across web, mobile, and tablet

  - Time tracking per task, project, or client


  ## Pros


  - Simple interface with a free plan available

  - Clear and uncluttered design

  - No bells, whistles, or integration complexity


  ## Cons


  - No additional features beyond basic time tracking

  - No integrations with other apps or tools

  - Not suitable if you need connections to project management suites,
  accounting software, or invoicing tools


  ## Pricing


  | Plan | Price | Description |

  |------|-------|-------------|

  | Free | $0 | All features, limited to 5 tasks |

  | Paid | $10/month | All features with unlimited tasks |


  ## Platform Availability


  - Web

  - Mobile

  - Tablet


  Real-time sync across all devices.
