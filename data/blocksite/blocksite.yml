markdown: >-
  ## Overview


  BlockSite is an accessible and user-friendly website and app blocker equipped
  with timer and scheduling capabilities. It takes a more approachable angle to
  productivity blocking by displaying amusing or motivational content when users
  attempt to access blocked websites, making the experience less frustrating
  while still maintaining focus.


  ## Key Features


  ### Website & App Blocking

  - **Website Blocking**: Block distracting websites during work or study time

  - **App Blocking**: Mobile app blocking for iOS and Android devices

  - **Category Blocking**: Block entire categories (social media, news,
  shopping, etc.)

  - **Adult Content Filtering**: Built-in filters for inappropriate content

  - **Sync Across Devices**: Blocked sites sync between browser extension and
  mobile apps


  ### Scheduling & Timers

  - **Work Schedule**: Set specific hours when blocking is active

  - **Custom Schedules**: Different blocking rules for different days

  - **Focus Sessions**: Start timed focus sessions with blocking enabled

  - **Break Reminders**: Notifications to take breaks between focus sessions


  ### Productivity Features

  - **Focus Mode**: Temporarily block all distractions with one click

  - **Redirect Options**: Redirect blocked sites to productive alternatives

  - **Motivational Quotes**: Display inspiring messages on block pages

  - **Amusing Images**: Fun graphics to lighten the mood when accessing blocked
  sites

  - **Productivity Stats**: Track how many times you've been protected from
  distractions


  ### Security & Control

  - **Password Protection**: Prevent unauthorized changes to blocking settings

  - **Parental Controls**: Parents can manage children's web access

  - **Tamper Protection**: Prevent easy bypass of blocking rules

  - **Allowlist**: Whitelist specific pages within blocked domains


  ## Platform Support


  ### Browser Extensions

  - Chrome

  - Edge

  - Firefox


  ### Mobile Apps

  - iOS (iPhone & iPad)

  - Android


  ## Use Cases


  - **Students**: Block entertainment sites during homework and study sessions

  - **Remote Professionals**: Maintain focus during work-from-home hours

  - **Parents**: Manage children's screen time and web access

  - **Content Creators**: Eliminate social media distractions during creative
  work

  - **Anyone Reducing Screen Time**: Support digital wellness goals


  ## Unique Selling Points


  1. **Cross-Platform**: Works on browsers and mobile devices

  2. **User-Friendly Interface**: Easier to set up than more complex
  alternatives

  3. **Positive Reinforcement**: Amusing imagery makes blocking less frustrating

  4. **Family-Friendly**: Strong parental control features

  5. **Active Development**: Regular updates and new features


  ## Pricing


  ### Free Plan

  - Block up to 6 websites

  - Basic scheduling

  - Chrome extension only


  ### Premium Plan

  - Unlimited website blocking

  - App blocking on mobile

  - Advanced scheduling

  - Sync across all devices

  - Adult content filter

  - Password protection

  - Priority support


  Pricing typically around $4-5/month or $30-40/year (varies by region and
  promotions)


  ## Comparison with Alternatives


  ### vs. LeechBlock NG

  - More user-friendly interface (LeechBlock offers more power user features)

  - Cross-device sync (LeechBlock is browser-extension only)

  - Premium pricing (LeechBlock is completely free)


  ### vs. Freedom

  - Lower cost (Freedom is more expensive at ~$40-50/year)

  - Simpler feature set (Freedom offers more advanced productivity tools)

  - Better for casual users (Freedom better for serious productivity focus)


  ### vs. StayFocusd

  - Mobile app available (StayFocusd is browser-only)

  - More visual and friendly (StayFocusd is more austere)

  - Cross-browser support (StayFocusd is Chrome-only)


  ## Best For


  - Users wanting a balance of features and ease-of-use

  - Families needing parental control features

  - People who want mobile and desktop blocking in one solution

  - Those who prefer a friendly, positive approach to blocking

  - Users willing to pay for premium features and mobile support


  ## Limitations


  - Free plan is quite limited (only 6 sites)

  - Less granular control than power-user tools like LeechBlock

  - Browser-level blocking can be bypassed by tech-savvy users

  - Subscription cost for full features
