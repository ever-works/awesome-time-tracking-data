markdown: >-
  ## Overview


  Rize combines automatic time tracking with AI-powered insights. It runs in the
  background on your computer, tracking which apps and websites you use, then
  uses AI to categorize activities and provide actionable productivity insights.


  ## Key Features


  ### Automatic Tracking

  - Tracks 300,000+ apps and websites

  - No manual timers needed

  - Runs in background

  - Privacy-first (local data storage option)


  ### AI Categorization

  - Automatically labels activities (work, meetings, focus, breaks)

  - Learns your patterns

  - Smart project detection

  - Context awareness


  ### Focus Analytics

  - Deep work session tracking

  - Meeting time analysis

  - Distraction identification

  - Focus score calculation


  ### Insights & Reports

  - Daily/weekly productivity reports

  - Time distribution charts

  - Meeting load analysis

  - Work-life balance metrics

  - Custom categories


  ## Privacy


  - Local data storage option

  - Encrypted sync

  - No keystroke logging

  - User controls what's tracked


  ## Pricing


  Around $10-15/month individual plans.
