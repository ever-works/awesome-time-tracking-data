markdown: >-
  ## Overview


  Timenotes is a browser-based time tracking extension for Google Chrome that
  embeds time tracking capabilities directly into popular web applications,
  allowing users to track time without switching tools or contexts.


  ## Features


  - **Browser Extension**: Chrome extension that adds time tracking to web apps

  - **One-Click Tracking**: Start timers with a single click from any integrated
  app

  - **Multi-Platform Integration**: Works with project management, issue
  tracking, and productivity tools

  - **Automatic Project Detection**: Detects current project context from web
  page

  - **Manual Time Entry**: Add time retroactively when needed

  - **Time Reports**: View time spent by project, client, or time period

  - **Idle Detection**: Pause timer automatically during inactivity

  - **Daily Reminders**: Notifications to log time at end of day

  - **Export**: Export time data to CSV or other formats

  - **Offline Mode**: Queue time entries when offline, sync when reconnected

  - **Privacy-Focused**: Minimal data collection with user control

  - **Lightweight**: Minimal impact on browser performance


  ## Supported Platforms


  Integrates with popular tools like Asana, Trello, GitHub, Jira, and many other
  web-based productivity platforms.


  ## Benefits


  Eliminates the friction of switching to a separate time tracking app, making
  it more likely users will actually track time consistently by embedding the
  feature where work happens.


  ## Pricing


  Free tier available with basic features. Premium plans unlock advanced
  reporting, integrations, and team features.
