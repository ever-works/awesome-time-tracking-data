markdown: >-
  ## Overview


  SideDock is a powerful productivity Chrome extension that adds a sleek side
  panel to your browser, keeping essential tools accessible without
  tab-switching.


  ## Features


  - **Built-in Task Manager**: Organize your day with a lightweight yet powerful
  task manager, add priorities, labels, and track progress without opening
  another app

  - **Pomodoro Timer**: Boost productivity with focused work sessions and
  intentional breaks using the integrated Pomodoro technique

  - **StayFocused Website Blocker**: Eliminate digital distractions by blocking
  time-wasting websites during focus sessions

  - **AI Tools Access**: Quick access to ChatGPT and other AI assistants
  directly from the sidebar

  - **Side-by-Side Workflow**: Keep YouTube videos, notes, and tasks open
  alongside your current work


  ## Use Cases


  Ideal for knowledge workers, students, and anyone who wants to maintain focus
  while browsing, combining time management and distraction blocking in a single
  browser extension.


  ## Pricing


  Free to install from the Chrome Web Store with premium features available.
