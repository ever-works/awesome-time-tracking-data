markdown: >-
  ## Overview


  uAttend is a comprehensive cloud-based time and attendance solution that
  combines hardware time clocks with software for tracking employee hours,
  managing schedules, and processing payroll. The system supports multiple
  clock-in methods including biometric fingerprint/facial recognition,
  badge/card readers, mobile GPS tracking, and web browser.


  ## Features


  - **Multiple Time Clock Options**: Fingerprint scanners, facial recognition,
  badge readers, and mobile punch

  - **Cloud-Based Software**: Access from anywhere with real-time data
  synchronization

  - **Biometric Verification**: Eliminate buddy punching with fingerprint or
  face recognition

  - **GPS Mobile Tracking**: Track employee location when clocking in/out via
  mobile app

  - **Geofencing**: Set location boundaries for mobile clock-ins

  - **Scheduling**: Create and manage employee schedules with shift templates

  - **PTO Management**: Track vacation, sick time, and other paid time off

  - **Overtime Alerts**: Automatic notifications when employees approach
  overtime

  - **Department/Job Tracking**: Assign employees to departments and track labor
  costs

  - **Reporting**: Generate detailed reports on hours worked, overtime,
  attendance, and labor costs

  - **Payroll Integration**: Export to ADP, QuickBooks, Paychex, and other
  payroll providers

  - **Optional Payroll Services**: Full-service payroll processing available

  - **Mobile Apps**: iOS and Android apps for employees and managers

  - **Time Off Requests**: Employees can request time off through the system


  ## Hardware Options


  uAttend offers various time clock hardware including:

  - Fingerprint time clocks

  - Facial recognition terminals

  - RFID badge readers

  - Combination biometric/badge systems

  - Mobile-only solutions (no hardware required)


  ## Pricing


  uAttend pricing includes a monthly software subscription plus optional
  hardware purchase or rental. Software starts at $9.95 per month for up to 10
  employees. Time clock hardware ranges from $199 to $599 depending on features.
  Optional payroll services are priced per employee per pay period.
