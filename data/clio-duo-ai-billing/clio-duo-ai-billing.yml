markdown: >-
  ## Overview


  Clio Duo is an AI-powered feature within the Clio legal practice management
  platform designed to automate billing tasks and improve the efficiency of law
  firm operations.


  ## Key Features


  - **Automated Invoice Generation**: Clio Duo uses AI to automatically generate
  draft invoices based on client activity, eliminating manual invoice creation
  for routine billing

  - **Time Entry Enhancement**: AI assists in creating more detailed and
  accurate time entries

  - **Revenue Capture**: Helps firms capture more billable time by surfacing
  work that might otherwise go unbilled

  - **Context-Aware Processing**: The AI understands legal workflows and client
  matter context to generate appropriate billing items


  ## Benefits for Law Firms


  - Reduces administrative overhead for small and solo practices

  - Improves billing accuracy and defensibility

  - Saves significant time on routine invoicing tasks

  - Increases revenue by ensuring all billable work is captured and invoiced


  ## Integration


  Clio Duo is built directly into the Clio platform and works seamlessly with
  Clio Manage's time tracking, expense tracking, and practice management
  features.


  ## Pricing


  Clio Duo is available as part of select Clio subscription plans. Pricing
  varies based on firm size and features required.
