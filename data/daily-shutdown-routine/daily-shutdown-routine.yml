markdown: >-
  ## Overview


  Daily Shutdown Routine creates clear boundary between work and personal time
  through structured end-of-day ritual.


  ## Components


  1. Review to-do list and calendar

  2. Capture incomplete tasks

  3. Make plan for tomorrow

  4. Say shutdown phrase ("Shutdown complete")

  5. Close work tools


  ## Benefits


  - Reduces evening work anxiety

  - Improves sleep quality

  - Strengthens work-life boundaries

  - Provides sense of completion

  - Enables genuine rest


  ## Pricing


  Free practice from Cal Newport.
