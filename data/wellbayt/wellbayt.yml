markdown: >-
  ## Overview


  Wellbayt is an energy management and burnout recovery platform that emphasizes
  most professionals don't burn out because they mismanage time, but because
  they mismanage energy. The platform positions energy management as the key to
  burnout recovery for HR leaders across the UAE and Saudi Arabia.


  ## Key Statistics and Context (2024-2026)


  According to the UAE Labour Force Survey 2024 cited by Wellbayt:


  - Full-time employees in the UAE spend an average of **54 hours per week** on
  work-related tasks, far above the global average of 42 hours

  - **89% of UAE employees** feel regular stress

  - **99% have experienced burnout symptoms**


  ## Core Concept: Time vs. Energy Management


  Time management focuses on scheduling tasks, while energy management focuses
  on sustaining the human being doing them. That distinction is what determines
  whether burnout fades or deepens.


  Energy management is described as not about working less but about working
  rhythmically, recognizing that performance is cyclical, not linear, driven by:


  - Physical stamina

  - Emotional stability

  - Mental focus

  - Social connection


  ## Research Support


  Research by The Energy Project found that employees who intentionally renew
  energy through rest, purpose alignment, and emotional regulation report:


  - **30% higher engagement**

  - **50% greater retention**


  Compared to those who only optimize time.


  ## Target Audience


  Primarily focused on HR leaders designing workplaces that sustain both
  performance and wellbeing in the Middle East region, particularly UAE and
  Saudi Arabia.


  ## Regional Focus


  The platform addresses unique challenges in the Middle East workplace context,
  including:


  - Longer-than-average work weeks

  - High stress and burnout rates

  - Cultural workplace dynamics

  - Balancing performance with employee wellbeing


  ## Methodology


  Wellbayt's approach focuses on helping organizations shift from time-based
  productivity metrics to energy-based performance management, recognizing that
  sustainable high performance requires rhythmic energy renewal rather than
  constant output.
