markdown: >-
  ## Overview


  Motion is an AI-powered task manager and calendar that automatically plans
  your day by intelligently scheduling tasks, managing priorities, and adapting
  to changes in real-time.


  ## Features


  - **AI Task Scheduling** - Automatically schedules tasks on your calendar
  based on priority and deadlines

  - **Dynamic Rescheduling** - Automatically adjusts your schedule when things
  change

  - **Project Management** - Manage projects with automatic task prioritization

  - **Calendar Integration** - Works with Google Calendar and Outlook

  - **Meeting Booking** - Intelligent meeting scheduling that considers your
  tasks

  - **Team Coordination** - Coordinate schedules across team members

  - **Mobile Apps** - Full iOS and Android apps

  - **Time Savings** - Claims to save users 30+ days per year through automation


  ## Use Cases


  Ideal for executives, entrepreneurs, project managers, and busy professionals
  who struggle with constant task reprioritization and schedule changes.


  ## Pricing


  - **Individual** - $34/month (billed annually)

  - **Team** - $20/user/month (minimum 3 users, billed annually)

  - **14-day free trial** available
