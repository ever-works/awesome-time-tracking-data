markdown: >-
  ## Overview


  TimeDox offers advanced biometric time clock systems with fingerprint and
  facial recognition capabilities, paired with cloud-based attendance software
  for real-time workforce management and payroll integration.


  ## Features


  - Dual biometric authentication (fingerprint and facial recognition)

  - Cloud-based attendance software

  - Real-time clock in/out tracking

  - Mobile app for remote workers

  - GPS location verification

  - Automated timesheet generation

  - Payroll system integration

  - Email and SMS notifications

  - Overtime tracking and alerts

  - PTO management

  - Department and job code tracking

  - Detailed attendance reports

  - Employee self-service portal

  - Multi-location support


  ## Pricing


  Hardware purchase with cloud software subscription. Pricing based on number of
  employees and locations. Free trial available.
