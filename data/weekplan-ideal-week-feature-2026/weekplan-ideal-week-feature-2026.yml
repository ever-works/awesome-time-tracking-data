markdown: >-
  ## Overview


  Launched in March 2026, WeekPlan's Ideal Week feature represents a new
  approach to weekly planning that emphasizes role-based time allocation rather
  than just task completion. The feature helps users design their "ideal week"
  by intentionally distributing time across all areas of life.


  ## Key Features


  - Role-based time blocking templates

  - Work-life balance visualization

  - Customizable time allocations for different life roles

  - Recurring ideal week templates

  - Integration with task planning

  - Time tracking against ideal week goals

  - Weekly review and adjustment tools

  - Balance scorecards


  ## Role-Based Planning Approach


  WeekPlan's Ideal Week encourages users to allocate time across multiple roles:


  **Example Daily Template:**

  - 8:00-16:00: Work (professional role)

  - 16:00-18:00: Family time (parent/partner role)

  - 18:00-20:00: Hobbies and interests (personal development role)

  - 20:00-22:00: Personal time (self-care role)


  Users can customize roles and time allocations to match their priorities and
  life stage.


  ## Why This Matters in 2026


  The Ideal Week feature addresses growing concerns about:

  - Work-life integration in hybrid/remote environments

  - Burnout from "always-on" work culture

  - Neglect of personal relationships and health

  - Misalignment between stated values and actual time use


  ## How It Works


  1. **Define Roles**: List your key life roles (Professional, Parent, Partner,
  Friend, Health, Learning, etc.)

  2. **Allocate Time**: Assign weekly time targets to each role based on
  priorities

  3. **Schedule Blocks**: Place time blocks on calendar for each role

  4. **Track Actuals**: Log how time is actually spent

  5. **Review & Adjust**: Weekly comparison of ideal vs. actual, with guided
  reflection


  ## Integration with Planning


  Ideal Week connects with WeekPlan's other features:

  - Tasks are assigned to roles

  - Time blocks protect role-based priorities

  - Goals align with role development

  - Reviews measure progress across all roles, not just work


  ## 2026 Announcement Context


  WeekPlan announced this feature specifically to help users "plan their time
  with purpose" amid increasing recognition that productivity without purpose
  leads to burnout. The timing aligns with broader 2026 workplace trends
  emphasizing sustainable performance and holistic wellbeing.


  ## Pricing


  The Ideal Week feature is included in WeekPlan's premium plans, with pricing
  tiers based on feature access and team size.
