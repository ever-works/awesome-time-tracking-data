markdown: >-
  ## Overview


  The 3-2-1 Rule is a simple and effective evening routine technique developed
  by Mel Robbins to wind down before bedtime and set yourself up for maximum
  productivity the following day.


  ## The Rule


  The 3-2-1 rule breaks down as follows:

  - **3 hours before bed**: Stop eating and drinking alcohol

  - **2 hours before bed**: Stop working

  - **1 hour before bed**: Shut down all screens


  ## Core Philosophy


  Mel Robbins emphasizes that **your morning routine begins the night before**.
  This is her core philosophy for productivity - what you do in the evening
  directly impacts your ability to be productive the next day.


  ## Purpose and Benefits


  - Helps you get a better night's sleep

  - Reduces stress levels

  - Prepares you mentally and physically for the next day

  - Removes decision fatigue by creating a consistent routine


  ## The Five-Step Evening Routine


  The 3-2-1 Rule is step one of Mel Robbins' five-step evening routine:


  1. **Follow the 3-2-1 Rule** (described above)

  2. **Make things easier for yourself** - Prepare for the next day by laying
  out clothes, packing bags, etc.

  3. **Clean up your space** - Create a physically clean slate so you mentally
  feel refreshed in the morning

  4. **Set your alarm intentionally** - Plan the time you truly need for your
  morning routine

  5. **Tuck your phone away** - Remove phones from the bedroom entirely


  ## Why It Works


  This evening routine is designed to:

  - Create optimal conditions for rest

  - Remove decision fatigue

  - Establish morning success habits

  - Allow your body and mind to properly wind down before sleep


  ## Implementation Tips


  Start by implementing one element at a time. The key is consistency -
  following the same routine every evening trains your body to recognize it's
  time to wind down, leading to better sleep quality and improved next-day
  performance.
