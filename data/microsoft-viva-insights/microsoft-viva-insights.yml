markdown: >-
  ## Overview


  Microsoft Viva Insights is a workplace analytics and wellbeing platform that
  helps people and businesses thrive through data-driven, privacy-protected
  insights and recommendations. Integrated seamlessly with Microsoft 365, Viva
  Insights analyzes collaboration patterns, meetings, work habits, and employee
  wellbeing to uncover opportunities for improvement while maintaining strict
  privacy protections.


  ## Features


  ### Personal Insights (Private)

  - **Work Pattern Analysis**: Understand personal work habits and productivity
  patterns

  - **Focus Time Protection**: Schedule and protect time for deep, uninterrupted
  work

  - **Break Reminders**: Recommendations for taking regular breaks

  - **Wellbeing Suggestions**: Personalized tips for improving work-life balance

  - **Learning Time**: Schedule dedicated time for skill development

  - **Meeting Impact**: Visualize how meetings affect available focus time

  - **After-Hours Tracking**: Monitor work done outside normal hours

  - **Completely Private**: Only you can see your personal insights—not managers
  or IT


  ### Team Insights (Manager View)

  - **Team Collaboration Patterns**: How teams work together and communicate

  - **Meeting Effectiveness**: Analysis of meeting culture and efficiency

  - **Focus Time Availability**: Team capacity for focused, uninterrupted work

  - **Wellbeing Indicators**: Aggregate wellbeing signals (anonymized)

  - **Network Analysis**: How information flows through the team

  - **Manager Impact**: How manager behaviors affect team outcomes

  - **1:1 Recommendations**: Suggestions for improving manager-employee
  connections


  ### Organizational Analytics (Leaders)

  - **Company-Wide Collaboration Trends**: Enterprise-level work pattern
  analysis

  - **Meeting Culture Assessment**: Organization-wide meeting effectiveness

  - **Wellbeing Metrics**: Aggregated employee wellbeing indicators

  - **Network Insights**: Cross-functional collaboration patterns

  - **Change Impact**: Measure effects of organizational changes

  - **Benchmark Comparisons**: Compare against industry standards

  - **De-Identified Data**: All organizational insights are privacy-protected
  and aggregated


  ### AI and Copilot Integration (2026)

  - **Microsoft 365 Copilot Analytics**: Available to Viva Insights analysts

  - **AI Impact Measurement**: Track and optimize AI tool adoption and
  effectiveness

  - **Copilot Usage Insights**: Understand how teams are leveraging AI
  assistance

  - **Productivity Gains**: Measure productivity improvements from AI tools

  - **AI-Powered Recommendations**: Enhanced suggestions using machine learning


  ### Data Sources

  Viva Insights aggregates information from:

  - Email (volume, response times, patterns)

  - Calendar (meeting frequency, duration, attendees)

  - Teams/Chat (collaboration frequency and patterns)

  - Document collaboration (co-authoring, sharing)

  - Employee surveys (optional wellbeing assessments)


  ## Privacy & Security


  ### Individual Privacy

  - **Personal insights are completely private**: Only you can see your data

  - **Manager cannot access**: No visibility into individual employee metrics

  - **IT cannot access**: System administrators cannot view personal insights

  - **Opt-out available**: Users can control their participation


  ### Organizational Privacy

  - **De-identified data only**: Individual identities removed from
  organizational reports

  - **Minimum group sizes**: Insights only shown for groups of 10+ to prevent
  identification

  - **Aggregated metrics**: All leadership reports use aggregate data

  - **No content access**: Viva Insights never reads email or chat content

  - **GDPR/Privacy Compliant**: Meets international privacy standards


  ## Integration with Microsoft 365


  - Native integration with Outlook, Teams, and other M365 apps

  - Seamless data collection from existing M365 usage

  - Inline suggestions within Microsoft applications

  - No separate login or additional tools required

  - Works across desktop, web, and mobile


  ## Use Cases


  ### Improving Wellbeing

  - Identify employees at risk of burnout

  - Reduce after-hours work

  - Protect focus time

  - Encourage regular breaks

  - Promote work-life balance


  ### Optimizing Meetings

  - Reduce excessive meeting time

  - Improve meeting effectiveness

  - Eliminate unnecessary meetings

  - Optimize meeting schedules

  - Measure meeting ROI


  ### Enhancing Collaboration

  - Break down organizational silos

  - Improve cross-team communication

  - Strengthen manager-employee connections

  - Build more effective networks

  - Facilitate knowledge sharing


  ### Measuring Change Impact

  - Assess impact of new work policies

  - Monitor hybrid work effectiveness

  - Track cultural transformation

  - Evaluate leadership changes

  - Measure digital transformation progress


  ## 2026 Enhancements


  ### Recent Updates (January 2026)

  - Integration with Microsoft 365 Copilot for analysts

  - Enhanced AI impact measurement capabilities

  - Improved wellbeing and productivity recommendations

  - Advanced coaching trend analysis

  - Better visualization of workplace patterns


  ### Cultural Transformation

  Microsoft uses Viva Insights internally to accelerate its own cultural
  transformation, fostering employee wellbeing and improving productivity
  through data-driven insights.


  ## Pricing


  Viva Insights is included with certain Microsoft 365 plans:

  - **Basic features**: Included with many M365 subscriptions

  - **Advanced features**: Available with premium Viva Insights license

  - **Enterprise analytics**: Requires Viva Insights capacity license


  Contact Microsoft for specific pricing based on your M365 subscription.


  ## Best For


  - Organizations already using Microsoft 365/Office 365

  - Companies prioritizing employee wellbeing

  - Leadership teams seeking data-driven cultural change

  - Managers wanting to improve team effectiveness

  - Individuals looking to optimize personal productivity

  - Enterprises measuring digital transformation impact

  - Organizations adopting AI tools (Copilot)


  ## Key Differentiators


  - **Privacy-first design**: Individual data completely private

  - **Native M365 integration**: No separate tool to learn

  - **Holistic approach**: Combines productivity AND wellbeing

  - **AI-powered insights**: Leverages Microsoft's AI capabilities

  - **Enterprise scale**: Proven at Microsoft and large organizations

  - **Research-backed**: Built on organizational psychology research


  ## Limitations


  - Requires Microsoft 365 ecosystem

  - Most valuable with consistent M365 usage

  - Organizational insights require minimum group sizes

  - Some advanced features require additional licensing

  - Effectiveness depends on adoption and data availability
