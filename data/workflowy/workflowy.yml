markdown: >-
  ## Overview


  WorkFlowy is a simple yet powerful outliner that allows infinite nesting of
  bulleted lists, creating a flexible system for note-taking, task management,
  and thought organization.


  ## Core Concept


  ### Infinite Zoom

  - Start with main topics as bullets

  - Nest sub-items infinitely deep

  - Zoom into any item to focus

  - Zoom out to see big picture

  - Navigate entire knowledge base as nested lists


  ## Key Features


  ### Simplicity

  - Only bullets and text

  - No formatting complexity

  - Keyboard-driven navigation

  - Fast and lightweight

  - Minimal learning curve


  ### Flexibility

  - Use for GTD workflows

  - Project management

  - Meeting notes

  - Personal wiki

  - Daily journaling

  - Brainstorming


  ### Collaboration

  - Real-time collaboration

  - Share specific branches

  - Team workspaces

  - Comments and mentions


  ## For Task Management


  - Create project hierarchies

  - Nest tasks under projects

  - Use tags for contexts (#work, #home)

  - Mark completed items

  - Archive finished projects


  ## Platform Availability


  - Web application

  - iOS app

  - Android app

  - Desktop apps

  - Offline support


  ## Pricing


  Free tier with monthly item limit. Pro version offers unlimited items and
  advanced features.
