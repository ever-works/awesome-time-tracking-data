name: BlockSite
description: User-friendly Chrome extension and mobile app that blocks
  distracting websites and apps with scheduling, timer, and productivity modes.
  Features amusing images when attempting to access blocked sites, parental
  controls, and synchronization across devices for comprehensive distraction
  management.
