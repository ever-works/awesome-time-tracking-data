markdown: >-
  ## Overview


  Toggl Focus (evolved from Toggl Plan) is a no-bloat planning tool built around
  a leading time tracking experience. It provides a simple, visual way for
  agencies and internal teams to balance team capacity and project workloads.


  ## Features


  ### Visual Planning Tools

  - Color-coded, drag-and-drop timelines

  - Kanban boards for project management

  - Clear visual overview of workloads and progress

  - Teams can plan their time and projects effortlessly


  ### Capacity Management

  - Understand work hours, availability, and workload at a glance

  - Clear picture of team workload to avoid burnout

  - Proactively plan when to bring additional help onboard

  - Prevent overallocation and underutilization


  ### Workload Visibility

  - Tracks availability and balances workloads

  - Resource view helps distribute responsibilities effectively

  - Prevents burnout and underutilization

  - Team capacity at a glance


  ### Scheduling Features

  - Drag-and-drop timeline planning

  - Scheduling conflict detection

  - Alerts when scheduling conflicts occur due to time-off

  - Automatic conflict resolution suggestions


  ## Platform Support


  - Cloud-based web application

  - Mobile apps

  - Accessible from anywhere

  - Real-time collaboration


  ## Benefits


  - **Visual Clarity**: See team capacity and project timelines clearly

  - **Easy to Use**: Drag-and-drop interface requires minimal training

  - **Prevents Burnout**: Balance workloads across team members

  - **No Bloat**: Focused on essential features without complexity

  - **Conflict Prevention**: Automatic alerts for scheduling issues


  ## Ideal For


  - Creative teams

  - Small businesses

  - Agencies and consultancies

  - Internal teams

  - Project managers

  - Teams needing intuitive resource management

  - Organizations wanting simplicity over complexity


  ## Evolution from Toggl Plan


  Toggl Plan has evolved into Toggl Focus, combining resource planning with time
  tracking in a streamlined experience. The original Toggl Plan app remains
  available to existing users during the transition.


  ## Key Use Cases


  - Resource allocation and scheduling

  - Team capacity planning

  - Project timeline visualization

  - Workload balancing

  - Availability management

  - Conflict detection and prevention


  ## Pricing


  Contact Toggl for current pricing information for Toggl Focus.


  ## Integration


  Integrates with Toggl Track for comprehensive time tracking and planning
  workflow.
