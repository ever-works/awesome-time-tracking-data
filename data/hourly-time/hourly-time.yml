markdown: >-
  ## Overview


  Hourly is intuitive time tracking, reporting and invoicing software that teams
  will love. The platform instantly turns tracked time into personalized
  invoices that can be created, edited, and sent in a few clicks.


  ## Features


  ### Time Tracking

  - Track billable and non-billable hours

  - Manual time entry

  - Timer functionality

  - Project-based tracking

  - Task-level time allocation


  ### Invoicing

  - Instantly turn tracked time into personalized invoices

  - Create, edit, and send in a few clicks

  - Professional invoice templates

  - Customizable invoice branding

  - Automated invoice generation from timesheets


  ### Reporting

  - Comprehensive time reports

  - Billable vs. non-billable analysis

  - Project time summaries

  - Team productivity reports

  - Client billing reports


  ### Team Management

  - Multi-user support

  - Team time tracking

  - Project assignments

  - Role-based permissions

  - Collaborative timesheets


  ## Who It's For


  - Service-based businesses

  - Consulting firms

  - Freelance teams

  - Agencies

  - Professional services

  - Anyone billing clients by the hour


  ## Benefits


  - Simplify time-to-invoice workflow

  - Reduce invoice creation time

  - Professional client billing

  - Track team productivity

  - Improve revenue capture

  - Streamline payroll processes


  ## Use Cases


  - Client billing and invoicing

  - Project cost tracking

  - Team time management

  - Billable hours reporting

  - Revenue forecasting

  - Contractor payments


  ## Key Differentiators


  - Intuitive user interface teams actually want to use

  - Fast invoice creation from tracked time

  - Focus on simplicity and ease of use

  - Personalized invoice customization


  ## Pricing


  Pricing information available on website based on team size and features.
