markdown: >-
  ## Overview


  Tanda is a powerful all-in-one tool for managing hourly employees in
  Australia, with a specific focus on Fair Work requirements and Modern Award
  pay rates. The platform serves over 10,000 businesses across Australia.


  ## Key Compliance Features


  - **Award Interpretation & Templates**: Tanda's compliance team researches pay
  and conditions for the most common Awards, and their award templates help
  automate calculations for base rates right up to the most complex employment
  conditions

  - **Roster Validations**: Automatically flags compliance risks on the roster
  and allows customization of roster validations to warn managers about issues
  before they occur

  - **Break Compliance**: Creates rosters that are automatically populated with
  the correct breaks based on the industry award

  - **Award Interpretation Engine**: Automatically calculates complex pay rates,
  penalties, and allowances based on industry and enterprise agreements


  ## Workforce Management Features


  - Create schedules that comply with modern awards and enterprise agreements

  - Automated time and attendance tracking with mobile clock-in/out

  - Leave management and approval workflows

  - Payroll integration for streamlined processing


  ## Target Users


  Designed specifically for Australian businesses managing hourly workers,
  particularly in retail, hospitality, healthcare, and service industries where
  award compliance is critical.
