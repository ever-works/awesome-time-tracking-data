name: Decide Once Principle
description: A Lazy Genius principle by Kendra Adachi that eliminates decision
  fatigue by making recurring decisions one time and sticking with them. Helps
  sidestep constant mental reinvention by establishing consistent patterns for
  routine choices about time, resources, and daily activities.
