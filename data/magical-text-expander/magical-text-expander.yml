markdown: >-
  ## Overview


  Magical is a text expander and autofill automation app used by over 100,000
  companies that helps automate repetitive typing tasks and workflows through a
  free Google Chrome extension.


  ## Key Features


  - **Text Expansion with Shortcuts**: Create custom abbreviations that expand
  into full snippets of text, phrases, paragraphs, blocks of code, or templates

  - **Placeholders/Variables**: Personalize expanded text with little green
  bubbles for dynamic information like First Name, Company Name, or Ticket
  Number

  - **Autofill Automation**: With a single click, autofill contacts, leads,
  patient details, or job candidates into any database, form, or spreadsheet

  - **Workflow Automation**: Create personalized shortcuts that automate entire
  sequences of actions

  - **Universal Compatibility**: Works on 10,000,000+ apps where you already
  work, like Salesforce, Zendesk, Gmail, LinkedIn, Greenhouse, or any other
  website


  ## Common Use Cases


  - Customer support macros and canned responses

  - Recruiting messages and candidate outreach

  - Sales outreach and follow-up emails

  - Email templates for any workflow

  - Form filling and data entry automation


  ## How It Works


  A shortcut consists of a trigger and the shortcut content. When you type the
  trigger (a keyword or phrase), it automatically expands into the full shortcut
  content, eliminating repetitive typing.


  ## Platform


  Available as a free Google Chrome extension, not limited to specific operating
  systems (Windows, Mac, Android, or iOS).


  ## Pricing


  Free text expander with premium features available.
