markdown: >-
  ## Overview


  Jason Hewlett is a leadership expert, author, and inductee of the Speaker Hall
  of Fame recognized for his impactful presentations on leadership and personal
  development.


  ## Notable Works


  - **Signature Moves: How To Stand Out In A Sit Down World** - A book on
  developing distinctive leadership skills

  - **The Promise: Become a Legendary Leader and Discover Your Signature Moves**
  - Award-winning presentation


  ## Approach


  Hewlett's methodology focuses on helping leaders discover and develop their
  unique "signature moves" - the distinctive behaviors and approaches that set
  them apart and enable them to lead effectively.
