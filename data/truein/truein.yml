markdown: >-
  ## Overview


  Truein is a cloud-based attendance management system that combines face
  recognition technology with GPS-based geofencing to ensure employees can clock
  in only from approved locations. The platform provides contactless,
  fraud-proof time tracking for modern workplaces.


  ## Features


  - **Face Recognition**: AI-powered facial recognition for contactless
  clock-in/out

  - **GPS Geofencing**: Location-based restrictions for where employees can
  clock in

  - **Dual Verification**: Combines facial recognition + geofencing for security

  - **Cloud-Based**: Access attendance data from anywhere in real-time

  - **Mobile Apps**: iOS and Android apps for employees

  - **Web Dashboard**: Manager portal for attendance monitoring and reporting

  - **Offline Mode**: Works without internet, syncs when connected

  - **Multi-Location Support**: Manage attendance across multiple sites

  - **Shift Management**: Support for multiple shifts and schedules

  - **Leave Management**: Track PTO, sick leave, and absences

  - **Overtime Tracking**: Automatic overtime calculation

  - **Compliance Reports**: Generate attendance reports for compliance

  - **Integration**: Connect with HR and payroll systems

  - **Real-Time Alerts**: Notifications for late arrivals, early departures


  ## Anti-Fraud Features


  - Prevents buddy punching with face recognition

  - Ensures on-site presence with geofencing

  - Liveness detection to prevent photo/video spoofing

  - Tamper-proof cloud storage of attendance records

  - Complete audit trail for all clock-in/out events


  ## Use Cases


  - Field sales teams requiring location verification

  - Remote job sites needing attendance tracking

  - Retail stores with multiple locations

  - Healthcare facilities requiring secure check-in

  - Corporate offices implementing contactless systems

  - Construction sites with geofenced boundaries


  ## Benefits


  - Eliminates time theft and buddy punching

  - Reduces payroll processing time

  - Improves attendance accuracy

  - Provides contactless health-safe solution

  - Simplifies compliance and auditing


  ## Pricing


  Offers multiple pricing tiers based on number of employees and features
  required. Free trial available.
