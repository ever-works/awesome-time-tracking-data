markdown: >-
  ## Overview


  Allied Time USA specializes in biometric time and attendance systems, offering
  a comprehensive range of fingerprint, facial recognition, and hand geometry
  time clocks to suit different business environments and requirements.


  ## Features


  - Multiple biometric technologies (fingerprint, face, hand geometry)

  - Standalone and networked models

  - Cloud-based and on-premise options

  - Touchscreen interfaces

  - Badge and PIN backup options

  - Real-time data transfer

  - Integration with major payroll providers

  - Employee self-service features

  - Weatherproof models for outdoor use

  - Large employee capacity

  - Multiple shift support

  - Detailed reporting capabilities

  - Mobile app options


  ## Pricing


  Various models at different price points. Hardware costs plus optional
  software subscriptions. Contact for specific pricing based on business needs.
