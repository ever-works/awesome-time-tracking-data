markdown: >-
  ## Overview


  Insights turns time tracking data into real-time, actionable metrics to
  optimize utilization rates, eliminate unnecessary meetings, and increase
  productivity.


  ## Key Features for Remote Teams


  **Dashboard Capabilities:**

  With the Insights add-on, your dashboard provides real-time data on
  utilization, unusual activity, focus time, and more. Managers receive live
  updates directly on their dashboards for improved resource planning and
  real-time budget adjustments.


  **Core Insights Features:**

  - **Highlights Widget**: The Highlights widget identifies fluctuations in work
  time, activity, and more so you don't have to.

  - **Benchmarking**: See each user's keyboard and mouse activity data and how
  they compare to other Hubstaff users in their industry or role with the
  benchmarking feature.

  - **Focus Time**: With focus time data, you can help your team cut down on
  unnecessary meetings, limit distractions, and see how much time you're
  spending on the core work that adds value to your business.

  - **Work Time Classification**: Create work classifications and see a
  real-time breakdown of each user's time spent on core, non-core, and
  unproductive work.


  ## Reporting Features (2026)


  20+ fully customizable reports help you monitor team performance, track
  project progress, and make real-time budget tweaks to improve decision-making.
  Choose from up to 20+ fully customizable reports for hours worked, earnings,
  project costs, expenses, and more. Filter by employee, project, or date and
  email them to key stakeholders directly from the app.


  ## AI-Powered Analytics


  Get AI-powered summaries on productivity trends, PTO, and focus time to spot
  overwork early and balance capacity—keeping teams healthy and high-performing.


  ## Use for Remote Teams


  Hubstaff is commonly used for remote teams because it provides visibility into
  work hours, project progress, and productivity trends. Our Insights product
  helps you optimize remote and hybrid teams of 10 to 10,000.
