name: Motion Meeting Assistant
description: AI-powered meeting coordination feature in Motion that
  automatically schedules meetings based on user preferences, groups meetings
  back-to-back to protect focus time, enforces daily meeting limits, and finds
  optimal time slots within designated work hours to minimize context switching.
