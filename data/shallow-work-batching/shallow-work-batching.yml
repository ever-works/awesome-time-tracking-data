name: Shallow Work Batching
description: Cal Newport's practice of consolidating administrative, logistical,
  and low-cognitive-demand tasks into dedicated time blocks rather than mixing
  throughout day. Prevents shallow work from fragmenting schedule and
  interrupting deep work. Typically batched afternoon when energy naturally
  dips.
source_url: https://www.calnewport.com/blog/2012/11/21/knowledge-workers-are-bad-at-working-and-heres-what-to-do-about-it/
category: Time Management Practice
tags:
  - task-batching
  - deep-work
  - cal-newport
  - shallow-work
markdown: >-
  ## Overview


  Shallow Work Batching consolidates low-value necessary tasks into dedicated
  blocks.


  ## Shallow Work Examples


  - Email

  - Administrative tasks

  - Expense reports

  - Scheduling

  - Most meetings

  - Status updates


  ## Implementation


  1. Identify all shallow work

  2. Calculate weekly minimum time needed

  3. Create dedicated batching blocks

  4. Protect deep work blocks from shallow intrusion

  5. Let shallow work accumulate for batch


  ## Timing


  - Often afternoon when energy dips

  - After deep work sessions complete

  - Before/after lunch natural breaks


  ## Benefits


  - Prevents schedule fragmentation

  - Protects deep work time

  - Reduces context switching

  - Increases deep work percentage


  ## Pricing


  Free Cal Newport practice.
