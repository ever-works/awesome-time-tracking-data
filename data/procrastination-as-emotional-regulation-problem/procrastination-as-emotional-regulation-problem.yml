name: Procrastination as Emotional Regulation Problem
description: Research-based understanding that procrastination is primarily an
  emotional regulation problem rather than time management issue. People
  procrastinate to avoid negative emotions associated with tasks, not because
  they lack planning skills. This reframe changes intervention strategies from
  scheduling to emotional awareness.
