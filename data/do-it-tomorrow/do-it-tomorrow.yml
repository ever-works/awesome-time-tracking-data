markdown: >-
  ## Overview


  Mark Forster's "Do It Tomorrow and Other Secrets of Time Management"
  introduces a complete time management system focused on reducing workload to
  match what can realistically be accomplished, rather than just trying to work
  faster or longer.


  ## Core Concepts


  ### Closed Lists

  A closed list is a type of "To Do" list that has a clearly defined boundary.
  As you start the day, you rule a line across the list to represent your plan
  for the day. The list is said to be closed because it can't be added to during
  the next day when you work on it. You simply do everything that is on the list
  and nothing more. As new work comes in, put it on your closed list for the
  next day.


  ### The Mañana Principle

  Mark Forster bases his system on the "mañana principle." Instead of reacting
  to new tasks right away, you gather all incoming tasks throughout the day.
  Then, you "do it tomorrow." This helps avoid distractions, batch tasks, reduce
  stress, and promote better planning.


  ### Will Do vs. To Do Lists

  He calls it a "will do" (rather than a "to do") list—a closed list of tasks
  that you can actually accomplish in a day.


  ## Addressing Procrastination


  Procrastination is often a paralysis caused by the thought of having so much
  work to do and not knowing what to do next. Completing the daily closed lists
  gives positive reinforcement and a good feeling of achievement.


  ## Benefits


  - **Reduced Overwhelm**: By working only on today's closed list, you eliminate
  the anxiety of an ever-growing todo list

  - **Better Planning**: Batching incoming work for the next day allows for more
  thoughtful task organization

  - **Sustainable Pace**: The system helps you work at a pace that matches your
  actual capacity

  - **Positive Momentum**: Finishing your daily closed list provides a sense of
  completion and accomplishment


  ## Book


  Forster introduces innovative strategies like the "closed list" and the
  deceptively simple concept of "doing it tomorrow," which challenge
  conventional wisdom and provide powerful solutions for procrastination and
  overwhelm.


  ## Pricing


  The book "Do It Tomorrow and Other Secrets of Time Management" by Mark Forster
  is available for purchase through major book retailers. The methodology itself
  is free to implement.
