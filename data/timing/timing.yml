markdown: >-
  ## Overview


  Timing is the leading automatic time tracking app for Mac, designed to record
  every app, document, and website you use without requiring manual timers. It's
  built as a native Mac application for maximum performance and privacy.


  ## Features


  - **Automatic Activity Tracking** - Automatically tracks every app, document,
  and website with full file paths and URLs

  - **AI Summaries** - Transform raw activity data into actionable insights with
  intelligent summaries

  - **Call Detection** - Automatically prompts to record time after video or
  voice calls

  - **Screen Time Import** - Import mobile app usage from Screen Time for
  complete cross-device tracking

  - **Native Performance** - Built as a native Mac app for blazing speed, not a
  slow web or Electron app

  - **Local Privacy** - All data stored locally on your Mac and never leaves
  your device unless you opt into sync

  - **Project Categorization** - Organize tracked time into projects and clients

  - **Productivity Reports** - Detailed insights into how time is spent

  - **Billing Integration** - Export time to invoicing systems

  - **macOS Integration** - Full compatibility with latest macOS including
  Liquid Glass design


  ## macOS Compatibility


  Fully compatible with macOS 26 Tahoe and the new Liquid Glass design, with
  views carefully reworked to seamlessly integrate.


  ## Pricing


  Free 30-day trial. Plans: Professional ($9/month), Expert ($11/month), and
  Connect ($16/month), billed annually.
