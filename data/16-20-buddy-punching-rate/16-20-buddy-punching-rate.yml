markdown: >-
  ## The Buddy Punching Problem


  Surveys consistently show that 16-20% of hourly employees admit to buddy
  punching—having a colleague clock in for them when they're late or absent.
  This represents billions in stolen time annually.


  ## Financial Impact


  **Average theft per offender**: 4.5 hours/week


  **100-employee company example**:

  - 16 employees participate

  - 4.5 hrs/week each

  - $15/hour average wage

  - = $56,160/year lost


  ## Why It Happens


  - Perceived as helping a friend

  - Low perceived risk

  - Cultural normalization

  - Easy with traditional systems

  - Minimal consequences if caught


  ## Prevention Methods


  ### Biometric Systems

  - Fingerprint readers: 99.6% accurate

  - Facial recognition: 99.5%

  - Hand geometry: 98%

  - Iris scanning: 99.99%


  ### Other Deterrents

  - Photo time stamps

  - GPS verification

  - Manager approval workflows

  - Clear policies and enforcement


  ## ROI of Prevention


  Biometric systems typically pay for themselves in 2-6 months through
  elimination of buddy punching alone.
