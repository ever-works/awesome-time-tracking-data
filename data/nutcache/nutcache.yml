markdown: >-
  ## Overview


  Nutcache is a cloud-based collaborative project management application
  developed by Canadian company Dynacom Technologies. Founded in 2013 and based
  in Laval, Quebec, Nutcache is part of the Dynacom group, a leading business
  management company in the province of Quebec for over 30 years.


  ## Time Tracking Features


  - Quick and easy time entry for tracking billables

  - iOS and Android mobile applications

  - Manual time entry and automatic tracking options

  - Time reporting and analytics

  - Integration with invoicing for accurate billing


  ## Collaboration Tools


  - Shared task boards for visual organization

  - File sharing capabilities

  - Real-time communication tools

  - Commenting on tasks and updates

  - Document collaboration within the platform

  - Centralized project-related discussions


  ## Project Management


  - Task and time tracking

  - Collaborative project boards

  - Visual organization based on color, lists, and cards

  - Project dashboards

  - Reporting capabilities

  - Billing and invoicing


  ## Target Users


  Nutcache is designed for small to midsize businesses with teams that need
  comprehensive project management, time tracking, and billing capabilities in a
  single integrated platform.


  ## Pricing


  Nutcache is free for teams of up to 20 members. Paid plans are available for
  larger teams with additional features.
