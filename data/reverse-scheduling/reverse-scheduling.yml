  - project-management
markdown: >-
  ## Overview


  Reverse scheduling (also called backward planning) starts with the end goal or
  deadline and works backward to determine when each step must begin to finish
  on time.


  ## How It Works


  1. Identify final deadline or goal

  2. List all required steps

  3. Estimate duration for each

  4. Work backward to set start dates

  5. Add buffers for contingencies

  6. Create forward-looking schedule


  ## Benefits


  - Ensures deadline feasibility

  - Identifies required start date

  - Reveals if timeline is realistic

  - Highlights dependencies

  - Prevents last-minute rushes

  - Makes buffers explicit


  ## Best For


  - Fixed-deadline projects

  - Event planning

  - Product launches

  - Campaign execution

  - Multi-phase initiatives


  ## Steps


  ### 1. Define End State

  - What must be complete?

  - When is the deadline?

  - What does success look like?


  ### 2. Break Down Tasks

  - Identify all required activities

  - Determine dependencies

  - Estimate durations


  ### 3. Add Buffers

  - Account for unknowns

  - Include review time

  - Allow for revisions


  ### 4. Work Backward

  - Start from deadline

  - Subtract each task duration

  - Identify start date for each


  ### 5. Validate

  - Is start date realistic?

  - Are resources available?

  - Need to adjust scope or timeline?


  ## Common Uses


  - Wedding planning

  - Conference organization

  - Product development

  - Academic projects

  - Construction timelines
