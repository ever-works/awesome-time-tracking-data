markdown: >-
  ## Overview


  Jibble is a free time tracking and attendance app that offers advanced
  features like facial recognition and GPS tracking without charging per user,
  making it accessible for teams of any size.


  ## Key Features


  **Time Tracking:**

  - Web, mobile, and kiosk time clock

  - Facial recognition for clock in/out

  - GPS location tracking

  - Offline time tracking

  - Project and task time tracking

  - Multiple timesheets


  **Attendance Management:**

  - Automatic attendance calculations

  - Leave management

  - Break tracking

  - Overtime calculations

  - Schedule management


  **Reporting:**

  - Detailed timesheets

  - Activity reports

  - Location tracking reports

  - Export to payroll

  - Custom reports


  **Team Features:**

  - Unlimited members on free plan

  - Team activity dashboard

  - Multiple locations/departments

  - Geofencing

  - Notifications and alerts


  ## Unique Advantages


  - Completely free for unlimited users

  - No feature limitations on free plan

  - Facial recognition included

  - GPS tracking included

  - Generous free offering


  ## Pricing


  **Free Forever Plan:**

  - Unlimited users

  - All core features

  - Facial recognition

  - GPS tracking

  - Mobile apps


  **Premium Plans:**

  - Advanced integrations

  - Priority support

  - Custom branding
