markdown: >-
  ## Overview


  Inventive HQ offers a free world clock tool combining three essential features
  for distributed teams: live clocks for 38 time zones, meeting time slider for
  global scheduling, and instant timezone converter. All processing happens
  locally on your device.


  ## Three Tools in One


  ### 1. World Clock

  - Live clocks for 38 time zones

  - 9 regional categories

  - Add cities easily

  - Star favorites

  - Filter by region

  - Share your setup


  ### 2. Meeting Time Slider

  - Find optimal meeting times

  - Visual time overlap

  - Cross-timezone scheduling

  - Business hours highlight


  ### 3. Timezone Converter

  - Instant time conversion

  - Multiple zones simultaneously

  - Quick comparisons

  - Easy calculations


  ## Time Zone Coverage


  ### 38 Time Zones Across 9 Regions

  - North America

  - Europe

  - Asia

  - Oceania

  - South America

  - Africa

  - Middle East

  - UTC

  - Plus custom zones


  ### Common Abbreviations

  - PST, EST, CST, MST (North America)

  - GMT, BST, CET (Europe)

  - IST, JST (Asia)

  - AEST (Australia)

  - Plus 28 more


  ## Clock Features


  Each clock displays:

  - Current local time

  - UTC offset

  - Business hours indicator

  - Regional grouping

  - City name


  ## Privacy & Security


  ### Complete Local Processing

  - No data sent to servers

  - All processing on your device

  - No signup required

  - Privacy-first design

  - Secure by default


  ## Customization Options


  - Add custom cities

  - Star favorite zones

  - Filter by region

  - Share setups

  - Personal configuration


  ## Use Cases


  - International meeting scheduling

  - Remote team coordination

  - Global client communication

  - Travel planning

  - Time zone education

  - Multi-timezone projects


