markdown: >-
  ## Overview


  Daily Time Tracking is a time tracking app that resides in your macOS menu bar
  and uses a question-based approach to track your time.


  ## How It Works


  The app works by asking what you are doing at regular intervals, prompting you
  to categorize and log your current activity. This manual, prompted approach
  ensures conscious awareness of time usage without automated surveillance.


  ## Key Features


  - **Menu Bar Access**: Quick access from the macOS menu bar

  - **Question-Based Tracking**: Prompts ask you what you're currently working
  on

  - **Manual Logging**: User-controlled time entry rather than automatic
  tracking

  - **Activity Categorization**: Organize time by activity or project


  ## Philosophy


  Designed for users who prefer intentional, mindful time tracking over
  automatic monitoring, encouraging regular reflection on time usage throughout
  the day.


  ## Benefits


  - Increased awareness of time allocation

  - No privacy concerns from automatic monitoring

  - Simple, distraction-free interface

  - Lightweight system resource usage


  ## Platform


  Available exclusively for macOS.
