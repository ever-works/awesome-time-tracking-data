markdown: >-
  ## Overview


  **Big Time: A Simple Path to Time Abundance** is a book by Laura Vanderkam
  published on May 5, 2026 by W.W. Norton & Co. The book explores how we can
  fall in love with our schedules as we shift from a mindset of scarcity to
  abundance.


  ## Key Concepts


  Vanderkam argues that even busy people can come to feel that time is abundant.
  Drawing on original research about how hundreds of real people spend their
  time, and her own experience of tracking her time for a decade, she offers
  simple tactics for:


  - Managing a complex life

  - Sticking with long-term projects by breaking big goals into tiny steps

  - Making the most of leisure time many people don't even notice


  ## Practical Strategies


  The book includes:


  - Developing a "ringmaster" mindset to coordinate various aspects of life

  - Breaking big goals into daily, bite-sized pieces

  - Making little bets within a schedule to increase the odds of a breakthrough

  - Identifying and leveraging hidden pockets of time


  ## About the Author


  Laura Vanderkam is a well-known time management expert, author, and speaker
  who has written extensively about productivity and work-life balance. She
  maintains a popular blog and podcast on time management topics.


  ## Pricing


  Available in print (224 pages) and digital formats from major book retailers.
  Pricing varies by retailer and format.
