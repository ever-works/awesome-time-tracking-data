markdown: >-
  ## Overview


  Ultradian rhythms are cycles that repeat numerous times throughout a 24-hour
  period, typically lasting 90-120 minutes. We routinely experience peaks when
  we're highly-focused, as well as dips when we feel sleepy and distracted.


  ## Scientific Basis


  Our biological prime time is driven by these ultradian rhythms. From a
  cognitive science perspective, these rhythms represent natural cycles of
  cognitive arousal that affect our ability to focus, process information, and
  perform mentally demanding tasks.


  ## The 90-Minute Cycle


  Research shows that our bodies naturally move through cycles of approximately
  90-120 minutes where we experience:


  ### Peak Phase (60-90 minutes)

  - High alertness

  - Strong focus

  - Optimal cognitive performance

  - Best time for deep work


  ### Trough Phase (20-30 minutes)

  - Decreased alertness

  - Difficulty concentrating

  - Natural urge to take a break

  - Body's signal to rest and recover


  ## Application to Time Management


  ### 90-Minute Focus Sessions

  Many productivity experts recommend working in 90-minute blocks aligned with
  these natural rhythms:

  1. Work intensively for 90 minutes

  2. Take a 15-20 minute break

  3. Repeat the cycle


  ### Advantages Over Fixed Methods

  Unlike the Pomodoro Technique's 25-minute intervals, 90-minute sessions:

  - Allow for deeper immersion in complex tasks

  - Align with natural biological rhythms

  - Reduce interruptions during peak focus periods

  - Permit reaching flow states


  ## Implementation Strategies


  ### Track Your Rhythms

  Monitor your energy levels throughout the day for 1-2 weeks to identify your
  personal ultradian rhythm patterns.


  ### Schedule Accordingly

  - Place demanding cognitive work during peak phases

  - Use trough phases for routine tasks, breaks, or administrative work

  - Don't fight against low-energy periods


  ### Respect the Breaks

  Taking breaks during trough phases allows your brain to:

  - Consolidate learning

  - Process information

  - Restore mental resources

  - Prepare for the next peak


  ## Comparison to Other Rhythms


  ### Circadian Rhythms

  The 24-hour sleep-wake cycle affects overall alertness throughout the day.


  ### Ultradian Rhythms

  Shorter cycles within the circadian rhythm that create moment-to-moment
  variations in energy and focus.


  ### Integration

  Both rhythms interact - ultradian peaks during circadian highs are more
  pronounced than those during circadian lows.


  ## Related Concepts


  - **Biological Prime Time**: The specific hours when your ultradian peaks
  align with circadian highs

  - **Energy Management**: Using ultradian awareness to allocate tasks
  appropriately

  - **90-Minute Rule**: Work session length based on ultradian rhythms


  ## Benefits of Alignment


  Working with rather than against ultradian rhythms can:

  - Reduce mental fatigue

  - Increase sustainable productivity

  - Improve work quality

  - Decrease stress

  - Support better work-life balance
