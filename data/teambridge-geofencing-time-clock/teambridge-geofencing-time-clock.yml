markdown: >-
  ## Overview


  Teambridge provides a geofencing time clock solution specifically designed for
  managing deskless and field-based workforces. The platform ensures employees
  can only clock in when physically present at designated job sites, preventing
  time theft and ensuring accurate attendance records.


  ## Key Features


  - **Geofence Time Clock** - Set virtual boundaries around work sites for
  location-based attendance

  - **GPS Tracking** - Monitor employee locations during work hours

  - **Mobile Punch** - Clock in/out via smartphone from approved locations

  - **Automated Alerts** - Notifications when employees enter or exit geofenced
  areas

  - **Real-Time Visibility** - See which employees are on-site in real-time

  - **Job Costing** - Track labor costs by location and project

  - **Overtime Management** - Automatic overtime calculations and alerts

  - **Payroll Integration** - Export time data to payroll systems


  ## Geofencing Technology


  Teambridge allows managers to create geofences with customizable radius
  (typically 100-2,500 meters) around work locations. Employees can only punch
  in when their mobile device is within the geofenced area, ensuring they're
  physically on-site when recording time.


  ## Benefits for Field Teams


  - Prevent buddy punching and time theft

  - Verify employees are at correct job sites

  - Track arrival and departure times automatically

  - Reduce manual timesheet errors

  - Improve job costing accuracy

  - Simplify compliance with labor laws


  ## Industries Served


  - Construction and contracting

  - Field service and maintenance

  - Healthcare (home health, visiting nurses)

  - Property management

  - Landscaping and outdoor services

  - Any business with mobile or field-based workers


  ## Pricing


  Teambridge offers tiered pricing based on team size and features needed, with
  plans designed for small businesses through enterprise organizations.
