markdown: >-
  ## Overview


  Chronotype-Based Scheduling aligns work activities with an individual's
  natural chronotype.


  ## Three Chronotypes


  - Morning Types (Larks): Peak performance early morning

  - Evening Types (Owls): Peak performance late afternoon/evening  

  - Intermediate Types: Performance peaks 4-6 hours after waking


  ## Benefits


  20-30% productivity improvements and significant stress reductions when work
  aligns with chronotype.


  ## Pricing


  Free methodology based on chronobiology research.
