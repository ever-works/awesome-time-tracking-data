markdown: >-
  ## What are OKRs?


  OKRs (Objectives and Key Results) is a goal-setting framework that helps
  organizations define and track objectives and their outcomes.


  ## Structure


  **Objective**: What you want to achieve (qualitative, inspirational)


  **Key Results**: How you'll measure success (quantitative, measurable)


  ### Formula:


  I will **[Objective]** as measured by **[Key Results]**.


  ## Example


  **Objective:** Improve customer satisfaction


  **Key Results:**

  - Increase NPS score from 45 to 60

  - Reduce support ticket response time to under 2 hours

  - Achieve 90% positive feedback rating


  ## Time Horizons


  - **Company OKRs**: Annual

  - **Team OKRs**: Quarterly

  - **Individual OKRs**: Quarterly


  ## Characteristics of Good OKRs


  ### Objectives Should Be:

  - Aspirational and inspiring

  - Qualitative

  - Time-bound

  - Actionable by the team


  ### Key Results Should Be:

  - Measurable and quantifiable

  - Specific and time-bound

  - Aggressive yet realistic

  - Verifiable


  ## Benefits


  - Alignment across organization

  - Focus on priorities

  - Transparency

  - Measurable outcomes

  - Ambitious goal setting

  - Regular check-ins


  ## OKR Cycle


  1. **Set**: Define OKRs (quarterly)

  2. **Track**: Weekly check-ins

  3. **Review**: Mid-quarter review

  4. **Grade**: End-of-quarter scoring

  5. **Reflect**: Learn and improve


  ## Grading OKRs


  Typical scale: 0.0 to 1.0

  - 0.7-0.8: Strong performance

  - 1.0: May have sandbagged (set too easy)

  - < 0.4: Need to reassess approach


  ## Common Mistakes


  - Too many OKRs (limit to 3-5 objectives)

  - Key Results not measurable

  - Setting as stretch goals then treating as commitments

  - Not reviewing regularly

  - Top-down only (should include bottom-up)


  ## Time Tracking Connection


  - Track time spent on activities aligned with OKRs

  - Ensure time allocation matches priorities

  - Identify misalignment between time and goals

  - Adjust schedule to support key results


  ## Related Concepts


  - SMART Goals

  - KPIs (Key Performance Indicators)

  - Balanced Scorecard

  - MBO (Management by Objectives)
