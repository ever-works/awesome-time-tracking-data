markdown: >-
  ## Overview


  Finch Self Care is a wellness app that helps you build healthy habits by
  taking care of a cute virtual bird as you care for yourself. It's a mindful
  productivity app that blends task management with self-care.


  ## Core Features


  ### Gamified Goal Tracking


  - Care for a virtual pet bird that grows as you complete tasks

  - Emotional wellness check-ins integrated with task completion

  - Positive reinforcement through pet interaction


  ### Self-Care Integration


  - Daily habit tracking

  - Mood and emotion monitoring

  - Mental health support resources

  - Mindfulness exercises


  ### Task Management


  - Build to-do lists with self-care focus

  - Set personal goals and track progress

  - Celebrate achievements through virtual pet rewards


  ## User Experience


  Users report that Finch helps with:


  - Building consistent daily routines

  - Being a better person through self-reflection

  - Maintaining accountability in a gentle, non-judgmental way

  - Managing mental health and wellness


  ## Target Audience


  - Individuals focusing on mental health and wellness

  - People who respond well to gamification

  - Those seeking a gentle approach to productivity

  - Users wanting to combine task completion with self-care


  ## Availability


  Free app with optional premium features. Available on iOS and Android.


  ## Pricing


  Free with in-app purchases for premium features.
