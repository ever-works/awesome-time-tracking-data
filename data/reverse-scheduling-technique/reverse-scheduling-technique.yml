name: Reverse Scheduling Technique
description: Planning approach that starts with desired end time and works
  backward to allocate tasks. Used by students and professionals to prevent work
  expanding to fill all available time. Creates fixed endpoint pressure that
  enhances focus and prevents perfectionism, based on Parkinson's Law reversal.
source_url: https://www.scotthyoung.com/blog/2007/03/23/how-to-finish-your-work-one-hour-per-day/
category: Time Management Technique
tags:
  - scheduling
  - deadlines
  - parkinsons-law
  - constraints
markdown: >-
  ## Overview


  Reverse Scheduling starts with fixed end time and schedules backward, creating
  natural constraint.


  ## Process


  1. Decide when work must end (e.g., 5pm)

  2. List required tasks

  3. Estimate time for each

  4. Schedule backward from end time

  5. Start at calculated start time

  6. Stop at fixed end regardless


  ## Benefits


  - Prevents work expansion

  - Forces prioritization

  - Eliminates perfectionism

  - Creates urgency

  - Protects personal time

  - Increases efficiency


  ## Applications


  - Fixed-schedule productivity

  - Exam preparation

  - Project completion

  - Work-life balance


  ## Psychological Effect


  Fixed endpoint creates productive pressure without stress of open-ended work.


  ## Pricing


  Free technique.
