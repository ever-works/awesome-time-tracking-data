markdown: >-
  ## Overview


  Indy is a comprehensive project management software designed specifically for
  freelancers, offering tools to help land new clients, manage projects, track
  time, and handle invoicing all in one platform.


  ## Features


  - **Freelancer Hourly Rate Calculator**: Tool to help freelancers discover the
  right rate for their circumstances

  - **Pricing Worksheet**: Downloadable freelancer hourly pricing worksheet to
  help calculate appropriate rates

  - **Proposal Templates**: Professional proposal templates to land new clients

  - **Contract Templates**: Legally-vetted contract templates for various
  freelance engagements

  - **Time Tracking**: Track billable hours on projects and tasks

  - **Task Management**: Organize and manage project tasks efficiently

  - **Invoicing**: Automated invoicing system to get paid faster

  - **Client Management**: Centralized client information and communication


  ## Pricing Calculation


  Indy's rate calculator helps freelancers determine appropriate hourly rates
  based on factors including experience level, location, desired annual income,
  billable hours, and industry standards.


  ## Target Users


  Ideal for independent contractors, consultants, designers, developers,
  writers, and other freelance professionals who need an integrated solution for
  client management, project tracking, and financial operations.


  ## Benefits


  Simplifies the freelance business workflow by providing all essential tools in
  one platform, reducing the need for multiple software subscriptions and
  streamlining administrative tasks.
