markdown: >-
  ## Overview


  In 2026, RescueTime has evolved from traditional productivity tracking to
  emphasize intelligent rest recommendations and data-driven wellbeing metrics.
  This strategic pivot addresses the growing challenge of burnout in
  AI-dominated workplaces.


  ## 2026 Strategic Focus


  **From**: Maximum productivity measurement


  **To**: Sustainable productivity and wellbeing


  **Why**: Cognitive fatigue from constant digital work, especially among remote
  workers and overloaded digital professionals


  ## New Capabilities


  **Intelligent Rest Recommendations**:

  - AI analyzes work patterns and intensity

  - Suggests optimal break timing

  - Prevents overwork before exhaustion

  - Personalized to individual rhythms


  **Burnout Prevention Alerts**:

  - Real-time cognitive fatigue detection

  - Automated warnings when patterns suggest burnout risk

  - Proactive intervention rather than reactive measurement

  - Integration with calendar to suggest lighter days


  **Data-Driven Wellbeing Metrics**:

  - Beyond productivity scores to health indicators

  - Work-life balance measurements

  - Recovery time tracking

  - Sustainable pace monitoring


  ## Core Features (Maintained)


  **Automatic Time Tracking**:

  - Silent background tracking of apps and websites

  - No manual timers needed

  - Categorization by productivity status


  **Focus Sessions**:

  - Block distracting apps and websites

  - Maintain attention on important work

  - Alerts when straying to distractions


  ## 2026 Context


  The evolution reflects:

  - Post-pandemic remote work sustainability challenges

  - AI tools creating "always-on" expectations

  - Growing recognition of burnout epidemic

  - Shift from productivity maximization to optimization

  - Need for tech that protects rather than exploits attention


  ## Target Audience (2026)


  Particularly valuable for:

  - Remote workers lacking natural boundaries

  - Digital professionals facing cognitive overload

  - Productivity-driven teams at burnout risk

  - Organizations prioritizing sustainable performance


  ## Pricing (2026)


  Solo plan: $6.50/month (annual) or $12/month (monthly)


  Team plan: $6/month per member (annual) or $9/month (monthly)


  All plans include 14-day free trial.


  ## Platform Support


  Windows, macOS, Android, web. iOS support for certain features.


  ## Competitive Positioning


  While competitors focus on:

  - Maximizing tracked hours

  - Increasing productivity scores

  - Employee monitoring


  RescueTime 2026 emphasizes:

  - Sustainable work patterns

  - Preventing burnout

  - Healthy digital habits

  - Long-term performance over short-term gains


  This repositioning acknowledges that in 2026, the challenge isn't getting
  people to work more—it's helping them work sustainably in an increasingly
  demanding digital environment.
