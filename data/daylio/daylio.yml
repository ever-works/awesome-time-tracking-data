markdown: >-
  ## Overview


  Daylio is a self-care bullet journal and mood tracker app that enables users
  to track their emotional and physical states without writing lengthy journal
  entries. By tapping mood icons and selecting activities, users can create a
  comprehensive record of their daily life in seconds.


  ## Core Features


  ### Mood & Activity Tracking


  - Quick mood entry with customizable mood icons

  - Activity selection from personalized lists

  - Two-tap entry system for minimal friction

  - Build your own activity library

  - Icon-based interface requires no writing


  ### Scales Feature (New in 2026)


  - Track sleep quality with simple sliders

  - Monitor stress levels throughout the day

  - Log energy levels for productivity insights

  - Pain tracking for health management

  - Custom scales for any metric you want to monitor


  ### Analytics & Insights


  - Visual statistics showing mood patterns over time

  - Activity correlation with mood states

  - Streak tracking for consistency

  - Monthly and yearly summaries

  - Export data for deeper analysis


  ## Time Management Applications


  ### Energy Management


  - Identify times of day with highest energy

  - Correlate activities with energy levels

  - Discover energy-draining vs. energizing activities

  - Optimize daily schedule based on energy patterns


  ### Productivity Correlation


  - Track which activities lead to better moods

  - Identify patterns between activities and well-being

  - Make data-driven decisions about time allocation

  - Understand impact of rest and breaks


  ## Platform Availability


  - iOS (iPhone and iPad)

  - Android

  - Web version for desktop access


  ## Privacy


  - Data stored locally on device

  - Optional cloud backup

  - No account required for basic use

  - Export your data anytime


  ## Pricing


  - Free version with core features

  - Premium subscription unlocks:
    - Advanced statistics
    - Multiple entries per day
    - Mood reminders
    - Photo attachments
    - PDF export
    - Custom mood icons and activities

  ## User Base


  One of the most popular mood tracking apps in 2026, consistently ranking in
  top productivity and health app lists.


  ## Use Cases


  - Mental health awareness and monitoring

  - Energy level tracking for productivity

  - Habit formation and tracking

  - Lifestyle experimentation and optimization

  - Work-life balance assessment

  - Stress management

  - Sleep pattern correlation
