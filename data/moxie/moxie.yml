markdown: >-
  ## Overview


  Moxie offers a freelance time tracking tool that lets you log hours, stay
  organized, and get paid faster without the stress of manual timesheets. While
  tools like Harvest and Toggl help you track hours, Moxie connects those hours
  to your invoices, projects, and client records automatically.


  ## Key Features


  ### Time Tracking


  - **Mobile & Desktop Access**: Available on both desktop and mobile, allowing
  you to log time, add notes, and even invoice right from your phone whether
  you're at your desk, in a café, or running between meetings

  - **Integration with Invoicing**: Connects tracked hours to invoices,
  projects, and client records automatically

  - **Flexible Tracking Options**: Supports manual time entry and adjustments,
  so you can add or edit time after the fact

  - **Real-time and Manual Tracking**: Track what you're doing with your time in
  real time or manually add it later


  ### Project Management


  - Every tracked entry can be tied to a project, client, or deliverable

  - Everything is already organized and searchable for easy review

  - Project-specific tracking helps explain time spent to clients


  ### Team Collaboration


  - Supports collaborators and team members

  - Each person can log their own time

  - Everything rolls up into shared reports or collective invoices

  - No messy spreadsheets or manual tabulations


  ### Analytics & Reporting


  - Combines tracked time with invoices to help calculate effective hourly rate

  - Comprehensive reporting for better business insights


  ### Additional Features


  - Client management (CRM for freelancers)

  - Invoicing and accounting features

  - Project management tools

  - Proposal and contract management


  ## Best Use Cases


  - Solo freelancers managing multiple clients

  - Small freelance teams needing collaboration

  - Service professionals requiring integrated time tracking and invoicing

  - Consultants wanting to track effective hourly rates


  ## Platform Availability


  Moxie is designed as an all-in-one platform specifically for freelancers,
  available on iOS, Android, and desktop platforms.
