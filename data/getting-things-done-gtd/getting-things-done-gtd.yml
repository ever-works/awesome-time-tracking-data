markdown: >-
  ## Overview


  Getting Things Done (GTD) is a personal productivity system developed by David
  Allen and published in a book of the same name in 2001. GTD is the work-life
  management system that alleviates overwhelm, and instills focus, clarity, and
  confidence. A revised edition was released in 2015 to reflect the changes in
  information technology during the preceding decade.


  ## Core Premise


  The GTD method rests on the idea of moving all items of interest, relevant
  information, issues, tasks and projects out of one's mind by recording them
  externally and then breaking them into actionable work items with known time
  limits.


  Allen states **"there is an inverse relationship between things on your mind
  and those things getting done"**.


  Allen's premise is simple: our productivity is directly proportional to our
  ability to relax. Only when our minds are clear and our thoughts are organized
  can we achieve effective productivity and unleash our creative potential.


  ## The Five Steps of GTD


  ### 1. Capture


  Collect what has your attention. Use an in-tray, notepad, or voice recorder to
  capture 100% of everything that has your attention. Little, big, personal and
  professional—all your to-do's, ideas, and projects need to get out of your
  head and into a collection tool.


  **Key principle:** Your mind is for having ideas, not holding them.


  ### 2. Clarify


  Process what it means. Is it actionable? If no, trash it, incubate it, or file
  it for reference. If yes, decide the very next action required. If it takes
  less than 2 minutes, do it now. If not, delegate it or defer it.


  **Questions to ask:**

  - What is it?

  - Is it actionable?

  - What's the next action?


  ### 3. Organize


  Put it where it belongs. Park reminders of your categorized content in
  appropriate places. Put action reminders on the right lists, store reference
  material, add items to your calendar, etc.


  **Key lists:**

  - Next Actions (organized by context)

  - Projects (outcomes requiring multiple steps)

  - Waiting For (delegated items)

  - Someday/Maybe (future possibilities)

  - Calendar (time-specific actions)

  - Reference (non-actionable information)


  ### 4. Reflect


  Review frequently. Look over your lists as often as necessary to trust your
  choices about what to do next. Conduct a Weekly Review to get clear, get
  current, and get creative.


  **Weekly Review essentials:**

  - Review all your lists

  - Update project status

  - Process all inboxes to zero

  - Plan the week ahead

  - Identify next actions


  ### 5. Engage


  Simply do. Use your system to take appropriate actions with confidence.


  **Decision factors:**

  - Context (where you are, tools available)

  - Time available

  - Energy available

  - Priority


  ## Key Concepts


  ### The Two-Minute Rule


  If an action will take less than two minutes, it should be done at the moment
  it's defined.


  ### Natural Planning Model


  1. Define purpose and principles

  2. Outcome visioning

  3. Brainstorming

  4. Organizing

  5. Identifying next actions


  ### Contexts


  Organize next actions by context (where or with what you need to complete
  them):

  - @Computer

  - @Office

  - @Home

  - @Phone

  - @Errands

  - @Anywhere


  ### Projects vs. Next Actions


  - **Project**: Any desired outcome requiring more than one action step

  - **Next Action**: The very next physical, visible activity that needs to
  happen to move something toward closure


  ## Benefits of GTD


  - **Reduced Stress**: Nothing on your mind means reduced anxiety

  - **Increased Productivity**: Clear next actions eliminate procrastination

  - **Better Focus**: Know what to work on and when

  - **Improved Clarity**: See all commitments clearly

  - **Enhanced Creativity**: A clear mind is more creative

  - **Greater Control**: Feel in command of your life and work


  ## Impact and Popularity


  For over three decades, GTD has helped more than 3 million people bring
  clarity, focus, and ease to their work and life.


  - In 2005, Wired called GTD a "new cult for the info age", describing the
  enthusiasm among knowledge workers and IT professionals

  - In 2007, Time magazine called Getting Things Done the self-help business
  book of its time


  ## Implementation Challenges


  ### Initial Setup


  GTD requires significant upfront time investment to:

  - Collect everything

  - Process all items

  - Set up organizational system

  - Establish habits


  **Solution:** Start with current inputs, gradually expanding to backlog.


  ### Maintenance


  Requires ongoing discipline for:

  - Daily processing

  - Weekly reviews

  - System updates


  **Solution:** Schedule reviews as non-negotiable appointments.


  ### Complexity


  Can feel overwhelming with many lists and categories.


  **Solution:** Start simple, add complexity only as needed.


  ## GTD Tools


  GTD can be implemented with:


  ### Analog Tools

  - Paper and pen

  - File folders

  - Tickler files (43 folders system)

  - Index cards


  ### Digital Tools


  Popular GTD apps include:

  - Todoist

  - OmniFocus

  - Things

  - Nirvana

  - Evernote

  - Trello

  - Asana


  **Key requirement:** Tool must support contexts, projects, and next actions.


  ## Best Practices


  - **Capture Everything**: Don't trust your memory

  - **Process Regularly**: Empty inboxes daily

  - **Weekly Review**: Non-negotiable for system health

  - **Single Repository**: All commitments in one system

  - **Keep It Current**: Outdated lists kill trust in the system

  - **Start Small**: Master basics before adding complexity


  ## GTD for Teams


  While designed for individuals, GTD principles apply to teams:

  - Shared project lists

  - Clear next actions for each team member

  - Regular reviews and updates

  - Defined workflows


  ## When GTD Works Best


  - Knowledge workers with many commitments

  - People feeling overwhelmed

  - Anyone juggling multiple projects

  - Professionals needing clarity

  - People wanting stress-free productivity

  - Those who forget commitments


  ## Modifications and Variations


  - **GTD Lite**: Simplified version for beginners

  - **Zen to Done (ZTD)**: Leo Babauta's simplified approach

  - **Autofocus**: Mark Forster's variation

  - **Final Version**: Another Mark Forster system


  ## Integration with Other Methods


  GTD complements:

  - **Pomodoro**: Use for executing next actions

  - **Time Blocking**: Schedule context-specific work

  - **Eisenhower Matrix**: Determine project priorities

  - **Eat the Frog**: Identify most important next action


  ## Measuring Success


  - Mind like water (calm readiness)

  - Reduced anxiety about forgotten tasks

  - Confidence in current activity choice

  - Completed projects

  - Successful Weekly Reviews

  - Empty inboxes

  - Clear next actions for all projects
