markdown: >-
  ## Overview


  Timepage is a clean and aesthetically pleasing calendar app for iOS devices
  with a sleek and user-friendly interface that makes it easy to keep track of
  your schedule, whether you have multiple calendars or use popular services
  like iCloud, Google Calendar, or Outlook.


  ## Features


  - Beautiful, minimal interface design

  - Multiple calendar account support (iCloud, Google, Exchange, Outlook)

  - Weather predictions for each day

  - Heat map visualization of your schedule density

  - Time-to-leave notifications based on traffic

  - Customizable widgets for iOS home screen

  - Intelligent notifications

  - Travel time calculations

  - Color-coded events and calendars

  - Week and month views

  - Event search functionality

  - Moleskine-inspired design aesthetic


  ## Design Philosophy


  Timepage emphasizes visual clarity and simplicity, drawing from Moleskine's
  heritage in analog planning tools. The interface is designed to reduce
  cognitive load while providing all necessary scheduling information at a
  glance.


  ## Integration with Moleskine Ecosystem


  For those who value seamless integration with Moleskine's other digital tools,
  Timepage connects with Actions by Moleskine to combine calendar events with
  task management.


  ## Brand Transition


  Important note: The brand collaboration with Moleskine concluded in 2025 and
  the app is returning to its original brand, Bonobo, in 2026.


  ## Ideal For


  - iOS users who prioritize design aesthetics

  - Professionals needing quick schedule overview

  - Users who want weather-integrated planning

  - Moleskine ecosystem users

  - Anyone seeking a beautiful calendar experience


  ## Pricing


  Starts at $2.49/month with no free version beyond a trial period. One-time
  purchase options may also be available.
