markdown: >-
  ## Overview


  Breathe is a cloud-based HR management system founded in the UK that helps
  small and medium businesses manage their workforce more efficiently. While
  it's a full HR platform, its time and attendance features make it a strong
  alternative to dedicated time-off tracking tools like Timetastic.


  ## Time & Attendance Features


  ### Holiday/Time-Off Management

  - Employee self-service holiday requests

  - Manager approval workflows

  - Automatic holiday entitlement calculations

  - Carryover rules and pro-rata calculations

  - Visual team calendar showing who's off when

  - Integration with UK statutory leave requirements


  ### Absence Tracking

  - Sick leave recording and reporting

  - Absence patterns and analytics

  - Bradford Factor calculations for absence monitoring

  - Customizable absence types (sick, personal, bereavement, etc.)

  - Return-to-work interview tracking


  ### Time Tracking

  - Basic timesheet functionality

  - Working hours logging

  - Overtime tracking

  - Flexible working arrangements management


  ## Additional HR Features


  Beyond time tracking, Breathe offers:

  - Employee database and document storage

  - Performance management and reviews

  - Training and development tracking

  - Expense management

  - Recruitment and onboarding tools

  - Reporting and analytics


  ## Regional Focus


  Breathe is particularly strong for UK-based businesses due to:

  - Built-in UK employment law compliance

  - Statutory holiday calculations

  - Integration with UK payroll systems

  - GDPR-compliant data handling


  ## Target Market


  - UK small to medium businesses (10-250 employees)

  - Companies wanting affordable HR software

  - Organizations transitioning from spreadsheets

  - Businesses needing basic time-off tracking within broader HR context


  ## Comparison to Timetastic


  **Breathe**: Full HR platform with time-off as one feature

  **Timetastic**: Dedicated holiday/absence tracking specialist


  Breathe makes sense if you need multiple HR functions; Timetastic if you only
  need time-off tracking.


  ## Pricing


  Breathe pricing starts at approximately £21-25/month for small teams, scaling
  with employee count. Significantly more expensive than single-purpose tools
  like Timetastic, but covers much broader functionality.


  ## Platform


  Cloud-based web application with mobile apps for iOS and Android. API
  available for integrations.
