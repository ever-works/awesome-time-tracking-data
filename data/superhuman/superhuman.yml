markdown: >-
  ## Overview


  Superhuman is a premium email client designed to be the fastest way to use
  email. It features a keyboard-driven interface that mimics text messaging more
  than traditional email prompting, encouraging rapid responses and efficient
  inbox management.


  ## Features


  - **Keyboard-First Interface**: Fully navigable without a mouse, modeled after
  text messaging interfaces for faster communication

  - **Inbox Zero Gamification**: Rewards users with nature scene photos upon
  reaching an empty inbox, encouraging daily email processing

  - **Split Inbox**: Organize emails into multiple focused views for different
  workflows

  - **Read Receipts**: Know when recipients open your emails

  - **Scheduled Sends**: Time email delivery for optimal engagement

  - **Instant Undo Send**: Revoke sent emails shortly after dispatch

  - **Calendar Integration**: Built-in calendar with AI-powered scheduling
  features (Superhuman Calendar)

  - **Follow-Up Reminders**: Automated prompts for emails requiring responses

  - **Snippets**: Pre-written email templates for common responses

  - **Email Triaging**: Quick swipe and keyboard shortcut workflows for rapid
  inbox processing


  ## Pricing


  - $30/month subscription


  ## Use Cases


  - Professionals who receive high volumes of email and need to maintain rapid
  response times

  - Teams seeking to improve communication responsiveness and reliability

  - Users who value inbox zero as a daily productivity practice
