markdown: >-
  ## Overview


  Parim is a specialized time tracking and workforce management application
  designed for shift-based industries including event staffing, security
  services, hospitality, and retail. It's particularly effective for managing
  teams across multiple locations with GPS verification.


  ## Features


  - **GPS Geofencing** - Verify employee attendance at assigned locations

  - **Shift Scheduling** - Create and manage shift schedules for multiple
  locations

  - **Mobile Time Clock** - Clock in/out via smartphone with location
  verification

  - **Real-Time Attendance** - Live view of who's working where

  - **Automated Reminders** - Shift notifications and clock-in reminders

  - **Timesheet Approval** - Digital approval workflow for managers

  - **Break Management** - Track and enforce required breaks

  - **Payroll Export** - Export timesheets for payroll processing

  - **Client Billing** - Track time by client and location for billing

  - **Multi-Location Support** - Manage teams across unlimited locations


  ## Industries


  - Event staffing

  - Security services

  - Hospitality

  - Retail

  - Facility management

  - Cleaning services


  ## Pricing


  Custom pricing based on team size and features required, with a free trial
  available.
