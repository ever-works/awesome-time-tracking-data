markdown: >-
  ## Overview


  Habit stacking pairs new time management behaviors with existing habits,
  creating automatic triggers that make new practices stick. Developed by James
  Clear in Atomic Habits, this technique leverages existing neural pathways to
  build sustainable routines.


  ## The Formula


  **After [CURRENT HABIT], I will [NEW HABIT].**


  ### Time Management Examples

  - After I pour my morning coffee, I will review my top 3 priorities

  - After I close my laptop, I will log my time for the day

  - After I finish lunch, I will time-block my afternoon

  - After I sit at my desk, I will turn on my focus timer


  ## Why It Works


  Existing habits already have strong neural pathways. By linking new behaviors
  to them:

  - Reduces decision fatigue (automatic trigger)

  - Leverages existing momentum

  - Makes starting easier

  - Creates clear implementation intention


  ## Building Time Management Stacks


  ### Morning Stack

  1. After I wake up...

  2. Then I review my calendar...

  3. Then I identify my most important task...

  4. Then I start my deep work timer


  ### End-of-Day Stack

  1. After I finish my last work task...

  2. Then I review completed items...

  3. Then I plan tomorrow's priorities...

  4. Then I close all work apps


  ## Common Mistakes

  - Stacking on unreliable triggers

  - Making new habit too complex

  - Breaking the chain (missing triggers)

  - Not celebrating completion
