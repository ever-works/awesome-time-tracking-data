markdown: >-
  ## Overview


  1Password is a password management application that securely stores and
  manages passwords, passkeys, credit card information, and other sensitive
  data. It works across all devices and platforms, providing a single secure
  vault for credentials.


  ## Features


  - Secure password generation and storage

  - Autofill across browsers and devices

  - Passkey support

  - Secure sharing of credentials within families and teams

  - Two-factor authentication support

  - Travel Mode for hiding sensitive data while crossing borders

  - Watchtower security monitoring for compromised passwords

  - Works on any device and platform


  ## Pricing


  From $2.99/month for individuals. Family plans from $4.49/month. Business and
  enterprise pricing available.
