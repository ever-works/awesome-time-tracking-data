name: Energy Budget Planning
description: Time management approach that budgets energy rather than hours,
  recognizing that available mental and physical energy varies throughout the
  day. Matches task intensity to available energy levels, scheduling high-energy
  tasks during peak periods and low-energy tasks during natural dips for
  sustainable productivity.
source_url: https://hbr.org/2007/10/manage-your-energy-not-your-time
category: Time Management Practice
tags:
  - energy-management
  - personalization
  - sustainable-productivity
  - well-being
markdown: >-
  ## Overview


  Energy Budget Planning shifts focus from managing hours to managing energy,
  recognizing energy as the more constrained and valuable resource.


  ## Core Principle


  Time is finite and the same for everyone, but energy levels vary dramatically
  throughout the day. Managing energy yields better results than managing time.


  ## Four Energy Dimensions


  ### Physical Energy

  - Nutrition, exercise, sleep

  - Foundation for all other energy types


  ### Emotional Energy

  - Quality of emotions affects performance

  - Positive emotions enhance energy


  ### Mental Energy  

  - Focus and concentration capacity

  - Depletes with sustained use


  ### Spiritual Energy

  - Sense of purpose and meaning

  - Provides motivation and resilience


  ## Implementation


  1. Track energy levels throughout day

  2. Identify peak and trough periods

  3. Match task demands to available energy

  4. Schedule recovery and renewal

  5. Optimize energy sources (sleep, nutrition, exercise)


  ## Benefits


  - Sustainable high performance

  - Reduced burnout risk

  - Better work quality

  - Improved well-being


  ## Pricing


  Free practice based on Harvard Business Review research.
