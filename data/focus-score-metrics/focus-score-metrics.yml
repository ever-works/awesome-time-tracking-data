markdown: >-
  ## Overview


  Focus Score is a quantitative metric (typically 0-100) that measures daily
  focus quality based on work patterns, distractions, and deep work time.


  ## Calculation Factors


  **Deep Work Duration**

  Total time in focused, uninterrupted work.


  **Context Switching**

  Frequency of task/application switching.


  **Distraction Levels**

  Time spent on non-productive activities.


  **Break Patterns**

  Quality and timing of breaks.


  **Flow States**

  Periods of sustained concentration.


  ## Benefits


  - Objective productivity measurement

  - Day-to-day comparison

  - Trend identification

  - Gamification motivation

  - Goal setting baseline


  ## Leading Platforms


  - Rize (Focus Score)

  - RescueTime (Productivity Pulse)

  - Timely (Focus time analytics)


  ## Usage


  Users can:

  - Track daily scores

  - Identify patterns

  - Set improvement goals

  - Compare weeks/months

  - Correlate with work outcomes


  ## Pricing


  Included in AI-powered productivity tracking tools.
