markdown: >-
  ## Overview


  In 1967, Charles Hummel published a booklet called "Tyranny of the Urgent,"
  which quickly became a business classic. With over one million copies in
  print, this classic has transformed the minds and hearts of generations of
  professionals and leaders.


  ## Core Concept: Important vs. Urgent


  Hummel argues that there is a regular tension between things that are urgent
  and things that are important—and far too often, the urgent wins.


  ### The Nature of Urgent vs. Important


  The urgent will really fight, claw, and scream for attention, pleading for our
  time and even making us think we've done the right thing. However, the
  important patiently and quietly waits for us to realize its significance.


  ### Key Warning


  Hummel warned that "your greatest danger is letting the urgent things crowd
  out the important."


  ## Practical Applications


  ### In Business

  In the business world, demands of your boss, client, or petty office
  relationships can often take priority over things that actually matter, like
  thoroughly completing a task or building unity in a work team.


  ### Daily Life

  The concept applies to all areas of life where immediate pressures can
  override long-term priorities and values.


  ## Influence and Legacy


  President Eisenhower expressed similar ideas, and later, using Eisenhower's
  principles, Stephen Covey created a decision matrix in his popular book "The 7
  Habits of Highly Effective People."


  The urgent/important framework has become a foundational concept in modern
  time management and productivity thinking.


  ## About the Author


  Charles E. Hummel was:

  - Former president of Barrington College in Rhode Island

  - Director of faculty ministries for InterVarsity Christian Fellowship, U.S.A.

  - Author and speaker on productivity and spiritual life integration


  ## Publication Details


  Originally published in 1967, with a revised edition in 1994. Available as a
  booklet through InterVarsity Press.


  ## Impact


  The booklet's enduring popularity and influence demonstrate the universal
  challenge of balancing urgent demands with important priorities, making it
  relevant across decades and cultures.
