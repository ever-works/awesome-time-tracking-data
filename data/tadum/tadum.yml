markdown: >-
  ## Overview


  Tadum is a cloud-based meeting agenda platform designed to help teams get
  organized and stay accountable through online shared meeting agendas. The tool
  is specifically built for remote teams who need structured, productive
  meetings with clear action items and follow-through.


  ## Key Features


  ### **Flexible Agenda Structure**

  Every agenda can have any number or combination of five section types:

  - **Todos**: Action items and tasks

  - **Attachments**: Relevant documents and files

  - **Discussions**: Topics to address

  - **Updates**: Status reports and announcements

  - **Metrics**: KPIs and data to review


  ### **Accountability & Follow-Through**

  Tadum agendas help teams stay accountable by:

  - Rolling forward any open todos and discussions automatically

  - Creating the next meeting agenda with unresolved items so they don't get
  lost

  - Tracking action items with assigned owners

  - Setting due dates and reminders for timely completion


  ### **Real-Time Collaboration**

  - See who has the agenda open during meetings

  - Watch team members make changes in real-time

  - Collaborate before, during, and after meetings

  - Enable asynchronous participation for distributed teams


  ### **Automatic Meeting Minutes**

  - Read-only meeting minutes are automatically created at the end of each
  meeting

  - All minutes accessible from one central online location

  - Complete history of decisions and action items

  - No manual note-taking required


  ### **Agenda Management**

  - Set priorities and time limits for each agenda item

  - Structure recurring meetings efficiently

  - Customize agendas for different meeting types:
    - One-on-one meetings
    - Weekly team meetings
    - Monthly reviews
    - Project management meetings
    - Remote standups
    - Gazelles/EOS weekly meetings

  ## Meeting Types Supported


  - **Weekly Meetings**: Regular team syncs and updates

  - **Monthly Meetings**: Strategic reviews and planning

  - **One-on-One Meetings**: Manager-employee check-ins

  - **Project Management Meetings**: Project status and planning

  - **Remote Meetings**: Distributed team collaboration

  - **Gazelles Meetings**: Following the Gazelles/Scaling Up methodology


  ## Integrations


  - **Slack**: Meeting notifications and updates

  - **Google Calendar**: Calendar synchronization

  - **Microsoft Teams**: Meeting integration

  - **Other productivity tools**: Various integrations available


  ## Platform Availability


  - Web-based application

  - Accessible from any browser

  - Mobile-responsive design


  ## Benefits


  - **Improved Meeting Efficiency**: Structured agendas keep meetings on track

  - **Better Accountability**: Clear action items with owners and due dates

  - **Reduced Meeting Fatigue**: Well-prepared agendas mean shorter, more
  productive meetings

  - **Historical Record**: Complete archive of all meetings and decisions

  - **Remote-First Design**: Built specifically for distributed teams


  ## Use Cases


  **For Teams:**

  - Running regular team meetings

  - Managing distributed/remote teams

  - Following structured meeting methodologies (EOS, Gazelles, etc.)

  - Ensuring meeting follow-through


  **For Managers:**

  - Conducting effective one-on-ones

  - Tracking team progress and commitments

  - Building meeting consistency


  ## Pricing


  Pricing information available on the Tadum website with plans for teams of
  various sizes.
