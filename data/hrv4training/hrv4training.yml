markdown: >-
  ## Overview


  HRV4Training is a heart rate variability tracking application designed for
  athletes, coaches, and anyone interested in optimizing their training and
  recovery through daily HRV measurements and lifestyle tracking.


  ## Features


  - **Camera-Based HRV**: Measure HRV using your smartphone camera without
  additional hardware

  - **Daily Assessments**: Quick morning assessments to evaluate recovery status

  - **Training Advice**: Personalized recommendations on whether to train hard
  or take it easy

  - **Contextual Data**: Track sleep, travel, stress, and other factors
  affecting recovery

  - **Wearable Support**: Compatible with chest straps and wearables for
  enhanced accuracy

  - **Trend Analysis**: Long-term trend analysis to understand your baseline and
  variations

  - **Recovery Score**: Daily recovery score based on HRV and other metrics

  - **Training Load**: Track training load and correlate with recovery status

  - **Export Data**: Export data for analysis in other platforms

  - **Research-Backed**: Based on peer-reviewed scientific research on HRV


  ## Pricing


  One-time purchase of $9.99 for iOS or Android with lifetime access to all
  features and updates. No subscription required.
