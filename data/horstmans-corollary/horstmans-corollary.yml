markdown: >-
  ## Overview


  Horstman's Corollary to Parkinson's Law states: **'Work contracts to fit in
  the time we give it.'** This represents the reverse application of Parkinson's
  Law, suggesting that deliberately constraining time can increase productivity.


  ## Core Principle


  While Parkinson's Law observes that work expands to fill available time,
  Horstman's Corollary demonstrates that work will also contract when given less
  time. This means taking a task you think will take 4 hours and only allocating
  2 hours to it will likely result in completing the task under 2 hours.


  ## How It Works


  When faced with tighter time constraints, people naturally:

  - Eliminate perfectionism and over-refinement

  - Focus only on essential elements

  - Remove low-value activities

  - Work with greater intensity and focus

  - Make faster decisions


  ## Strategic Application


  ### Deliberate Time Constraints

  Strategically setting shorter deadlines can:

  - Increase focus and eliminate distractions

  - Combat analysis paralysis

  - Reduce scope creep

  - Improve decision-making speed

  - Force prioritization of truly important elements


  ### Constraints Breed Creativity

  Research shows that when people face scarcity, they give themselves the
  freedom to use resources in less conventional ways. Time constraints can
  actually make you more creative.


  ## Practical Implementation


  1. **Estimate the task duration** - Make your best guess

  2. **Cut it in half** - Allocate only 50% of estimated time

  3. **Eliminate the non-essential** - Identify what's truly necessary

  4. **Work with intensity** - Focus completely during allocated time

  5. **Accept good enough** - Resist perfectionism


  ## Difference from Procrastination


  Unlike the Stock-Sanford Corollary ('if you wait until the last minute, it
  only takes a minute'), Horstman's Corollary involves **intentional** time
  constraint setting rather than waiting until the last moment.


  ## Cautions


  - Don't apply to all tasks - some require proper time for quality

  - Balance efficiency with effectiveness

  - Ensure core requirements are still met

  - Monitor for signs of stress or burnout

  - Use strategically rather than constantly
