name: Voice-Activated Time Entry
description: Hands-free time tracking through voice commands to virtual
  assistants like Alexa, Siri, or Google Assistant, enabling time capture while
  driving, in meetings, or when hands are occupied. Voice entry reduces friction
  for mobile workers and multitaskers.
