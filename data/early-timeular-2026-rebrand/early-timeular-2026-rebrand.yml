markdown: >-
  ## Overview


  In 2026, Timeular rebranded as EARLY, maintaining their signature 8-sided
  physical time tracking cube (ZEI°) while evolving the software platform. The
  rebrand emphasizes making time tracking seamless and delivering insights
  faster and smarter for driving growth.


  ## What Changed


  **Name**: Timeular → EARLY


  **Positioning**: "Time tracking that doesn't make you want to cry"


  **Focus**: Enhanced AI-powered insights and automation


  **Community**: Over 150,000 users across 500+ teams globally


  ## What Stayed the Same


  **Physical Tracker (ZEI°)**:

  - 8-sided cube for tactile time tracking

  - Flip to different sides for different tasks/projects

  - Bluetooth connection to app

  - Makes time tracking interactive and physical


  **Core Features**:

  - Effortless time tracking

  - Leave and overtime management

  - Powerful insights through data visualization

  - Custom reports and data exports

  - GDPR-compliant automated tracking


  ## 2026 Enhancements


  **AI-Powered Insights**:

  - Advanced analytics available in higher tiers

  - Automated pattern recognition

  - Predictive time estimates

  - Intelligent recommendations


  **Team Features**:

  - Enhanced team time tracking

  - Billable rates management

  - Overtime tracking

  - Team analytics and reporting


  ## Pricing (2026)


  Starts at $7.50 per user/month for personal productivity, with progressive
  tiers offering:

  - Advanced billable rate features

  - Enhanced overtime tracking

  - AI-powered insights

  - Team management capabilities


  30-day free trial available for all plans.


  ## Notable Users


  Global community includes professionals at:

  - Google

  - Audi

  - McKinsey & Company


  Plus over 150,000 satisfied users worldwide.


  ## Limitations


  **No Browser Extension**: Cannot track time via browser extension


  **No Invoice Generation**: Doesn't create invoices from tracked time/cost
  reports


  **Limited Integrations**: Only integrates with Toggl, Jira, Harvest,
  iCalendar, Outlook, and Google Calendar


  ## The Rebrand Strategy


  The shift to EARLY reflects:

  - Evolution from pure time tracking to insights platform

  - Emphasis on speed and intelligence ("faster and smarter")

  - Professional positioning for growth-focused teams

  - Maintaining unique physical hardware differentiator


  The 2026 rebrand represents Timeular's maturation from innovative startup to
  established productivity platform while preserving the physical tracker that
  made them distinctive.
brand: EARLY
