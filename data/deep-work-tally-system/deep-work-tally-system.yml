markdown: >-
  ## Overview


  The Deep Work Tally System is Cal Newport's original methodology for tracking
  hours spent in a state of unbroken concentration, using simple pen-and-paper
  records kept each week.


  ## Core Methodology


  Newport suggests keeping a pen-and-paper tally of how many hours you spend on
  deep work, though you can automate your scoreboard with time-tracking tools
  like RescueTime.


  ## The 4 Disciplines Framework


  Newport applies the business "4 Disciplines of Execution" framework:


  ### 1. Focus on the Wildly Important

  Have a small number of really critical goals that you will pursue during Deep
  Work hours that return tangible and substantial professional benefits.


  ### 2. Act on Lead Measures

  Newport distinguishes between:

  - **Lag measures**: Outcomes you ultimately want to achieve

  - **Lead measures**: Behaviors that predict successful outcomes


  For deep work, lead measures typically include hours spent in distraction-free
  concentration.


  ### 3. Keep a Compelling Scoreboard

  Newport uses a simple calendar tracking Deep Work hours completed each day and
  circles the days that produce tangible results, such as solving a key problem.


  ### 4. Create a Cadence of Accountability

  Regular reviews of progress to maintain commitment.


  ## Evolution of the Method


  Newport discovered that deep work tallies were good for getting from almost no
  deep work to some deep work, but weren't strong enough to grab and protect the
  long swaths of time needed to dedicate 30-50% of working hours to deep work.


  He evolved toward "deep schedules" - proactively blocking deep work time in
  advance rather than just tallying it afterward.


  ## Implementation


  1. Use a physical calendar or notebook

  2. Record deep work hours daily

  3. Mark days with tangible accomplishments

  4. Review weekly totals

  5. Adjust scheduling based on patterns observed


  ## Pricing


  Free methodology requiring only pen and paper or simple tracking tools.
