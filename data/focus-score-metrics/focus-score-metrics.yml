name: Focus Score Metrics
description: Quantitative measurement in AI time tracking tools like Rize that
  scores daily focus quality on 0-100 scale. Calculated from deep work duration,
  context switching frequency, distraction levels, and break patterns. Provides
  objective metric for productivity tracking and improvement over time.
