markdown: >-
  ## Overview


  Zistemo's Timesheet Approval system is designed for service businesses and
  agencies that need flexible, project-specific approval workflows. Unlike
  one-size-fits-all approval systems, Zistemo allows customization of approval
  processes by project, ensuring the right stakeholders review the right
  timesheets while automating routine approvals to save time.


  ## Features


  ### Project-Specific Workflows

  - **Custom Workflows by Project**: Different approval rules for different
  projects

  - **Client-Specific Requirements**: Adapt workflows to client needs

  - **Department-Based Routing**: Route by organizational unit

  - **Role-Based Approval**: Different approvers based on project roles

  - **Multi-Client Management**: Separate workflows for each client

  - **Flexible Configuration**: Change workflows as projects evolve


  ### Automated Approvals

  - **Rule-Based Automation**: Auto-approve entries meeting criteria

  - **Threshold Settings**: Automatically approve time under specified limits

  - **Recurring Entry Approval**: Auto-approve regular, predictable entries

  - **Bulk Processing**: Approve multiple timesheets simultaneously

  - **Smart Suggestions**: AI-powered approval recommendations

  - **Exception-Only Review**: Manual review only for unusual entries


  ### Multi-Level Approval

  - **Sequential Approval**: Step-by-step approval chain

  - **Parallel Approval**: Multiple approvers review simultaneously

  - **Hierarchical Structure**: Manager → Department Head → Finance

  - **Conditional Routing**: Different paths based on entry characteristics

  - **Escalation Rules**: Automatic escalation if approval delayed

  - **Delegation Options**: Temporary authority transfer


  ### Approval Dashboard

  - **Centralized Queue**: All pending approvals in one view

  - **Filtering Options**: Sort by project, employee, date, or status

  - **Quick Preview**: See entry details without opening full timesheet

  - **Batch Actions**: Process multiple approvals with one action

  - **Priority Marking**: Flag urgent approvals

  - **Search Functionality**: Find specific timesheets quickly


  ### Notifications and Reminders

  - **Submission Alerts**: Notify approvers of new submissions

  - **Deadline Reminders**: Alert approaching approval deadlines

  - **Escalation Notifications**: Progressive reminders for overdue approvals

  - **Approval Confirmations**: Notify employees of approval status

  - **Rejection Notifications**: Alert employees of rejected entries with
  reasons

  - **Custom Schedules**: Configure notification frequency


  ### Timesheet Validation

  - **Automatic Checks**: Validate entries against business rules

  - **Overlap Detection**: Flag overlapping time entries

  - **Budget Warnings**: Alert when time exceeds project budget

  - **Required Field Validation**: Ensure all necessary information provided

  - **Rate Verification**: Check correct billing rates applied

  - **Duplicate Detection**: Identify accidentally duplicated entries


  ### Comments and Communication

  - **Approval Comments**: Add notes during approval process

  - **Rejection Reasons**: Require explanation for rejections

  - **Clarification Requests**: Ask employees for additional information

  - **Thread History**: Complete conversation history per timesheet

  - **@Mentions**: Tag specific people in comments

  - **Attachment Support**: Add supporting documents


  ### Audit Trail

  - **Complete History**: Record every approval action

  - **Timestamp Tracking**: When each action occurred

  - **User Attribution**: Who performed each action

  - **Change Log**: Track all timesheet modifications

  - **Rejection Tracking**: History of rejections and reasons

  - **Export Capability**: Download audit logs for compliance


  ## Project-Based Customization


  ### By Project Type

  - **Client Projects**: Strict approval for billable work

  - **Internal Projects**: Simplified approval for overhead

  - **R&D Projects**: Specialized approval for research time

  - **Administrative**: Fast-track approval for admin tasks


  ### By Project Phase

  - **Planning Phase**: Light approval

  - **Execution Phase**: Standard approval

  - **Closing Phase**: Detailed review

  - **Warranty/Support**: Separate approval track


  ### By Client Requirements

  - **High-Touch Clients**: Multi-level approval with detailed review

  - **Standard Clients**: Streamlined approval process

  - **Fixed-Price Projects**: Budget-focused approval

  - **Time & Materials**: Accuracy-focused approval


  ## Automation Rules


  ### Auto-Approve Conditions

  - Time entries under specified hours

  - Regular, recurring tasks

  - Entries within project budget

  - Work during scheduled hours

  - Standard billing rates

  - Complete required information


  ### Manual Review Triggers

  - Entries exceeding hour thresholds

  - Overtime hours

  - Work outside normal hours

  - Budget overruns

  - Changed billing rates

  - First-time tasks


  ## Integration with Zistemo


  ### Time Tracking

  - Seamless flow from tracking to approval

  - Mobile time entry feeds approval workflow

  - Timer-based entries automatically submitted

  - Manual entries integrated equally


  ### Project Management

  - Approval status visible in project views

  - Budget impact shown during approval

  - Resource allocation updated after approval

  - Project timelines reflect approved time


  ### Invoicing

  - Only approved time flows to invoices

  - Approval status gates billing process

  - Clients see only approved entries

  - Rejection prevents premature billing


  ### Reporting

  - Approval metrics in standard reports

  - Approval turnaround time tracking

  - Bottleneck identification

  - Approval rate analysis


  ## Mobile Approval


  - **Mobile Apps**: Approve from iOS or Android

  - **Push Notifications**: Instant approval requests

  - **Quick Actions**: Approve/reject with minimal taps

  - **Offline Queue**: Review offline, submit when connected

  - **Full Context**: Complete timesheet details on mobile

  - **Comment Capability**: Add notes from phone


  ## Benefits


  - **Project Flexibility**: Tailor workflows to project needs

  - **Time Savings**: Automation reduces manual review burden

  - **Improved Accuracy**: Validation catches errors before approval

  - **Client Satisfaction**: Demonstrate review and approval processes

  - **Faster Billing**: Streamlined approval speeds invoicing

  - **Reduced Bottlenecks**: Multiple approval paths prevent delays

  - **Better Compliance**: Audit trail meets regulatory requirements

  - **Team Accountability**: Clear approval history


  ## Use Cases


  ### Digital Agencies

  - Different workflows for retainer vs project clients

  - Creative director approval for design time

  - Account manager approval for client-facing time

  - Auto-approve internal admin time


  ### Consulting Firms

  - Partner approval for engagement billable hours

  - Simplified approval for internal training

  - Client-specific approval requirements

  - Detailed review for high-value projects


  ### Software Development

  - Tech lead approval for development time

  - Project manager approval for client work

  - Fast-track approval for maintenance tasks

  - Detailed review for scope changes


  ### Professional Services

  - Senior partner approval for client deliverables

  - Administrative approval for support tasks

  - Client-mandated approval for certain projects

  - Automated approval for recurring services


  ## Implementation


  1. **Define Projects**: Set up all projects in Zistemo

  2. **Configure Workflows**: Establish approval rules per project

  3. **Set Automation**: Define auto-approval criteria

  4. **Assign Approvers**: Designate who approves what

  5. **Train Team**: Brief employees on submission process

  6. **Train Approvers**: Ensure approvers understand their role

  7. **Go Live**: Start using approval workflows

  8. **Monitor**: Track approval metrics and adjust


  ## Best Practices


  - **Start Simple**: Begin with basic workflows, add complexity gradually

  - **Automate Routine**: Use automation for predictable entries

  - **Set Clear Deadlines**: Establish submission and approval timeframes

  - **Monitor Metrics**: Track approval speed and bottlenecks

  - **Regular Review**: Adjust workflows based on actual patterns

  - **Communicate Changes**: Notify team of workflow updates

  - **Maintain Flexibility**: Allow override options for special cases


  ## Pricing


  Zistemo's timesheet approval features are included in their plans:


  **Professional Plan**: Starting around €9-12/user/month

  - Project-based approval workflows

  - Multi-level approvals

  - Basic automation

  - Mobile approval

  - Standard reporting


  **Business Plan**: Higher tier with:

  - Advanced automation rules

  - Custom workflow design

  - Advanced analytics

  - Priority support

  - API access


  **Enterprise**: Custom pricing for:

  - Unlimited customization

  - Dedicated account manager

  - SLA guarantees

  - Advanced integrations


  Free trial available. Pricing varies by region and team size.
