markdown: >-
  ## Overview


  "Eat That Frog!: 21 Great Ways to Stop Procrastinating and Get More Done in
  Less Time" is a bestselling time management book by Brian Tracy. The book has
  sold more than 450,000 copies and been translated into 23 languages.


  ## The Core Concept


  Your "frog" is your biggest, most important task - the one you are most likely
  to procrastinate on if you don't do something about it. The concept is based
  on a Mark Twain quote:


  > "If the first thing you do each morning is to eat a live frog, you can go
  through the day with the satisfaction of knowing that it is probably the worst
  thing that is going to happen to you all day long."


  ## The Main Principle


  "Eat that frog" means that if you have two important tasks before you, start
  with the biggest, hardest, and most important task first. The key to reaching
  high levels of performance and productivity is to develop the lifelong habit
  of tackling your major task first thing each morning.


  ## Implementation


  1. **Identify your frog**: Determine which task is your most important

  2. **Do it first**: Tackle it before anything else

  3. **Don't overthink**: Eat your frog before you do anything else and without
  taking too much time to think about it

  4. **Build the habit**: Make this your daily routine


  ## The Three Keys


  The core of what is vital to effective time management is:

  - **Decision**: Decide what your frog is

  - **Discipline**: Commit to eating it first

  - **Determination**: Persist until the habit is formed


  ## The 21 Principles


  The book provides 21 practical principles for overcoming procrastination and
  getting more done, including:

  - Set the table (clarify goals)

  - Plan every day in advance

  - Apply the 80/20 rule

  - Consider the consequences

  - Use the ABCDE method

  - Focus on key result areas

  - Apply the law of three

  - Prepare thoroughly before beginning

  - Do your homework

  - Upgrade key skills continuously


  ## Benefits


  ### Productivity Gains

  - Accomplish most important work when energy is highest

  - Build momentum from early wins

  - Reduce procrastination significantly

  - Increase sense of accomplishment


  ### Psychological Benefits

  - Reduces anxiety about difficult tasks

  - Builds confidence through completion

  - Creates positive momentum for the day

  - Eliminates task avoidance patterns


  ## Integration with Other Methods


  - **Time Blocking**: Block your most productive morning hours for your frog

  - **GTD**: Your frog is likely in your "Next Actions" or "Projects" list

  - **Eisenhower Matrix**: Your frog is typically in Quadrant 2 (Important, Not
  Urgent)

  - **Pomodoro**: Use Pomodoros to work on your frog with full focus


  ## Who It's For


  - Chronic procrastinators

  - Anyone avoiding difficult tasks

  - Professionals with complex projects

  - People feeling overwhelmed by task lists

  - Those wanting to boost productivity significantly

  - Anyone seeking to overcome avoidance patterns


  ## About the Author


  Brian Tracy is the bestselling author of more than eighty books that have been
  translated into dozens of languages. He has served as a consultant and trainer
  to more than 1,000 corporations and is a highly sought-after speaker on
  productivity and time management.


  ## Common Applications


  - Starting the day with the hardest work

  - Tackling avoided tasks immediately

  - Building productive morning routines

  - Overcoming analysis paralysis

  - Developing implementation habits


  ## Key Takeaway


  The book shows you how to organize each day so you can zero in on critical
  tasks and accomplish them efficiently and effectively. Success comes from
  developing the lifelong habit of eating your frog first thing each morning.


  ## Pricing


  The book "Eat That Frog!" is available for purchase in various formats
  (paperback, audiobook, ebook). The methodology itself is free to implement.
