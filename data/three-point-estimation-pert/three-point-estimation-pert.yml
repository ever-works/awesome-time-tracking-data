name: Three-Point Estimation (PERT)
description: "Project time estimation technique using three values: optimistic
  (best case), most likely (realistic), and pessimistic (worst case) scenarios
  to calculate weighted average. Originally developed for the US Navy's Polaris
  program, now widely used in project management for more accurate time and cost
  predictions."
