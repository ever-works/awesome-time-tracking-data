markdown: >-
  ## Overview


  TimeFinder is a time blocking and planning app that helps turn your to-do list
  into a realistic daily plan. It uses drag, drop, and adjust functionality to
  make scheduling intuitive and accessible across iOS, Android, Mac, Windows,
  and Web platforms.


  ## Key Features


  ### Drag & Drop Planning

  - Create to-do lists

  - Drag and drop tasks directly into your schedule

  - Adjust time blocks easily

  - Visual time management

  - Intuitive interface


  ### Accessibility Focus

  TimeFinder was developed as an asset to users with:

  - ADHD

  - Autism

  - Dyslexia

  - Other neurodevelopmental disorders


  The app provides tools that help with organization, planning, and time
  management for those who benefit from visual structure.


  ### Routine Management

  - Tools for repeatable routines

  - Save routines and apply them again without rebuilding each day

  - Streamline recurring schedules

  - Template-based planning


  ### Task Management

  - Carry unfinished tasks forward into available time slots

  - Automatic rescheduling support

  - Task prioritization

  - Visual task organization


  ### Notifications

  - Sound and vibration notifications for scheduled tasks

  - Reminders to keep you on track

  - Customizable alert settings


  ### Calendar Integration

  - Calendar import functionality

  - Sync with existing calendars

  - Unified view of commitments and tasks


  ## Platform Support


  - iOS (iPhone and iPad)

  - Android

  - macOS

  - Windows

  - Web browser

  - Seamless sync across all platforms


  ## Benefits


  - **Visual Planning**: See your day laid out visually

  - **Realistic Scheduling**: Turn intentions into actual time blocks

  - **Accessibility**: Designed for neurodivergent users

  - **Routine Support**: Simplify recurring schedules

  - **Flexibility**: Easy rescheduling and adjustments

  - **Cross-Platform**: Access from any device


  ## User Reception


  TimeFinder has joined 200,000+ people who've discovered a planning app that
  works for them. The app has received positive reviews on the App Store and is
  praised for its ease of use and effectiveness in time management.


  ## Ideal For


  - Individuals with ADHD seeking visual organization

  - Users with autism who benefit from structured schedules

  - People with dyslexia needing clear visual planning

  - Anyone who struggles with traditional to-do lists

  - Users who want to see how tasks fit into their day

  - People with neurodevelopmental disorders

  - Anyone seeking better time management through visual planning


  ## Important Distinction


  TimeFinder focuses on **time blocking and planning** (scheduling when you'll
  do tasks) rather than **time tracking** (logging hours worked). It's about
  prospective planning, not retrospective tracking.


  ## Key Use Cases


  - Planning your day visually

  - Managing recurring routines

  - Balancing multiple commitments

  - Understanding time availability

  - Creating realistic schedules

  - Building sustainable habits


  ## Accessibility Features


  Designed with neurodivergent users in mind:

  - Visual organization reduces cognitive load

  - Drag-and-drop removes scheduling friction

  - Routine templates support executive function challenges

  - Clear visual feedback provides structure

  - Notifications compensate for time blindness


  ## Key Takeaway


  TimeFinder bridges the gap between task lists and calendars, helping users
  create realistic, visual schedules that account for actual available time. Its
  accessibility-focused design makes it particularly valuable for neurodivergent
  users who benefit from visual structure and organization.
