markdown: >
  ## Overview


  ScheduleBase is an employee scheduling tool designed for businesses that need
  a straightforward, no-frills approach to managing staff shifts. It focuses on
  core scheduling functionality without the complexity of feature-packed
  alternatives, making it suitable for field staff and employers seeking
  simplicity.


  ## Features


  - Employee scheduler for creating and managing team schedules online

  - Instant email and SMS notifications sent to employees when schedules are
  modified

  - Accessible via website and mobile applications (iPhone and Android)

  - 30-day full-featured free trial with all features available

  - Basic shift management without overwhelming additional features


  ## Pricing


  ScheduleBase pricing is based on the number of users associated with a company
  account:


  - **Up to 20 users**: $10/month

  - Higher tiers scale with additional users

  - 30-day full-featured free trial available for all tiers


  ## Customers


  Subway, Orange Leaf, GoRun Wichita, Holiday Inn Express, Bell Bank, Randy's
  Hardware


  ## Limitations


  - Very limited feature set — only suitable for companies needing basic
  scheduling

  - No third-party integrations (cannot connect with payroll or HR solutions)

  - No group chats, time tracking, or other features offered by more advanced
  scheduling tools

  - Outdated user interface lacking drag-and-drop functionality found in modern
  scheduling tools


  ## Ideal Use Cases


  - Small businesses seeking a simple, cost-effective scheduling solution

  - Organizations that only need basic shift management without payroll or HR
  integrations

  - Field staff scheduling with mobile access requirements
