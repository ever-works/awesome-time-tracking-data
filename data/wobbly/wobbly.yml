markdown: >-
  ## Overview


  Wobbly is a comprehensive and user-friendly time-tracking solution that
  simplifies task and project management for freelancers and small businesses.
  The software provides an intuitive interface with easy-to-use features and
  seamless control over work hours and billing processes.


  ## Key Features


  **Time Tracking:**

  - Unlimited time tracking capabilities

  - Manual and timer-based tracking

  - Track across multiple projects and clients

  - 35 days of data history (free plan)

  - 365 days of data history (Medium plan)

  - Unlimited data history (Large plan)


  **Invoicing:**

  - Create and send invoices detailing hours worked

  - Calculate client payment amounts automatically

  - Draft invoices with editable parameters

  - Duplicate used invoices for recurring billing

  - Invoice tracking with filters: pending payment, viewed, paid, overdue

  - Save as drafts, send via email, or download as PDFs


  **Reporting:**

  - Comprehensive reporting features

  - Filter and analyze time data

  - Track billable vs non-billable hours

  - Project profitability insights


  **Integrations:**

  - 35+ integrations with popular tools

  - Seamless workflow connectivity


  ## Pricing


  **Free Plan:**

  - All core features at no cost

  - Unlimited time tracking

  - Invoicing

  - Reporting

  - Multiple integrations

  - 35 days of data history


  **Medium Team Plan:**

  - More ongoing projects support

  - 365 days of data history

  - Enhanced features for growing teams


  **Large Team Plan:**

  - €79/mo or €65/mo billed annually

  - No limits on data history

  - No limits on projects, clients, or teams

  - Full feature access for large organizations
