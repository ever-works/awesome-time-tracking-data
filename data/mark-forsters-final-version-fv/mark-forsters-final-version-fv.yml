markdown: >-
  ## Overview


  Mark Forster's Final Version (FV) represents the culmination of his work
  developing intuitive task management systems. Created by the author and time
  management coach who died on October 12, 2025 at age 81, FV synthesizes
  decades of refinement to his Autofocus methodology.


  ## Background


  Mark Forster was a British time management expert and author who created
  numerous productivity systems throughout his career. His methods emphasized
  balancing rational thinking with intuition, moving away from traditional
  priority-based approaches.


  ## The Final Version System


  FV maintains the core concept of the Master List from earlier Autofocus
  versions but with refined selection and dismissal rules based on years of user
  feedback and iteration.


  ### Key Principles


  1. **Master List**: Write all tasks on a continuous list, adding new items
  only at the end

  2. **Intuitive Selection**: Scan the list and work on items that naturally
  "stand out" to you

  3. **Natural Flow**: Work as long as you feel engaged with the task

  4. **Systematic Dismissal**: Clear old tasks that no longer resonate

  5. **No Priorities**: Deliberately avoid traditional priority rankings


  ## Why It Works


  The system balances rational and intuitive thinking. When these two modes are
  in harmony, we make rational decisions fully aligned with our deeper feelings
  and emotions.


  ## Evolution


  Over his career, Mark Forster created several versions of Autofocus and
  related systems. The Final Version represents his last word on task management
  before his passing, incorporating all lessons learned from earlier iterations.


  ## Key Innovation


  Unlike most productivity systems that rely on external prioritization, FV
  trusts the user's intuitive sense of what needs attention right now, creating
  a more sustainable and psychologically comfortable approach.


  ## Legacy


  Mark Forster's work influenced modern productivity thinking, particularly the
  movement away from rigid priority systems toward more flexible,
  intuition-based approaches.
