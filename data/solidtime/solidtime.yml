markdown: >-
  ## Overview


  solidtime is a modern, open-source time tracking application designed
  specifically for freelancers and agencies who need comprehensive project and
  client management capabilities.


  ## Features


  - **Time Tracking**: Simple and efficient time tracking with start/stop timers
  and manual entry

  - **Project Management**: Organize work by projects and tasks

  - **Client Management**: Track time across multiple clients with separate
  billing rates

  - **Billable Rates**: Set different rates for different projects, clients, or
  team members

  - **Multi-Organization Support**: Manage multiple organizations or companies
  from a single account

  - **Data Import**: Import existing data from other time tracking applications
  including Toggl and Clockify

  - **Reporting**: Generate detailed reports for billing and analysis

  - **Modern Interface**: Clean, intuitive user interface built with modern web
  technologies

  - **Self-Hosted**: Deploy on your own infrastructure for complete data control


  ## Pricing


  Free and open-source. Available on GitHub for self-hosting.
