markdown: >-
  ## Overview


  Timesheets MTS is an advanced time tracking software that facilitates employee
  time tracking, scheduling, and task management. The software helps manage
  employee attendance, project costs, and invoicing, enabling employees to log
  time on projects, record expenses, and travel costs.


  ## Features


  ### Time Tracking Capabilities

  - Comprehensive time management software with intuitive time clock system

  - Precise recording of employee hours, reducing errors associated with manual
  timekeeping

  - Customizable schedules and detailed reporting capabilities

  - Employees can log time on projects using forms, timers, a week view grid, or
  via their mobile phones


  ### Payroll Integration

  - Seamless payroll integration with real-time data synchronization

  - Automatically calculates employee time and wages using specific payroll
  policies

  - Produces valuable management reports which help control overpayment of
  employees

  - Works with QuickBooks (Desktop & Online), ADP, Microsoft Dynamics,
  SurePayroll and others


  ### Project Management

  - Track time for billing or job costing

  - Customizable bill and cost rates by user and job

  - Client and job information tracking

  - Option to mark time as billable or not billable

  - Expense tracking and travel cost recording


  ## Pricing


  One-time licensing model:

  - Timesheets MTS: Starting at $149.00/one-time/user

  - Online Time Clock MTS: $49 (US) or less per license

  - No setup or cancellation fees

  - No recurring subscription costs


  ## Use Cases


  - Retail and hospitality

  - Manufacturing

  - Aerospace and chemical industries

  - Small startups to enterprises


  ## User Base


  More than 10,000 companies in the USA and around the world use Time Clock MTS
  every day for their time tracking and payroll needs.
