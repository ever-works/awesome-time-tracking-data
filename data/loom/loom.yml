markdown: >-
  ## Overview


  Loom is a tool that focuses on video messaging for work, built for teams that
  work from different places. Unlike Zoom, Loom doesn't need everyone online at
  once. Over 14 million people use it across 200,000 companies.


  ## Ownership


  Atlassian completed its purchase of Loom, Inc., making it part of the
  Atlassian ecosystem alongside tools like Jira and Confluence.


  ## Key Features (2026)


  ### Screen Recording & Video Messaging


  - Record your screen and talk through updates, feedback, or presentations

  - No meetings required

  - Asynchronous communication

  - Available on computer, browser, and phone


  ### Platform Availability


  - Desktop app

  - Chrome extension

  - iOS and Android apps

  - Web-based interface


  ### AI-Powered Enhancements


  Loom AI automatically:

  - Adds titles to videos

  - Creates chapters for easy navigation

  - Generates summaries

  - Removes filler words ("um" and "uh")

  - Cuts out awkward silences

  - Creates written docs from videos


  ### Video Quality Options


  - 720p (free plan)

  - 1080p (paid plans)

  - 1440p (paid plans)

  - 4K HD (paid plans)


  ## Pricing (2026)


  ### Free Plan

  - Limits: 5 minutes per video

  - Quality: Up to 720p

  - Basic features included


  ### Paid Plans

  - Business plan

  - Business + AI plan

  - Enterprise plan

  - No recording time limits

  - Higher resolution support

  - Advanced AI features


  ## Use Cases


  ### Team Communication

  - Async updates across time zones

  - Reduces need for synchronous meetings

  - Quick feedback and presentations

  - Team collaboration without scheduling


  ### Product Demonstrations

  - Screen recordings for features

  - Product tutorials

  - Bug reports with video

  - Customer onboarding


  ### Training & Enablement

  - Create training libraries

  - Onboarding new team members

  - Process documentation

  - Knowledge sharing


  ### Feedback & Reviews

  - Design feedback

  - Code reviews

  - Creative critiques

  - Project updates


  ## Benefits


  - Save time by eliminating unnecessary meetings

  - Work asynchronously across time zones

  - Create reusable content

  - Quick and easy screen recording

  - AI-enhanced video quality and organization

  - Searchable video library


  ## Competitive Landscape (2026)


  While Loom remains popular, competition has increased with alternatives like:

  - Supercut

  - ScreenApp

  - Claap

  - Other async video tools


  Teams evaluate alternatives based on features, pricing, and specific workflow
  needs.


  ## Target Audience


  - Remote and distributed teams

  - Product teams

  - Customer success teams

  - Sales and marketing

  - Engineering teams

  - Design teams

  - Training and HR departments
