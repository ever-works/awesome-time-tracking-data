markdown: >-
  ## Overview


  The Focus Quality Score is a proprietary metric developed by AI-powered time
  tracking platforms like Rize that quantifies the quality of focused work
  sessions based on multiple factors. Rather than simply measuring time spent,
  it evaluates how effectively that time was used.


  ## How It Works


  ### Calculation Factors (20+ Attributes)

  - **Interruption frequency**: How often focus is broken

  - **Task duration**: Length of uninterrupted work periods

  - **Context switching**: Frequency of app/task changes

  - **Distraction patterns**: Time spent on non-productive activities

  - **Break timing**: Appropriate rest vs. distraction

  - **Deep work periods**: Extended focus sessions

  - **Time of day**: Work during personal peak hours

  - **Task alignment**: Working on high-priority items


  ### Score Range

  Typically 0-100 scale where:

  - **90-100**: Exceptional focus, minimal interruptions

  - **70-89**: Good focus with manageable distractions

  - **50-69**: Moderate focus, improvement needed

  - **Below 50**: Significant focus challenges


  ## Benefits


  ### Actionable Insights

  - Identify best times for deep work

  - Recognize distraction patterns

  - Measure impact of workplace changes

  - Track improvement over time

  - Optimize daily schedule


  ### Behavior Change

  - Gamification motivates improvement

  - Quantifies abstract concept of "focus"

  - Provides clear improvement targets

  - Shows correlation between practices and results


  ## Applications


  ### Individual Use

  - Personal productivity optimization

  - Schedule design based on score patterns

  - Habit tracking and formation

  - Performance improvement


  ### Team Use

  - Benchmark focus across team

  - Identify systemic distractions

  - Measure meeting impact

  - Optimize collaboration patterns


  ## Key Takeaway


  Focus Quality Score transforms abstract productivity into measurable,
  actionable metrics, enabling data-driven improvements to work habits and
  schedules.
