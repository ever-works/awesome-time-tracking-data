markdown: >-
  ## Overview


  RescueTime Timesheets transforms RescueTime's automatic activity tracking into
  categorized, billable timesheets. This feature bridges the gap between
  personal productivity monitoring and professional time reporting, allowing
  users to benefit from automatic tracking while generating client-ready
  timesheet reports.


  ## How It Works


  ### Automatic Capture

  - RescueTime tracks all computer activity automatically

  - Applications, websites, and documents monitored

  - Time logged without manual timers


  ### Intelligent Categorization

  - AI suggests project/client assignments

  - Rules-based automatic categorization

  - Manual review and correction


  ### Timesheet Generation

  - Converts activity data into professional timesheets

  - Customizable categories and clients

  - Exportable reports


  ## Key Features


  - **Auto-Tracking**: No manual timers required

  - **Smart Categorization**: AI-powered project detection

  - **Flexible Review**: Approve or edit suggestions

  - **Client Management**: Organize by client and project

  - **Billable vs Non-Billable**: Separate tracking

  - **Time Adjustments**: Edit before finalizing

  - **Report Export**: CSV, PDF formats

  - **Privacy Controls**: Choose what to track


  ## Benefits


  ### For Freelancers

  - Never forget to track time

  - Capture all billable moments

  - Automatic activity logging

  - Quick timesheet creation

  - Improved billing accuracy


  ### For Consultants

  - Detailed project time breakdowns

  - Evidence of work performed

  - Easy client reporting

  - Profitability insights


  ## Workflow


  1. Work normally, RescueTime tracks automatically

  2. At day/week end, review captured activities

  3. Categorize activities by client/project

  4. Adjust any incorrectly tracked time

  5. Generate and export timesheet

  6. Use for invoicing or reporting


  ## Combines Two Tools


  **Productivity Tracking:**

  - Personal time awareness

  - Distraction monitoring

  - Focus time analysis


  **Professional Timesheets:**

  - Client billing

  - Project time allocation

  - Team reporting


  ## Privacy Features


  - Activity stays private until categorized

  - Option to pause tracking

  - Selective application monitoring

  - Local data processing available

  - Control over shared data


  ## Limitations


  - Requires computer-based work

  - Doesn't track mobile activity well

  - Needs manual categorization review

  - May miss offline work


  ## Integration


  - Calendar sync

  - Project management tools

  - Accounting software connections

  - API for custom integrations


  ## Pricing


  Part of RescueTime premium subscription, around $9-12/month.
