markdown: >-
  ## Overview


  The Spotlight Method is a simple task prioritization technique that uses a
  traffic-light color system to categorize tasks by urgency.


  ## Three Lists


  - **Red List** - Tasks requiring immediate attention

  - **Yellow List** - Tasks that need to be completed within two days

  - **Green List** - Long-term tasks that should be addressed over time


  This color-coding system provides an at-a-glance view of your priorities and
  helps you focus on what needs your attention right now.
