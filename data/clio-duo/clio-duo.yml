markdown: >-
  ## Overview


  Clio Duo is an AI-powered time tracking assistant built into Clio Manage, one
  of the leading legal practice management platforms. It analyzes lawyer
  activities including calls, emails, notes, and calendar events to suggest time
  entries, ensuring no billable time is missed.


  ## Features


  - AI-suggested time entries based on activity

  - Automatic detection of unlogged work

  - Email and calendar integration

  - Phone call time tracking

  - Document activity monitoring

  - One-click time entry approval

  - Matter and client association

  - Mobile time tracking

  - Integration with Clio's full practice management suite

  - Billing and invoicing capabilities

  - Trust accounting compliance

  - Detailed time reports and analytics


  ## Pricing


  Clio Duo is included as part of Clio Manage subscriptions. Clio Manage pricing
  tiers:

  - EasyStart: Starting at $39/user/month

  - Essentials: $79/user/month

  - Advanced: $109/user/month

  - Complete: $139/user/month


  Annual billing discounts available. AI features included in higher-tier plans.
