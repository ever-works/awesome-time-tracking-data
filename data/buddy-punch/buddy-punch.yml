markdown: >-
  ## Overview


  Buddy Punch is an intuitive and feature-rich time tracking app that links
  directly to payroll systems with detailed reports and flexible scheduling
  tools, designed to be budget-friendly for small to medium businesses.


  ## Features


  ### Time Tracking & Attendance

  - **Multiple Clock-In Options**: Web, mobile app, kiosk mode, or physical time
  clocks

  - **Facial Recognition**: Prevents buddy punching with photo verification at
  clock-in

  - **GPS Tracking**: Verifies employee locations when clocking in/out

  - **Geofencing**: Restricts clock-ins to designated work areas

  - **PTO Management**: Track vacation, sick time, and other paid time off


  ### Scheduling

  - **Drag-and-Drop Scheduling**: Easily create and modify employee schedules

  - **Shift Notifications**: Automatic reminders for upcoming shifts

  - **Schedule Templates**: Reuse common scheduling patterns

  - **Overtime Alerts**: Notifications when employees approach overtime
  thresholds


  ### Payroll Integration

  - **QuickBooks Integration**: Send timesheet data directly to QuickBooks
  Online and QuickBooks Payroll

  - **Direct Payroll Export**: Export formatted data for various payroll
  providers

  - **Automated Calculations**: Accurate overtime, holiday, and premium pay
  calculations


  ### Reporting

  - **Detailed Reports**: Comprehensive attendance and labor cost reports

  - **Custom Report Builder**: Create reports tailored to specific needs

  - **Real-Time Data**: Access current attendance information instantly


  ## Target Users


  - Small to medium-sized businesses

  - Companies using QuickBooks for accounting

  - Organizations needing fraud prevention

  - Teams requiring flexible scheduling


  ## Pricing


  Affordable tiered pricing starting at budget-friendly rates, with plans based
  on number of employees and features needed.
