markdown: >-
  ## Overview


  Harvest is a comprehensive time tracking and invoicing platform designed for
  teams and businesses that bill clients for their time. It combines flexible
  time tracking with powerful invoicing capabilities, expense management, and
  financial reporting to streamline the entire billing workflow.


  ## Key Features


  - **Flexible time tracking** - Track time via desktop (Mac/PC), mobile
  (iOS/Android), or web browser with timer or manual entry

  - **One-click invoicing** - Generate and send invoices for tracked time in
  seconds

  - **Client payments** - Clients can pay directly from invoices via integrated
  payment processing

  - **Automated reminders** - Automatic follow-up emails for overdue invoices

  - **Expense tracking** - Track billable and non-billable expenses including
  materials, supplies, travel costs with receipt uploads

  - **Budget management** - Set hourly or fixed-fee budgets with instant alerts
  when limits are reached

  - **Comprehensive reporting** - Instant reports covering budgets, time spent,
  team capacity, expenses, and profitability

  - **Integrations** - Connect with Xero, QuickBooks, Asana, Trello, Slack, and
  100+ other tools

  - **Accounting integration** - Seamless sync with Xero and QuickBooks for
  streamlined bookkeeping

  - **Payment processing** - Accept payments via Stripe and PayPal


  ## Advanced Features (2026)


  - **Profitability Reporting** - Enterprise tier shows internal costs vs.
  billable revenue for better financial insights

  - **Team reporting** - Track team performance and capacity across all projects


  ## Pricing


  - **Pro Plan**: $10.80/user/month (annual billing) - includes unlimited seats
  and projects, team reporting, accounting and payment integrations (QuickBooks
  Online, Xero, Stripe, PayPal), and scheduled phone support


  Harvest is particularly well-suited for professional services firms, agencies,
  and consultancies that need integrated time tracking and invoicing with strong
  financial reporting capabilities.
