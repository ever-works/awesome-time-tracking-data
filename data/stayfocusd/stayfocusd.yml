markdown: >-
  ## What is StayFocusd?


  StayFocusd, by Sensor Tower, is a productivity extension for Google Chrome
  that helps you stay focused on work by restricting the amount of time you can
  spend on time-wasting websites.


  ## Key Features


  StayFocusd allows you to customize the days and hours during which it will
  restrict your access to distracting websites. The extension offers several
  powerful features:


  - **Configurable blocking**: You can restrict access to entire domains,
  specific subdomains, pages, or even in-page content like videos and images.


  - **Nuclear Option**: This unique feature lets you block sites for set hours
  with no cancel option, ensuring unwavering focus during critical work periods.


  - **YouTube blocking**: StayFocusd can block all distracting components on
  YouTube, including shorts, comments, and recommended videos.


  - **Require Challenge**: To change any settings, you must complete a
  challenging task, which reduces the temptation to alter settings.


  - **Privacy protection**: StayFocusd does not collect personal data from the
  web pages you visit.


  - **Cross-device sync**: You can connect Android devices and other browsers to
  view website and mobile app usage and limits in one place.


  ## Availability


  StayFocusd is available on the Chrome Web Store and can also be installed on
  Microsoft Edge. It has a 4.5 star rating and is widely used by
  productivity-focused users looking to minimize distractions online.
