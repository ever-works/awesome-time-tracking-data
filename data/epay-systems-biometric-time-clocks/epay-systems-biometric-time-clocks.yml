markdown: >-
  ## Overview


  EPAY Systems provides biometric time clocks as part of a comprehensive human
  capital management platform. Their solutions combine accurate time tracking
  with payroll processing, HR management, and workforce analytics.


  ## Features


  - Biometric fingerprint time clocks

  - Facial recognition capabilities

  - Seamless payroll integration

  - Automatic time card processing

  - Eliminates buddy punching

  - Real-time attendance data

  - Multi-location support

  - Mobile punch options

  - Overtime alerts

  - PTO tracking integration

  - Compliance reporting

  - Employee self-service portal

  - Integration with full HCM suite


  ## Pricing


  Part of EPAY Systems' HCM platform. Pricing based on number of employees and
  features selected. Contact for custom quote.
