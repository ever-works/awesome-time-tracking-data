markdown: >-
  ## Overview


  AbacusLaw is a comprehensive legal practice management software founded in
  1983, designed for law firms of any size across every industry. It provides a
  full-service solution with built-in accounting capabilities and seamless
  integration between case management and billing.


  ## Key Features


  ### Calendaring

  - **Rules-Based Calendaring**: Automatically schedules critical deadlines
  using Federal, State, and Local court rules

  - **Organized Calendar**: Creates a comprehensive calendar system for managing
  court dates and deadlines

  - **Conflict Checking**: Built-in conflict of interest checking


  ### Time Tracking & Billing

  - **Contextual Time Capture**: Capture time as you enter information like
  clients, matters, calendar events, notes, email, or documents

  - **Automatic Integration**: Information entered in case management
  automatically integrates with billing and accounting

  - **Comprehensive Billing**: All-in-one functionality for time and billing
  management

  - **Trust Accounting**: Built-in trust accounting capabilities


  ### Additional Features

  - **Document/Form Automation**: Automated document generation

  - **Matter Management**: Complete case and matter tracking

  - **Contact Management**: Client and contact database

  - **Document and Email Management**: Integrated document storage and email
  management

  - **Accounting**: Full accounting and balance management


  ## Integration Benefits


  AbacusLaw eliminates duplicate data entry by automatically integrating client
  and case information with billing and accounting systems, saving time and
  reducing errors.


  ## Pricing


  Premium Plan: $59/user/month (billed annually) includes legal calendaring,
  conflict checking, and customizable templates.
