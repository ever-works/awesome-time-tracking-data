markdown: >-
  ## Overview


  CARET Legal (formerly Abacus/AbacusLaw) provides time tracking as part of its
  comprehensive legal practice management platform. The system offers multiple
  ways to capture billable time integrated directly with case management and
  billing.


  ## Key Features


  ### Time Capture

  - **Automatic Task Timers**: Timer starts automatically when working on tasks

  - **Calendar Integration**: Convert calendar events into time entries

  - **Manual Entry**: Quick entry for past work

  - **Mobile Tracking**: Capture time from smartphones


  ### Integration Benefits

  - Time flows directly to billing

  - Connected to matter/case information

  - Unified client and matter data

  - Seamless invoice generation


  ### Billing Features

  - Convert time entries to invoices with one click

  - Customizable rate tables

  - Multiple billing arrangements

  - Trust accounting integration

  - Payment processing


  ## Target Market


  Law firms seeking integrated practice management rather than standalone time
  tracking.


  ## Advantages


  - Everything in one system (cases, time, billing, documents)

  - No data export/import between systems

  - Consistent user interface

  - Single vendor support


  ## Pricing


  Contact CARET Legal for pricing based on firm size and modules needed.
