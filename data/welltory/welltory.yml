markdown: >-
  ## Overview


  Welltory is an all-in-one health and productivity app that uses heart rate
  variability (HRV) analysis to help users understand their stress levels,
  energy, and overall wellness, with integrated time tracking for activities and
  habits.


  ## Features


  - **HRV Measurement**: Measure heart rate variability using your smartphone
  camera or connected wearables

  - **Stress & Energy Tracking**: Daily tracking of stress levels and energy
  reserves

  - **Productivity Analysis**: Correlate productivity with health metrics and
  sleep quality

  - **Wearable Integration**: Syncs with Apple Watch, Fitbit, Garmin, Oura Ring,
  and 1000+ other apps

  - **Sleep Analysis**: Track sleep quality and duration from multiple sources

  - **Activity Tracking**: Monitor physical activity, steps, and workouts

  - **Blood Pressure**: Track and analyze blood pressure trends

  - **Personalized Insights**: AI-powered recommendations based on your unique
  patterns

  - **Habit Tracking**: Build healthy habits and track their impact on wellness

  - **Data Aggregation**: Centralize health data from all your devices and apps


  ## Pricing


  Free version with basic HRV measurements and limited features. Premium
  subscription starts at $6.99 per month or $44.99 per year with unlimited
  measurements, advanced analytics, and all integrations.
