markdown: >-
  ## Time Tracking Features


  ClickUp allows tracking time by starting a timer or manually entering it from
  the Quick Action menu, Toolbar, Timesheets, Time Tracking Dashboard cards,
  tasks, and several views.


  ## Time Estimates Functionality


  Set Time Estimates for tasks and compare them to logged time. Get a high-level
  view of your team's time tracking compared against estimates. Progress bars
  indicate tracked time against estimates.


  ## Setup Requirements


  Enable ClickApps in Workspace settings:

  - Time Tracking

  - Time Estimates

  - Time Estimates Rollup

  - Time Tracking Rollup


  ## Availability


  - Basic time tracking: Unlimited plan ($10/user/month)

  - Advanced features (timesheets, time approvals, granular estimates): Business
  Plan ($19/user/month) and Enterprise

  - Time estimates per assignee: Business Plan and above


  ## Native Features


  - Manual entry

  - Built-in timer

  - Time estimates

  - Reporting widgets

  - Comparison against estimates


  ## Pricing


  Starts at $10/user/month (Unlimited plan) for basic time tracking.
