name: Anti-Goals Method
description: An unconventional goal-setting approach that focuses on identifying
  and avoiding undesirable outcomes rather than pursuing positive goals. Based
  on inversion thinking, anti-goals help prevent burnout, maintain focus, and
  reduce decision fatigue by establishing clear boundaries.
source_url: https://gobeflo.com/blogs/news/the-power-of-anti-goals
category: Time Management Methodology
