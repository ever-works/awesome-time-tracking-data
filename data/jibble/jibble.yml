name: Jibble
description: Jibble enables free unlimited attendance and time tracking with
  biometric face ID, GPS geofencing, kiosk terminals, and offline mode for any
  team size. Features include Slack/Payroll integrations, auto-generated
  timesheets with overtime, compliance reports, and AI-powered verification for
  accuracy. Suited for freelance field service unlike basic Toggl, enterprise
  compliance exceeding Hubstaff's optional monitoring costs, and nonprofits
  enjoying Forbes-praised free scalability over paid Clockify upgrades.
