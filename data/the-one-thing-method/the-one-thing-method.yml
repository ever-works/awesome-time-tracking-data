markdown: >-
  ## Overview


  The ONE Thing is a productivity approach by Gary Keller based on the principle
  that extraordinary results come from narrowing your focus to one thing at a
  time, asking the focusing question to identify your highest priority.


  ## The Focusing Question


  **"What's the ONE Thing I can do such that by doing it everything else will be
  easier or unnecessary?"**


  Ask this question:

  - About your life goals

  - For the year

  - For the month

  - For the week

  - For today

  - For this moment


  ## Core Principles


  **The Domino Effect:**

  Small actions can lead to extraordinary outcomes when focused properly. One
  thing leads to another, building momentum.


  **Success is Sequential:**

  Success isn't about doing everything; it's about doing the right thing in the
  right sequence. Line up your priorities and knock them down one by one.


  **The 80/20 Principle:**

  20% of your efforts produce 80% of your results. Then go further: 20% of that
  20% produces 80% of that 80%. Keep narrowing until you find the ONE Thing.


  **Willpower is Limited:**

  Don't spread your willpower thin. Do your most important work when your
  willpower is strongest.


  ## The Lies of Productivity


  **Lie #1: Everything Matters Equally**

  Not all things matter equally. Some things matter more than others. Success
  demands you make distinction.


  **Lie #2: Multitasking**

  Multitasking is a lie. Task switching has cognitive cost. Focus on one thing
  at a time.


  **Lie #3: Discipline**

  You don't need to be disciplined about everything, just long enough to
  establish a habit around your ONE Thing.


  **Lie #4: Willpower is Always Available**

  Willpower is like battery. Do your ONE Thing early when your willpower is
  full.


  **Lie #5: Balance**

  You can't have work-life balance at all times. Counterbalance—be purposefully
  unbalanced.


  **Lie #6: Big is Bad**

  Think big. Don't fear big goals; fear no goals or small goals.


  ## Time Blocking for Your ONE Thing


  **Block Four Hours:**

  - Reserve your best 4 hours daily

  - No interruptions allowed

  - This is your ONE Thing time

  - Sacred and protected

  - Everything else schedules around it


  ## Implementation Steps


  1. Identify your ONE Thing using the focusing question

  2. Block time for it

  3. Protect that time fiercely

  4. Build the habit

  5. Let less important things go

  6. Trust the process


  ## Benefits


  - Extraordinary results in focused area

  - Less stress from trying to do everything

  - Clear priorities

  - Better quality work

  - Faster goal achievement

  - Compounding results over time
