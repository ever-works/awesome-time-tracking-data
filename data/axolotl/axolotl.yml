markdown: >-
  ## Overview


  Axolotl is a lightweight time tracking bot designed specifically for Slack
  workspaces. It provides a simple, command-based interface for logging work
  hours directly within Slack, eliminating the need to switch to separate time
  tracking tools or browser tabs.


  ## Features


  - **Slash Commands**: Use simple commands like `/axolotl_start` and
  `/axolotl_stop` to track time

  - **In-Slack Tracking**: Complete time tracking workflow without leaving Slack

  - **Real-Time Tracking**: Start and stop timers as work progresses

  - **Project Assignment**: Assign time to specific projects or tasks

  - **Time Reports**: View and export time tracking data

  - **Team Visibility**: Managers can see team time entries

  - **Lightweight**: Minimal setup and configuration required

  - **Privacy**: Time data stored securely


  ## How to Use


  Team members can easily log hours by typing simple commands:

  - `/axolotl_start` - Start tracking time

  - `/axolotl_stop` - Stop tracking time

  - Additional commands for viewing reports and managing entries


  ## Benefits


  - **Minimal Friction**: No need to open separate apps or websites

  - **Fast Adoption**: Team members already know how to use Slack

  - **Reduced Context Switching**: Stay in Slack where work happens

  - **Simple Interface**: No complex UI to learn

  - **Always Accessible**: Available wherever Slack is installed


  ## Use Cases


  Ideal for:

  - Small teams using Slack as their primary communication tool

  - Remote workers who want frictionless time tracking

  - Consultants and freelancers billing by the hour

  - Teams who have struggled with time tracking adoption

  - Organizations wanting lightweight time tracking without enterprise overhead


  ## Installation


  Available directly from the Slack App Marketplace. Install to your workspace
  with a few clicks and start tracking time immediately.


  ## Pricing


  Check the Slack Marketplace for current pricing. Many Slack bots offer free
  tiers for small teams with paid plans for additional features.
