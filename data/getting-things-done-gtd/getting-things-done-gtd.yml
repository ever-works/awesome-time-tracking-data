markdown: >-
  ## Overview


  Getting Things Done (GTD) is a personal productivity methodology developed by
  David Allen. It's based on the principle that there's an inverse relationship
  between things on your mind and things getting done—by capturing everything
  externally, you free mental capacity for thinking and doing.


  ## The Five Steps


  1. **Capture** - Collect everything that has your attention into trusted
  external systems

  2. **Clarify** - Process what each item means and what action is required

  3. **Organize** - Put actionable items into appropriate lists and categories

  4. **Reflect** - Review your system regularly to maintain trust and
  perspective

  5. **Engage** - Do the work with confidence, using your system to choose
  actions


  ## Key Concepts


  - Two-minute rule: if it takes less than 2 minutes, do it immediately

  - Next actions: every project needs a defined next physical action

  - Contexts: organize tasks by where/how they can be done (@home, @computer,
  @phone)

  - Weekly review: regular system maintenance keeps it trustworthy

  - Mind like water: calm readiness to respond appropriately to situations


  ## Benefits


  - Reduced mental stress and anxiety

  - Improved focus and clarity

  - Nothing falls through cracks

  - Better prioritization

  - Increased productivity

  - Greater sense of control
