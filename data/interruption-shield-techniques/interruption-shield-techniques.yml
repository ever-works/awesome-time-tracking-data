name: Interruption Shield Techniques
description: Collection of strategies for protecting focused work time from
  interruptions. Includes physical signals (headphones, signs), digital
  boundaries (do-not-disturb, app blockers), communication protocols (office
  hours), and environmental design (quiet spaces). Critical for deep work in
  open office and remote environments.
source_url: https://www.calnewport.com/blog/2014/03/20/on-interruption-shields/
category: Time Management Practice
tags:
  - focus
  - interruptions
  - boundaries
  - environment
markdown: >-
  ## Overview


  Interruption Shield Techniques protect focused work from disruptions through
  multiple layers of defense.


  ## Physical Shields


  - Closed door

  - Headphones (even if not playing music)

  - "Do not disturb" signs

  - Booking private rooms

  - Facing away from traffic


  ## Digital Shields


  - Do-not-disturb mode

  - App/website blockers

  - Notification muting

  - Email autoresponders

  - Phone airplane mode


  ## Communication Protocols


  - Designated office hours

  - Async communication preference

  - Response time expectations

  - Emergency-only policies


  ## Cultural Shields


  - Team agreements on focus time

  - Respect for calendar blocks

  - Default to async


  ## Benefits


  - Uninterrupted deep work

  - Reduced context switching

  - Higher output quality

  - Less stress


  ## Pricing


  Free techniques, some tools have costs.
