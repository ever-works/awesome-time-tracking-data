name: Hackatime
description: Fully open-source, self-hostable alternative to WakaTime for
  automatic programming time tracking. Hackatime is WakaTime-compatible,
  allowing developers to use existing WakaTime plugins while maintaining
  complete control over their data through self-hosting. Ideal for developers
  and teams prioritizing data privacy and sovereignty.
