name: Time Tracking Transparency Principle
description: Best practice principle stating that successful time tracking
  implementation requires transparent communication about what data is
  collected, how it will be used, and what will NOT be monitored. Transparency
  builds trust and prevents resistance, with written policies clarifying that
  time tracking is for project management and billing, not surveillance or
  performance reviews.
