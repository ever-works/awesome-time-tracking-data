markdown: >-
  ## Overview


  The Ultradian Rhythm method is a science-based approach to productivity that
  leverages natural 90-minute biological cycles for peak cognitive performance,
  also known as 90-minute focus sessions.


  ## Scientific Foundation


  ### Ultradian Rhythms

  Ultradian rhythms are biological cycles that occur multiple times within a
  24-hour period, unlike circadian rhythms which occur once per day. These
  90-120 minute cycles regulate various bodily functions including:


  - Energy levels

  - Alertness and focus

  - Hormone production

  - Cognitive performance


  ### The 90-Minute Cycle

  Research shows that the brain naturally operates in approximately 90-minute
  cycles of high and low alertness. During the high-alertness phase, we
  experience optimal:


  - Concentration

  - Information processing

  - Creative thinking

  - Problem-solving ability


  After 90 minutes, the body naturally enters a recovery phase lasting 20
  minutes, during which:


  - Focus declines

  - Energy dips

  - The body signals need for rest


  ## Implementation


  ### Basic Structure


  1. **Work Phase**: 90 minutes of focused, uninterrupted work

  2. **Rest Phase**: 20 minutes of complete break and recovery

  3. **Repeat**: Continue cycle throughout the workday


  ### Optimizing Work Sessions


  - **Single Task Focus**: Dedicate each 90-minute session to one primary task
  or related tasks

  - **Eliminate Distractions**: Remove interruptions during the focused work
  period

  - **Deep Work**: Use cycles for cognitively demanding tasks

  - **Morning Priority**: Schedule most important work during first cycle when
  mental energy is highest


  ### Proper Recovery


  The 20-minute break is crucial for cycle effectiveness:


  - **Physical Movement**: Walk, stretch, or light exercise

  - **Mental Detachment**: Completely disengage from work

  - **Nature Exposure**: Outdoor time when possible

  - **Social Connection**: Brief conversations with colleagues

  - **Hydration & Nutrition**: Healthy snacks and water


  ## Benefits


  - **Aligned with Biology**: Works with natural rhythms rather than against
  them

  - **Sustained Performance**: Prevents burnout through regular recovery

  - **Deeper Focus**: Longer uninterrupted sessions than Pomodoro

  - **Better Learning**: Matches natural attention span for information
  retention

  - **Reduced Fatigue**: Structured breaks prevent accumulating exhaustion


  ## Comparison to Other Methods


  ### vs. Pomodoro (25/5 minutes)

  - Longer work sessions for deep work

  - Fewer interruptions per day

  - More aligned with natural biological rhythms

  - Better for complex, creative tasks


  ### vs. Time Blocking

  - Specific duration based on biology

  - Includes mandatory rest periods

  - Optimized for cognitive performance

  - More prescriptive structure


  ## Practical Tips


  1. **Track Your Rhythm**: Notice your natural energy peaks and valleys

  2. **Start with One Cycle**: Build up to multiple cycles per day

  3. **Honor the Break**: Don't skip recovery periods

  4. **Adjust Timing**: Some people naturally run 80 or 100 minutes—find your
  rhythm

  5. **Workspace Matters**: Create environment conducive to 90 minutes of focus


  ## Research Support


  Originally studied by sleep researcher Nathaniel Kleitman and expanded by
  performance psychologist Anders Ericsson, the 90-minute cycle has been
  validated across:


  - Peak performance research

  - Sleep science

  - Cognitive neuroscience

  - Athletic training


  ## Limitations


  - Requires significant uninterrupted time blocks

  - May not fit all workplace environments

  - Needs discipline to maintain breaks

  - Can be challenging for highly collaborative roles
