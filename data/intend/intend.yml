markdown: >-
  ## Overview


  Intend (formerly known as Complice) is described as an online todo
  list/journal/coworking hybrid that uses intentions for today rather than
  traditional task lists. The app focuses on helping users align daily actions
  with long-term goals through intention-setting.


  ## Key Features


  - **Intentions-Based Planning**: Set daily intentions tied to specific goals
  rather than disconnected tasks

  - **Goal Tracking**: Create goals with optional milestones and link daily work
  to them

  - **Virtual Coworking**: Work in a virtual coworking space with other users to
  enhance focus and accountability

  - **Regular Reviews**: Built-in system for daily, weekly, monthly, and yearly
  reviews

  - **Progress Evaluation**: Daily evaluation of progress toward each goal with
  "enough" or "not enough" ratings

  - **Timeline Feature**: Track your progress over time

  - **Reflections**: End-of-day, week, month, and year reflection prompts


  ## How It Works


  Users set up goals with optional milestones and reviews. The key feature is
  daily intention-setting where you determine your todos or intentions for the
  day, with each intention linked to a specific goal. This creates a clear
  connection between daily work and long-term objectives.


  ## Use Cases


  Ideal for individuals who:

  - Want to connect daily actions to bigger picture goals

  - Prefer intention-setting over traditional task management

  - Benefit from accountability through virtual coworking

  - Value regular reflection and review processes

  - Seek alignment between daily efforts and long-term vision


  ## Pricing


  Subscription costs $12 per month.
