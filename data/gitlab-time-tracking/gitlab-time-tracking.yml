markdown: >-
  ## Overview


  GitLab includes native time tracking capabilities integrated directly into its
  DevOps platform, allowing development teams to estimate and track time spent
  on issues and merge requests without leaving their development workflow.


  ## Features


  - **Time Estimates**: Add time estimates to issues and merge requests using
  slash commands

  - **Time Tracking**: Log time spent using quick commands like /spend 2h 30m

  - **Time Reports**: View total time spent and remaining time for issues and
  milestones

  - **Milestone Burndown**: Burndown charts showing progress based on time or
  story points

  - **Quick Actions**: Use slash commands in comments to track time efficiently

  - **Aggregated Time**: See total time logged across all issues in a milestone
  or epic

  - **Issue Boards**: View time tracking information on Kanban-style boards

  - **API Access**: Track time programmatically via GitLab API

  - **Merge Request Time**: Track code review time in merge requests

  - **Historical Tracking**: View history of all time entries with who logged
  what when

  - **Filtering**: Filter issues by time spent or time remaining

  - **Export**: Export time tracking data for reporting and billing


  ## Integration Benefits


  Because time tracking is built into the same platform as code repositories,
  CI/CD pipelines, and issue tracking, developers can manage everything in one
  place without context switching.


  ## Use Cases


  Ideal for development teams already using GitLab for source control and CI/CD
  who want simple time tracking without adding another tool to their stack.


  ## Pricing


  Time tracking features are available in GitLab Free and all paid tiers
  (Premium and Ultimate), with advanced features like burndown charts in paid
  plans.
