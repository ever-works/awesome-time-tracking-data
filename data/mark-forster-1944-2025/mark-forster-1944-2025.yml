markdown: >-
  ## Overview


  Mark Forster (1944-2025) was a British time management coach and author who
  developed several influential productivity systems. He passed away on October
  12, 2025, at the age of 81, leaving a legacy of intuitive, human-centered
  productivity methods.


  ## Major Contributions


  **Autofocus System** (2008+):

  - Intuitive task selection based on what "feels ready"

  - Multiple versions and refinements

  - Emphasizes subconscious wisdom over analytical prioritization


  **Do It Tomorrow**:

  - Book and method for task management

  - Focus on realistic commitments

  - Managing workload sustainably


  **Final Version (FV)**:

  - Later refinement of the Autofocus concept

  - Streamlined approach to task management


  ## Philosophy


  Forster's methods differed from mainstream productivity advice:

  - Trusted intuition over rigid systems

  - Emphasized sustainability over maximum output

  - Focused on what felt right rather than analytical prioritization

  - Balanced rational and intuitive thinking


  ## Autofocus Innovation


  The Autofocus system's key insight: allowing your mind to "autofocus" on tasks
  that are ready to be done, rather than forcing yourself through a prioritized
  list. This honored the subconscious mind's ability to know what's most
  appropriate in the moment.


  ## Legacy


  Forster's work influenced:

  - Personal productivity thinking

  - Understanding of intuitive decision-making

  - Recognition that not all productivity needs to be data-driven

  - Appreciation for psychological aspects of time management


  ## Published Works


  - "Get Everything Done and Still Have Time to Play"

  - "Do It Tomorrow"

  - "Secrets of Productive People"

  - Numerous online articles and system descriptions


  ## Impact


  His systems attracted dedicated followings, particularly among knowledge
  workers who found traditional time management too rigid or stressful. The
  Autofocus method remains discussed and practiced despite newer productivity
  trends.


  Forster's passing in 2025 marks the end of an era for a distinct approach to
  productivity that prioritized human psychology and intuition alongside
  efficiency and output.
