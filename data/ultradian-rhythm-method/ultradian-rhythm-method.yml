markdown: >-
  ## Overview


  The Ultradian Rhythm Method is a productivity approach that leverages natural
  90-minute cycles of alertness and energy that occur throughout the day and
  night. By aligning work sessions with these biological rhythms—known as the
  Basic Rest-Activity Cycle (BRAC)—you can optimize focus, maintain energy, and
  prevent burnout.


  ## Scientific Foundation


  Ultradian rhythms are biological cycles that occur multiple times within a
  24-hour period, unlike circadian rhythms which operate on a 24-hour cycle.
  During waking hours, humans naturally experience:


  - **90 minutes of high alertness and focus**

  - **20 minutes of rest and recovery**


  This pattern repeats throughout the day, creating opportunities for sustained
  deep work followed by necessary recovery periods.


  ## How to Apply the Method


  1. **Work in 90-Minute Blocks**: Schedule focused work sessions of
  approximately 90 minutes

  2. **Take 20-Minute Breaks**: After each 90-minute cycle, rest for 15-20
  minutes

  3. **Honor the Recovery Phase**: Don't skip breaks or push through fatigue
  signals

  4. **Track Your Personal Rhythm**: Some people have shorter (70-80 minute) or
  longer (100-120 minute) natural cycles

  5. **Limit Daily Cycles**: Most people can sustain 3-4 high-quality ultradian
  cycles per day (4.5-6 hours of deep work total)


  ## Benefits


  - **Sustained Focus**: Working with your natural rhythm prevents attention
  fatigue

  - **Reduced Burnout**: Regular recovery periods prevent mental exhaustion

  - **Improved Performance**: Peak alertness during work sessions means higher
  quality output

  - **Better Energy Management**: Respecting rest phases maintains energy
  throughout the day

  - **Natural Time Constraints**: The 90-minute limit creates productive urgency
  without stress


  ## Integration with Other Methods


  The Ultradian Rhythm Method combines well with:

  - **Deep Work**: Schedule deep work sessions during 90-minute ultradian peaks

  - **Time Blocking**: Block 2-hour chunks (90 min work + 20 min rest) in your
  calendar

  - **Pomodoro Technique**: Some practitioners use 3-4 pomodoros (75-100
  minutes) as one ultradian cycle


  ## Signs You're Working Against Your Rhythm


  - Difficulty concentrating after 60-90 minutes of work

  - Physical restlessness or fidgeting

  - Increased errors or decreased quality

  - Strong urge to check phone, email, or take a break

  - Physical symptoms like hunger, fatigue, or tension


  ## Research Support


  Research by sleep scientist Nathaniel Kleitman identified the Basic
  Rest-Activity Cycle (BRAC) in the 1960s. Subsequent studies have shown that
  working continuously beyond one ultradian cycle significantly degrades
  performance, increases stress hormones, and reduces cognitive function.


  ## Implementation Tips


  - Start your first 90-minute block when you naturally feel most alert (often 2
  hours after waking)

  - Use the first 15-20 minutes of each break for genuine rest (not shallow work
  or email)

  - Schedule no more than 4 ultradian work blocks per day

  - Track energy levels to identify your personal rhythm pattern

  - Be flexible—some days you may only have capacity for 2-3 quality cycles
