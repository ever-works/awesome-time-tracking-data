markdown: >-
  ## Overview


  Autofocus is a productivity system that stands out because it harnesses your
  motivation instead of relying on time management skills. Developed by
  productivity expert Mark Forster, this method serves as a powerful antidote to
  resistance and procrastination.


  ## How It Works


  1. Create one long to-do list with all your tasks

  2. Review the entire list from beginning to end

  3. Do what comes to mind first — trust your intuition

  4. When finished, cross it off and start from the beginning again

  5. Tasks that consistently get skipped are either deleted or need to be broken
  down


  ## Principles


  - Trust your motivation and intuition

  - One continuous list (no categories or priorities)

  - Work on what feels right at the moment

  - Balance between urgent and important happens naturally

  - Resistance to a task is valuable information


  ## Benefits


  - Reduces decision fatigue

  - Works with your natural motivation

  - No complex prioritization systems needed

  - Encourages completion of tasks that matter

  - Flexible and adaptable to any work style


  ## Variations


  Autofocus has been modified over time but still maintains the same core
  principle: do things that really matter to you while maintaining balance.
