markdown: >-
  ## Overview


  Workable is primarily known as a recruiting and HRIS platform that launched
  its time tracking feature in open beta for all HR customers in February 2025.
  It combines recruiting, HR management, and time attendance tools in a single
  platform.


  ## Time Tracking Features


  - Policy-based time tracking with customizable rules for departments, teams,
  or locations

  - Clock in/out via desktop or mobile app

  - Automated reminders to reduce missed punches

  - Scheduled vs. actual hours comparison reporting

  - Time-off management with balance calculator

  - Automatic calendar updates for booked time off

  - Data export for payroll processing


  ## Other HR Features


  - Job posting to 200+ sites with access to 400 million+ candidate profiles

  - Cognitive and personality candidate assessments

  - Offer management with e-signatures

  - Anonymized screening to reduce unconscious hiring bias

  - Built-in candidate assessment features


  ## Pros


  - Easy setup of time tracking policies

  - User-friendly interface with minimal training required

  - Automated reminders reduce missed punches

  - Reporting compares scheduled vs. actual hours

  - Continuously introduces new features and enhancements


  ## Cons


  - No native payroll tool; payroll integrations only available on highest-tier
  plan

  - Lacks GPS-enabled clock-in, limiting suitability for remote or field workers

  - Designed primarily for white-collar teams; limitations for industries
  requiring complex workforce tracking

  - No automated reference checking or onboarding features

  - Features like candidate texting, video interviews, and assessments sold
  separately

  - Some users report reporting lacks detail and customizability


  ## Pricing


  - **Standard Plan**: Starting at $99/month — includes employee time tracking,
  time-off management, payroll preparation, payroll integrations, and core HR
  features.

  - **Premier Plan**: Starting at $219/month — adds time tracking and time-off
  management alongside advanced recruiting and HR features.

  - Pricing scales by employee count. Higher tiers add performance reviews,
  single sign-on, and priority support.

  - Useful features such as candidate texting, video interviews, and assessments
  are sold separately.


  ## Ideal For


  Growing SMBs looking to combine recruiting technology and HRIS with time
  tracking. Better suited for larger companies due to pricing and extensive
  features.


  ## Not a Good Fit For


  Smaller agencies may find it cost-ineffective and may not need all the
  features. Industries like construction or manufacturing requiring GPS-enabled
  clock-in and complex workforce tracking.
