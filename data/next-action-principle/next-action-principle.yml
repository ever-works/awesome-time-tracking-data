markdown: >-
  ## Overview


  The Next Action Principle in GTD states that every project must have a clearly
  defined next physical action—the very next concrete step that will move the
  project forward. This eliminates vague to-dos and makes work immediately
  actionable.


  ## Defining Next Actions


  A next action must be:

  - **Physical** - A concrete action you can actually do

  - **Visible** - Clearly described, not vague

  - **Specific** - Detailed enough to execute without planning

  - **Singular** - One action, not multiple steps


  ## Examples


  Poor (vague): "Work on proposal"

  Good (next action): "Draft outline of client proposal using template"


  Poor: "Plan vacation"

  Good: "Research hotels in Barcelona for June 15-22"


  Poor: "Fix website"

  Good: "Email web developer about broken contact form"


  ## Benefits


  - Eliminates procrastination from ambiguity

  - Makes projects immediately actionable

  - Reduces mental resistance to starting

  - Clarifies exactly what needs doing

  - Enables delegation with clarity

  - Moves projects forward consistently


  ## Implementation


  When adding a project to your system, always ask: "What's the very next
  physical action required?" Capture that action in your system with appropriate
  context.
