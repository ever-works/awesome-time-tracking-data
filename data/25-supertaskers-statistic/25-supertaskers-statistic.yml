name: 2.5% Supertaskers Statistic
description: Research finding showing only 2.5% of people are 'supertaskers' who
  can genuinely multitask without performance degradation. For the remaining
  97.5% of the population, multitasking is actually rapid task switching with
  cognitive penalties.
