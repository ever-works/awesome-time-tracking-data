markdown: >-
  ## Overview


  The 60-Second Procrastination Rule is a psychological technique designed to
  combat procrastination by requiring immediate action within 60 seconds of
  recognizing a task or feeling stress about it.


  ## How It Works


  When you acknowledge stress or identify a task that needs doing, you commit to
  taking action within 60 seconds. This might mean:


  - Opening the relevant document or application

  - Writing the first sentence

  - Making the first phone call

  - Taking any small step toward task completion


  ## The Psychology


  The 60-second window is short enough to bypass the mental resistance that
  builds up with prolonged contemplation, yet long enough to initiate meaningful
  action. By acting quickly, you prevent overthinking and analysis paralysis.


  ## Benefits


  - Reduces mental resistance to starting tasks

  - Prevents overthinking and anxiety buildup

  - Creates momentum through immediate action

  - Builds a habit of responsiveness rather than avoidance

  - Particularly effective for small, quick tasks


  ## Implementation


  Combine this rule with the One-Minute Rule: if a task takes less than 60
  seconds to complete, do it immediately rather than adding it to a list. This
  prevents small tasks from accumulating and creating overwhelming backlogs.
