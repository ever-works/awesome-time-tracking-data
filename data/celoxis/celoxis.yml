markdown: >-
  ## Overview


  Celoxis is a powerful, all-in-one project management solution designed for
  enterprises that need robust time tracking, resource management, portfolio
  oversight, and financial controls across multiple projects and teams.


  ## Features


  - **Time Tracking**: Comprehensive timesheet management with approval
  workflows

  - **Resource Management**: Skills-based resource allocation and capacity
  planning

  - **Portfolio Management**: Manage multiple projects with portfolio-level
  dashboards

  - **Gantt Charts**: Advanced Gantt charts with critical path analysis

  - **Financial Tracking**: Budget management, cost tracking, and profitability
  analysis

  - **Custom Fields**: Unlimited custom fields for projects, tasks, and
  timesheets

  - **Automation**: Workflow automation with triggers and notifications

  - **Risk Management**: Track and mitigate project risks

  - **Document Management**: Centralized document repository with version
  control

  - **Advanced Reporting**: Customizable reports and executive dashboards

  - **Mobile Apps**: iOS and Android apps for field teams


  ## Pricing


  Cloud version starts at $25 per user per month with all features. On-premise
  version available with perpetual licensing starting around $450 per user
  (one-time). Both include unlimited projects and storage.
