markdown: >-
  ## Overview


  Factorial is a comprehensive HR management platform that combines time
  tracking, attendance management, payroll, and employee management features
  with advanced biometric authentication to provide an all-in-one solution for
  modern businesses.


  ## Features


  - **Biometric Time Clocks**: Support for fingerprint readers and facial
  recognition technology

  - **Multiple Clock-In Methods**: Mobile app, web portal, physical time clocks,
  and kiosk mode

  - **Buddy Punch Prevention**: Biometric verification ensures only the actual
  employee can clock in

  - **Shift Scheduling**: Create and manage employee schedules with
  drag-and-drop interface

  - **Time Off Management**: PTO requests, approval workflows, and balance
  tracking

  - **Attendance Reports**: Detailed reports on punctuality, absences, and work
  patterns

  - **Payroll Integration**: Automatic timesheet data flow to payroll processing

  - **HR Management**: Complete HR suite including employee records, documents,
  and onboarding

  - **Performance Reviews**: Built-in performance management and review cycles

  - **Mobile Apps**: Native apps for iOS and Android

  - **Notifications**: Automatic alerts for late arrivals, early departures, and
  missing clock-outs

  - **Geofencing**: Location-based clock-in restrictions for remote workers


  ## Benefits


  By combining biometric time tracking with full HR management, Factorial
  eliminates the need for multiple systems and ensures data consistency across
  all workforce management functions.


  ## Pricing


  Tiered pricing based on features and number of employees, with plans for small
  businesses to enterprise organizations.
