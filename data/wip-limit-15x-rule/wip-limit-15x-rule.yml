name: WIP Limit 1.5x Rule
description: Kanban best practice of setting work-in-progress limits at 1.5
  times the number of team members in a workflow stage to prevent overload while
  maintaining flow.
source_url: https://gitscrum.com/en/solutions/pains/kanban-board-optimization-continuous-delivery
category: Time Management Practice
tags:
  - kanban
