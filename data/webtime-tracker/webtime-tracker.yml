markdown: >-
  ## Overview


  Webtime Tracker is a Chrome extension that automatically tracks how you spend
  time in your browser, categorizing websites and applications to provide
  insights into productivity patterns and time allocation.


  ## Features


  - **Automatic Tracking**: Passively tracks time spent on websites without
  manual timers

  - **Activity Categorization**: Automatically categorizes websites as
  productive, neutral, or distracting

  - **Daily Reports**: See how you spent your day across different sites and
  categories

  - **Domain Grouping**: Aggregate time across related domains (e.g., all Google
  services)

  - **Time Limits**: Set limits for distracting websites with notifications

  - **Focus Mode**: Block distracting sites during designated focus periods

  - **Statistics**: Historical data showing trends in time allocation

  - **Privacy**: All data stored locally in your browser

  - **Export**: Export time tracking data for analysis

  - **Idle Detection**: Automatically pause tracking during inactivity

  - **Custom Categories**: Create custom categories for different types of work

  - **Goals**: Set daily productivity goals and track progress


  ## Use Cases


  Ideal for knowledge workers who want to understand where browser time goes,
  identify productivity drains, and build better browsing habits without manual
  time logging.


  ## Benefits


  Provides objective data about digital habits, helps identify time-wasting
  patterns, and supports better time allocation decisions through awareness and
  gentle accountability.


  ## Privacy Focus


  All tracking data stays in your browser with no cloud sync or external
  servers, ensuring complete privacy of browsing activity.


  ## Pricing


  Free Chrome extension with no premium tiers or subscriptions.
