markdown: >-
  ## Overview


  MyDATA (My Digital Accounting and Tax Application) is the Greek tax
  authority's digital system requiring businesses to electronically submit
  invoice data, with modern platforms like Elorus providing automated
  integration to eliminate manual compliance work.


  ## What MyDATA Requires


  ### Invoice Submission

  - All invoices must be submitted electronically

  - Real-time or near-real-time submission

  - Standardized data format

  - Unique invoice identifiers

  - Complete transaction details


  ### Data Elements

  - Invoice parties (issuer, recipient)

  - Date and invoice number

  - Goods/services description

  - Amounts and taxes

  - Payment terms


  ## Integration Benefits (Elorus)


  ### Automatic Submission

  - Create invoice in Elorus → automatic MyDATA submission

  - No separate tax reporting needed

  - Real-time compliance

  - Error checking before submission


  ### Compliance Assurance

  - Properly formatted data

  - Required fields validated

  - Submission confirmation received

  - Audit trail maintained


  ### Time Savings

  - Zero manual data entry to tax system

  - No end-of-period bulk uploads

  - Reduced accounting overhead

  - More time for business operations


  ## Implementation


  1. Connect Elorus to MyDATA

  2. Configure tax settings

  3. Verify business details

  4. Test submission

  5. Activate automatic sync

  6. Monitor confirmation receipts


  ## User Experience


  ### Before Integration

  1. Create invoice in system

  2. Export invoice data

  3. Log into MyDATA portal

  4. Manually enter or upload data

  5. Submit and verify

  6. Track confirmations separately


  ### With Integration

  1. Create invoice in Elorus

  2. System automatically submits to MyDATA

  3. Receive confirmation

  4. Done


  ## Compliance Timeline


  - MyDATA introduced: 2020

  - Mandatory for most businesses: 2021-2022

  - Digital Client List added: 2026

  - Continuous expansion expected


  ## Greek Business Context


  Essential for:

  - All Greek VAT-registered businesses

  - Freelancers and professionals

  - Service providers

  - Product sellers

  - Anyone issuing invoices in Greece


  ## Penalties for Non-Compliance


  - Fines for late submission

  - Penalties for incorrect data

  - Increased audit risk

  - Business disruption


  ## 2026 Developments


  - Digital Client List requirement added

  - More business categories included

  - Enhanced data requirements

  - Stricter enforcement

  - Integration becoming standard


  ## Competitive Advantage


  Platforms with MyDATA integration:

  - Elorus (strong Greek market focus)

  - Other Greek accounting software

  - International platforms with Greek support


  ## Future Evolution


  Expected developments:

  - Real-time revenue tracking

  - Automated VAT calculations

  - Cross-border transactions

  - Enhanced analytics

  - AI-powered compliance checking
