markdown: >-
  ## Overview


  mJob is a 100% construction-focused time clock and field management
  application that provides extreme flexibility in how time is captured. The
  platform was built specifically for the construction industry with the entire
  system designed around construction workflows, offering multiple entry modes
  for different situations.


  ## Core Philosophy


  mJob recognizes that construction sites have diverse time tracking needs —
  from foremen entering time for entire crews to individual workers clocking
  in/out on mobile devices. The platform's flexibility accommodates all these
  scenarios in a single system.


  ## Key Features


  ### Multiple Time Entry Methods


  **Daily Entry Mode**: Log time for single individuals or multiple employees on
  specific dates


  **Weekly Entry Mode**: Enter full week of hours for individuals or crews


  **Multi Entry Screen**: Rapid entry for multiple employees across jobs and
  cost codes


  **Grid Entry**: Grid-style time entry for quickly logging hours across
  multiple dimensions


  **Mobile Clock**: Workers can clock in/out directly from smartphones


  **Kiosk Mode**: Shared device where multiple workers can punch in/out


  **Foreman Entry**: Supervisors can enter time for their entire crew


  ### Project Management (PM) Review


  Unique workflow where Project Managers can:

  - Review all submitted time before payroll

  - Approve, reject, or redistribute labor hours

  - Ensure accurate job costing before hours are finalized

  - Make corrections and adjustments

  - Prevent payroll errors through validation layer


  ### Comprehensive Tracking


  **Labor**: Individual and crew time tracking


  **Equipment**: Track equipment usage and hours


  **Materials**: Log materials used on jobs


  **Field Reporting**: Daily reports from job sites


  ### Job Costing Integration


  All tracked time flows directly into job costing systems:

  - Track by job, phase, and cost code

  - Compare estimates vs. actuals in real-time

  - Identify jobs running over budget

  - Improve future estimating accuracy


  ## Technical Capabilities


  - **Offline Mode**: Continue entering time without internet connection

  - **GPS Location**: Optional location tracking for mobile clock-ins

  - **Photo Attachments**: Add photos to time entries and reports

  - **Multiple Devices**: Works on phones, tablets, computers

  - **Real-time Sync**: Data syncs across all devices


  ## Target Users


  ### Construction Companies

  - General contractors

  - Subcontractors

  - Commercial builders

  - Residential builders

  - Specialty trade contractors


  ### Specific Roles

  - **Foremen**: Enter time for crews quickly

  - **Field Workers**: Clock in/out from job sites

  - **Project Managers**: Review and approve time before payroll

  - **Office Staff**: Process payroll with verified data

  - **Estimators**: Access historical data for future bids


  ## Integration Ecosystem


  Integrates with construction-specific software:

  - QuickBooks (Desktop and Online)

  - Foundation accounting software

  - Sage 100 Contractor

  - Viewpoint/Trimble

  - Jonas Construction software

  - Custom integrations available


  ## Benefits by Role


  ### For Foremen

  - Enter time for entire crew in minutes

  - Multiple entry methods for different situations

  - Track extra details like equipment and materials

  - Works offline on job sites

  - Submit comprehensive daily reports


  ### For Project Managers

  - Review all time before it hits payroll

  - Redistribute hours to correct jobs/phases

  - Catch errors before they become costly

  - Real-time visibility into labor costs

  - Monitor project progress through field reports


  ### For Office/Accounting

  - Receive pre-approved, accurate time data

  - Streamlined payroll processing

  - Reliable job costing information

  - Reduced payroll corrections

  - Integration with accounting systems


  ### For Owners

  - Accurate job costing for profitability analysis

  - Real-time labor cost visibility

  - Better data for estimating future jobs

  - Reduced administrative overhead

  - Improved project margins


  ## Unique Advantages


  1. **Construction-First Design**: Every feature built specifically for
  construction

  2. **Entry Flexibility**: More ways to enter time than any competitor

  3. **PM Review Workflow**: Unique approval step prevents payroll errors

  4. **Comprehensive**: Labor, equipment, materials, and reporting in one app

  5. **Crew-Friendly**: Designed for how construction crews actually work


  ## Typical Workflow


  1. **In the Field**: Foreman logs crew time daily (or workers clock
  themselves)

  2. **End of Day**: Field reports submitted with hours, photos, notes

  3. **PM Review**: Project Manager reviews and approves all time

  4. **Payroll**: Approved hours exported to accounting software

  5. **Job Costing**: Labor costs automatically applied to correct jobs

  6. **Analysis**: Review actual vs. estimated hours for improvement


  ## Mobile Platforms


  - iOS app (iPhone and iPad)

  - Android app (phones and tablets)

  - Web browser access for any device


  ## Why Construction Companies Choose mJob


  1. Handles the complexity of construction time tracking

  2. Foremen can enter time their way (not forced into one method)

  3. PM review step catches errors before payroll

  4. Tracks more than just time (equipment, materials, reports)

  5. Built by people who understand construction

  6. Flexible enough for any construction workflow

  7. Strong focus on job costing accuracy


  ## Pricing


  Contact mJob for pricing based on company size and features needed. Free demo
  and trial available.


  ## Implementation Support


  - Dedicated onboarding specialist

  - Training for office staff and field crews

  - Custom configuration for your workflow

  - Ongoing technical support

  - Regular software updates


  ## Best For


  - Construction companies of any size

  - Organizations with complex job costing needs

  - Companies with crews working across multiple job sites

  - Contractors wanting foreman-level time entry

  - Businesses needing flexible entry methods for different situations
