name: Not-To-Do List
description: A deliberate practice of maintaining a list of activities you
  refuse to do because they distract from important tasks. By explicitly
  defining and eliminating known time-wasters, this technique helps protect
  focus and prevent attention drains.
source_url: https://www.nathanbarry.com/anti-to-do-list/
category: Time Management Technique
tags:
  - boundary-setting
  - distraction-elimination
  - anti-productivity
markdown: >-
  ## Overview


  The Not-To-Do List is a productivity technique that flips the traditional
  to-do list by cataloging the activities you intentionally avoid.


  ## Purpose


  This list includes all activities you won't do because they are big
  distractions that prevent you from doing important things. Common entries
  might include checking social media during work hours, responding to
  non-urgent emails immediately, attending meetings without clear agendas, or
  taking on low-value tasks.


  ## How to Use


  1. Identify activities that consistently derail your productivity

  2. Write them on your Not-To-Do List as explicit rules

  3. Review the list regularly and hold yourself accountable

  4. Update the list when you discover new time-wasters
