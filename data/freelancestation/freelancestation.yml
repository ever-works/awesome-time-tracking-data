markdown: >-
  ## Overview


  FreelanceStation is a native macOS application designed exclusively for
  freelancers, combining time tracking, invoicing, and project management in a
  fast, energy-efficient package.


  ## Features


  - **Native Mac Application**: Built specifically for macOS for optimal
  performance

  - **Time Tracking**: Simple timer with project and task categorization

  - **Invoicing**: Generate professional invoices directly from tracked time

  - **Project Management**: Organize work by clients and projects

  - **Fast & Efficient**: Native code provides excellent performance and battery
  life

  - **Offline First**: Works without internet connection

  - **Data Privacy**: All data stored locally on your Mac

  - **Beautiful Interface**: Clean, Mac-native design


  ## Time Tracking Features


  - One-click timer start/stop

  - Manual time entry

  - Project and task categorization

  - Hourly rate configuration

  - Time reports and summaries

  - Calendar view of time entries


  ## Invoicing Capabilities


  - Professional invoice templates

  - Automatic calculation from time entries

  - Client management

  - Invoice tracking (sent, paid, overdue)

  - Expense inclusion

  - Multiple currency support


  ## Benefits for Freelancers


  - All-in-one solution for time and billing

  - No subscription required (one-time purchase)

  - Data stays on your device

  - No cloud dependencies

  - Energy-efficient for mobile work

  - Designed for solo practitioners


  ## Platform


  macOS only (native application)


  ## Pricing


  One-time purchase model (check website for current pricing)

  No monthly subscription required


  ## Target Users


  - Mac-using freelancers

  - Independent consultants

  - Solo practitioners

  - Creative professionals on Mac

  - Anyone preferring native apps over web tools


  ## Comparison


  Unlike cloud-based solutions like Harvest or Toggl, FreelanceStation is a
  native Mac app with one-time pricing and complete offline functionality, ideal
  for freelancers who want simplicity and data ownership.
