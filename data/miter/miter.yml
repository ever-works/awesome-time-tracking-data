markdown: >-
  ## Overview


  Miter is built specifically for construction teams and unifies time tracking
  with payroll, job costing, and compliance in a single platform.


  ## Features


  - **Multiple Time Tracking Options** - Choose from more than eight time
  tracking options: mobile, kiosk, supervisor-entry, and more

  - **Job Costing** - Link time entries to tasks or job records to support
  payroll and costing

  - **Payroll Integration** - Seamlessly integrate with payroll systems for
  accurate wage calculations

  - **Compliance Management** - Built-in compliance tracking for construction
  industry regulations

  - **Field-Friendly** - Designed for construction teams working on job sites

  - **Break Tracking** - Track breaks, supervisor assignments, equipment used,
  cost codes, and detailed notes


  ## Use Cases


  Perfect for construction contractors, general contractors, and specialty trade
  contractors who need integrated time tracking and job costing.


  ## Pricing


  Contact Miter for pricing information based on team size and features needed.
