markdown: >-
  ## Overview


  Wudpecker is an AI meeting assistant that takes your instructions and makes
  tailored notes for Zoom, Google Meet, and Microsoft Teams meetings.


  ## GPT Integration & MeetingGPT


  ### ChatGPT Technology


  Wudpecker leverages ChatGPT technology to provide:

  - Detailed meeting summaries

  - Accurate transcripts

  - Context-aware note-taking

  - Intelligent information extraction


  ### MeetingGPT Feature


  A dedicated feature specifically for ChatGPT-powered note summaries that
  provides:

  - Better productivity through AI summarization

  - Customizable output formats

  - Intelligent action item extraction

  - Context-aware insights


  ## Personalized Note-Taking


  The AI meeting assistant tailors all notes for you:

  - Instruct Wudpecker in any language

  - Capture specific details YOU care about

  - Create notes in a structure YOU like

  - Use templates or custom formats

  - Generate tables and structured data


  ## Automatic Meeting Join


  - Wudpecker automatically joins your meetings

  - Records meetings seamlessly

  - Transcribes content in real-time

  - Eliminates need for manual note-taking

  - Allows full focus on conversation


  ## Multilingual Capabilities


  - Works in multiple languages

  - Receives praise for Spanish transcription accuracy

  - Language-agnostic instruction input

  - Global team support


  ## Platform Integrations


  Integration with popular tools ensures easy sharing:

  - HubSpot

  - Salesforce

  - Notion

  - Google Docs

  - Slack

  - Other collaboration platforms


  ## Meeting Platform Support


  - Zoom

  - Google Meet

  - Microsoft Teams

  - Automated joining across platforms


  ## Key Features


  ### Customizable Note Structure


  - Templates

  - Tables

  - Custom formats

  - Structured outputs

  - Personalized layouts


  ### Intelligent Capture


  - Detailed meeting summaries

  - Accurate transcripts

  - Key point identification

  - Action item extraction

  - Decision documentation


  ### Easy Sharing


  - Direct integration with team tools

  - Share insights automatically

  - CRM updates

  - Documentation sync

  - Team collaboration


