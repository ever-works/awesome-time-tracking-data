name: Energy Management Over Time Management
description: A productivity philosophy emphasizing that managing personal energy
  - physical, emotional, mental, and spiritual - is more important than managing
  time for sustained high performance.
source_url: https://hbr.org/2007/10/manage-your-energy-not-your-time
category: Time Management Philosophy
