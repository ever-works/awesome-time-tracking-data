markdown: >-
  ## Overview


  Manganum is a Chrome extension designed to make you more productive by
  consolidating your most-used productivity tools into an elegant sidebar
  interface.


  ## Features


  - **Google Services Integration**: Access Gmail, Google Calendar, Google
  Drive, Google Keep, and Google Tasks without leaving your current tab

  - **AI Integration**: Built-in access to ChatGPT and other AI assistants for
  quick queries and assistance

  - **One-Click Access**: Quickly toggle between different apps and services
  with a single click from the sidebar

  - **Sleek Design**: Modern, minimalist interface that doesn't clutter your
  browsing experience

  - **Time Management**: Keep track of calendar events and tasks while working
  on other tasks


  ## Benefits


  By reducing context switching and keeping essential tools accessible, Manganum
  helps users save time and maintain focus throughout their workday.


  ## Availability


  Available as a Chrome browser extension, compatible with all Chromium-based
  browsers.


  ## Pricing


  Free version available with premium features offered through subscription.
