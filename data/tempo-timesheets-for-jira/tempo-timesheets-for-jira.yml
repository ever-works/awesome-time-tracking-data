markdown: >-
  ## Overview


  Tempo Timesheets is the leading time tracking and reporting solution for Jira,
  seamlessly integrating with Atlassian's project management platform. It's
  designed specifically for agile teams and software development organizations
  that need accurate time tracking for accounting, payroll, client billing,
  compliance, and forecasting.


  ## Key Features


  - **AI-integrated timesheets** - Staff log time entries with a click while
  automation boosts compliance and simplifies tracking

  - **Automatic time tracking** - Integrates with calendars and IDEs to
  eliminate manual entry and reduce errors

  - **Weekly calendar view** - Time records fit into a visual weekly calendar on
  the My Work page

  - **Jira integration** - Each time record associates with existing Jira issues
  for seamless workflow

  - **CapEx & OpEx tracking** - Easily classify and track capital vs.
  operational spending

  - **Billable hours management** - Leverage Tempo Accounts and Time Reports to
  classify billable and non-billable hours

  - **Compliance** - Automated tracking helps ensure timesheet compliance and
  accuracy

  - **Customizable workflows** - Adapt time tracking to fit team-specific
  processes


  ## Reporting & Analytics


  - **Pre-built reports** - Straightforward time tracking reports across Jira
  programs, projects, and portfolios

  - **Highly configurable** - Customize reports to meet specific business needs

  - **Integration with Tempo suite** - Works with other Tempo products for
  powerful cross-product reporting

  - **General ledger alignment** - Companies achieve 99% alignment between
  Timesheets data and their general ledger


  ## Agile Team Benefits


  Time tracking is essential for developing agile workflows. Tempo helps
  transformation leads, agile program directors, and coaches scale agility with:

  - Clarity on where time is spent

  - Context for sprint planning and estimation

  - Coordination across teams and projects


  ## Use Cases


  - Software development teams tracking story points and sprints

  - IT departments managing internal and client projects

  - Professional services tracking billable consulting work

  - Enterprises needing compliance and financial reporting

  - Agile teams optimizing velocity and capacity planning


  ## Integration


  Tempo extends Jira's native capabilities with enterprise-grade time tracking,
  available as an Atlassian Marketplace app for both Jira Cloud and Data Center
  deployments.


  ## Pricing


  Available through Atlassian Marketplace with pricing based on number of users
  and deployment type (Cloud vs. Data Center).


  Tempo Timesheets is the #1 time tracking solution for Jira users, particularly
  valuable for organizations using agile methodologies and requiring detailed
  time reporting for financial and compliance purposes.
