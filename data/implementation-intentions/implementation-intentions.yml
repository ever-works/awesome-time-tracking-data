name: Implementation Intentions
description: 'Goal achievement strategy using if-then planning format: "If
  situation X arises, then I will perform response Y." Research by Peter
  Gollwitzer shows this doubles success rates by pre-deciding actions, reducing
  decision fatigue and automating execution when conditions are met.'
source_url: https://jamesclear.com/implementation-intentions
category: Time Management Methodology
tags:
