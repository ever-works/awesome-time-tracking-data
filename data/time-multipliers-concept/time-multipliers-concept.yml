markdown: >-
  ## Overview


  Time multipliers are activities that create additional time in the future
  through process improvements, automation, delegation, or system building,
  offering exponential returns on time invested.


  ## Examples of Time Multipliers


  ### Automation

  - Creating templates

  - Writing scripts

  - Setting up workflows

  - Building macros

  - Implementing tools


  ### Documentation

  - Writing procedures

  - Creating guides

  - Building knowledge bases

  - Recording processes

  - Standard operating procedures


  ### Delegation & Training

  - Teaching others

  - Developing team skills

  - Creating self-service resources

  - Building autonomy

  - Distributing knowledge


  ### Process Improvement

  - Streamlining workflows

  - Eliminating redundancies

  - Optimizing systems

  - Removing bottlenecks

  - Simplifying complexity


  ## The Multiplier Effect


  **Initial Investment**: 2 hours to automate task

  **Task Duration**: 15 minutes

  **Frequency**: 3x per week

  **Payback Period**: ~3 months

  **Annual Savings**: ~35 hours


  ## Thinking Framework


  Before doing repetitive task, ask:

  - Will I do this again?

  - How often?

  - Could this be automated?

  - Could someone else do it?

  - Is there a better way?


  ## Prioritization


  **High-Impact Multipliers**:

  - Frequent tasks

  - Team-wide processes

  - Error-prone activities

  - Knowledge-dependent work


  **Investment Criteria**:

  - ROI = (Time Saved × Frequency) / Setup Time

  - Target ROI > 5x

  - Consider difficulty and risk


  ## Time Tracking Application


  - Tag multiplier activities

  - Track setup time vs. ongoing savings

  - Calculate actual ROI

  - Identify best opportunities

  - Justify investment in systems
