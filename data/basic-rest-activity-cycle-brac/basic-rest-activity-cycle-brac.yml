markdown: >-
  ## Overview


  The Basic Rest-Activity Cycle (BRAC) is a biological rhythm discovered by
  sleep researcher Nathaniel Kleitman that describes naturally occurring cycles
  of alertness and rest throughout the day. These cycles typically run in 90-120
  minute patterns, alternating between periods of high mental performance and
  necessary recovery.


  ## Scientific Foundation


  Kleitman observed these rhythms in both sleeping and waking states:

  - **During Sleep**: 90-minute REM cycles

  - **While Awake**: Similar 90-120 minute cycles of alertness and fatigue


  ## How BRAC Works


  ### High-Activity Phase (90-120 minutes)

  During the active phase:

  - High-frequency brain activity

  - Increased alertness

  - Enhanced focus capability

  - Peak cognitive performance

  - Elevated physiological measures (heart rate, hormonal levels, muscle
  tension)


  ### Rest Phase (15-20 minutes)

  Following active work:

  - Lower-frequency brain activity

  - Natural energy dip

  - Decreased alertness

  - Body's signal for recovery

  - Restoration of cognitive resources


  ## Application to Productivity


  Work with your natural rhythms:

  - Focus blocks of 90-120 minutes

  - Followed by 15-20 minute breaks

  - Avoid pushing through natural fatigue

  - Recovery enables sustained performance


  ## Research Findings


  A 2023 study in the Journal of Cognition showed professionals who aligned work
  with 90-minute cycles reported 40% higher productivity compared to those
  working in random intervals.


  ## Practical Implementation


  1. Schedule focused work in 90-minute blocks

  2. When concentration wanes, take a break

  3. Use 15-20 minutes for true rest (not email/social media)

  4. Return to work refreshed for next cycle

  5. Typically accommodate 4-5 cycles per workday


  ## Note on Evidence


  While widely cited, some research hasn't found strict 90-minute periodicity in
  all cognitive performance measures, suggesting individual variation exists.


