name: Custom Billing Rates by Role
description: A time tracking system configuration allowing different hourly
  billing rates for various employee roles, seniority levels, or skill sets,
  automatically applying the correct rate when generating client invoices based
  on who performed the work, essential for professional services firms with
  tiered pricing structures.
source_url: https://www.getharvest.com/features/invoicing
category: Time Tracking Feature
tags:
  - billing
  - pricing
  - invoicing
markdown: >-
  ## Overview


  Custom Billing Rates by Role enable nuanced pricing that reflects the varying
  value and cost of different team members' time, supporting sophisticated
  billing models and maximizing revenue.


  ## Rate Structures


  ### Role-Based Rates

  - Junior Developer: $100/hour

  - Mid-Level Developer: $150/hour

  - Senior Developer: $200/hour

  - Architect: $250/hour

  - Project Manager: $175/hour


  ### Skill-Based Rates

  - General Consulting: $150/hour

  - Technical Specialist: $200/hour

  - Subject Matter Expert: $300/hour


  ### Client-Specific Rates

  - Standard clients: Full rate

  - Preferred partners: 10% discount

  - Non-profit: Reduced rate

  - Government: Contract rate


  ## Implementation


  **System Configuration**:

  - Define roles/levels

  - Assign billing rates

  - Map employees to roles

  - Set client-specific overrides


  **Auto-Application**:

  - Employee tracks time

  - System applies their rate

  - Generates invoice

  - No manual rate entry


  ## Benefits


  **Revenue Optimization**:

  - Charge appropriate value

  - Reflect expertise levels

  - Competitive pricing

  - Margin protection


  **Transparency**:

  - Clear rate cards

  - Predictable client costs

  - Justifiable pricing


  **Administration**:

  - Automated calculations

  - Reduced errors

  - Faster invoicing

  - Audit trail


  ## Common Patterns


  **Blended Rates**:

  - Mix of junior/senior work

  - Average rate calculated

  - Simpler client billing


  **Task-Based Rates**:

  - Rate varies by work type

  - Same person, different tasks

  - More granular pricing


  ## Pricing


  N/A - This is a feature in time tracking and billing systems.
