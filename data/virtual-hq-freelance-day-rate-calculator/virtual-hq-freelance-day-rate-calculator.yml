markdown: >-
  ## Overview


  Virtual HQ's Freelance Day Rate Calculator is designed specifically for UK
  freelancers and contractors. It provides a simple 4-step process to calculate
  appropriate day rates that account for all business costs, holidays, and
  potential sick days.


  ## UK-Specific Calculation


  The calculator follows UK industry standards:

  - Adds 30% to compensate for lost employment benefits

  - Uses 220 billable days to account for holidays and gaps

  - Considers National Insurance contributions

  - Accounts for business expenses


  ## 4-Step Process


  1. Enter desired annual salary

  2. Add business expenses

  3. Account for non-billable days (holidays, sick leave)

  4. Calculate your day rate


  ## Standard Formula


  (Desired Salary + Business Expenses) ÷ Billable Days = Day Rate


  ## Key Considerations


  ### Lost Benefits (30% Premium)

  - No paid holidays

  - No sick pay

  - No pension contributions

  - No health insurance

  - No other employment benefits


  ### Billable Days (220 standard)

  - 365 days per year

  - Minus weekends (~104 days)

  - Minus holidays (~20-28 days)

  - Minus sick days (~5-10 days)

  - Minus gaps between contracts (~5-15 days)

  - = ~220 billable days


  ## Business Expenses to Include


  - Accountancy fees

  - Professional insurance

  - Office equipment

  - Software subscriptions

  - Professional development

  - Marketing costs

  - Travel expenses


  ## Features


  - UK-specific calculations

  - Benefits compensation

  - Holiday and sick day accounting

  - Simple 4-step interface

  - Free to use

  - Instant results


  ## Use Cases


  - UK contractors

  - Interim managers

