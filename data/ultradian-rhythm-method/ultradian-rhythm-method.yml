markdown: >-
  ## Overview


  The Ultradian Rhythm Method is a productivity approach based on the body's
  natural 90-120 minute cycles of alertness that repeat throughout the day and
  night. By aligning work sessions with these biological rhythms, individuals
  can optimize performance and avoid burnout.


  ## The Science


  ### What Are Ultradian Rhythms?

  Ultradian rhythms are biological cycles that occur multiple times within a
  24-hour period, unlike circadian rhythms which occur once per day. The most
  relevant for productivity is the Basic Rest-Activity Cycle (BRAC), which
  alternates between periods of high alertness and lower alertness approximately
  every 90-120 minutes.


  ### Neurobiological Basis

  Research from Andrew Huberman and others shows that the brain can maintain
  peak focus for approximately 90 minutes before needing rest. After this
  period, cognitive performance naturally declines until a rest period allows
  for recovery.


  ## How to Apply the Method


  ### 1. 90-Minute Work Blocks

  Structure deep work sessions to last approximately 90 minutes, aligning with
  natural alertness peaks.


  ### 2. Strategic Rest Periods

  Follow each 90-minute work block with a 15-20 minute break to allow for mental
  and physical recovery.


  ### 3. Recognize Your Pattern

  Track your energy levels throughout the day to identify when your personal
  ultradian peaks occur (some people have stronger rhythms at certain times).


  ### 4. Protect the Rhythm

  Avoid interruptions during the 90-minute work blocks, and actually rest during
  break periods (no email checking or "productive" break activities).


  ## Recommended Activities


  ### During Work Blocks (90 minutes)

  - Deep work requiring sustained focus

  - Complex problem-solving

  - Creative work

  - Strategic planning

  - Writing or coding


  ### During Rest Periods (15-20 minutes)

  - Walking

  - Light stretching or movement

  - Meditation or breathing exercises

  - Genuine rest (not screen time)

  - Social interaction


  ## Research Support


  ### 2026 Studies

  Recent research has confirmed that working in 90-minute focus sessions aligned
  with ultradian rhythms produces:

  - Higher quality work output

  - Sustained energy throughout the day

  - Reduced mental fatigue

  - Better work-life balance


  ### Andrew Huberman's Recommendation

  Neuroscientist Andrew Huberman recommends 90-minute focused work blocks as the
  ideal length for demanding cognitive tasks, based on neurobiological research.


  ## Common Mistakes


  - Skipping rest periods to "power through"

  - Working beyond the 90-minute mark when focus naturally wanes

  - Filling break time with shallow work or screen time

  - Ignoring personal variation in rhythm timing

  - Starting a 90-minute block late in the day when energy is naturally lower


  ## Benefits


  - Sustainable productivity without burnout

  - Higher quality work during focus periods

  - Better energy management throughout the day

  - Improved recovery and long-term performance

  - Natural structure for deep work practice
