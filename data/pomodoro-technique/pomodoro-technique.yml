markdown: >-
  ## Overview


  The Pomodoro Technique was developed by Francesco Cirillo in the late 1980s
  and uses a timer to break work into intervals, typically 25 minutes in length,
  separated by short breaks. The name comes from the tomato-shaped kitchen timer
  Cirillo used as a university student.


  ## How It Works


  The technique breaks tasks down into small, manageable subtasks worked on in
  25-minute intervals (called pomodoros), followed by five-minute breaks, with a
  longer 30-minute break after four pomodoros.


  ### Basic Steps:


  1. Choose a task to work on

  2. Set the timer for 25 minutes (one Pomodoro)

  3. Work until the timer rings

  4. Take a 5-minute break

  5. After completing 4 Pomodoros, take a longer break (15-30 minutes)

  6. Repeat the cycle


  ## Scientific Evidence


  Recent research supports its effectiveness:

  - **2025 meta-analysis**: "Time-structured Pomodoro interventions consistently
  improved focus, reduced mental fatigue, and enhanced sustained task
  performance, outperforming self-paced breaks."

  - Structured breaks are more effective than self-paced breaks

  - Improves sustained attention and task performance

  - Reduces cognitive fatigue


  ## Benefits


  ### Productivity Improvements

  - Improves focus and concentration

  - Reduces mental fatigue through regular breaks

  - Helps build productive work habits

  - Prevents burnout with structured break times

  - Combats procrastination through time constraints


  ### Cognitive Benefits

  - Enhanced sustained task performance

  - Improved focus compared to unstructured work

  - Reduced mental fatigue

  - Better time awareness

  - Increased sense of accomplishment


  ## Tools and Applications


  Many digital tools implement the Pomodoro Technique:

  - Pomofocus

  - Focus To-Do

  - Focus Keeper

  - Flow

  - Nesto

  - And hundreds more apps and timers


  ## Integration with Other Methods


  The Pomodoro Technique works well in combination with:

  - **GTD (Getting Things Done)**: Use Pomodoros for executing tasks from GTD
  lists

  - **Timeboxing**: Pomodoros are a specific form of timeboxing

  - **Time Blocking**: Allocate Pomodoros within time blocks


  ## Who It's For


  - Students

  - Professionals with focus challenges

  - Anyone prone to procrastination

  - People with ADHD (structured intervals help concentration)

  - Remote workers

  - Writers, programmers, designers

  - Anyone doing deep focused work


  ## Common Variations


  - **Standard**: 25 min work, 5 min break

  - **Extended**: 50 min work, 10 min break

  - **Short**: 15 min work, 3 min break

  - **Flowtime/Flowmodoro**: Variable length based on natural focus patterns


  ## Historical Context


  Developed by Francesco Cirillo as a university student in Italy when he was
  struggling to study. He found inspiration from a small tomato-shaped kitchen
  timer ("pomodoro" means "tomato" in Italian), which became the namesake of
  this globally-used productivity technique.


  ## Pricing


  The methodology itself is free to use. Various apps and tools implement the
  technique with both free and paid options available.
