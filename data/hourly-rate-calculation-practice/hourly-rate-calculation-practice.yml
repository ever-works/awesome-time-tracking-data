markdown: >-
  ## Overview


  Hourly Rate Calculation Practice involves determining your true effective
  hourly rate to make better decisions about how to invest time and what work to
  accept.


  ## Basic Calculation


  ### Formula

  ```

  Desired Annual Income / Billable Hours Per Year = Hourly Rate

  ```


  ### Example

  - Target income: $100,000

  - Billable hours: 1,500 (accounting for non-billable time)

  - Hourly rate: $100,000 / 1,500 = $66.67/hour


  ## Adjustments for Reality


  ### Account for Non-Billable Time

  - Marketing and business development

  - Administrative tasks

  - Professional development

  - Vacation and sick time

  - Actual billable hours often 50-60% of total work hours


  ### Include Overhead

  - Tools and software

  - Insurance

  - Taxes (often 25-40% for self-employed)

  - Retirement contributions

  - Professional fees


  ## Using Your Hourly Rate


  ### Project Evaluation

  - Estimate hours required

  - Multiply by hourly rate

  - Compare to offered payment

  - Accept only if profitable or strategically valuable


  ### Delegation Decisions

  - Task takes you 3 hours at $100/hour = $300 value

  - Someone else can do for $75

  - Clear delegation opportunity (save $225)


  ### Time Investment Analysis

  - Learning new skill: 20 hours

  - Will save 2 hours/week for a year = 104 hours saved

  - Net benefit: 84 hours

  - Value: 84 × hourly rate


  ## Applications


  ### For Freelancers

  - Set sustainable rates

  - Evaluate project profitability

  - Decide what to outsource

  - Plan capacity and workload


  ### For Consultants

  - Price services appropriately

  - Justify rates to clients

  - Calculate retainer values

  - Assess opportunity costs


  ### For Employees

  - Understand your value

  - Negotiate better compensation

  - Evaluate side gig opportunities

  - Make delegation requests


  ## Common Mistakes


  ### Under-calculating

  - Forgetting non-billable time

  - Ignoring overhead costs

  - Not accounting for taxes

  - Assuming 40 billable hours/week


  ### Over-optimization

  - Trying to monetize every minute

  - Ignoring strategic value

  - Neglecting learning opportunities

  - Forgetting non-monetary benefits


  ## Best Practices


  - Calculate annually and adjust

  - Track actual billable vs. total hours

  - Review profitability quarterly

  - Adjust rates as skills improve

  - Consider value-based pricing too

  - Don't share rate with clients (quote project prices)


