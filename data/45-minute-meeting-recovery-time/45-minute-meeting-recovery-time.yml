name: 45-Minute Meeting Recovery Time
description: Research finding that employees with Meeting Recovery Syndrome
  symptoms need at least 45 minutes to recover after meetings before returning
  to productive work, compared to 10-15 minutes for those without symptoms. This
  recovery time significantly impacts daily productivity and contributes to
  meeting fatigue.
