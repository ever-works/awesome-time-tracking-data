markdown: >-
  ## Overview


  Timebox & Track transforms your Elgato Stream Deck into a powerful
  productivity companion, eliminating the friction from time tracking. No apps
  to open, no forms to fill out—just press a button and focus on your work.


  ## Key Features


  ### Live Countdown Timer

  Your Stream Deck key becomes a live countdown timer, showing exactly how much
  time remains in your session.


  ### Automatic Logging

  When you're done, your session is automatically logged—no manual entry
  required.


  ### Project Tagging

  Tag your activities by project, task, or category and switch tags mid-session
  if your focus shifts.


  ### One-Button Operation

  Start and stop time tracking with a single button press, keeping you in your
  flow state.


  ## Related Plugins


  Other time tracking plugins available for Stream Deck include:


  - **Toggl Plugin**: Integrate with Toggl Track service and assign different
  keys to different projects

  - **Clockify Plugin**: Track, start and stop Clockify timers on your Elgato
  Stream Deck

  - **Tomato Timer**: Pomodoro-style timers to help balance work and break time


  ## Benefits


  The physical button interface makes time tracking habitual and effortless,
  reducing the cognitive load of switching to a time tracking app. Users report
  better adherence to time tracking because the tactile act of pressing a button
  is more satisfying and memorable than clicking in software.


  ## Requirements


  Requires an Elgato Stream Deck device (any model) and the Stream Deck software
  installed on your computer.
