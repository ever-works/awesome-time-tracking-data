markdown: >-
  ## Overview


  Pomodoro time tracking combines structured focus intervals with automatic time
  logging, balancing productivity with rest while capturing billable hours.


  ## How It Works


  1. **Select Task**: Choose project/task to work on

  2. **Start Pomodoro**: 25-minute timer begins

  3. **Focus**: Work without interruption

  4. **Break**: 5-minute rest when timer ends

  5. **Repeat**: After 4 pomodoros, take longer 15-30 min break

  6. **Auto-Log**: Time automatically recorded to project


  ## Benefits


  ### Productivity

  - Structured focus periods

  - Reduced multitasking

  - Clear stopping points

  - Regular breaks prevent burnout


  ### Time Tracking

  - Automatic time capture

  - No forgotten entries

  - Accurate hour logging

  - Break time tracked separately


  ## Integration Features


  ### Smart Categorization

  - Pomodoro auto-tagged to active project

  - Description pre-filled from task name

  - Billable status inherited from project


  ### Break Handling

  - Breaks logged as non-billable

  - Or excluded from time tracking entirely

  - Configurable per user preference


  ### Session Summary

  - "4 pomodoros = 2 hours on Project X"

  - Visualize daily/weekly pomodoro count

  - Track focus time trends


  ## Tools with Pomodoro


  - **Toggl Track**: Built-in Pomodoro timer

  - **Clockify**: Pomodoro mode available

  - **Focus Booster**: Pomodoro-first design

  - **Forest**: Gamified pomodoro + time tracking

  - **Be Focused**: Mac/iOS pomodoro timer


  ## Customization


  ### Timer Lengths

  - Standard: 25/5/15 (work/short break/long break)

  - Extended: 50/10/30 (for deep work)

  - Short: 15/3/10 (for interrupted environments)


  ### Flexibility

  - Pause if interrupted

  - Extend if in flow

  - Skip break if preferred

  - Adjust to personal rhythm


  ## Best Practices


  1. **One Task Per Pomodoro**: Don't multitask

  2. **Honor Breaks**: Rest is essential

  3. **Track Interruptions**: Note what broke focus

  4. **Review Daily**: How many quality pomodoros?

  5. **Adjust as Needed**: Find your optimal interval


  ## Challenges


  ### Rigid Structure

  Some work doesn't fit 25-minute blocks.

  **Solution**: Adjust timer length or use for specific tasks only.


  ### Interruptions

  Meetings, urgent requests break pomodoros.

  **Solution**: Block pomodoro time on calendar, communicate boundaries.


  ### Flow State

  Stopping at 25 minutes can disrupt deep work.

  **Solution**: Extend pomodoro or use longer intervals (50 min).
