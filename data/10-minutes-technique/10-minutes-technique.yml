name: 10 Minutes Technique
description: A task-start strategy where you commit to just 10 minutes of effort
  on a selected task, after which you can stop if you want. The psychological
  trick is that once you begin, you usually won't want to quit, overcoming
  initial resistance and procrastination.
source_url: https://www.inc.com/larry-kim/10-minute-rule.html
category: Time Management Technique
tags:
  - task-start
  - procrastination
  - commitment
markdown: >-
  ## Overview


  The 10 Minutes Technique is a psychological strategy designed to overcome task
  avoidance and procrastination by lowering the perceived barrier to getting
  started.


  ## How It Works


  1. Sit down and commit to exactly 10 minutes of focused effort on a selected
  task

  2. After 10 minutes, you can stop if you want to

  3. More importantly — you usually won't want to


  ## Core Insight


  The hardest part of any task is almost always starting. By committing to just
  10 minutes, you eliminate the resistance that prevents you from beginning.
  Once momentum is established, continuation becomes natural.
