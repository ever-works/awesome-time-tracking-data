markdown: >-
  ## Overview


  The Three Wins Method (also known as the Rule of 3) is a productivity and
  time-management technique that focuses on achieving three main goals or tasks
  per defined time period. Rather than maintaining overwhelming to-do lists, you
  identify three achievable wins for the day, week, month, or year.


  ## Core Concept


  The method is elegantly simple:

  - Write down three things you want to accomplish today

  - Write down three things you want to accomplish this week  

  - Write down three things you want to achieve this year


  Your wins should be specific, achievable, and aligned with your overall goals
  and values.


  ## Key Benefits


  - **Cuts Through Overwhelm**: Reduces endless task lists to a manageable,
  focused set of priorities

  - **Enhances Clarity**: Provides clear direction about what truly matters each
  day

  - **Builds Momentum**: Three wins feels achievable, preventing the paralysis
  of over-ambitious planning

  - **Adds Purpose**: Transforms generic to-do lists into meaningful
  accomplishments

  - **Maintains Motivation**: Calling them "wins" adds a sense of achievement
  and fun

  - **Flexible Time Scales**: Applies equally well to daily, weekly, monthly,
  quarterly, or yearly planning


  ## How to Implement


  **1. Identify Your Three Wins**


  Each morning (or the night before), ask yourself: "What are the three most
  important things I want to accomplish today?"


  **2. Make Them Specific**


  Instead of "work on project," specify "complete project proposal draft" or
  "finish sections 1-3 of report."


  **3. Align with Larger Goals**


  Your daily wins should connect to your weekly wins, which should support your
  yearly wins.


  **4. Track and Celebrate**


  At day's end, review your three wins. Celebrating small victories builds
  positive momentum.


  ## Relationship to To-Do Lists


  The Three Wins Method doesn't replace your to-do list—it gives it purpose and
  direction. Your three wins are the most critical tasks from your larger list,
  the ones that would make today feel successful regardless of what else
  happens.


  ## Application Across Timeframes


  **Daily Wins**: The three most important tasks to accomplish today


  **Weekly Wins**: The three key objectives to achieve this week  


  **Monthly Wins**: The three major milestones to reach this month


  **Quarterly Wins**: The three significant goals for the quarter


  **Yearly Wins**: The three biggest accomplishments you want this year


  ## Comparison to Similar Methods


  The Three Wins Method is similar to but distinct from:


  - **1-3-5 Rule**: One big task, three medium tasks, five small tasks (more
  granular)

  - **MIT (Most Important Tasks)**: Typically 2-3 priority tasks (very similar
  concept)

  - **Ivy Lee Method**: Six tasks in priority order (more structured, more
  tasks)


  The Three Wins Method emphasizes accomplishment and motivation through the
  language of "wins" rather than just tasks or priorities.
