markdown: >-
  ## Overview


  The Time Management Behavior Scale (TMBS) is a survey instrument originally
  developed by Macan et al. (1990) and later refined by Macan (1994). It was the
  most frequently used measurement tool in the systematic review of 107
  empirical studies, appearing in 39 studies.


  ## Dimensions


  The scale measures four sub-dimensions of time management behavior:


  - **Goal-setting and prioritizing** (10 items) - e.g., "I set deadlines"

  - **Time management mechanics** (11 items) - e.g., "I schedule time daily"

  - **Preference for organization** (8 items) - e.g., "I organize paperwork"

  - **Perceived control of time** (5 items) - e.g., "I feel in control of my
  time"


  ## Psychometric Properties


  The TMBS has demonstrated high internal consistency, with Cronbach's alpha
  values ranging from 0.76 to 0.97 across studies. It was used across both
  higher education and workplace research settings.


  ## Research Usage


  The scale was employed in 39 empirical studies spanning both educational and
  workplace contexts. Its broad adoption reflects its reliability and the
  comprehensiveness of its four-factor structure, making it a cornerstone
  instrument in quantitative time management research from 2006-2021.
