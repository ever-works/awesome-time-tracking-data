markdown: >-
  ## Overview


  The Ultradian Rhythm Method is a time management approach based on the body's
  natural 90-120 minute energy cycles called ultradian rhythms. Instead of
  working for arbitrary intervals, this method aligns work sessions with
  biological cycles for optimal performance and sustainable productivity.


  ## The Science


  Ultradian rhythms are biological cycles that occur throughout the day:

  - **Basic Rest-Activity Cycle (BRAC)**: 90-120 minute cycles discovered by
  sleep researcher Nathan Kleitman

  - **Energy Peaks and Valleys**: Natural fluctuations in alertness, focus, and
  energy

  - **Biological Markers**: Hormonal changes, body temperature, attention span

  - **Sleep Architecture**: Same 90-minute cycles govern sleep stages


  ## How It Works


  1. **Work for 90 Minutes**: Engage in focused work for one complete ultradian
  cycle

  2. **Take a 20-Minute Break**: Allow for biological recovery and mental
  restoration

  3. **Notice Energy Levels**: Pay attention to natural energy dips (usually
  around 90-120 minutes)

  4. **Honor the Rhythm**: Don't push through when energy naturally declines

  5. **Repeat the Cycle**: Continue with 3-4 cycles per day for sustained
  productivity


  ## Benefits


  - **Sustainable Intensity**: Avoid burnout by respecting natural energy limits

  - **Better Focus**: Work during peak alertness within each cycle

  - **Natural Breaks**: No guilt about resting - it's biologically necessary

  - **Optimal Performance**: Align work with natural high-performance windows

  - **Reduced Fatigue**: Regular recovery prevents cumulative exhaustion

  - **Long-Term Productivity**: More sustainable than forcing longer work
  sessions


  ## Implementation


  - **Morning Session**: Start first 90-minute block 1-2 hours after waking

  - **Track Your Pattern**: Notice when you naturally lose focus (likely 90-120
  minutes)

  - **Quality Breaks**: Use breaks for movement, nature, social connection - not
  more screen time

  - **Limit Daily Cycles**: Aim for 3-4 deep work cycles per day maximum

  - **Honor Individual Variation**: Your cycles might be 80 minutes or 120
  minutes

  - **Protect the Rhythm**: Schedule meetings and shallow work around deep work
  cycles


  ## Best Practices


  - Work on a single project during each 90-minute cycle

  - Turn off notifications during work periods

  - Use breaks for physical movement and mental recovery

  - Eat light during work cycles to maintain energy

  - Track energy levels to identify your optimal cycle length

  - Plan most important work for your first 1-2 cycles when energy is highest

  - Accept that only 3-4 cycles of deep work per day is realistic
