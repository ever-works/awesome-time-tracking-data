markdown: >-
  ## Overview


  Caato Time Tracker is a time tracking application designed for Mac, iPhone and
  iPad that prioritizes simplicity and reliability. Customers praise the app for
  being "reliable, easy-to-use and hassle-free."


  ## Platform Availability


  - macOS 12.0 or later

  - iOS 15.0 or later (iPhone and iPad)

  - **Note**: No Android version is available


  ## Key Features


  ### 3-Tier Hierarchy

  The app features a 3-tier hierarchy of projects, tasks, and detailed time
  entries, allowing for organized tracking of work across different levels.


  ### Time Tracking

  - Start and pause buttons for active time tracking

  - Track tasks and detailed time entries including seconds

  - Manual time entry options available


  ### iCloud Sync

  Caato Time Tracker+ syncs to iCloud and includes iPhone and iPad companion
  apps, ensuring your time tracking data is consistent across all your Apple
  devices.


  ### Reporting & Export

  - Date range filters for analyzing time entries

  - Excel/CSV export options for further analysis or invoicing


  ## User Base


  Many users have been using the app since 2014, highlighting its longevity and
  reliability. Users consistently report finding it "easy to use" for tracking
  time on various tasks.


  ## Simplicity Focus


  The app is designed with a focus on simplicity, avoiding complex features that
  might overwhelm users. This makes it particularly suitable for freelancers and
  individuals who need straightforward time tracking without extensive project
  management features.


  ## Pricing


  Available on the App Store with both free and paid versions (Caato Time
  Tracker+).
