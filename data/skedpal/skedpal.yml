markdown: >-
  ## Overview


  SkedPal is an AI-powered calendar that turns your to-do list into a dynamic
  schedule. SkedPal's auto-scheduler takes your goals, preferences, and
  constraints and builds the optimal schedule — intelligently and effortlessly.


  ## Features


  - **Intelligent Time Blocking**: Uses natural language processing (NLP) to
  create tasks and schedules them based on priority, deadlines, and available
  work hours

  - **Dynamic Rescheduling**: Keeps your life fully scheduled, rescheduling
  everything automatically if anything goes wrong

  - **Priority Management**: SkedPal board helps you prioritize what matters
  most to you with just one click, all your tasks are scheduled at your
  preferred times

  - **Calendar Integration**: Integrates with popular calendar apps like Google
  Calendar, Office 365, and iCloud for seamless synchronization

  - **Customization**: Customizes your schedule based on your work habits,
  commitments, priorities, urgencies, and energy shifts throughout the day

  - **GPS for Your Work**: Reschedules anything in one easy step, functioning
  like a GPS that gets you back on track when you're off schedule


  ## Who It's For


  SkedPal AI suits knowledge workers, freelancers, students, consultants, and
  managers who need reliable time management and automatic scheduling. It helps
  anyone balancing meetings with deep work, coordinating multiple projects, or
  aligning personal and professional priorities.


  ## Pricing


  Pricing information available on the SkedPal website.
