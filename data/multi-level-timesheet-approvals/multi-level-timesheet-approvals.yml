name: Multi-Level Timesheet Approvals
description: A hierarchical approval workflow where timesheets pass through
  multiple reviewers (team lead, manager, HR, finance) based on organizational
  structure, ensuring accuracy, compliance, and proper authorization before
  payroll processing.
