markdown: >-
  ## Overview


  hh2 Remote Payroll is built specifically for deep integration with
  construction ERPs, such as Sage 300 CRE, Sage 100, Sage Intacct, Foundation,
  and Acumatica. Instead of sending flat files back and forth, it connects
  directly to the existing accounting system.


  For accounting teams, this matters. hh2 pulls project files, cost codes,
  general ledger accounts, union locals, and certified payroll classifications
  directly into the field app. When a foreman codes time on a job site, they use
  the same accounting framework as the finance team.


  That alignment reduces payroll processing time and lowers the risk of mapping
  errors. Instead of correcting timecards after export, labor costs are entered
  directly into the ERP, with the correct structure already applied.


  ## Features


  - Time & Attendance Tracking

  - Integrated Payroll & Compliance

  - Deep ERP & Accounting Integration with Sage 300 CRE, Sage 100, Sage Intacct,
  Foundation, and Acumatica

  - Custom approval paths for timecard submissions

  - Multi-device support for clock-in and management

  - Uses existing accounting framework — no duplicate data entry

  - Project files, cost codes, GL accounts, union locals, and certified payroll
  synced to field app


  ## Pros

  - Deep sync with major construction accounting tools

  - Work from anywhere with field-ready mobile app

  - Custom approval workflows

  - Supports multiple devices


  ## Cons

  - Integration glitches reported by some users

  - Difficult initial setup

  - High price tag for smaller operations

  - Support can be slow at times


  ## Pricing


  Custom enterprise pricing — contact hh2 for details.


  ## Integrations


  - Sage 300 CRE

  - Sage 100

  - Sage Intacct

  - Foundation

  - Acumatica
