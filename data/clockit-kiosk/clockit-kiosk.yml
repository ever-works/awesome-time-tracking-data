markdown: >-
  ## Overview


  ClockIt Kiosk transforms iPads and Android tablets into shared employee time
  clocks. Staff use device-specific PINs to clock in and out, with each entry
  captured alongside a photo and precise timestamp to ensure accountability.


  ## Features


  - iPad and Android tablet support

  - Individual PIN codes for each employee

  - Automatic photo capture at clock events

  - GPS location verification

  - Offline mode with sync

  - Real-time attendance dashboard

  - Integration with ClockIt time tracking platform

  - Custom shift scheduling

  - Break time tracking

  - Overtime calculations

  - Export to payroll systems

  - Mobile apps for workers without kiosk access


  ## Photo Verification


  Each time an employee clocks in or out, ClockIt automatically captures their
  photo using the device camera. This creates a visual audit trail and prevents
  buddy punching, as supervisors can review photos alongside time entries to
  verify identity.


  ## PIN Security


  Every employee receives a unique PIN code for kiosk access. Unlike shared
  passwords, individual PINs create accountability while maintaining the
  convenience of a shared device. PINs can be reset by administrators as needed.


  ## Multi-Location Support


  Businesses can deploy multiple kiosk devices across different locations, with
  each kiosk mapped to a specific site. This enables accurate labor cost
  tracking by location and ensures workers are clocking in at the correct
  workplace.


  ## Reporting & Integration


  Time entries from the kiosk flow directly into ClockIt's reporting system,
  where they can be approved, edited if needed, and exported to payroll
  providers. Common integrations include QuickBooks, Gusto, ADP, and other HR
  systems.


  ## Use Cases


  Retail stores, restaurants, healthcare facilities, warehouses, and offices
  where employees work shifts and need a convenient central clock-in point.
