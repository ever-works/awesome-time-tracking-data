name: Systemist Productivity Method
description: A modern productivity workflow created by Amir Salihefendić,
  founder of Doist, described as simplified GTD built for the modern world.
  Breaks tasks into actionable steps completable in an hour or less, prioritizes
  high-impact work, and aims for daily to-do list zero.
