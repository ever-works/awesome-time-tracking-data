markdown: >-
  ## Overview


  "The Checklist Manifesto: How to Get Things Right" is a December 2009
  non-fiction book by Atul Gawande released through Metropolitan Books that
  focuses on the use of checklists in relation to several elements of daily and
  professional life.


  ## Core Concept


  The book's main point is simple: no matter how expert you may be,
  well-designed checklists can improve outcomes (even for Gawande's own surgical
  team). The book distinguishes between errors of ignorance (mistakes from not
  knowing enough) and errors of ineptitude (mistakes from not properly using
  what we know).


  ## Central Problem


  Gawande examines how professionals deal with the increasing complexity of
  their responsibilities in the modern world. As knowledge and capabilities
  expand, the challenge isn't always what we don't know, but rather
  systematically applying what we do know.


  ## Applications Across Fields


  The book follows the checklist revolution into fields well beyond medicine:

  - Disaster response

  - Investment banking

  - Skyscraper construction

  - Businesses of all kinds

  - Aviation safety


  ## Evidence of Effectiveness


  In Gawande's experiment on implementing checklists, where 8 hospitals
  throughout the world, from Delhi to Seattle, participated, the final results
  were remarkable:

  - The rate of major complications fell by 36 percent

  - Deaths fell by 47 percent


  These dramatic improvements came simply from the systematic use of
  well-designed checklists.


  ## About the Author


  Atul Gawande is the author of several bestselling books and is also:

  - A surgeon at Brigham and Women's Hospital in Boston

  - A staff writer for The New Yorker

  - A professor at Harvard Medical School

  - A professor at the Harvard School of Public Health


  ## Key Lessons


  The book demonstrates that checklists can provide:

  - Greater efficiency

  - More consistency

  - Improved safety

  - Better outcomes across complex tasks

  - A systematic way to avoid errors of ineptitude


  ## Format


  Published on December 22, 2009, available in hardcover, paperback, ebook, and
  audiobook formats.
