name: Calendar Audit Practice
description: Regular review of calendar patterns to identify misalignment
  between actual time usage and stated priorities. Involves analyzing past 2-4
  weeks to calculate time percentages across categories, compare to ideal
  allocation, and systematically address gaps through meeting reduction and
  boundary setting.
source_url: https://hbr.org/2020/01/a-calendar-audit-can-help-you-identify-and-reduce-time-wasters
category: Time Management Practice
tags:
  - audit
  - analysis
  - optimization
  - awareness
markdown: >-
  ## Overview


  Calendar Audit systematically analyzes how calendar time is allocated versus
  priorities.


  ## Process


  1. Review past 2-4 weeks of calendar

  2. Categorize all time blocks

  3. Calculate percentage per category

  4. Compare to ideal/intended allocation

  5. Identify largest gaps

  6. Make systematic changes


  ## Common Findings


  - 60%+ time in meetings vs 30% intended

  - Minimal deep work blocks

  - No strategic thinking time

  - Personal priorities absent


  ## Actions


  - Decline/delegate meetings

  - Block focus time

  - Set meeting policies

  - Protect boundaries


  ## Pricing


  Free practice using calendar data.
