markdown: >-
  ## Overview


  Context-Based GTD is a core practice from David Allen's Getting Things Done
  methodology. It involves organizing your next actions by the context in which
  they can be completed, allowing you to see all available actions for your
  current situation.


  ## What Are Contexts?


  Contexts are the circumstances required to complete a task:

  - Physical location

  - Tools available

  - People present

  - Energy level

  - Time available


  ## Common Context Lists


  **Location Contexts**

  - @Home

  - @Office

  - @Errands

  - @Downtown

  - @Computer


  **Tool Contexts**

  - @Phone

  - @Email

  - @Online

  - @Computer

  - @Agenda (for meetings)


  **People Contexts**

  - @Boss

  - @Spouse

  - @Team

  - @Client


  **Energy Contexts**

  - @High Energy

  - @Low Energy

  - @Creative

  - @Administrative


  **Time Contexts**

  - @Quick (< 10 minutes)

  - @30 Minutes

  - @Long Block


  ## How to Use Contexts


  **1. Assign Contexts**

  - Review each next action

  - Ask: "What do I need to do this?"

  - Tag with appropriate context(s)

  - Some tasks may have multiple contexts


  **2. Filter by Current Context**

  - Assess current situation

  - "I'm at computer with 30 minutes"

  - View @Computer context list

  - Choose action to complete


  **3. Batch Process**

  - Complete all @Phone calls together

  - Handle all @Errands in one trip

  - Process all @Email at once

  - Maximize efficiency through batching


  ## Benefits


  **Efficiency**

  - Batch similar tasks

  - Reduce context switching

  - Maximize current situation

  - Save setup time


  **Clarity**

  - See only relevant actions

  - No mental filtering needed

  - Clear next steps

  - Reduced overwhelm


  **Flexibility**

  - Adapt to circumstances

  - Make use of unexpected time

  - Work anywhere productively

  - Always know what's possible


  ## Modern Context Examples


  **Traditional Office:**

  - @Desk

  - @Phone

  - @Meeting Room

  - @Printer


  **Remote Work:**

  - @Focused Work

  - @Zoom

  - @Slack

  - @Quick Wins


  **Mobile Contexts:**

  - @Waiting

  - @Transit

  - @Mobile

  - @Anywhere


  **Digital Contexts:**

  - @Browser

  - @Code Editor

  - @Design Tools

  - @Writing


  ## Evolution of Contexts


  As technology changes, contexts evolve:

  - Less location-dependent with smartphones

  - Tool contexts more relevant

  - Energy and time contexts growing

  - Hybrid work requires new contexts


  ## Tips for Effective Contexts


  **Keep List Manageable**

  - 5-10 contexts typical

  - Too many = overwhelming

  - Too few = not useful

  - Adjust to your needs


  **Make Them Distinct**

  - Clear boundaries

  - Obvious when to use

  - No overlap confusion

  - Practical differences


  **Review Regularly**

  - Weekly review of contexts

  - Adjust as life changes

  - Remove unused contexts

  - Add new ones as needed


  **Be Flexible**

  - Contexts are tools, not rules

  - Adapt to your workflow

  - What works for you

  - Iterate and improve
