name: Timeular Tracker (EARLY Tracker)
description: Physical 8-sided time tracking device that works with Bluetooth
  connectivity, allowing users to track time by simply flipping the tracker to
  different sides assigned to specific activities. Now rebranded as EARLY
  Tracker, it combines tactile engagement with digital time tracking.
source_url: https://timeular.com/
category: Hardware & Physical Time Clocks
