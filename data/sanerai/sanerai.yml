markdown: >-
  ## Overview


  Saner.AI is the first ADHD-friendly AI personal assistant for notes, email,
  and calendar. It helps manage notes, tasks, calendar, and emails by simply
  chatting with AI, designed specifically to reduce cognitive load and support
  executive function challenges.


  ## Brain Dump & Auto-Organization


  - **Quick Capture**: Unload thoughts quickly through typing or voice input

  - **Automatic Organization**: AI automatically organizes messy brain dumps
  into structured tasks, calendar events, and reminders

  - **No Manual Tagging**: No need to tag, sort, or even remember what you said

  - **Natural Processing**: Personal AI (Skai) automatically tags, categorizes,
  and connects your notes


  ## Key Features


  - **Daily Planning**: Automatically scans your information and provides a day
  plan every morning

  - **Task Extraction**: Pulls to-dos straight from notes, emails, and saved
  clips

  - **Task Breakdown**: Breaks big tasks into smaller, manageable steps

  - **Smart Reminders**: Sets reminders and suggests what to do next

  - **Semantic Search**: Natural language search to find information quickly

  - **Voice Capture**: Speak your thoughts instead of typing

  - **Auto-Categorization**: AI automatically organizes all captured information


  ## Integrations


  Connects with Google Drive, email, Slack, and Calendar for unified information
  management.


  ## Benefits for ADHD


  Brain dumps help people with ADHD:

  - Reduce mental clutter

  - Increase focus

  - Improve organization

  - Manage overwhelm

  - Plan more effectively


  ## Key Differentiator


  Unlike traditional note-taking apps requiring manual organization, Saner AI
  focuses on automatic AI organization specifically designed for ADHD minds and
  information overload.
