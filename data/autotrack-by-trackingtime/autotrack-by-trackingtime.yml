markdown: >-
  ## Overview


  AutoTrack by TrackingTime is an AI-powered time tracking system designed for
  efficient teams. The platform provides AI-powered suggestions to help log
  hours privately—no timers, no monitoring—and helps build accurate, up-to-date
  timesheets without relying on memory or manual input.


  ## Features


  - **AI-Powered Suggestions**: Automatically suggests time entries based on
  detected work patterns and application usage

  - **Privacy-First Approach**: No screenshots, no surveillance, no
  micromanagement—all data stays private until users choose to log it

  - **Pattern Learning**: Learns from your work habits to provide increasingly
  accurate time entry suggestions

  - **Seamless Integration**: Works in the background without interrupting
  workflow

  - **Memory-Free Tracking**: Eliminates the need to remember what you worked on
  throughout the day

  - **Team Productivity Insights**: Provides real-time insights into team
  productivity without invasive monitoring


  ## Use Cases


  Ideal for consultancies, agencies, and professional services firms that need
  accurate billable hour tracking while maintaining employee privacy and
  autonomy.
