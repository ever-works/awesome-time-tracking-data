markdown: >-
  ## Overview


  Lumber Time Tracking is custom-built specifically for the construction
  industry, offering comprehensive features designed for managing field crews,
  job costing, and offline time tracking on job sites.


  ## Features


  - **Offline Mode**: Continue tracking time without internet service, syncs
  when back online

  - **Real-Time Job Costing**: Track labor costs against specific jobs and
  phases in real-time

  - **Two-Way Crew Messaging**: Communicate with field workers directly through
  the app

  - **Foreman Mode**: Special access level for crew leaders to manage team
  timesheets

  - **GPS Location Tracking**: Verify worker presence at job sites

  - **Equipment Time Tracking**: Track both labor and equipment hours

  - **Photo Documentation**: Attach photos to time entries for verification

  - **Daily Reports**: Automated daily job progress and time reports


  ## Construction-Specific Capabilities


  - Multiple job site support

  - Cost code tracking

  - Prevailing wage compliance

  - Certified payroll reports

  - Union vs. non-union worker management

  - Integration with construction accounting software


  ## Target Users


  - General contractors

  - Subcontractors

  - Construction crews

  - Field service companies

  - Trades (electrical, plumbing, HVAC)


  ## Platform Availability


  Mobile apps (iOS, Android), Web dashboard


  ## Pricing


  Contact vendor for custom pricing based on crew size
