markdown: >-
  ## Overview


  YPT (Yeolpumta) is a study time tracking application that creates a social
  studying experience by allowing students to track their study time, join
  virtual study rooms with others, and compete on leaderboards while building
  productive study habits.


  ## Features


  - **Time Tracking by Subject**: Track study time for each subject separately
  with detailed statistics

  - **Virtual Study Rooms**: Study together with other students in real-time
  virtual rooms

  - **Pomodoro Timer**: Built-in focus timer with customizable work and break
  intervals

  - **Study Streaks**: Build and maintain study streaks to stay motivated

  - **Leaderboards**: Compete with friends and global community on study time
  rankings

  - **Study Planner**: Plan daily study goals and track completion

  - **Statistics**: Detailed analytics on study time patterns, most productive
  hours, and subject distribution

  - **App Blocking**: Block distracting apps during study sessions (Android)

  - **Study Certificates**: Earn certificates for study achievements

  - **Community**: Chat and connect with other students for motivation and
  accountability


  ## Pricing


  Free with optional in-app purchases for premium features like unlimited
  virtual study rooms, custom themes, and advanced statistics.
