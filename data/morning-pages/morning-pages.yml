markdown: >-
  ## Overview


  Morning Pages are three pages of longhand, stream-of-consciousness writing
  done first thing in the morning, introduced by Julia Cameron in her
  influential book "The Artist's Way." This practice helps clear mental clutter
  and provides focus for the day ahead.


  ## How It Works


  - Write three pages (approximately 750 words) by hand every morning

  - Do it first thing after waking, ideally within 45 minutes

  - Write in a stream-of-consciousness style about anything on your mind

  - The pages are for your eyes only - no editing or judgment

  - Takes about 30-40 minutes to complete


  ## Time Management Benefits


  - Acts as a "brain drain" to release worries and distractions

  - Helps prioritize and synchronize the day ahead

  - Provides clarity and direction for daily activities

  - Reduces mental clutter that can impede productivity

  - Uncovers patterns in thinking and behavior over time


  ## Applications Beyond Creativity


  While designed for creative unblocking, Morning Pages work for lawyers,
  business professionals, parents, and anyone seeking mental clarity and
  improved daily focus. The practice serves as both a productivity tool and a
  mindfulness practice.


  ## Getting Started


  All you need is a notebook and pen. There's no wrong way to do Morning Pages -
  simply write whatever comes to mind for three pages each morning.
