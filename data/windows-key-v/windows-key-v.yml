name: Windows Key + V
description: Built-in clipboard manager feature in Windows that stores multiple
  copied items and allows pasting from clipboard history across multiple PCs.
  Enables users to access previously copied text, pin frequently used clips, and
  insert special symbols, emojis, and GIFs.
