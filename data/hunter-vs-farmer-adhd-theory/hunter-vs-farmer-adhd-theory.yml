name: Hunter vs Farmer ADHD Theory
description: Evolutionary hypothesis proposing that ADHD traits like impulsivity
  and hyperfocus were advantageous for hunter-gatherers but became maladaptive
  in farming societies. Suggests ADHD is not a disorder but an evolutionary
  mismatch, with hunter brain traits suited for different environmental demands
  than modern agricultural civilization.
source_url: https://en.wikipedia.org/wiki/Hunter_versus_farmer_hypothesis
category: Time Management Philosophy
