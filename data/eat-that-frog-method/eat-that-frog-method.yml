markdown: >-
  ## Eat That Frog! Method


  For Brian Tracy, eating a frog is a metaphor for tackling your most
  challenging task—the one that can have the greatest positive impact on your
  life. The concept comes from a Mark Twain quote: "if the first thing you do
  each morning is to eat a live frog, you can go through the day with the
  satisfaction of knowing that it is probably the worst thing that is going to
  happen to you all day long."


  ## Core Concept


  Your "frog" is your biggest, most important task—the one you are most likely
  to procrastinate on if you don't do something about it. The key to reaching
  high levels of performance and productivity is to develop the lifelong habit
  of tackling your major task first thing each morning.


  ## The 21 Principles


  The book provides 21 most effective methods for conquering procrastination and
  accomplishing more:


  ### ABCDE Method

  Review your work list and put an A, B, C, D, or E next to each task:

  - **A**: Tasks you must do (serious consequences if not done)

  - **B**: Tasks you should do (mild consequences)

  - **C**: Tasks that would be nice to do (no consequences)

  - **D**: Tasks you can delegate

  - **E**: Tasks you can eliminate


  Select your A-1 job or project and begin on it immediately.


  ### Planning

  Begin today to plan every day, week, and month in advance. Start by making a
  list of everything you have to do within the next 24 hours.


  ### Creative Procrastination

  The difference between high performers and low performers is largely
  determined by what they choose to procrastinate on. Since you must
  procrastinate anyway, decide today to procrastinate on low-value activities.


  ## Key Benefits


  - Increases productivity by tackling high-impact work first

  - Builds momentum for the rest of the day

  - Reduces procrastination

  - Creates sense of accomplishment early

  - Ensures most important work gets done


  ## Application


  If you eat the frog—work on your most important or impactful task first thing
  every morning—Tracy suggests you'll increase your productivity and reach your
  goals faster.


  ## The Rule


  If you have two frogs, eat the ugliest one first. This means if you have two
  important tasks, start with the biggest, hardest, and most important task
  first.
