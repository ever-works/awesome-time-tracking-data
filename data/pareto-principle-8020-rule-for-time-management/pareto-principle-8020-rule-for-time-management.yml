name: Pareto Principle (80/20 Rule) for Time Management
description: Time management application of the principle that 80% of results
  come from 20% of efforts. In productivity, this means identifying the vital
  few tasks that produce most of your valuable outcomes and focusing time on
  those high-leverage activities.
