markdown: >-
  ## Overview


  Smartsheet is a work execution platform that blends the familiarity of
  spreadsheets with powerful project management, automation, and collaboration
  features. Includes time tracking through time column types and resource
  management.


  ## Time Tracking Features


  - Duration column types for time tracking

  - Resource allocation and time estimates

  - Actual hours vs planned hours tracking

  - Timesheet reports

  - Resource management views

  - Integration with dedicated time tracking tools


  ## Key Features


  - Grid, Calendar, Gantt, and Card views

  - Automated workflows and reminders

  - Forms for data collection

  - Dashboards and reporting

  - Real-time collaboration

  - File attachments and proofing


  ## Pricing


  Starts at $9/user/month for Pro plan. Enterprise pricing available for large
  organizations.
