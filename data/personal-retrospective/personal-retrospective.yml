markdown: >-
  ## Overview


  Personal Retrospective is a structured self-reflection practice adapted from
  agile sprint retrospectives, designed for individuals to review their personal
  progress, learnings, and areas for improvement on a regular cadence.


  ## Core Methodology


  In a retrospective, participants ask key questions at the end of a work
  period:

  - What worked well?

  - What could we improve?

  - What should we stop doing?


  For personal use, these become questions about individual habits,
  productivity, and goal progress.


  ## The "Three Ls" Method


  A popular format called "Three Ls" stands for liked, learned, and lacked:

  - **Liked**: What did I like about this period?

  - **Learned**: What did I learn?

  - **Lacked**: What was lacking?


  ## Implementation Steps


  1. **Schedule Regular Reviews**: Set a recurring time (weekly or bi-weekly)

  2. **Reflect on Questions**: Spend 30-60 minutes reviewing the period

  3. **Document Insights**: Write down answers to retrospective questions

  4. **Identify Actions**: Choose 1-3 concrete actions for the next period

  5. **Review Progress**: Check previous retrospective actions

  6. **Track Patterns**: Notice recurring themes over time


  ## Optimal Frequency


  7-14 days is the perfect frequency for personal retrospectives. Weekly reviews
  tend to be more effective than monthly, as they allow for quicker course
  correction while the experiences are still fresh.


  ## Duration


  The ideal duration for a personal retrospective is between 30 and 60 minutes.
  Short retrospectives tend to be more satisfying than lengthy ones, focusing on
  key insights rather than exhaustive analysis.


  ## Integration with Other Practices


  Personal retrospectives work well alongside:

  - Weekly reviews (GTD methodology)

  - Goal setting and OKRs

  - Habit tracking

  - Journaling practices

  - Time blocking for the week ahead


  ## Making It Stick


  Choose one ritual or practice to anchor each retrospective:

  - Sunday evening review

  - Friday afternoon reflection

  - End-of-sprint ceremony

  - Monthly calendar day

  - Quarterly personal planning


  ## Retrospective Questions Library


  **For Productivity:**

  - What tasks gave me the most value?

  - Where did I waste time?

  - What tools or techniques helped?


  **For Learning:**

  - What new skills did I develop?

  - What mistakes did I make?

  - What would I do differently?


  **For Well-being:**

  - Did I maintain work-life balance?

  - What energized me?

  - What drained my energy?


  **For Relationships:**

  - How did I contribute to team success?

  - Where could I communicate better?

  - What connections did I strengthen?


  ## Action Orientation


  The key to effective retrospectives is converting insights into concrete
  actions. Choose 1-3 specific, measurable actions to pursue in the coming week
  and add them to your personal to-do list. The impact becomes visible in next
  week's retrospective.


  ## Benefits


  - Continuous personal improvement

  - Better self-awareness

  - Pattern recognition

  - Accountability to self

  - Learning from mistakes

  - Celebrating wins

  - Course correction

  - Intentional growth


  ## Template Structure


  A basic personal retrospective template:


  1. Review last week's actions

  2. What went well?

  3. What didn't go well?

  4. What did I learn?

  5. Actions for next week

  6. One thing I'm grateful for


  ## 2026 Best Practices


  Make retrospectives:

  - **Concrete**: Focus on specific examples

  - **Action-oriented**: Always end with next steps

  - **Consistent**: Same day/time each week

  - **Brief**: 30-60 minutes maximum

  - **Honest**: Safe space for truth

  - **Forward-looking**: Learn and move on
