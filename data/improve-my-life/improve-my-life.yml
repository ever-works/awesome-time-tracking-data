markdown: >-
  ## Overview


  Improve My Life is a unique task management app that splits your life into
  eight primary categories including self-improvement, health, and people,
  applying Eisenhower Matrix principles across all life domains.


  ## Features


  - **Eight Life Categories**: Organize tasks across self-improvement, health,
  relationships, career, and more

  - **Eisenhower Matrix**: Built-in prioritization using importance and urgency
  values

  - **Task Categorization**: Assign tasks to specific life segments for balanced
  living

  - **Priority Scoring**: Mark importance and urgency for every task

  - **Holistic View**: See your entire life organized in one comprehensive
  system

  - **Progress Tracking**: Monitor progress across different life areas


  ## Philosophy


  Based on the principle that effective time management requires balancing
  multiple life domains, not just work tasks.


  ## Pricing


  Available on major app stores. Check official website for pricing details.
