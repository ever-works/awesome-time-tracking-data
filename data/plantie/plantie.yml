markdown: >-
  ## Plantie - Stay Focused


  Plantie is a focus timer app with a unique "plant withering" system that
  creates accountability, offering customizable Pomodoro sessions from 10
  minutes to 3 hours, focus mode that blocks distracting apps, and gamification
  with 15+ unique plants to collect through a 4-stage growth system. The app
  uses the science of Pomodoro to beat phone addiction, and has over 2 million
  students using it.


  If you leave the app to check social media, your plant withers—creating
  accountability to keep you focused. Plantie combines three proven productivity
  techniques: the Pomodoro Technique (structured work/break intervals),
  gamification (rewards and progress visualization), and negative reinforcement
  (plant withering prevents phone checking).


  ## Key Features


  - **Plant Withering System**: Creates accountability by withering plants if
  you leave the app

  - **Customizable Sessions**: Pomodoro timers from 10 minutes to 3 hours

  - **App Blocking**: Focus mode blocks distracting applications

  - **15+ Plants**: Collectible plants with 4-stage growth progression

  - **Progress Tracking**: Visual representation of focus time and achievements


  ## How It Works


  1. Choose a focus session duration

  2. Plant a virtual seed

  3. Stay in the app to let your plant grow

  4. If you leave to check other apps, your plant withers

  5. Collect different plant species as you complete sessions


  ## Target Users


  - Students preparing for exams

  - Anyone struggling with phone addiction

  - People who respond well to gamification

  - Those who need visual accountability


  ## Platform Availability


  Available on iOS (App Store) and Android (Google Play)


  ## Pricing


  Free to start with optional premium features for enhanced functionality.
