markdown: >-
  ## Overview


  Flow is a simple Pomodoro timer to organize your everyday work. It helps you
  work on a task, study for school, or simply stay focused without being
  distracted for a certain amount of time. Trusted by over half a million
  individuals and teams worldwide to stay focused and get more done.


  ## Features


  ### Pomodoro Timer

  - Work intervals and breaks

  - Customizable session lengths

  - Commitment mode for self-control

  - Focus session tracking


  ### Distraction Blocking

  - App blocking to combat distractions

  - Web blocking capabilities

  - Commitment mode prevents interruptions

  - Helps maintain focus during sessions


  ### Calendar Integration

  - Apple Calendar sync

  - Visualize scheduled focus time

  - Block time for deep work

  - Integration with existing workflows


  ### Health & Analytics

  - Apple Health sync

  - Statistics to track completed sessions

  - Monitor productivity trends

  - Session completion tracking


  ### Apple Ecosystem Integration

  - iCloud sync across devices

  - Home & Lock Screen Widgets

  - Live Activities support

  - Dynamic Island integration (supported devices)

  - Seamless experience across all Apple devices


  ## Platform Availability


  - iPhone

  - iPad

  - Mac

  - Apple Watch

  - All Apple platforms supported


  ## Who It's For


  - Apple users

  - Students

  - Professionals

  - Teams needing focus tools

  - Anyone using Pomodoro Technique

  - People seeking distraction-free work periods


  ## Benefits


  - Tiny but mighty app

  - Simple, focused functionality

  - Deep integration with Apple ecosystem

  - Proven technique (Pomodoro)

  - Trusted by 500,000+ users worldwide


  ## Pricing


  Available on the App Store with various pricing options.
