markdown: >-
  ## Overview


  Enso Retreat is a simple break reminder program which periodically blocks your
  computer to force you to rest. It's embedded into Enso Launcher as an optional
  module, but also available as a separate application.


  ## Key Features


  ### Forced Break Enforcement

  - Periodically blocks your computer to ensure rest

  - Transparent interface and gentle break notification

  - Enforces breaks to prevent overwork


  ### Smart Break Management

  - Ability to skip the first break once per day

  - Automatically skip breaks when certain programs are running

  - Skip breaks when user shows no activity (useful for movies or games)

  - Intelligent break scheduling based on actual usage


  ### Customization

  - Place favorite wallpapers over desktop when computer is locked

  - Configure period duration (how often breaks occur)

  - Set break duration (how long breaks last)

  - Adjust settings to match your work patterns


  ## Configuration


  **Periodic Break**: Occurs once in a specified period of time (near to the end
  of it)

  - **Period Duration**: Time between breaks in minutes

  - **Break Duration**: Length of each break in minutes


  ## Platform


  Primarily Windows, available as standalone or Enso Launcher module


  ## Open Source


  Available on GitHub at github.com/GChristensen/retreat


  ## Philosophy


  Takes a firm approach to break enforcement, ensuring users actually rest
  rather than simply ignoring reminders.
