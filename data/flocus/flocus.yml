markdown: >-
  ## Overview


  Flocus is a free browser-based productivity dashboard designed to fuel your
  productivity all in one place. Loved and trusted by over 1 million humans at
  top schools and companies, it combines beautiful aesthetics with powerful
  productivity features.


  ## Destinations & Themes


  ### Worldwide Destinations

  - Transport yourself to dreamy worldwide locations

  - Minimalist backdrops for clean aesthetics

  - Custom background uploads

  - Any YouTube video as background

  - Different theme for each dashboard mode


  ### Theme Customization

  - Set unique themes for personal, focus, and break modes

  - Upload custom images

  - Paste YouTube video links

  - Match mood and aesthetic preferences

  - Create perfect environment for each activity


  ## Core Features


  ### Timers

  - **Pomodoro Timer**: Classic 25/5 intervals

  - **Countdown**: Set custom countdowns

  - **Stopwatch**: Open-ended time tracking


  ### Task Management

  - Clear, reorderable to-do list

  - One priority displayed at a time

  - Focus on what matters most

  - Visual task organization


  ### Productivity Stats

  - Daily statistics

  - Weekly insights

  - Monthly productivity analysis

  - Data-driven improvement


  ### Ambient Sounds

  - Variety of calming concentration sounds

  - Get into the zone

  - Zen out during breaks

  - Customizable audio environment


  ## Multiple Modes


  ### Personal Home Base

  Your default productivity dashboard


  ### Focus Sessions

  Dedicated deep work environment


  ### Soothing Breaks

  Relaxation and rest mode


  Seamlessly toggle between modes as needed.


  ## Key Benefits


  - More efficient workflow

  - Personalized experience

  - Beautiful interface

  - All tools in one place

  - Free to use

  - Trusted by 1M+ users


  ## Platform Availability


  - Desktop browsers

  - Tablet optimized

  - Chrome extension available

  - Works across all major browsers


  ## Use Cases


  - Student study sessions

  - Professional work

  - Creative projects

  - Research and writing

  - Remote work

  - Hybrid learning


  ## Target Users


  - Students at top schools

  - Professionals at leading companies

  - Remote workers

  - Digital nomads

  - Anyone valuing aesthetic productivity

  - People needing all-in-one solution


  ## Chrome Extension


  Flocus New Tab extension replaces your new tab page with the Flocus dashboard:

  - Instant access to productivity tools

  - Every new tab becomes productive

  - Seamless integration

  - Quick task management


  ## Comparison with Alternatives


  Flocus stands out with:

  - 1M+ user community

  - Multiple mode support

  - Destination themes

  - Comprehensive feature set

  - Beautiful design

  - Free access


  ## Pricing


  Free browser-based dashboard with optional Chrome extension.
