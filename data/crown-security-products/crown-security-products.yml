markdown: >-
  ## Overview


  Crown Security Products manufactures and distributes biometric time clock
  systems including fingerprint scanners and facial recognition terminals. Their
  solutions help businesses eliminate time theft and automate attendance
  tracking.


  ## Features


  - Fingerprint biometric time clocks

  - Facial recognition terminals

  - Badge and PIN authentication options

  - Multi-modal biometric verification

  - Cloud-based and on-premise software

  - Real-time attendance monitoring

  - Payroll integration capabilities

  - Employee self-service features

  - Overtime tracking and alerts

  - Department and job code tracking

  - Reporting and analytics

  - Mobile clock-in options


  ## Pricing


  Crown Security Products offers a range of time clock hardware at various price
  points, from basic fingerprint terminals to advanced facial recognition
  systems. Software pricing varies based on deployment type and number of
  employees. Contact Crown Security for specific pricing and product
  recommendations.
