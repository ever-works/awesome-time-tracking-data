markdown: >-
  ## Overview


  Interstitial journaling is a productivity and journaling technique created by
  Tony Stubblebine that involves writing timestamped notes every time you take a
  break or switch tasks. It's the simplest way to combine note-taking, tasks,
  and time tracking in one unique workflow.


  ## How It Works


  The process is straightforward: jot down a few notes every time you take a
  break or change tasks, along with a timestamp. The core practice involves:


  1. **Timestamp Your Entry**: Note the current time

  2. **Reflect on Previous Task**: Write briefly about what you just completed
  or worked on

  3. **Brain Dump**: Capture any lingering thoughts from the previous task

  4. **Plan Next Task**: Note what you're about to work on

  5. **Mental Pulse**: Optionally record your energy, mood, or focus level


  ## Key Benefits


  ### Reduces Context Switching Costs


  Interstitial journaling tackles context switching by helping you take
  reflective breaks to declutter your mind between tasks and offload lingering
  thoughts onto your journal. This process empties your brain of the last
  project and gives space to formulate an optimal strategy for the next one.


  ### Kills Procrastination


  The act of writing down what you're about to do creates commitment and reduces
  the friction of starting new tasks.


  ### Mindful Breaks


  It's a great way to make breaks more mindful, allowing you to reflect on your
  previous task, plan for the next one, take your own mental pulse, and jot down
  anything else that comes to mind to reduce cognitive load.


  ### Automatic Time Tracking


  Timestamps provide a natural record of how time was spent throughout the day
  without dedicated tracking tools.


  ### Reduces Mental Clutter


  Offloading thoughts from one task prevents them from interfering with focus on
  the next task.


  ## Implementation


  ### Tools


  You can keep an interstitial journal anywhere—even a text file would work
  well. Popular options include:


  - **Plain text files**: Simple and universal

  - **Note-taking apps**: Workflowy, Obsidian, Logseq, Roam Research

  - **Digital documents**: Google Docs, Notion, Evernote

  - **Paper journal**: Traditional notebook with timestamps

  - **Bullet journal**: Integrates well with bullet journaling practice


  ### Daily Notes Integration


  The method caught on particularly among users of note-taking apps like
  Workflowy, Obsidian, and Logseq, where the daily notes feature made
  timestamped journaling feel native to the workflow.


  ### Entry Format


  A typical interstitial journal entry might look like:


  ```

  10:30 AM

  Just finished the client proposal. Feeling good about the timeline section but
  need to revisit pricing. Starting email responses next - want to clear inbox
  before lunch.


  12:15 PM

  Inbox at zero. Taking lunch break. Energy still high.


  1:00 PM

  Starting deep work on the Johnson project. Need to focus on the architecture
  design.

  ```


  ## Best Practices


  ### Keep Entries Brief


  A few sentences is typically enough. The goal is reflection, not extensive
  journaling.


  ### Be Consistent


  Write an entry every time you change tasks or take a break, not just when you
  remember.


  ### Don't Edit


  Write freely without worrying about grammar or structure. This is for you, not
  an audience.


  ### Review Periodically


  Look back at past entries to identify patterns in productivity, energy levels,
  and time allocation.


  ### Customize Your Format


  Adapt the technique to your needs - some people include mood indicators,
  energy levels, or focus scores.


  ## Variations


  ### Extended Interstitial Journaling


  Some practitioners include longer reflections on progress, challenges, and
  learnings.


  ### Minimal Interstitial Journaling


  Just timestamps and task names for pure time tracking without reflection.


  ### Bullet Journal Integration


  Combine with bullet journaling rapid logging symbols for quick entries.


  ## Who It's For


  - Knowledge workers with frequent task switching

  - Remote workers seeking structure and accountability

  - People struggling with context switching costs

  - Those who want mindful transitions between tasks

  - Anyone seeking simple time tracking without dedicated apps

  - Individuals working on self-awareness about work patterns


  ## Challenges


  - **Discipline Required**: Needs consistent practice to become habit

  - **Interruption**: Can feel like an interruption at first

  - **Privacy**: Digital journals should be kept private

  - **Review Time**: Entries accumulate and may need periodic cleanup


  ## Pricing


  Free methodology - requires only a note-taking system you likely already have
