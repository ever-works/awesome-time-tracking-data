name: Session Buddy
description: Tab and bookmark manager Chrome extension that saves open tabs as
  collections for easy restoration, automatic crash recovery, and powerful tab
  organization. Helps free up memory, avoid clutter, and quickly find and
  restore browsing sessions with export/import capabilities and folder
  organization.
