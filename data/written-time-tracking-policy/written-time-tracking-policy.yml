name: Written Time Tracking Policy
description: Essential documentation that serves as the single source of truth
  for time tracking expectations, defining what constitutes accurate time entry,
  frequency requirements, data access, and usage guidelines. A clear written
  policy reduces misunderstandings and establishes accountability for time
  tracking practices.
