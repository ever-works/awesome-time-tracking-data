markdown: >-
  ## Overview


  NGTECO manufactures advanced time clock systems with biometric authentication,
  specializing in touchless facial recognition technology. Their systems provide
  hygienic, accurate, and secure employee time and attendance tracking.


  ## Features


  - Advanced facial recognition technology

  - Touchless authentication for hygiene

  - Fingerprint biometric backup

  - Fast recognition speed (under 1 second)

  - Large employee database capacity

  - Anti-spoofing liveness detection

  - Mask detection capability

  - Temperature screening integration

  - Network connectivity (WiFi, Ethernet)

  - Access control integration

  - Multiple verification methods

  - Cloud and on-premise software options

  - Real-time attendance monitoring

  - Payroll export capabilities


  ## Pricing


  Professional-grade hardware at competitive prices. Software licensing
  available. Contact for specific model pricing and volume discounts.
