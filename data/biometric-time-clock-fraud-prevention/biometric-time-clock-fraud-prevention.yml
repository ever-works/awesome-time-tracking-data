name: Biometric Time Clock Fraud Prevention
description: Use of fingerprint, facial recognition, hand geometry, or iris
  scanning to verify employee identity at time clock, eliminating buddy punching
  and time theft by ensuring the person clocking in is physically present and
  correctly identified.
