markdown: >-
  ## Overview


  Getting Things Done (GTD) is a personal productivity methodology developed by
  David Allen and published in his 2001 book "Getting Things Done: The Art of
  Stress-Free Productivity." The system is based on the principle that there is
  an inverse relationship between things on your mind and those things getting
  done—by capturing all tasks externally, you free mental energy for execution.


  ## Core Concept


  GTD rests on moving all items of interest, relevant information, issues,
  tasks, and projects out of your mind by recording them externally in a trusted
  system. This reduces mental clutter and allows focus on taking action rather
  than remembering what needs to be done.


  ## The Five Steps of GTD


  ### 1. Capture

  Collect everything that has your attention—tasks, ideas, commitments,
  projects—in external collection tools (inbox, notebook, app).


  ### 2. Clarify (Process)

  Transform collected items into clear, actionable steps. Ask: "What is it?" and
  "Is it actionable?"


  ### 3. Organize

  Put clarified items where they belong:

  - **Next Actions** - Tasks you can do immediately

  - **Projects** - Multi-step outcomes requiring multiple actions

  - **Waiting For** - Tasks delegated or awaiting others

  - **Someday/Maybe** - Ideas for potential future action

  - **Reference** - Information for later use

  - **Calendar** - Time-specific commitments


  ### 4. Reflect (Review)

  Regularly review your system to keep it current and trustworthy. The Weekly
  Review is considered a "critical factor for success."


  ### 5. Engage (Do)

  Make trusted choices about what to do based on context, time available,
  energy, and priority.


  ## The Two-Minute Rule


  If an action can be completed in two minutes or less, do it immediately when
  you process it. It takes longer to organize and review it than to simply
  complete it.


  ## Weekly Review


  David Allen calls the weekly review a "critical factor for success." This
  regular review ensures:

  - System stays current and trusted

  - Completed tasks are acknowledged

  - Upcoming commitments are visible

  - You're doing the right things, not just any things


  ## Key Principles


  - **Mind like water** - Achieve a mental state of calm readiness

  - **Context-based action** - Organize tasks by where/when they can be done

  - **Outcome thinking** - Define desired results for all projects

  - **Next action thinking** - Always identify the immediate next physical
  action

  - **Stress-free productivity** - Trust your system to reduce mental burden


  ## Tools & Implementation


  GTD can be implemented with:

  - Digital apps (Todoist, OmniFocus, Things, Notion)

  - Paper-based systems (notebooks, folders, filing cabinets)

  - Combination of analog and digital tools

  - The 2026 GTD Organizer (available as PDF)


  ## Cultural Impact


  In 2007, Time magazine called Getting Things Done the self-help business book
  of its time. "GTD" has become shorthand for an entire approach to professional
  and personal task management, spawning a culture of websites, organizational
  tools, seminars, and derivative methods.


  ## Combining with Other Methods


  GTD works well with:

  - **Pomodoro Technique** - Use GTD to organize, Pomodoro to execute

  - **Time blocking** - Schedule next actions in your calendar

  - **Eisenhower Matrix** - Prioritize which actions to engage with first


  ## Who It's For


  - Knowledge workers managing multiple projects

  - Professionals with heavy email and communication loads

  - Anyone feeling overwhelmed by commitments

  - People who need a comprehensive life management system

  - Individuals wanting stress-free productivity


  ## Challenges


  Potential difficulties:

  - Initial setup requires significant time investment

  - Maintaining the system requires discipline

  - Can feel overwhelming with very large backlogs

  - Weekly review commitment is non-negotiable


  ## Success Factors


  - Consistent capture of all commitments

  - Regular processing of inboxes

  - Weekly reviews without exception

  - Trust in the system's completeness

  - Honest assessment of next actions


  GTD remains one of the most influential and comprehensive personal
  productivity systems, valued for its thoroughness, flexibility, and proven
  ability to reduce stress while increasing output.
