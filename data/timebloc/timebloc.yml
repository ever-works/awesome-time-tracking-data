markdown: >-
  ## Overview


  TimeBloc is the premier time blocking application designed to streamline your
  time blocking experience on iOS devices. Developed by Kodeon, Inc., it has
  been acquired by Reflectly and continues to offer intuitive time management
  features for iPhone and iPad users.


  ## Key Features


  ### Timelines

  Block your day into multiple events by the hour or minute, whether leisure or
  work activities. Personalize your day with TimeBloc's intuitive design that
  makes scheduling visual and straightforward.


  ### Routines

  Creating a routine is simple - just plan it once and let TimeBloc integrate it
  into your timeline automatically. This feature helps build consistent habits
  without repeatedly creating the same time blocks.


  ### Calendar Integration

  Effortlessly incorporate your existing calendar events into your plans,
  providing a unified view of both scheduled events and planned time blocks.


  ### Notifications

  Get notified of every event to stay on track throughout your day.


  ### Statistics

  Visualize your progress over time with built-in analytics that show how you're
  spending your hours and days.


  ### Lock Screen Widgets

  TimeBloc supports iOS 16+ Lock Screen Widgets, allowing you to see your
  schedule at a glance without unlocking your device.


  ## Platform & Requirements


  - **Platform**: iOS (iPhone and iPad)

  - **Requirements**: iOS 15.0 or later

  - **Availability**: App Store


  ## User Reception


  TimeBloc is highly rated with 4.30 out of 5 stars, based on 7,200+ user
  ratings.


  ## Pricing


  The app is available for free download with premium features available through
  subscription.


  ## Development


  TimeBloc has been acquired by Reflectly, a well-known developer of
  productivity and wellness apps, ensuring continued development and support for
  the platform.
