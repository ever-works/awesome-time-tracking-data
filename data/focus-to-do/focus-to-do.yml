markdown: >-
  ## Overview


  Focus To-Do is a time management application that combines the Pomodoro
  Technique and task list. It is a science-based app that motivates users to
  stay focused and get things done.


  ## Features


  ### Pomodoro Timer

  - Customizable pomodoro/breaks lengths

  - Support for short and long breaks

  - Pause and resume Pomodoro sessions

  - Define Focus time length

  - Customizable short/long break intervals

  - Auto start options for next Focus Time and breaks

  - Various white noise to help focus on work and study


  ### Task Management

  - Recurring tasks with powerful due dates like "Every Monday"

  - Sub-tasks to break down tasks into smaller, actionable items

  - Checklist functionality

  - Task Priority with color-coded priority levels

  - Estimated Pomodoro Number to estimate workload or set goals

  - Project organization


  ### Analytics & Reporting

  - Analyze work time and task completion

  - Time spent on work every day/week/month

  - Time ratio of projects

  - Trend charts

  - Gantt Chart of Focus Time

  - Statistics on completed To-Dos

  - Time distribution of projects


  ### Motivation Features

  - "Forest" feature: Turn focused moments into a lovely plant

  - Interesting way to build motivation

  - Visual progress tracking

  - Gamification elements


  ### Focus Enhancement

  - App Whitelist to prevent distraction

  - Stop getting distracted by apps when focusing

  - Various white noise options

  - Customizable focus environment


  ### Cross-Platform Support

  - iPhone

  - iPad

  - Mac

  - Android

  - Windows

  - Apple Watch

  - Seamless synchronization across all devices


  ## Additional Features


  - Chrome browser extension

  - Integration with several productivity tools

  - Works as both timer and task manager

  - Relatively robust task management capabilities


  ## Platform Availability


  - iOS (App Store)

  - Android (Google Play)

  - macOS (Mac App Store)

  - Windows (Microsoft Store)

  - Web (Chrome extension)

  - Apple Watch


  ## Who It's For


  - Students

  - Professionals

  - Anyone using Pomodoro Technique

  - Task-oriented workers

  - People seeking focus and productivity tools

  - Teams needing time management


  ## Pricing


  Free version available with premium features through in-app purchases.
