markdown: >-
  ## Overview


  FlowMo is a dedicated application built specifically to implement the Flowtime
  Technique (also called Flowmodoro), providing tools for flexible focus
  sessions with automatic proportional break calculation.


  ## Core Features


  **Count-Up Timer**: Tracks how long you've been in focused work, rather than
  counting down like Pomodoro


  **Natural Stop**: Work until concentration wanes, then stop the timer


  **Automatic Break Calculation**: Computes 20% break time based on work session
  length


  **Break Timer**: Guides you through calculated rest period


  **Session History**: Log of work sessions and break patterns


  **Statistics**: Track average session lengths and total focus time


  ## How It Works


  1. Click to start focus session (timer counts up)

  2. Work until you feel concentration diminishing

  3. Stop the timer when focus naturally ends

  4. App calculates 20% break (e.g., 60 min work = 12 min break)

  5. Take calculated break

  6. Resume when break timer completes

  7. Repeat the cycle


  ## Advantages Over Generic Timers


  **Purpose-Built**:

  - Designed specifically for Flowtime methodology

  - Automatic break calculation

  - No manual math required

  - Session tracking and insights


  **vs. Pomodoro Apps**:

  - No rigid 25-minute forcing

  - Respects natural flow states

  - Flexible rather than prescriptive

  - Adapts to task demands


  ## User Experience


  **Simplicity**: Clean, minimal interface focused on the technique


  **Guidance**: Helps users learn optimal session lengths


  **Flexibility**: Accommodates different work types and energy levels


  **Feedback**: Shows patterns in focus duration over time


  ## Use Cases


  **Creative Work**: Writing, design, composition where flow states are crucial


  **Deep Work**: Programming, analysis, research requiring sustained
  concentration


  **Learning**: Studying and skill acquisition


  **Flexible Workers**: Anyone whose tasks vary in focus requirements


  ## Integration with Flowtime Philosophy


  Embodies Zoe Read-Bivens' core principles:

  - Work with natural attention spans

  - Break when truly needed, not arbitrarily

  - Proportional recovery prevents burnout

  - Flexibility over rigidity


  ## Platform Availability


  Typically available as:

  - Web application

  - Desktop app

  - Mobile apps (iOS/Android)


  Pricing varies by platform and features.


  ## Community and Resources


  Often includes:

  - Explanation of Flowtime Technique

  - Tips for effective use

  - Blog about productivity science

  - User community sharing experiences


  ## Why a Dedicated App Matters


  While Flowtime can be done with any timer:

  - Dedicated app removes friction

  - Automatic calculations prevent errors

  - Tracking provides insights

  - Purpose-built features support the methodology

  - Community reinforces practice


  FlowMo represents the maturation of the Flowtime Technique from concept to
  implemented practice, making the flexible focus approach accessible to anyone
  seeking an alternative to rigid time blocking methods.
