markdown: >-
  ## Overview


  monday dev is a specialized version of monday.com built specifically for
  software development teams, offering agile planning, sprint management,
  roadmapping, and time tracking integrated with popular development tools.


  ## Features


  - **Sprint Planning**: Plan and manage sprints with capacity planning and
  velocity tracking

  - **Roadmaps**: Visual roadmaps with timeline and Gantt views for release
  planning

  - **Time Tracking**: Built-in time tracking on tasks and user stories (Pro
  tier and above)

  - **Backlog Management**: Prioritize and groom product backlog with story
  points

  - **Kanban & Scrum**: Flexible boards supporting both kanban and scrum
  methodologies

  - **Bug Tracking**: Dedicated bug tracking with severity levels and assignment

  - **GitHub Integration**: Two-way sync with GitHub for automated updates from
  commits and PRs

  - **Reporting**: Sprint reports, burndown charts, and velocity metrics

  - **Automation**: 200+ automation recipes for repetitive tasks

  - **Custom Workflows**: Configure workflows to match team processes


  ## Pricing


  Standard plan starts at $12 per user per month with basic features. Pro plan
  at $20 per user per month includes time tracking and advanced reporting.
  Enterprise plans with enhanced security and support available.
