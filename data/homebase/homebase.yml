markdown: >-
  ## Overview


  Homebase provides free employee scheduling and time tracking specifically
  designed for small businesses in restaurants, retail, and service industries.


  ## Core Features (Free)


  **Scheduling**:

  - Unlimited schedules

  - Shift templates

  - Team messaging

  - Availability tracking


  **Time Clock**:

  - Mobile and tablet time clock

  - GPS and geofencing

  - Overtime alerts

  - Timesheet editing


  **Team Communication**:

  - Group messaging

  - Shift reminders

  - Announcements


  ## Premium Features


  - Advanced reporting

  - PTO tracking

  - Shift trading

  - Hiring and onboarding

  - HR compliance tools

  - Payroll integration


  ## Why It's Free


  Basic features are free forever; revenue from premium features and payroll
  services.


  ## Target Users


  - Small businesses (5-50 employees)

  - Restaurants and cafes

  - Retail stores

  - Service businesses

  - Hourly workforce


  ## Pricing


  - Basic: Free forever

  - Essentials: $20/location/month

  - Plus: $48/location/month

  - All-in-One: $80/location/month
