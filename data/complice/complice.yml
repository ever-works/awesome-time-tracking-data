markdown: >-
  ## Overview


  Complice is a unique productivity tool that emphasizes intention-setting and
  goal alignment. It combines daily planning, time tracking, and long-term goal
  management with a focus on staying connected to your deeper purposes.


  ## Features


  - **Daily Intentions**: Set intentions each morning

  - **Goal Hierarchy**: Connect daily work to long-term goals

  - **Time Tracking**: Pomodoro-based time tracking

  - **Accountability**: Optional accountability partners

  - **Reflection**: Evening review prompts

  - **Streak Tracking**: Build consistent habits

  - **Integration**: Connects with Beeminder and other tools

  - **Tagging**: Organize work by context

  - **Analytics**: Insights on time and goal progress


  ## Philosophy


  Based on intention-setting rather than just task completion. Each day, you
  decide what you intend to do and why it matters, keeping you connected to your
  broader goals.


  ## Pricing


  - $12/month or $99/year

  - 30-day free trial

  - Web-based application
