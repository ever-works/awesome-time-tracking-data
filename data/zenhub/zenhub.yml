markdown: >-
  ## Overview


  ZenHub is an agile project management tool built as a native extension to
  GitHub, allowing development teams to plan sprints, track progress, and manage
  roadmaps without leaving their development workflow.


  ## Features


  ### GitHub Integration

  - Native GitHub integration

  - Works directly in GitHub interface

  - No context switching required

  - Syncs with GitHub issues automatically


  ### Sprint Planning

  - Sprint boards and backlogs

  - Velocity tracking

  - Burndown charts

  - Story point estimation


  ### Roadmapping

  - Visual roadmaps

  - Epic tracking

  - Release planning

  - Dependency management


  ### Reporting

  - Sprint reports

  - Velocity charts

  - Cycle time analytics

  - Team productivity metrics


  ## Key Benefits


  - Developers stay in familiar GitHub environment

  - Reduces tool switching

  - Better adoption from engineering teams

  - Real-time sync with code repository


  ## Pricing


  Free tier available

  Paid plans for advanced features and larger teams
