markdown: >-
  ## Overview


  Avoma is an AI Meeting Assistant and Revenue Intelligence solution for
  customer-facing teams for startups and scaleups. Avoma functions as an
  end-to-end meeting lifecycle assistant covering agenda setting, meeting
  scheduling, automatic recording & transcription, and follow-up action items.


  ## Key Features for 2026


  ### Auto Chapters

  Avoma's AI breaks your meetings into chapters based on conversation topics,
  making it easy to navigate long recordings and find specific discussions.


  ### AI Note-taking

  - Captures detailed, human-like notes tailored to custom templates for each
  meeting type

  - Saves 15 minutes per meeting in manual note-taking

  - Allows you to focus on the conversation while AI handles documentation


  ### Smart Categorization

  Avoma identifies the topic of discussion and breaks it down into smart
  categories including:

  - Business needs

  - Pain points

  - Competitors

  - Budget discussions

  - Timeline requirements

  - Decision makers


  ## Conversation Intelligence


  Conversation Intelligence module available for $29/recorder seat/month,
  providing:

  - Advanced analytics on sales conversations

  - Competitor mentions tracking

  - Objection handling analysis

  - Deal insights and patterns

  - Coaching opportunities identification


  ## Time Savings


  - Save 4+ hours a week on note-taking and CRM updates

  - Automated action items and follow-ups

  - Focus on conversations instead of documentation

  - Timely follow-ups through automated reminders


  ## Pricing (2026)


  - Basic recording and transcription: ~$20 per user/month

  - Conversation Intelligence: $29/recorder seat/month (add-on)

  - Business plan: Includes advanced analytics, conversation intelligence, and
  CRM integrations


  ## Meeting Lifecycle Support


  ### Before Meetings

  - Agenda creation and sharing

  - Meeting scheduling

  - Participant preparation


  ### During Meetings

  - Automatic recording

  - Live transcription

  - Real-time note capture

  - Topic tracking


  ### After Meetings

  - AI-generated summaries

  - Action item extraction

  - CRM automatic updates

  - Follow-up reminders

  - Conversation analytics


  ## Integrations


  - CRM platforms (Salesforce, HubSpot, etc.)

  - Calendar applications

  - Communication tools

  - Video conferencing platforms (Zoom, Teams, Google Meet)


  ## Use Cases


  - Sales call documentation and analysis

  - Customer success meetings

  - Product demos and presentations

  - Customer discovery calls

  - Quarterly business reviews

  - Team collaboration meetings

  - Client onboarding sessions
