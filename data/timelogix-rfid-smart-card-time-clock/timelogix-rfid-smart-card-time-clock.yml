markdown: >-
  ## Overview


  Timelogix RFID Smart Card Time Clock is a physical device that ensures
  reliable clock-ins in various environments, from clean offices to harsher
  industrial settings, using RFID smart cards or PIN entry.


  ## Features


  - **RFID Technology**: Smart card reader for contactless clock-in/out

  - **PIN Entry**: Backup authentication via numeric PIN

  - **Durable Design**: Built for harsh industrial environments

  - **Multi-Environment**: Works in offices, warehouses, and outdoor settings

  - **Real-Time Sync**: Automatically syncs time data to cloud systems

  - **Employee Database**: Store employee credentials and access levels

  - **Reporting**: Generate attendance and hour reports

  - **Offline Mode**: Continue tracking even without network connection


  ## Use Cases


  Ideal for manufacturing, construction, warehouses, healthcare facilities, and
  any business needing physical time clock hardware.


  ## Technology


  Supports various RFID card frequencies and formats for compatibility with
  existing access control systems.


  ## Pricing


  Contact vendor for pricing and hardware options.
