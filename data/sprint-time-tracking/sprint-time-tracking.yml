name: Sprint Time Tracking
description: Agile practice of tracking time spent on user stories and tasks
  within defined sprint periods (1-4 weeks). Helps teams improve velocity
  estimates, identify blockers, measure capacity, and refine future sprint
  planning through actual vs estimated time analysis.
