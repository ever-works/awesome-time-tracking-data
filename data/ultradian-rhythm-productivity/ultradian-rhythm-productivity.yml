markdown: >-
  ## Overview


  Ultradian rhythm productivity leverages natural 90-120 minute cycles of
  alertness that occur throughout the day, working with your body's natural
  energy patterns rather than against them.


  ## The Science


  Discovered by sleep researcher Nathaniel Kleiterman in the 1950s, ultradian
  rhythms are recurring periods throughout the day during which your body and
  brain cycle between periods of high alertness and periods of recovery. These
  cycles typically last 90-120 minutes.


  ## How to Apply Ultradian Rhythms


  **Structure Your Day:**

  - Break your day into two or three "Master Cycles" of 90-120 minutes each

  - During high-energy phases, focus on deep, challenging work

  - Use low-energy phases for recovery, light tasks, or breaks


  **Maximize High Phases:**

  - Banish all distractions during high-alert periods

  - Tackle your most important and demanding work

  - Maintain single-task focus


  **Honor Recovery Phases:**

  - Take genuine breaks between cycles

  - Don't push through natural energy dips

  - Use this time for movement, light tasks, or rest


  ## Benefits


  - Sustainable high performance without burnout

  - Better alignment with natural biology

  - Improved focus during work periods

  - Reduced fatigue and stress

  - Higher quality work output


  ## Implementation


  - Track your energy levels to identify your personal patterns

  - Schedule deep work during natural high-energy periods

  - Build in 15-20 minute breaks between cycles

  - Avoid fighting natural energy dips with caffeine

  - Be patient as you learn your rhythms
