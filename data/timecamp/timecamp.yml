markdown: >-
  ## Overview


  TimeCamp is a fully automated time tracking platform that captures work
  activities, tracks project progress, and optionally takes screenshots for
  accountability. The software uses keyword-based automation to categorize time
  entries, reducing manual input and improving accuracy.


  ## Key Features


  - **Automatic time tracking** - Desktop app records all online and offline
  activities without manual timer starts/stops

  - **Keyword automation** - Define keywords to automatically log time to
  corresponding tasks and projects

  - **Screenshot monitoring** - Optional screenshots every 10 minutes during
  active tracking (requires Ultimate plan)

  - **Private time mode** - Allows employees to take breaks without monitoring
  during designated private time

  - **Timesheets** - Automated timesheet generation from tracked activities

  - **Productivity tracking** - Monitor app and website usage to identify
  productive and unproductive time

  - **Budgeting** - Track time and costs against project budgets

  - **Invoicing** - Generate invoices based on tracked billable hours

  - **Attendance tracking** - Monitor employee attendance and work schedules

  - **Integrations** - Connect with project management tools, calendars, and
  business applications


  ## Tracking Methods


  TimeCamp offers multiple ways to track time:

  - Automatic background tracking via desktop app

  - Manual time entry for past activities

  - Timer-based tracking for real-time logging

  - Calendar integration for meeting time capture


  ## Privacy Features


  Screenshots are optional and must be enabled in settings. The private time
  feature allows employees to mark breaks and personal browsing without
  monitoring or screenshot capture.


  ## Use Cases


  - Teams needing automatic time categorization

  - Organizations requiring optional screenshot accountability

  - Businesses tracking billable hours across multiple clients

  - Remote teams balancing productivity monitoring with privacy


  ## Pricing


  - **Free Forever Plan**: Basic time tracking for unlimited users (no
  screenshots)

  - **Ultimate Plan**: $7.99/user/month (billed annually) - includes
  screenshots, advanced reporting, and all premium features


  TimeCamp strikes a balance between automatic tracking convenience and optional
  monitoring features, making it suitable for organizations seeking both
  efficiency and accountability.
