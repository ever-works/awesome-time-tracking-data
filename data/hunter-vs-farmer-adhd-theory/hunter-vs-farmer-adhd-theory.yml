markdown: >-
  ## Overview


  The **hunter versus farmer hypothesis** is a proposed explanation for the
  nature of attention-deficit hyperactivity disorder (ADHD), first suggested by
  radio host and author Thom Hartmann in his book "Attention Deficit Disorder: A
  Different Perception."


  The hypothesis notes that humans spent most of their evolutionary history in
  hunter-gatherer societies, and argues that ADHD represents a lack of
  adaptation to farming societies rather than a true disorder.


  ## Core Premise


  Thom Hartmann's theory states that ADHD is not, in fact, a disorder as we've
  largely classified it. Instead, it's the result of evolution. ADHD individuals
  simply have brains that evolved for different purposes than neurotypical
  individuals (farmers).


  ## ADHD Traits as Hunter Advantages


  Many of the typical traits attributed to ADHD — such as impulsivity and
  novelty-seeking — were beneficial at a time when our forebears were struggling
  to survive in harsh and uncertain pre-agricultural, subsistence environments.


  **Hyperfocus**

  Experts note that hyperfocusing was advantageous to those in hunter societies,
  as it conferred superb hunting skills and a prompt response to predators.


  **Urgency Response**

  Glickman & Dodd (1998) found that adults with self-reported ADHD scored higher
  than other adults on self-reported ability to hyperfocus on "urgent tasks",
  such as last-minute projects or preparations. Adults in the ADHD group were
  uniquely able to postpone eating, sleeping and other personal needs and stay
  absorbed in the "urgent task" for an extended time.


  **Nomadic Advantages**

  A study of the Ariaal tribe in Kenya found that the still-nomadic members who
  had the variant allele (associated with ADHD) were generally healthier than
  those who lacked it.


  ## The Mismatch Theory


  These theories suggest that traits which are specific to individuals diagnosed
  with ADHD increased the fitness of carriers in an ancestral environment and
  therefore spread in the population due to natural selection.


  However, as a result of the astonishingly fast cultural evolution of the human
  species and subsequent environmental changes, particularly in the last 10,000
  years, **ADHD traits have become maladaptive in present-day societies**.


  Hyperfocus is not suited to modern life in an industrial society, where
  sustained attention to routine tasks is often required.


  ## Important Caveats


  **Not Hard Science**

  Hartmann first developed the idea as a mental model after his own son was
  diagnosed with ADHD, stating, "It's not hard science, and was never intended
  to be."


  **Evolutionary Evidence**

  A 2020 study found that ADHD allele frequency has been decreasing for up to
  35,000 years, indicating negative selection rather than positive selection for
  these traits.


  ## Practical Applications


  Understanding this theory can help individuals with ADHD:

  - Recognize their strengths in high-urgency, novel situations

  - Structure work to include variety and immediate feedback

  - Leverage hyperfocus abilities for important tasks

  - Understand why traditional "farmer" work structures may feel unnatural

  - Seek environments that reward hunter-type traits


  ## Related Concepts


  - The 11:59 Protocol (uses urgency to trigger ADHD hyperfocus)

  - Time blindness (common ADHD challenge)

  - Task initiation difficulties

  - Interest-based nervous system


  ## Pricing


  Not applicable - this is a theoretical framework, not a commercial product.
