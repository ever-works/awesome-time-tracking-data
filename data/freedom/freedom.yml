markdown: >-
  ## Overview


  Freedom is one of the most popular cross-platform focus apps, supporting Mac,
  Windows, iOS, Android, and browser extensions. It allows users to block
  websites, apps, or even the entire internet across all their devices
  simultaneously.


  ## Key Features


  ### Cross-Platform Blocking

  Unique among distraction blockers, Freedom works across:

  - macOS

  - Windows

  - iOS (iPhone/iPad)

  - Android

  - Chrome, Firefox, Edge (browser extensions)


  ### Synchronized Blocking

  When you start a block session, it activates across all your devices
  automatically, preventing the temptation to switch to another device.


  ### Scheduled Sessions

  Set up recurring block schedules (e.g., weekdays 9am-5pm) to create consistent
  productivity habits.


  ### Locked Mode

  Once enabled, prevents you from ending sessions early, similar to
  SelfControl's strict approach.


  ### Block the Internet

  Option to completely disable internet access across all devices during focus
  sessions.


  ## Blocking Options


  ### Website Blocking

  Block specific websites or entire categories (social media, news, shopping).


  ### App Blocking  

  Block desktop and mobile applications.


  ### Full Internet Block

  Disable all internet connectivity when maximum focus is needed.


  ## Use Cases


  ### Remote Workers

  Maintain focus across work-from-home distractions on all devices.


  ### Students

  Block distractions during study time on laptop, tablet, and phone
  simultaneously.


  ### Writers

  Eliminate all digital interruptions across devices during writing sessions.


  ### Digital Wellness

  Reduce overall screen time and social media usage.


  ## Advantages


  ### Device Coverage

  The most comprehensive cross-device blocking available.


  ### Flexibility

  Balances strictness (locked mode) with flexibility (adjustable sessions).


  ### Habit Building

  Recurring schedules help build long-term productivity habits.


  ## Pricing


  Subscription-based pricing with monthly and annual plans. Often offers special
  promotions and lifetime deals.


  ## Comparison


  ### vs. Cold Turkey

  Freedom offers more flexibility and cross-platform support; Cold Turkey is
  stricter on desktop.


  ### vs. SelfControl

  Freedom is cross-platform and includes mobile; SelfControl is Mac-only but
  free.


  ### vs. Browser Extensions

  Much more reliable as it can't be easily disabled like browser extensions.
