markdown: >-
  ## Overview


  Deep Work is a methodology developed by Cal Newport, defined as professional
  activity performed in a state of distraction-free concentration that pushes
  cognitive capabilities to their limit. This contrasts with shallow work:
  non-cognitively demanding, logistical-style tasks often performed while
  distracted.


  ## Four Deep Work Philosophies


  ### 1. Monastic Philosophy

  Drastically minimize or eliminate shallow activities. Example: Science fiction
  writer Neal Stephenson doesn't provide his email address on his website.


  ### 2. Bimodal Philosophy

  Divide time into deep work periods and everything else. Dedicate specific time
  blocks exclusively to deep thoughts while handling shallow activities
  separately.


  ### 3. Rhythmic Philosophy

  Transform deep work into a habit through consistent daily sessions. The chain
  of consistent work creates rhythmic routine and powerful motivation.


  ### 4. Journalistic Philosophy

  Take advantage of any free time block in your calendar to schedule deep work
  sessions, fitting deep work around other commitments.


  ## Time Blocking Method


  Newport's personal practice involves scheduling every minute of the day:

  - Write down work hours on a lined sheet

  - Divide hours into blocks and assign activities

  - Update the schedule when knocked off track

  - Give every minute a job


  ## Newport's Personal Practice


  Newport builds his days around 3-4 hours per day, five days a week, of
  uninterrupted and carefully directed concentration. He batches shallow
  activities into smaller bursts at the peripheries of his schedule.


  ## Benefits


  - Produces high-quality, valuable output

  - Maximizes cognitive capabilities

  - Reduces time wasted on shallow work

  - Creates meaningful, satisfying work
