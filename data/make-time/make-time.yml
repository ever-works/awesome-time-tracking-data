markdown: >-
  ## Overview


  "Make Time: How to Focus on What Matters Every Day" is a productivity book by
  Jake Knapp and John Zeratsky that addresses the modern challenges of the "busy
  bandwagon" and "infinity pools" - endless distractions from apps, email, and
  social media.


  ## The Authors


  Jake Knapp is a designer, investor, and New York Times bestselling author
  whose books Sprint, Make Time, and Click are available in over 20 languages
  worldwide. He is cofounder and general partner at Character Capital and
  previously helped build Gmail and Microsoft Encarta, cofounded Google Meet,
  and was a partner at Google Ventures.


  John Zeratsky is an entrepreneur, designer, and bestselling author who helps
  people and organizations design better lives through books, workshops, and
  coaching.


  ## The Four-Step Framework


  The book features a four-step daily framework:


  1. **Highlight** - Choose a single priority for your day

  2. **Laser** - Beat distraction to make time for your Highlight

  3. **Energize** - Use the body to recharge the brain

  4. **Reflect** - Adjust and improve your system


  ## Key Concepts


  ### The Busy Bandwagon

  The hectic culture of modern societies where everyone feels obligated to be
  constantly busy.


  ### Infinity Pools

  Endless sources of distraction like social media feeds, news, and video
  streaming that consume unlimited time.


  ### 80+ Tactics

  The book provides more than 80 practical tactics readers can experiment with
  to:

  - Make small shifts in their environment

  - Liberate themselves from constant busyness and distraction

  - Create time for meaningful activities


  ## Philosophy


  Make Time rejects the notion that productivity is about doing more things
  faster. Instead, it advocates for intentionality - making conscious choices
  about how to spend your time and energy on what truly matters.


  ## Availability


  The book remains widely available and relevant in 2026, with continued
  recommendations from productivity experts and readers worldwide across
  multiple formats including hardcover, paperback, ebook, and audiobook.
