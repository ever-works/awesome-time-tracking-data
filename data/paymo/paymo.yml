markdown: >-
  ## Overview


  Paymo combines project management, time tracking, and invoicing in one
  platform. It's designed for small agencies and freelancers who need to track
  time, manage projects, and get paid.


  ## Features


  - Time tracking (timer, manual, bulk)

  - Task management and Kanban boards

  - Gantt charts

  - Team scheduling

  - Invoicing and payments

  - Expense tracking

  - Client portal

  - Resource planning

  - Mobile apps


  ## Workflow


  1. Create projects and tasks

  2. Track time on tasks

  3. Generate invoices from tracked time

  4. Send to clients and accept payments

  5. Track project profitability


  ## Pricing


  Free for 1 user

  Small Office: $11.95/user/month

  Business: $24.95/user/month
