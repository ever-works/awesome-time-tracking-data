name: Flow State Optimization
description: Practice of deliberately creating conditions for flow - the optimal
  state of consciousness where performance and satisfaction peak. Based on
  Mihaly Csikszentmihalyi's research identifying challenge-skill balance, clear
  goals, immediate feedback, and distraction elimination as key triggers.
