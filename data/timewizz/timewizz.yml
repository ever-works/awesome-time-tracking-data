markdown: >-
  ## Overview


  TimeWizz is designed to make complex work environments simple, positioning
  itself as a modern solution for time tracking. TimeWizz is a comprehensive
  time management software designed specifically for agencies and SMBs.


  ## Features


  - **Quick Start/Stop Tracking**: Start and stop tracking just by hitting the
  space bar for instant time recording

  - **Automatic Calculations**: Automatically calculates project time, free
  time, sick time and more

  - **Simple Setup**: No account or credit card information required for setting
  up trial access

  - **All-in-One Platform**: Comprehensive solution that handles various time
  management needs in one place

  - **Agency-Focused**: Specifically designed to meet the needs of agencies and
  small-to-medium businesses


  ## Target Users


  TimeWizz is ideal for agencies, SMBs, and teams that need a comprehensive time
  management solution without the complexity of enterprise-level software.


  ## Pricing


  There is a free trial version for the first 30 days with no account or credit
  card information required for setting up trial access.


