markdown: >-
  ## Overview


  The Jar Glass Method is a task categorization technique that uses the metaphor
  of filling a jar with different-sized elements to represent task importance.
  It teaches that you must prioritize big, important items before filling your
  time with smaller tasks.


  ## Task Categories


  - **Rocks** - The big, important, strategic items that must be tackled first

  - **Pebbles** - Medium-importance tasks that matter but aren't critical

  - **Sand** - Smaller, routine tasks that fill in gaps

  - **Water** - Trivial activities and distractions


  ## Core Principle


  If you keep tackling small things (sand and water) and not the important
  strategic items (rocks), your jar will quickly fill up with no room left for
  the important work. Always handle the rocks first, then pebbles, then sand,
  and finally water.
