markdown: >-
  ## Overview


  EPAY Systems offers biometric fingerprint time clocks as part of their human
  capital management systems that help businesses benefit from more efficient
  time tracking while reducing time fraud. The platform features biometric time
  clocks, mobile tracking, and seamless integration with payroll systems.


  ## Biometric Technologies


  ### Authentication Methods

  - Proven biometric authentication technologies including fingerprint
  recognition and facial recognition

  - Verify employee identity to prevent buddy punching

  - Badge/card scanner included if biometrics aren't suitable

  - Multiple authentication options for workforce flexibility


  ### Anti-Fraud Capabilities

  - Eliminates buddy punching through biometric verification

  - Prevents time rounding and data entry errors

  - Reduces time theft and fraudulent clock-ins


  ## Cost Savings


  The increased accuracy can save businesses a significant amount of labor
  dollars:

  - Reported savings of 1.5-10% of gross payroll

  - Eliminates data entry errors that cost money

  - Prevents buddy punching losses

  - Reduces time rounding costs

  - Lower payroll administrative burdens


  ## Product Models


  ### WalTer T16

  - Built-in printer for on-demand pay stub printing

  - Saves more than $2 per pay stub every pay period

  - Full biometric authentication capabilities

  - Comprehensive time tracking features


  ### WalTer S18

  - Compact, portable biometric time clock

  - Facial recognition technology proven to prevent time fraud

  - Easy to carry and deploy

  - Powerful labor cost reduction capabilities


  ## Features


  - Biometric fingerprint and facial recognition

  - Badge/card scanning option

  - Mobile time tracking capabilities

  - Seamless payroll system integration

  - On-demand pay stub printing (T16 model)

  - Portable deployment options (S18 model)

  - Online time tracking integration

  - Data accuracy and fraud prevention


  ## Benefits


  - Significant payroll cost reduction

  - Eliminates buddy punching completely

  - Reduces administrative burden

  - Improves time tracking accuracy

  - Seamless payroll integration

  - Multiple authentication options

  - Portable and fixed deployment options


  ## Use Cases


  - Construction companies with field workers

  - Manufacturing facilities

  - Healthcare organizations

  - Retail operations

  - Any business concerned about time fraud

  - Organizations with multiple work sites
