markdown: >-
  ## Overview


  "Effortless: Make It Easier to Do What Matters Most" by Greg McKeown is a New
  York Times bestseller published in 2021, from the author of the
  million-copy-selling "Essentialism." The book starts with a simple principle:
  Not everything has to be so hard.


  ## Core Philosophy


  Essentialism is about doing the right things, while Effortless is about doing
  them in the right way. The book challenges the idea that achieving anything
  worthwhile means overexerting ourselves.


  ## Key Concepts


  The book breaks down:

  - How to make tasks and projects feel easy

  - Actions we can take to maximize our efforts

  - Techniques for increasing outputs while keeping our inputs low

  - Making the most essential activities the easiest ones


  ## Simplicity as a Core Value


  Building on the principles of McKeown's earlier work "Essentialism," this book
  offers insights and strategies to simplify and streamline our approach to life
  and work, challenging the prevailing notion that success requires relentless
  effort.


  ## Practical Application


  Effortless offers actionable advice for achieving the results you want without
  burning out. Rather than pushing harder, the book shows how to find easier
  paths to the same (or better) outcomes.


  ## Critical Acclaim


  The book has received endorsements from notable authors including:

  - Daniel H. Pink

  - Cal Newport

  - Arianna Huffington


  ## Relationship to Essentialism


  Together with "Essentialism," McKeown's books have sold 3 million copies and
  been published in 40 languages. His clients include Apple, Amazon, Google,
  Microsoft, Nike, and the Navy Seals.


  ## Format


  Published in 2021, available in hardcover, paperback, ebook, and audiobook
  formats.
