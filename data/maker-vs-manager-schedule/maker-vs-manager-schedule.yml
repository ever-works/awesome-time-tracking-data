name: Maker vs. Manager Schedule
description: Paul Graham's framework distinguishing between maker schedule (long
  uninterrupted blocks for creative work) and manager schedule (calendar divided
  into hour-long slots), explaining why meetings disrupt makers more than
  managers.
source_url: http://www.paulgraham.com/makersschedule.html
category: Time Management Philosophy
tags:
  - paul-graham
