markdown: >-
  ## Overview


  The Now Habit is one of the most effective programs to combat procrastination,
  having sold over 200,000 copies and been translated into 11 languages. The
  book offers a comprehensive plan to help readers lower their stress and
  increase their time to enjoy guilt-free play.


  ## About the Author


  Neil Fiore, Ph.D. is a licensed psychologist, trainer, keynote speaker and the
  author of six books, including the best-seller, The Now Habit.


  ## Core Philosophy


  According to Fiore, procrastination is not the problem—it is a symptom of a
  deeper underlying issue regarding:

  - Fear of failure

  - Fear of rejection

  - Fear of success

  - Generally feeling overwhelmed by grand plans and pressure


  ## Key Concepts


  ### Unscheduling

  The book introduces the concept of "unscheduling," a unique approach to time
  management that starts with scheduling guilt-free play time first.


  ### Positive Affirmations

  The book encourages readers to focus on positive affirmations to increase
  productivity and overcome the negative self-talk that often accompanies
  procrastination.


  ### Strategic Program

  The book offers techniques to help any busy person:

  - Start tasks sooner

  - Accomplish them more quickly

  - Reduce anxiety brought on by negative habits of procrastination and
  perfectionism


  ## Updated Edition


  The revised and updated edition features:

  - A new introduction

  - A new section providing strategies to deal with distractions from technology
  and the Internet


  ## Critical Acclaim


  The book has received widespread acclaim and is considered a foundational
  resource for anyone struggling with procrastination, offering practical,
  psychologically-based tools rather than simple motivational platitudes.


  ## Format


  Available in paperback, ebook, audiobook, and even as a 64-card motivational
  card deck for the Fiore Productivity Program.
