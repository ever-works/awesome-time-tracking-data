markdown: >-
  ## Overview


  Rize is an AI productivity coach that uses automatic time tracking to improve
  focus and build better work habits. Available for macOS and Windows, Rize runs
  in the background analyzing work patterns and providing personalized guidance.


  ## Core Features


  ### Automatic Time Tracking

  - Runs passively in the background

  - No start/stop timers needed

  - Tracks and categorizes work activity in real-time

  - Recognizes 300,000+ apps, websites, and tools


  ### Focus Quality Score

  Rize provides a personalized Focus Quality Score showing:

  - Current focus level

  - Productivity patterns throughout the day

  - Optimal work times

  - Distraction patterns


  ### AI-Powered Insights

  - Analyzes shifts in productivity and focus time

  - Highlights patterns you'd never catch manually

  - Identifies when you're most productive

  - Suggests optimal times for deep work


  ### Real-Time Coaching

  The AI productivity coach:

  - Advises when to focus

  - Suggests when to take breaks

  - Alerts when you're getting off track

  - Provides timely productivity nudges


  ## Focus Tools


  ### Automatic Distraction Blocker

  Stays in flow during work sessions with automatic blocking of distracting
  websites when focus mode is active.


  ### Focus Music Library

  Access to a curated library of focus-enhancing music designed to improve
  concentration.


  ### Planned Sessions

  Schedule uninterrupted time for demanding tasks with dedicated focus sessions.


  ### AI Break Suggestions

  Receive AI-powered recommendations for when to take breaks to recharge and
  prevent burnout.


  ## Context Switch Detection


  Rize's AI detects context switching between tasks and projects, helping you:

  - Understand switching costs

  - Identify fragmentation patterns

  - Minimize unnecessary task-switching

  - Improve focus continuity


  ## Analytics & Reporting


  - Daily, weekly, and monthly productivity reports

  - Time allocation by category

  - Deep work vs. shallow work analysis

  - Meeting time tracking

  - Break patterns and recommendations


  ## Privacy


  Rize emphasizes privacy:

  - Data stored locally by default

  - No screenshot capture

  - User controls what gets tracked

  - Transparent about data usage


  ## Platform Support


  - macOS

  - Windows


  ## Pricing


  Subscription-based with free trial available to test the platform.


  ## Key Differentiator


  Rize combines automatic tracking with AI coaching, making it not just a
  monitoring tool but an active productivity improvement system that learns your
  patterns and provides actionable guidance.
