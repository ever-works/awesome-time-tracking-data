markdown: >-
  ## Overview


  Jen Casey is known as the Brain-Based Business Coach (CEO Psyche). She is a
  top industry speaker and the creator of the CEO Psyche brand and podcast.


  ## Programs that Profit


  Her signature program, Programs that Profit, helps coaches build, sell, and
  run high-level group programs. The approach combines neuroscience-informed
  strategies with business development.


  ## Brain-Based Approach


  Casey integrates brain science and psychology into her coaching methodology,
  helping clients understand how their cognitive processes affect productivity,
  decision-making, and business outcomes.
