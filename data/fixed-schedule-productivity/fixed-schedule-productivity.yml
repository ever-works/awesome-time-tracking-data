markdown: >-
  ## Overview


  Fixed-schedule productivity is a time management philosophy created by Cal
  Newport: Choose a schedule of work hours that you think provides the ideal
  balance of effort and relaxation. Do whatever it takes to avoid violating this
  schedule.


  ## Core Principle


  The method forces you to be ruthlessly efficient with your time because you've
  eliminated the option of simply working longer hours. This constraint drives
  innovation in how you approach work and forces difficult decisions about
  priorities.


  ## Implementation


  ### Step 1: Define Your Ideal Schedule


  Decide in advance exactly when you will work and when you will stop. For
  example, you might commit to working 9 AM to 5 PM Monday through Friday, with
  absolutely no work on evenings or weekends.


  ### Step 2: Protect the Schedule


  Treat your fixed schedule as inviolable. When new demands arise, you must:

  - Decline commitments that don't fit

  - Optimize existing work to be more efficient

  - Eliminate low-value activities

  - Batch similar tasks

  - Automate or delegate when possible


  ### Step 3: Develop Supporting Strategies


  In Newport's own life, the demands of fixed-schedule productivity helped him
  develop what became his time blocking and shutdown ritual strategies.


  ## Benefits


  - Forces prioritization of truly important work

  - Eliminates work expansion to fill available time (Parkinson's Law)

  - Protects personal time and prevents burnout

  - Increases focus and efficiency during work hours

  - Creates sustainable long-term productivity

  - Improves work-life integration


  ## Relationship to Other Methods


  Fixed-schedule productivity works synergistically with:

  - Time blocking for planning daily work

  - Deep work for executing high-value tasks

  - Shutdown rituals for transitioning from work to personal time


  ## Challenges


  - Requires saying no to opportunities and requests

  - May conflict with workplace cultures that value long hours

  - Demands significant upfront optimization of workflows

  - Can be difficult to maintain during crisis periods


  ## Who It's For


  Fixed-schedule productivity works best for knowledge workers with some
  autonomy over their schedules, including researchers, writers, programmers,
  consultants, and entrepreneurs who want to maintain productivity without
  sacrificing personal life.
