markdown: >-
  ## David Allen's Two-Minute Rule


  Coined by David Allen in his book "Getting Things Done," the two-minute rule
  states: "If an action will take less than two minutes, it should be done at
  the moment it's defined."


  ## The Rationale


  The reasoning is "it's more or less the point where it starts taking longer to
  store and track an item than to deal with it the first time it's in your
  hands—in other words, it's the efficiency cutoff."


  ## How It Works


  If you determine an action can be done in two minutes, you should do it right
  then because it'll take longer to organize it and review it than it would be
  to actually finish it the first time you notice it.


  ## Important Context


  David Allen cautioned that "you shouldn't become a slave to spending your day
  doing two-minute actions. This rule should be applied primarily when you are
  engaging with new input."


  ## When to Apply


  The 2-minute rule should be applied during processing time, such as:

  - Going through emails

  - Reviewing your inbox

  - Assessing your task list


  ## Flexibility


  Two minutes is just a guideline. If you have a long open window of time to
  process your in-tray, you can extend the cutoff to five or ten minutes.


  ## Benefits


  - Prevents small tasks from cluttering your task list

  - Reduces decision fatigue

  - Maintains momentum

  - Eliminates overhead of tracking tiny tasks

  - Keeps your system clean and focused on important work


  ## Variations


  James Clear adapted this rule for habit formation, where it means starting a
  new habit should take less than two minutes to begin, which is a different
  application than Allen's original productivity principle.
