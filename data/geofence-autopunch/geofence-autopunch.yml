markdown: >-
  ## Overview


  Geofence Autopunch is an automated time tracking feature that uses GPS
  location services to automatically clock employees in and out when they enter
  or exit predefined geographic boundaries (geofences) around job sites. This
  eliminates the need for manual time punching and provides location
  verification for field-based workers.


  ## How It Works


  ### Geofence Setup

  1. Create virtual boundaries around job sites by entering an address

  2. Set the radius (typically 50-500 meters)

  3. Customize the center point and adjust the geofence area as needed

  4. Assign employees to specific geofenced locations


  ### Automatic Time Tracking

  - Employee's phone detects entry into geofenced area during scheduled hours

  - System automatically punches employee in

  - When employee exits geofence, system automatically punches them out

  - All entries include GPS coordinates and timestamp


  ## Key Features


  ### Punch Prompt® Technology

  - Sends notification when employee arrives at job site

  - Reminds forgetful employees to confirm clock-in

  - Prevents "forgot to punch in" scenarios

  - Saves administrator time fixing timesheets


  ### Violation Alerts

  - Manager receives email when employee punches in/out outside geofenced area

  - Colored globe icon indicates whether employee was on-site or off-site

  - Real-time notifications of geofence violations

  - Distance tracking shows how far employee was from site


  ### Anti-Fraud Features

  - Block employees from punching in if not at job site

  - Auto punch-out if location services are turned off

  - Notify managers if employee turns phone off to avoid detection

  - Continuous monitoring during shift to detect site departure


  ### Scheduled Autopunch

  - Employees automatically punched in/out as they enter/exit sites during
  scheduled hours

  - Works only during expected shift times

  - Prevents accidental punches outside work hours


  ## Benefits


  **Eliminates Time Theft**: Ensures employees are actually at the job site when
  clocked in


  **Saves Administrative Time**: No more fixing forgotten or incorrect punches


  **Improves Accuracy**: GPS verification provides proof of location


  **Increases Accountability**: Employees know their location is being tracked


  **Reduces Disputes**: Timestamp and GPS data provide clear evidence


  ## Use Cases


  ### Construction

  - Multiple job sites with different crews

  - Verify workers are at correct site

  - Track time spent at each phase of project


  ### Field Service

  - Service technicians at customer locations

  - HVAC, plumbing, electrical contractors

  - Maintenance and repair services


  ### Healthcare

  - Home health aides visiting patients

  - Verify arrival and departure from patient homes

  - Track travel time between visits


  ### Landscaping

  - Crews working at different properties

  - Track time per client location

  - Monitor equipment usage at sites


  ### Delivery & Transportation

  - Drivers at pickup/delivery locations

  - Warehouse loading/unloading time

  - Distribution center operations


  ## Technical Requirements


  **Mobile Device**: Smartphone with GPS capability


  **Location Services**: Must be enabled on employee device


  **Mobile Data or WiFi**: For real-time sync (offline capability available)


  **Battery Considerations**: Geofencing uses minimal battery (less than
  continuous GPS tracking)


  ## Privacy Considerations


  - Location tracking only during work hours

  - Employees typically must consent to location monitoring

  - Data used solely for time tracking, not surveillance

  - Many systems allow employees to turn off tracking outside scheduled shifts


  ## Accuracy Factors


  **GPS Accuracy**: Typically 5-15 meters under good conditions


  **Urban Canyons**: Tall buildings can affect GPS accuracy


  **Indoor Locations**: GPS may be less accurate inside buildings


  **Weather**: Heavy cloud cover or storms can impact precision


  ## Best Practices


  - Set geofence radius appropriate to site size (not too small or large)

  - Test geofences before full deployment

  - Train employees on location service requirements

  - Have backup manual punch option for GPS failures

  - Regular review of geofence violations to identify issues

  - Clearly communicate location tracking policy to employees


