markdown: >-
  ## Overview


  The ABCDE Method is a prioritization technique created by Brian Tracy that
  categorizes tasks into 5 different categories, making the top priority the
  obvious next step. It is featured prominently in his bestselling book "Eat
  That Frog!"


  ## How It Works


  You start with a list of everything you have to do for the coming day. Once
  you have a list of all of the tasks you must complete, you start the ABCDE
  method by assigning each task to one of five categories.


  ## The Five Categories


  ### A Tasks: Must Do

  **Definition**: Something that is very important - something that you must do,
  a task for which there can be serious consequences if you fail to do it.


  **Characteristics**:

  - Critical to your success

  - Serious negative consequences if not completed

  - Cannot be delegated

  - Your highest priority


  **Multiple A Tasks**:

  - If you have more than one "A" task, prioritize by writing A-1, A-2, A-3, and
  so on

  - Your A-1 task is your biggest, ugliest frog of all

  - Start with A-1 and don't stop until it's complete


  ### B Tasks: Should Do

  **Definition**: A task that you should do, but it only has mild consequences.


  **Characteristics**:

  - Someone may be unhappy or inconvenienced if you don't do it

  - Nowhere as important as an A task

  - Never do a B task when an A task is left undone


  **Rule**: A B task is never as important as an A task, no matter how urgent it
  seems.


  ### C Tasks: Nice To Do

  **Definition**: A task that would be good to do, but it doesn't much matter
  whether you do it or not.


  **Examples**:

  - Having lunch with a coworker

  - Phoning a friend

  - Personal errands during work hours


  **Rule**: These tasks don't affect your work or have no consequences at all.


  ### D Tasks: Delegate

  **Definition**: A task you can delegate to someone else.


  **Principle**: You should delegate anything that someone else can do, so you
  can create time to do the tasks that only you can do.


  **Benefits**:

  - Frees time for A and B tasks

  - Develops others' skills

  - Maximizes your value contribution


  ### E Tasks: Eliminate

  **Definition**: An activity that should ideally be eliminated altogether.


  **Examples**:

  - Time-wasting activities

  - Low-value busywork

  - Tasks that no longer serve a purpose

  - Habits that don't contribute to goals


  **Action**: Stop doing these entirely.


  ## Implementation Steps


  1. **List all tasks** for the day or week

  2. **Assign a letter** (A, B, C, D, or E) to each task

  3. **Number A tasks** in order of importance (A-1, A-2, etc.)

  4. **Start immediately** on your A-1 task

  5. **Stay at it** until it is complete

  6. **Move to A-2**, then A-3, and so on

  7. **Never do a B task** when an A task is undone


  ## The Critical Rule


  **The key to making this ABCDE Method work is to discipline yourself to start
  immediately on your "A-1" task, stay at it until it is complete, and use your
  willpower to get going on this one job, the single most important task you
  could possibly be doing.**


  ## Benefits


  ### Clarity

  - Removes ambiguity about what to work on next

  - Makes priorities crystal clear

  - Reduces decision fatigue


  ### Focus

  - Prevents working on low-value tasks

  - Ensures important work gets done

  - Stops urgency trap


  ### Results

  - Accomplishes high-impact work

  - Prevents procrastination on critical tasks

  - Maximizes productivity


  ## Integration with Other Methods


  ### Eat That Frog

  - Your A-1 task is your "frog"

  - Eat it first thing in the morning


  ### Eisenhower Matrix

  - A tasks = Urgent & Important

  - B tasks = Important, Not Urgent

  - C tasks = Urgent, Not Important

  - D/E tasks = Not Urgent, Not Important


  ### Time Blocking

  - Block your best time for A tasks

  - Schedule B tasks for less critical times

  - Eliminate C, D, E tasks from schedule


  ## Common Mistakes


  1. **Doing B tasks before A tasks** because they're easier

  2. **Not delegating D tasks** because it seems faster to do them yourself

  3. **Keeping E tasks** on the list instead of eliminating them

  4. **Making everything an A** - this defeats the purpose

  5. **Not numbering multiple A tasks** - leads to unclear priorities


  ## Who It's For


  - Anyone with overwhelming to-do lists

  - Professionals managing multiple priorities

  - People prone to busy work

  - Those struggling with what to work on first

  - Managers needing to delegate effectively

  - Anyone seeking clearer priorities


  ## Key Insight


  The ABCDE Method forces you to think through the consequences of doing or not
  doing each task. This consequences-based thinking ensures you focus on what
  truly matters rather than what's merely urgent or easy.


  ## Pricing


  The methodology itself is free to use. It is detailed in Brian Tracy's book
  "Eat That Frog!" which is available for purchase.
