markdown: >-
  ## Overview


  Pomotodo combines the Pomodoro Technique with task management and time
  tracking, creating an integrated system for focused work and productivity
  measurement.


  ## Core Features


  ### Pomodoro Timer

  - 25-minute focus sessions

  - 5-minute short breaks

  - 15-minute long breaks (after 4 pomodoros)

  - Customizable durations

  - Audio notifications


  ### Task Integration

  - Link pomodoros to specific tasks

  - Track time per task automatically

  - See which tasks consume most time

  - Historical task data


  ### Analytics

  - Daily/weekly/monthly statistics

  - Pomodoros completed

  - Focus patterns

  - Productivity trends

  - Task time breakdown


  ## Platform Availability


  - Web application

  - iOS app

  - Android app

  - Desktop apps (Mac, Windows)

  - Browser extensions


  ## Best For


  - Pomodoro technique practitioners

  - Users wanting task-level time data

  - People combining focus and tracking

  - Students and knowledge workers
