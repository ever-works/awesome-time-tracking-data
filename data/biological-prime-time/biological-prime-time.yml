markdown: >-
  ## Overview


  Biological Prime Time is the period when you're naturally most alert and
  productive. Discovering and leveraging your BPT maximizes output quality and
  efficiency.


  ## Discovery Process


  ### Week-Long Tracking

  1. Track energy levels hourly (1-10 scale)

  2. Note when focus comes easily

  3. Record when tasks feel difficult

  4. Identify patterns over 7 days

  5. Calculate average energy by hour


  ## Common Patterns


  ### Morning Larks

  - Peak: 8am-12pm

  - Trough: 2-4pm

  - Recovery: 5-7pm


  ### Night Owls

  - Peak: 11am-2pm and 9pm-midnight

  - Trough: 8-10am

  - Recovery: Afternoon


  ### Hummingbirds (Most People)

  - Peak: 9am-11am

  - Trough: 2-3pm

  - Recovery: 4-6pm


  ## Application


  **During Peak Hours**:

  - Most important work

  - Complex problem-solving

  - Creative tasks

  - Strategic thinking

  - Critical decisions


  **During Trough**:

  - Administrative tasks

  - Email

  - Meetings (if necessary)

  - Routine work

  - Data entry


  **During Recovery**:

  - Collaborative work

  - Brainstorming

  - Planning

  - Learning


  ## Benefits


  - Higher quality output

  - Less mental fatigue

  - Better use of energy

  - Improved work satisfaction

  - More sustainable productivity


  ## Time Tracking Tips


  - Log energy level with each time entry

  - Analyze correlation with output

  - Identify optimal task-time matches

  - Adjust schedule iteratively
