markdown: >-
  ## Overview


  TickTick is a comprehensive productivity app combining task management,
  calendar, Pomodoro timer, and habit tracking in one integrated platform.


  ## Key Features


  ### Task Management

  - Multiple lists and folders

  - Subtasks and checklists

  - Tags and priorities

  - Smart date parsing

  - Recurring tasks


  ### Built-in Pomodoro

  - Focus timer for each task

  - Track focused time

  - Customizable work/break intervals

  - White noise options

  - Focus statistics


  ### Calendar Integration

  - Calendar view of tasks

  - Google Calendar sync

  - Time blocking on calendar

  - Agenda view


  ### Habit Tracking

  - Daily habit checkboxes

  - Streak tracking

  - Habit analytics

  - Reminders


  ## Platform Availability


  - Web app

  - iOS (iPhone, iPad, Apple Watch)

  - Android (phone, tablet, Wear OS)

  - Desktop (Mac, Windows, Linux)

  - Browser extensions


  ## Pricing


  Generous free tier with premium subscription for advanced features like
  calendar view, custom smart lists, and themes.


  ## Best For


  - Users wanting all-in-one solution

  - Cross-platform productivity seekers

  - Pomodoro + task management combo

  - Budget-conscious users (free tier)
