markdown: >-
  ## Overview


  Buddy Punch is time tracking and attendance software custom-built for U.S.
  businesses with hourly workers. It has a score of 4.8 out of 5 stars on G2 and
  Capterra.


  ## Time Tracking Options


  Employees can clock in/out using any internet-connected device via
  usernames/passwords, PIN codes, QR codes, or facial recognition.


  ## Employee Accountability Features


  - GPS tracking captures employees' locations when clocking in/out

  - Geofencing restricts clock-ins to designated boundaries

  - Photo requirements and facial recognition verify identity


  ## Automated Timesheet Management


  All punch data compiled into timesheets with automatic calculation of regular
  hours, overtime, and pay amounts.


  ## Payroll Integrations


  Seamlessly send timesheet data to QuickBooks, Gusto, Paychex, SurePayroll, and
  more.


  ## Pricing


  Custom pricing based on number of employees. Free trial available.
