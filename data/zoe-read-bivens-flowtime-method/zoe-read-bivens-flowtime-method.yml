markdown: >-
  ## Overview


  Zoe Read-Bivens, a teacher and productivity expert, invented the Flowtime
  Technique in 2016 to address limitations of the Pomodoro Technique. Her method
  allows for natural, uninterrupted work intervals rather than forced 25-minute
  sessions.


  ## Key Innovation


  Instead of rigid 25-minute timers, Flowtime:

  - Works until concentration naturally wanes

  - Takes proportional breaks based on work duration

  - Respects flow state rather than interrupting it

  - Counts up instead of down


  ## Break Formula


  Divide focused work duration by 5:

  - 25 min work = 5 min break

  - 50 min work = 10 min break

  - 90+ min work = 15-20 min break


  ## Why She Created It


  Read-Bivens found Pomodoro's rigid timers disruptive when in flow state,
  especially problematic for creative and deep work requiring extended
  concentration periods.


  ## Pricing


  Free methodology — no cost to implement Zoe Read-Bivens' method.
