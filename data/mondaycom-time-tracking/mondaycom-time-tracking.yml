markdown: >-
  ## Overview


  monday.com includes built-in time tracking capabilities through its Time
  Tracking Column and widget system, designed for teams managing projects and
  workflows.


  ## Native Features


  ### Time Tracking Column (Pro & Enterprise Plans)


  - **Timer Controls**: Start, pause, and stop timer by clicking play button in
  board items

  - **Manual Entry**: Add time ranges manually by clicking into cells

  - **Display Options**: Show time in seconds (default) or minutes

  - **Sub-item Support**: Add time tracking to sub-items with optional sum
  display in parent item

  - **Future Restriction**: Cannot enter future time values


  ### Time Tracking Widget


  - **Dashboard Visualization**: View time across boards by person and project

  - **Basic Reporting**: Total numbers based on selected boards and filters

  - **Export Capability**: Export entire column to Excel with item name, user,
  and time totals


  ## Advanced Options for 2026


  Since 2025, **monday Vibe** allows building custom time tracking solutions
  directly in monday.com using AI-generated apps, offering flexibility for teams
  with specific needs.


  ## Integration Options


  monday.com integrates with third-party time tracking tools like Everhour,
  TimeCamp, and others for enhanced functionality.


  ## Pricing


  Time tracking features available on Pro and Enterprise plans.
