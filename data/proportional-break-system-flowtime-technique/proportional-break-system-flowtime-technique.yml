name: Proportional Break System (Flowtime Technique)
description: The Flowtime technique's proportional break calculation where break
  duration equals work time divided by 5 (e.g., 25 min work = 5 min break, 50
  min = 10 min, 90+ min = 10 min break), allowing natural work rhythms while
  ensuring adequate rest.
