markdown: >-
  ## Overview


  Deputy's AI-Powered Auto-Scheduling uses artificial intelligence to craft
  optimal schedules for shift-based businesses. The system analyzes multiple
  data points to create schedules that balance labor costs, customer demand, and
  employee preferences.


  ## How It Works


  ### AI Analysis

  The system considers:

  - Historical sales and traffic patterns

  - Labor demand forecasts

  - Employee availability and preferences

  - Skills and certifications required

  - Labor budget constraints

  - Compliance rules (breaks, overtime, etc.)


  ### Automated Schedule Creation

  Auto-Scheduling automatically:

  - Creates fully costed schedules in minutes

  - Assigns shifts to qualified employees

  - Balances workload across the team

  - Reduces unnecessary wage costs

  - Ensures adequate staffing levels


  ### Employee Notification

  Once schedules are created, Deputy notifies staff automatically when they're
  working via push notifications and SMS.


  ## Additional Features


  ### Time & Attendance

  - GPS location verification on clock-in

  - Automatic break and overtime tracking

  - Mobile time tracking via phone

  - Shared terminal for clock-ins


  ### Compliance Management

  - Automated break scheduling

  - Fair Workweek compliance

  - Overtime tracking and alerts

  - Custom pay rule enforcement


  ## Pricing


  - Scheduling: $4.50/user/month

  - Time & Attendance: $4.50/user/month

  - Premium: $6/user/month

  - Enterprise: Custom pricing


  ## Integrations


  Integrates with Intuit QuickBooks, Square, BambooHR, Gusto, ADP, and more.
