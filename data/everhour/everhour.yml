markdown: >-
  ## Overview


  Everhour is a time tracking platform specifically designed for project-based
  teams. It offers time tracking with built-in billing and budgeting
  capabilities, allowing teams to set project budgets, track billable hours, and
  receive threshold alerts—all integrated directly inside popular project
  management tools.


  ## Features


  - **Native Integrations** - Track time directly within Asana, Jira, ClickUp,
  Monday, Basecamp, Trello, GitHub, and more

  - **Multiple Tracking Methods** - Use timers, manual logging, or watch apps

  - **Budget Management** - Set project budgets and receive alerts when burning
  through hours too quickly

  - **Billing Rates** - Configure rates per person or task for accurate
  invoicing

  - **Invoice Generation** - Create invoices automatically from tracked time

  - **Estimates vs. Actuals** - Compare planned versus actual time spent

  - **Team Utilization Reports** - Analyze team capacity and workload

  - **Multi-Platform** - Available on mobile, desktop, browser, and smartwatch

  - **Standalone Mode** - Can create projects and tasks directly in Everhour
  without external PM tools

  - **Threshold Alerts** - Get notified when projects approach budget limits


  ## Integrations


  Asana, Basecamp, Trello, Jira, GitHub, ClickUp, Monday.com, Notion, Todoist,
  and many more.


  ## Pricing


  Free plan for up to 5 users (limited features). Team plan starts at $8.50 per
  user/month (minimum 5 seats), billed annually.
