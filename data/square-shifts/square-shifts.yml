markdown: >-
  ## Overview


  Square Shifts is an employee scheduling and shift management solution that
  integrates seamlessly with Square's point-of-sale and business management
  ecosystem. It's designed for retail, restaurant, and hospitality businesses
  that need efficient team coordination and labor cost control.


  ## Features


  - Visual drag-and-drop schedule builder

  - Mobile app for employees to view schedules

  - Shift swap and time-off requests

  - Team messaging and notifications

  - Time clock with clock in/out

  - Break tracking

  - Labor cost forecasting

  - Schedule templates for recurring shifts

  - Overtime alerts

  - Integration with Square POS and payroll


  ## Mobile Capabilities


  - Employees access schedules from mobile devices

  - Push notifications for schedule changes

  - Request time off from mobile app

  - Shift swaps with manager approval

  - Team chat for communication

  - Clock in/out from mobile device

  - Real-time schedule updates


  ## Scheduling Features


  - Create schedules weeks in advance

  - Copy schedules from previous weeks

  - Schedule templates for efficiency

  - Multiple location support

  - Role-based shift assignment

  - Availability tracking

  - Conflict detection and warnings

  - Publish schedules to team instantly


  ## Labor Management


  - Real-time labor cost tracking

  - Budget vs. actual comparison

  - Overtime monitoring and alerts

  - Labor percentage calculations

  - Sales-to-labor ratio analysis

  - Shift profitability insights

  - Labor forecast based on sales projections


  ## Time Tracking


  - Simple clock in/out interface

  - Break time tracking

  - Timesheet management

  - Late arrival and early departure tracking

  - Automatic timesheet generation

  - Manager approval workflows

  - Export to Square Payroll


  ## Integration with Square Ecosystem


  - Square Point of Sale

  - Square Payroll (seamless export)

  - Square Team Management

  - Square Dashboard analytics

  - Unified employee database

  - Single sign-on for staff


  ## Team Communication


  - Built-in team messaging

  - Broadcast messages to all or selected staff

  - Shift-specific communications

  - Schedule change notifications

  - Time-off request status updates


  ## Manager Tools


  - Multi-location schedule management

  - Labor cost analytics and reporting

  - Employee availability overview

  - Time-off calendar

  - Schedule conflict resolution

  - Shift coverage tracking

  - Performance insights


  ## Use Cases


  - Retail stores managing hourly workers

  - Restaurants and cafes with shift-based staff

  - Hospitality businesses (hotels, event venues)

  - Service businesses with variable schedules

  - Multi-location businesses using Square POS

  - Small to medium-sized teams (under 100 employees)


  ## Benefits


  - Reduces time spent on scheduling

  - Minimizes scheduling conflicts

  - Improves employee communication

  - Controls labor costs effectively

  - Simplifies payroll processing with Square integration

  - Increases employee satisfaction with self-service features

  - Mobile accessibility for distributed teams


  ## Pricing


  Part of Square's pricing plans. Contact Square for current pricing details
  based on business size and features needed.
