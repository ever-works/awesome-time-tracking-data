name: Construction Geofencing Jobsite Verification
description: GPS-based technology in construction time tracking apps that
  creates virtual boundaries around jobsites to verify workers are at the
  correct location when clocking in and out, helping prevent time theft while
  accommodating legitimate variations in arrival points.
source_url: https://www.workyard.com/compare/construction-time-clock-apps
category: Construction Time Tracking
tags:
  - gps
