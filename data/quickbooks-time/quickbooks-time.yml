markdown: >-
  ## Overview


  QuickBooks Time (formerly TSheets) is a comprehensive time tracking solution
  designed for mobile workforces and field teams. It combines GPS location
  tracking, geofencing, and automated timesheets with seamless QuickBooks
  payroll integration to streamline the entire time-to-pay process.


  ## Key Features


  - **GPS time tracking** - Logs employee location when clocking in and updates
  throughout the day

  - **Geofencing** - Automatic clock-in/out reminders when entering or leaving
  job sites

  - **Mobile time clock** - Track time from smartphones with the QuickBooks
  Workforce app

  - **AI-powered tracking** - Intelligent automation for time and job tracking

  - **Real-time updates** - Location and time data updates continuously during
  shifts

  - **Project and job tracking** - Assign time to specific clients, projects, or
  job codes

  - **Photo capture** - Employees can attach photos at clock-in for job
  verification

  - **Scheduling** - Create and share employee schedules

  - **Time off management** - Request and approve PTO within the app


  ## Payroll Integration


  - **QuickBooks sync** - Automatic synchronization with QuickBooks Online
  Payroll

  - **Save time on payroll** - Up to 2 hours saved on every payroll run

  - **Reduce costs** - Up to 4% reduction in payroll costs through accurate
  tracking

  - **50+ integrations** - Connect with other accounting and payroll
  applications

  - **Included with QB Payroll** - Bundled with QuickBooks Online Payroll
  Premium and Elite


  ## Privacy & Tracking


  - **On-clock only** - QuickBooks Time ONLY records locations while employees
  are clocked in

  - **No off-hours tracking** - Never tracks employee or contractor location
  when off the clock

  - **Transparent** - Employees know when tracking is active


  ## Geofencing Features


  - Set virtual boundaries around job sites

  - Automatic reminders to clock in/out

  - Prevent time theft and buddy punching

  - Verify employees are at correct locations


  ## Reporting


  - Detailed time reports by employee, project, or client

  - Labor cost analysis

  - Overtime tracking and alerts

  - Productivity insights

  - Exportable data for accounting


  ## Use Cases


  - Construction crews working at multiple job sites

  - Field service technicians visiting customer locations

  - Landscaping and maintenance teams

  - Delivery drivers and mobile sales teams

  - Any business with employees working outside the office


  ## Platform Availability


  - **Mobile apps** - iOS and Android (QuickBooks Workforce app)

  - **Web dashboard** - Browser-based management and reporting

  - **Kiosk mode** - Shared device for team clock-in/out


  ## Pricing


  Pricing varies based on features and number of users. Included with QuickBooks
  Online Payroll Premium and Elite subscriptions, or available as standalone
  service.


  ## Former Name


  Formerly known as TSheets before acquisition by Intuit and rebranding as
  QuickBooks Time.


  QuickBooks Time is ideal for businesses with mobile workforces that need GPS
  verification, geofencing capabilities, and tight integration with payroll
  processing.
