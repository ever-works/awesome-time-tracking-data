markdown: >-
  ## Overview


  HRMantra is an established cloud HR management system serving over 450,000
  employees across 1,200+ organizations. It provides end-to-end HR automation
  from recruitment through retirement, with particular strength in payroll and
  compliance.


  ## Time & Attendance Module


  ### Attendance Management

  - Biometric device integration

  - Mobile attendance with GPS

  - Web-based time capture

  - Shift roster management

  - Overtime and late-coming tracking

  - Attendance regularization workflows


  ### Leave Management

  - Multi-level leave approval

  - Leave accrual automation

  - Encashment calculations

  - Comp-off management

  - Leave calendar views

  - Custom leave policies per grade/location


  ## Payroll Features


  ### Salary Processing

  - Automated monthly payroll

  - Flexible salary structures

  - Arrears and recovery handling

  - Bonus and incentive processing

  - Final settlement calculations


  ### Statutory Compliance

  - PF, ESI, PT calculations

  - TDS computation

  - Form 16 generation

  - LWF (Labour Welfare Fund)

  - Gratuity management

  - Automated challan generation


  ### Bank Integration

  - Salary bank file generation

  - Multiple bank format support

  - Loan/advance deductions


  ## Recruitment Module


  - Job requisition management

  - Candidate database

  - Resume parsing

  - Interview scheduling

  - Offer letter generation

  - Onboarding automation


  ## Performance Management


  - Appraisal cycle configuration

  - KRA/KPI tracking

  - 360-degree feedback

  - Probation reviews

  - Increment recommendations


  ## Training & Development


  - Training calendar

  - Budget management

  - Effectiveness tracking

  - Certification management

  - Employee development plans


  ## Expense Management


  - Travel request and approval

  - Expense claim processing

  - Policy-based validations

  - Advance settlements

  - Integration with payroll


  ## Employee Self-Service


  - Web ESS portal

  - Mobile app access

  - Leave applications

  - Salary slip downloads

  - IT declarations

  - Reimbursement submissions


  ## Reports & Analytics


  - 200+ pre-built reports

  - Custom report builder

  - Dashboards for management

  - Graphical analytics

  - Export to Excel/PDF

  - Scheduled report delivery


  ## Compliance Coverage


  ### India

  - All state-specific rules

  - Shops and Establishments Act

  - Factories Act

  - Contract Labor Act

  - Various state PT slabs


  ### UAE/Middle East

  - WPS compliance

  - End-of-service benefits

  - Leave salary calculations


  ## Integration Capabilities


  - Biometric devices (Realtime, ZKTeco, eSSL, etc.)

  - Banks (ICICI, HDFC, SBI, Axis)

  - Accounting systems

  - Third-party payroll services

  - Background verification


  ## Target Customers


  - SMBs to mid-market (50-2000 employees)

  - Manufacturing units

  - IT/ITES companies

  - Educational institutions

  - Healthcare organizations

  - Retail chains


  ## Deployment Options


  - Cloud (SaaS) - Primary offering

  - On-premise deployment available

  - Hybrid options


  ## Customer Support


  - Dedicated implementation team

  - Training sessions

  - Email and phone support

  - Online knowledge base

  - Regular software updates


  ## Pricing


  Module-based pricing:

  - Core HR: ₹25-50/employee/month

  - Payroll add-on: Additional cost

  - Full suite: Bundled pricing

  - Implementation charges apply

  - Annual contracts common


  ## Platform


  Cloud-based web application

  Mobile apps for iOS and Android

  API for integrations
