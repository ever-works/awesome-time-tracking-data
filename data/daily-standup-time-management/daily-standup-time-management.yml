name: Daily Standup Time Management
description: Agile ceremony practice of brief daily team synchronization
  meetings, typically 15 minutes or less, focusing on progress updates,
  blockers, and daily plans to maintain alignment without excessive meeting
  overhead.
source_url: https://www.atlassian.com/agile/scrum/standups
category: Practices
tags:
