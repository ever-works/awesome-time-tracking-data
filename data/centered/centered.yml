markdown: >-
  ## Overview


  Centered is an AI-powered productivity app designed to help users achieve flow
  state through a combination of focus music, real-time coaching, and task
  tracking.


  ## Features


  - **AI Flow Coach** - Real-time AI coaching to maintain focus

  - **Focus Music** - Scientifically designed music to enhance concentration

  - **Task Management** - Simple task queue with time estimates

  - **Focus Tracking** - Monitor focus sessions and productivity metrics

  - **Flow Timer** - Structured focus sessions with breaks

  - **Distraction Blocking** - Block distracting websites during focus time

  - **Accountability** - Daily streaks and progress tracking

  - **Analytics** - Insights into focus patterns and productivity

  - **Cross-Platform** - Desktop app for Mac and Windows


  ## How It Works


  1. Add tasks to your focus queue

  2. Start a flow session with AI coach guidance

  3. Listen to focus-enhancing music while working

  4. Get real-time feedback to maintain focus

  5. Track completed focus time and tasks


  ## The Science


  Centered uses:

  - **Neuroscience-based music** - Frequencies that enhance focus

  - **Flow triggers** - Environmental design for flow state

  - **Accountability mechanisms** - Social pressure and streaks


  ## Use Cases


  Perfect for knowledge workers, developers, writers, and anyone doing
  cognitively demanding work who wants structured support to achieve flow state.


  ## Pricing


  - **7-day free trial**

  - **Pro** - $10/month or $100/year

  - **Team plans** - Available for organizations
