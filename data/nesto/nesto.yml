markdown: >-
  ## Overview


  Nesto is a Pomodoro timer application that combines time management techniques
  with built-in music integration to help users achieve deep focus during work
  sessions.


  ## Features


  ### Pomodoro Timer

  - Traditional 25-minute focus sessions

  - Customizable work and break intervals

  - Session tracking and history

  - Visual and audio notifications


  ### Music Integration

  - Embedded music player

  - Curated focus playlists

  - Seamless music control within timer

  - No need to switch between apps


  ### Notifications

  - Desktop notifications for session changes

  - Mobile push notifications

  - Customizable alert sounds

  - Break reminders


  ### Cross-Platform

  - Desktop application

  - Mobile apps

  - Synchronized across devices


  ## Key Benefits


  - Combines timer and music in one app

  - Reduces distractions from switching between apps

  - Enables consistent focus sessions

  - Simple, focused interface


  ## Platform


  Available on desktop and mobile (iOS, Android)
