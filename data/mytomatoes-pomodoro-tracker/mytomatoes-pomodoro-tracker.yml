markdown: >-
  ## Overview


  MyTomatoes.com is a simple, minimalist online implementation of the Pomodoro
  Technique by Francesco Cirillo. It functions as both a tomato kitchen timer
  and a pomodoro tracker, focusing on simplicity and ease of use.


  ## Design Philosophy


  - Minimalist interface

  - No unnecessary features

  - Focused on core Pomodoro functionality

  - Clean, distraction-free design

  - Easy to understand and use


  ## Key Features


  - Online tomato kitchen timer

  - Pomodoro tracking

  - Simple timer controls

  - Work session tracking

  - Break reminders

  - No signup required

  - Web-based accessibility


  ## Open Source


  - Available on GitHub

  - Community-driven development

  - Self-hosting options

  - Transparent codebase

  - Contribution opportunities


  ## How to Use


  1. Open mytomatoes.com in your browser

  2. Start your first pomodoro (25-minute work session)

  3. Focus on your task until the timer ends

  4. Take a short break (5 minutes)

  5. Repeat and track your completed pomodoros

  6. After 4 pomodoros, take a longer break


  ## The Pomodoro Technique


  Created by Francesco Cirillo, the technique uses a timer to break work into
  intervals, traditionally 25 minutes in length, separated by short breaks. Each
  interval is known as a pomodoro, named after the tomato-shaped kitchen timer
  Cirillo used.


  ## Benefits


  - Improves focus and concentration

  - Reduces mental fatigue

  - Provides regular breaks

  - Tracks productivity through completed pomodoros

  - Simple and accessible

  - No distractions or complex features


  ## Use Cases


  - Focused work sessions

  - Study periods

  - Writing and creative work

  - Programming and development

  - Any task requiring sustained attention


  ## Technical Details


  - Web-based application

  - Works in any modern browser

  - No installation required

  - Mobile-friendly

  - Open-source codebase


  ## Pricing


  Completely free and open source.
