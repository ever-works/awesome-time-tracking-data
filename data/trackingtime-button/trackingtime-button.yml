markdown: >-
  ## Overview


  The TrackingTime Button is a browser extension that embeds time tracking
  capabilities directly into the web applications you already use, eliminating
  the need to switch between tools to start and stop timers.


  ## Key Features


  - **60+ Integrations**: Works with Asana, Trello, Jira, GitHub, ClickUp,
  Monday.com, and dozens more

  - **One-Click Tracking**: Start timer without leaving current task or project

  - **Automatic Context**: Captures task details automatically from source
  application

  - **Universal Access**: Available for Chrome, Firefox, and Edge browsers

  - **Seamless Sync**: Time entries sync automatically with TrackingTime
  dashboard


  ## How It Works


  1. Install browser extension

  2. Browse to supported project management tool

  3. Click TrackingTime button next to any task

  4. Timer starts with task details pre-filled

  5. Continue working in your preferred tool

  6. Stop timer when task complete


  ## Benefits


  - Eliminates context switching between time tracker and work tools

  - Improves time tracking adoption rates

  - Reduces friction in logging hours

  - Ensures accurate task association

  - Works across multiple project management platforms


  ## Pricing


  Free with TrackingTime account. TrackingTime offers free plan for unlimited
  users with basic features, and paid plans starting at $5/user/month.
