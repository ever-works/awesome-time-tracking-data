markdown: >-
  ## Overview


  Clockk is an AI-powered time tracking solution built for professionals who
  struggle with manual time tracking and frequently forget to start timers.


  ## Features


  - **Automatic Tracking**: Captures activity automatically in the background
  without requiring manual timer starts

  - **AI-Powered Categorization**: Uses artificial intelligence to intelligently
  categorize work into projects and clients

  - **Review & Approve**: All tracked time can be reviewed, edited, and approved
  before billing

  - **Application Monitoring**: Tracks which applications and websites you use
  during work hours

  - **Smart Time Entries**: Converts raw activity data into meaningful, billable
  time entries

  - **Client & Project Management**: Organize time by clients and projects

  - **Privacy Controls**: Offers privacy settings to control what gets tracked

  - **Billing Integration**: Turn approved time into invoices


  ## Use Cases


  - Consultants who switch between multiple clients

  - Freelancers who forget to track time

  - Professionals who need accurate billable hours

  - Teams that need automated time capture


  ## Pricing


  Subscription-based pricing model for professionals and teams.
