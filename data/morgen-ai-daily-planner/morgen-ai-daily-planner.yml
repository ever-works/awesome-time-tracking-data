markdown: >-
  ## Overview


  Morgen is an AI-powered daily planning app that works across all your
  calendars and task managers, designed for daily users who need to consolidate
  multiple calendars and task sources into a single planning interface.


  ## Key Features


  ### Calendar Integration

  Morgen consolidates calendars from Google, Outlook, Apple, Fastmail and more
  in one app, providing a unified view of all your appointments and events.


  ### Task Management Integration

  Filter and schedule tasks from across project management, to-do, and PKM tools
  including Notion, Todoist, ClickUp, and Obsidian.


  ### AI Planning

  The AI Planner provides smart suggestions for task scheduling. All suggested
  placements pulsate in your calendar view so you can review and adjust them
  before approval - it doesn't automatically schedule without your confirmation.


  ### Frames Feature

  Create recurring time blocks called "Frames" for specific tasks, such as "Deep
  Work" daily from 8:00 AM to 10:00 AM, helping establish consistent routines.


  ### Scheduling Links

  Share personalized booking links to allow others to schedule time with you
  based on your real availability across all connected calendars.


  ## Platform Availability


  Morgen is available on:

  - Linux

  - Windows

  - macOS

  - Web

  - iOS

  - Android


  ## Recognition


  Rated as Tool Finder's top pick for daily planning in 2026.


  ## Pricing


  - Individual plan: $6/month

  - Duo plan: $10/month
