name: The Dip
description: A New York Times bestseller by Seth Godin that teaches the critical
  skill of knowing when to quit versus when to stick through difficulty,
  distinguishing between productive temporary setbacks (the Dip) and
  unproductive dead ends (Cul-de-Sacs) to achieve extraordinary results.
