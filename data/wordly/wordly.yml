markdown: >-
  ## Overview


  Wordly is a productivity app designed for writers that combines time tracking
  with word count monitoring to help writers track their productivity and
  improve their writing habits.


  ## Features


  - **Timer Functionality**: Start a timer when you begin writing, stop when you
  finish, and enter the number of words written during the session

  - **Words Per Hour Tracking**: Automatically calculates your writing speed and
  tracks words per hour for each writing session

  - **Comprehensive Statistics**: View detailed statistics including words
  written today, this week, and this month, plus hours logged per time period

  - **Visual Progress**: See visual graphs showing writing trends over time in a
  simple and attractive design

  - **Data Export**: Export all data as a CSV file for viewing in Excel or other
  spreadsheet applications

  - **Session Tracking**: Track multiple writing sessions throughout the day
  with individual time and word count records


  ## Platform


  Available as an iOS app on the Apple App Store.


  ## Who It's For


  Perfect for novelists, bloggers, content writers, journalists, and anyone who
  wants to track their writing productivity and establish consistent writing
  habits.
