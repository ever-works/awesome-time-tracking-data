name: Hofstadter's Law
description: Cognitive principle stating that tasks always take longer than
  expected, even when accounting for Hofstadter's Law itself. Proposed by
  Douglas Hofstadter in 1979, this recursive law helps explain chronic
  underestimation in project planning.
