name: Timeboxing Technique
description: Time management method allocating fixed time periods (boxes) to
  planned activities. Unlike to-do lists, timeboxing assigns specific time slots
  to tasks, creating structure and preventing work from expanding indefinitely.
source_url: https://todoist.com/productivity-methods/timeboxing
