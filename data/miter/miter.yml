markdown: >-
  ## Overview


  Miter is construction time tracking software that connects labor tracking with
  payroll and HR for streamlined compliance and accurate job costing.
  Contractors can choose from multiple time tracking methods to fit different
  crew workflows.


  ## Features


  - 8+ time tracking options (mobile app, kiosk, supervisor-entry, text message,
  phone call, and more)

  - GPS and geofencing capabilities

  - Certified payroll reporting

  - Prevailing wage compliance

  - Fully burdened labor cost tracking

  - Union and non-union payroll support

  - Equipment time tracking

  - Job costing integration

  - Real-time project labor data

  - Automated compliance alerts

  - Multi-state labor law compliance

  - Detailed reporting and analytics


  ## Pricing


  Custom pricing based on contractor size and specific needs. Contact for
  detailed quote.
