markdown: >-
  ## Overview


  Desklog is an automation-first time tracking and productivity monitoring tool
  built for accuracy without manual effort. It automatically tracks work hours
  in the background, making it ideal for freelancers and remote teams who want
  precise time data without the burden of starting and stopping timers.


  ## Features


  - **Automatic Time Tracking**: Tracks work hours automatically based on
  computer activity

  - **App & Website Monitoring**: Records time spent in applications and
  websites

  - **Productivity Analytics**: Categorizes activities as productive,
  unproductive, or neutral

  - **Screenshots**: Optional screenshot capture at configurable intervals

  - **Idle Time Detection**: Automatically detects and removes idle time

  - **Project & Task Tracking**: Assign time to specific projects and tasks

  - **Attendance Management**: Track employee attendance and leaves

  - **Timesheets**: Automatic generation of detailed timesheets

  - **Reports**: Comprehensive productivity and time usage reports

  - **Invoicing**: Generate invoices based on tracked billable hours


  ## Pricing


  Starts at $1.99/user/month for basic time tracking. Premium plan at
  $3.99/user/month includes productivity monitoring and screenshots. Enterprise
  plan available with custom pricing.
