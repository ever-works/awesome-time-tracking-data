markdown: >-
  ## Overview


  Rize is the first-ever A.I.-powered time tracker that automatically improves
  your focus and helps you build better work habits. It serves as both a time
  tracking tool and an intelligent productivity coach.


  ## Key Features


  ### Automatic Time Tracking

  - Tracks activity on the computer in the background as you work across apps,
  tasks, and calls

  - No start/stop buttons required

  - Recognizes over 300,000 apps and websites automatically


  ### AI Productivity Coaching

  - Real-time AI advice on when to focus, when to take breaks, and when you're
  getting off track

  - Analyzes shifts in productivity, focus time, and work hours to highlight
  patterns

  - Provides personalized insights based on your work habits


  ### Focus Tools

  - App and website blocking to eliminate distractions

  - Focus music integration

  - Flexible Pomodoro timer

  - In-depth, personalized productivity metrics


  ### Break Management

  - Alerts you at the ideal time to take breaks

  - Screen-blocking features to ensure breaks are truly effective

  - Smart break scheduling based on your work patterns


  ## Analytics


  Rize analyzes shifts in your productivity, focus time, and work hours to
  highlight patterns you'd never catch manually, helping you understand and
  improve your work habits.


  ## Pricing


  - **Free Plan**: For casual users

  - **Standard Plan**: $9.99/month (billed annually) - Detailed reports and
  AI-driven insights

  - **Professional Plan**: $23.99/month - Advanced tracking and project
  management tools


  ## Availability


  Available for macOS and Windows.
