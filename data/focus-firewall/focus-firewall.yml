markdown: >-
  ## Overview


  Focus Firewall is a lightweight web and app blocker built exclusively for
  macOS that distinguishes itself by working at the system level, meaning it
  doesn't need browser extensions to function effectively.


  ## Key Features


  ### System-Level Blocking

  Works at the operating system level rather than as a browser extension,
  providing more reliable blocking that can't be easily circumvented.


  ### Curated Blocklist

  Comes with a pre-configured blocklist of 140+ distracting websites and apps,
  allowing you to start blocking immediately without manual configuration.


  ### Cross-Browser Support

  Because it works at the system level, Focus Firewall blocks websites across
  all browsers simultaneously - Safari, Chrome, Firefox, Edge, and others.


  ### App Blocking

  In addition to websites, can block distracting desktop applications to
  eliminate all sources of digital distraction.


  ## Advantages Over Browser Extensions


  ### Can't Be Disabled Easily

  System-level blocking is harder to bypass than browser extensions which can be
  disabled with a single click.


  ### Works Everywhere

  Blocks apply across all applications and browsers, not just one specific
  browser.


  ### Lower Overhead

  Doesn't slow down browser performance like some extensions can.


  ## Use Cases


  - Deep work sessions

  - Writing and content creation  

  - Studying and research

  - Any task requiring extended focus

  - Building better digital habits


  ## Comparison to Alternatives


  ### vs. Browser Extensions

  More reliable and harder to bypass, works across all browsers.


  ### vs. SelfControl

  May offer more flexibility in scheduling and configuration.


  ### vs. Freedom

  Mac-specific optimizations vs. Freedom's cross-platform approach.


  ## Platform


  Exclusively available for macOS, taking advantage of system-level APIs for
  robust blocking.


  ## Pricing


  Pricing details available on the Focus Firewall website.
