markdown: >-
  ## Overview


  Kantata (formerly Mavenlink) is a Professional Services Automation (PSA)
  platform that provides integrated project management, resource management,
  project accounting, and team collaboration features for effective project,
  task, team, and revenue tracking.


  ## Key Features


  - **Advanced Project Management**: Track tasks, milestones, deliverables, and
  profitability in terms of hours and dollars

  - **Time Tracking**: Track time manually or automatically, add time and
  expenses directly to projects, review and approve all time entries from the
  same location

  - **Resource Planning**: Comprehensive resource planning and allocation
  capabilities

  - **Financial Management**: Project accounting and profitability tracking

  - **Collaboration Tools**: Team collaboration features integrated throughout
  the platform

  - **Multiple Views**: Tabular views including activity, task tracker, Gantt,
  time and expense, resource planner, files, and proofs


  ## Target Audience


  Designed for professional services organizations that need to manage projects,
  resources, and financials in one integrated platform.


  ## Pricing


  Professional tier starts at $39 per user per month for collaboration, project
  management, and time tracking. Premier and Enterprise tiers include additional
  features like financials and resource tracking.
