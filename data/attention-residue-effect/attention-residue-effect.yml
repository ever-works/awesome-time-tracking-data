name: Attention Residue Effect
description: Cognitive phenomenon where part of your attention remains stuck on
  a previous task after switching, reducing performance on new tasks. Introduced
  by Sophie Leroy in 2009, this concept explains why task-switching impairs
  productivity and supports the value of deep work sessions.
