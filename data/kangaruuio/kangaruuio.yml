markdown: >-
  ## Overview

  Kangaruu.io is a time tracking chatBot for teams that integrates with project
  management software to simplify planning and tracking workload.


  ## Features

  - Integrates with team's project management software

  - Simplicity in planning and tracking a team's workload

  - Free 14-day trial

  - Pricing starts at $1/user per month (up to €8)

  - Team collaboration and project management tools

  - Reporting capabilities

  - Integrations with MS Teams, Slack, and other software


  ## Pricing

  - Free for 14 days

  - Starting from $1/user per month (up to €8)


  ## Use Cases

  - Teams looking to integrate time tracking with existing project management
  tools

  - Freelancers using Slack for time tracking

  - Businesses seeking automated workload planning
