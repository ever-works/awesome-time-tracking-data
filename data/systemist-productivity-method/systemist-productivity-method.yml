markdown: >-
  ## Overview


  Systemist was created by Amir Salihefendić, founder and CEO of Doist (the
  company behind Todoist), and is a system he's perfected over the past 15+
  years. He describes it as "a simplified GTD built for the modern world".


  ## Key Principles


  - Meant to be used with a digital task manager

  - Takes big tasks and breaks them down into small actionable steps that you
  can complete in an hour or less

  - Helps you prioritize and accept that you won't get everything done

  - Uses dates to identify time-sensitive tasks and marks high-impact tasks

  - The goal is to get to "to-do list zero" daily


  ## Philosophy


  You won't get everything done, but you should still get to an empty to-do list
  at the end of the day by focusing on what truly matters.


  ## Target Audience


  Designed for those who are:

  - Stressed and overwhelmed by the amount of stuff they need to keep track of

  - Have a hard time prioritizing high-impact tasks

  - Looking for a simplified approach to GTD


  ## Pricing


  Free methodology that can be implemented with any task management system,
  though optimized for use with Todoist.
