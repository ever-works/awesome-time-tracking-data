markdown: >-
  ## Overview


  The MiGoals Time Block Desk Pad keeps everything that matters to you right
  before your eyes, going beyond just mapping out daily appointments. The Time
  Block Desk Pad ensures you make every hour count by allowing users to block
  out time for important tasks.


  ## Key Sections


  - **Daily Goals**: Set intentions for each day

  - **Key Tasks**: List up to 10 most important tasks

  - **Schedule**: Daily schedule from 4am to midnight with hourly time blocks

  - **Habit Tracker**: Monitor daily habits and routines

  - **Notes Section**: Additional space for thoughts and reminders

  - **Gratitude Prompts**: End-of-day reflection


  ## Specifications


  - **Size**: B5 format (180mm x 240mm)

  - **Pages**: 50 sheets

  - **Paper**: 100gsm FSC-certified paper

  - **Backing**: Cardboard backing for stability

  - **Design**: Made in Melbourne, Australia


  ## Philosophy


  The core philosophy behind the Time Block Desk Pad invites users to plan their
  day with care to focus on making progress each day. It helps create consistent
  positive habits that maximise productivity and motivation while easily seeing
  key tasks at a glance.


  ## Use Case


  With space to plan your schedule hour by hour and a to-do list, habit tracker,
  notes and more, it keeps priorities right in front of you throughout the
  workday.


  ## Pricing


  Available for purchase through MiGoals website and authorized retailers.
