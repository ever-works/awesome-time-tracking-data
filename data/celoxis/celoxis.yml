markdown: >-
  ## Overview


  Celoxis is a comprehensive project management and collaboration software with
  powerful time tracking capabilities, designed for teams and enterprises
  managing multiple complex projects.


  ## Time Tracking Features


  **Flexible Time Entry:**

  - Timesheet entry (daily, weekly, monthly views)

  - Timer-based tracking

  - Mobile time tracking

  - Bulk time entry

  - Time estimates vs. actuals

  - Approvals and workflows


  **Time Analysis:**

  - Time utilization reports

  - Resource allocation

  - Project profitability

  - Earned value analysis

  - Time variance tracking

  - Billing and invoicing


  ## Project Management


  **Planning:**

  - Interactive Gantt charts

  - Project templates

  - Task dependencies

  - Critical path analysis

  - Resource leveling

  - Baseline comparisons


  **Portfolio Management:**

  - Multi-project views

  - Resource capacity planning

  - Portfolio analytics

  - What-if scenarios

  - Risk management


  **Collaboration:**

  - Discussion threads

  - Document management

  - Email integration

  - Status updates

  - Notifications


  ## Reporting & Analytics


  - 50+ pre-built reports

  - Custom report builder

  - Real-time dashboards

  - Resource heatmaps

  - Financial reports

  - Executive summaries


  ## Deployment Options


  - Cloud (SaaS)

  - On-premise

  - Private cloud


  ## Pricing


  Cloud: $25/user/month

  On-premise: One-time license fee

  Free trial: 30 days
