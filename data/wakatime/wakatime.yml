markdown: >-
  ## Overview


  WakaTime automatically tracks your coding time by integrating with popular
  code editors and IDEs. It provides detailed analytics about programming
  languages, projects, branches, and files you work on.


  ## Features


  - Automatic tracking in 50+ editors (VS Code, JetBrains, Sublime, Vim, etc.)

  - Language detection and time breakdown

  - Project and branch tracking

  - Daily/weekly email reports

  - Goals and streaks

  - Team dashboards

  - Private by default

  - Open source


  ## Metrics Tracked


  - Daily coding time

  - Languages used

  - Projects and files

  - Operating system

  - Editors used

  - Time of day patterns


  ## Use Cases


  - Personal productivity tracking

  - Freelancer time billing

  - Team productivity insights

  - Project time allocation


  ## Pricing


  Free tier with 2 weeks history

  Paid: $9/month for unlimited history
