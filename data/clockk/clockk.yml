markdown: >-
  ## Overview


  Clockk is an AI-powered automatic time tracking tool built for busy
  professionals who work on multiple projects simultaneously. It intelligently
  tracks time in the background and categorizes work automatically, eliminating
  the need for manual timers.


  ## Features


  - Fully automatic time tracking

  - AI-powered project and task detection

  - Multi-project tracking without switching timers

  - Background activity monitoring

  - Intelligent time categorization

  - Privacy-focused (no screenshots)

  - Client and project reporting

  - Billable hours tracking

  - Invoice-ready reports

  - Integration with calendars and apps

  - Detailed activity timeline

  - Customizable project rules


  ## Pricing


  Subscription-based model with monthly or annual billing options. Free trial
  available to test AI tracking capabilities.
