markdown: >-
  ## Overview


  Monograph is a purpose-built project management and time tracking platform for
  architecture and engineering firms. It addresses the specific workflow needs
  of design professionals, helping them complete business tasks 67% faster.


  ## Architecture & Engineering Focus


  Monograph understands the unique needs of A&E firms:

  - Project phases and milestones tracking

  - Fee allocation by project phase

  - Design-specific project templates

  - Principal and project manager workflows

  - Integration with architectural practice standards


  ## Time Tracking


  - Track time by project and phase

  - Charge time to different project stages (SD, DD, CD, CA)

  - Timer and manual entry options

  - Mobile time tracking

  - Timesheet approval workflows

  - Billable vs. non-billable designation

  - Time allocation to project tasks


  ## Project & Budget Management


  - Project setup with phases and tasks

  - Fee and budget tracking by phase

  - Burn rate monitoring

  - Earned value analysis

  - Resource allocation

  - Project profitability forecasting

  - Budget vs. actual comparison

  - Change order tracking


  ## Financial Insights


  - Real-time project profitability

  - Revenue forecasting

  - Utilization tracking

  - Labor cost analysis

  - Project performance dashboards

  - Principal-level financial overview

  - Multi-project portfolio view


  ## Reporting & Analytics


  - Project status reports

  - Time and fee utilization

  - Staff utilization reports

  - Profitability analysis

  - Custom report builder

  - Export capabilities

  - Executive dashboards


  ## Workflow Features


  - Task management

  - Project timelines

  - Milestone tracking

  - Deliverable management

  - Team assignment and workload

  - Email integration

  - Calendar sync


  ## Integrations


  - QuickBooks Online

  - Google Calendar

  - Outlook Calendar

  - Email clients

  - Accounting software


  ## Use Cases


  - Architecture firms of all sizes

  - Engineering practices

  - Interior design studios

  - Landscape architecture

  - Urban planning firms

  - Multi-disciplinary design practices


  ## Benefits for A&E Firms


  - Eliminates spreadsheet-based project tracking

  - Provides real-time visibility into project health

  - Reduces administrative burden

  - Improves profitability through better tracking

  - Tailored to architectural project phases

  - Designed by architects for architects


  ## Pricing


  Custom pricing based on firm size. Contact for demo and quote. Designed to
  scale from small studios to large firms.
