markdown: >-
  ## Overview


  LeechBlock NG (Next Generation) is a free, open-source browser extension that
  helps users stay productive by blocking access to time-wasting websites. It
  offers one of the most flexible and customizable website blocking systems
  available, with support for complex rules and schedules that can adapt to
  different work patterns and needs.


  ## Key Features


  ### Advanced Blocking Rules

  - **30 Block Sets**: Create up to 30 different groups of websites with unique
  blocking rules

  - **Time-Based Blocking**: Block sites during specific times of day or days of
  the week

  - **Time Limits**: Set daily time allowances for specific sites before they
  get blocked

  - **Keyword Filtering**: Block sites based on keywords in URLs or page content

  - **Content Type Blocking**: Restrict access based on content types (images,
  videos, etc.)


  ### Scheduling & Customization

  - **Workday vs. Weekend Rules**: Different blocking schedules for workdays and
  weekends

  - **Custom Time Periods**: Define precise blocking windows (e.g., 9 AM - 5 PM)

  - **Cooldown Periods**: Force waiting periods before allowing access again

  - **Access Windows**: Allow brief access windows for checking important
  information


  ### Security Features

  - **Password Protection**: Prevent yourself from changing settings during work
  hours

  - **Access Codes**: Require typing random access codes to unblock sites
  temporarily

  - **Lockdown Mode**: Extra-strong protection against bypassing the blocker

  - **Delayed Activation**: Set rules that can't be changed for a specified
  period


  ### Motivational Elements

  - **Custom Block Pages**: Redirect to motivational quotes or custom messages

  - **Statistics Tracking**: View how often you attempt to access blocked sites

  - **Warning Messages**: Display custom warnings before blocking kicks in


  ## Browser Support


  - Google Chrome

  - Microsoft Edge

  - Mozilla Firefox

  - Opera

  - Brave

  - Other Chromium-based browsers


  ## Use Cases


  - **Students**: Block social media and entertainment sites during study hours

  - **Remote Workers**: Maintain focus during work hours by blocking
  distractions

  - **Writers & Creators**: Eliminate interruptions during creative work
  sessions

  - **People with ADHD**: Reduce temptation to switch tasks or get distracted

  - **Anyone Building Better Habits**: Support behavior change through
  environmental design


  ## Advantages Over Competitors


  ### vs. StayFocusd

  - More granular control with 30 block sets vs. StayFocusd's simpler approach

  - Better scheduling options with time-of-day and keyword-based rules

  - Cross-browser support (StayFocusd is Chrome-only)


  ### vs. BlockSite

  - Completely free with no premium features locked behind paywall

  - More powerful rule customization for advanced users

  - Open-source and privacy-focused


  ## Ideal For


  - Power users who want maximum control and customization

  - People who need different rules for different contexts (work/personal)

  - Those who prefer free, open-source solutions

  - Users who need cross-browser compatibility

  - People serious about eliminating digital distractions


  ## Configuration Examples


  **Example 1: Student Schedule**

  - Block Set 1: Social media blocked 8 AM - 6 PM on weekdays

  - Block Set 2: Gaming sites blocked entirely during exam weeks

  - Block Set 3: News sites limited to 15 minutes per day


  **Example 2: Remote Worker**

  - Block Set 1: Shopping sites blocked during core work hours (9 AM - 5 PM)

  - Block Set 2: Social media allowed 10 minutes every 2 hours

  - Block Set 3: Entertainment sites completely blocked on deadline days


  ## Pricing


  **Free** and open-source. No premium tiers or hidden costs.


  ## Limitations


  - Complex interface may overwhelm users wanting simple blocking

  - Requires initial setup time to configure rules properly

  - Browser-level blocking only (can't block native apps)

  - Determined users can disable extensions (though password protection helps)
