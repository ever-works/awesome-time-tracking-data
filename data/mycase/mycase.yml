markdown: >-
  ## Overview


  MyCase is a cloud-based legal practice management platform designed to help
  law firms manage cases, track time, bill clients, and communicate effectively,
  all from a single integrated system.


  ## Features


  - **Time Tracking**: Timers, manual entry, and mobile time tracking for
  billable activities

  - **Expense Tracking**: Record and bill client expenses with receipt capture

  - **Invoicing**: Generate professional invoices from tracked time and expenses

  - **Payment Processing**: Accept credit card, debit card, and eCheck payments
  online

  - **Trust Accounting**: IOLTA-compliant trust account management

  - **Case Management**: Organize case files, documents, and communications

  - **Client Portal**: Secure client access to case information and documents

  - **Document Management**: Store, organize, and share case documents

  - **Calendaring**: Shared calendars with court date tracking and conflict
  checking

  - **Communication**: Email, text messaging, and secure messaging with clients

  - **Mobile Apps**: Full-featured iOS and Android applications

  - **Reporting**: Financial and operational reports for practice insights


  ## Benefits


  MyCase streamlines the entire legal workflow from client intake through final
  payment, helping firms save time on administrative tasks and get paid faster
  through integrated payment processing.


  ## Pricing


  Subscription-based pricing with per-user monthly fees. Different plan tiers
  offer varying levels of features and support. Free trial available.
