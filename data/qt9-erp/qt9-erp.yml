markdown: >-
  ## Overview


  QT9 ERP is a comprehensive manufacturing enterprise resource planning system
  that includes robust shop floor management and time tracking features, giving
  manufacturers real-time visibility into production, labor, and quality
  metrics.


  ## Features


  - **Shop Floor Management**: Real-time job tracking with digital work
  instructions

  - **Labor Time Tracking**: Clock in/out to specific jobs, operations, and work
  centers

  - **Job Costing**: Actual labor hours and costs tracked against jobs

  - **Work Instructions**: Digital display of step-by-step production
  instructions

  - **Production Monitoring**: Real-time visibility into what's being built and
  by whom

  - **Quality Management**: Track inspections, non-conformances, and corrective
  actions

  - **Inventory Management**: Track raw materials, WIP, and finished goods

  - **Barcode Integration**: Scan barcodes to track labor, materials, and
  production

  - **Document Control**: Manage engineering drawings, specifications, and work
  instructions

  - **Reporting**: Production reports, labor efficiency, and job profitability
  analysis

  - **Mobile Access**: Operators can access work instructions and log time from
  tablets

  - **Compliance**: Support for ISO 9001, AS9100, and other quality standards


  ## Manufacturing Focus


  Specifically designed for discrete manufacturers including aerospace, defense,
  medical devices, and other regulated industries requiring detailed production
  tracking.


  ## Benefits


  Eliminates paper travelers and manual time cards, provides accurate job
  costing data, and ensures operators always have current work instructions and
  specifications.


  ## Pricing


  Enterprise pricing based on number of users and modules required. Contact QT9
  for detailed pricing.
