markdown: >-
  ## Overview


  EARLY is a time tracking application available as a Windows desktop app, web
  app, Mac desktop app, and mobile apps (Android/iOS). It offers multiple time
  tracking methods including manual entry, keyboard shortcuts, automatic
  tracking based on app usage and visited websites, and a Bluetooth-connected
  physical time tracker device.


  ## Time Tracking Methods


  - **Physical time tracker** — Flip a Bluetooth-connected physical device to
  start/stop tracking without opening the app

  - **Automatic time tracking** — Creates time entries automatically based on
  app usage, visited websites, and scheduled calendar events

  - **Keyboard shortcuts** — Open a pop-up to resume previous tasks or start new
  time entries without breaking workflow

  - **Manual entry** — Add and edit time entries after the fact, with automatic
  tracking suggestions to help recollect past activities


  ## Features


  ### Billable Hours

  - Label activities as billable or non-billable

  - Set hourly rates and automatically calculate billable hours

  - Time entry rounding (1, 5, 6, 10, 15, or 30 minute durations)

  - Customizable data export (CSV, Excel, PDF)


  ### Project Management

  - Project budget tracking with automated alerts to prevent client over or
  under-servicing

  - Unlimited project budgets available on higher-tier plans


  ### Leave and PTO

  - Track all types of leaves: paid time off, sick days, vacation time

  - Leave reporting and management


  ### Overtime Tracking

  - Automatically track extra hours

  - Calculate overtime and deficit hours based on schedules and leave

  - Manage overtime compensation


  ### Productivity Insights

  - AI-powered productivity insights to understand work habits

  - Dedicated dashboard for productivity analytics

  - Comprehensive time analytics and reporting


  ### Team Features

  - Shared reports and team analytics

  - Team collaboration with shared activities, tags, and notes

  - Automatic team time tracking reminders

  - Permission and seats management

  - Multiple workspaces under one organization (Enterprise)


  ## Integrations


  - **Calendars** — Google Calendar and Microsoft Calendar for tracking meeting
  time

  - **Jira** — Native integration to track time on Jira projects and tasks

  - **3000+ apps via Zapier** — Connect to project management, HR, and payroll
  tools

  - **Public API and webhooks** — Full API access on Personal Pro and above;
  custom API on request for Enterprise

  - **Custom integrations** — Enterprise tier includes tailor-made integrations


  ## Multi-Device Sync


  Time tracking data syncs across all platforms: web app, Windows desktop app,
  Mac desktop app, Android mobile app, and iOS mobile app. Switch between
  devices without manually transferring time entries.


  ## Pricing


  | Plan | Target | Key Features |

  |------|--------|-------------|

  | **Personal** | Individual users | Unlimited time tracking, automatic
  tracking, productivity insights, time tracking reminders, analytics reporting,
  1 project budget with alerts, API and webhooks access |

  | **Personal Pro** | Freelancers/professionals | Everything in Personal, plus
  billable rates and reports, time entry rounding, customizable data export
  (CSV/Excel/PDF), comprehensive time-off tracking, work hours and overtime
  tracking, automatic tracking suggestions, unlimited project budgets, Jira and
  Zapier integrations |

  | **Team** | Small teams (up to 20) | Everything in Personal Pro, plus
  dedicated success manager, bespoke onboarding, team workshops, shared reports
  and team analytics, team collaboration, automatic team reminders, permission
  and seats management |

  | **Enterprise** | Large teams (20+) | Everything in Team, plus
  setup/migration support, priority technical support, volume discounts,
  proactive plan review, tailored invoicing, customizable contracts, multiple
  workspaces, custom API, custom integrations, SSO |


  All plans include a 30-day free trial with full access to all features. Prices
  are exclusive of applicable sales tax (VAT).


  ## Security


  - SSO (Single-Sign-On) support for Enterprise plans

  - Permission and role-based access control
