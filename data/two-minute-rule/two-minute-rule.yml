markdown: >-
  ## Overview


  The Two-Minute Rule from Getting Things Done states: if a task takes less than
  2 minutes to complete, do it immediately rather than capturing it into your
  system.


  ## The Logic


  It takes more time and effort to track a 2-minute task (capture, clarify,
  organize, review) than to simply complete it. The overhead of managing quick
  tasks exceeds the cost of doing them.


  ## How to Apply


  **When Processing Inbox:**

  1. Pick up an item

  2. Ask: "Can this be done in under 2 minutes?"

  3. If yes: Do it now

  4. If no: Defer, delegate, or organize appropriately


  **During the Day:**

  - Quick email replies

  - Brief phone calls

  - Simple information lookups

  - Short approvals or decisions

  - Quick tidying or filing


  ## Benefits


  - Inbox stays clear

  - Quick wins build momentum

  - Less system overhead

  - Reduced decision fatigue

  - Prevents small task accumulation

  - Immediate completion satisfaction


  ## Important Notes


  **Timing Is Critical:**

  The rule applies when PROCESSING, not when busy with other work. Don't let
  2-minute tasks interrupt focus time.


  **Adjust the Threshold:**

  - More time available: Use 5-minute rule

  - Very busy: Use 1-minute rule

  - Processing time: Stick to 2 minutes


  **Don't Abuse It:**

  - Don't seek out 2-minute tasks

  - Don't use it to avoid important work

  - Don't interrupt deep work for 2-minute items


  ## Common Examples


  - Reply to simple emails

  - File a document

  - Make a quick phone call

  - Schedule a meeting

  - Send a brief message

  - Look up information

  - Make a simple decision

  - Update a task status
