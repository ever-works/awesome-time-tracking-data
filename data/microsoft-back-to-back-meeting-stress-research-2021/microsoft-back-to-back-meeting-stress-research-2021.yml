name: Microsoft Back-to-Back Meeting Stress Research (2021)
description: Groundbreaking neuroscience study by Microsoft that used EEG brain
  scans to demonstrate how consecutive video meetings cause cumulative stress
  buildup, while even 10-minute breaks allow stress levels to reset,
  fundamentally changing how organizations approach meeting scheduling.
