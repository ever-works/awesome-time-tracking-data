markdown: >-
  ## Overview


  KimaiBar is a time tracking solution running in your macOS menu bar where you
  can check your running time and quickly start and stop your timer directly
  from your menu bar.


  ## Key Features


  - **Menu Bar Integration**: Access Kimai time tracking from the macOS menu bar

  - **Quick Timer Control**: Start and stop timers without opening the full
  Kimai application

  - **Running Time Display**: See currently running time at a glance

  - **Native macOS App**: Built specifically for macOS for optimal performance


  ## Integration


  KimaiBar works with Kimai, the #1 open-source time-tracking application,
  providing a lightweight menu bar interface for the full-featured Kimai time
  tracking system.


  ## Use Case


  Ideal for Mac users who use Kimai for time tracking and want quick, convenient
  access to start/stop timers without leaving their current workflow or opening
  the full web interface.


  ## Platform


  Exclusively available for macOS.


  ## Pricing


  Available for purchase through the Kimai Store.
