markdown: >-
  ## Overview


  Motion's AI Task Manager automatically plans your day with your most important
  tasks, re-optimizing schedules hundreds of times a day based on hundreds of
  thousands of datapoints including deadlines, priorities, and dependencies.


  ## Features


  ### Auto-Scheduling

  - Automatically builds your daily schedule with tasks slotted into available
  time windows

  - Re-optimizes schedules hundreds of times a day as conditions change

  - Custom time windows for tasks to ensure deadlines are met

  - Surfaces the single most important task each hour

  - Instantly reshuffles plans when interruptions occur


  ### Deadline Management (Do Date vs Due Date)

  - Converts due dates into actionable daily plans

  - Proactively warns when tasks are at-risk of missing deadlines (days, weeks,
  or months in advance)

  - Live updates on every task and project status

  - Shows exactly when overdue tasks are rescheduled


  ### Project Visibility

  - Flags at-risk tasks early to address potential delays

  - Immediately highlights bottlenecks and blockers

  - Tracks what team members are working on and where attention is needed


  ### Task Customization

  - Filter and sort tasks by custom labels, blockers, priority, or dependencies

  - Custom templates for repetitive tasks

  - Recurring task creation (daily, weekly, monthly, quarterly) with automatic
  calendar blocking

  - Task assignment and sharing with colleagues, clients, or partners

  - Centralized view of comments, files, and updates per task


  ### Dynamic Adjustments

  - Intelligent schedule reshuffling when tasks exceed expected duration

  - Quick deadline adjustments, overtime requests, and task reassignment


  ## Integrations


  Integrates with Zapier, Zoom, Google Meet, Gmail, Outlook, Siri, HubSpot,
  Salesforce, Teams, Slack, and hundreds more tools.


  ## Pricing


  Starts with a free trial. Subscription-based pricing available through Motion.
