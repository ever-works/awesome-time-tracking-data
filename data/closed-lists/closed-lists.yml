markdown: >-
  ## Overview


  Closed Lists are a task management approach where you maintain a fixed,
  bounded set of tasks and refuse to add new items until at least one existing
  task is completed. This creates a 'one out, one in' discipline that prevents
  the common problem of ever-expanding to-do lists.


  ## How It Works


  - Write down a fixed number of tasks you will commit to finishing (e.g., 5-10)

  - Do not add any new tasks to the list until one of the current tasks is
  completed

  - When a task is finished, remove it and only then may you add a new task

  - This creates a constrained, manageable workload


  ## Benefits


  - Prevents to-do list bloat and the overwhelm that accompanies it

  - Forces prioritization: new tasks must be actively compared against existing
  commitments

  - Creates a psychological sense of closure and progress

  - Encourages completion rather than endless accumulation


  ## Origin


  The concept is prominently advocated by writer Oliver Burkeman in his book
  'Four Thousand Weeks: Time Management for Mortals,' where he argues that
  constraints are essential to realistic and humane productivity practices.
