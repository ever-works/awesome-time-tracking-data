markdown: >-
  ## Overview


  TrackingTime AutoTrack is an intelligent time tracking feature that eliminates
  the need for manual timers and constant task switching. By capturing work
  activity in the background and using AI to suggest relevant time entries,
  AutoTrack makes time tracking effortless and accurate while respecting
  employee privacy.


  ## Features


  - **Background Activity Capture**: Automatically records app usage, websites
  visited, and documents worked on

  - **AI-Powered Suggestions**: Machine learning analyzes patterns and suggests
  accurate time entries

  - **One-Click Logging**: Convert suggested activities into time entries with a
  single click

  - **Privacy Respecting**: No screenshots, no keystroke logging, no
  micromanagement

  - **Private Until Logged**: All captured data stays private until you choose
  to log it to timesheets

  - **Reduced Guesswork**: Eliminates time estimation errors and forgotten tasks

  - **Seamless Integration**: Works alongside TrackingTime's project management
  and reporting features

  - **Cross-Platform**: Available on desktop and mobile devices


  ## How It Works


  AutoTrack operates in three simple steps:


  1. **Capture**: The software runs quietly in the background, recording your
  work activities throughout the day

  2. **Analyze**: AI analyzes the captured data to identify work patterns and
  match activities to projects

  3. **Suggest**: At day's end, review AI-suggested time entries and approve
  them with one click


  ## Privacy and Control


  AutoTrack is designed to empower users, not surveil them:

  - No screenshots of your screen

  - No surveillance or monitoring of keystrokes

  - All data remains private to the individual user

  - Users control what gets logged to official timesheets

  - Managers never see raw activity data, only approved time entries

  - Full compliance with privacy regulations


  ## Benefits


  - **Save Time**: Eliminate manual timer starting and stopping

  - **Improve Accuracy**: Capture every minute of billable work

  - **Reduce Friction**: No workflow interruptions or context switching

  - **Increase Billable Hours**: Never forget to log time on tasks

  - **Better Insights**: Understand where time actually goes


  ## Pricing


  AutoTrack is available as part of TrackingTime's premium plans. The platform
  offers a free tier for unlimited users with basic time tracking features,
  while AutoTrack is included in paid plans starting at competitive per-user
  monthly rates. A free trial is available to test all premium features.
