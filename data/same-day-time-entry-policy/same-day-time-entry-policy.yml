name: Same-Day Time Entry Policy
description: Best practice requiring employees to log time on the same day work
  is performed, dramatically improving accuracy and reducing forgotten billable
  hours. Research shows same-day entry increases time capture accuracy by 15-25%
  compared to weekly reconstruction.
