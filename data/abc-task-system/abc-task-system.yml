name: ABC Task System
description: "A hierarchical task classification method that categorizes tasks
  into three levels of urgency: 'A' for must-do today, 'B' for should-do today,
  and 'C' for optional tasks. This system helps workers quickly triage their
  workload and focus on what matters most."
