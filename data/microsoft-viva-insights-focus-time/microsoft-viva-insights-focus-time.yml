markdown: >-
  ## Overview


  Microsoft Viva Insights Focus Time is an intelligent productivity feature that
  uses AI to analyze work patterns and automatically reserve time for focused,
  uninterrupted work within the Microsoft 365 ecosystem.


  ## Features


  - **Automatic Scheduling**: AI identifies optimal times for focus based on
  calendar patterns

  - **Protected Time Blocks**: Marks focus time as "busy" to prevent meeting
  bookings

  - **Smart Notifications**: Silences Teams and Outlook notifications during
  focus sessions

  - **Playlist Integration**: Automatically plays focus music from
  Microsoft-curated playlists

  - **Productivity Insights**: Weekly reports on focus time achieved vs. target

  - **Meeting Analysis**: Identifies meeting patterns that fragment focus time

  - **Collaboration Recommendations**: Suggests better times for collaborative
  work

  - **Personal Dashboard**: View focus hours, meeting load, and quiet hours

  - **Team Analytics**: Managers see aggregated team focus time (not individual
  surveillance)

  - **Integration with To Do**: Automatically surfaces priorit tasks during
  focus blocks

  - **Briefing Email**: Daily AI-generated summary with focus time
  recommendations

  - **Habit Tracking**: Monitors consistency of focus time practice over
  weeks/months


  ## How It Works


  1. Viva Insights analyzes your calendar for recurring meeting-free time slots

  2. Suggests focus time blocks (typically 2-4 hours) at optimal times

  3. You approve or adjust the suggestions

  4. Focus time is booked automatically each week with notification silencing

  5. AI learns from your behavior and refines future suggestions


  ## Key Benefits


  - **Reclaimed Productivity**: Users report gaining 5-10 hours of focus time
  per month

  - **Reduced Meeting Fatigue**: AI prevents back-to-back meetings by reserving
  buffer time

  - **Behavioral Insights**: Understand personal productivity patterns

  - **Team Health Metrics**: Leaders can address organization-wide meeting
  overload


  ## Availability


  Viva Insights Focus Time is included in:

  - Microsoft 365 E5

  - Microsoft Viva Insights (standalone license)

  - Some features available in basic M365 plans


  No additional cost for enterprise customers with qualifying licenses.
