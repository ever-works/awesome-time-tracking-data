markdown: >-
  ## Overview


  The 90/20 Rule is a productivity technique that emphasizes cyclical work
  patterns, devoting 90% of energy to focused task work for a designated period
  (typically 90 minutes), followed by a 20% break (approximately 18 minutes) for
  rejuvenation and recovery.


  ## The Formula


  ### Work Phase: 90%

  - Intense focus on single task

  - Typically 90 minutes in duration

  - Full energy and attention devoted

  - Minimal distractions and interruptions

  - Deep work or high-value activities


  ### Rest Phase: 20%

  - Approximately 18 minutes (20% of 90 minutes)

  - Complete mental disengagement from work

  - Physical movement encouraged

  - Rejuvenation and recovery focus

  - Preparation for next cycle


  ## Scientific Foundation


  ### Ultradian Rhythm Alignment

  - Matches body's natural 90-120 minute cycles

  - Respects biological rest-activity patterns

  - Optimizes energy expenditure

  - Prevents burnout through regular recovery


  ### Cognitive Benefits

  - Sustained attention for optimal duration

  - Regular breaks prevent mental fatigue

  - Improved long-term focus capacity

  - Enhanced creativity through rest periods


  ## Implementation


  ### Setting Up Cycles

  1. **Plan work blocks**: Identify high-priority tasks for 90-minute sessions

  2. **Minimize distractions**: Turn off notifications, close unnecessary
  applications

  3. **Set timer**: 90 minutes for work, 18 minutes for break

  4. **Work intensely**: Full focus on single task

  5. **Take complete break**: Genuine rest, not task-switching

  6. **Repeat**: Multiple cycles throughout workday


  ### Break Activities

  - Short walk outside

  - Stretching or light exercise

  - Mindfulness or meditation

  - Healthy snack

  - Brief social interaction

  - Complete screen break


  ## Benefits


  ### Productivity Gains

  - Higher quality output during focus periods

  - Sustained energy across full workday

  - Reduced decision fatigue

  - Better task completion rates


  ### Health & Wellbeing

  - Prevents burnout through regular breaks

  - Reduces physical strain from prolonged sitting

  - Lower stress levels

  - Improved work-life balance


  ### Performance Quality

  - Enhanced focus during work periods

  - Better problem-solving through rest

  - Increased creativity

  - Reduced errors and mistakes


  ## Comparison to Other Methods


  ### vs. Pomodoro Technique

  - **Pomodoro**: 25 minutes work, 5 minutes rest

  - **90/20**: Longer focus periods aligned with ultradian rhythms

  - **Advantage**: 90/20 allows deeper flow states


  ### vs. Continuous Work

  - **Continuous**: No structured breaks

  - **90/20**: Regular recovery prevents burnout

  - **Advantage**: Sustainable productivity over longer periods


  ### vs. 52/17 Rule

  - **52/17**: 52 minutes work, 17 minutes rest

  - **90/20**: Aligned with biological cycles

  - **Similarity**: Both emphasize work-rest balance


  ## Best Practices


  ### Optimization

  - Align 90-minute blocks with your biological prime time

  - Use first cycle for most important work

  - Adjust timing based on task complexity

  - Protect work blocks from interruptions


  ### Common Mistakes to Avoid

  - Working through breaks (defeats purpose)

  - Checking email during breaks (not restful)

  - Inconsistent cycle timing

  - Ignoring energy level signals

  - Skipping breaks when "in the zone"


  ## Adaptation


  ### Individual Variation

  - Adjust work period to personal energy patterns

  - Modify break length based on task intensity

  - Experiment with cycle frequency

  - Consider chronotype when scheduling cycles


  ### Different Work Types

  - **Creative work**: Full 90/20 cycles

  - **Meetings**: Modified timing around commitments

  - **Administrative**: Batch tasks within cycles

  - **Collaborative**: Coordinate team cycles


  ## 2026 Context


  The 90/20 Rule represents a paradigm shift in productivity thinking:

  - Moving from quantity to quality of work time

  - Recognizing limits of sustained attention

  - Prioritizing sustainability over short-term intensity

  - Respecting biological rhythms in work design


  ## Scientific Support


  Research demonstrates:

  - Productivity decreases after 90 minutes without breaks

  - Regular breaks improve both quantity and quality of output

  - Recovery periods enhance next work session performance

  - Cyclical work patterns reduce burnout and fatigue


  ## Getting Started


  ### Week 1

  - Try one 90/20 cycle daily

  - Note energy and productivity levels

  - Adjust timing as needed

  - Build break habit


  ### Week 2-4

  - Increase to 2-3 cycles daily

  - Optimize cycle timing

  - Refine break activities

  - Track productivity improvements


  ### Long-term

  - Make 90/20 default work pattern

  - Continuous optimization

  - Adaptation to changing needs

  - Sustained high performance
