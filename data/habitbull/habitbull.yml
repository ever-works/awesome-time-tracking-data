markdown: >-
  ## Overview


  HabitBull is a simple yet powerful habit tracking application for iOS and
  Android that helps users build streaks, track multiple habits simultaneously,
  and visualize progress with charts and statistics.


  ## Features


  - **Unlimited Habits**: Track as many habits as you want with customizable
  goals

  - **Streak Tracking**: Build and maintain streaks to stay motivated

  - **Flexible Scheduling**: Set habits for daily, weekly, or custom schedules

  - **Reminders**: Customizable notifications to remind you to complete habits

  - **Calendar View**: Visual calendar showing habit completion with color
  coding

  - **Charts & Statistics**: Track progress over time with graphs and success
  percentages

  - **Notes**: Add notes to habit entries to track context and insights

  - **Cloud Backup**: Sync data across devices with cloud backup

  - **Motivational Quotes**: Daily inspirational quotes to keep you motivated

  - **Habit Groups**: Organize related habits into categories


  ## Pricing


  Free version with ads supports up to 5 habits. Premium version ($4.99 one-time
  or subscription) removes ads, allows unlimited habits, and includes additional
  features like habit groups and extended statistics.
