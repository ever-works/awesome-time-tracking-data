markdown: >-
  ## Overview


  TopTracker is a completely free time tracking and invoicing tool built by
  Toptal for freelancers and remote teams. It provides comprehensive time
  tracking, project management, and invoicing capabilities without any
  subscription costs.


  ## Features


  - 100% free with no paid tiers

  - Automatic and manual time tracking

  - Screenshot capture (optional)

  - Activity levels monitoring

  - Project and task management

  - Client management

  - Invoice generation and sending

  - Timesheet viewing and editing

  - Team collaboration features

  - Detailed reports and analytics

  - Multiple device support

  - Integration capabilities


  ## Pricing


  Completely free. No hidden costs or premium tiers. Supported by Toptal as a
  service to the freelance community.
