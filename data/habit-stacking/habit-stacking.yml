name: Habit Stacking
description: "Productivity technique popularized by James Clear in Atomic Habits
  that involves building new habits by anchoring them to existing ones. The
  method uses a simple formula: 'After [CURRENT HABIT], I will [NEW HABIT]' to
  create automatic behavioral chains that make it easier to build consistent
  routines."
