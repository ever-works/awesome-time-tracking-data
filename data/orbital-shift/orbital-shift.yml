markdown: >-
  ## Overview


  Orbital Shift's staff scheduling software makes it simple to create employee
  schedules, track employee hours, allow shift swaps, and control labor costs.


  ## Features


  - **Employee Scheduling** - Create and manage employee schedules with
  drag-and-drop simplicity

  - **Time Clock** - Built-in online time clock for employees to track their
  work hours

  - **Shift Swapping** - Allow employees to request shift swaps with manager
  approval workflows

  - **Labor Cost Control** - Monitor and optimize labor costs in real-time

  - **Mobile Access** - Access schedules and time tracking from mobile devices

  - **Reporting** - Generate reports on labor costs, hours worked, and
  scheduling metrics


  ## Use Cases


  Ideal for businesses with hourly workers including retail, hospitality,
  healthcare, and service industries.


  ## Pricing


  Contact Orbital Shift for pricing information.
