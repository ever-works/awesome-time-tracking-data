markdown: >-
  ## Overview


  Freckle is a powerful time tracking software developed by Slash7 for
  freelancers, contractors, and small teams of 1 to 50 people. The interface is
  simple and intuitive, making it easy to track time on projects and tasks while
  remaining customizable with user-defined tags, groups, and billable rates.


  ## Features


  - **Hashtag-Based Time Entry**: Quick time tracking using hashtags to
  categorize activity makes it super easy to use, with Freckle remembering tags
  and clients entered in the past and suggesting them as you type

  - **One-Click Timers**: Start tracking with a single click

  - **Keyboard Shortcuts**: Fast entry through comprehensive keyboard shortcuts
  for power users

  - **Cross-Platform Access**: Mac and iPhone apps allow tracking from menu bar,
  phone, or anywhere you work. Mobile web available on Android too. Start a
  timer on desktop and switch to laptop or iPhone - the timer follows you

  - **Automatic Reminders**: Get reminded to track time so nothing slips through
  the cracks

  - **Customizable Billing Rates**: Set up custom tags, groups, and billable
  rates per project or client

  - **Project Management**: Create new projects with a keystroke and manage
  multiple client projects effortlessly


  ## Pricing


  Solo plan: $19/month for 1 user (additional users $14/month)
