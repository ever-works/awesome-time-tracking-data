markdown: >-
  ## Overview


  Dave Crenshaw is a public speaker, online trainer, and author focused on
  productivity and leadership. He is widely known for his work on the hidden
  costs of multitasking and developing systems for focused work.


  ## Notable Works


  - **The Myth of Multitasking: How Doing It All Gets Nothing Done** - A book
  that exposes the productivity loss caused by task-switching

  - **The Result: A Leadership Story** - A narrative-driven leadership book


  ## Key Philosophy


  Crenshaw is known for distinguishing between "switchover cost" and
  multitasking. His research demonstrates that what people call multitasking is
  actually rapid task-switching, which incurs significant time and quality
  costs. His approach advocates for dedicated blocks of time for specific tasks
  rather than attempting to juggle multiple activities simultaneously.
