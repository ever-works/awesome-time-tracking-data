markdown: >-
  ## Overview


  Timeular Tracker (now called EARLY Tracker) is an 8-sided physical time
  tracking device that revolutionizes how users engage with time tracking
  through a tangible, tactile experience.


  ## Features


  - **Physical Tracker**: 8-sided device that users flip to switch between
  different tracked activities

  - **Bluetooth Connectivity**: Wirelessly syncs with desktop and mobile apps

  - **Activity Assignment**: Each side of the tracker can be assigned to a
  separate activity or project

  - **Pause Functionality**: Place the tracker in its resting dock to pause time
  tracking

  - **Multi-Platform Support**: Works with macOS, Windows, Linux, iOS, and
  Android

  - **30-Day Trial**: Includes a 30-day trial period, with an additional 30 days
  free after connecting the tracker


  ## Pricing


  The hardware tracker costs approximately $69, with subscription plans required
  for software access starting at $5-9/user per month.
brand: EARLY
