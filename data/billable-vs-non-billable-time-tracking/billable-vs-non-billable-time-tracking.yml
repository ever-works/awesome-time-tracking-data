name: Billable vs. Non-Billable Time Tracking
description: Practice of categorizing work hours into billable (client-facing,
  revenue-generating) and non-billable (administrative, internal) categories.
  Critical for professional services firms to maximize revenue capture and
  understand true project profitability.
