markdown: >-
  ## Overview


  Timely is an automatic time tracking application that uses AI to record every
  second you spend in documents, apps, and web pages. It creates accurate
  timesheets without any timers or manual input, making it ideal for teams who
  bill by the hour.


  ## Features


  - **Automatic Time Capture**: Tracks all applications, websites, and documents
  in real-time

  - **Memory Timeline**: Visual timeline shows exactly what you worked on
  throughout the day

  - **AI Suggestions**: Machine learning suggests how to categorize your time

  - **Project Tracking**: Organize tracked time by projects, clients, and tasks

  - **Team Dashboards**: Real-time visibility into team capacity and utilization

  - **Budget Tracking**: Monitor project budgets and profitability

  - **Reporting**: Comprehensive reports on time allocation, productivity, and
  billing

  - **Privacy First**: Private by default with optional team sharing

  - **Integrations**: Connects with popular project management and calendar
  tools


  ## Pricing


  - **Starter**: $9/user/month - Basic time tracking and reporting

  - **Premium**: $16/user/month - Advanced features including budgets and
  forecasting

  - **Unlimited**: $22/user/month - Full feature access with unlimited projects

  - All plans include automatic time tracking and memory timeline

  - 14-day free trial available
