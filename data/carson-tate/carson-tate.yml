markdown: >-
  ## Overview


  Carson Tate is the founder of Working Simply and the Carson Tate company. She
  is a speaker, coach, and best-selling author who has a mission to change how
  and why we work.


  ## Notable Works


  - **Working Simply** - A framework for understanding individual working styles
  and optimizing productivity based on personal cognitive preferences


  ## Working Simply Methodology


  Tate's approach centers on the idea that productivity is not
  one-size-fits-all. She emphasizes understanding individual working styles to
  develop personalized productivity strategies.


  ## Key Principles


  - Understanding your unique working style

  - Leveraging personal strengths rather than fighting against them

  - Creating sustainable productivity habits

  - Reducing complexity in workflows
