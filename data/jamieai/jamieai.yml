markdown: >-
  ## Overview


  jamie.ai is an AI-powered meeting assistant that automatically generates
  meeting notes, transcripts, and action items from any meeting, be it online,
  offline, or in-person.


  ## Key Differentiators


  ### Offline Capability


  jamie creates AI meeting notes and action items across any meeting platform
  and even offline. This makes it unique among meeting assistants that typically
  require internet connectivity.


  ### No Meeting Bot Required


  Operates as a native desktop application (macOS/Windows/iOS) that captures
  audio directly from your computer or iPhone device without joining meetings as
  a participant. This bot-free approach provides several advantages:

  - More discreet meeting capture

  - No "bot joined the meeting" notifications

  - Works in privacy-sensitive environments

  - Suitable for confidential discussions


  ## Privacy & Security


  ### European Data Protection


  jamie has strong privacy protections:

  - European company based in Germany

  - Operates under EU data protection laws

  - GDPR compliant

  - All data hosted and processed exclusively in the EU

  - Servers located in Germany

  - No data leaves the EU to the US or any other jurisdiction


  ### Privacy-First Approach


  This bot-free, privacy-first approach makes jamie particularly suitable for:

  - Regulated industries (finance, legal, healthcare)

  - Organizations with strict data protection requirements

  - Confidential business discussions

  - Sensitive client meetings


  ## Platform Support


  ### Desktop Applications


  - macOS app

  - Windows app

  - iOS app


  ### Meeting Types


  - Online meetings (any platform)

  - Offline meetings

  - In-person conversations

  - Hybrid meetings


  ## Core Features


  ### Meeting Notes


  - Automatic note generation

  - AI-powered summaries

  - Key point extraction

  - Decision documentation


  ### Action Items


  - Automatic action item detection

  - Task assignment tracking

  - Follow-up management

  - Deadline identification


  ### Transcription


  - Accurate meeting transcripts

  - Works offline

  - Multiple language support

  - Speaker identification


  ## Use Cases


  ### Regulated Industries


  #### Finance

  - Compliant meeting documentation

  - Client call records

  - Regulatory compliance

  - Audit trail maintenance


  #### Legal

  - Confidential client meetings

  - Case discussions

  - Depositions and interviews

  - GDPR-compliant storage


  #### Healthcare

  - HIPAA-compatible meetings (within EU)

  - Patient consultation notes

  - Team discussions

  - Compliance documentation


  ### Enterprise Organizations


  - Board meetings

  - Executive sessions

  - Confidential strategy discussions

  - M&A conversations


  ### International Teams


  - EU-based organizations

  - Companies with strict data residency requirements

  - Privacy-conscious teams

  - GDPR-compliant workflows


  ## Benefits


  - Offline functionality for any environment

  - No bot joining meetings

  - Strong EU data protection

  - GDPR compliance built-in

  - Privacy-first design

  - Suitable for regulated industries

  - Works across any meeting platform

  - Supports in-person meetings


  ## Competitive Advantages


  1. **Data Residency**: All data stays in EU/Germany

  2. **Offline Mode**: Works without internet

  3. **No Bot**: Captures without joining as participant

  4. **Privacy Focus**: Built for regulated industries

  5. **GDPR Native**: European company, European standards
