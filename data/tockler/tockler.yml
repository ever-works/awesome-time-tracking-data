name: Tockler
description: Tockler is a free and open-source automatic desktop time tracking
  application that monitors your active window title and idle time to track
  computer usage and working time across Mac, Linux, and Windows platforms.
source_url: https://tockler.io/
category: Automated Time Tracking
tags:
  - open-source
  - automatic
  - desktop
  - privacy
markdown: >-
  ## Overview


  Tockler is a free application that automatically tracks your computer usage
  and working time by monitoring active window titles and idle time, providing
  detailed insights into how you spend your time on your computer.


  ## Features


  - **Automatic Tracking**: Tracks your time by monitoring your active window
  title and idle time without manual input

  - **Application Usage Monitoring**: Provides detailed insights into
  application usage and window titles

  - **Computer State Detection**: Monitors and logs computer state (idle,
  offline, online)

  - **Time Charts**: Automatically generates time charts depicting the apps you
  were using, the items you are tracking, and your online, offline, or idle
  status

  - **Cross-Platform**: Works on Mac, Linux, and Windows platforms

  - **Privacy-Focused**: Operates locally on your computer rather than sending
  data to cloud servers

  - **Open Source**: Free and open-source software available on GitHub


  ## Privacy & Data


  Tockler is a privacy-focused alternative to commercial time tracking
  solutions. All tracking happens locally on your computer, and no data is sent
  to external servers. You maintain full control over your tracking data.


  ## Availability


  The tool is available on the GitHub repository at MayGo/tockler and can be
  downloaded for Mac, Linux, and Windows.


  ## Pricing


  Free and open-source software.


