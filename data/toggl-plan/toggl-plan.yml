markdown: >-
  ## Overview


  Toggl Plan is a visual project planning and team scheduling tool designed to
  help teams see who is doing what and when, at a glance. It sits between simple
  to-do apps and heavyweight project management suites.


  ## Visual Timeline Features


  - **Drag-and-Drop Timeline**: Create color-coded tasks spanning days or weeks

  - **Project Grouping**: Organize tasks into projects

  - **Multiple Views**: Zoom between weekly, monthly, and quarterly views

  - **Quick Adjustments**: Drag tasks to shift schedules when priorities change

  - **Visual Overview**: Best visual representation of who's working on what and
  when


  ## Team Planning Capabilities


  ### Team View

  - **Assignment Visibility**: See who is assigned to which tasks and when

  - **Capacity Planning**: Identify overlapping tasks, potential overbooking,
  idle time

  - **Direct Adjustments**: Adjust assignments and timelines directly on team
  view

  - **Color-Coded Timelines**: Quickly create availability, project, and
  deadline views


  ### Collaboration

  - **Centralized Information**: All information accessible in one place

  - **Reduced Communication**: Save time on back-and-forth messaging

  - **Real-Time Updates**: Changes visible to entire team


  ## 2026 Updates


  - Integration with Toggl Track for unified planning and time tracking

  - New Calendar View praised by community

  - Continued evolution based on user feedback


  ## Use Cases


  - Lean teams needing lightweight but structured planning

  - Startups requiring flexible project management

  - Remote teams needing visual coordination

  - Agencies managing multiple client projects
