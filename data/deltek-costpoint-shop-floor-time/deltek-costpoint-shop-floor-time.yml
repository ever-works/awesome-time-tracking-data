markdown: >-
  ## Overview


  Deltek Costpoint Shop Floor Time is an enterprise time and attendance solution
  designed specifically for aerospace, defense, and government contractors. It
  provides comprehensive labor tracking that meets the stringent requirements of
  government contract accounting, including DCAA (Defense Contract Audit Agency)
  compliance.


  ## Key Features


  ### Government Contract Compliance


  **DCAA Compliance**:


  - Meets Defense Contract Audit Agency requirements

  - Comprehensive audit trails

  - Proper segregation of duties

  - Timely recording of labor hours

  - Accurate cost allocation

  - Compliant record retention


  **FAR/DFARS Requirements**:


  - Federal Acquisition Regulation compliance

  - Defense Federal Acquisition Regulation Supplement

  - Proper labor standards

  - Cost accounting standards


  ### Project-Based Time Tracking


  **Charge Code Management**:


  - Track time to specific contracts

  - Multiple charge codes per employee

  - Project, phase, and task tracking

  - Direct vs indirect labor classification

  - Overhead allocation


  **Multi-Level Projects**:


  - Contract level

  - Program level

  - Task order level

  - Work breakdown structure (WBS) level


  ### Shop Floor Data Collection


  **Multiple Collection Methods**:


  - Badge swipe terminals

  - Barcode scanning

  - RFID readers

  - Web-based entry

  - Mobile devices

  - Kiosk terminals


  **Real-Time Capture**:


  - Immediate labor posting

  - Real-time job costing

  - Current WIP visibility

  - Production tracking


  ### Integration with Costpoint ERP


  **Seamless Integration**:


  - Native part of Costpoint ecosystem

  - Real-time data synchronization

  - Single database architecture

  - Unified user interface

  - Consistent security model


  **Connected Modules**:


  - Project management

  - Job costing

  - Payroll

  - Billing

  - General ledger


  ## Industry-Specific Capabilities


  ### Aerospace & Defense


  **Requirements**:


  - Complex project structures

  - Multiple security levels

  - Classified work tracking

  - Export control compliance (ITAR)

  - Quality system integration


  **Features**:


  - Security clearance tracking

  - Classified project segregation

  - Need-to-know enforcement

  - Export control validation


  ### Government Contractors


  **Compliance Needs**:


  - Cost-plus contract tracking

  - Fixed-price project management

  - Time-and-materials billing

  - Indirect rate calculations

  - Provisional billing


  **Capabilities**:


  - Flexible billing structures

  - Automated rate calculations

  - Progress payment support

  - Retainage tracking


  ## Time Collection Scenarios


  ### Direct Labor


  Time charged directly to government contracts:


  - Specific contract/project assignment

  - Traceable to deliverables

  - Billable to customer

  - Subject to contract terms


  ### Indirect Labor


  Time not directly chargeable:


  - General and Administrative (G&A)

  - Overhead pools

  - Fringe benefits

  - Training and development

  - Bid and proposal


  ### Distributed Time Entry


  **Scenario**: Engineer works on multiple projects in one day


  **Process**:


  1. Clock in for workday

  2. Charge time to Project A (3 hours)

  3. Switch to Project B (2.5 hours)

  4. Charge to training (1 hour)

  5. Administrative time (0.5 hours)

  6. Clock out


  **System**: Tracks all allocations, validates totals, posts to correct
  projects


  ## Approval Workflows


  ### Multi-Level Approval


  1. **Employee Review**: Worker reviews and submits timesheet

  2. **Supervisor Approval**: Direct manager approves hours

  3. **Project Manager Review**: PM verifies charge codes

  4. **HR/Payroll Final**: Final approval for payroll processing


  ### Exception Handling


  **Automated Flags**:


  - Overtime exceeding thresholds

  - Unapproved absences

  - Missing time entries

  - Invalid charge codes

  - Hours exceeding project budget


  **Resolution Process**:


  - Notification to appropriate parties

  - Correction workflow

  - Audit trail of changes

  - Re-approval if needed


  ## Reporting and Analytics


  ### Compliance Reports


  - DCAA audit reports

  - Labor distribution reports

  - Indirect rate calculations

  - Cost pool analysis

  - Burden rate validation


  ### Management Reports


  - Project labor summaries

  - Employee utilization

  - Labor variance analysis

  - Productivity metrics

  - Cost performance indices


  ### Custom Reporting


  - Ad-hoc query tools

  - Report builder

  - Dashboard creation

  - Export to Excel/PDF

  - Scheduled report distribution


  ## Security and Access Control


  ### Role-Based Security


  **Roles**:


  - Employee (time entry only)

  - Supervisor (approve subordinates)

  - Project Manager (project visibility)

  - HR/Payroll (all employee access)

  - System Administrator (configuration)


  ### Data Security


  - Need-to-know access

  - Classified data protection

  - Audit logging

  - Encryption in transit and rest

  - Secure authentication


  ## Mobile Capabilities


  ### Mobile Time Entry


  - iOS and Android apps

  - Offline capability

  - GPS verification (optional)

  - Photo capture

  - Voice entry


  ### Field Worker Support


  - Remote site time tracking

  - Travel time recording

  - Customer site validation

  - Equipment time logging


  ## Benefits for Government Contractors


  ### Compliance Assurance


  - Reduces audit findings

  - Demonstrates proper controls

  - Maintains contract eligibility

  - Avoids penalties and fines


  ### Accurate Job Costing


  - Real-time labor costs

  - Better project profitability visibility

  - Improved estimating for future bids

  - Variance analysis


  ### Operational Efficiency


  - Automated data collection

  - Reduced administrative burden

  - Faster payroll processing

  - Streamlined billing


  ### Audit Readiness


  - Complete documentation

  - Proper audit trails

  - Quick report generation

  - Historical data retention


  ## Implementation Considerations


  ### Deployment Options


  - **On-Premise**: Full control, meets security requirements

  - **Deltek Cloud**: SaaS deployment with compliance

  - **Hybrid**: Mix of on-premise and cloud


  ### Integration Requirements


  - Manufacturing execution systems (MES)

  - Quality management systems

  - Document management

  - CAD/PLM systems

  - Supply chain software


  ### Training Needs


  - Shop floor workers on data collection

  - Supervisors on approval processes

  - Administrators on system configuration

  - Auditors on compliance features


  ## Pricing


  Deltek Costpoint Shop Floor Time pricing is typically enterprise-level:


  - Based on number of users

  - Includes Costpoint ERP license

  - Professional services for implementation

  - Ongoing support and maintenance

  - Custom pricing based on company size and requirements


  Typically part of larger Costpoint ERP implementation for government
  contractors.
