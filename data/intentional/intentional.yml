markdown: >-
  ## Overview


  "Intentional: How to Finish What You Start" is a productivity book by Chris
  Bailey published on January 6, 2026 by Penguin Life. The book contains 272
  pages and distills a decade of deep research on productivity to deliver a
  profound, practical, and counterintuitive road map to getting things done.


  ## Main Premise


  The secret to finishing what you start isn't willpower or the latest
  productivity hack—it's intentionality. To reach your goals, you must structure
  your daily actions around what's most important to you—and let go of the rest.


  ## Content & Topics


  The book integrates the science of desire, values, and procrastination with
  the wisdom of Buddhist monks, laying out step-by-step strategies for
  intentional accomplishment:


  - Structuring short-term goals to increase completion likelihood

  - Making unappealing tasks more attractive

  - Lowering procrastination on long-term goals

  - Creating progress tracking systems

  - Knowing when to let goals go


  ## Author Background


  Chris Bailey is a productivity expert and bestselling author of four books:
  Intentional, Hyperfocus, The Productivity Project, and How to Calm Your
  Mind—which have been published in more than 40 languages.


  ## Endorsements


  The book received praise from notable authors including Cal Newport and
  Charles Duhigg. Duhigg called it "A powerful guide to turning ambition into
  action—by focusing not on willpower but on what matters most."


  ## Format


  Available in hardcover, paperback, ebook, and audiobook formats.
