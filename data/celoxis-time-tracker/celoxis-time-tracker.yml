markdown: >-
  ## Overview


  Celoxis combines enterprise project management with sophisticated time
  tracking, resource management, and financial tracking for organizations
  managing complex project portfolios.


  ## Time Tracking Features


  - Timesheet submission and approval

  - Project and task-based time allocation

  - Flexible time entry (daily, weekly views)

  - Mobile time tracking

  - Offline time entry

  - Bulk time entry

  - Time approval workflows


  ## Project Management Integration


  - Gantt charts and scheduling

  - Resource allocation and leveling

  - Project portfolio management

  - Risk management

  - Issue tracking

  - Document management

  - Collaboration tools


  ## Enterprise Capabilities


  - Multi-project tracking

  - Resource capacity planning

  - Budget vs actual analysis

  - Profitability tracking

  - Custom workflows

  - Advanced permissions

  - API and integrations


  ## Reporting & Analytics


  - Time utilization reports

  - Project profitability analysis

  - Resource utilization

  - Custom dashboards

  - Executive summaries


  ## Pricing


  Cloud: $25/user/month

  On-premise: One-time license fee


  ## Target Users


  Enterprises, PMOs, consulting firms, agencies, IT departments
