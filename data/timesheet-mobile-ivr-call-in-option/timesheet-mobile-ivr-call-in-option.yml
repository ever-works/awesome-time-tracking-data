markdown: >-
  ## Overview


  The IVR (Interactive Voice Response) Call-In Option from Timesheet Mobile
  provides an accessible time tracking solution for workers who don't have
  smartphones. Employees can simply call a designated phone number to clock in
  and out, ensuring all workers can participate in the time tracking system
  regardless of device ownership.


  ## Key Features


  - **Phone-Based Clocking**: Workers call a dedicated number to punch in/out

  - **Voice Prompts**: Clear automated instructions guide users through the
  process

  - **No App Required**: Works with any phone, including basic cell phones and
  landlines

  - **Employee Identification**: Workers enter unique PIN codes to identify
  themselves

  - **Integration**: Syncs seamlessly with Timesheet Mobile's main platform

  - **Job Site Assignment**: Callers can select which job site or project
  they're working on


  ## Use Cases


  Ideal for:

  - Construction workers without smartphones

  - Older employees less comfortable with apps

  - Temporary or seasonal workers

  - Teams in areas with limited smartphone penetration

  - Cost-conscious businesses that don't want to provide devices

  - Workers who prefer simple, voice-based systems


  ## How It Works


  1. Employee calls the designated IVR number

  2. System prompts for employee PIN

  3. Employee enters their unique identification code

  4. System confirms identity and offers punch options

  5. Employee selects punch in/out and optionally job site

  6. System confirms the punch and records timestamp


  ## Benefits


  The IVR option ensures:

  - Inclusive time tracking accessible to all workers

  - No need for expensive device distribution

  - Lower barrier to adoption

  - Compliance with time tracking requirements regardless of technology access

  - Equal treatment of all workers in timekeeping


  This feature complements Timesheet Mobile's smartphone apps and desktop punch
  options, creating a comprehensive time tracking ecosystem that meets workers
  wherever they are.
