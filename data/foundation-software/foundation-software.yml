markdown: >-
  ## Overview


  FOUNDATION® is construction accounting software that brings everything
  together for contractors – job costing, payroll, invoicing, vendor payments
  and financial reporting — all in one system. Since 1985, Foundation Software
  has delivered job cost accounting, project management and mobile applications
  for contractors.


  ## Core Features


  ### Base System Includes:

  - Job Costing

  - Payroll

  - General Ledger

  - Accounts Payable

  - Accounts Receivable

  - Purchase Orders/Subcontracts

  - CPA Audit/Review


  ### Time Tracking Integration

  - WorkMax time tracking integration

  - Seamless data flow from field to accounting

  - Approved timecard data moves directly into payroll

  - Automatic job costing from time entries

  - Eliminates data overlap


  ### Technical Foundation

  - Fully integrated construction accounting system

  - Uses Microsoft® SQL Server®

  - Robust database architecture

  - Enterprise-grade security


  ## Optional Add-On Modules


  - Service Dispatch

  - Document Imaging & Routing

  - Executive Dashboard

  - Project Management

  - Scheduling

  - Equipment

  - Time & Material

  - Inventory

  - Fixed Assets

  - Unit Price Billing

  - Consolidated General Ledger


  ## User Ratings


  ### High Marks For:

  - **Customer Support**: 4.3 out of 5

  - **Value for Money**: 4.2 out of 5

  - **Functionality**: 4.2 out of 5


  ## Integration with WorkMax


  - Seamless integration with WorkMax time tracking

  - Field data flows directly to accounting

  - Eliminates duplicate data entry

  - Real-time job costing updates

  - Automated payroll processing from field time


  ## Who It's For


  - Construction companies of all sizes

  - General contractors

  - Specialty contractors

  - Construction service providers

  - Companies needing detailed financial tracking

  - Firms requiring comprehensive project management


  ## Company Background


  - Established in 1985

  - Decades of construction industry expertise

  - Purpose-built for contractor needs

  - Continuous development and improvement

  - Strong industry reputation


  ## Services


  - Software implementation

  - Training and support

  - Bookkeeping services

  - CPA audit support

  - Construction-specific payroll


  ## Use Cases


  - Job cost accounting

  - Project financial management

  - Contractor payroll processing

  - Accounts payable/receivable

  - Purchase order management

  - Subcontractor management

  - Financial reporting and compliance


  ## Pricing


  - Starts at $500/month

  - Pricing based on company size and modules

  - Optional add-on modules available

  - Contact for detailed pricing


  ## Platform


  - Windows-based system

  - Microsoft SQL Server database

  - Cloud and on-premise options

  - Mobile applications available
