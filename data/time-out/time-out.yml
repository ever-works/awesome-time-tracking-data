markdown: >-
  ## Overview


  Time Out by Dejal is a break reminder application for macOS that gently
  reminds you to take breaks on a regular basis, helping reduce digital eye
  strain, prevent burnout, and avoid repetitive strain injury (RSI).


  ## Features


  ### Two Types of Breaks


  1. **Normal Break**: Typically set for 10 minutes every hour for longer rest
  periods

  2. **Micro Break**: Short 15-second breaks every 15 minutes to rest your eyes
  and hands


  ### Additional Features


  - Menubar countdown showing time until next break

  - Global keyboard shortcuts for quick control

  - Customizable HTML-based break themes

  - Natural break support (detects when you're away and adjusts accordingly)

  - Customizable break schedules

  - Skip or postpone breaks when needed

  - Optional sounds and notifications

  - Idle detection to pause breaks when you're not at your computer


  ## Benefits


  - **Prevents Eye Strain**: Regular micro breaks help reduce digital eye strain
  from extended screen time

  - **Reduces RSI Risk**: Frequent short breaks prevent repetitive strain
  injuries from keyboard and mouse use

  - **Improves Focus**: Scheduled breaks help maintain concentration and prevent
  burnout

  - **Customizable**: Fully adjustable break intervals and durations to fit your
  workflow


  ## Platform


  - macOS only

  - Available on the Mac App Store and via Setapp

  - Native macOS application with system integration


  ## Pricing


  Available as a one-time purchase on the Mac App Store or included with Setapp
  subscription.
