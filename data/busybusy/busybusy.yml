markdown: >-
  ## Overview


  BusyBusy is a construction time tracking and equipment management solution
  that stands out by offering a genuinely free plan with unlimited users, making
  it accessible to contractors and construction companies of all sizes.


  ## Features


  - **Free Unlimited Users**: No per-user charges on the basic plan

  - **Time Tracking**: GPS-enabled clock-in/out for field workers

  - **Job Codes**: Track time against specific jobs, phases, and cost codes

  - **Equipment Tracking**: Monitor equipment location, usage hours, and
  maintenance schedules

  - **Mobile App**: iOS and Android apps for on-the-go time tracking

  - **Geofencing**: Automatic alerts when workers enter or leave job sites

  - **Reporting**: Labor and equipment reports for job costing analysis

  - **Payroll Integration**: Export timesheet data to payroll systems

  - **Photo Documentation**: Attach photos to time entries for job documentation


  ## Unique Value


  BusyBusy is the only time-tracking app that promises comprehensive equipment
  management tools alongside worker time tracking, making it particularly
  valuable for construction firms that need to track both labor and equipment
  costs.


  ## Pricing


  - **Free Plan**: Unlimited users with core time tracking, job codes, and
  equipment location tracking

  - **Paid Plans**: Additional features available at competitive per-user
  pricing
