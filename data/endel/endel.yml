markdown: >-
  ## Overview


  Endel is an AI-powered app that creates personalized soundscapes to help you
  focus, relax, and sleep. The soundscapes adapt in real-time based on various
  environmental and physiological inputs.


  ## Key Technology


  Endel uses circadian rhythms, pentatonic scale, and sound masking to create
  soundscapes that react to inputs like:

  - Time of day

  - Weather conditions

  - Heart rate (via wearables)

  - Location


  ## Features


  - Real-time adaptive soundscapes

  - Integration with Apple Watch and other wearables

  - Multiple modes: Focus, Relax, Sleep, and On-the-Go

  - Offline playback support

  - Cross-platform availability (iOS, Android, macOS, Apple Watch, Alexa)

  - Scientifically validated to improve focus and reduce stress


  ## Scientific Validation


  Neuroscience research demonstrates that Endel consistently improves focus and
  lowers stress levels in users.


  ## Use Cases


  - Maintaining focus during work sessions

  - Reducing stress and anxiety

  - Improving sleep quality

  - Managing ADHD symptoms

  - Creating optimal environments for productivity


  ## Pricing


  Free version available with limited soundscapes. Premium subscription unlocks
  all modes and features.
