markdown: >-
  ## Overview


  The Two-Minute Rule is a decision-making heuristic from David Allen's Getting
  Things Done (GTD) methodology. The rule is simple: if something takes less
  than two minutes to complete, do it immediately rather than scheduling or
  adding it to your task list.


  ## The Rule


  **If it takes less than 2 minutes → Do it now**


  **If it takes more than 2 minutes → Defer, delegate, or schedule**


  ## Why It Works


  **Reduces Administrative Overhead** - The time required to:

  - Write down the task

  - Add it to your system

  - Categorize and tag it

  - Review it later

  - Context switch to do it eventually


  ...often exceeds the time to just complete the task immediately.


  **Prevents Accumulation** - Small tasks compound. Without the two-minute rule:

  - Inbox fills with quick-response emails

  - Calendar clutters with minor items

  - Task list bloats with trivial actions

  - Mental overhead increases


  **Maintains Momentum** - Completing quick tasks:

  - Provides small wins and positive feedback

  - Keeps workflow moving

  - Reduces sense of overwhelm

  - Builds completion habit


  ## Common Two-Minute Tasks


  **Email & Communication**:

  - Quick email responses

  - Forwarding messages

  - Filing or deleting emails

  - Short Slack replies

  - Scheduling meeting invites


  **Organization**:

  - Filing a document

  - Creating a folder

  - Adding event to calendar

  - Setting a reminder

  - Bookmarking a resource


  **Administrative**:

  - Submitting an expense

  - Approving a simple request

  - Forwarding information

  - Making a quick note

  - Updating a status


  **Household**:

  - Putting something away

  - Wiping a counter

  - Throwing out trash

  - Hanging up clothes

  - Washing a dish


  ## Implementation Guidelines


  **During Email Processing**:

  - Open email

  - Can I respond in under 2 minutes?
    - Yes → Respond immediately
    - No → Convert to task, archive, or defer
  - Move to next email


  **During Task Review**:

  - Encounter new task

  - Estimate time required

  - Under 2 minutes? Do it now

  - Over 2 minutes? Add to appropriate system


  **Throughout the Day**:

  - Task or request comes in

  - Quick mental estimate

  - Two minutes or less? Handle it

  - More than two minutes? Capture for later


  ## When NOT to Use the Two-Minute Rule


  **During Deep Work** - Don't let two-minute tasks interrupt focused sessions:

  - Batch them for later

  - Note them quickly and return to deep work

  - Process during designated admin time


  **When Energy is Wrong** - Two minutes of wrong work interrupts:

  - Creative flow state

  - Complex problem-solving

  - Important strategic thinking

  - Batch for appropriate energy level


  **When Protecting Priorities** - Don't let urgent two-minute tasks override:

  - Scheduled important work

  - Pre-planned deep work blocks

  - Strategic activities

  - High-value tasks


  **During Meeting or Focused Conversation** - Full presence matters more than
  clearing two-minute tasks.


  ## Advanced Applications


  **Email Batching with Two-Minute Rule**:

  - Schedule email processing times

  - During batch, apply two-minute rule

  - Respond to quick ones immediately

  - Add longer responses to task list

  - Maintains batch efficiency while clearing simple items


  **Meeting Follow-Ups**:

  - Immediately after meeting, spend 2-10 minutes

  - Send quick thanks/summaries (under 2 min)

  - Schedule tasks for longer follow-ups

  - File notes and documents

  - Clear meeting-generated admin


  **Context-Specific Batches**:

  - "At Computer" context: Process all two-minute computer tasks

  - "Calls" context: Make quick sub-two-minute calls

  - "Errands" context: Complete quick errands while out


  ## Variations and Adaptations


  **The Five-Minute Rule** - Some practitioners use five minutes:

  - Better for complex knowledge work

  - Allows slightly more substantial completions

  - Risk of more interruption


  **The One-Minute Rule** - Ultra-strict version:

  - Forces even faster decisions

  - More protective of focused time

  - Catches only truly trivial tasks


  **Context-Dependent Timing**:

  - Two minutes during admin time

  - 30 seconds during deep work (only for critical items)

  - Five minutes on low-energy days


  ## Common Pitfalls


  **Overestimating Speed** - Tasks often take longer than expected:

  - Be conservative with estimates

  - If unsure, err toward adding to list

  - Track actual time to improve estimates


  **Death by a Thousand Two-Minute Tasks** - Spending whole day on urgent small
  items:

  - Still protect blocks for important work

  - Batch two-minute tasks when possible

  - Say no to non-essential quick requests


  **Using as Procrastination** - Avoiding difficult work by doing easy
  two-minute tasks:

  - Notice this pattern

  - Time-block important work first

  - Limit two-minute task sessions


  ## Measuring Effectiveness


  Track impact by monitoring:

  - Reduction in task list length

  - Fewer simple tasks cluttering system

  - Faster email inbox clearing

  - Less admin overhead

  - More time for important work


  ## Integration with GTD Workflow


  In David Allen's Getting Things Done system, the two-minute rule sits within
  the processing step:


  1. **Capture** - Collect everything into inbox

  2. **Clarify** - What is it? Is it actionable?

  3. **Organize** - If actionable:
     - Takes < 2 minutes → **Do it**
     - Takes > 2 minutes → Defer, delegate, or schedule
  4. **Reflect** - Review system

  5. **Engage** - Do the work


  ## Complementary Rules


  **Touch It Once** - When you handle something, deal with it completely:

  - Combines well with two-minute rule

  - Open email once, respond if under two minutes

  - Handle item completely or defer completely


  **Inbox Zero** - Empty inbox regularly:

  - Two-minute rule helps achieve this

  - Quick responses keep inbox moving

  - Reduces email backlog


  **Immediate Yes or Scheduled Yes** - For commitments:

  - Can respond and commit in two minutes? Do it

  - Need to think or check calendar? Schedule time to decide

  - Prevents forgotten commitments


  ## 2026 Digital Context


  The two-minute rule remains highly relevant:

  - Digital communication creates more quick-response opportunities

  - Notification culture favors immediate small actions

  - Productivity apps make adding tasks frictionless (sometimes too easy)

  - Remote work increases asynchronous quick requests

  - AI assistants might soon handle many two-minute tasks automatically


  The key is balancing the efficiency of completing quick tasks with protecting
  time for deep, meaningful work.
