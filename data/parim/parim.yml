markdown: >-
  ## Overview


  Parim is time and attendance software for professionals that offers an
  employee time clock and attendance tracking as part of an all-in-one workforce
  management solution. The platform is particularly well-suited for small
  businesses that work with multiple clients or multiple job sites or require
  complex salary calculations.


  ## Key Features


  - **Unique Pricing Model**: Parim offers a unique no-per-user pricing model
  that lets companies add an unlimited number of freelancers to their database
  to create a quick and streamlined time-tracking system

  - **Pay Rate Calculations**: Set up hourly pay rates to shifts, which lets the
  app calculate salaries based on worked hours. Pay rates are highly
  customizable with additional rates and multipliers for overtime hours, bank
  holidays or other specific use cases

  - **GPS and Geofencing**: Monitor attendance at all job sites and know that
  your team starts their shifts at the right place with geofencing clock-in. For
  easier workflow, shifts can start automatically when employees reach the site

  - **Real-time Monitoring**: View real-time employee hours to see if anyone is
  running late and get an overview of preferred break times

  - **Dispute Resolution**: Resolve disputes and issues by providing data to
  prove attendance and working hours

  - **Mobile Accessibility**: Available on both mobile and desktop platforms for
  flexible access

  - **Unlimited Users**: All Parim plans include unlimited users and an
  unlimited staff database


  ## Best Use Cases


  - Small businesses working with multiple clients or job sites

  - Companies requiring complex salary calculations

  - Teams needing geofencing and GPS tracking capabilities

  - Businesses managing shift-based employees


  ## Pricing


  All Parim plans include unlimited users and an unlimited staff database. The
  Starter plan costs £39 per month and includes 1,000 shift hours.


  ## Customer Rating


  Parim holds a 4.8 out of 5 score on both G2 and Capterra.
