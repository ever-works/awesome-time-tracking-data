name: Minimum Viable Planning
description: Lean approach to time management emphasizing simple, sustainable
  planning systems over complex frameworks. Based on principle that the best
  system is one actually used consistently. Focuses on 3-5 essential practices
  rather than comprehensive methodology to reduce planning overhead.
source_url: https://www.calnewport.com/blog/2015/12/21/deep-habits-plan-your-week-in-advance/
category: Time Management Philosophy
tags:
  - minimalism
  - simplicity
  - sustainable
  - pragmatic
markdown: >-
  ## Overview


  Minimum Viable Planning applies lean startup principles to personal
  productivity—find the smallest system that works.


  ## Core Principle


  The best planning system is the one you'll actually use consistently.
  Complexity is the enemy of sustainability.


  ## Essential Elements


  1. Weekly planning session (30-60 min)

  2. Daily priorities list (3-5 items max)

  3. Calendar for time-specific commitments

  4. Capture tool for ideas/tasks

  5. Weekly review (optional but recommended)


  ## Anti-Patterns to Avoid


  - Complex categorization systems

  - Elaborate tagging schemes

  - Multiple tools requiring sync

  - Detailed time estimates

  - Rigid hourly schedules


  ## Benefits


  - Low friction to maintain

  - Easy to restart after breaks

  - Flexible and adaptive

  - Sustainable long-term

  - Focuses energy on doing, not planning


  ## Pricing


  Free philosophy.
