name: 1-3-5 Method
description: A daily planning productivity system where you commit to
  accomplishing 1 Major Task, 3 Medium Tasks, and 5 Small Tasks each day,
  providing a realistic and balanced approach to daily goal-setting that
  prevents overwhelm while ensuring meaningful progress.
