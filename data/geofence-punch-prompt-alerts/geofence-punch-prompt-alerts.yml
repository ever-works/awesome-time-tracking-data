markdown: >-
  ## Overview


  Geofence Punch Prompt alerts automatically notify employees to clock in when
  they arrive at a job site and clock out when they depart, using GPS geofencing
  technology. This automation ensures accurate time tracking for mobile
  workforces without requiring workers to remember to punch manually.


  ## How It Works


  **Setup**: Employers draw virtual boundaries (geofences) around job sites


  **Arrival**: When employee's phone enters the geofence, they receive an alert
  to punch in


  **Work**: GPS coordinates captured with the punch verify location


  **Departure**: When leaving the geofence, employee prompted to punch out


  **Automatic**: System detects entry/exit automatically via smartphone GPS


  ## Key Benefits


  **Prevents Forgotten Punches**: Workers reminded at the right moment


  **Accurate Timing**: Captures actual arrival/departure, not recalled times


  **Location Verification**: Proves employee was on-site


  **Reduced Admin**: Less time spent fixing missing punches


  **Better Compliance**: Ensures all hours properly documented


  ## Industries


  **Construction**: Track crews across multiple job sites


  **Field Services**: HVAC, plumbing, electrical technicians


  **Healthcare**: Home health workers visiting clients


  **Security**: Guards at various patrol locations


  **Transportation**: Delivery and route drivers


  **Event Staffing**: Workers at temporary event venues


  ## Additional Features


  - Multiple geofences per employee

  - Different geofences for different jobs/clients

  - Adjustable geofence radius

  - Alert customization (sound, vibration, notification)

  - Manual override when needed

  - Historical geofence reports


  ## Integration


  - Works with Timesheet Mobile's time tracking

  - GPS coordinates stored with each punch

  - Reports show location compliance

  - Integrates with payroll systems

  - Supports Project+ workforce management features


  Geofence Punch Prompts bridge the gap between manual time tracking (easy to
  forget) and fully automatic tracking (can lack precision), providing the best
  of both approaches for mobile workforces.
