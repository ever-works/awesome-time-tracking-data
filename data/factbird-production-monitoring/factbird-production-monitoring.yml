markdown: >-
  ## Overview


  Factbird is a real-time production monitoring software designed for
  manufacturing environments, combining time tracking with comprehensive
  production analytics. The platform integrates IoT sensors and industrial
  equipment to provide live visibility into machine performance, production
  cycles, and labor efficiency on the shop floor.


  ## Features


  - **Real-Time Monitoring**: Live tracking of production status and machine
  performance

  - **Time Tracking Integration**: Labor time tracking integrated with
  production data

  - **IoT Sensor Integration**: Automatic data collection from machines and
  equipment

  - **Production Analytics**: Detailed insights into production efficiency and
  bottlenecks

  - **Machine Performance Tracking**: Monitor uptime, downtime, and performance
  metrics

  - **Labor Efficiency Analysis**: Track worker productivity and time allocation
  by task

  - **Cycle Time Monitoring**: Measure and analyze production cycle durations

  - **Dashboard Visualization**: Real-time dashboards for shop floor and
  management

  - **Alert System**: Notifications for production issues and anomalies

  - **Historical Analysis**: Trend analysis and performance reporting over time


  ## Manufacturing-Specific Capabilities


  - Automatic capture of machine start/stop times

  - Downtime reason tracking and categorization

  - Production vs. planned time comparison

  - Setup time vs. run time differentiation

  - Scrap and rework time tracking

  - Batch and job time allocation


  ## Benefits


  - Eliminates manual production logging

  - Real-time visibility into shop floor operations

  - Data-driven decision making for production optimization

  - Improved OEE (Overall Equipment Effectiveness)

  - Reduced downtime through early problem detection

  - Better resource allocation and capacity planning


  ## Use Cases


  - Discrete manufacturing operations

  - Process manufacturing facilities

  - Assembly line monitoring

  - Job shop production tracking

  - Make-to-order environments


  ## Pricing


  Contact vendor for pricing based on number of production lines, machines, and
  integration requirements.
