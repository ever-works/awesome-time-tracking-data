markdown: >-
  ## Overview


  Memtime takes a unique approach: it automatically records everything you do on
  your computer (which apps, documents, websites), then lets you review this
  "memory" later to accurately log your time. Perfect for professionals who
  forget to start timers.


  ## How It Works


  1. **Background Capture**: Memtime runs silently, tracking all computer
  activity

  2. **Private Timeline**: Creates visual timeline of your day (apps, docs,
  meetings)

  3. **Retroactive Logging**: Review timeline and assign time to
  projects/clients

  4. **Export/Sync**: Push logged time to billing systems


  ## Key Features


  - Fully automatic activity capture

  - Visual timeline reconstruction

  - 100% offline and private

  - No cloud upload of activity data

  - Integration with billing tools

  - Calendar integration

  - Meeting auto-detection

  - Custom project mapping


  ## Privacy


  - All data stored locally

  - No screenshots or keylogging

  - Only app names and doc titles captured

  - User controls what gets logged

  - GDPR compliant


  ## Best For


  - Lawyers and consultants

  - Freelancers with multiple clients

  - Anyone who forgets to track time

  - Professionals billing by the hour


  ## Integrations


  - Jira, Asana

  - QuickBooks

  - Harvest

  - Toggl


  ## Pricing


  Approximately €10-15/month
