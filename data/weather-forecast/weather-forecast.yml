markdown: >-
  # Weather Forecast


  Localized weather forecasts brought to you by Harvest and the IBM Weather
  Company. The forecast is specific to your location as a 4 km square section in
  the global IBM grid.


  ## Features

  - Hourly predictions for the next ten days

  - Optionally includes Potential Evapotranspiration (PET) for the next ten days
  to aid irrigation decisions

  - Powered by IBM's supercomputers analyzing data from weather satellites and
  ground stations

  - Can be displayed on the Harvest Data Portal or Harvest Web App


  ## Pricing


  Pricing details for the Weather Forecast add-on are available on the Harvest
  website; please contact Harvest for specific plans.


  ## Usage


  Access the forecast via the Harvest Data Portal or your Harvest Web App after
  enabling the add-on.
