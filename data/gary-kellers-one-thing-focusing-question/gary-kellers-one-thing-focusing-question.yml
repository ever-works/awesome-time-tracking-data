markdown: >-
  ## The Book


  "The ONE Thing: The Surprisingly Simple Truth Behind Extraordinary Results"
  was published in 2012 by Gary Keller (founder of Keller Williams Realty) and
  Jay Papasan, becoming a #1 New York Times bestseller.


  ## The Focusing Question


  The core of the methodology is asking:


  **"What's the ONE thing I can do such that by doing it everything else will be
  easier or unnecessary?"**


  This question can be applied to:

  - Daily tasks

  - Weekly goals

  - Monthly objectives

  - Annual planning

  - Life direction

  - Career decisions


  ## Key Concepts


  ### The Domino Effect

  Like dominoes, one action can trigger cascading effects. The right first
  domino can knock down increasingly larger dominoes, creating exponential
  results.


  ### Success is Sequential, Not Simultaneous

  Extraordinary results come from doing one thing at a time, not everything at
  once.


  ### The Lie of Multitasking

  Task-switching reduces effectiveness. Success demands sustained focus on the
  most important thing.


  ### Willpower is Limited

  Treat willpower like a battery that depletes. Do your ONE Thing when willpower
  is highest (usually morning).


  ### Live with Purpose

  Connect daily ONE Thing to bigger purpose and long-term vision.


  ## The Success Habit


  Keller advocates making the Focusing Question a habit:

  1. Ask it every morning

  2. Identify your ONE Thing

  3. Time block it

  4. Protect that time

  5. Everything else comes after


  ## Time Blocking Integration


  The book emphasizes time blocking:

  - Block 4 hours daily for ONE Thing

  - Schedule it first

  - Protect it fiercely

  - Make it non-negotiable

  - Let everything else fit around it


  ## The 80/20 Connection


  ONE Thing takes Pareto Principle further:

  - 80/20 of 80/20 = 64/4

  - Then 80/20 of that = 51/1

  - Eventually you reach THE one thing

  - Finding it creates extraordinary leverage


  ## Application Examples


  ### For Productivity

  "What's the ONE Thing I can do this week such that by doing it my project will
  be easier or unnecessary?"


  ### For Health

  "What's the ONE Thing I can do for my health such that by doing it everything
  else will be easier or unnecessary?"


  ### For Relationships

  "What's the ONE Thing I can do for my relationship such that by doing it
  everything else will be easier or unnecessary?"


  ## Common Mistakes


  ### Too Many ONE Things

  Defeat the purpose by identifying multiple "one things"


  ### Choosing Easy Over Important

  Pick comfortable tasks instead of high-leverage ones


  ### Lacking Courage

  The real ONE Thing is often intimidating


  ### Missing Connection to Purpose

  Failing to align ONE Thing with bigger goals


  ## The Book's Impact


  Influenced:

  - Essentialism movement

  - Focus on leverage over activity

  - Question-driven prioritization

  - Single-tasking advocacy

  - Time blocking adoption


  ## Related Concepts


  - Essentialism (Greg McKeown)

  - Deep Work (Cal Newport)

  - Eat That Frog (Brian Tracy)

  - Getting Things Done (for capturing, ONE Thing for doing)

  - Maker's Schedule (protecting focus time)


  ## Criticism


  Some argue:

  - Life requires juggling multiple priorities

  - Too simplistic for complex roles

  - Ignores necessary maintenance work

  - Can create tunnel vision


  Defenders counter:

  - ONE Thing is relative to timeframe

  - Doesn't mean ignore everything else

  - About sequence, not exclusion

  - Creates clarity, not blindness


  ## Practical Implementation


  ### Daily Practice

  1. Morning: Identify daily ONE Thing

  2. Time block: 4-hour window

  3. Execute: Do it first

  4. Review: Assess progress

  5. Adjust: Next day's ONE Thing


  ### Weekly Planning

  - What's THIS WEEK's ONE Thing?

  - How does it connect to monthly/yearly goals?

  - What gets time blocked this week?


  ### Life Planning

  - What's my ONE Thing for life purpose?

  - Five years from now?

  - This year?

  - This month?

  - This week?

  - Today?

  - Right now?


  ## Legacy


  The Focusing Question provided a simple, memorable framework for cutting
  through overwhelm and identifying what truly matters—a question that can be
  asked daily to maintain focus on highest-leverage activities.
