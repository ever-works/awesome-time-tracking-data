name: Pre-Commitment Devices for Time Management
description: Strategy of making future decisions in advance to remove choice
  when willpower is low. Examples include scheduling gym with friend (social
  commitment), website blockers (technical commitment), or public declarations
  (reputation commitment). Removes decision point when motivation wavers.
source_url: https://jamesclear.com/choice-architecture
category: Time Management Technique
tags:
  - commitment
  - psychology
  - willpower
  - behavioral-design
markdown: >-
  ## Overview


  Pre-Commitment Devices lock in decisions before temptation arises, removing
  choice at crucial moments.


  ## Types


  ### Social Commitments

  - Accountability partners

  - Public declarations

  - Group activities


  ### Technical Commitments

  - Website blockers

  - App limits

  - Automatic scheduling


  ### Financial Commitments

  - Paid classes/coaching

  - Deposits

  - Penalty systems


  ## Examples


  - Schedule deep work blocks (calendar commitment)

  - Use Freedom app 9-11am daily (technical)

  - Tell team your focus hours (social)


  ## Pricing


  Free strategy, though some tools have costs.
