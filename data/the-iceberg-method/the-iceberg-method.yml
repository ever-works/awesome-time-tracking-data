markdown: >-
  ## Overview


  The Iceberg Method is a knowledge management and information organization
  technique that helps you convert raw information into actionable insights.


  ## How It Works


  1. **Capture** - Save all emails, notes, articles, and other information you
  encounter in a digital system

  2. **Categorize** - Organize information using folders and tags for easy
  retrieval

  3. **Monthly Review** - Review everything you've stored each month

  4. **Brainstorm Application** - Consider how captured information can be
  applied to your current work and projects


  This method ensures that valuable information doesn't get lost and gets
  actively used rather than passively collected.
