markdown: >-
  ## Overview


  Microsoft To Do is a free, intelligent to-do list app that lets users manage
  all their tasks in one place. It integrates with Outlook and works on any
  device including PC and mobile, making it ideal for individuals and small
  teams.


  ## Features


  - "My Day" feature for daily planning and prioritization

  - Multiple custom lists for different categories (work, shopping, travel,
  etc.)

  - Due dates, reminders, and notes on tasks

  - Task breakdown into smaller actionable steps

  - Cross-platform sync (PC, mobile) with Outlook integration

  - Intelligent task suggestions

  - Collaboration for shared lists


  ## Use Cases


  - Personal task management and daily planning

  - Individuals and small teams needing a no-cost organizational tool

  - Users already in the Microsoft/Outlook ecosystem seeking seamless task
  integration


  ## Pricing


  Free to use.
