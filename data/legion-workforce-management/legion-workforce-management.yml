markdown: >-
  ## Overview


  Legion is an intelligent workforce management platform that leverages
  artificial intelligence to optimize employee scheduling, time tracking, and
  labor planning for industries like veterinary care, retail, and hospitality.


  ## Features


  - **AI-Powered Scheduling**: Automated schedule generation based on demand
  forecasting and labor rules

  - **Demand Forecasting**: Predicts staffing needs using machine learning
  algorithms

  - **Time & Attendance**: Mobile time clock with GPS verification and biometric
  options

  - **Employee Self-Service**: Mobile app for viewing schedules, swapping
  shifts, and requesting time off

  - **Labor Optimization**: Optimize labor costs while meeting service level
  requirements

  - **Compliance**: Ensures schedules comply with labor laws, union rules, and
  company policies

  - **Real-Time Adjustments**: AI recommends schedule changes based on real-time
  conditions

  - **Communication**: In-app messaging and notifications for schedule updates

  - **Analytics**: Labor analytics dashboard with insights on productivity and
  costs

  - **Integration**: Connects with major payroll, HRIS, and POS systems


  ## Pricing


  Enterprise pricing based on number of employees and features needed. Contact
  Legion for custom quote. Typically designed for organizations with 100+
  employees.
