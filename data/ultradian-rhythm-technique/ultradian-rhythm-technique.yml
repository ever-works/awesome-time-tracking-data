markdown: >-
  ## Overview


  Ultradian rhythms are shorter cycles that occur multiple times throughout the
  day, affecting energy, focus, and cognitive performance. The body naturally
  alternates between higher and lower alertness every 90-120 minutes, and
  aligning work patterns with these rhythms can significantly boost
  productivity.


  ## The 90-Minute Rule


  - Work in focused 60-90 minute blocks

  - Take 15-20 minute restorative breaks between blocks

  - Avoid pushing through when energy naturally dips

  - Maximum of 4-5 focused blocks per day


  ## Scientific Basis


  - Based on research by sleep researcher Nathaniel Kleitman

  - Brain naturally cycles between high and low alertness

  - Cortisol and other hormones follow ultradian patterns

  - Ignoring these rhythms leads to diminishing returns


  ## Benefits


  - Prevents burnout from extended focus periods

  - Maintains high-quality output throughout the day

  - Reduces cognitive fatigue

  - Improves decision-making and creativity

  - Natural alignment with deep work practices


  ## Implementation Tips


  1. Start work sessions at natural energy peaks

  2. Set a timer for 90 minutes (not longer)

  3. Take genuine breaks — no email or work tasks

  4. Notice when focus naturally wanes (usually 60-90 min)

  5. Don't fight the break — embrace it


  ## 2026 Research


  World Economic Forum (2024) projected that ultradian-aligned work practices
  could contribute $1.3 trillion to the global economy annually by 2030.


  ## Optimal Break Activities


  - Light physical movement or walking

  - Meditation or breathing exercises

  - Social interaction

  - Snacks or hydration

  - Nature exposure
