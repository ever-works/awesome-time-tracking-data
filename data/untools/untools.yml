markdown: >-
  ## Overview


  Untools is a collection of thinking tools and frameworks presented as clear
  visual explanations. While not specifically a time tracking tool, it includes
  several time management and productivity frameworks that complement time
  tracking practices.


  ## Time Management Tools Included


  - **Eisenhower Matrix**: Prioritization framework for urgent vs important
  tasks

  - **Pareto Principle**: Understanding the 80/20 rule for effort allocation

  - **Decision Matrix**: Evaluating options to decide how to spend time

  - **First Principles Thinking**: Breaking down tasks to fundamental truths

  - **Second-Order Thinking**: Considering long-term consequences of time
  choices


  ## Why It's Useful for Time Management


  Untools helps with:

  - Making better decisions about how to allocate time

  - Understanding which tasks deserve tracking and focus

  - Applying frameworks that improve time estimates

  - Thinking systematically about productivity

  - Visualizing complex time management concepts


  ## Format


  Each tool is presented as:

  - A visual diagram or illustration

  - Clear explanation of how it works

  - When and how to apply it

  - Examples of usage


  ## Accessibility


  The website is free to use and designed to be:

  - Simple and uncluttered

  - Easy to understand

  - Practical for immediate application

  - Shareable with teams


  ## Application to Time Tracking


  These frameworks help decide:

  - Which activities are worth tracking

  - How to categorize tracked time

  - Which projects deserve more time allocation

  - How to evaluate time investment ROI
