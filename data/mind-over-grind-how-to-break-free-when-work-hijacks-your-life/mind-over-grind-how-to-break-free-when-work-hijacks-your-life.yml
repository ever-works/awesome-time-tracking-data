markdown: >-
  ## Overview


  **Mind Over Grind: How to Break Free When Work Hijacks Your Life** was
  published on February 10, 2026 by Simon & Schuster. The 272-page book guides
  readers in combating work-related stresses based on recent research and
  stories of clients the author has helped thrive in challenging workplace
  environments.


  ## Key Themes


  The book explores:


  - How enmeshment with work affects careers, personal lives, and emotional
  health

  - Why attaining work-life balance involves changing how you think both at work
  and at home

  - Clear, practical strategies to regain control and be more intentional


  ## About the Author


  Guy Winch, Ph.D., is a psychologist and author of three books that have been
  translated into twenty-eight languages. His three TED Talks have garnered
  thirty-five million views, making him one of the most influential voices in
  psychology and emotional wellness.


  ## Approach


  Unlike typical productivity books, Mind Over Grind focuses on psychological
  strategies to:


  - Recognize when work has hijacked your life

  - Establish healthier boundaries

  - Develop sustainable work habits

  - Protect personal time and relationships


  ## Availability


  Available in hardcover, paperback, and digital formats from major retailers
  including Amazon, independent bookstores, and directly from the publisher.


  ## Pricing


  Pricing varies by format and retailer.
