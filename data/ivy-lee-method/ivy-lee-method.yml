markdown: >-
  ## Overview


  The Ivy Lee Method is a simple 100-year-old productivity system that remains
  effective today. It was created in 1918 by productivity consultant Ivy Lee for
  Bethlehem Steel executive Charles M. Schwab.


  ## The Method (6 Steps)


  1. At the end of each work day, write down the six most important tasks for
  tomorrow

  2. Prioritize these six items in order of their true importance

  3. When you arrive tomorrow, concentrate only on the first task

  4. Work until the first task is finished before moving to the second task

  5. Approach the rest of your list in the same fashion

  6. At day's end, move unfinished items to a new list of six tasks for tomorrow


  ## Why Only Six Tasks?


  Six is manageable—it forces prioritization and prevents overwhelming to-do
  lists. It's enough to be productive but not so many that you feel defeated.


  ## Why It Works


  - **Simplicity** - No complex system to maintain

  - **Forces Prioritization** - Limited to six items

  - **Eliminates Decision Fatigue** - Order decided in advance

  - **Single-Tasking** - Focus on one task at a time

  - **Daily Reset** - Fresh start each day

  - **Realistic** - Acknowledges you can't do everything


  ## Key Principles


  - Start before you feel ready

  - Let the completed tasks inspire you

  - Never sacrifice quality for quantity

  - Accept that you won't finish everything


  ## Benefits


  - Reduced overwhelm

  - Clear daily direction

  - Improved focus

  - Better prioritization

  - Consistent progress on important work

  - No complex tools required
