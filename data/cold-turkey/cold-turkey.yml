markdown: >-
  ## Overview


  Cold Turkey is a productivity app that helps you block websites and
  applications to fight procrastination and digital distractions. It's known for
  being virtually impossible to bypass when blocking is active.


  ## Features


  - **Website Blocking**: Block distracting websites

  - **Application Blocking**: Block apps and games

  - **Scheduled Blocks**: Recurring blocking schedules

  - **Frozen Turkey**: Lock computer during breaks

  - **Custom Block Messages**: Motivational reminders

  - **Break Reminders**: Enforce regular breaks

  - **Statistics**: Track blocking and productivity

  - **Exceptions**: Whitelist specific sites within blocked domains

  - **Timer Mode**: Block for specific duration

  - **Password Protection**: Prevent easy disabling


  ## Cold Turkey Blocker (Free)


  - Basic website and app blocking

  - Scheduled blocks

  - Statistics

  - Windows and Mac


  ## Cold Turkey Micromanager (Pro)


  - Advanced scheduling

  - Frozen Turkey (lock computer)

  - Break enforcement

  - Text blocks (block specific words)

  - Random blocks

  - Scripting capabilities


  ## Frozen Turkey


  - Lock your entire computer

  - Force breaks from work

  - Prevent continuous screen time

  - Promote healthy work habits


  ## Pricing


  - **Blocker**: Free - Basic blocking features

  - **Micromanager**: $39 one-time - Pro features

  - Windows and macOS

  - No subscription required
