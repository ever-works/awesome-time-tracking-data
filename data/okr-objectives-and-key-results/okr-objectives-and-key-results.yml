markdown: >-
  ## Overview


  OKR (Objectives and Key Results) is a goal-setting framework developed by Andy
  Grove at Intel. It has been adopted by many major technology companies
  including Google, LinkedIn, Uber, and Intel. The framework is based on a
  simple formula: I will (Objective) as measured by (this set of Key Results).


  ## How It Works


  **Objectives** are descriptions of what you want to achieve. They should be
  short, inspirational, and engaging. An organization should have 3 to 5
  high-level objectives per planning cycle.


  **Key Results** are metrics that measure your progress toward your objectives.
  There should be a set of 3 to 5 key results per objective. At the end of the
  cycle, you should have a clear idea of whether you accomplished the objective.


  ## Implementation


  - OKRs should be part of a quarterly planning process

  - Once defined, they should be communicated to all team members

  - OKRs should be frequently set, tracked, and reviewed

  - Templates and examples are widely available


  ## Software Support


  Popular software platforms that support OKR tracking include Weekdone, Perdoo,
  Workfront, and 15Five.
