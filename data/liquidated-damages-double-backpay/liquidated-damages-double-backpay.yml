name: Liquidated Damages Double Backpay
description: FLSA penalty provision where employees awarded liquidated damages
  receive double the amount of backpay they're owed, serving as a significant
  deterrent against wage and hour violations and emphasizing the importance of
  accurate time tracking compliance.
