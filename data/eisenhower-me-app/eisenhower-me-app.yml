markdown: >-
  ## Overview


  Eisenhower.me is a dedicated productivity application based on the Eisenhower
  Matrix (also known as the Urgent-Important Matrix), designed to help users
  prioritize tasks effectively by categorizing them into four quadrants based on
  urgency and importance.


  ## Features


  ### Core Functionality

  - **Four-Quadrant System**: Organize tasks into Do First (Urgent & Important),
  Schedule (Important but Not Urgent), Delegate (Urgent but Not Important), and
  Don't Do (Neither Urgent nor Important)

  - **Task Prioritization**: Visual system for identifying which tasks deserve
  immediate attention

  - **Task Tracking**: Monitor progress across all quadrants

  - **Clean Interface**: Focused design that eliminates distractions


  ### Platform Availability

  - **iOS App**: Native iPhone application for on-the-go task management

  - **Responsive Web App**: Free browser-based version that works across all
  devices

  - **Cross-Platform Sync**: Tasks synchronize across devices


  ### Task Management

  - Add tasks quickly with simple input

  - Move tasks between quadrants as priorities change

  - Mark tasks as complete

  - Delete or archive completed tasks


  ## Eisenhower Matrix Methodology


  The app implements the time management framework popularized by President
  Dwight D. Eisenhower:

  - **Quadrant 1 (Do First)**: Urgent and important tasks requiring immediate
  attention

  - **Quadrant 2 (Schedule)**: Important but not urgent tasks for strategic
  planning

  - **Quadrant 3 (Delegate)**: Urgent but not important tasks that can be
  delegated

  - **Quadrant 4 (Don't Do)**: Neither urgent nor important tasks to eliminate


  ## Use Cases


  - Professional task prioritization

  - Personal productivity management

  - Project planning and execution

  - Time management training

  - Decision-making framework


  ## Philosophy


  Eisenhower.me focuses on helping users distinguish between what's urgent and
  what's important, encouraging focus on high-impact activities rather than
  reactive firefighting.


  ## Availability


  - iOS app available on the App Store

  - Free responsive web app at eisenhower.me

  - Note: Currently no native Android app, but web app works on all mobile
  browsers


  ## Pricing


  Free web application with iOS app available for purchase.
