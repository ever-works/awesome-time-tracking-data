markdown: >-
  ## Overview


  Gloria Mark is a Professor in the Department of Informatics at the University
  of California, Irvine. Her research on attention, interruptions, and
  multitasking has become foundational to modern time management and
  productivity practices.


  ## Key Research Finding


  Mark's most widely cited finding is that it takes an average of 23 minutes and
  15 seconds to fully regain focus after being interrupted. This research has
  profoundly influenced how organizations and individuals approach work
  scheduling and time blocking.


  ## Research Areas


  Mark's work examines:

  - **Attention Span**: How digital environments affect our ability to maintain
  focus

  - **Interruptions**: The cognitive cost of workplace interruptions

  - **Multitasking**: The effects of attempting to juggle multiple tasks
  simultaneously

  - **Digital Wellbeing**: How technology use impacts stress and productivity


  ## Practical Applications


  Her research supports:

  - Creating protected time blocks without interruptions

  - Minimizing context switching through task batching

  - Designing workspaces and schedules that reduce unnecessary interruptions

  - Understanding the true cost of "quick" interruptions


  ## Publications


  Mark has published extensively in academic journals and her book "Attention
  Span: A Groundbreaking Way to Restore Balance, Happiness and Productivity"
  (2023) makes her research accessible to general audiences.
