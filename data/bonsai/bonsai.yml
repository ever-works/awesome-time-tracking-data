markdown: >-
  ## Overview


  Bonsai is an all-in-one suite of tools to manage freelance business
  operations, from proposals to contracts, invoices, expenses, time tracking,
  and even taxes. Used by 500,000+ freelancers globally, Bonsai turns static
  contracts into dynamic workflows.


  ## Features


  ### Time Tracking

  - Simple time tracker with single-click start/stop

  - Manual time input option

  - Integrates with ongoing projects and clients

  - Mobile app time tracking

  - Tracks across tasks and projects


  ### Contract Management

  - Lawyer-vetted contract templates

  - Freelancer Hourly Rate Contract Template

  - Create, reuse, and manage hourly contracts

  - Dynamic contract workflow

  - Used by hundreds of thousands of freelancers

  - Connect contracts with time tracking and invoicing


  ### Invoicing Integration

  - Automatic invoice generation from tracked hours

  - Auto-calculating billable totals from tracked hours at contracted rate

  - Reduces errors in billing

  - Speeds up billing process

  - Invoice reminders sent automatically

  - Professional invoice templates


  ### Expense Tracking

  - Track business expenses

  - Expense reporting

  - Tax preparation support


  ### Client Management

  - Manage entire client workflow

  - From onboarding through billing

  - Proposals creation

  - Client communication


  ### Tax Features

  - Tax tracking

  - Tax preparation assistance

  - Expense categorization for tax purposes


  ## Workflow Automation


  - Turns tracked time into professional invoices automatically

  - Connects hourly contracts with time tracking

  - Auto-generates invoices from time logs

  - Single platform eliminates need for multiple tools


  ## Who It's For


  - Freelancers

  - Consultants

  - Independent contractors

  - Service professionals

  - Anyone managing contract-based work


  ## Platform Availability


  - Web application

  - iOS mobile app

  - Android mobile app

  - Cross-platform synchronization


  ## Pricing


  Specific pricing tiers available on website. The platform offers comprehensive
  features for managing all aspects of freelance business operations.
