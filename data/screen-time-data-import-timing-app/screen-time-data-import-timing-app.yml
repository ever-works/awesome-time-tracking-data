markdown: >-
  ## Overview


  Timing's Screen Time Data Import is a groundbreaking feature that allows users
  to import their mobile app usage from Apple's Screen Time feature, making it
  the only third-party solution capable of accessing and visualizing this data
  alongside desktop activity.


  ## Key Innovation


  ### Cross-Device Tracking


  Timing can import mobile app usage from Screen Time, giving you a complete
  picture of all your work — regardless of which device you used.


  ### Unique Capability


  Timing is the only third-party solution for viewing Screen Time data in this
  way, as Apple typically restricts this information to their own Screen Time
  interface.


  ## How It Works


  ### Data Integration


  1. **Screen Time Access**: Timing connects to your Apple Screen Time data

  2. **Mobile Activity Import**: iPhone and iPad app usage is imported

  3. **Cross-Device Merging**: Mobile activities appear alongside Mac desktop
  tracking

  4. **Unified Timeline**: Complete work day visible in one place


  ### Device Coverage


  - MacBook and iMac desktop activity (native tracking)

  - iPhone app usage (via Screen Time import)

  - iPad app usage (via Screen Time import)

  - Seamless integration across all Apple devices


  ## Benefits


  ### Complete Work Picture


  Many professionals use multiple devices:

  - Email on phone during commute

  - Document review on iPad

  - Development work on Mac

  - Communication across all devices


  Timing captures it all.


  ### Mobile Work Recognition


  Modern work happens on mobile devices:

  - Slack messages

  - Email responses

  - Document edits

  - Meeting participation

  - Client communication


  Without mobile tracking, significant work goes unrecorded.


  ### Accurate Billing


  For billable work:

  - Capture all client communication

  - Track mobile research time

  - Document travel work on iPad

  - Bill for every productive minute


  ## Technical Implementation


  ### Privacy-First Approach


  Timing maintains its privacy-first philosophy:

  - Data stays on your Mac

  - Screen Time import is optional

  - User controls what's included

  - No cloud sync required


  ### Integration Process


  Users can:

  - Enable Screen Time import in settings

  - Choose which devices to include

  - Filter mobile apps (work vs personal)

  - Set import frequency

  - Review before accepting mobile time


  ## Use Cases


  ### Hybrid Workers


  - Track office Mac work and home iPad use

  - Capture commute phone work

  - Document complete workday

  - Improve time estimation


  ### Consultants


  - Bill for mobile client communication

  - Track research on any device

  - Document travel work time

  - Comprehensive project time


  ### Freelancers


  - Capture quick edits on phone

  - Track mobile client meetings

  - Document full project involvement

  - Prevent revenue leakage


  ## Competitive Advantage


  No other time tracking tool offers:

  - Direct Screen Time integration

  - Third-party access to this Apple data

  - Seamless Mac/iOS/iPadOS tracking

  - Unified cross-device timeline


  ## macOS Integration


  ### Native Mac App


  Timing is built specifically for macOS:

  - Native performance

  - Deep system integration

  - Menu bar presence

  - Automatic tracking

  - Background operation


  ### System Requirements


  - macOS with Screen Time enabled

  - iOS/iPadOS devices with Screen Time

  - Same Apple ID across devices

  - Timing for Mac installed


  ## Pricing


  Included with Timing subscription, no additional cost for Screen Time import
  feature.


  ## Target Users


  Mac users who work across multiple Apple devices, consultants and freelancers
  billing for mobile work, remote workers using varied devices, and anyone
  seeking complete cross-device time accountability.
