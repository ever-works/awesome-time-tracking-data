markdown: >-
  ## Overview


  Paychex Time & Attendance is an enterprise-grade employee time clock software
  that allows staff members to clock in and out wherever they're located using
  multiple authentication methods.


  ## Features


  - **Biometric Authentication** - Clock in using iris scan, facial
  verification, or fingerprint

  - **Proximity Badge** - Use proximity badges for quick and secure clock-ins

  - **PIN Entry** - Simple PIN-based authentication option

  - **Web Punch** - Clock in from desktop, smartphone, or tablet

  - **Multi-Location Support** - Manage time tracking across multiple business
  locations

  - **Payroll Integration** - Seamlessly integrate with Paychex payroll services

  - **Overtime Calculation** - Automatic overtime tracking and calculation

  - **Compliance** - Built-in compliance with labor laws and regulations

  - **Reporting** - Comprehensive reporting on attendance, hours worked, and
  labor costs


  ## Use Cases


  Designed for medium to large enterprises, multi-location businesses, and
  organizations requiring advanced security and payroll integration.


  ## Pricing


  Contact Paychex for enterprise pricing based on employee count and features
  required.
