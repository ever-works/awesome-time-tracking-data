markdown: >-
  ## Overview


  The Chronodex (also known as Spirodex) is a distinctive time tracking and
  planning layout used in bullet journals and paper planners. At its heart lies
  a clock-like circular design that becomes your time-tracking compass.


  ## Design Features


  The Chronodex features a circular layout divided into sections representing
  hours of the day. This unique spiral design allows users to:


  - Visualize their entire day at a glance

  - Track activities in a clock-like format

  - Mark completed tasks with different colors or patterns

  - See patterns in how time is spent throughout the day


  ## How to Use It


  Users typically:

  1. Draw or print the Chronodex template in their bullet journal

  2. Plan their day by marking intended activities in different sections

  3. Fill in or color sections as they complete tasks

  4. Use different colors to represent different types of activities (work,
  personal, breaks, etc.)

  5. Review at the end of the day to see how time was actually spent


  ## Benefits


  - **Visual appeal**: The circular design is aesthetically pleasing and
  engaging to use

  - **Intuitive understanding**: The clock-like format makes it easy to grasp
  time allocation

  - **Pattern recognition**: Helps identify productivity patterns and
  time-wasting habits

  - **Analog flexibility**: Can be customized with colors, symbols, and personal
  notation systems

  - **Mindful planning**: The act of hand-drawing and filling encourages mindful
  time awareness


  ## Comparison to Traditional Planners


  Unlike vertical time trackers found in traditional preformatted planners, the
  Chronodex offers a more holistic, circular view of the day. This can help
  users better understand the flow of their day and see opportunities for
  optimization.


  ## Community and Variations


  The Chronodex has inspired numerous variations and adaptations within the
  bullet journal community, with users creating their own unique versions
  tailored to their specific needs, work schedules, and aesthetic preferences.
