markdown: >-
  ## Overview


  Saner.ai is an innovative AI-powered productivity tool that automatically
  extracts tasks from your notes, emails, and documents, then intelligently
  schedules them into Google Calendar as time blocks. It bridges the gap between
  task capture and execution.


  ## Features


  - **AI Task Extraction** - Automatically identifies tasks from notes, emails,
  and documents

  - **Auto-Scheduling** - Schedules extracted tasks directly into Google
  Calendar time blocks

  - **Note Integration** - Works with popular note-taking apps and systems

  - **Email Parsing** - Scans emails for action items and commitments

  - **Document Analysis** - Extracts tasks from meeting notes and project
  documents

  - **Smart Prioritization** - AI determines task priority and optimal
  scheduling

  - **Calendar Sync** - Seamless integration with Google Calendar

  - **Context Preservation** - Links calendar time blocks back to original
  notes/emails

  - **Workflow Automation** - Reduces manual task list management

  - **Knowledge Management** - Organizes information alongside task scheduling


  ## Use Cases


  - Knowledge workers juggling multiple projects

  - Professionals who take extensive notes

  - Teams coordinating across email and documents

  - Anyone wanting to automate task capture and scheduling


  ## Pricing


  Pricing information available on request with a free trial option.
