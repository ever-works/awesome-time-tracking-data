markdown: >-
  ## Overview


  Code Time is a time-tracking plugin that integrates directly with all of the
  most popular code editors and IDEs, automatically tracking coding time without
  disrupting developer workflow.


  ## Supported IDEs & Editors


  - Visual Studio Code

  - IntelliJ IDEA

  - PyCharm

  - WebStorm

  - Android Studio

  - PhpStorm

  - Atom

  - Sublime Text

  - And more


  ## Key Features


  ### Automatic Time Tracking

  - **Passive tracking**: Monitors coding time in the background

  - **No manual timers**: Automatic detection of active coding

  - **File-level tracking**: See time spent on individual files

  - **Project breakdown**: Time allocation across different projects

  - **Language tracking**: Track time by programming language


  ### Developer Productivity Metrics

  - **Lines of code**: Track code additions and deletions

  - **Active coding time**: Distinguish between coding and other activities

  - **Keystroke patterns**: Understand coding intensity

  - **Flow state detection**: Identify periods of deep focus

  - **Daily/weekly summaries**: Review coding productivity trends


  ### Integration Features

  - **Git integration**: Link time to commits and branches

  - **Project management sync**: Connect with Jira, GitHub, GitLab

  - **Team insights**: Compare productivity across development teams (opt-in)

  - **Goal setting**: Set daily coding time targets


  ### Privacy & Control

  - **Private by default**: Your code content is never accessed

  - **Local tracking**: Data can be kept on your machine

  - **Opt-in sharing**: Choose what to share with team

  - **Open source**: Transparent about what's tracked


  ## Use Cases


  - Freelance developers tracking billable coding hours

  - Development teams monitoring project time allocation

  - Individual developers optimizing productivity habits

  - Agencies billing clients for development work

  - Remote teams maintaining accountability


  ## Benefits for Developers


  - No context switching required

  - Accurate time records for billing

  - Identify time-consuming tasks or files

  - Optimize development workflow

  - Understand personal productivity patterns


  ## Pricing


  Free for individual developers with premium team features available.
