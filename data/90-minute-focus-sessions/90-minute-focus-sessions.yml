markdown: >-
  ## Overview


  In the 1950s, sleep researcher Nathaniel Kleitman discovered that the human
  body tends to move through 90-120 minute cycles. Our brains operate on what
  scientists call the ultradian rhythm - a natural cycle that repeats roughly
  every 90 minutes. An ultradian rhythm cycle is a recurring period of
  approximately 90–120 minutes throughout the day during which your body and
  brain cycle between periods of high alertness and periods of recovery.


  ## How the 90-Minute Cycle Works


  Physiological measures such as heart rate, hormonal levels, muscle tension and
  brain-wave activity all increase during the first part of the cycle—and so
  does alertness. After an hour or so, these measures start to decline.
  Somewhere between 90 and 120 minutes, the body begins to crave a period of
  rest and recovery.


  ### The Cycle Breakdown


  - **First 30 minutes**: Your brain kicks into high gear, firing up its
  attention networks

  - **Next 45 minutes**: Peak performance zone - creative solutions flow and
  complex problems become surprisingly manageable

  - **Final 15-45 minutes**: Gradual decline in focus and energy


  ## Scientific Evidence


  A groundbreaking study published in the Journal of Cognition showed that
  professionals who aligned their work with these 90-minute cycles reported 40%
  higher productivity levels compared to those who worked in random time
  intervals.


  Studies show that professionals who work in rhythm-based blocks report 50%
  less mental fatigue and complete complex tasks with greater accuracy.


  ## How to Implement 90-Minute Focus Sessions


  ### Basic Structure


  1. Work on your most important task for between 60-90 minutes

  2. Take a full stop after 60-90 minutes

  3. Break can last from anywhere between 20-30 minutes and could include:
     - Taking a walk
     - Meditating
     - A short nap
     - Conversations with a friend
     - Light stretching or movement

  ### Key Tips


  - When you find your concentration and energy beginning to falter, it's a good
  sign that you're beginning to hit a low point in an ultradian rhythm

  - It's crucial to ensure that you're highly focused when you're working and
  really resting when you're on a break

  - If you don't draw these hard and fast lines, you'll end up wasting prime
  focus time and not letting your brain and body recover sufficiently during the
  downtime


  ## Combining with Other Techniques


  Stack three to four Pomodoros (25-minute sessions) back to back to form a full
  ultradian work cycle (about 90 minutes). After those 90 minutes, take a longer
  15–20 minute break to fully recharge.


  ## Benefits


  - 40% higher productivity levels

  - 50% less mental fatigue

  - Greater accuracy on complex tasks

  - Aligns with natural biological rhythms

  - Prevents burnout

  - Maximizes peak performance zones


  ## Best Use Cases


  - Deep work requiring sustained concentration

  - Creative problem-solving

  - Complex analytical tasks

  - Writing and content creation

  - Learning and skill development
