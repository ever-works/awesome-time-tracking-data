name: 1-3-9 Method
description: "A powerful task prioritization framework that limits daily focus
  to 13 manageable tasks: one critical priority, three important tasks, and nine
  smaller tasks to ensure proper attention allocation across different priority
  levels."
source_url: https://www.frontlinesourcegroup.com/blog-what-is-the-best-way-to-prioritize-work.html
category: Practices
tags:
  - prioritization
  - focus
