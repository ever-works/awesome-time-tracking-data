markdown: >-
  ## Overview


  Tomato 2 is a simple application for increasing personal productivity using
  the Pomodoro Technique. Work for 25 minutes, take a 5 minute break, then
  repeat.


  ## Features


  - **Silent Mode**: Go to silent mode and don't be interrupted when your
  session ends

  - **5 More Minutes**: Option for when you're in the middle of something
  important

  - **Always-Visible Break Timer**: Never lose track of your break time

  - **Session Goals**: Ability to set goals for your current session

  - **Customizable Durations**: Configurable focus and break durations

  - **Short and Long Breaks**: Support for both types of breaks

  - **Weekly Chart**: Track your productivity over time

  - **Website Blocking**: Optional in-app purchase to block distracting websites


  ## Design


  Tomato 2 is carefully designed to look great in both light and dark mode,
  following your system settings automatically.


  ## Pricing


  Free to download from the Mac App Store with an optional in-app purchase for
  website blocking.
