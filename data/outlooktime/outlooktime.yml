markdown: >-
  ## Overview


  OutlookTime is an Outlook add-in that enhances Microsoft Outlook and Teams to
  automatically add appointments to user timesheets. The software runs within
  Outlook and Teams, transforming appointments into timesheets as users work
  with their calendars.


  ## Key Features


  - **AI Time Analysis**: Identifies patterns and groups similar appointments
  together, enabling bulk allocation and training AI for future auto-allocation

  - **Cross-Platform Compatibility**: Works with all versions of Outlook on PC,
  Mac, Web, and mobile devices

  - **Automatic Timesheet Generation**: All appointments are automatically
  included as draft entries, color-coded to highlight which have or haven't been
  allocated to customers/projects

  - **Office 365 Integration**: Links directly with Office 365 to create
  timesheets with appointments listed in date order

  - **NoTime AI Assistant**: Optional AI assistant that helps allocate
  appointments to projects via fields or intelligent suggestions


  ## Benefits


  - Saves employees hours every week by eliminating manual timesheet entry

  - Ensures accurate time tracking by capturing all calendar activities

  - Reduces timesheet completion time to seconds rather than hours

  - Any appointment made on any device can be converted into timesheets
  instantly


  ## Target Users


  Customers range from small teams of five employees to large organizations with
  over 1,000 employees. Ideal for professional services firms, consultancies,
  and any organization that uses Outlook for scheduling.


  ## Pricing


  Described as offering incredible value, costing less than a single cup of
  coffee while saving hours every week per employee.
