name: Jeremy Wright's Pickle Jar Theory (2002)
description: Time management metaphor created in 2002 by author Jeremy Wright
  using rocks, pebbles, sand, and water in a jar to illustrate prioritization -
  if you fill your day with small tasks first, there's no room for important
  goals.
