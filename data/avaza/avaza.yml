markdown: >-
  ## Overview


  Avaza is an integrated platform that combines time tracking, project
  management, invoicing, and expense tracking. It's designed for freelancers,
  agencies, and professional services teams who need an all-in-one solution.


  ## Features


  - Time tracking with timers and manual entry

  - Project management with tasks and milestones

  - Invoice generation from tracked time

  - Expense tracking and receipt capture

  - Quote and estimate creation

  - Team collaboration tools

  - Resource scheduling

  - Reporting and analytics

  - Client portal access

  - Integration with accounting software

  - Mobile apps for iOS and Android

  - Multiple currency support

  - Customizable permissions


  ## Pricing


  Free plan available for up to 5 users. Paid plans start at competitive rates
  with additional features and unlimited users.
