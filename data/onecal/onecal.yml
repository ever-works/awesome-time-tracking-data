markdown: >-
  ## Overview


  OneCal is a time-blocking app designed to help professionals manage multiple
  calendars seamlessly. It automatically blocks time across all your calendars
  in real-time, ensuring no scheduling conflicts occur between different
  calendar systems.


  ## Features


  - **Automatic Time Blocking**: Real-time synchronization across all connected
  calendars

  - **Scheduling Links**: Create and share availability links for easy meeting
  booking

  - **Multi-Calendar Management**: Connect and manage multiple calendar accounts
  in one place

  - **Conflict Prevention**: Automatically prevents double-booking across
  different calendars

  - **Real-Time Sync**: Instant updates across all connected calendar platforms


  ## Use Cases


  - Managing work and personal calendars separately while preventing overlaps

  - Coordinating availability across multiple organizations or projects

  - Simplifying scheduling for professionals juggling multiple commitments

  - Maintaining calendar privacy while sharing availability


  ## Pricing


  Pricing information available on the OneCal website.
