markdown: >-
  ## Overview


  SmartBarrel provides construction time tracking software and jobsite hardware
  specifically designed for trade contractors who need verified, accurate labor
  tracking.


  ## Features


  - **Biometric Facial Verification**: Prevents buddy punching by requiring
  facial recognition for clock-ins

  - **GPS Geofencing**: Verifies workers are within designated jobsite ranges
  when clocking in

  - **Real-Time Timestamps**: Captures exact clock-in and clock-out times with
  location data

  - **Jobsite Hardware**: Physical time clock devices designed for rugged
  construction environments

  - **Offline Capability**: Continues tracking even without internet
  connectivity, syncing when connection restored

  - **Job Costing**: Breaks down labor costs by project for accurate budgeting

  - **Payroll Integration**: Exports verified time data directly to payroll
  systems

  - **Multi-Site Management**: Track crews across multiple construction sites
  simultaneously

  - **Weather-Resistant**: Hardware designed to withstand outdoor construction
  conditions


  ## Target Users


  - Construction companies managing multi-site crews

  - Project managers needing real-time workforce visibility

  - Payroll administrators seeking to minimize manual entry errors

  - Trade contractors requiring verified labor hours


  ## Pricing


  Contact for pricing based on company size and number of jobsites.
