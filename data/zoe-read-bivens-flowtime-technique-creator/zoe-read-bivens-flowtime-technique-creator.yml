markdown: >-
  ## Overview


  Zoe Read-Bivens is a teacher and productivity expert who created the Flowtime
  Technique (also known as Flowmodoro) in 2016. Her innovation addressed
  limitations she observed in the traditional Pomodoro Technique, offering a
  more flexible approach to time management.


  ## The Flowtime Technique


  Read-Bivens developed Flowtime to overcome shortcomings of rigid, timer-based
  productivity systems. Her key insight: instead of forced 25-minute intervals,
  workers should be allowed to maintain focus for as long as concentration
  naturally lasts, then take proportional breaks.


  ## Core Innovation


  The technique's revolutionary aspect is its flexibility:

  - **No Fixed Intervals**: Workers continue focused work until concentration
  naturally wanes

  - **Proportional Breaks**: Rest periods are calculated as approximately 20% of
  the work session duration

  - **Respects Flow States**: Allows deep work to continue uninterrupted rather
  than breaking it artificially

  - **Counts Up, Not Down**: Unlike Pomodoro's countdown timers, Flowtime counts
  up to track session length


  ## Impact on Productivity


  Read-Bivens' contribution has been particularly valuable for:

  - Creative professionals who enter extended flow states

  - Knowledge workers doing complex problem-solving

  - Anyone who finds rigid time blocks disruptive

  - Tasks requiring sustained, uninterrupted concentration


  ## Philosophy


  Her approach represents a shift from external time management (following
  predetermined schedules) to internal time management (working with natural
  attention spans and energy rhythms). This philosophy aligns with the growing
  recognition that productivity is personal and should adapt to individual
  working styles.


  ## Legacy


  Since 2016, the Flowtime Technique has gained adoption among productivity
  enthusiasts seeking alternatives to traditional time boxing methods. It
  represents an important evolution in time management thinking, emphasizing
  flexibility and individual differences over one-size-fits-all solutions.
