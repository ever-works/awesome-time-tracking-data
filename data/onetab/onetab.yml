name: OneTab
description: Browser extension that converts all open tabs into a single
  organized list with one click, saving up to 95% of memory and reducing browser
  clutter. Privacy-focused design ensures tab URLs are never transmitted
  externally, making it ideal for users who accumulate dozens or hundreds of
  tabs while working.
