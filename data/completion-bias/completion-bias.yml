name: Completion Bias
description: A cognitive bias where people feel compelled to finish tasks once
  started, often prioritizing easy-to-complete tasks over more important ones.
  Understanding this bias helps optimize productivity by balancing the dopamine
  reward of completion with strategic task prioritization.
