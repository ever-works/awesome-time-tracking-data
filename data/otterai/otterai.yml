markdown: >-
  ## Overview


  Otter.ai provides real-time transcriptions, summaries, and can answer
  questions on any call with its AI Meeting Agent. The service turns every
  meeting into a clear summary with decisions, action items, and insights.


  ## Core Capabilities


  - Real-time transcriptions during meetings

  - AI-generated summaries with key decisions and action items

  - Question-answering capability on meeting content

  - Shareable and secure meeting notes


  ## Time Tracking & Minutes Allocation (2026)


  Otter AI provides 300 free transcription minutes monthly in 2026 (reduced from
  previous 600-minute allowance). Minutes are calculated based on actual speech
  time and reset on account anniversary date with no rollover capability.


  ## Transcription Restrictions (2026)


  Enforces multiple restrictions including:

  - 300 monthly minutes (free tier)

  - 30-minute session limits (free tier)

  - 100MB file upload cap

  - English-only transcription

  - Content filtering for sensitive material

  - Paid plans increase limits to 6,000 minutes/month (Pro) with 4-hour session
  limits


  ## Recent Updates


  - Chrome Extension updated to version 3.8.3 (March 1, 2026)

  - Otter + MCP integration allows pulling meeting intelligence directly into
  ChatGPT, Claude, or any MCP-compatible chat app

  - Enhanced AI Meeting Agent capabilities


  ## User Benefits


  - Users save over four hours weekly by automating transcription and summaries

  - Particularly useful for teams with high meeting volumes

  - Integration support for Zoom, Google Meet, and Microsoft Teams


  ## Platform Support


  - Web application

  - Chrome extension

  - iOS mobile app

  - Android mobile app

  - Integrations with major meeting platforms


  ## Use Cases


  - Remote team meetings

  - Client calls and consultations

  - Interviews and research sessions

  - Lectures and educational content

  - Sales and support calls
