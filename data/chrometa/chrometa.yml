markdown: >-
  ## Overview


  Chrometa provides a passive timekeeping solution designed for busy legal
  professionals who cannot afford to stop and start timers throughout the day.
  The software runs quietly in the background on computers and mobile devices,
  automatically capturing billable time.


  ## Key Features for Lawyers


  ### Automatic Time Capture

  - Captures activity automatically—documents opened, emails composed, phone
  calls made, websites visited

  - Turns activity data into a chronological record of your workday

  - Accurate, detailed log without manual tracking

  - Runs in the background without interrupting work

  - Works on both desktop and mobile devices


  ### Privacy & Confidentiality

  - Does NOT capture keystrokes or content

  - Protects client and attorney confidentiality

  - Records metadata only (file names, email subjects, call durations)

  - Complies with legal ethics requirements

  - Secure data storage


  ### Automation & Rules

  - Create keyword-based rules for automatic entry assignment

  - Automatically assign time to specific clients, projects, or matters

  - Reduce manual categorization

  - Learn from patterns over time

  - Customizable automation workflows


  ## Benefits for Legal Professionals


  ### Recover Lost Billable Hours

  - Surfaces tasks that often fall through the cracks

  - Captures time spent on client correspondence

  - Records brief email replies and phone calls

  - Identifies unbilled time automatically

  - Improves realization rates


  ### Improve Billing Accuracy

  - Provides precise descriptions tied to actual activity

  - Creates transparent bills that withstand scrutiny

  - Defensible time records for client audits

  - Detailed activity logs for billing disputes

  - Reduces write-offs and write-downs


  ### Save Time on Timekeeping

  - Eliminates need to manually track every task

  - Reduces time spent on timesheet preparation

  - Automated time entry suggestions

  - Less administrative burden

  - More time for billable work


  ## Integration Capabilities


  Chrometa has 100+ integrations with major legal practice management systems:

  - **Legal PM Systems**: Clio, Cosmolex, RocketMatter, Practice Panther

  - **CRM**: Salesforce

  - **Accounting**: QuickBooks, Xero

  - **Communication**: Outlook, Gmail

  - Additional legal-specific integrations


  ## Target Users


  - Solo attorneys

  - Law firms of all sizes

  - Legal departments

  - Billing attorneys

  - Paralegals and legal staff

  - Any professional who bills by the hour


  ## How It Works


  1. **Install**: Download Chrometa on your devices

  2. **Work Normally**: Continue your daily work without timers

  3. **Review**: Chrometa creates a timeline of your activities

  4. **Assign**: Use rules or manually assign time to matters

  5. **Bill**: Export to your practice management system


  ## Key Benefits


  - Recover billable hours previously lost

  - Reduce time spent on administrative timekeeping

  - Improve billing accuracy and defensibility

  - Maintain client confidentiality

  - Seamless integration with existing systems

  - Mobile and desktop coverage


  ## Pricing


  Chrometa offers three tiers:


  ### Standard - $19/user/month

  - Data storage for up to 18 months

  - Basic automatic time capture

  - Standard integrations


  ### Plus - $29/user/month

  - Unlimited lifetime data storage

  - Advanced automation rules

  - Priority support


  ### Premium - $49/user/month

  - Customizable options

  - White-glove setup

  - Dedicated account manager

  - Advanced reporting


  All tiers include:

  - Automatic time tracking

  - 100+ integrations

  - Privacy protection

  - Mobile and desktop apps
