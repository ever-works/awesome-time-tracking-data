markdown: >-
  ## Overview


  Amie is an all-in-one calendar and productivity app that schedules time for
  todos, events, and contacts with joy. Described as "the joyful productivity
  app," Amie stands out for its beautiful design and seamless integration of
  multiple productivity tools.


  ## Key Features


  ### **Unified Workspace**

  Amie combines three essential productivity tools into one beautiful interface:

  - Calendar management

  - Task lists (todos)

  - Email integration


  ### **Todo Integration**

  The app combines action items from calls with todos from services like Notion
  or Todoist in one place. By default, unscheduled todos appear in the left-side
  column next to the calendar, and users can:

  - Drag tasks from the sidebar and drop them into the calendar at specific
  dates and times

  - Schedule time blocks for focused work

  - See all commitments in one unified view


  ### **AI-Powered Assistant**

  Amie's AI features help you work smarter:

  - Draft emails automatically

  - Create or update meetings with natural language

  - Rewrite and polish meeting summaries

  - Create mind maps from meeting notes

  - Schedule your day intelligently based on priorities


  ### **Meeting Management**

  - Works with any video call provider including Zoom, Google Meet, Slack
  Huddle, and Microsoft Teams

  - Automatic meeting notes and summaries

  - Action item extraction from meetings

  - Calendar synchronization across platforms


  ### **Beautiful Design**

  Amie is praised for its joyful, intuitive interface that makes productivity
  feel less like work and more like a pleasant experience.


  ## Platform Availability


  - **iOS**: iPhone and iPad apps

  - **macOS**: Native Mac application

  - **Windows**: Desktop application

  - **Web**: Browser-based access


  ## Integrations


  - Google Calendar

  - Outlook Calendar

  - Notion

  - Todoist

  - Zoom

  - Google Meet

  - Microsoft Teams

  - Slack


  ## Funding & Development


  Amie raised a $7 million seed round led by Spark Capital in June 2022,
  demonstrating strong investor confidence in the joyful productivity approach.


  ## Pricing


  - Free trial available

  - Subscription plans for premium features

  - Check website for current pricing details


  ## Target Users


  Ideal for:

  - Professionals juggling meetings, tasks, and emails

  - Teams needing unified calendar and task management

  - Anyone seeking a more joyful approach to productivity

  - Users who value beautiful, well-designed software


  ## Comparison to Alternatives


  Amie competes with tools like Motion, Sunsama, and Todoist, but differentiates
  itself through its emphasis on joyful design and seamless integration of
  calendar, tasks, and email in one interface.
