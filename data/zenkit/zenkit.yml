markdown: >-
  ## Overview


  Zenkit is a versatile project management platform that allows teams to switch
  between different views and work styles within the same project. It's designed
  for teams who need flexibility in how they visualize and manage their work.


  ## Multiple Project Views


  Zenkit's standout feature is the ability to view the same data in multiple
  formats:


  ### Kanban View

  - Simple, user-friendly Kanban boards

  - Default columns: "To-Do", "Doing", "Done"

  - Fully customizable columns and labels

  - Drag-and-drop task movement

  - Visual workflow management

  - WIP limits (optional)


  ### Gantt Chart View

  - Precise project schedule tracking

  - All 4 dependency types (FS, FF, SS, SF)

  - Lead and lag time support

  - Automatic critical path display

  - Resource management

  - Subtask support

  - Drag-and-drop scheduling

  - Real-time updates to schedule changes


  ### Calendar View

  - Timeline visualization

  - Deadline tracking

  - Event scheduling

  - Multiple calendar overlays


  ### Table View

  - Spreadsheet-like interface

  - Custom fields and columns

  - Filtering and sorting

  - Bulk editing

  - Data import/export


  ### List View

  - Simple task list format

  - Hierarchical organization

  - Quick task entry

  - Checkbox completion


  ### Mindmap View

  - Visual brainstorming

  - Hierarchical relationships

  - Creative planning

  - Project structuring


  ## Time Tracking Integration


  While Zenkit doesn't have native time tracking, it integrates seamlessly with
  time tracking tools:


  ### Toggl Track Integration

  - Automatic task creation in Toggl when Zenkit tasks are created

  - Two-way synchronization

  - Time data linked to project tasks

  - Easy time reporting


  ## Project Management Features


  - Task management with subtasks

  - Custom fields for any data type

  - File attachments and comments

  - @mentions and notifications

  - Task dependencies and relationships

  - Tags and labels

  - Custom workflows

  - Activity feeds


  ## Collaboration Tools


  - Real-time collaboration

  - Team member assignments

  - Comment threads

  - File sharing

  - Activity tracking

  - Notification system

  - Role-based permissions


  ## Resource Management


  In Gantt view:

  - Assign resources to tasks

  - Track resource allocation

  - Identify over-allocation

  - Balance workload


  ## Custom Fields


  - Text fields

  - Numbers and calculations

  - Dates and date ranges

  - Dropdowns and multi-select

  - Checkboxes

  - Links and references

  - File attachments

  - Formulas


  ## Reporting & Analytics


  - Dashboard views

  - Progress tracking

  - Task completion metrics

  - Custom reports

  - Data export (CSV, Excel)


  ## Templates


  - Project templates

  - Pre-built workflows

  - Custom template creation

  - Share templates with team

  - Template marketplace


  ## Integrations


  - Toggl Track (time tracking)

  - Zapier (automation)

  - Slack (communication)

  - Google Calendar

  - Microsoft Office

  - Dropbox and Google Drive

  - API for custom integrations


  ## Mobile Apps


  - iOS and Android apps

  - Offline access

  - Mobile task creation

  - Notifications

  - File uploads


  ## Use Cases


  - Teams with diverse working styles (some prefer Kanban, others Gantt)

  - Project managers needing different views for different stakeholders

  - Agile teams requiring both sprint boards and timeline views

  - Creative teams benefiting from mindmap brainstorming

  - Cross-functional teams with varied visualization preferences


  ## Unique Advantages


  ### View Flexibility

  The same project data can be viewed as a Kanban board by developers, a Gantt
  chart by project managers, and a calendar by executives - all simultaneously.


  ### No Vendor Lock-in

  Multiple export options ensure your data isn't trapped in one format or
  system.


  ### Adaptable Workflow

  As team needs change, you can switch views without migrating data or learning
  new tools.


  ## Pricing


  Free plan available with basic features. Paid plans offer:

  - Personal: For individuals

  - Plus: For small teams

  - Business: For growing organizations

  - Enterprise: Custom pricing for large teams


  ## 2026 User Feedback


  Users particularly appreciate that different team members can view plans in
  the format that works best for them - some prefer tables, some Kanban, some
  Gantt - all working with the same underlying data.
