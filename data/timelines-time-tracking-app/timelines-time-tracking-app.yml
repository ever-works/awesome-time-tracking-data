markdown: >-
  ## Overview


  Timelines is a visual time tracking application built specifically for the
  Apple ecosystem, offering native apps for iPhone and Apple Watch. The app
  emphasizes simplicity and visual clarity while providing powerful time
  tracking capabilities optimized for iOS and watchOS.


  ## Features


  ### Apple Watch Integration

  - **Watch Complications**: Display active timer directly on watch face

  - **Quick Start/Stop**: Control timers from your wrist

  - **Glanceable Information**: See current task and duration at a glance

  - **Independent Operation**: Track time even when iPhone is out of reach

  - **Haptic Feedback**: Tactile confirmation of timer actions


  ### Visual Time Tracking

  - **Timeline View**: Visual representation of how time is spent throughout the
  day

  - **Color Coding**: Easily distinguish between projects and activities

  - **Calendar Integration**: See tracked time in context of your schedule

  - **Charts and Graphs**: Visual analytics of time distribution

  - **Historical Views**: Review past days, weeks, and months visually


  ### Project & Task Management

  - Create unlimited projects and sub-tasks

  - Assign colors to projects for quick identification

  - Tag tasks for flexible categorization

  - Set billing rates for projects

  - Archive completed projects


  ### Time Entry

  - **One-Tap Start**: Begin tracking with single tap

  - **Manual Entry**: Add time retroactively when needed

  - **Timer Editing**: Adjust start/end times as needed

  - **Running Timer Indicator**: Always visible when timer is active

  - **Automatic Tracking**: Option for background time capture


  ### Reporting & Export

  - Daily, weekly, and monthly summaries

  - Project-based reports

  - Billable hours tracking

  - Export to CSV for external processing

  - Share reports via email or messaging


  ### iOS Features

  - **iCloud Sync**: Seamless synchronization across all Apple devices

  - **Widgets**: Home screen and lock screen widgets for iOS 16+

  - **Shortcuts Integration**: Automate time tracking with Siri Shortcuts

  - **Dark Mode**: Full support for system-wide appearance

  - **iPad Support**: Optimized layout for larger screens


  ## Use Cases


  - **Freelancers**: Track billable hours across client projects

  - **Consultants**: Monitor time for accurate client billing

  - **Remote Workers**: Document work hours and project time

  - **Students**: Track study time for different subjects

  - **Professionals**: Understand time allocation across responsibilities


  ## Platform Exclusive


  Timelines is designed exclusively for Apple platforms, taking full advantage
  of iOS and watchOS capabilities that aren't available on other operating
  systems.


  ## Design Philosophy


  Timelines emphasizes visual clarity and ease of use, believing that time
  tracking shouldn't interrupt workflow. The Apple Watch integration allows for
  friction-free tracking without pulling out a phone.


  ## Privacy


  All data stored locally and in your personal iCloud account, with no
  third-party server access to your time tracking information.


  ## System Requirements


  - iOS 15.0 or later

  - watchOS 8.0 or later (for Apple Watch features)

  - iCloud account for sync across devices


  ## Pricing


  Available on the App Store with options for one-time purchase or subscription
  model.
