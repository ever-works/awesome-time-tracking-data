markdown: >-
  ## Overview


  ZenFocus is a distraction-free aesthetic Pomodoro timer featuring calming
  ambient sounds and breathing meditation support. It helps you plan tasks,
  track time, and achieve deep work in a beautiful, mindful environment.


  ## Key Features


  - **Customizable Durations**: Focus sessions from 5 to 90 minutes

  - **Ambient Soundscapes**: Multiple calming themes including:
    - Rain sounds
    - Flowing water streams
    - Fireplace crackling
    - Airplane cabin noise
    - Cafe coffee shop ambiance
    - Minimalist silence
  - **Breathing Meditation**: Built-in meditation feature to lower stress and
  anxiety

  - **Aesthetic Design**: Carefully crafted visuals easy on the eyes


  ## Meditation Support


  The breathing meditation feature helps:

  - Lower stress and anxiety levels

  - Keep you in the present moment

  - Prepare for focused work sessions

  - Transition between tasks mindfully

  - Practice mindfulness during breaks


  ## Soundscape Benefits


  Ambient sounds help:

  - Block out background noise

  - Reduce distractions

  - Create consistent focus environment

  - Mask interruptions

  - Enhance concentration


  ## How to Use


  1. Choose your focus duration (5-90 minutes)

  2. Select your soundscape theme

  3. Optional: Start with breathing meditation

  4. Enter state of deep focus

  5. Work without distraction

  6. Take mindful breaks


  ## Available Themes


  ### Study-Focused

  - Rain Sounds Pomodoro Timer

  - Stream Pomodoro Timer (flowing water)

  - Minimalist Pomodoro Timer


  ### Ambiance-Rich

  - Cafe Pomodoro Timer (coffee shop sounds)

  - Airplane Pomodoro Timer (flight cabin)

  - Fireplace (cozy atmosphere)


  ## Notion Integration


  ZenFocus can be embedded in Notion pages, allowing you to:

  - Access timer within your workspace

  - Combine with notes and tasks

  - Create aesthetic study environment

  - Keep tools in one place


  ## Benefits


  - Free to use

  - No signup required

  - Account option for data backup

  - Desktop, tablet, and mobile compatible

  - Open-source (GitHub available)

  - Privacy-focused

  - Ad-free experience


  ## Use Cases


  - Deep work sessions

  - Study periods

  - Meditation practice

  - Creative work

  - Writing projects

  - Programming tasks

  - Mindful productivity


  ## Target Users


  - Students

  - Remote workers

  - Meditators

  - Creative professionals

  - Anyone seeking mindful productivity

  - People sensitive to aesthetics

  - Focus-challenged individuals


  ## Technical Details


  - Web-based application

  - Works across all browsers

  - Mobile-responsive

  - Open-source on GitHub

  - No installation required

  - Optional account creation


  ## Pricing


  Completely free with optional account for data backup.
