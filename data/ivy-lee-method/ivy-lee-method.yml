markdown: >-
  ## Overview


  The Ivy Lee Method is a simple yet powerful productivity technique developed
  by efficiency consultant Ivy Lee in 1918 for Charles M. Schwab, president of
  Bethlehem Steel Corporation.


  ## Historical Context


  In 1918, Charles Schwab asked Ivy Lee to help increase his team's efficiency.
  Lee's solution was so effective that Schwab paid him the equivalent of
  $400,000 in today's money after using it for three months.


  ## The Method


  The Ivy Lee Method consists of six simple steps performed daily:


  ### Daily Routine


  1. **End of Day**: At the end of each work day, write down the six most
  important tasks to accomplish tomorrow

  2. **Prioritize**: Order these six items by their true importance

  3. **Next Morning**: When you arrive tomorrow, concentrate only on the first
  task

  4. **Single-Tasking**: Work until the first task is finished before moving to
  the second task

  5. **Continue**: Approach the rest of your list in the same fashion

  6. **Unfinished Items**: At the end of the day, move any unfinished items to a
  new list of six tasks for the following day

  7. **Repeat**: Repeat this process every working day


  ## Key Principles


  ### Limitation

  By forcing yourself to pick only six tasks, you must think deeply about your
  priorities and what truly matters.


  ### Simplicity

  No complex systems, apps, or workflows needed—just pen, paper, and commitment.


  ### Single-Tasking

  Focus on one task at a time until completion, eliminating the productivity
  drain of multitasking.


  ### Consistency

  Daily repetition builds habits and creates sustained productivity
  improvements.


  ## Benefits


  - **Eliminates Decision Fatigue**: You decide what to work on the night
  before, so you start each day with clarity

  - **Forces Prioritization**: Limited to six tasks, you must identify what
  truly matters

  - **Prevents Overwhelm**: Six tasks is manageable, not paralyzing

  - **Creates Momentum**: Completing tasks in order builds satisfaction and
  drive

  - **Reduces Context Switching**: Single-tasking improves focus and quality

  - **Builds Discipline**: Simple system is easy to follow consistently


  ## Modern Applications


  - Foundation for time blocking methodologies

  - Inspiration for daily planning apps and systems

  - Core principle in many productivity frameworks

  - Adapted for digital task management tools


  ## Why It Works


  - **Clarity**: Knowing exactly what to work on eliminates procrastination

  - **Progress**: Finishing tasks creates positive momentum

  - **Focus**: Single-tasking produces better quality work

  - **Realistic**: Six tasks is achievable, building confidence through
  consistency
