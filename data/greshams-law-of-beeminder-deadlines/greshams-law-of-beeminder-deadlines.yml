name: Gresham's Law of Beeminder Deadlines
description: Beeminder's March 2026 policy addressing deadline snoozing,
  eliminating the traditional ability to change deadlines within six hours,
  preventing users from gaming the commitment contract system.
source_url: https://www.beeminder.com/
