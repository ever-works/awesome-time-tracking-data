name: Office Hours for Focused Workers
description: Time management practice where knowledge workers designate specific
  windows for ad-hoc questions and collaboration while protecting remaining time
  for deep work, balancing accessibility with productivity through scheduled
  availability.
source_url: http://www.paulgraham.com/makersschedule.html
category: Time Management Practice
tags:
  - collaboration
  - deep-work
  - boundaries
markdown: >-
  ## Overview


  Office Hours for Focused Workers establishes designated times for spontaneous
  collaboration and questions, protecting deep work periods while maintaining
  team accessibility.


  ## Benefits


  - Protected deep work time

  - Reduced interruptions

  - Clear availability expectations

  - Improved async communication


  ## Implementation


  - Choose 1-2 daily windows for questions

  - Communicate clearly to team

  - Block on calendar as available

  - Protect remaining time for focus


  ## Pricing


  Free practice requiring cultural acceptance
