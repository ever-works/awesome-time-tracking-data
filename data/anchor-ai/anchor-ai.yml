markdown: >-
  ## Overview


  Anchor AI features "Max," a personal AI Project Manager designed to
  revolutionize meeting handling, from documentation to task management. It's an
  AI-powered meeting recording and organization tool built to simplify work
  life.


  ## Key Features


  ### Meeting Management


  - **Automated Attendance**: Max attends, transcribes and summarizes so
  everyone on the team can focus and participate

  - **Platform Support**: Works with Zoom, Microsoft Teams, and other virtual
  meeting platforms

  - **In-Person Recording**: Record Instantly straight into Anchor using your
  computer or phone microphone for in-person meetings


  ### Task Tracking & Action Items


  - **Automatic Task Generation**: Max generates and assigns action items with
  due dates to the task tracker so that what gets discussed can get done

  - **Smart Assignment**: Once Anchor identifies an actionable item from the
  meeting, it can automatically create a task for it with an assignee and a due
  date


  ### AI Capabilities


  - **All-in-One Transcription**: AI transcription tool that can take notes,
  generate meeting summaries, and identify action items

  - **AI Assistant**: Ask Anchor to take care of related tasks, such as taking
  notes, writing up a meeting summary, or sending out a follow-up email


  ## Time Tracking Benefits


  By automatically capturing meeting time and extracting actionable items,
  Anchor helps teams:


  - Account for time spent in meetings

  - Convert discussions into trackable tasks

  - Reduce manual note-taking time

  - Improve meeting productivity

  - Ensure follow-through on commitments


  ## Pricing


  - **Free for Individuals + Teams**: Basic features free

  - **Automated Plan**: $15 per month

  - **Advanced Plan**: $35 per month

  - Additional features available through Power-Ups


  ## Use Cases


  - Remote team meetings

  - Client consultations

  - Project planning sessions

  - Standup meetings

  - Board meetings
