markdown: >-
  ## Overview


  Shortcut (formerly Clubhouse) is a project management platform built
  specifically for software development teams, offering a streamlined approach
  to planning and tracking work with integrated time tracking capabilities.


  ## Features


  - **Stories & Epics**: Organize work with user stories, epics, and milestones

  - **Iteration Planning**: Plan and manage sprints with velocity tracking and
  capacity planning

  - **Time Tracking**: Track time estimates and actual time spent on stories

  - **Workflow Automation**: Customize workflows and automate repetitive tasks

  - **Roadmaps**: Visual roadmaps to communicate product strategy and timelines

  - **Reports**: Sprint reports, velocity charts, and cycle time analytics

  - **GitHub Integration**: Deep integration with GitHub for automatic story
  updates from commits and PRs

  - **Slack Integration**: Get notifications and update stories directly from
  Slack

  - **API**: Robust API for custom integrations and automation


  ## Pricing


  Free plan available for up to 10 users. Paid plans start at $8.50 per user per
  month with unlimited stories, advanced search, and integration features.
