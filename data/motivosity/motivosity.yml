markdown: >-
  ## Overview


  Motivosity is an automated, meaningful employee recognition platform that
  helps organizations build recognition programs or improve existing manual
  programs. The platform fosters peer-to-peer recognition by encouraging
  employees to celebrate wins, creating stronger relationships, increasing
  engagement, and boosting company culture.


  ## Key Features


  ### Employee Recognition


  **Peer-to-Peer Recognition**: Everyone has a chance for both peers and leaders
  to praise good work, improve relationships, and connect to company values.


  **Spot Bonuses**: Managers can give spot bonuses in real-time, celebrating
  high impact moments like meeting last quarter's quota or achieving specific
  goals.


  **Service Shoutouts**: Employees can be recognized for impact directly tied to
  positive customer experiences.


  **Nomination Awards**: Organizations can automate top-down nomination programs
  for awards like Employee of the Month, Quarterly MVP, or Annual Top Performer,
  reducing stress for HR and managers.


  ### Rewards and Redemption


  Employees receive real dollars or points instead of a single catalog, which
  they can spend with the ThanksMatters Card, browse Amazon directly in
  Motivosity, or redeem in the global rewards marketplace of over 500+ million
  options.


  ### Time Off Management


  Motivosity introduces structured off-boarding automation with defined access
  timelines and earned balance handling, reducing administrative burden,
  improving reporting accuracy, and ensuring a consistent employee exit
  experience.


  ## Platform Benefits


  - Automated recognition programs reduce manual HR workload

  - Real-time recognition and rewards boost employee morale

  - Integration with existing HR systems

  - Mobile app with 4.9-star rating for on-the-go access

  - Centralized platform for managing multiple employee programs


  ## Pricing


  The Small Business tier includes the platform and four programs (Milestones,
  Peer to Peer, Nomination Awards, Achievements, and Challenges) with a $3,000
  minimum spend and one-time implementation fees.
