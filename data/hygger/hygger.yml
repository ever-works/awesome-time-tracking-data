markdown: >-
  ## Overview


  Hygger is a project management tool designed for product teams and software
  developers that combines agile methodologies with powerful prioritization
  frameworks and time tracking capabilities.


  ## Features


  - **Kanban & Scrum Boards**: Flexible boards for managing workflows and
  sprints

  - **Prioritization**: Built-in frameworks including Value vs Effort, RICE, ICE
  scoring for feature prioritization

  - **Time Tracking**: Track time spent on tasks and projects with manual and
  timer-based options

  - **Roadmaps**: Visual product roadmaps to plan releases and communicate
  strategy

  - **Swimlanes**: Organize boards with customizable swimlanes for better
  visualization

  - **Analytics**: Sprint reports, burndown charts, and velocity tracking

  - **Backlog Management**: Organize and prioritize product backlog with scoring
  frameworks

  - **Integration**: Connects with Slack, GitHub, GitLab, Jira, and other
  development tools


  ## Pricing


  Free plan available for unlimited users with basic features. Paid plans start
  at $7 per user per month with advanced prioritization, time tracking, and
  reporting features.
