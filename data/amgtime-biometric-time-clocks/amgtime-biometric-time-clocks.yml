markdown: >-
  ## Overview


  AMGtime provides advanced biometric time clock solutions that use fingerprint
  scanning, facial recognition, and iris recognition technology to accurately
  track employee attendance and eliminate time theft.


  ## Biometric Technologies


  - Fingerprint recognition

  - Facial recognition (contactless)

  - Iris scanning

  - RFID card readers

  - PIN code entry

  - Multi-modal authentication options


  ## Features


  - Buddy punching prevention

  - Real-time attendance tracking

  - Cloud-based data management

  - Mobile app access

  - Payroll system integration

  - Overtime calculation

  - Shift scheduling

  - Department tracking

  - Job costing

  - GPS tracking for mobile employees

  - Offline mode capability

  - Multi-location support


  ## Hardware Options


  - Wall-mounted terminals

  - Desktop units

  - Rugged outdoor models

  - Tablet-based systems

  - Mobile biometric devices


  ## Integration


  - ADP, Paychex, QuickBooks

  - Various HRIS and ERP systems

  - Custom API available


  ## Security & Privacy


  - Biometric data stored as encrypted templates

  - GDPR and CCPA compliant

  - Data cannot be reverse-engineered

  - Secure cloud storage


  ## Pricing


  Custom pricing based on number of employees and hardware requirements. Contact
  vendor for quotes.
