markdown: >-
  ## Overview


  The Two-Minute Rule is a productivity technique with two main interpretations,
  both designed to reduce procrastination and increase productivity by lowering
  the barrier to action.


  ## Two Versions


  ### David Allen's Original (GTD)

  "If an action will take less than two minutes, it should be done at the moment
  it's defined."


  The rationale is that it's roughly the point where it starts taking longer to
  store and track an item than to deal with it the first time it's in your
  hands.


  ### James Clear's Variation (Habit Formation)

  "When you start a new habit, it should take less than two minutes to do."


  This version focuses on making new habits as easy as possible to start,
  reducing resistance to beginning.


  ## Key Benefits


  ### Reduces Mental Clutter

  Handling short tasks immediately keeps your mind clear and focused, reducing
  mental clutter from remembering small tasks.


  ### Prevents Task Pile-Up

  Tackling two-minute tasks immediately prevents them from accumulating and
  becoming overwhelming.


  ### Lowers Activation Energy

  For habit formation, the two-minute version makes starting so easy that you
  can't say no.


  ### Quick Wins

  Completing small tasks provides immediate satisfaction and momentum.


  ## How It Works


  When you encounter a task, ask: "Will this take less than two minutes?" If
  yes, do it immediately. If no, add it to your task management system for
  later.


  ## Potential Pitfalls


  ### Context Switching Risk

  Constantly prioritizing all two-minute tasks over substantial work can lead to
  context switching and fragmented focus.


  ### Productivity Theater

  You may complete many small tasks while your most important work remains
  untouched.


  ### When to Avoid

  When you're in deep work or flow state, don't interrupt yourself for
  two-minute tasks—batch them for later.


  ## Best Practices


  - Use during task processing/review time, not during deep work

  - Batch two-minute tasks together when possible

  - Distinguish between urgent and important two-minute tasks

  - Don't let two-minute tasks derail focus on high-priority work
