markdown: >-
  ## Overview


  Hakatime is a self-hosted server implementation of WakaTime written in
  Haskell. It provides developers with a privacy-first alternative for tracking
  coding time while maintaining full control over their data.


  ## Features


  - **Self-Hosted Solution**: Deploy on your own infrastructure for complete
  data privacy and control

  - **WakaTime Compatible**: Works with existing WakaTime editor plugins and
  extensions

  - **Beautiful Dashboard**: Clean, intuitive interface with graphical
  representations of collected data

  - **Data Import**: Import existing WakaTime activity using an API token and
  date range

  - **GitHub Integration**: See time spent on specific GitHub commits

  - **Heartbeat Forwarding**: Forward incoming heartbeats to another
  WakaTime-compatible server

  - **Project Tags**: Group projects together using custom tags for better
  organization

  - **User Management**: Support for user registration and login through the UI

  - **Leaderboards**: Compare coding activity with other users on the same
  instance

  - **Badge Generation**: Generate badges displaying total hours spent on
  projects for configurable time periods


  ## Technical Details


  - Written in Haskell for reliability and performance

  - Deployment via Docker for easy setup

  - ARM architecture support available

  - Unlicense license for maximum freedom


  ## Ideal For


  - Developers seeking self-hosted coding time tracking

  - Teams wanting privacy-first productivity analytics

  - Organizations with strict data compliance requirements

  - Open-source enthusiasts preferring Haskell-based solutions


  ## Pricing


  Free and open-source under the Unlicense
