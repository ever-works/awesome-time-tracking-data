markdown: >-
  ## Overview


  Scope creep occurs when project requirements expand beyond the original
  agreement without corresponding budget or timeline adjustments. Preventing
  scope creep protects profitability and prevents burnout.


  ## Common Causes


  ### Unclear Initial Scope

  Vague project definitions allow interpretation differences.


  ### Poor Change Management

  No formal process for evaluating and approving changes.


  ### Client Requests

  "While you're at it" additions that seem small but compound.


  ### Gold Plating

  Perfectionism leading to unasked-for extras.


  ### Fear of Saying No

  Difficulty setting boundaries with clients.


  ## Prevention Strategies


  ### 1. Clear Scope Definition

  - Detailed written deliverables

  - Explicit exclusions

  - Acceptance criteria

  - Out-of-scope items listed


  ### 2. Change Request Process

  - Formal change request form

  - Impact analysis (time, cost, timeline)

  - Approval requirement before proceeding

  - Documentation of all changes


  ### 3. Time Tracking

  Detailed tracking reveals scope creep early:

  - Hours by deliverable

  - Unbudgeted work visible

  - Trend analysis shows expansion


  ### 4. Regular Communication

  - Weekly progress updates

  - Budget utilization reports

  - Early warning of potential overruns


  ### 5. Firm Boundaries

  - Polite but firm "no" to out-of-scope requests

  - Offer as separate project or change order

  - Explain impact on timeline/budget


  ## Detection Signs


  - Budget approaching but work expanding

  - Team working longer hours without progress

  - Multiple "small" additions accumulating

  - Original timeline no longer realistic

  - Deliverables morphing from original definition


  ## Response Framework


  When scope creep occurs:

  1. **Document**: Track exactly what's changed

  2. **Analyze**: Calculate time and cost impact

  3. **Communicate**: Alert client to situation

  4. **Options**: Present choices (adjust scope, budget, or timeline)

  5. **Formalize**: Get written approval for path forward
