name: 25% Billable Time Loss from Retrospective Tracking
description: Research finding that professionals lose approximately 25% of
  billable hours when using retrospective time tracking (reconstructing time
  entries from memory after the fact) instead of real-time tracking.
source_url: https://www.manyrequests.com/blog/track-billable-hours
category: Time Tracking Research
tags:
  - research
