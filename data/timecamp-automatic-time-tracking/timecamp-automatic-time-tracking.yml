markdown: >-
  ## Overview


  TimeCamp's automatic time tracking system captures all work activities in the
  background using keyword-based rules and AI categorization, making it a truly
  hands-off solution for time tracking.


  ## Key Features


  - **100% Free for Teams**: Unlimited users, unlimited projects, unlimited time
  tracking

  - **Keyword-Based Tracking**: Assign keywords to projects; TimeCamp auto-logs
  matching activities

  - **Silent Operation**: Runs in background without disrupting workflow

  - **AI Agent**: Automatically fills timesheets based on observed work patterns

  - **Multi-Platform**: Windows, Mac, Linux desktop apps plus mobile apps

  - **Integration**: Works with Trello, Asana, Jira, ClickUp, monday.com, Azure
  DevOps

  - **Offline Tracking**: Continues tracking without internet connection

  - **No Manual Timers**: Never need to start or stop a timer


  ## How It Works


  1. Install TimeCamp desktop app

  2. Define keywords for your projects (e.g., "client-name" → Client Project)

  3. TimeCamp observes your work on documents, apps, websites

  4. When keywords are detected, time is automatically logged

  5. Review AI-suggested timesheet entries

  6. Approve and submit for billing or payroll


  ## Benefits


  - Capture every billable minute without effort

  - No interruption to workflow

  - Eliminate forgotten time entries

  - Accurate project time allocation

  - Truly free for unlimited users


  ## Pricing


  Completely free for core time tracking features with unlimited users.
