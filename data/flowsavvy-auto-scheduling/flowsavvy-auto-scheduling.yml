markdown: >-
  ## Overview


  FlowSavvy is an intelligent time blocking application that automatically
  schedules your tasks on your calendar. Unlike traditional time blocking apps
  that require manual placement, FlowSavvy uses AI to analyze your tasks,
  deadlines, priorities, and available time to create realistic daily schedules
  that adapt dynamically as your priorities change.


  ## Features


  ### Automatic Task Scheduling

  - **AI-Powered Placement**: System decides when tasks should happen

  - **Deadline Awareness**: Prioritizes tasks based on due dates

  - **Priority Weighting**: High-priority tasks get better time slots

  - **Duration-Based**: Schedules based on estimated task length

  - **Dynamic Rescheduling**: Automatically adjusts when things change


  ### Intelligent Calendar Management

  - **Gap Filling**: Uses available time between meetings

  - **Buffer Time**: Automatically adds padding between activities

  - **Time Preferences**: Respects your energy patterns and preferences

  - **Break Protection**: Ensures recovery time between focused work

  - **Calendar Integration**: Works with Google Calendar, Outlook, Apple
  Calendar


  ### Smart Features

  - **Task Chunking**: Breaks large tasks into manageable blocks

  - **Deadline Pressure**: Increases urgency as deadlines approach

  - **Flexible vs. Fixed**: Distinguishes movable tasks from fixed appointments

  - **Recalculation**: Instantly reschedules when you add/remove tasks

  - **What-If Scenarios**: Preview impact of adding new commitments


  ### Task Management

  - **Quick Task Entry**: Fast input of new tasks

  - **Duration Estimation**: AI learns from your patterns

  - **Priority Levels**: Mark importance of different tasks

  - **Project Organization**: Group related tasks

  - **Recurring Tasks**: Automated scheduling of routine work


  ## How Auto-Scheduling Works


  ### Initial Setup

  1. Connect calendar to see existing commitments

  2. Input tasks with deadlines and estimates

  3. Set work hours and preferences

  4. Define priority levels

  5. Let AI generate schedule


  ### AI Decision Making

  FlowSavvy considers:

  - **Available Time**: Gaps between meetings and appointments

  - **Task Duration**: How long each task needs

  - **Deadlines**: When tasks must be completed

  - **Priorities**: Importance ranking of different tasks

  - **Energy Patterns**: Your productivity throughout day

  - **Time of Day**: Matching task types to optimal times


  ### Dynamic Adaptation

  When things change:

  - New task added → Schedule instantly updates

  - Meeting moved → Tasks automatically reschedule around it

  - Task completed → Extra time reallocated

  - Deadline changes → Priorities adjust accordingly

  - Running late → Future blocks automatically shift


  ## Benefits


  ### Saves Planning Time

  - No manual calendar blocking needed

  - Automatic optimization of schedule

  - Instant recalculation when plans change

  - Less mental overhead for planning


  ### Realistic Schedules

  - Accounts for actual available time

  - Prevents overcommitment

  - Visible if workload exceeds capacity

  - Forces honest time estimation


  ### Stress Reduction

  - Don't worry about when to do tasks

  - System ensures deadlines will be met

  - Clear daily plan removes uncertainty

  - Reduced decision fatigue


  ### Improved Productivity

  - Work on right task at right time

  - Optimized use of available time

  - Protected focus blocks

  - Better work-life balance


  ## Use Cases


  ### Students

  - Balance classes, assignments, and study time

  - Ensure exam preparation fits in schedule

  - Manage multiple course deadlines

  - Optimize study sessions around classes


  ### Knowledge Workers

  - Schedule project work around meetings

  - Balance multiple priorities

  - Ensure strategic work gets time

  - Optimize productivity throughout day


  ### Freelancers

  - Balance multiple client projects

  - Ensure deadline commitments are realistic

  - Optimize billable hour allocation

  - Maintain work-life boundaries


  ## Comparison to Other Tools


  ### vs. Manual Time Blocking

  - Automatic vs. manual placement

  - Instant recalculation vs. manual rescheduling

  - AI optimization vs. human guesswork

  - Less time spent planning


  ### vs. Motion

  - Similar auto-scheduling concept

  - Different pricing and interface

  - FlowSavvy focuses on simplicity

  - Motion offers more project management features


  ### vs. Traditional To-Do Lists

  - Shows if tasks actually fit in available time

  - Assigns specific times, not just priorities

  - Realistic about capacity constraints

  - Integrates with calendar automatically


  ## Limitations & Considerations


  ### Requires Good Estimates

  - System only as good as your duration estimates

  - Need to learn personal working speeds

  - AI improves with usage data


  ### Trust Required

  - Must trust AI's scheduling decisions

  - May place tasks at unexpected times

  - Requires letting go of manual control


  ### Calendar Dependency

  - Needs calendar to show availability

  - Effectiveness depends on calendar accuracy

  - Must keep calendar up to date


  ## Pricing


  FlowSavvy offers subscription pricing:

  - **Free Plan**: Limited features for trial

  - **Premium**: Full auto-scheduling features

  - **Annual Discount**: Reduced cost for yearly commitment


  ## Ideal For


  - People overwhelmed by manual time blocking

  - Those with variable schedules and many meetings

  - Anyone struggling to find time for important work

  - People who want scheduling guidance, not full control

  - Teams wanting to optimize individual time management
