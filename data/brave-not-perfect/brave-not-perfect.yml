markdown: >-
  ## Overview


  "Brave, Not Perfect: Fear Less, Fail More, Live Bolder" is a book by Reshma
  Saujani that serves as a manifesto enabling women to see the roots of
  perfectionism and rewire themselves for bravery.


  ## Author Background


  Reshma Saujani is the Founder and CEO of Girls Who Code, a national non-profit
  organization working to close the gender gap in technology. Her 2016 TED talk
  "Teach girls bravery, not perfection" struck a chord around the world, with
  over 3 million views.


  ## Core Message


  The book addresses how boys are taught to be brave while girls learn that
  achievement is paved with diligence and caution. It challenges this cultural
  conditioning and provides a path forward for women to embrace imperfection and
  take bold action.


  ## Structure


  The book has a manual-like structure that urges readers to actively engage
  with the content, helping them develop a "bravery mindset" through practical
  exercises and reflections.


  ## Key Themes


  - Overcoming perfectionism in professional and personal life

  - Understanding the societal roots of gender-based fear of failure

  - Rewiring thought patterns to prioritize bravery over perfection

  - Taking calculated risks and embracing failure as part of growth

  - Building confidence through action rather than endless preparation


  ## Target Audience


  Best for perfectionists who need permission to be imperfect and women seeking
  to overcome fear of failure in their careers and personal lives.


  ## Format


  Published book available in hardcover, paperback, and digital formats.
