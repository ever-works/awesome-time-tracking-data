markdown: >-
  ## Overview


  Freedom is the app and website blocker that syncs across Mac, Windows, iOS,
  Android, and Chrome. The app is trusted by over 3 million individuals and
  teams to help them focus and block distractions.


  ## Key Features


  - **Cross-Device Syncing**: Freedom is the only app that can sync blocking
  sessions across all your devices, so one session applies everywhere – phone,
  computer, browser

  - **Custom Blocklists**: Select apps and websites from preset lists, or create
  an unlimited number of custom blocklists to target your biggest distractions

  - **Scheduling**: Use Advance and Recurring schedules to pre-commit to focus,
  with Freedom starting automatically on your schedule

  - **Locked Mode**: Prevents you from quitting a session early, designed for
  moments when you want real commitment like deep work, studying, or winding
  down at night

  - **Desktop App Blocking**: On Mac and Windows, Freedom can block desktop
  applications in addition to websites


  ## Reported Benefits


  Freedom users report gaining an average of 2.5 hours of productive time every
  day. Research indicates 22% higher hourly earnings when the Freedom app was
  used.


  ## Pricing


  Subscription-based pricing with various plans available.
