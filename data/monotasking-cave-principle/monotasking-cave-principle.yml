markdown: >-
  ## The Monotasking Rule


  In Caveday sessions ("The Cave"), participants commit to working on exactly
  one task or one closely related set of tasks during each sprint.


  ## Why Monotasking Works


  ### Context Switching Cost

  - Switching between tasks costs 40% of productivity

  - Each switch requires 5-15 minutes to refocus

  - Mental overhead of task management disappears

  - Full cognitive resources on single objective


  ### Flow State Achievement

  - Flow requires sustained single-task focus

  - Takes 15-20 minutes to enter flow

  - Multitasking prevents flow entirely

  - Monotasking enables deep flow states


  ### Quality Improvement

  - Undivided attention yields better work

  - Reduced errors and oversights

  - Deeper thinking and creativity

  - More thorough execution


  ## How Caveday Enforces Monotasking


  ### Pre-Sprint Commitment

  - State specific task before sprint begins

  - Announce to group for accountability

  - Maximum of 1-2 related tasks

  - Clear scope prevents drift


  ### Social Accountability

  - Others know what you're working on

  - Camera-on environment

  - Peer pressure to stay on task

  - Check-out requires reporting progress


  ### Facilitation Support

  - Cave Guide keeps group focused

  - Reminders about single-task commitment

  - Encouragement during difficult moments

  - Permission to go deep


  ## Practical Application


  ### Task Selection

  **Good Sprint Tasks:**

  - Write blog post draft

  - Code feature implementation

  - Design mockup creation

  - Research specific topic

  - Process and respond to emails


  **Poor Sprint Tasks:**

  - "Catch up on work" (too vague)

  - "Meetings and emails" (switching)

  - "Various admin tasks" (multitasking)


  ### Managing Interruptions

  - Note interrupting thoughts

  - Add to separate list

  - Return to single task

  - Address later


  ## Comparison to Normal Work


  **Typical Work Session:**

  - Check email

  - Start Task A

  - Respond to message

  - Return to Task A

  - Check social media

  - Switch to Task B

  - Back to email


  **Cave Monotasking:**

  - Select Task A

  - Work only on Task A

  - Complete or make significant progress

  - Take break

  - Select next single task
