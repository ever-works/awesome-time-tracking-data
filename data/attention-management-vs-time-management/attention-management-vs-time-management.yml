name: Attention Management vs Time Management
description: Paradigm shift from managing time to managing attention,
  recognizing attention as the more scarce and valuable resource. Maura Thomas's
  framework emphasizes controlling where attention goes rather than what fills
  hours, as productivity depends on attention quality not time quantity.
source_url: https://maurathomas.com/attention-management/
category: Time Management Philosophy
tags:
  - attention
  - focus
  - paradigm-shift
  - productivity
markdown: >-
  ## Overview


  Attention Management recognizes managing attention matters more than managing
  time.


  ## Key Principle


  You can't control time, but you can control attention. Productivity depends on
  attention quality, not hours worked.


  ## Four Types of Attention


  1. Controlled attention (intentional focus)

  2. Captured attention (reactive to environment)

  3. Attracted attention (pulled by interest)

  4. Rejected attention (deliberately ignored)


  ## Practice Shifts


  - From scheduling to attention allocation

  - From time logs to attention logs

  - From multitasking to single-tasking

  - From availability to boundaries


  ## Pricing


  Free framework from Maura Thomas.
