name: Structured Procrastination
description: Counterintuitive productivity philosophy by John Perry that
  harnesses procrastination tendencies for good by maintaining a list of
  important tasks where procrastinating on the top task leads to completing
  other valuable work lower on the list. Embraces human nature rather than
  fighting it.
source_url: https://structuredprocrastination.com/
