markdown: >-
  ## Overview


  My Time and Attendance 365 is a comprehensive time and attendance management
  solution built natively for Microsoft Dynamics 365 Business Central. This
  seamless integration provides enterprises with powerful workforce management
  capabilities directly within their ERP system.


  ## Key Features


  - **Native D365 Integration**: Built specifically for Business Central with no
  middleware required

  - **Time Clock Functionality**: Multiple clock-in methods including web,
  mobile, and kiosk

  - **Attendance Tracking**: Real-time visibility into employee attendance and
  absences

  - **Shift Management**: Schedule and manage employee shifts within Business
  Central

  - **Leave Management**: Track and approve vacation, sick leave, and other time
  off

  - **Overtime Calculation**: Automatic overtime tracking based on customizable
  rules

  - **Payroll Integration**: Seamless data flow to Business Central payroll
  processing

  - **Compliance Reporting**: Generate reports for labor law compliance


  ## Benefits for D365 Users


  - Single source of truth for employee data

  - Eliminates double-entry between systems

  - Leverages existing D365 security and permissions

  - Unified reporting across HR, finance, and operations

  - Reduced IT complexity and maintenance


  ## Advanced Capabilities


  - Multi-company and multi-location support

  - Project and job costing integration

  - Mobile apps for iOS and Android

  - Biometric clock-in options

  - Geofencing for remote workers

  - Custom approval workflows


  ## Target Market


  Enterprises already using Microsoft Dynamics 365 Business Central who need
  integrated time and attendance capabilities without third-party systems.


  ## Deployment


  Available through Microsoft AppSource as an add-on for Dynamics 365 Business
  Central (cloud or on-premise).


  ## Pricing


  Subscription pricing through Microsoft AppSource. Contact vendor for
  enterprise pricing details.
