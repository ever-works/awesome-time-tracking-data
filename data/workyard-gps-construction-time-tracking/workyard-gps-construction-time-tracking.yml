markdown: >-
  ## Overview


  Workyard is the #1 GPS time clock app built specifically for contractors and
  field services companies. The platform saves time and money with precise GPS
  time tracking that automates timesheets to payroll and job costing, designed
  specifically for mobile field workers.


  ## GPS Time Tracking Features


  ### Automatic Location Recording

  Every time employees clock in, the built-in GPS tracking records their exact
  location. Throughout the day, Workyard automatically:

  - Detects when workers arrive at each job site

  - Records exact arrival time

  - Logs exact departure time

  - Tracks movement between sites


  ### Jobsite Verification

  Employers can verify that workers are actually at assigned job sites when
  clocked in, preventing time theft and ensuring accurate job costing.


  ### Geofencing Capabilities

  Set up geofences around job sites to:

  - Auto-clock in when workers arrive

  - Auto-clock out when workers leave

  - Receive alerts for early/late arrivals

  - Track time spent per location


  ## Mileage & Travel Tracking


  ### Automatic Trip Detection

  Workyard automatically:

  - Detects when clocked-in workers start driving

  - Records exact driving routes

  - Calculates miles traveled

  - Logs travel time


  This provides complete documentation for:

  - Mileage reimbursement

  - Customer billing

  - Tax deductions

  - Job costing


  ## Offline Functionality


  ### No Internet Required

  Workers can clock in and submit time without internet connectivity. The GPS
  time clock uses satellites (not internet) to track location, ensuring
  functionality even in remote areas.


  ### Automatic Sync

  Once workers return to internet coverage, the app automatically synchronizes
  and updates timesheets with all tracked data.


  ## Automation Features


  ### Smart Clock-In

  Avoid late clock-ins by automatically clocking employees in when they arrive
  at a site (if enabled).


  ### Forgotten Clock-Out Detection

  Detect when employees forget to clock out and automatically trim their time
  card to the last site visited, preventing inflated hours.


  ### Automatic Job Code Assignment

  Based on GPS location, automatically assign time to the correct job or project
  code.


  ## Construction-Specific Features


  ### Certified Payroll Compliance

  Built-in certified payroll reporting for government contracts and prevailing
  wage requirements.


  ### Job Costing

  Automatic allocation of labor hours to specific jobs based on location,
  providing accurate job cost tracking.


  ### Equipment Time Tracking

  Track equipment usage and runtime in addition to labor hours.


  ## Field Worker Optimization


  ### Tested with 50,000+ Construction Workers

  Workyard has been fine-tuned with feedback from over 50,000 construction
  workers to ensure the interface is intuitive and easy for everyone to use,
  regardless of technical skill level.


  ### Simple Mobile Interface

  - Large, easy-to-tap buttons

  - Clear visual feedback

  - Minimal steps to clock in/out

  - Works with gloves on

  - Readable in bright sunlight


  ## Time Theft Prevention


  ### Buddy Punching Elimination

  GPS verification makes buddy punching (someone else clocking in for a worker)
  nearly impossible since location is automatically recorded.


  ### Accurate Time Records

  Automatic tracking eliminates:

  - Rounded or estimated hours

  - Forgotten clock-ins/outs

  - Manual timesheet errors

  - Inflated travel time


  ## Integration with Payroll & Job Costing


  ### Direct Payroll Export

  Seamless integration with payroll systems:

  - QuickBooks

  - ADP

  - Gusto

  - Paychex

  - And more


  ### Job Costing Systems

  Export time data to job costing and accounting platforms for project
  profitability analysis.


  ## Reporting Capabilities


  - Hours by employee

  - Hours by job/project

  - Hours by day/week/pay period

  - Overtime tracking and alerts

  - Location verification reports

  - Mileage reports

  - Certified payroll reports


  ## Compliance Support


  ### Labor Law Compliance

  - Accurate overtime calculation

  - Break tracking

  - Prevailing wage documentation

  - Certified payroll reporting


  ### Audit Trail

  Complete GPS and timestamp records provide documentation for:

  - Workers' compensation claims

  - Client billing disputes

  - Labor audits

  - Tax reporting


  ## Benefits for Contractors


  ### Time Savings

  - Eliminate manual timesheet entry

  - Reduce payroll processing time

  - Automate job costing

  - Speed up certified payroll reporting


  ### Cost Savings

  - Reduce time theft

  - Improve job cost accuracy

  - Optimize crew utilization

  - Accurate mileage tracking for reimbursement


  ### Improved Accuracy

  - GPS-verified locations

  - Automatic time recording

  - Precise mileage calculation

  - Real-time data sync


  ## Key Advantage


  Workyard solves the unique challenges of construction and field service time
  tracking where workers are mobile, often in areas without reliable internet,
  and need simple, rugged solutions that work with gloves in outdoor conditions.
  The GPS verification provides accountability while the offline functionality
  ensures consistent operation regardless of connectivity.
