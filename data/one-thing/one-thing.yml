markdown: >-
  ## Overview


  One Thing is an ultra-minimalist productivity app for Mac that lives in your
  menu bar and shows one task at a time. It helps you maintain laser focus on
  your current priority by keeping it constantly visible.


  ## Features


  - **Menu Bar Display**: Shows current task in menu bar

  - **One Task Focus**: Only one task visible at a time

  - **Quick Edit**: Click to change task

  - **Minimal Interface**: No complex features or distractions

  - **Always Visible**: Constant reminder of current priority

  - **Keyboard Shortcuts**: Quick access

  - **Dark Mode**: Supports macOS dark mode

  - **Privacy**: All data stored locally


  ## Philosophy


  Based on the principle that you can only truly focus on one thing at a time.
  By making that one thing always visible, you're constantly reminded of your
  priority.


  ## Use Cases


  - Keep current focus task visible

  - Remember daily priority

  - Stay on track during workday

  - Simple task reminder

  - Mindful work practice


  ## Pricing


  - $4.99 one-time purchase

  - Mac App Store

  - macOS only
