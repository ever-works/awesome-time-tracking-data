name: Meeting Recovery Syndrome
description: A phenomenon where employees experience significant fatigue and
  productivity decline after attending meetings, particularly unproductive or
  back-to-back ones. Research shows that affected individuals need at least 45
  minutes to recover before resuming productive work, with 90% of workers
  reporting experiencing a 'meeting hangover'.
