markdown: >-
  ## Overview


  "How to Calm Your Mind: Finding Presence and Productivity in Anxious Times" is
  a book by Chris Bailey that presents practical, science-backed strategies
  showing how the key to a less anxious life and greater productivity is a calm
  state of mind. In fact, investing in calm might be the best productivity
  strategy around.


  ## The Book's Origin


  After experiencing an on-stage panic attack, productivity expert Chris Bailey
  recognized how critical it is to invest in calm at the same time that we
  invest in becoming more productive. A few years ago, Bailey found himself
  searching for calm after falling deep into a period of anxiety and burnout,
  and in the book he shares practical lessons learned from experts, experiments,
  and research.


  ## Key Topics Covered


  - How our digital world drains us and what we can do to abate hidden sources
  of stress

  - Embracing the analog world and "stimulation fasts"

  - Using the science of "savoring" to become more focused and present

  - Learning to relax without guilt

  - How the analog and digital worlds affect calm and anxiety differently

  - How our desire for dopamine can lead to anxiety

  - How busyness is as much a state of mind as it is a state of life


  ## Core Message


  The pursuit of calm leads us to become more engaged, focused, and deliberate
  while making us more satisfied with our lives. Because calm saves us time by
  making us more productive, we don't need to feel guilty about the time spent
  investing in it.


  ## Author Background


  Chris Bailey is a productivity expert and bestselling author of four books:
  Intentional, Hyperfocus, The Productivity Project, and How to Calm Your
  Mind—which have been published in more than 40 languages.


  ## Format


  Published book available in hardcover, paperback, ebook, and audiobook
  formats.
