markdown: >-
  ## Overview


  Inbox Zero, created by productivity expert Merlin Mann, is an email management
  approach emphasizing rapid decision-making and keeping your inbox empty (or
  nearly empty) by processing messages decisively rather than letting them
  accumulate.


  ## Core Philosophy


  Inbox is a to-do list others can write on. The goal isn't empty inbox for its
  own sake, but rather spending minimal time and attention on email.


  ## The Five Actions


  Every email gets one of five actions:


  ### 1. Delete (or Archive)

  - Not needed

  - No action required

  - FYI only

  - Get to zero


  ### 2. Delegate

  - Someone else should handle

  - Forward with clear request

  - Remove from your plate

  - Trust and empower others


  ### 3. Respond

  - Quick reply needed

  - Can do in <2 minutes

  - Handle immediately

  - Clear from inbox


  ### 4. Defer

  - Needs action but not now

  - Move to task list

  - Schedule for later

  - Set reminder

  - Remove from inbox


  ### 5. Do

  - Requires immediate action

  - Can't delegate

  - Time-sensitive

  - Complete and archive


  ## Process


  ### Set Specific Times

  - Check email 2-3 times daily

  - Not first thing in morning

  - Batch processing

  - Close between sessions


  ### Process to Zero

  - Decide on each message

  - Apply one of five actions

  - Don't re-read later

  - Touch once, decide once


  ### Maintain System

  - Quick daily processing

  - Don't let accumulate

  - Stay current

  - Trust the system


  ## Supporting Practices


  **Filters and Rules:**

  - Auto-archive newsletters

  - Auto-label by sender

  - Route notifications

  - Reduce inbox volume


  **Unsubscribe Aggressively:**

  - Regular cleanup

  - Reduce incoming volume

  - Keep only valuable emails


  **Templates:**

  - Canned responses

  - Common replies

  - Faster processing

  - Consistent communication


  **Folders/Labels:**

  - Action required

  - Waiting for

  - Reference

  - Archive


  ## Benefits


  - Reduced email stress

  - Faster email processing

  - Nothing slips through cracks

  - Clear mind

  - Better responsiveness

  - Reclaimed time and attention


  ## Common Misunderstandings


  **NOT about:**

  - Obsessing over empty inbox

  - Processing email constantly

  - Instant responses to everything

  - Spending more time on email


  **IS about:**

  - Decisive action

  - Minimal time spent

  - Clear system

  - Reduced stress


  ## Challenges


  **High Email Volume:**

  - Ruthless filtering

  - Aggressive unsubscribe

  - Delegate where possible

  - Set expectations


  **Requires Action:**

  - Use task management system

  - Don't let inbox become to-do list

  - Move to proper place


  **Cultural Expectations:**

  - Educate colleagues

  - Set boundaries

  - Communicate response times


  ## Integration with Other Systems


  - GTD (capture and process)

  - Time blocking (scheduled email time)

  - Task management (defer to proper system)

  - Calendar (schedule action items)


  ## Target Users


  Anyone overwhelmed by email, knowledge workers, professionals with high email
  volume, people seeking reduced stress, individuals wanting better email habits
