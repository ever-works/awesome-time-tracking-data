markdown: >-
  ## Overview


  Focus Keeper is a straightforward Pomodoro technique timer that helps users
  maintain focus through 25-minute work intervals followed by short breaks, with
  minimalist design and session tracking.


  ## Features


  - Classic 25-minute Pomodoro intervals

  - 5-minute short breaks

  - 15-minute long breaks after 4 sessions

  - Customizable timer durations

  - Session tracking and history

  - Daily goal setting

  - Productivity statistics

  - Minimalist, distraction-free interface


  ## Pomodoro Technique Support


  - Standard Pomodoro timing (25/5/15)

  - Automatic break transitions

  - Long break after every 4 pomodoros

  - Audio notifications

  - Visual timer display


  ## Tracking & Analytics


  - Daily completed sessions

  - Weekly productivity trends

  - Goal achievement tracking

  - Focus time summaries


  ## Platform


  iOS, Android, Web


  ## Pricing


  Free with basic features

  Pro version available


  ## Target Users


  Students, knowledge workers, anyone practicing Pomodoro technique
