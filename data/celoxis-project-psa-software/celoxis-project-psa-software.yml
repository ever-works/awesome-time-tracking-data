markdown: >-
  ## Overview


  Celoxis is an integrated project and portfolio management solution with
  professional services automation (PSA) capabilities, providing time tracking,
  resource planning, financial management, and comprehensive reporting.


  ## Core Capabilities


  ### Project Management

  - Gantt charts and scheduling

  - Task management

  - Project templates

  - Baseline tracking

  - Dependencies and milestones


  ### Time Tracking

  - Timesheet entry

  - Mobile time tracking

  - Approval workflows

  - Billable vs non-billable categorization


  ### Resource Management

  - Resource allocation

  - Capacity planning

  - Skills tracking

  - Utilization analysis

  - Workload balancing


  ### Financial Management

  - Project budgeting

  - Cost tracking

  - Revenue recognition

  - Profitability analysis

  - Invoice generation


  ## Deployment Options


  - Cloud (SaaS)

  - On-premise

  - Hybrid


  ## Target Users


  - Professional services firms

  - IT services companies

  - Consulting organizations

  - Engineering firms

  - Project-based enterprises


  ## Key Advantage


  Enterprise-grade PSA combining project execution with financial management in
  unified platform for complete project lifecycle visibility.
