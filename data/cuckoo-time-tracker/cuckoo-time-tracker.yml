markdown: >-
  ## Overview


  Cuckoo is a self-hosted time tracking application that combines minimalist
  design with skill development tracking. The application offers a clean,
  distraction-free interface for users who want simple time tracking linked to
  long-term skill improvement goals.


  ## Key Features


  - **Minimalist Interface**: Clean design allows users to set timers quickly
  without complex options or distractions

  - **Task-to-Skill Linking**: Create multiple tasks and link them to specific
  skills you want to develop

  - **10,000-Hour Tracking**: Tracks cumulative time across related tasks to
  monitor progress toward skill mastery

  - **Quick Task Creation**: Shake device to quickly add new tasks

  - **Multi-User Timer Sessions**: Multiple users can join the same timer
  session, ideal for remote teams wanting synchronized work periods

  - **No Account Required**: Start using immediately without registration

  - **Self-Hosted**: Full control over your data with self-hosting capabilities


  ## Skill Development Focus


  Unlike traditional time trackers that focus on billable hours or project
  management, Cuckoo emphasizes personal skill development. You can:


  - Attribute tasks to specific skills you're cultivating

  - View total time invested in each skill

  - Track progress toward Malcolm Gladwell's 10,000-hour mastery threshold

  - Understand how your practice time accumulates across different activities


  ## Use Cases


  - Personal skill development and practice tracking

  - Learning new programming languages or frameworks

  - Musical instrument practice

  - Language learning

  - Remote team coordination with synchronized focus sessions

  - Academic research and study time tracking


  ## Technical Details


  - Available as open source on GitHub

  - Self-hosted deployment for maximum privacy

  - Cross-platform compatibility


  ## Pricing


  Free and open source
