markdown: >-
  ## Overview


  Timeero is an intelligent GPS time tracking and mileage tracking solution
  designed for mobile teams, with automatic detection of driving activity and
  robust offline capabilities for field workers in areas with poor cellular
  coverage.


  ## Features


  - **Automatic Mileage Tracking**: Recognizes when employees are driving and
  automatically begins tracking mileage

  - **Mileage Reimbursement**: Calculates estimated reimbursement amounts based
  on IRS rates or custom rates

  - **GPS Breadcrumbs**: Records detailed location trails throughout the workday

  - **Offline Mode**: Continues tracking time and location even without cellular
  or internet connection

  - **Geofencing**: Set up virtual boundaries around job sites with automatic
  alerts

  - **Segmented Tracking**: Separate personal and business mileage automatically

  - **Who's Working Map**: Real-time map view showing all active employees and
  their locations

  - **PTO Management**: Request and approve time off within the app

  - **Facial Recognition**: Optional face verification to prevent buddy punching

  - **Integrations**: Connect with QuickBooks, ADP, Paychex, and other
  payroll/accounting systems


  ## Use Cases


  Ideal for construction crews, field service technicians, sales teams, delivery
  drivers, and any mobile workforce that needs accurate time and mileage
  tracking with offline reliability.


  ## Pricing


  Pricing starts at competitive per-user monthly rates with different tiers
  based on features needed.
