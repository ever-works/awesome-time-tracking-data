markdown: >-
  ## Overview


  The Two-Minute Rule is a core principle from David Allen's Getting Things Done
  (GTD) methodology: "Anything you can do in less than two minutes, if you need
  to do it at all then do it right then."


  ## The Rationale


  If a task will take less than 2 minutes to complete, the time spent adding it
  to your system would exceed the time it takes to complete the task itself. The
  efficiency factor is that it would take you longer than two minutes to look at
  it again, review it, and reflect on it later.


  ## When to Apply It


  This rule should be applied primarily when engaging with new input:

  - Processing your in-tray

  - Interacting with someone in your office or home

  - Dealing with random intersections in the hallway

  - Reviewing emails or messages


  ## Benefits


  - **Reduces Task Backlog**: Prevents accumulation of small tasks

  - **Increases Momentum**: Quick wins create positive energy

  - **Simplifies Systems**: Fewer items to track and manage

  - **Saves Time**: Avoid double-handling of quick tasks


  ## Cautions


  - **Context Switching Risk**: Be careful not to complete two-minute tasks when
  you should be prioritizing long stretches of focus

  - **Not for Deep Work**: Don't interrupt focused work for two-minute tasks

  - **Must Be Immediate**: Only applies to tasks you're encountering now, not
  planned work
