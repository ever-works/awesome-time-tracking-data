name: Warren Buffett's 5/25 Rule
description: Focus strategy for identifying top priorities by listing 25 career
  goals, circling the top 5, and actively avoiding the remaining 20 until the
  top 5 are achieved. Emphasizes that good ideas can be the enemy of great ones,
  requiring ruthless prioritization for extraordinary success.
