markdown: >-
  ## Overview


  Attention Residue is a cognitive phenomenon where a portion of your attention
  remains focused on a previous task even after you've switched to a new one.
  This effect was introduced by Sophie Leroy, a business professor at the
  University of Minnesota, in her 2009 research paper titled 'Why Is It So Hard
  to Do My Work?'


  ## The Science


  When you switch from one task to another, your attention doesn't immediately
  follow. Instead, part of your mind stays engaged with the previous task,
  creating what Leroy calls "attention residue." The more intense or complex the
  previous task, the stronger the residue and the greater the impact on your
  performance.


  ## Impact on Performance


  People experiencing attention residue after switching tasks are likely to
  demonstrate poor performance on the next task. The effect is particularly
  pronounced when:

  - The previous task was left incomplete or unresolved

  - The task was cognitively demanding

  - Multiple switches occur in quick succession

  - Insufficient time passes between context switches


  ## Connection to Deep Work


  Cal Newport, in his book "Deep Work," uses the attention residue concept to
  explain why uninterrupted work sessions are so effective. By working on a
  single hard task for extended periods without switching, you minimize the
  negative impact of attention residue, allowing you to maximize performance on
  that one task.


  ## Mitigation Strategies


  1. **Time Blocking**: Dedicate large blocks of time to single tasks

  2. **Task Completion**: Finish tasks before switching when possible

  3. **Clear Transitions**: Use rituals or breaks between different types of
  work

  4. **Minimize Interruptions**: Protect focus time from notifications and
  distractions

  5. **Batch Similar Tasks**: Group related activities to reduce context
  switching


  ## Practical Applications


  - Schedule deep work sessions of 90+ minutes for important projects

  - Avoid checking email or messages during focused work

  - Use the first hours of the day for cognitively demanding tasks

  - Create shutdown rituals to clear residue before leaving work


  ## Research References


  The concept has been validated by subsequent research showing that
  task-switching can cause performance decreases of 20-40% compared to sustained
  focus on single tasks.
