name: "Busy: How to Thrive In a World of Too Much"
description: A book by Tony Crabbe that addresses the problem of chronic
  busyness in modern life through a unique three-step approach. Supported by an
  extensive list of scientific studies, it provides clear, compelling advice for
  getting out from underneath the burden of being too busy.
