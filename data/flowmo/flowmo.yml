markdown: >-
  ## Overview


  Flowmo is a flexible Pomodoro timer designed specifically to preserve flow
  state. Instead of interrupting your work at arbitrary 25-minute intervals,
  Flowmo lets you work as long as your concentration lasts.


  ## How It Works


  Work until your focus naturally wanes, then take a break that's roughly 20% of
  your work duration. For example, work for 60 minutes, break for 12 minutes.


  ## Key Features


  - Flexible work intervals based on natural focus

  - Automatic break time calculation (20% of work time)

  - Flow state preservation

  - Session analytics

  - No rigid time constraints


  ## Benefits


  Preserves deep work by not interrupting at artificial intervals, particularly
  useful for creative work, coding, and writing where 25 minutes is often too
  short to achieve meaningful progress.


  ## Pricing


  Web-based tool with free and premium tiers.
