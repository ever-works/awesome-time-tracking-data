markdown: >-
  ## Overview


  Time estimation bias is a cognitive phenomenon where individuals consistently
  underestimate the time required to complete future tasks, even when they have
  experience with similar tasks taking longer than expected in the past. This
  bias affects everyone from students to professionals to large organizations
  planning complex projects.


  ## Related Concepts


  **Planning Fallacy**: The tendency to underestimate task completion times
  despite knowing that similar past tasks took longer than expected.


  **Optimism Bias**: The belief that we are less likely than others to
  experience negative events, leading to overly optimistic time estimates.


  **Hofstadter's Law**: "It always takes longer than you expect, even when you
  take into account Hofstadter's Law" — a recursive acknowledgment of this bias.


  ## Why It Happens


  ### Psychological Factors

  - **Inside View**: Focusing on unique aspects of current task rather than
  similar past experiences

  - **Optimism**: Natural tendency to assume best-case scenarios

  - **Motivation**: Desire to appear capable and efficient

  - **Memory Bias**: Forgetting difficulties from past similar tasks

  - **Unknown Unknowns**: Inability to predict unforeseen complications


  ### Practical Factors

  - Underestimating complexity

  - Ignoring potential interruptions

  - Forgetting about dependencies

  - Not accounting for context switching

  - Assuming perfect conditions


  ## Real-World Examples


  - **Software Projects**: Routinely exceed initial estimates by 2-3x

  - **Home Renovations**: Typically take twice as long and cost 50% more than
  planned

  - **Academic Writing**: Students consistently underestimate
  dissertation/thesis completion time

  - **Major Infrastructure**: Sydney Opera House took 10 years vs. estimated 4
  years


  ## Mitigation Strategies


  ### Reference Class Forecasting

  Basing estimates on actual durations of similar past projects rather than
  planning from first principles.


  ### Add Buffer Time

  Multiply initial estimates by 1.5x-3x depending on complexity and uncertainty.


  ### Break Down Tasks

  Estimating smaller components is generally more accurate than estimating large
  projects.


  ### Track Actual Times

  Record how long tasks actually take to improve future estimates.


  ### Outside View

  Consult others who have done similar work for realistic timeframes.


  ### Monte Carlo Simulation

  Use statistical methods to model probability distributions of completion
  times.


  ### Premortem Analysis

  Imagine the project has failed and work backwards to identify risks.


