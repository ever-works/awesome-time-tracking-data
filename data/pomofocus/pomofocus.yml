markdown: >-
  ## Overview


  Pomofocus is a simple, web-based Pomodoro timer that helps you stay focused
  and productive. It combines the traditional Pomodoro Technique with task
  management and time tracking capabilities.


  ## Key Features


  ### Pomodoro Timer

  - 25-minute focus sessions (customizable)

  - 5-minute short breaks

  - 15-minute long breaks after 4 Pomodoros

  - Visual countdown display

  - Audio notifications when sessions complete


  ### Task Management

  - Create and manage your task list directly in the app

  - Track how much time you spend on each project

  - Estimate number of Pomodoros needed per task

  - Mark tasks as complete


  ### Time Tracking & Reports


  - **Visual Reports**: See how much time you've focused each day, week, and
  month

  - **Project Tracking**: Categorize tasks by project to see time allocation

  - **Historical Data**: Track your productivity patterns over time

  - **Progress Visualization**: Charts and graphs showing focus trends


  ## Customization Options


  - Adjust timer lengths for focus sessions and breaks

  - Customize alarm sounds

  - Choose from different color themes

  - Dark mode available


  ## Accessibility


  - **100% Free**: No premium tiers or hidden costs

  - **Web-Based**: No installation required, works in any browser

  - **No Account Needed**: Start using immediately without registration

  - **Cross-Platform**: Access from desktop, laptop, tablet, or phone


  ## Use Cases


  - Students managing study sessions

  - Remote workers maintaining focus

  - Writers tracking writing time

  - Anyone using the Pomodoro Technique


  ## Privacy


  All data stored locally in your browser. No personal information collected or
  sent to servers.


  ## Pricing


  Completely free with no ads or premium features.
