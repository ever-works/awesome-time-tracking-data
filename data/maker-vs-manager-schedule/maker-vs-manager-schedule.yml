markdown: |-
  ## The Two Schedules

  ### Manager Schedule
  - Day divided into hourly intervals
  - Meetings scattered throughout
  - Context switching acceptable
  - Each hour potentially different activity
  - Common for executives, administrators

  ### Maker Schedule
  - Needs long uninterrupted blocks (4+ hours)
  - Single meeting can destroy half a day
  - Morning meeting ruins morning work
  - Afternoon meeting breaks flow
  - Common for programmers, writers, designers

  ## Why Meetings Hit Makers Harder

  ### For Managers
  - Meeting at 2pm: Just one hour slot used
  - Can be productive 1pm, 3pm, 4pm
  - Natural switching throughout day

  ### For Makers
  - Meeting at 2pm: Entire afternoon unusable
  - Can't start deep work before (won't finish)
  - Need time to ramp up after
  - Effectively loses 3-4 hours for 1-hour meeting

  ## Solutions

  ### For Makers
  **Protect Maker Time**:
  - Block full mornings or afternoons
  - Cluster meetings on specific days
  - "Office hours" for ad-hoc discussions
  - Async communication when possible

  **Meeting Guidelines**:
  - Meetings only at day boundaries (9am start, 5pm end)
  - Or cluster all in afternoon
  - Decline fragmented calendar invites

  ### For Managers
  **Understanding Makers**:
  - Don't schedule random meetings
  - Ask when works for their schedule
  - Respect maker time blocks
  - Batch your requests

  ### For Organizations
  **Hybrid Policies**:
  - Meeting-free mornings company-wide
  - Makers get 2-3 meeting-free days/week
  - Async-first for non-urgent
  - Respect schedule type differences

  ## Modern Adaptations (2026)

  - **Maker days**: Entire days protected
  - **Meeting windows**: All meetings 1-5pm
  - **Async standup**: Replace daily sync
  - **Focus mode**: Calendar blocking tools

  ## Identifying Your Type

  **Mostly Maker**: Developer, writer, designer, researcher
  **Mostly Manager**: Executive, HR, sales manager
  **Hybrid**: Product manager, team lead, consultant

  ## Implications

  Recognizing schedule types prevents:
  - Resentment about meetings
  - Productivity loss from misalignment
  - Burnout from fragmented days
  - Poor work quality from interrupted flow
