markdown: >-
  ## Overview


  The Weekly Review is a cornerstone practice in Getting Things Done. It's a
  dedicated time (typically 1-2 hours weekly) to clear your head, review your
  system, update lists, and regain perspective on your commitments and
  priorities.


  ## Weekly Review Steps


  1. **Get Clear** - Process all inboxes to zero

  2. **Get Current** - Review previous week's calendar and upcoming week

  3. **Review Projects** - Check all active projects for next actions

  4. **Review Waiting For** - Follow up on outstanding items

  5. **Review Someday/Maybe** - Evaluate potential future projects

  6. **Get Creative** - Capture new ideas and projects

  7. **Clean and Organize** - Tidy physical and digital workspace


  ## Benefits


  - Maintains trust in your system

  - Ensures nothing is forgotten

  - Provides clarity on priorities

  - Reduces anxiety about commitments

  - Allows for strategic thinking

  - Keeps system up-to-date and functional

  - Creates sense of control and readiness


  ## Best Practices


  - Schedule it at the same time each week

  - Protect this time - treat it as non-negotiable

  - Find a quiet, distraction-free environment

  - Allow adequate time (don't rush)

  - Use a consistent checklist
