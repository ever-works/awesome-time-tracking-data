markdown: >-
  ## Overview


  Rest Time is a small, simple, elegant, and unobtrusive break reminder designed
  for macOS. It reminds you to take breaks and has everything it needs to do so
  well - and nothing else.


  ## Key Features


  ### Intelligent Break Scheduling

  - Never starts a timer in your absence

  - Automatically detects when you have taken a break without requiring prodding

  - Smart scheduling that adapts to your actual computer usage


  ### Privacy-First Design

  - Does NOT require "Access for Assistive Devices"

  - Avoids privacy and security risks like key logging

  - Respects user privacy while still providing accurate break detection


  ### Full-Screen Break Mode

  - During a break, Rest Time takes over the entire screen

  - Displays relaxing animations prompting you to take your well-deserved break

  - Immersive break experience that ensures you actually rest


  ### Flexible Control

  - Recognizes that there are times when taking a break is not an option

  - Allows you to disable countdown for up to 12 hours

  - Gives you control when you need it


  ## Platform Compatibility


  - Version 1.40: Intel & Apple Silicon Macs running macOS 13 Ventura or later,
  macOS 26 Tahoe compatible

  - Version 1.36: Intel & Apple Silicon Macs running macOS 10.11 El Capitan to
  macOS 15 Sequoia


  ## Pricing


  Free 14-day trial available


  ## Philosophy


  Rest Time embodies minimalist design - it does exactly what it needs to do
  (remind you to take breaks) without unnecessary features or privacy
  compromises.
