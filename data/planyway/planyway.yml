markdown: >-
  ## Overview


  Planyway is a powerful visual project management and time tracking tool that
  integrates with Trello, Jira, and GitHub. It transforms these platforms by
  adding calendar views, timeline visualization, workload management, and time
  tracking capabilities, all within a unified interface.


  ## Features


  - **Calendar View**: Visualize Trello cards, Jira issues, and GitHub tasks on
  interactive calendars

  - **Timeline/Gantt Charts**: Project timelines and dependencies across all
  connected platforms

  - **Time Tracking**: Built-in time tracking for tasks and projects

  - **Workload Management**: See team capacity and task distribution at a glance

  - **Roadmap Planning**: High-level roadmap views for strategic planning

  - **Multi-Platform Integration**: Connect Trello, Jira, and GitHub
  simultaneously

  - **Resource Management**: Allocate team members across projects

  - **Drag-and-Drop Scheduling**: Easily reschedule tasks by dragging on
  calendar

  - **Time Reports**: Generate reports on tracked time by person, project, or
  period

  - **Team Calendars**: Shared calendars showing all team member assignments

  - **Mobile Apps**: iOS and Android apps for on-the-go management


  ## Trello Integration


  For Trello users:

  - Turn Trello boards into calendars

  - Add due dates and time tracking to cards

  - Visualize card timelines and dependencies

  - Track time directly on Trello cards

  - Generate time reports from Trello data


  ## Jira Integration


  For Jira users:

  - Calendar view of Jira issues

  - Gantt chart timelines for sprints and epics

  - Time tracking on issues

  - Resource planning across projects

  - Workload balancing visualization


  ## GitHub Integration


  For GitHub users:

  - Visualize issues and pull requests on calendars

  - Track time on development tasks

  - Link commits to time entries

  - Plan releases and milestones


  ## Time Tracking Capabilities


  - **Manual Time Entry**: Log time after completing tasks

  - **Timer**: Start/stop timer while working

  - **Estimates vs. Actuals**: Compare estimated time to actual time spent

  - **Billable Hours**: Mark time as billable for client work

  - **Time Reports**: Detailed reports by project, person, or time period

  - **Export**: Export time data for billing or payroll


  ## Benefits


  - **Unified View**: See all work across multiple platforms in one place

  - **Better Planning**: Visual tools make scheduling and planning easier

  - **Resource Optimization**: Prevent overallocation and burnout

  - **Accurate Time Tracking**: Track time without leaving your project
  management tools

  - **Team Coordination**: Everyone sees the same calendar and timeline views


  ## Use Cases


  - Software development teams using Jira and GitHub

  - Agencies managing client projects in Trello

  - Product teams needing roadmap visualization

  - Remote teams requiring shared calendar views

  - Organizations wanting time tracking integrated with existing tools


  ## Pricing


  Planyway offers free and paid tiers. Check their website for current pricing
  based on number of users and features required.
