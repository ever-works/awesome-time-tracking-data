markdown: >-
  ## Time Tracking Column


  The Time Tracking Column is available for Pro and Enterprise plans. Click play
  to start the timer, pause anytime, or add time manually by clicking into a
  cell and selecting 'Add session manually'.


  ## Time Tracking Widget


  The Time Tracking Widget provides a consolidated view of time spent across
  multiple tasks and projects, gathering data from individual Time Tracking
  Columns on various boards.


  ### Widget Settings


  - Choose up to 5 boards to display

  - Pick which groups to show data from

  - Group tracked time by any Column on your boards

  - Completely customizable settings


  ## Limitations


  The widget is basic and is the only report widget that works with the Time
  Tracking Column, resulting in basic reporting that shows total numbers based
  on selected boards and filters.


  ## Pricing


  Time tracking available on Pro plan ($12/user/month) and Enterprise plans.
