markdown: >-
  ## Overview


  Weekly Capacity Planning is the practice of realistically calculating
  available work time and intentionally allocating it to priorities before
  committing to new work.


  ## The Capacity Calculation


  ### Step 1: Count Total Hours

  - 40-hour work week standard

  - 8 hours × 5 days = 40 hours


  ### Step 2: Subtract Commitments

  - Scheduled meetings (10-20 hours typical)

  - Standing obligations (reports, updates)

  - Administrative tasks (3-5 hours)

  - Email and communication (2-4 hours)

  - Context switching buffer (10-20% of remaining)


  ### Step 3: Available Capacity

  - Typical result: 15-25 hours of actual work time

  - This is your realistic capacity


  ## Allocation Process


  ### Priority Assignment

  1. List all potential tasks for week

  2. Estimate hours for each

  3. Rank by priority

  4. Allocate hours starting with highest priority

  5. Stop when capacity reached

  6. Remaining tasks go to future weeks


  ### Buffer Management

  - Include 20% buffer for unexpected items

  - Don't allocate 100% of capacity

  - Leave room for reactive work

  - Plan for interruptions


  ## Benefits


  - Realistic commitments

  - Reduced overwork

  - Better deadline estimation

  - Less stress from overcommitment

  - Clearer priorities

  - Ability to say no with data


  ## Common Mistakes


  ### Overcapacity Planning

  - Assuming full 40 hours available

  - Ignoring meeting time

  - Forgetting interruptions

  - No buffer for reactive work


  ### Under-estimation

  - Tasks take longer than expected

  - Not accounting for context switching

  - Assuming perfect focus

  - Ignoring energy variations


  ## Tools


  - Reclaim.ai (automatic capacity calculation)

  - Calendar time analysis

  - Spreadsheet templates

  - Project management software


  ## Best Practices


  ### Weekly Planning Session

  - Friday afternoon or Monday morning

  - Review last week's capacity vs. actual

  - Calculate coming week's capacity

  - Allocate to top priorities

  - Communicate realistic commitments


  ### Adjustments

  - Track actual vs. planned hours

  - Refine estimates over time

  - Adjust buffer based on role

  - Review capacity monthly


  ## Pricing


  Free practice - some tools offer automation
