name: Maker Schedule Philosophy
description: Paul Graham's time management framework distinguishing between
  maker schedule (long uninterrupted blocks for creative work) and manager
  schedule (chopped into hour-long intervals), advocating for protecting maker
  time from meeting fragmentation.
source_url: http://www.paulgraham.com/makersschedule.html
category: Time Management Methodology
tags:
