markdown: >-
  ## Overview


  Toggl Plan (now called Toggl Focus) is a visual project planning tool that
  brings together all tasks and team timelines in one place, with drag-and-drop
  simplicity and multiple view options.


  ## Team Timelines


  Team timelines give you the best visual overview of who's working on what and
  when, putting tasks on a timeline organized by people in the team.


  ### Key Features

  - **Color-coordinated by project**: Instant visual identification

  - **Faded completed tasks**: Clear distinction between done and in-progress

  - **At-a-glance overview**: See what everyone is working on

  - **Overload detection**: Notice when someone has too much work

  - **Capacity visibility**: Spot when there's room for new projects


  ## Multiple View Options


  ### Board View

  Kanban-style board for workflow visualization


  ### Task View

  Detailed list of all tasks with comprehensive information


  ### Calendar View

  Calendar format for deadline-focused planning


  ### Timeline View

  Gantt-chart style view for project sequencing


  ### Zoom Levels

  - Weekly view for detailed planning

  - Monthly view for mid-range scheduling

  - Quarterly view for strategic planning

  - Annual view for long-term roadmapping


  ## Drag-and-Drop Timelines


  ### Scheduling

  - Schedule tasks by dragging onto timeline

  - Assign tasks to team members

  - Update tasks with simple drag movement

  - Create color-coded tasks spanning days or weeks


  ### Project Management

  - Group tasks into projects

  - See start/end dates visually

  - Track milestones and deadlines

  - Monitor project dependencies


  ## Workload Management


  ### Capacity Planning

  - **Visual timelines** show tasks and milestones

  - **Spot overloads** or underutilization instantly

  - **Prevent burnout** by balancing workloads

  - **Proactive planning**: Know when to bring additional help onboard


  ### Team Insights

  - Clear picture of team's workload

  - Availability visualization

  - Resource allocation optimization

  - Bottleneck identification


  ## Simplicity Focus


  The only thing you really need to know is clicking and dragging, which makes:

  - **Outlining projects** easy and fast

  - **Rescheduling** simple and quick

  - **Collaboration** intuitive for all team members


  ## Integrations


  - Import tasks from other tools

  - Export schedules to calendars

  - Sync with productivity platforms


  ## Best For


  - Creative agencies managing multiple client projects

  - Product teams coordinating releases

  - Marketing teams planning campaigns

  - Remote teams needing visual coordination

  - Managers preventing team burnout


  ## Pricing


  Offers free tier for small teams with paid plans for advanced features and
  larger teams.
