markdown: >-
  ## Overview


  TimeCase is a self-hosted time tracking web application that prioritizes
  privacy and data ownership. It's perfect for individuals and organizations
  that want to track time without sending data to external servers.


  ## Features


  - Fully self-hosted solution

  - Web-based interface accessible from any device

  - Project and task tracking

  - Time entry management

  - Reporting capabilities

  - Multi-user support

  - No external dependencies for core functionality

  - Complete data privacy and ownership


  ## Pricing


  Free and open-source under MIT license. Users only pay for their own hosting
  infrastructure.
