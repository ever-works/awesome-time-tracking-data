name: Automatic Distraction Blocker
description: AI-powered feature in time tracking apps like Rize that
  automatically blocks distracting websites and applications during work
  sessions when focus score drops or during designated deep work periods.
source_url: https://rize.io/
category: Productivity Tool
tags:
  - focus
  - distraction
