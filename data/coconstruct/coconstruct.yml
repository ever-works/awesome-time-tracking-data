markdown: >-
  ## Overview


  CoConstruct is construction project management software designed specifically
  for residential custom home builders and remodelers. With over 100,000 users
  since its 2005 founding, the platform focuses on project budgeting, change
  order tracking, and client communication.


  ## Time Tracking Features


  **Mobile Time Tracking:**

  - Track project hours via mobile app

  - Assign tasks to team members

  - Real-time communication with field teams

  - Offline time tracking capabilities


  ## Key Features


  **Project Management:**

  - Project budgeting and cost tracking

  - Change order management

  - Schedule and timeline tracking

  - Document management


  **Client Collaboration:**

  - Client portal for communication

  - Selection tracking for materials and finishes

  - Photo sharing and progress updates

  - Approval workflows


  **Financial Management:**

  - Budget vs. actual cost tracking

  - Invoice generation

  - Payment tracking

  - Profitability analysis


  ## Pricing (2026)


  - Essential plan: $399/month

  - Advanced plan: $699/month

  - Complete plan: $999/month


  ## Target Market


  Designed specifically for custom home builders and residential remodelers who
  need detailed project budgeting and change order tracking alongside time
  management.


  ## Ownership


  CoConstruct was acquired by Buildertrend and continues to operate as a
  separate product line targeting custom residential construction.
