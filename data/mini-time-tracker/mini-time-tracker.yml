markdown: >-
  ## Overview


  Mini Time Tracker is made for Mac users who want simplicity, speed, and
  clarity in their time tracking. It sits quietly in your menu bar and provides
  straightforward time tracking without unnecessary features or complexity.


  ## Key Features


  ### Simplicity First


  - Clean, minimalist interface

  - Menu bar integration for quick access

  - Simple start/stop timer functionality

  - No complex setup or configuration

  - Instant access from any app


  ### Privacy Focused


  - **No Data Storage**: Mini Time Tracker stores nothing

  - **No Data Transmission**: Never sends data anywhere

  - **Local Only**: Everything stays on your device

  - **No Accounts Required**: No sign-up or registration

  - **Complete Privacy**: Your time data is yours alone


  ### Speed & Efficiency


  - Lightweight application

  - Fast launch and response time

  - Minimal system resource usage

  - Quick timer start/stop from menu bar

  - Keyboard shortcuts for efficiency


  ## What It Doesn't Have


  - No project management features

  - No team collaboration tools

  - No elaborate reporting dashboards

  - No cloud sync

  - No invoicing capabilities


  ## Target Audience


  ### Best For:


  - Mac users wanting simple time tracking

  - Privacy-conscious individuals

  - Users who prefer minimal software

  - Those who don't need advanced features

  - Freelancers tracking basic work hours


  ### Not Ideal For:


  - Teams needing collaboration

  - Users requiring detailed reports

  - Those needing project management integration

  - Businesses requiring cloud sync

  - Users wanting invoicing features


  ## Philosophy


  Mini Time Tracker embodies the principle that sometimes less is more. By
  focusing exclusively on basic time tracking and eliminating all non-essential
  features, it provides a fast, simple, and private solution for users who don't
  need complexity.


  ## Platform


  - **macOS only**

  - Menu bar application

  - Native Mac app


  ## Pricing


  Check the website for current pricing information.
