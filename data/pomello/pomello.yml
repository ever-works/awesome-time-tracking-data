markdown: >-
  ## Overview


  Pomello uses Trello to organize tasks and employs the popular Pomodoro
  Technique to supercharge productivity. It's available as a Chrome web browser
  extension that integrates with your existing Trello workflow.


  ## Key Features


  - Integrates seamlessly with existing Trello workflows

  - Adds a pomodoro count to card titles

  - Logs events in card comments

  - Tracks productivity stats

  - Prompts to move completed cards to other lists

  - Customizable options for each board and/or list

  - Roll timer over on same card for multi-Pomodoro tasks


  ## How It Works


  After connecting your Trello account, select a list and you're ready to use
  Pomello! The app helps you work in focused 25-minute intervals (Pomodoros)
  with breaks in between, following the traditional Pomodoro Technique
  principles.


  ## Pricing


  Free Chrome extension available.
