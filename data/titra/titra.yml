markdown: >-
  ## Overview


  titra is a modern open-source time tracking application built for freelancers
  and small teams who value simplicity and focus.


  ## Philosophy


  Designed following the Unix philosophy of 'Do One Thing And Do It Well,' titra
  focuses exclusively on time tracking without unnecessary complexity or feature
  bloat.


  ## Features


  - **Quick Time Tracking**: Start and stop timers with minimal clicks

  - **Minimal Distractions**: Clean, focused interface that doesn't overwhelm
  users

  - **Project Organization**: Basic project and task organization

  - **Team Support**: Built for small teams working collaboratively

  - **Modern Stack**: Built with contemporary web technologies for reliability

  - **Self-Hosted**: Deploy on your own infrastructure

  - **Lightweight**: Minimal resource requirements and fast performance


  ## Pricing


  Free and open-source. Available on GitHub under an open-source license.
