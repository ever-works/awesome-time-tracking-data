markdown: >-
  ## Overview


  Context switching cost refers to the productivity loss and time required to
  refocus when switching between tasks or applications.


  ## Major Research Findings


  ### Productivity Loss

  - **20-40% Loss**: Average person loses 20-40% productivity from task
  switching (Journal of Experimental Psychology)

  - **80% Reduction**: Gerald Wineberg found context switching can reduce
  productivity by 80%

  - **20% Per Task**: 20% of productivity power lost with each simultaneously
  juggled task

  - **40% Daily Drain**: Multitasking or switching could drain 40% of
  productivity daily (Psychology Today)


  ### Recovery Time

  - **23 Minutes 15 Seconds**: Average time to fully refocus after distraction
  (Gloria Mark, UC Irvine)

  - **Attention Residue**: Performance impaired after task switch as part of
  attention stays stuck on previous task (Sophie Leroy)


  ### Frequency of Interruptions

  - **6-12 Minutes**: Knowledge workers interrupted every 6-12 minutes on
  average

  - **3 Minutes**: Workers switch tasks every 3 minutes on average

  - **11 Minutes**: Significant interruptions occur every 11 minutes

  - **1,200 Daily**: Digital workers toggle between apps nearly 1,200 times per
  day (Harvard Business Review 2022)


  ### Economic Impact

  - **$450 Billion**: Annual cost of lost productivity in US (Gallup)

  - **4 Hours Weekly**: Spent reorienting after app switching

  - **9% Annual Time**: Five working weeks per year lost to context switching


  ## Implications


  Context switching represents one of the most significant yet hidden costs to
  modern workplace productivity.
