markdown: >-
  ## Overview


  TimeCrowd is a cloud-based time management tool founded in 2017 and based in
  Tokyo, Japan. It enables teams to track and visualize work hours by task and
  project while fostering collaboration in remote and telework environments.


  ## Features


  - **Real-Time Activity Tracking**: Save task activity time of members by team
  unit

  - **Team Visibility**: Share past and present time to visualize team workload

  - **Multiple Input Methods**: Record time from browser, Chrome extension, or
  mobile app

  - **Automatic Reporting**: Report function automatically aggregates activity
  time

  - **Team Management**: Worker permissions and user group functionality for
  access control

  - **Calendar Integration**: Integrates with Google Calendar and Outlook
  Calendar

  - **Slack Integration**: Connect with team communication tools

  - **Simple Operation**: User-friendly interface designed for Japanese business
  culture


  ## Team Collaboration


  TimeCrowd emphasizes transparency by sharing time data across teams, helping
  identify bottlenecks and improve overall team productivity through visibility.


  ## Target Users


  - Remote and distributed teams

  - Japanese companies and enterprises

  - Project-based organizations

  - Teams needing transparent time tracking

  - Telework and hybrid work environments


  ## Platform Availability


  Browser, Chrome extension, Android, iOS


  ## Pricing


  Contact vendor for pricing (popular among Japanese companies)
