markdown: >-
  ## Overview


  Focus Score is Rize's proprietary AI-driven metric that evaluates daily work
  quality by analyzing activity patterns, distraction frequency, and time
  allocation to generate a score out of 100, providing users with objective
  feedback on their cognitive performance and attention management.


  ## How It's Calculated


  ### AI Analysis Factors

  - **Deep work duration**: Time spent in uninterrupted focus sessions

  - **Distraction frequency**: Number and duration of interruptions

  - **Application usage patterns**: Productive vs. distracting apps

  - **Context switching**: Frequency of task and app changes

  - **Work session quality**: Consistency and intensity of focus periods

  - **Break patterns**: Appropriate rest vs. distraction time


  ### Scoring Algorithm

  Rize's AI weighs multiple variables:

  - Longer uninterrupted work sessions = higher score

  - Frequent context switching = lower score

  - Appropriate break timing = score boost

  - Excessive social media/news = score reduction

  - Deep work during peak hours = bonus points

  - Fragmented attention = score penalty


  ## Understanding Your Score


  ### Score Ranges

  - **90-100**: Exceptional focus day, peak productivity

  - **75-89**: Good focus with minor distractions

  - **60-74**: Moderate focus, room for improvement

  - **45-59**: Below average, significant distractions

  - **Below 45**: Poor focus day, needs attention


  ### Contextual Interpretation

  - Score reflects work pattern quality, not hours worked

  - Meeting-heavy days naturally score lower

  - Collaborative work differs from solo deep work

  - Baseline varies by individual work style


  ## Benefits


  ### Objective Self-Awareness

  - Removes subjective perception of productivity

  - Reveals actual work patterns vs. perceived patterns

  - Identifies focus strengths and weaknesses

  - Tracks improvement over time


  ### Behavioral Insights

  - Correlates scores with daily activities

  - Identifies productivity killers

  - Reveals best and worst work patterns

  - Highlights effective focus strategies


  ### Motivation & Gamification

  - Daily challenge to improve score

  - Streak tracking for consistent high scores

  - Personal records to beat

  - Visual progress indication


  ## Practical Applications


  ### Daily Optimization

  - Review score at end of day

  - Identify what caused low scores

  - Replicate high-score day patterns

  - Adjust tomorrow's schedule based on insights


  ### Pattern Recognition

  - Track weekly score averages

  - Identify best days for deep work

  - Recognize problematic time blocks

  - Understand personal productivity cycles


  ### Goal Setting

  - Set minimum acceptable score targets

  - Aim for score improvement over time

  - Challenge yourself to beat personal bests

  - Track consistency of high-quality focus days


  ## Integration with Other Rize Features


  ### AI-Powered Insights

  - Focus Score feeds into personalized recommendations

  - System learns what activities improve your score

  - Suggests optimal work schedule based on high-score patterns

  - Provides context-aware break suggestions


  ### Distraction Blocker

  - Automatically activates during low-score periods

  - Helps protect focus when score dropping

  - Can be triggered by score threshold


  ### Focus Music Library

  - Access curated playlists during focus sessions

  - Music selection may influence score

  - Integration with popular music services


  ## Comparison to Time Tracking


  ### Traditional Time Tracking

  - Measures: Hours worked

  - Focus: Quantity

  - Question: "How long did I work?"


  ### Focus Score

  - Measures: Work quality

  - Focus: Quality of attention

  - Question: "How well did I work?"


  ### Combined Value

  - Time tracking + Focus Score = complete picture

  - Quantity + Quality = true productivity

  - Hours logged + Focus quality = effectiveness


  ## Common Score Patterns


  ### High Score Days

  - Clear morning routine

  - Limited meeting interruptions

  - Extended deep work blocks

  - Strategic break timing

  - Minimal social media use


  ### Low Score Days

  - Reactive start (email/messages first)

  - Back-to-back meetings

  - Constant context switching

  - Distraction-heavy work periods

  - Poor break management


  ## Improving Your Focus Score


  ### Quick Wins

  - Block distracting websites during focus time

  - Turn off non-essential notifications

  - Schedule specific times for email/messages

  - Use Rize's break suggestions

  - Start day with most important task


  ### Long-term Strategies

  - Protect calendar blocks for deep work

  - Batch similar tasks together

  - Establish consistent daily routines

  - Optimize work environment for focus

  - Practice attention management skills


  ## Limitations & Considerations


  ### Not All Work is Deep Work

  - Meetings are necessary but lower scores

  - Collaborative work involves context switching

  - Creative exploration may appear unfocused

  - Client communication reduces solo focus time


  ### Personal Baseline Varies

  - Individual work styles differ

  - Role requirements affect possible scores

  - Industry norms vary significantly

  - Don't compare your score to others—compare to yourself


  ## Privacy & Data


  ### Local Processing

  - Focus Score calculated on your device

  - Activity data stays private

  - No sharing of individual app usage

  - User controls all data


  ### Optional Sharing

  - Can share scores with team if desired

  - Aggregate team focus metrics available

  - Individual privacy maintained

  - Sharing requires explicit opt-in


  ## Real-World Impact


  ### User Reports

  - "Seeing my score made me realize how much I was context-switching"

  - "Gamification aspect motivated me to improve work habits"

  - "Objective measurement removed denial about distractions"

  - "Tracking improvement over weeks kept me accountable"


  ### Measurable Outcomes

  - Users report 20-30% productivity increase

  - Improved awareness of distraction triggers

  - Better work-life boundaries

  - Reduced end-of-day regret about wasted time


  ## 2026 Context


  As knowledge work becomes increasingly demanding and distractions multiply,
  objective measures like Focus Score provide crucial feedback loops for
  maintaining and improving cognitive performance. The gamification element
  makes the often tedious work of attention management engaging and measurable.
