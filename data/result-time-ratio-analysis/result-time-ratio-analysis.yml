name: Result-Time Ratio Analysis
description: Productivity measurement comparing output value against time
  invested. Identifies high-leverage activities producing disproportionate
  results and low-leverage time sinks. Enables data-driven prioritization by
  focusing on activities with highest result-to-time ratios rather than just
  time tracking.
source_url: https://www.calnewport.com/blog/2007/07/12/friday-productivity-tip-the-dangerous-question/
category: Time Management Practice
tags:
  - measurement
  - leverage
  - productivity-analysis
  - roi
markdown: >-
  ## Overview


  Result-Time Ratio Analysis measures output value against time spent to
  identify highest-leverage activities.


  ## Calculation


  Result Value / Time Invested = Leverage Ratio


  ## Process


  1. List major activities/projects

  2. Estimate time spent on each

  3. Assess results/value produced

  4. Calculate ratio

  5. Rank by leverage

  6. Do more of high-ratio activities


  ## Common Findings


  - 20% of activities produce 80% of results

  - Some "productive" work has low leverage

  - Strategic activities often highest ratio

  - Meetings frequently lowest ratio


  ## Pricing


  Free analysis practice.
