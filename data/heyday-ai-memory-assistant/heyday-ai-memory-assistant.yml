markdown: >-
  ## Overview


  Heyday is an AI copilot and memory assistant that automatically organizes your
  emails, documents, notes, conversations, and articles, ensuring you can easily
  resurface forgotten content and extract key insights from research.


  ## Features


  - **Automatic Organization**: Saves and organizes content automatically from
  browser tabs, documents, and communications

  - **Universal Assistant**: Provides broad AI assistance across various tasks
  to boost productivity

  - **Writing Assistant**: Draft content efficiently by leveraging your reading
  history and conversations

  - **Multi-Platform Integration**: Works with Gmail, Slack, Google Calendar,
  Google Drive, Dropbox, Evernote, Notion, Twitter, LinkedIn, and Pocket

  - **Search & Recall**: Resurface forgotten content with AI-powered search
  across all connected platforms

  - **Privacy-First**: Encrypts all user data, ensuring only you can access your
  information


  ## Use Cases


  - Reduce time spent searching for information (McKinsey study shows employees
  spend 19% of work hours tracking down information)

  - Turn scattered research notes into usable writing

  - Generate meeting notes and extract key insights

  - Declutter research and manage tab overload


  ## Pricing


  Offers a 14-day free trial, followed by a paid subscription at £15.00 per
  month.
