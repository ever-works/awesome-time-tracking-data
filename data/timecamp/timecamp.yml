markdown: >-
  ## Overview


  TimeCamp is an automatic time tracking application that monitors your computer
  activity and assigns time to projects based on keywords you define. Ideal for
  teams wanting detailed time data without manual tracking burden.


  ## Automatic Tracking


  - Desktop app tracks all applications and websites

  - Keyword-based automatic task categorization

  - Idle time detection

  - Offline capability with cloud sync

  - Activity timeline showing minute-by-minute work


  ## Key Features


  - Automatic timesheet generation

  - Budgeting and billing

  - Attendance tracking

  - Invoicing from tracked time

  - Productivity reports

  - 50+ integrations (Asana, Trello, Jira, etc.)


  ## Privacy


  Can be configured from full automatic tracking to simple manual timer,
  respecting team privacy preferences.


  ## Pricing


  Free plan available with basic features. Paid plans start at $2.99/user/month
  for Pro features.
