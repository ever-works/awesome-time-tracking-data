markdown: >-
  ## Overview


  Timemator is an intelligent automatic time tracking application for macOS that
  learns your work patterns and uses customizable rules to automatically
  categorize and track time without constant manual intervention.


  ## Features


  - **Automatic Time Tracking**: Monitors applications, documents, and websites
  automatically

  - **Smart Rules**: Create rules to automatically assign time to projects based
  on context

  - **Document Detection**: Tracks which documents and files you're working on

  - **Memory Feature**: Remembers previous time entries and suggests projects

  - **Manual Override**: Easily edit or adjust automatically tracked time

  - **Calendar Integration**: Integrates with macOS Calendar to track meetings

  - **Invoicing**: Generate invoices from tracked time with customizable
  templates

  - **Reports**: Detailed reports with filtering by project, client, or date
  range

  - **Export**: Export to CSV, Excel, PDF, and popular accounting software

  - **Privacy**: All data stored locally with optional encrypted cloud backup


  ## Pricing


  Free 14-day trial. Standard license: $7.99 one-time. Professional license:
  $49.99 one-time with team features and advanced automation.
