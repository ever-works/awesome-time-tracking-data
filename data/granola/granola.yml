markdown: >-
  ## Overview


  Granola is an AI meeting assistant that transcribes, summarizes, and analyzes
  meetings while also functioning as a live notepad. Rather than joining calls
  as a visible bot, it captures audio directly from your device and works with
  any video conferencing tool.


  ## Features


  - Automatic meeting transcription

  - AI-generated summaries and context extraction from transcripts

  - Live notepad for manual note-taking during calls

  - Post-meeting enhancement: weaves transcript context into your notes

  - Audio capture directly from device (no meeting bot joining calls)

  - Compatible with any video conferencing tool

  - Zapier integration for saving notes to Google Drive, routing action items to
  task managers

  - Native integrations available


  ## Pricing


  - Free plan: AI meeting notes with 30 days of notes history and lifetime limit
  of 25 meetings

  - Business plan: $14/user/month for unlimited note history, advanced AI
  models, and integrations


  ## Limitations


  - No audio or video playback (transcript only)

  - Free plan is limited to 25 meetings total (lifetime, not monthly)
