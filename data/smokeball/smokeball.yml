markdown: >-
  ## Overview


  Smokeball is an all-in-one legal practice management platform designed
  specifically for small to medium-sized law firms. Its standout feature is
  automatic time tracking that captures billable hours without manual timers,
  ensuring attorneys never lose billable time. The platform integrates case
  management, document automation, billing, and accounting in a single,
  desktop-focused solution.


  ## Features


  ### Automatic Time Tracking

  - **AutoTime Technology**: Automatically captures time spent on every file,
  email, document, and phone call

  - **No Manual Timers**: Eliminates the need to start and stop timers
  throughout the day

  - **Background Tracking**: Runs silently while you work, recording all
  billable activities

  - **Activity-Based Capture**: Tracks time based on what you're working on, not
  just when

  - **Automatic Descriptions**: Generates time entry descriptions from your
  activities

  - **One-Click Invoicing**: Convert tracked time to invoices instantly


  ### Case Management

  - **Matter Organization**: Centralize all case information, documents, and
  communications

  - **Task Management**: Assign and track tasks across the team

  - **Deadline Tracking**: Never miss a court date or filing deadline

  - **Conflict Checking**: Built-in conflict of interest screening

  - **Case Notes**: Log all case-related activities and communications


  ### Document Automation

  - **Form Templates**: Library of 20,000+ legal forms

  - **Smart Forms**: Automatically populate forms with client data

  - **Document Assembly**: Create complex documents with conditional logic

  - **E-Signature Integration**: Built-in electronic signature capability


  ### Billing and Accounting

  - **Trust Accounting**: Compliant IOLTA management with three-way
  reconciliation

  - **Flexible Billing**: Support for hourly, flat fee, contingency, and hybrid
  arrangements

  - **Invoice Customization**: Professional invoices with firm branding

  - **Payment Processing**: Accept credit cards and e-checks

  - **QuickBooks Integration**: Seamless sync with QuickBooks Online and Desktop


  ### Email Integration

  - **Outlook Integration**: File emails directly to matters from Outlook

  - **Automatic Email Time Capture**: Track time spent on client emails

  - **Email Templates**: Create and use email templates for common
  communications


  ## AutoTime: How It Works


  Smokeball's revolutionary AutoTime technology tracks billable work
  automatically:


  1. **Activity Recognition**: Identifies when you're working on client matters

  2. **Time Capture**: Records the time spent on each activity

  3. **Smart Categorization**: Associates time with the correct client and
  matter

  4. **Description Generation**: Creates detailed time entry descriptions

  5. **Review and Approve**: Review captured time entries and approve for
  billing


  ## Benefits


  - **Increase Billable Hours**: Studies show Smokeball users bill an average of
  2+ additional hours per day

  - **Reduce Write-Offs**: Detailed activity logs support time entry accuracy
  and defensibility

  - **Improve Cash Flow**: Faster billing leads to faster payment

  - **Save Administrative Time**: Automation reduces non-billable tasks

  - **Better Client Service**: Spend more time on legal work, less on
  timekeeping


  ## Integrations


  - QuickBooks Online and Desktop

  - Microsoft Office 365

  - Microsoft Outlook

  - LawPay payment processing

  - Document management systems

  - Court filing systems (jurisdiction-specific)


  ## Pricing


  Smokeball offers several pricing tiers based on firm size and features:

  - **Boost**: Essential case management and time tracking

  - **Grow**: Adds document automation and advanced reporting

  - **Prosper**: Premium features including AutoTime and trust accounting


  Pricing is per user per month with discounts for annual contracts. All plans
  include implementation support and training. A demo is available to see the
  platform in action.
