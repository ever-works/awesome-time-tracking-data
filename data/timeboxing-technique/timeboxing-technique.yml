markdown: >-
  ## Overview


  Timeboxing allocates a fixed, pre-determined amount of time to a task and
  commits to stopping when time is up, regardless of completion status. Marc
  Zao-Sanders reported in Harvard Business Review (2018) that timeboxing ranked
  as the most useful technique in a survey of 100 productivity methods.


  ## How It Works


  ### Core Concept

  - Set specific time limit for each task

  - Work during allocated period

  - Stop when time expires (even if incomplete)

  - Review progress and decide next steps


  ### Recommended Durations

  - **15-30 minutes**: Quick, focused tasks (emails, short paragraph)

  - **30-60 minutes**: Moderate attention tasks (brainstorming, team check-in)

  - **60-90 minutes**: Deep-focus tasks (project roadmap, data analysis)


  ## Benefits


  ### Reduces Procrastination

  - Fixed time limit creates urgency

  - Starting becomes less intimidating

  - Removes open-ended anxiety

  - Forces engagement


  ### Prevents Perfectionism

  - Time constraint prevents over-polishing

  - Focus on progress over perfection

  - Encourages good-enough completion

  - Reduces analysis paralysis


  ### Improves Prioritization

  - Must decide what fits in available time

  - Forces focus on important over urgent

  - Creates intentional time allocation

  - Prevents task expansion


  ### Increases Productivity

  - Can increase productivity by up to 25%

  - Executives at Google and LinkedIn use this technique

  - Creates consistent, predictable work blocks

  - Enhances focus and efficiency


  ## Implementation


  ### Tools

  - Google Calendar: Manual scheduling, versatile

  - Sunsama: Drag-and-drop timeboxing interface

  - Motion: AI-powered optimal scheduling

  - Timeboxing Planner: Specialized notebook


  ### Best Practices

  1. Leave 20% of day unplanned for unexpected issues

  2. Progress over perfection

  3. Review weekly and adjust estimates

  4. Start with loose timeboxes, refine over time

  5. Include breaks and transitions


  ## vs. Time Blocking


  ### Time Blocking

  - Reserves time for activity type

  - Flexible on completion

  - Focuses on when work happens

  - More general time allocation


  ### Timeboxing

  - Fixed duration with hard stop

  - Includes completion limit

  - Focuses on how long work takes

  - Specific time constraint


  ## Common Challenges


  - Tasks taking longer than estimated

  - Difficulty stopping when time expires

  - Over-optimizing time allocation

  - Not accounting for context switching


  ## Success Tips


  - Track actual vs. estimated time

  - Build buffers between boxes

  - Group similar task types

  - Be realistic about capacity

  - Adjust based on experience
