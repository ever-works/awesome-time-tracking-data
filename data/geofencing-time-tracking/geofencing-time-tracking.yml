name: Geofencing Time Tracking
description: Location-based time tracking technology using GPS to create virtual
  boundaries around worksites, automatically recording employee clock-ins when
  entering designated areas and preventing fraudulent remote clock-ins.
source_url: https://buddypunch.com/blog/geofence-time-tracking/
