markdown: >-
  ## Overview


  Code Time is an open source plugin that provides programming metrics right in
  Visual Studio Code. It automatically tracks coding activity and provides
  insights into development patterns.


  ## Key Features


  - Automatic time tracking within your IDE

  - Flow state detection with ability to mute notifications, enter Zen mode,
  hide OS dock, or set Slack status to away

  - Programming metrics and insights

  - Integration with VS Code, JetBrains IDEs, and other popular editors

  - Real-time productivity reports

  - Language and file-level time tracking

  - Offline tracking support


  ## Integrations


  Code Time integrates with:

  - Visual Studio Code

  - JetBrains IDEs (IntelliJ, PyCharm, WebStorm, etc.)

  - Atom

  - Sublime Text


  ## Privacy


  Code Time is open source and provides transparent tracking of your coding
  activity. All data can be kept private and is stored securely.


  ## Pricing


  Free to use with optional premium features for advanced analytics and team
  insights.
