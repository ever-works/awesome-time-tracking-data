name: Parkinson's Law
description: Time management principle stating that work expands to fill the
  time available for its completion. Coined by Cyril Northcote Parkinson in
  1955, it suggests that setting tighter deadlines can actually increase
  productivity.
source_url: https://www.economist.com/news/1955/11/19/parkinsons-law
category: Time Management Principle
