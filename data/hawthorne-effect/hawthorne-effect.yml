markdown: >-
  ## Overview


  The Hawthorne Effect describes the tendency for people to change their
  behavior when they know they are being observed or measured. Originally
  discovered during workplace studies at the Hawthorne Works factory in the
  1920s and 1930s, the concept is highly relevant to time tracking and
  productivity measurement.


  ## Relevance to Time Tracking


  In the context of time audits and time tracking, the Hawthorne Effect
  manifests in several ways:


  - **Increased awareness**: When you start tracking your time in 30-minute
  increments, you naturally become more conscious of how you spend those
  minutes.

  - **Self-correction**: Knowing you'll record your activities prompts you to
  make better choices in real-time, reducing mindless scrolling or other
  distractions.

  - **Improved productivity without intervention**: Many people experience
  productivity gains simply from the act of measurement, even before analyzing
  data or making systemic changes.

  - **Hawthorne awareness**: Time auditors are advised to resist the urge to
  change behavior during the observation period to ensure accurate baseline
  data.


  ## Practical Implications


  - The act of tracking time in 30-minute increments creates a concerted effort
  to spend time more wisely.

  - The principle extends beyond productivity: it works for weight loss, sleep
  habits, and mental health tracking.

  - The phrase 'what gets measured gets managed' captures the essence of this
  effect.


  ## Research Background


  The effect was named after a series of studies conducted at the Western
  Electric Hawthorne Works factory in Chicago between 1924 and 1932. Researchers
  found that worker productivity improved when changes were made to the work
  environment—and also when changes were reversed. The conclusion was that the
  mere act of being observed, not the environmental changes, drove the
  improvement.
