markdown: >-
  ## Overview


  Focus Bear is an innovative productivity and work-life balance application
  tailored especially for individuals with ADHD and neurodivergence. It combines
  strong distraction blocking across devices with real-time habit coaching to
  help users maintain structure and boost productivity.


  ## Features


  - **Super Pomodoro Mode**: Incorporates automatic website blocking and task
  reminders during focus sessions

  - **Smart Break Detection**: Detects hyper-focus and chooses optimal times to
  nudge breaks without disrupting flow

  - **Cross-Device Blocking**: Blocks distracting websites and apps across
  multiple browsers and devices with synchronized blocklist

  - **Morning & Evening Routines**: Enforces structured routines to provide
  consistency for ADHD individuals

  - **Auto-Detect Meetings**: Prevents break reminders during calls and meetings

  - **Customizable Intervals**: Default 20-minute focus intervals adjustable to
  personal preference


  ## ADHD-Specific Benefits


  Focus Bear provides structure, reduces distractions, and promotes time
  management and productivity specifically designed for neurodivergent minds.
  The app enforces routines that help individuals with ADHD maintain consistency
  and avoid overwhelming distraction.


  ## Platform Availability


  - macOS

  - Windows

  - iOS

  - Android


  ## Pricing


  - $5 USD per month (subscription)

  - 31-day free trial available
