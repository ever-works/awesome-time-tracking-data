markdown: >-
  ## Overview


  mJob is construction-focused time tracking and field management software with
  over 30 years of experience serving the construction industry. It's 100% built
  for construction, handling labor, equipment, materials, and comprehensive
  field reporting.


  ## Features


  - Mobile-first time clock for field crews

  - Labor time tracking by cost code

  - Equipment hour tracking

  - Material quantity tracking

  - Daily field reports

  - Job costing integration

  - Photo and document capture

  - GPS location tracking

  - Offline functionality

  - Payroll integration

  - Customizable forms and workflows

  - Real-time project visibility

  - Multi-trade support

  - Compliance documentation


  ## Pricing


  Pricing available upon request. Platform is specifically designed for
  construction contractors of all sizes.
