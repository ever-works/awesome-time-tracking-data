markdown: >-
  ## Overview


  Zoe Read-Bivens is a teacher and productivity expert who developed the
  Flowtime Technique in 2016 to overcome limitations she found in the rigid
  timing of the Pomodoro Technique.


  ## The Problem She Solved


  Read-Bivens found that sticking to 25-minute work segments often interrupted
  her flow state and ended up harming her productivity rather than enhancing it.
  She needed a more flexible approach that respected natural concentration
  patterns.


  ## The Flowtime Technique


  Her solution was to replace Pomodoro's rigid 25-minute timers with natural
  focus blocks:

  - Work until focus fades rather than when a timer rings

  - Take proportional breaks based on work duration (5 min after 25 min, 8 min
  after 50 min, 10 min after 90+ min)

  - Track when focus naturally begins and ends to understand personal
  productivity patterns


  ## Philosophy


  Read-Bivens advocates for aligning work schedules with the body's and mind's
  natural energy cycles rather than forcing them to conform to an arbitrary
  clock. This approach helps maintain deep focus states without forced
  interruptions.


  ## Impact


  The Flowtime Technique has gained popularity among:

  - Creative professionals (writers, designers, developers)

  - Deep thinkers working on complex problems

  - People who find rigid time blocks disruptive to their workflow


  ## Legacy


  Her work demonstrates that productivity systems should adapt to individual
  needs rather than forcing everyone into the same rigid framework.
