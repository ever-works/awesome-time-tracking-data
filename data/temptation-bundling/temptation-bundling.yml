name: Temptation Bundling
description: Behavioral economics strategy of pairing pleasurable activities
  with necessary but unenjoyable tasks. Research by Katy Milkman shows combining
  wants (podcasts, TV) with shoulds (exercise, admin) increases follow-through
  and makes obligations more appealing.
source_url: https://katherinemilkman.com/research/
category: Time Management Technique
tags:
  - behavioral-economics
  - motivation
  - habit-formation
markdown: >-
  ## Overview


  Temptation Bundling links enjoyable activities with tasks you procrastinate
  on.


  ## Examples


  - Only watch favorite show while exercising

  - Listen to podcasts only during commute/chores

  - Save special coffee for working on hard tasks

  - Watch videos only while doing email


  ## Research


  Katy Milkman's studies show 50% increase in gym attendance when audiobooks
  only allowed during workouts.


  ## Implementation


  1. List tasks you avoid

  2. List guilty pleasures

  3. Bundle them together

  4. Only allow pleasure during task


  ## Pricing


  Free behavioral technique.
