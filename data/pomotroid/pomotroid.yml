markdown: >-
  ## Overview


  Pomotroid is a simple and configurable Pomodoro timer that aims to provide a
  visually-pleasing and reliable way to track productivity using the Pomodoro
  Technique. Built with Electron, it's a cross-platform desktop application for
  Linux, macOS, and Windows.


  ## Features


  - **Customizable Themes**: Ships with 37 themes and supports fully custom
  themes with live hot-reload

  - **Progress Tracking**: Review your day at a glance, track weekly streaks,
  and explore your full history with a 52-week heatmap

  - **Desktop Integration**: Dynamic tray icon shows your progress arc in real
  time

  - **Desktop Notifications**: Handle round transitions automatically

  - **Configurable Timers**: Adjust work and break durations to suit your
  workflow

  - **Minimal Interface**: Clean, distraction-free design that focuses on the
  timer

  - **Audio Notifications**: Customizable alert sounds for break and work
  sessions


  ## Pricing


  Free and open-source under the MIT license.
