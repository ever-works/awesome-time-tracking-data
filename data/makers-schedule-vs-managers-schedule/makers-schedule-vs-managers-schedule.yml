name: Maker's Schedule vs Manager's Schedule
description: "Productivity framework by Paul Graham distinguishing between two
  types of schedules: the Manager's Schedule (divided into hour-long blocks) and
  the Maker's Schedule (requiring long uninterrupted blocks for deep creative
  work). Highlights the conflict when managers schedule meetings without
  understanding makers' need for extended focus time."
