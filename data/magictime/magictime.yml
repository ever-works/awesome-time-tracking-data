markdown: >-
  ## Overview


  MagicTime is an AI-powered time tracking solution built specifically for
  lawyers and legal professionals. It automatically captures billable time by
  monitoring work across email, documents, court websites, and other
  applications, eliminating the need for manual time entry.


  ## Features


  - AI-powered automatic time capture

  - Background monitoring of work activities

  - Email time tracking (Gmail, Outlook)

  - Document activity tracking

  - Court website and legal research tracking

  - Automatic timesheet compilation

  - Matter and client code assignment

  - Quick review and approval of time entries

  - Integration with legal billing systems

  - Mobile time tracking

  - Privacy-focused design

  - Customizable tracking rules


  ## Pricing


  MagicTime offers subscription-based pricing for individual attorneys and law
  firms. Pricing varies based on the number of users and integration
  requirements. Contact MagicTime for current pricing and a demonstration.
