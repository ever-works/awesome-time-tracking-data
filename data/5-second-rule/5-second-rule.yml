name: 5-Second Rule
description: Anti-procrastination technique created by Mel Robbins that uses a
  simple countdown mechanism to overcome hesitation and initiate action. The
  method involves counting backwards from 5 to 1, then immediately taking
  physical action before the brain can create excuses or self-doubt.
