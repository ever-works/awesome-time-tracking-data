markdown: >-
  ## Overview


  Endorphin is an iOS focus timer that uses minimalist design and gamification
  through streak tracking to help users build consistent focus habits.


  ## Features


  - Simple focus timer

  - Streak tracking for consistency

  - Beautiful visual design

  - Daily goal setting

  - Session history

  - Minimal interface to reduce distractions

  - Widget support


  ## Gamification Elements


  - Maintain focus streaks

  - Daily achievement goals

  - Visual progress indicators

  - Satisfying completion feedback


  ## Platform


  iOS only


  ## Target Users


  iPhone users seeking simple, beautiful focus tracking with streak motivation
