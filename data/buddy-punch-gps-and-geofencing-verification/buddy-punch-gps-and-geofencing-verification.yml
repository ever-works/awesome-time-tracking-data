markdown: >-
  ## Overview


  Buddy Punch includes GPS tracking and geofencing capabilities that verify
  employee locations when clocking in/out, preventing time theft through offsite
  punching and providing proof of on-site presence for mobile workforces.


  ## GPS Tracking


  **Automatic Capture**: GPS coordinates recorded with every punch


  **Real-Time Visibility**: Managers see where employees are while on clock


  **Historical Records**: Location data stored for verification and disputes


  **Mobile Worker Support**: Track field employees across multiple locations


  ## Geofencing


  **Virtual Boundaries**: Draw geofences around job sites or office locations


  **Enforcement**: Prevent punching from outside designated areas


  **Alerts**: Notify managers of unauthorized location punches


  **Flexibility**: Multiple geofences for multi-site organizations


  **Radius Control**: Adjustable fence size for each location


  ## How It Works


  1. Employer creates geofences around work locations

  2. Employee attempts to clock in via mobile app

  3. System checks GPS coordinates

  4. If inside geofence: Punch allowed

  5. If outside geofence: Punch blocked or flagged

  6. Manager notified of any violations


  ## Use Cases


  **Construction**: Verify crews are at correct job sites


  **Healthcare**: Confirm home health workers visit clients


  **Retail**: Ensure employees at proper store location


  **Field Services**: Track technicians across service calls


  **Multi-Location**: Manage employees across different offices


  ## Fraud Prevention


  Address specific time theft scenarios:

  - Employee clocks in from home before arriving

  - Worker punches in from car in parking lot

  - Staff member clocks in while still commuting

  - Remote punch-in for absent colleague


  ## Integration with Other Features


  **Facial Recognition**: Combine location and identity verification


  **Photo Capture**: Selfie + GPS for comprehensive verification


  **Attendance Alerts**: Late arrival or early departure notifications


  **Payroll Integration**: Location-verified hours exported


  ## Privacy Considerations


  **Work Hours Only**: GPS only active when clocked in


  **Transparency**: Employees aware of tracking policy


  **Compliance**: Follows labor laws and privacy regulations


  **Control**: Employers configure tracking scope


  ## Benefits


  **For Employers**:

  - Verify actual work location

  - Prevent time theft

  - Provide client proof of service

  - Optimize routing and scheduling

  - Support workers in field


  **For Employees**:

  - Prove they were on-site

  - Dispute false accusations

  - Document client visits

  - Simple mobile clocking


  GPS and geofencing transform time clocks from simple punch tools to location
  verification systems, crucial for mobile and distributed workforces where
  physical presence must be documented and verified.
