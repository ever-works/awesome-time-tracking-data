markdown: >-
  ## Overview


  Dave Lee's System is a productivity approach that integrates weekly planning,
  daily focus, and timed work sessions into a structured routine.


  ## How It Works


  1. **Weekly Chart** - Choose five important areas or projects for the week

  2. **Daily Focus Area** - Work on one of the five areas each day, distributing
  attention across all priorities

  3. **Pomodoro Timer** - Use Pomodoro-style work sessions to execute tasks
  within each focus area


  ## Key Benefits


  - Ensures balanced progress across multiple important areas

  - Prevents over-focusing on a single project while neglecting others

  - Combines strategic weekly planning with tactical focused execution

  - Provides clear daily direction without overwhelming the schedule
