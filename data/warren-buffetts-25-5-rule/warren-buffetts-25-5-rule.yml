name: Warren Buffett's 25-5 Rule
description: Focus strategy attributed to Warren Buffett where you list 25
  goals, circle your top 5, and avoid the remaining 20 at all costs. This method
  forces ruthless prioritization by treating the not-chosen goals as active
  distractions rather than future possibilities.
