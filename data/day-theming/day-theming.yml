name: Day Theming
description: "Time management technique of assigning specific themes or focus
  areas to different days of the week to reduce context switching and batch
  similar work. For example: Monday for admin, Tuesday for meetings, Wednesday
  for deep work, creating predictable patterns that improve focus and
  efficiency."
