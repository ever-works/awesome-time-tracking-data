markdown: >-
  ## Overview


  Focus Matrix is a smart personal organizer based on the Eisenhower Matrix
  (also known as the Eisenhower box), designed specifically for iOS devices. It
  helps users organize tasks and priorities using the proven time management
  framework that distinguishes between urgent and important activities.


  ## Features


  ### Eisenhower Matrix Implementation

  - **Four Quadrants**: Do First, Schedule, Delegate, and Eliminate categories

  - **Visual Organization**: Clear visual representation of task priorities

  - **Drag and Drop**: Easy task movement between quadrants

  - **Smart Categorization**: Intuitive interface for quick task sorting


  ### Task Management

  - Create and organize tasks across all four quadrants

  - Set due dates and reminders

  - Add notes and details to tasks

  - Mark tasks as complete

  - Archive completed items


  ### iOS Integration

  - Native iOS design following Apple's human interface guidelines

  - iPhone and iPad support

  - iCloud sync across Apple devices

  - Notification support for reminders

  - Widgets for quick access


  ### Productivity Features

  - Focus on high-impact tasks (Quadrant 2)

  - Reduce time spent on urgent but unimportant tasks (Quadrant 3)

  - Identify and eliminate time-wasters (Quadrant 4)

  - Strategic planning through scheduled tasks (Quadrant 2)


  ## Methodology


  Based on President Eisenhower's decision-making principle: "What is important
  is seldom urgent and what is urgent is seldom important." The app helps users:

  - Distinguish between urgency and importance

  - Focus on proactive rather than reactive work

  - Build habits around strategic thinking

  - Improve decision-making about task priorities


  ## Use Cases


  - **Personal Productivity**: Manage daily tasks and long-term goals

  - **Professional Work**: Prioritize work responsibilities

  - **Project Management**: Organize project tasks by priority

  - **Life Management**: Balance work, personal, and family responsibilities

  - **Student Organization**: Manage academic tasks and deadlines


  ## Design Philosophy


  Focus Matrix emphasizes simplicity and clarity, using the proven Eisenhower
  Matrix framework to help users make better decisions about where to invest
  their time and energy.


  ## Platform


  iOS exclusive - available on the App Store for iPhone and iPad.


  ## Pricing


  Contact App Store for current pricing and subscription options.
