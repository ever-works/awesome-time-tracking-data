markdown: >-
  ## Overview


  Smokeball is an all-in-one legal practice management solution designed
  specifically for small and mid-sized law firms, combining case management,
  document automation, time tracking, and billing in a single cloud-based
  platform.


  ## Features


  - **Automatic Time Tracking**: AutoTime captures billable activities
  automatically as lawyers work in documents, emails, and other applications

  - **Case Management**: Complete matter tracking with deadlines, tasks, and
  document organization

  - **Document Automation**: Pre-built and custom templates for common legal
  documents

  - **Billing & Invoicing**: Generate invoices from tracked time with flexible
  billing arrangements

  - **Email Integration**: Sync emails directly to matters with automatic time
  capture

  - **Trust Accounting**: Built-in IOLTA and trust accounting features

  - **Court Forms**: Access to jurisdiction-specific court forms library

  - **Mobile App**: Manage cases and track time on iOS and Android devices

  - **Reporting**: Practice analytics including revenue forecasting and
  realization rates

  - **Integrations**: Connect with QuickBooks, Outlook, Gmail, and other tools


  ## Practice Areas


  Supports multiple practice areas including family law, personal injury,
  criminal defense, estate planning, real estate, and more with
  practice-specific features and templates.


  ## Pricing


  Subscription-based pricing with different tiers based on features and number
  of users. Free trial available.
