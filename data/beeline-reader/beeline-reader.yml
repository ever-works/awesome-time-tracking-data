markdown: >-
  ## What is BeeLine Reader?


  BeeLine Reader makes reading on-screen easier, faster, and more enjoyable
  using a simple cognitive trick — an eye-guiding color gradient — to pull your
  eyes through long blocks of text. The text at the end of each line is colored
  the same as the beginning of the next, so the color of the text acts as a flag
  post that directs the reader's eyes through the text more easily.


  ## Impact on Speed Reading and Focus


  BeeLine Reader uses a simple cognitive trick – an eyeguiding color gradient –
  to pull your eyes from one line to the next, which increases reading speed and
  enhances focus. The average reading speed increase is over 20%.


  A study done by CNET (and covered by The Atlantic) showed that people reading
  with this technology were 35% more likely to finish an article than reading
  plain black text.


  ## Who Benefits?


  Originally created as a speed-reading tool, BeeLine Reader is used by
  high-performing students at the most elite universities in the world, but this
  technique isn't just for gifted readers—it is also incredibly helpful for
  students with dyslexia, ADHD, or vision impairments.


  ## Additional Features


  Notable additional settings and features include a Focus mode (to minimize
  distraction while reading) and OpenDyslexic font, and a PDF-specific version
  of BeeLine for classrooms.


  ## Availability


  The system is available as an extension in Google Chrome and Mozilla Firefox,
  as a PDF viewer, and as an iOS app.


  ## Mixed Research Findings


  While many users report benefits, it's worth noting that some research
  suggests potential users should keep in mind that BeeLine Reader is a charged
  application with no clear theoretical underpinnings and may have a detrimental
  effect on reading speed, reading comprehension, and more subjective
  readability measures. The effectiveness may vary by individual and reading
  level.
