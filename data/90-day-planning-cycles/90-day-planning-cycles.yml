markdown: >-
  ## Overview


  90-Day Planning Cycles structure work around quarterly periods, balancing the
  immediacy of monthly goals with the strategic perspective of annual planning.


  ## Why 90 Days


  - Long enough for meaningful progress

  - Short enough to maintain urgency

  - Aligns with business quarters

  - Natural seasons

  - Frequent course correction

  - Manageable scope


  ## Planning Process


  ### Quarter Planning (Week 1)

  1. Review previous quarter

  2. Set 3-5 major goals

  3. Define success metrics

  4. Identify key milestones

  5. Allocate resources


  ### Monthly Reviews (Weeks 5, 9)

  - Progress assessment

  - Obstacle identification

  - Adjust tactics

  - Celebrate wins


  ### Weekly Planning (Every Monday)

  - Review quarterly goals

  - Set weekly priorities

  - Schedule key tasks

  - Track time allocation


  ### End-of-Quarter Review (Week 13)

  - Measure results

  - Document learnings

  - Capture successes

  - Plan next quarter


  ## Time Tracking Integration


  **Track time by quarter goal**:

  - Tag entries to quarterly objectives

  - Weekly goal alignment review

  - Monthly allocation analysis

  - Quarterly outcome correlation


  ## Benefits


  - Regular fresh starts

  - Clear priorities

  - Measurable progress

  - Adaptable to change

  - Sustainable pace

  - Build momentum


  ## Common Pitfalls


  - Too many goals (>5)

  - Vague objectives

  - No mid-quarter adjustments

  - Ignoring learnings

  - Poor time allocation


  ## Success Tips


  1. Limit to 3-5 goals max

  2. Make goals SMART

  3. Block time for strategic work

  4. Review progress weekly

  5. Adjust based on reality
