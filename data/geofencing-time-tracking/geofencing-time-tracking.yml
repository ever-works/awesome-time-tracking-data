name: Geofencing Time Tracking
description: GPS-based time tracking technology that restricts clock-ins and
  clock-outs to predefined geographical boundaries. Ensures mobile workers are
  physically present at job sites while preventing time theft and improving
  location accountability.
source_url: https://www.workforce.com/software/time-tracking
category: Mobile Time Tracking
