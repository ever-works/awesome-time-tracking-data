name: Automatic Task Rescheduling (Structured)
description: Structured Pro's intelligent feature that automatically reschedules
  missed or forgotten tasks to future days, preventing tasks from disappearing
  and ensuring everything eventually gets attention without manual
  reorganization.
source_url: https://structured.app/
category: Productivity Feature
tags:
  - automation
  - task-management
  - scheduling
markdown: |-
  ## The Problem It Solves

  When tasks don't get completed on their scheduled day, they often:
  - Disappear from view
  - Get forgotten entirely
  - Create guilt and overwhelm
  - Require manual rescheduling effort

  ## How Automatic Rescheduling Works

  Structured Pro automatically:
  1. Detects uncompleted tasks at day's end
  2. Analyzes your upcoming schedule
  3. Finds appropriate slots
  4. Reschedules tasks intelligently
  5. Notifies you of changes

  ## Rescheduling Logic

  ### Priority-Based
  - High-priority tasks moved to next available day
  - Medium-priority tasks scheduled within week
  - Low-priority tasks placed in upcoming weeks

  ### Deadline-Aware
  - Tasks with approaching deadlines get earlier slots
  - Sufficient time allocated before due dates
  - Urgent items take precedence

  ### Capacity-Conscious
  - Doesn't overload any single day
  - Distributes workload reasonably
  - Respects existing commitments

  ## User Benefits

  ### Reduced Mental Load
  - No manual rescheduling needed
  - Tasks won't be forgotten
  - System handles reorganization

  ### Realistic Planning
  - Acknowledges that not everything gets done
  - Maintains forward progress
  - Prevents task accumulation

  ### Guilt Reduction
  - Normal to have incomplete days
  - System accommodates reality
  - Focus on what's ahead, not what's behind

  ## Customization Options

  - Set preferences for auto-rescheduling behavior
  - Choose default time-forward increments
  - Enable/disable for specific task types
  - Review and adjust auto-scheduled items
