markdown: >-
  ## Overview


  TimeCamp is an automatic time tracking application that monitors computer
  activity, categorizes it by project, and provides comprehensive reporting and
  invoicing capabilities. It's designed for freelancers, agencies, and teams who
  want accurate time tracking without manual timer management, with strong
  integration between time tracking and billing.


  ## Automatic Tracking


  - **Desktop Monitoring**: Tracks applications and websites automatically

  - **Keyword Detection**: Assigns time to projects based on window titles

  - **Smart Categorization**: Learns project patterns over time

  - **Idle Detection**: Pauses tracking during inactivity

  - **Background Operation**: Works silently without interference

  - **Privacy Controls**: Configure what gets tracked and shared


  ## Time Management Features


  ### Tracking Methods

  - Automatic desktop tracking

  - Manual time entry

  - Timer functionality

  - Calendar integration

  - Mobile app tracking

  - Offline mode support


  ### Project Organization

  - Hierarchical project structure

  - Task and subtask management

  - Budgets (time and monetary)

  - Multiple billing rates

  - Client organization

  - Tags and custom fields


  ### Timesheet Management

  - Automated timesheet generation

  - Approval workflows

  - Lock approved periods

  - Bulk editing

  - Export capabilities


  ## Invoicing Integration


  ### Invoice Generation

  - Create invoices from tracked time

  - Multiple templates

  - Customizable branding

  - Tax calculations

  - Multiple currencies

  - Recurring invoices


  ### Billing Features

  - Different rates by project/person

  - Billable vs non-billable tracking

  - Expense inclusion

  - Discount support

  - Payment tracking

  - Overdue reminders


  ## Profitability & Reporting


  ### Project Profitability

  - Budget vs actual tracking

  - Cost analysis

  - Revenue calculation

  - Profit margins

  - ROI reporting


  ### Comprehensive Reports

  - Time by project, person, or date

  - Attendance reports

  - Productivity analytics

  - Utilization rates

  - Custom report builder

  - Scheduled report delivery


  ## Team Collaboration


  - Multi-user support

  - Team timesheets

  - Project collaboration

  - Manager approvals

  - Role-based permissions

  - Activity monitoring (optional)


  ## Integration


  - **Project Management**: Asana, Trello, Jira, Basecamp

  - **Accounting**: QuickBooks, Xero, FreshBooks

  - **Calendar**: Google Calendar, Outlook

  - **Communication**: Slack

  - **Other**: 50+ integrations via API and Zapier


  ## Pricing


  Free plan available with basic features. Paid plans unlock automatic tracking,
  invoicing, and advanced features with per-user pricing.


  ## Ideal For


  Freelancers billing by the hour, agencies managing multiple client projects,
  consultants needing profitability tracking, remote teams requiring automatic
  tracking, and businesses wanting integrated time-to-invoice workflow.
