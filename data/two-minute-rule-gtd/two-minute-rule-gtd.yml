markdown: >-
  ## Overview


  The Two-Minute Rule is a productivity technique from David Allen's "Getting
  Things Done" (GTD) methodology. The rule states: "If an action will take less
  than two minutes, it should be done at the moment it's defined."


  ## Core Rationale


  Allen explains the efficiency principle: "It's more or less the point where it
  starts taking longer to store and track an item than to deal with it the first
  time it's in your hands." In other words, managing the task later takes more
  time than just doing it now.


  ## Two Implementation Approaches


  ### 1. Completing Quick Tasks


  Address small items immediately—emails, appointments, filing—rather than
  letting them accumulate and create mental burden. The longer tasks remain
  undone, the harder they feel psychologically.


  **Examples**:

  - Responding to a quick email

  - Scheduling an appointment

  - Filing a document

  - Making a brief phone call

  - Updating a status

  - Sending a quick message


  ### 2. Starting Large Projects


  Break overwhelming work into two-minute chunks. Completing just one small
  segment generates momentum and overcomes initial paralysis about where to
  begin.


  **Examples**:

  - Opening the document for a report

  - Writing the first paragraph

  - Creating a project outline

  - Gathering initial materials

  - Sending the first email


  ## Key Benefits


  - **No Complex System**: Requires no sophisticated workflow or tracking
  mechanism

  - **Prevents Procrastination**: Handles tasks before they pile up

  - **Creates Momentum**: Small wins trigger continued action on additional
  tasks

  - **Builds Action Bias**: Develops a habit of tackling items directly rather
  than avoiding them

  - **Reduces Mental Clutter**: Eliminates the cognitive load of remembering
  small tasks

  - **Flexible**: Can adjust the timeframe (30 seconds to 10 minutes) based on
  circumstances


  ## Important Context: Processing Time


  Allen emphasizes that the two-minute rule should be applied during processing
  time, which is the key that many people who repeat the rule fail to mention.
  This means using it when reviewing tasks and deciding what to do with them,
  not randomly throughout the day.


  ## Practical Examples


  The rule applies to:

  - Responding to messages

  - Scheduling appointments

  - Organizing spaces

  - Clearing digital clutter

  - Initiating components of major projects

  - Quick research or fact-checking

  - Simple data entry

  - Brief updates or check-ins


  ## Important Caveats


  ### Avoid Context-Switching


  Reserve two-minute tasks for natural breaks or structured processing periods.
  Don't interrupt focused work on important projects to handle two-minute items.


  ### Beware of False Productivity


  Completing many two-minute tasks may give you a sense of fulfillment but
  ultimately doesn't contribute much to long-term goals. Misunderstanding the
  two-minute rule can lead to unproductive days where it becomes a justification
  for avoiding important work.


  ### Use During Review, Not Always


  The rule is most effective during designated task-review sessions (like daily
  or weekly planning), not as a constant interruption to focused work.


  ## When NOT to Use the Rule


  - During deep work sessions

  - When working on high-priority projects

  - In meetings or focused conversations

  - During creative or strategic thinking time

  - When energy is low and preservation is needed


  ## Integration with GTD


  The two-minute rule is one component of the larger Getting Things Done system,
  which includes:

  - Capturing all commitments

  - Clarifying what each item means

  - Organizing by context and priority

  - Reflecting through regular reviews

  - Engaging by taking appropriate action


  ## Variations and Adaptations


  ### Adjusted Time Thresholds


  Some practitioners adjust the threshold based on their situation:

  - **30-Second Rule**: For extremely busy environments

  - **5-Minute Rule**: When you have more capacity

  - **10-Minute Rule**: For roles with fewer interruptions


  ### Batch Processing


  Instead of doing two-minute tasks immediately, some people batch them and
  process all at once during designated times.


  ## Building the Habit


  1. Start by identifying tasks that qualify

  2. Practice immediate action on obvious two-minute items

  3. Notice the momentum and mental clarity it creates

  4. Gradually expand to more types of quick tasks

  5. Balance with focused work on important projects


  ## Long-term Impact


  Small tasks that collect add up to a laundry list of chores we continually put
  off, and we spend more time and energy thinking about how we haven't done them
  yet and feeling guilty about it than we would have spent just doing them in
  the first place. The two-minute rule prevents this accumulation.
