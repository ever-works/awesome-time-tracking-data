markdown: >-
  ## Overview


  Bonsai provides freelancers with automatic time tracking integrated with
  contracts, proposals, invoicing, and client management for end-to-end business
  operations.


  ## Time Tracking Features


  - Automatic time tracking

  - Manual time entry

  - Project and task-based tracking

  - Browser extension for web work

  - Mobile time tracking

  - Billable vs non-billable hours

  - Time budgets and alerts


  ## Freelance Business Tools


  - Contract templates and e-signatures

  - Proposal creation

  - Invoice generation from time

  - Payment processing

  - Expense tracking

  - Tax estimation

  - Client CRM


  ## Automation


  - Auto-invoice from tracked time

  - Recurring invoices

  - Payment reminders

  - Late payment fees

  - Tax calculation


  ## Pricing


  Starts at ~$24/month

  Includes unlimited projects and clients


  ## Target Users


  Freelancers, consultants, creative professionals, independent contractors
