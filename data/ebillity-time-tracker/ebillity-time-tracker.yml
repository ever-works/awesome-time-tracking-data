markdown: >-
  ## Overview


  eBillity Time Tracker is a Xero time tracking add-on designed to seamlessly
  integrate with Xero Payroll and Accounting, providing automated timesheet
  synchronization and expense management.


  ## Features


  ### Time Tracking

  - **Multiple Entry Methods**: Timer, manual entry, or timesheet grid

  - **Mobile Apps**: iOS and Android apps for on-the-go tracking

  - **Web-Based**: Access from any browser

  - **Offline Capability**: Track time without internet, sync later

  - **Project & Task Tracking**: Organize time by projects and tasks


  ### Xero Integration

  - **Automatic Sync**: Time data flows directly to Xero timesheets

  - **Payroll Integration**: Seamless connection with Xero Payroll

  - **Invoice Creation**: Turn tracked time into Xero invoices

  - **Project Synchronization**: Projects sync from Xero

  - **Client Matching**: Automatic client matching between systems


  ### Expense Tracking

  - **Receipt Capture**: Photo receipts with mobile app

  - **Mileage Tracking**: GPS-based mileage logging

  - **Expense Categories**: Organize expenses by type

  - **Billable Expenses**: Mark expenses for client billing

  - **Xero Expense Sync**: Expenses flow to Xero accounting


  ### Reporting

  - **Time Reports**: Detailed time allocation reports

  - **Expense Reports**: Comprehensive expense summaries

  - **Billable vs. Non-Billable**: Distinguish billable time

  - **Project Profitability**: Analyze project margins

  - **Custom Reports**: Build reports for specific needs


  ### Team Management

  - **Multiple Users**: Support for teams of any size

  - **Timesheet Approval**: Manager review workflows

  - **User Permissions**: Role-based access control

  - **Team Reports**: Aggregate team time data


  ## Benefits for Xero Users


  - **Native Integration**: Built specifically for Xero

  - **No Double Entry**: Time flows automatically to Xero

  - **Consistent Data**: Single source of truth across systems

  - **Faster Invoicing**: Billable hours instantly available in Xero

  - **Improved Accuracy**: Eliminates manual transcription errors


  ## Use Cases


  - Professional services firms billing clients

  - Consultants tracking project time

  - Teams using Xero for accounting

  - Businesses needing both time and expense tracking


  ## Target Users


  - Xero customers needing time tracking

  - Service-based businesses

  - Consulting firms

  - Agencies tracking billable hours


  ## Pricing


  Subscription-based pricing with tiers based on number of users. Free trial
  available to test Xero integration.
