markdown: >-
  ## Overview


  Intently takes a fundamentally different approach to digital wellbeing.
  Instead of locking you out of apps, it creates mindful interventions—gentle,
  full-screen reminders that help you pause and decide whether you actually want
  to open that app. The assumption baked into this design: you're a capable
  adult who can make your own choices. You just need a nudge to make those
  choices consciously rather than reflexively.


  ## Features


  ### Mindful Interventions

  - **Full-Screen Prompts**: When you open a tracked app, a full-screen prompt
  appears with messages like "Take a breath. Do you still want to open this?"

  - **Awareness-Based Approach**: Creates a small moment of friction that
  interrupts the autopilot loop

  - **No Hard Blocking**: Doesn't prevent access, just encourages conscious
  decision-making

  - **Custom Messages**: Personalize reminder messages to make them more
  meaningful


  ### Privacy Architecture

  - **100% Local Data**: Everything runs locally on your device

  - **No Cloud Sync**: All data stays on your phone

  - **No Account Required**: No registration or login needed

  - **Zero Data Collection**: No information leaves your device

  - **Complete Privacy**: No third-party tracking or analytics


  ### App Tracking & Management

  - Track specific apps you want to be mindful about

  - Configure intervention frequency and timing

  - View usage patterns and trends

  - Set personal goals without external pressure

  - Customize which apps trigger interventions


  ### Philosophy

  - Focuses on building sustainable long-term habits

  - Encourages awareness rather than restriction

  - Respects user autonomy and decision-making

  - Helps users develop internal self-regulation


  ## Pricing


  - **Free Version**: Core features available at no cost

  - **Premium**: $4.99/month for additional features and customization options


  ## Platform Availability


  - Android

  - iOS

  - Chrome Extension


  ## Best For


  - Users seeking mindful technology use without harsh restrictions

  - Privacy-conscious individuals who don't want cloud-based tracking

  - People building sustainable digital habits

  - Those who prefer awareness over blocking

  - Users who want to maintain autonomy while reducing mindless scrolling


  ## Key Differentiators


  Intently stands out from traditional app blockers and screen time tools by
  focusing on conscious awareness rather than forced restriction. The gentle
  intervention approach helps users develop intrinsic motivation and
  self-awareness, leading to more sustainable behavior change compared to apps
  that simply lock users out.


  The privacy-first architecture ensures that sensitive usage data never leaves
  the device, addressing growing concerns about data privacy in the digital
  wellbeing space.
