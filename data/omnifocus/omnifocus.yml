markdown: >-
  ## Overview


  OmniFocus is a sophisticated task management application for Apple platforms
  that implements the Getting Things Done (GTD) methodology in depth. Known for
  its power and flexibility, it's designed for professionals managing complex
  projects and workflows who need advanced features like perspectives, contexts,
  review cycles, and intricate filtering.


  ## Core GTD Implementation


  ### Inbox

  - Quick capture from anywhere

  - Process regularly

  - Clarify and organize

  - Batch processing


  ### Projects & Single Actions

  - Sequential projects (steps in order)

  - Parallel projects (steps independent)

  - Single action lists

  - Project templates

  - On Hold status


  ### Contexts

  - Where/when/with tasks can be done

  - @Computer, @Home, @Calls, @Errands

  - Nested contexts

  - Context-based views


  ### Perspectives

  - Custom views of tasks

  - Saved filters and groupings

  - Quick access to workflows

  - Pro feature, highly powerful


  ### Review

  - Scheduled review cycles

  - Project-level review dates

  - Review mode for batch processing

  - Next review tracking


  ## Advanced Features


  ### Start Dates & Defer

  - Hide tasks until ready

  - Future planning

  - Reduce current overwhelm

  - Sequential dependencies


  ### Estimated Duration

  - Time needed per task

  - Planning capacity

  - Finding quick wins

  - Realistic scheduling


  ### Forecast View

  - Calendar integration

  - Deadlines visualization

  - Today's schedule

  - Week ahead planning


  ### Flagging

  - Mark important tasks

  - Quick filter to flagged

  - Temporary priority

  - Review attention items


  ### Tags (OmniFocus 3)

  - Multiple tags per task

  - Replaces/extends contexts

  - More flexible categorization

  - Tag combinations


  ## Power User Features


  ### Custom Perspectives (Pro)

  - Build complex filters

  - Save for quick access

  - Share with team

  - Automate workflows


  ### Automation

  - URL schemes

  - Shortcuts integration

  - AppleScript support (Mac)

  - Task templates


  ### Repeating Tasks

  - Complex recurrence patterns

  - Due vs defer-based

  - Skip occurrences

  - Template-based repeats


  ## Sync & Platforms


  ### Omni Sync Server

  - Free sync service

  - End-to-end encryption

  - Real-time sync

  - Conflict resolution


  ### Alternative Sync

  - WebDAV support

  - Local network sync

  - Third-party servers


  ### Platforms

  - macOS (desktop)

  - iPhone

  - iPad

  - Apple Watch

  - Web (read-only)


  ## Pricing


  Two options:

  - **Subscription**: All platforms, all updates

  - **One-Time Purchase**: Single platform, major version


  Pro features (Perspectives) available in both.


  ## Learning Curve


  ### Complexity

  - Steep learning curve

  - Many features to master

  - Requires GTD understanding

  - Investment in setup


  ### Power

  - Handles any workflow

  - Scales to complex needs

  - Professional-grade

  - Worth the learning


  ## Ideal For


  GTD purists, professionals with complex workflows, Apple ecosystem power
  users, people managing 100+ active tasks, individuals wanting total control,
  and those willing to invest time in setup for long-term power.
