markdown: >-
  ## Overview


  The Tergar Meditation Tracker app helps you start and maintain a regular
  meditation practice by tracking your sessions as you progress on the journey
  of training your mind. Part of the Tergar Meditation Community founded by
  Yongey Mingyur Rinpoche.


  ## Features


  - Session tracking and logging

  - Progress visualization

  - Community connection

  - Meditation insights and teachings

  - Practice reminders

  - Streaks and milestones

  - Integration with Tergar's learning programs


  ## Background


  Developed by Tergar International, an organization dedicated to making the
  ancient practice of meditation accessible to the modern world through the
  teachings of Tibetan meditation master Yongey Mingyur Rinpoche.


  ## Target Audience


  Designed for students of Tergar's meditation programs and anyone interested in
  building a consistent meditation practice rooted in authentic Buddhist
  teachings.


  ## Pricing


  Free app available on iOS and Android.
