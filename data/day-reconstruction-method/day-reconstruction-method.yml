name: Day Reconstruction Method
description: Scientific time-use assessment methodology developed by Nobel
  laureate Daniel Kahneman that combines features of time-budget measurement and
  experience sampling. Participants systematically reconstruct previous day
  activities to reduce recall biases and assess how they spend time and
  experience various activities.
source_url: https://www.science.org/doi/10.1126/science.1103572
category: Time Management Practice
tags:
  - research
