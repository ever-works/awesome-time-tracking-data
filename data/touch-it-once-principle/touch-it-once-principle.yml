name: Touch It Once Principle
description: Productivity principle stating that when you pick up or encounter a
  task, email, or item, deal with it completely instead of setting it aside for
  later. Reduces handling time and mental overhead of revisiting items multiple
  times.
source_url: https://www.productivityist.com/touch-once/
category: Practices
