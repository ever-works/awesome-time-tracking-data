markdown: >-
  ## Overview


  Pomofocus is a simple, elegant Pomodoro timer designed to help people maintain
  focus and productivity using the Pomodoro Technique. As a web-based tool, it
  requires no installation or account creation, making it instantly accessible
  from any device with a browser.


  ## Features


  - **Customizable Timer**: Adjust work session and break durations to fit your
  preferences

  - **Task Management**: Create and track tasks within the timer interface

  - **Visual Timer**: Large, easy-to-read display shows remaining time

  - **Audio Notifications**: Customizable alert sounds when sessions end

  - **Browser Notifications**: Desktop notifications when you're working in
  other tabs

  - **Progress Tracking**: See how many Pomodoros you've completed

  - **Minimalist Design**: Clean interface that doesn't distract from work

  - **No Registration**: Use immediately without creating an account

  - **Cross-Platform**: Works on desktop browsers, tablets, and mobile devices

  - **Keyboard Shortcuts**: Quick controls for starting/stopping timer

  - **Theme Options**: Light and dark mode support


  ## How to Use


  1. Set your work session duration (default 25 minutes)

  2. Set your short break duration (default 5 minutes)

  3. Set your long break duration (default 15 minutes)

  4. Add tasks you want to work on

  5. Click start to begin your first Pomodoro

  6. Work until the timer alerts you

  7. Take a short break

  8. After 4 Pomodoros, take a longer break


  ## The Pomodoro Technique


  Pomofocus implements the traditional Pomodoro Technique:

  - **25-minute work sessions** (Pomodoros)

  - **5-minute short breaks** between Pomodoros

  - **15-30 minute long breaks** after 4 Pomodoros

  - Focus on one task during each Pomodoro

  - Use breaks to rest and recharge


  ## Customization Options


  Users can customize:

  - Work session length (1-60 minutes)

  - Short break length (1-60 minutes)

  - Long break length (1-60 minutes)

  - Number of Pomodoros before long break

  - Notification sounds

  - Theme colors

  - Auto-start next session


  ## Benefits


  - **Free Forever**: No premium features or paywalls

  - **No Account Required**: Start using immediately

  - **Privacy Focused**: No data collection or tracking

  - **Accessible**: Works on any modern browser

  - **Distraction-Free**: Minimal interface keeps focus on work

  - **Proven Technique**: Based on the established Pomodoro method


  ## Ideal Users


  - Students studying for exams

  - Professionals working on focused tasks

  - Freelancers managing their time

  - Anyone struggling with procrastination

  - Remote workers maintaining structure

  - Writers, programmers, designers


  ## Pricing


  Pomofocus is completely free to use with all features available to everyone.
  There are no premium tiers, subscriptions, or hidden costs. The service is
  supported by optional donations from users who find it valuable.
