name: Calendar Sync Time Entry
description: Time tracking feature that automatically imports calendar events as
  time entries, reducing manual entry burden and improving accuracy by capturing
  meetings and scheduled work automatically. Calendar sync is one of three core
  habits that produce accurate time data from day one.
