markdown: >-
  ## Overview


  The 25/5 Rule, attributed to Warren Buffett, is a ruthless prioritization
  exercise designed to help you focus on what truly matters by actively avoiding
  your "pretty important" goals.


  ## The Process


  ### Step 1: List 25 Goals

  Write down 25 career or life goals you want to accomplish.


  ### Step 2: Circle Top 5

  Review the list and circle your top 5 most important goals.


  ### Step 3: Create Two Lists

  - **List A**: Your 5 circled goals

  - **List B**: The remaining 20 goals


  ### Step 4: The Critical Part

  Most people assume List B is what you work on when List A is done. **Wrong.**


  **List B is your "Avoid at All Costs" list.**


  These items will distract you from your top priorities. No matter how
  appealing they seem, avoid them until you've achieved your top 5.


  ## The Psychology


  ### Why It Works


  **The Danger of "Pretty Important"**:

  - Items 6-25 are appealing enough to distract you

  - But not important enough to deserve focus

  - They steal energy from your top 5

  - Create illusion of productivity


  **Forced Focus**:

  - Eliminates competing priorities

  - Channels energy to top goals

  - Prevents dilution of effort

  - Accelerates progress


  ### Common Resistance


  "But item #6 is also important!"

  - Yes, and that's the problem

  - It's important enough to distract

  - But less important than top 5

  - Do top 5 first, achieve faster

  - Then revisit #6-25


  ## Application


  ### Career Focus

  - Top 5 skills to master

  - Avoid spreading too thin

  - Deep expertise over broad knowledge

  - Master then expand


  ### Business Priorities

  - Top 5 growth initiatives

  - Say no to other opportunities

  - Execute brilliantly on few things

  - Not adequately on many


  ### Personal Development

  - Top 5 life goals

  - Avoid hobby hopping

  - Complete before starting new

  - Depth over breadth


  ## Benefits


  - Extreme clarity on priorities

  - Protection from "shiny object syndrome"

  - Faster progress on important goals

  - Reduced decision fatigue

  - Permission to say no


  ## Challenges


  - Requires discipline to avoid #6-25

  - FOMO (fear of missing out)

  - Saying no to good opportunities

  - Long time to achieve all 25


  ## The Essential Insight


  **You cannot do everything. Choose wisely, then commit ruthlessly.**
