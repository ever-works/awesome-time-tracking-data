markdown: >-
  ## Overview


  The Franklin Planner is a paper-based personal planning system created by
  Hyrum Smith, an influential figure in time management and productivity. It was
  later merged into FranklinCovey, which continues to offer planning products
  and training based on Smith's methodology.


  ## Core Principles


  - **Governing Values**: Users identify their core values and principles, which
  guide daily decisions and time allocation

  - **Daily and Weekly Planning**: Structured daily pages with time slots, goal
  areas, and daily priorities

  - **Goal Integration**: Long-term goals are broken down into daily, weekly,
  and monthly action items

  - **Roles-Based Planning**: Tasks and goals are organized by life roles (e.g.,
  family, career, health)


  ## Methodology


  The system emphasizes that time management principles have remained consistent
  for thousands of years, with technology only changing the speed at which tasks
  are completed. The planner is designed to help users:


  - Define their governing values in writing

  - Organize responsibilities by roles

  - Plan each day and week with intentional focus

  - Track progress toward long-term goals


  ## History


  Originally developed by Hyrum Smith, the Franklin Planner became one of the
  most recognized physical planning systems worldwide. It was eventually merged
  with Stephen Covey's company to form FranklinCovey, which expanded the
  methodology based on Covey's Seven Habits of Highly Effective People.


  ## Availability


  FranklinCovey continues to offer paper-based planners, digital planning tools,
  and professional training programs based on the original Franklin Planner
  methodology and Covey's time management principles.
