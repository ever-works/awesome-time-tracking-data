markdown: >-
  ## Overview


  Bionic Reading, developed by Swiss developer Renato Casutt, aims to make
  reading easier by guiding the eyes through artificial fixation points. The
  eyes focus on the bolded part of the word, and the brain fills in the rest.


  ## Scientific Evidence


  Recent studies show mixed results:

  - Analysis of 2,074 testers found participants read 2.6 words per minute
  slower with Bionic Reading

  - Study in Acta Psychologica found no significant differences in reading speed
  or comprehension

  - Comprehension was 5-8 percentage points worse with Bionic Reading than
  standard fonts


  ## How It Works


  Selectively bolds the first few letters of words to create fixation points
  that supposedly guide eye movement and improve reading flow.


  ## Availability


  Available as browser extensions, mobile apps, and API for developers. Some
  anecdotal reports of benefits for ADHD and dyslexic readers, though not
  scientifically validated.


  ## Pricing


  Various implementations available, some free, some paid.
