markdown: >-
  ## Overview


  Timesheet templates provide pre-configured time entry patterns that employees
  can use as starting points for new timesheets. These templates capture
  recurring work schedules, common project allocations, or standard work
  patterns, dramatically reducing timesheet completion time for employees with
  predictable routines.


  ## Template Types


  ### Weekly Schedule Templates

  - Standard 40-hour workweek distribution

  - Part-time schedule patterns

  - Shift work rotations

  - Flexible schedule frameworks


  ### Project Allocation Templates

  - Regular client work distributions

  - Standard project time splits

  - Recurring meeting patterns

  - Administrative time allocations


  ### Role-Based Templates

  - Developer typical week

  - Sales representative pattern

  - Consultant standard allocation

  - Support staff schedule


  ## Key Features


  - **One-Click Application**: Apply entire template with single action

  - **Customization**: Modify template after application

  - **Multiple Templates**: Save different patterns for different scenarios

  - **Sharing**: Share templates across team members

  - **Version Control**: Track template changes over time

  - **Default Templates**: Set default template for specific users or roles


  ## Benefits


  - **Time Savings**: Complete timesheets in minutes instead of 15-30 minutes

  - **Accuracy**: Reduce errors from manual entry

  - **Consistency**: Standardize time allocation patterns

  - **Compliance**: Ensure complete timesheets with all required elements

  - **Adoption**: Simplify timesheet process encourages compliance


  ## Common Use Cases


  ### Consultants

  Template with standard client split (Client A: 20hrs, Client B: 15hrs,
  Internal: 5hrs)


  ### Project Managers

  Weekly pattern including regular meetings, project work, and administrative
  time


  ### Support Staff

  Shift-based template with consistent start/end times and break patterns


  ### Developers

  Sprint-based template with story allocations and meeting time


  ## Implementation


  1. Identify employees with recurring patterns

  2. Create templates for common schedules

  3. Train users on template application

  4. Allow customization for variations

  5. Review and update templates regularly

  6. Share best-practice templates across teams


  ## Best Practices


  - Create templates for 80% patterns, not edge cases

  - Allow easy modification after template application

  - Review template usage to identify needed additions

  - Update templates as work patterns change

  - Balance standardization with flexibility

  - Don't over-complicate with too many templates
